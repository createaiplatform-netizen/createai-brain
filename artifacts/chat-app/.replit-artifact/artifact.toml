kind = "web"
previewPath = "/chat-app/"
title = "Chat App"
version = "1.0.0"
id = "artifacts/chat-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18228
name = "web"
paths = ["/chat-app/"]

[services.development]
run = "echo 'Chat App is now integrated into CreateAI Brain. Access it from the main platform.'"

[services.env]
PORT = "18228"
BASE_PATH = "/chat-app/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chat-app", "run", "build"]
publicDir = "artifacts/chat-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
