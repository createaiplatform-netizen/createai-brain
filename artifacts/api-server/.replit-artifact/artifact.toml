kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = "bash -c 'pnpm install --frozen-lockfile && pnpm --filter @workspace/createai-brain run build && pnpm --filter @workspace/api-server run build'"
run = "node artifacts/api-server/dist/index.cjs"

[services.production.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
