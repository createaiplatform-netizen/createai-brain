kind = "web"
previewPath = "/health-os/"
title = "HealthOS – Healthcare System"
version = "1.0.0"
id = "artifacts/health-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23657
name = "web"
paths = ["/health-os/"]

[services.development]
run = "echo 'HealthOS is now integrated into CreateAI Brain. Access it from the main platform.'"

[services.env]
PORT = "23657"
BASE_PATH = "/health-os/"

[services.production]
build = ["pnpm", "--filter", "@workspace/health-os", "run", "build"]
publicDir = "artifacts/health-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
