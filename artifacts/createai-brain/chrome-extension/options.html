<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CreateAI Brain — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #020617; color: #e2e8f0; padding: 32px; max-width: 500px; }
    h1 { font-size: 22px; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
    .sub { color: #64748b; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input { background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 14px; padding: 10px 14px; width: 100%; margin-bottom: 20px; }
    button { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.85; }
    .saved { color: #10b981; font-size: 13px; margin-left: 12px; display: none; }
  </style>
</head>
<body>
  <h1>🧠 CreateAI Brain Settings</h1>
  <p class="sub">Configure your CreateAI Brain Chrome extension.</p>
  <label>Platform URL</label>
  <input type="url" id="platform-url" value="https://createaibrain.app" />
  <button id="save">Save Settings</button>
  <span class="saved" id="saved-msg">✅ Saved!</span>
  <script>
    chrome.storage.local.get("platformUrl", ({ platformUrl }) => {
      if (platformUrl) document.getElementById("platform-url").value = platformUrl;
    });
    document.getElementById("save").addEventListener("click", () => {
      const url = document.getElementById("platform-url").value;
      chrome.storage.local.set({ platformUrl: url }, () => {
        const msg = document.getElementById("saved-msg");
        msg.style.display = "inline";
        setTimeout(() => msg.style.display = "none", 2000);
      });
    });
  </script>
</body>
</html>
