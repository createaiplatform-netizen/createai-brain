<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CreateAI Brain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 520px;
      background: #020617;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: #6366f1;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .brand { font-size: 16px; font-weight: 700; color: #f8fafc; }
    .version { font-size: 11px; color: #64748b; }
    .open-btn {
      margin-left: auto;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .open-btn:hover { opacity: 0.85; }

    .apps {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }
    .app-btn {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 14px 12px;
      cursor: pointer;
      text-align: left;
      color: inherit;
      transition: border-color 0.15s;
    }
    .app-btn:hover { border-color: #6366f1; }
    .app-btn .icon { font-size: 22px; margin-bottom: 8px; }
    .app-btn .name { font-size: 12px; font-weight: 600; color: #f8fafc; }
    .app-btn .desc { font-size: 11px; color: #64748b; margin-top: 2px; }

    .footer {
      background: #0f172a;
      border-top: 1px solid #1e293b;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b; }
    .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; }
    .settings-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠</div>
    <div>
      <div class="brand">CreateAI Brain</div>
      <div class="version">v1.0.0 · Lakeside Trinity LLC</div>
    </div>
    <button class="open-btn" id="open-full">Open OS ↗</button>
  </div>

  <div class="apps" id="apps-grid">
    <button class="app-btn" data-app="aiStrategy">
      <div class="icon">🧠</div>
      <div class="name">AI Strategy</div>
      <div class="desc">GPT-4o advisor</div>
    </button>
    <button class="app-btn" data-app="revenueIntel">
      <div class="icon">📈</div>
      <div class="name">Revenue Intel</div>
      <div class="desc">MRR, ARR, LTV</div>
    </button>
    <button class="app-btn" data-app="domainCRM">
      <div class="icon">👥</div>
      <div class="name">CRM</div>
      <div class="desc">Contacts & pipeline</div>
    </button>
    <button class="app-btn" data-app="projectsCmd">
      <div class="icon">🎯</div>
      <div class="name">Projects</div>
      <div class="desc">Tasks & sprints</div>
    </button>
    <button class="app-btn" data-app="socialCmd">
      <div class="icon">📣</div>
      <div class="name">Social</div>
      <div class="desc">7 platforms</div>
    </button>
    <button class="app-btn" data-app="brandVault">
      <div class="icon">💎</div>
      <div class="name">Brand Vault</div>
      <div class="desc">Assets & guidelines</div>
    </button>
    <button class="app-btn" data-app="partnerNet">
      <div class="icon">🤝</div>
      <div class="name">Partners</div>
      <div class="desc">Affiliates & refs</div>
    </button>
    <button class="app-btn" data-app="franchiseOps">
      <div class="icon">🏪</div>
      <div class="name">Franchise</div>
      <div class="desc">Multi-location ops</div>
    </button>
  </div>

  <div class="footer">
    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Connected</span>
    </div>
    <button class="settings-btn" id="settings-btn" title="Settings">⚙️</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
