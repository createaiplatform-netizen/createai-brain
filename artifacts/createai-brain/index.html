    <title>CreateAI Brain</title>

    <!-- ── Service Worker ───────────────────────────────────────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[CreateAI] SW registered, scope:', reg.scope))
            .catch(err => console.warn('[CreateAI] SW error:', err));
        });
      }
    </script>
