kind = "web"
previewPath = "/createai-brain/"
title = "CreateAI Brain"
version = "1.0.0"
id = "artifacts/createai-brain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23568
name = "web"
paths = ["/createai-brain/"]

[services.development]
run = "pnpm --filter @workspace/createai-brain run dev"

[services.env]
PORT = "23568"
BASE_PATH = "/createai-brain/"

[services.production]
build = ["pnpm", "--filter", "@workspace/createai-brain", "run", "build"]
publicDir = "artifacts/createai-brain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
