kind = "web"
previewPath = "/"
title = "CreateAI Brain"
version = "1.0.0"
id = "artifacts/createai-brain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 8080
name = "web"
paths = ["/"]

[services.development]
run = "echo 'CreateAI Brain is served via the API Server on port 8080. Open the API Server workflow to see logs.'"

[services.production]
build = ["pnpm", "--filter", "@workspace/createai-brain", "run", "build"]
publicDir = "artifacts/createai-brain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
