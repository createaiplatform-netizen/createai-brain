kind = "web"
previewPath = "/"
title = "CreateAI Brain"
version = "1.0.0"
id = "artifacts/createai-brain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 5173
name = "web"
paths = ["/"]

[services.development]
run = "PORT=5173 BASE_PATH=/ pnpm --filter @workspace/createai-brain run dev"

[services.env]
PORT = "5173"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/createai-brain", "run", "build"]
publicDir = "artifacts/createai-brain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
