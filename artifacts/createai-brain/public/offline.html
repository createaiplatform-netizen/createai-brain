<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — CreateAI Brain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #020617;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 440px;
      width: 100%;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #6366f120;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 24px;
    }
    h1 { font-size: 24px; font-weight: 700; color: #f8fafc; margin-bottom: 12px; }
    p  { font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .badge {
      display: inline-block;
      background: #1e293b;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🧠</div>
    <h1>You're Offline</h1>
    <p>CreateAI Brain couldn't connect to the network. Your data is safe — reconnect to continue working across all 45+ tools.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="badge">CreateAI Brain · Lakeside Trinity LLC</div>
  </div>
</body>
</html>
