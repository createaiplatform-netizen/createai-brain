kind = "web"
previewPath = "/staffing-os/"
title = "StaffingOS – Global Staffing Platform"
version = "1.0.0"
id = "artifacts/staffing-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21509
name = "web"
paths = ["/staffing-os/"]

[services.development]
run = "pnpm --filter @workspace/staffing-os run dev"

[services.env]
PORT = "21509"
BASE_PATH = "/staffing-os/"

[services.production]
build = ["pnpm", "--filter", "@workspace/staffing-os", "run", "build"]
publicDir = "artifacts/staffing-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
