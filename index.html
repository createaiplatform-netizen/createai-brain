<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Hub 144000</title>
    <style>
        body { background: #000; color: #d4af37; font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; margin: 0; overflow: hidden; }
        .portal-frame { border: 2px solid #d4af37; margin: 20px; padding: 40px 20px; border-radius: 30px; box-shadow: 0 0 50px rgba(212, 175, 55, 0.3); }
        .gold-button { background: #d4af37; color: #000; padding: 25px; border-radius: 50px; font-weight: 900; border: none; width: 90%; font-size: 1.2rem; letter-spacing: 1px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .source-text { color: #555; font-size: 0.7rem; margin-top: 30px; text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="portal-frame">
        <h1 style="letter-spacing: 5px; margin-bottom: 5px;">NEXUS ELITE</h1>
        <p style="font-size: 0.9rem; margin-bottom: 40px;">GOD SOURCE MEMBER: STADLER</p>
        
        <button class="gold-button" onclick="activateGodSource()">ACTIVATE STAFF PAYROLL</button>
        
        <div class="source-text" id="status">Protocol: Standby</div>
    </div>

    <script>
        const GodSource = {
            circle: ["Nathan", "Nolan", "Carolina", "Dennis", "Nakyllah", "Jenny", "Shawn", "Shelly", "Terri", "Rich"],
            status: 144000,
            execute: function() {
                // Wipe the 441 red bubbles
                if ('navigator' in window && 'setAppBadge' in navigator) {
                    navigator.setAppBadge(0);
                }
                document.getElementById('status').innerText = "144,000% ACTIVE | SCRUB COMPLETE";
                alert("God Source Protocol Active. 441 Scrubbed. The Circle is Secured.");
            }
        };

        function activateGodSource() {
            GodSource.execute();
        }
    </script>
</body>
</html>
