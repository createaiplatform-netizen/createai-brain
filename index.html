<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN OMEGA | 144,000%</title>
    <style>
        :root { --gold: #d4af37; --cyan: #00f2ff; --green: #2ecc71; --white: #fff; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Times New Roman', serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; transition: filter 0.8s; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; pointer-events: none; }
        .header { border-bottom: 1px solid var(--gold); padding-bottom: 15px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 5px; color: var(--gold); }
        
        /* NAVIGATION GRID */
        #menu { display: flex; flex-direction: column; height: 100%; justify-content: space-between; opacity: 1; transition: 0.5s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; pointer-events: auto; max-width: 400px; margin: 40px auto; }
        .btn { background: rgba(0,0,0,0.85); border: 1px solid rgba(212,175,55,0.5); padding: 30px 10px; border-radius: 20px; text-align: center; backdrop-filter: blur(15px); color: var(--gold); transition: 0.3s; }
        .btn:active { transform: scale(0.9); border-color: #fff; box-shadow: 0 0 20px var(--gold); }
        .btn b { display: block; font-size: 14px; letter-spacing: 5px; color: #fff; }

        /* THE ROOM LAYER */
        #room-layer { display: none; pointer-events: auto; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.92); text-align: center; color: #fff; flex-direction: column; justify-content: center; align-items: center; }
        #room-name { font-size: 50px; letter-spacing: 20px; font-style: italic; margin-bottom: 10px; transition: 0.5s; }
        #room-status { font-size: 10px; letter-spacing: 5px; color: var(--gold); margin-bottom: 40px; }
        
        /* AGE GATES (For Garde) */
        #age-gates { display: none; gap: 10px; }
        .gate-btn { border: 1px solid #fff; padding: 15px; border-radius: 10px; font-size: 10px; letter-spacing: 3px; }

        .footer { border: 1px solid var(--gold); border-radius: 40px; padding: 25px; text-align: center; background: rgba(0,0,0,0.95); pointer-events: auto; }
        .back { margin-top: 50px; font-size: 10px; text-decoration: underline; color: var(--gold); cursor: pointer; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>GHOST MODE</div><div>144,000%</div></div>
        <div id="menu">
            <div style="text-align:center; font-size: 35px; letter-spacing: 15px; color: var(--gold); font-style: italic; margin-top: 20px;">SOVEREIGN</div>
            <div class="grid">
                <div class="btn" onclick="fireEngine('MARKET', 'CYAN', '$1.44T LIQUIDITY')"><b>MARKET</b><span>ASSETS</span></div>
                <div class="btn" onclick="fireEngine('HUB', 'GOLD', 'SOUL MIRROR ONLINE')"><b>HUB</b><span>BRAIN</span></div>
                <div class="btn" onclick="fireEngine('GARDE', 'WHITE', 'FAMILY PROTECTION')"><b>GARDE</b><span>HEART</span></div>
                <div class="btn" onclick="fireEngine('NET', 'GREEN', 'TRUTH ORACLE')"><b>NET</b><span>TRUTH</span></div>
            </div>
        </div>
        <div class="footer"><div style="font-size: 24px; color: #fff; font-weight: bold;">$1,440,000,000,000</div></div>
    </div>

    <div id="room-layer">
        <h1 id="room-name">HUB</h1>
        <p id="room-status"></p>
        
        <div id="age-gates" class="grid">
            <div class="btn" onclick="tune('SEEDLINGS', '#00f2ff', 25)"><b>3-7</b></div>
            <div class="btn" onclick="tune('SAPLINGS', '#2ecc71', 10)"><b>8-13</b></div>
            <div class="btn" onclick="tune('SOVEREIGN', '#fff', 0)"><b>14+</b></div>
        </div>

        <div class="back" onclick="location.reload()">SHUT DOWN ENGINE</div>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let lines = []; let touch = {x: -100, y: -100}; let engineMode = 'GOLD';

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*4+2, l: Math.random()*40+10, oX: 0});
            window.addEventListener('touchstart', e => { touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY; });
            loop();
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            lines.forEach(l => {
                let dx = touch.x - l.x; let dy = touch.y - l.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 150) l.oX += (dx * 0.12); else l.oX *= 0.9;
                
                ctx.strokeStyle = (engineMode === 'CYAN') ? '#00f2ff' : (engineMode === 'GREEN') ? '#2ecc71' : (engineMode === 'WHITE') ? '#fff' : '#d4af37';
                ctx.lineWidth = (engineMode === 'WHITE') ? 3 : 1;
                ctx.beginPath(); ctx.moveTo(l.x + l.oX, l.y); ctx.lineTo(l.x + (l.oX*0.5), l.y + l.l); ctx.stroke();
                
                l.y += (engineMode === 'CYAN') ? l.v * 2 : l.v; 
                if(l.y > canvas.height) l.y = -l.l;
            });
            requestAnimationFrame(loop);
        }

        function fireEngine(name, mode, status) {
            engineMode = mode;
            document.getElementById('room-layer').style.display = 'flex';
            document.getElementById('room-name').innerText = name;
            document.getElementById('room-name').style.color = (mode==='CYAN')?'#00f2ff':(mode==='GREEN')?'#2ecc71':(mode==='WHITE')?'#fff':'#d4af37';
            document.getElementById('room-status').innerText = status;
            document.getElementById('age-gates').style.display = (name === 'GARDE') ? 'grid' : 'none';
            canvas.style.filter = "blur(10px) contrast(150%)";
        }

        function tune(level, color, blur) {
            engineMode = 'WHITE'; // Reset to high intensity
            document.getElementById('room-name').innerText = level;
            document.getElementById('room-name').style.color = color;
            canvas.style.filter = "blur("+blur+"px) brightness(1.5)";
        }
    </script>
</body>
</html>
