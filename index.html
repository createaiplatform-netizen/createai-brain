<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE DOME</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Courier New', monospace; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; transition: 0.5s; }
        #genesis-portal { display: none; position: fixed; z-index: 9999; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; }
        input { background: none; border: none; border-bottom: 2px solid #d4af37; color: #fff; width: 70%; font-size: 24px; text-align: center; outline: none; letter-spacing: 5px; padding: 10px; }
    </style>
</head>
<body onload="init()">

    <iframe id="layer-vision" src="omni_vision.html"></iframe>
    <iframe id="layer-market" src="market.html" style="opacity:0; pointer-events:none;"></iframe>
    <iframe id="layer-utility" src="utility.html" style="opacity:0; pointer-events:none;"></iframe>

    <div id="genesis-portal">
        <h1 style="color:#d4af37; font-size:10px; letter-spacing:10px;">COMMAND CORE</h1>
        <input type="text" id="cmd" placeholder="SPEAK..." onkeypress="execute(event)">
    </div>

    <script>
        // LONG PRESS TO OPEN COMMANDS
        let timer;
        window.addEventListener('mousedown', () => { timer = setTimeout(() => { document.getElementById('genesis-portal').style.display='flex'; }, 2000); });
        window.addEventListener('mouseup', () => { clearTimeout(timer); });

        function execute(e) {
            if(e.key === 'Enter') {
                const input = document.getElementById('cmd').value.toUpperCase();
                
                // THE NAVIGATION COMMANDS
                if(input === 'SHOW MARKET') { switchLayer('layer-market'); }
                if(input === 'SHOW VISION') { switchLayer('layer-vision'); }
                if(input === 'SHOW TOOLS') { switchLayer('layer-utility'); }
                
                // RESET PORTAL
                document.getElementById('genesis-portal').style.display='none';
                document.getElementById('cmd').value = '';
            }
        }

        function switchLayer(id) {
            document.querySelectorAll('iframe').forEach(f => { f.style.opacity = 0; f.style.pointerEvents = 'none'; });
            document.getElementById(id).style.opacity = 1;
            document.getElementById(id).style.pointerEvents = 'auto';
        }
    </script>
</body>
</html>
