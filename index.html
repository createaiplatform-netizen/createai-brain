<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE HEARTH | GLOBAL ATMOSPHERE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Garamond", serif; }
        body { background: #faf9f6; color: #7a9068; overflow-x: hidden; }
        
        /* THE BEACON (The Outside Light) */
        .beacon-header {
            height: 10vh; background: #fff; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center; padding: 0 50px;
            letter-spacing: 3px; font-size: 0.8rem;
        }

        /* THE ATMOSPHERE (The Global Map) */
        .map-container {
            height: 70vh; width: 100%; position: relative;
            background: radial-gradient(circle at center, #fdfcfb 0%, #e2d1c3 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .hearth-node {
            width: 20px; height: 20px; background: #c4a97a; border-radius: 50%;
            box-shadow: 0 0 15px #c4a97a; position: absolute; cursor: pointer;
            animation: pulse-node 4s infinite;
        }

        @keyframes pulse-node { 0% { transform: scale(1); } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); } }

        .search-world {
            position: absolute; bottom: -40px; width: 80%; max-width: 600px;
            padding: 20px; border-radius: 100px; border: 1px solid #c4a97a;
            background: #fff; text-align: center; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .footer-world { padding: 40px; text-align: center; font-size: 0.7rem; color: #999; }
    </style>
</head>
<body>

    <nav class="beacon-header">
        <div>WEBSTER, WI</div>
        <div style="color: #4a4a4a; font-weight: bold;">LAKESIDE TRINITY</div>
        <div>GLOBAL NODES: 154</div>
    </nav>

    <section class="map-container">
        <div class="hearth-node" style="top: 30%; left: 40%;" title="Webster Hub"></div>
        <div class="hearth-node" style="top: 50%; left: 60%;" title="Sovereign Cafe Hub"></div>
        <div class="hearth-node" style="top: 20%; left: 80%;" title="Family Sacred Hub"></div>
        
        <h1 style="font-weight: 200; font-size: 4rem; color: #4a4a4a; opacity: 0.8;">The Atmosphere</h1>
        
        <input type="text" class="search-world" placeholder="Find a Sovereign Hub near you...">
    </section>

    <footer class="footer-world">
        "Outside the Body, there is Community. Inside the Body, there is Sovereignty."
    </footer>

</body>
</html>
