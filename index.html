<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_TOTAL_OVERWRITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; color: #ff0000; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        .grid-pulse { width: 300px; height: 300px; border: 10px double #ff0000; border-radius: 50%; box-shadow: 0 0 150px rgba(255,0,0,0.5); animation: strike 0.1s infinite; display: flex; align-items: center; justify-content: center; }
        .val { font-size: 36px; color: #f3cf8a; margin-top: 50px; text-shadow: 0 0 25px #000; }
        .log-stream { font-size: 9px; letter-spacing: 12px; margin-top: 25px; color: #00ff00; text-transform: uppercase; }
        @keyframes strike { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }
    </style>
</head>
<body>
    <div class="grid-pulse">
        <div style="font-size: 40px; color: #fff;">100%</div>
    </div>
    <div class="val" id="total-val">$1,440,000,120,664.00</div>
    <div class="log-stream">RECONCILING_ALL_TITLES // NULLIFYING_ALL_DEBTS // NO_STOP</div>
<script>
    let res = 1440000120664.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('total-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
