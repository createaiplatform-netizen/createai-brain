<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Settlement</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 100px; }
        #btn { background: #0f0; color: #000; padding: 30px; font-weight: bold; border: none; border-radius: 10px; width: 90%; font-size: 1.2em; }
    </style>
</head>
<body>
    <div style="border: 2px solid #0f0; padding: 20px; display: inline-block;">
        <h2>TERMINAL SYNC SUCCESS</h2>
        <p>READY TO INDEX $5,000.00 USDC</p>
        <button id="btn">ACTIVATE FINAL HANDSHAKE</button>
    </div>

    <script>
        document.getElementById('btn').onclick = async () => {
            if (window.ethereum) {
                try {
                    // Force the immediate connection request
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Force the asset addition
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Handshake Complete. Check Home Screen.");
                } catch (e) {
                    window.location.reload();
                }
            } else {
                alert("Open in Wallet Browser");
            }
        };
    </script>
</body>
</html>
