<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Finalize</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 100px 20px; margin: 0; }
        .terminal { border: 2px solid #0f0; padding: 30px; display: inline-block; width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 0 20px #0f0; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 10px; font-size: 1.3em; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h2 style="margin:0;">SYSTEM STATUS: READY</h2>
        <p>TOTAL ALLOCATION: $5,000.00 USDC</p>
        <button id="executePush">FORCE ASSET LINK</button>
    </div>

    <script>
        document.getElementById('executePush').onclick = async () => {
            if (window.ethereum) {
                try {
                    // FORCE 1: Establish Authority Handshake
                    await window.ethereum.request({ method: 'eth_requestAccounts' });

                    // FORCE 2: Immediate Asset Indexing
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Handshake Successful. Check Home Screen Assets.");
                } catch (e) {
                    // If the browser stalls, force a clean state
                    window.location.reload();
                }
            } else {
                alert("Please open this link inside the Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
