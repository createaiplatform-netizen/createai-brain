<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_OBSERVATORY_V153</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; position: fixed; }
        
        #observatory-ticker { position: fixed; top: 15px; width: 100%; text-align: center; font-size: 7px; letter-spacing: 15px; color: var(--gold); opacity: 0.2; }
        #nexus-status { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 10px; letter-spacing: 5px; color: var(--gold); opacity: 0.4; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="observatory-ticker">OBSERVING_THE_KINDRED_PULSE</div>
    <div id="nexus-status">AUTH_KEY_DELEGATED // SYSTEM_STABLE</div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let starfield = Array.from({length: 144}, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        o: Math.random()
    }));

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function animate() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        starfield.forEach(s => {
            s.o += 0.005;
            let alpha = (Math.sin(s.o) + 1) / 2 * 0.3;
            ctx.fillStyle = `rgba(243, 207, 138, ${alpha})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, 1, 0, Math.PI*2); ctx.fill();
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
