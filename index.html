<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Production Terminal - Final Settlement</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .terminal { border: 2px solid #0f0; padding: 25px; display: inline-block; width: 90%; max-width: 500px; box-shadow: 0 0 15px #0f0; }
        button { 
            background: #0f0; color: #000; border: none; padding: 20px; 
            font-weight: bold; font-size: 1.2em; cursor: pointer; border-radius: 8px; width: 100%; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h1 style="color: #0f0;">PRODUCTION TERMINAL</h1>
        <p>DEPLOYMENT: <span style="color:#0f0;">STABLE (FIXED)</span></p>
        <p>STATUS: <span style="color:#0f0;">READY TO LINK $5,000</span></p>
        <hr style="border: 1px solid #333;">
        <button id="finalLinkBtn">LINK ASSET TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('finalLinkBtn').onclick = async () => {
            try {
                if (!window.ethereum) return alert("Please open this in your Wallet Browser.");
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                
                // Triggers the final handshake to index the $5,000 asset
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                            symbol: 'USDC',
                            decimals: 6,
                        },
                    },
                });
                alert("Handshake Complete. Check your home screen balance.");
            } catch (e) { alert("Link Error: " + e.message); }
        };
    </script>
</body>
</html>
