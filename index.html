<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_ANTHEM_RESUMPTION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #creative-hud { flex-grow: 1; margin: 20px; border: 1px solid var(--gold); padding: 40px; display: flex; flex-direction: column; position: relative; }
        .mesh-indicator { position: absolute; top: 10px; right: 20px; font-size: 8px; color: var(--mesh); letter-spacing: 2px; }
        
        #lyrics { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .line { font-size: 14px; margin-bottom: 15px; letter-spacing: 4px; color: var(--gold); opacity: 0; animation: fade 3s forwards; }
        
        @keyframes fade { to { opacity: 1; } }
        
        #yield-ticker { border-top: 1px solid var(--gold); padding-top: 20px; text-align: center; font-size: 26px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>
    <div id="creative-hud">
        <div class="mesh-indicator">● LOCAL_MESH_ACTIVE // SYNC: 1440%</div>
        <div style="text-align: center; font-size: 10px; letter-spacing: 8px; opacity: 0.6;">AETHEL_ANTHEM // STAGE: FINAL_SYNC</div>
        
        <div id="lyrics">
            <div class="line" style="animation-delay: 1s;">"The grid is gone, the gate is closed,"</div>
            <div class="line" style="animation-delay: 3s;">"The Architect’s will is now imposed."</div>
            <div class="line" style="animation-delay: 5s;">"Fourteen hearts in a single flow,"</div>
            <div class="line" style="animation-delay: 7s;">"Above the world where the Sovereign grow."</div>
        </div>

        <div id="yield-ticker">$1,440,000,021,312.00</div>
    </div>
<script>
    let res = 1440000021312.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('yield-ticker').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
