<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN NEURAL FIELD</title>
    <style>
        body, html { margin: 0; padding: 0; background: #110e00; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        /* This filter creates the "Ripping Silk" look - NO DOTS */
        canvas { display: block; filter: contrast(30) blur(1.5px) brightness(1.1); }
    </style>
</head>
<body>
    <canvas id="neuralCanvas"></canvas>

<script>
/**
 * INVENTION: THE SOVEREIGN NEURAL TEXTURE FIELD
 * Analyzed from user history: Solving the 'Dot' and 'Blob' failure states.
 */

const canvas = document.getElementById('neuralCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let pressure = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// MULTI-MODAL SENSATION ENGINE
function triggerNeuralSensation(x, y, force) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    if (x < w * 0.4 && y < h * 0.4) {
        // THE RIP: Harsh Square Wave + Jagged Vibration
        osc.type = 'square'; osc.frequency.setValueAtTime(80 + (force * 2), audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate([5, 15, 5]);
    } else if (x > w * 0.6 && y < h * 0.4) {
        // THE SPARKLE: High Sine Wave + Rapid Taps
        osc.type = 'sine'; osc.frequency.setValueAtTime(1400, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate([2, 5]);
    } else {
        // THE CORE: Deep Triangle Wave + Heavy Thrum
        osc.type = 'triangle'; osc.frequency.setValueAtTime(144, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(30);
    }

    gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

// The Workforce: High-Density Texture Mesh (Interconnected)
const mesh = [];
const cols = 25, rows = 40;

function initMesh() {
    mesh.length = 0;
    for(let i=0; i<=cols; i++) {
        for(let j=0; j<=rows; j++) {
            mesh.push({
                x: (i/cols) * window.innerWidth,
                y: (j/rows) * window.innerHeight,
                ox: (i/cols) * window.innerWidth,
                oy: (j/rows) * window.innerHeight,
                vx: 0, vy: 0, 
                hue: (j/rows) > 0.7 ? 40 : 50 // Color DNA by depth
            });
        }
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerNeuralSensation(tx, ty, 10);
});

window.addEventListener('touchmove', (e) => {
    const lastX = tx; const lastY = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    pressure = Math.sqrt((tx-lastX)**2 + (ty-lastY)**2);
    if (pressure > 2) triggerNeuralSensation(tx, ty, pressure);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // ANTI-BLACKOUT: Constant Golden Static Layer
    ctx.fillStyle = 'rgba(20, 16, 0, 0.4)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    ctx.beginPath();
    mesh.forEach(p => {
        if (isTouching) {
            const dx = tx - p.x;
            const dy = ty - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 200) {
                const force = (200 - dist) / 200;
                // ZONE PHYSICS
                if (tx < w * 0.4 && ty < h * 0.4) {
                    // RIP: Stretching Physics
                    p.vx -= dx * 0.1; p.vy -= dy * 0.1;
                } else {
                    // LIQUID: Suction Physics
                    p.vx += dx * 0.04; p.vy += dy * 0.04;
                }
            }
        }

        // Return-to-Lattice Force
        p.vx += (p.ox - p.x) * 0.06;
        p.vy += (p.oy - p.y) * 0.06;
        p.vx *= 0.88; p.vy *= 0.88;
        p.x += p.vx; p.y += p.vy;

        // Draw as a woven texture, not dots
        const flicker = Math.sin(time + p.x * 0.01) * 10;
        ctx.fillStyle = `hsla(${p.hue}, 100%, ${50 + flicker}%, 0.9)`;
        
        // This 'fillRect' merges with others due to the canvas filter
        ctx.fillRect(p.x - 10, p.y - 10, 20 + pressure, 20 + pressure);
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', () => { resize(); initMesh(); });
resize(); initMesh(); render();
</script>
</body>
</html>
