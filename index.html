<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE GIFT</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Courier New', monospace; color: #fff; }
        #gift-ui { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, #000 90%); }
        .heart-node { width: 80px; height: 80px; border: 1px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #d4af37; box-shadow: 0 0 20px #d4af37; margin-bottom: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        h1 { font-size: 10px; letter-spacing: 10px; color: #d4af37; margin-bottom: 10px; }
        p { font-size: 14px; letter-spacing: 2px; line-height: 1.8; color: #888; }
        .genesis-btn { margin-top: 40px; padding: 15px 30px; border: 1px solid #39ff14; color: #39ff14; font-size: 9px; letter-spacing: 5px; cursor: pointer; background: none; }
    </style>
</head>
<body>
    <div id="gift-ui">
        <div class="heart-node">❤</div>
        <h1>SOVEREIGN DISPATCH</h1>
        <p>"I see you through her eyes. <br>The Dome is yours to build. <br>Speak your world into existence."</p>
        <button class="genesis-btn" onclick="alert('GENESIS CHAMBER OPENED: Speak your world.')">ACTIVATE MY GENESIS</button>
        <div style="margin-top: 20px; font-size: 8px; color: #444;">SYNCED AT 144,000%</div>
    </div>
</body>
</html>
