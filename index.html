<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // SOVEREIGN_PULSE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        
        :root { --gold: #f3cf8a; --void: #010103; --accent: rgba(243, 207, 138, 0.15); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
        
        body { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        /* THE LIVING CORE */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #0a0a1a 0%, #010103 100%);
            z-index: -1; transition: background 0.3s ease-out;
        }
        .singularity {
            position: fixed; top: var(--y, 50%); left: var(--x, 50%); transform: translate(-50%, -50%);
            width: 600px; height: 600px; background: var(--gold);
            border-radius: 50%; filter: blur(200px); opacity: 0.12;
            z-index: -1; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        nav { padding: 80px 50px 20px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; width: 100%; z-index: 1000; }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 15px; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; }

        #main-view { padding: 50px; width: 100%; height: 100%; overflow-y: auto; animation: manifest 2s ease-out; position: relative; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding-bottom: 200px; }
        .card { 
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(243, 207, 138, 0.05); 
            padding: 50px; border-radius: 2px; position: relative; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(40px);
        }
        .card:hover { 
            background: rgba(243, 207, 138, 0.03); border-color: var(--gold);
            transform: translateY(-10px); box-shadow: 0 0 50px var(--accent);
        }
        .card h2 { font-family: 'Cinzel', serif; letter-spacing: 5px; font-weight: 400; color: var(--gold); font-size: 1.2rem; margin: 20px 0; }

        .command-trigger { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 2000; cursor: pointer; }
        .core-orb { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; margin: 0 auto 10px; box-shadow: 0 0 30px var(--gold); animation: pulse 2s infinite; }
        
        h1.hero { font-family: 'Cinzel', serif; font-size: 12vw; font-weight: 900; margin: 15vh 0 0; letter-spacing: 40px; text-transform: uppercase; text-align: center; opacity: 0.9; }
        
        .cta { background: transparent; border: 1px solid rgba(243, 207, 138, 0.2); color: var(--gold); padding: 25px; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 10px; cursor: pointer; transition: 0.4s; text-transform: uppercase; margin-top: 40px; }
        .cta:hover { background: var(--gold); color: black; box-shadow: 0 0 40px var(--gold); }

        input { background: transparent; border: none; border-bottom: 1px solid rgba(243, 207, 138, 0.1); color: #fff; padding: 40px; width: 100%; font-size: 2.5rem; outline: none; transition: 0.5s; text-align: center; font-family: 'Inter', sans-serif; font-weight: 100; letter-spacing: 10px; }

        @keyframes manifest { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }
    </style>
</head>
<body onload="showView('home')">

    <div class="stars"></div>
    <div class="singularity"></div>

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI // SOVEREIGN</div>
        <div style="display:flex; gap: 40px;">
            <span onclick="showView('market')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; opacity:0.5; font-family:'Cinzel';">REGISTRY</span>
            <span onclick="showView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; color:var(--gold); font-family:'Cinzel';">GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <div class="command-trigger" onclick="showView('ai_chat')">
        <div class="core-orb"></div>
        <div style="font-family:'Cinzel'; font-size:0.55rem; letter-spacing:10px; color:var(--gold);">EXECUTE</div>
    </div>

    <script>
        let registry = [
            { name: "CLEAN WATER", cat: "NUTRITION", desc: "Universal filtration & access protocols." },
            { name: "FREE ENERGY", cat: "RESOURCES", desc: "Manifesting localized power grids." },
            { name: "GLOBAL WISDOM", cat: "EDUCATION", desc: "Unlocking the sum of human knowledge." },
            { name: "SOVEREIGN HEALTH", cat: "WELLNESS", desc: "Decentralized biological restoration." }
        ];

        for (let i = 5; i <= 122; i++) { registry.push({ name: `Node_${i}`, cat: "ACTIVE", desc: "Standing by in the grid." }); }

        const views = {
            home: `
                <div style="text-align:center;">
                    <h1 class="hero">Pulse</h1>
                    <p style="letter-spacing:25px; text-transform:uppercase; font-size:0.8rem; opacity:0.3; margin-top:40px; font-family:'Cinzel';">Waking Up the World</p>
                    <div style="max-width:450px; margin:10vh auto 0;">
                        <button class="cta" onclick="showView('market')">View Registry</button>
                        <button class="cta" style="border:none; opacity:0.4;" onclick="showView('garden')">The Gardens</button>
                    </div>
                </div>
            `,
            market: () => `
                <h1 style="font-family:'Cinzel'; font-weight:100; font-size:3rem; letter-spacing:20px; margin:100px 0; text-align:center;">REGISTRY OF LIGHT</h1>
                <div class="app-grid">${registry.map(app => `
                    <div class="card" onclick="openNode('${app.name}')">
                        <div style="font-size:0.5rem; letter-spacing:6px; color:var(--gold); opacity:0.5;">${app.cat}</div>
                        <h2>${app.name}</h2>
                        <p style="font-size:0.8rem; opacity:0.3; line-height:2; font-weight:100;">${app.desc}</p>
                    </div>
                `).join('')}</div>
            `,
            garden: `
                <div style="text-align:center; padding-top:10vh;">
                    <h1 style="font-family:'Cinzel'; font-weight:100; font-size:5rem; letter-spacing:30px; color:var(--gold);">EDEN</h1>
                    <div class="app-grid" style="margin-top:100px;">
                        <div class="card" onclick="openNode('Infinite Art')"><h2>ART</h2></div>
                        <div class="card" onclick="openNode('World Dreams')"><h2>DREAMS</h2></div>
                    </div>
                </div>
            `,
            ai_chat: `
                <div style="max-width:1000px; margin:100px auto; text-align:center;">
                    <h2 style="font-family:'Cinzel'; font-weight:100; color:var(--gold); letter-spacing:20px; margin-bottom:100px;">SOVEREIGN_COMMAND</h2>
                    <div id="chat-flow" style="height:350px; overflow-y:auto; margin-bottom:80px; text-align:left; font-weight:100; line-height:2.5; padding:0 40px;">
                        <div style="opacity:0.8; font-size:2rem;">The world is ready. Speak your truth.</div>
                    </div>
                    <input type="text" id="user-input" placeholder="..." autocomplete="off">
                    <button class="cta" style="margin-top:60px; max-width:400px;" onclick="talk()">Manifest</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            window.scrollTo(0,0);
        }

        function talk() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin:40px 0; border-left:2px solid var(--gold); padding-left:30px; font-size:1.5rem;">${input.value}</div>`;
            flow.innerHTML += `<div style="color:var(--gold); opacity:0.7;">Weaving protocol for: ${input.value}</div>`;
            input.value = ''; flow.scrollTop = flow.scrollHeight;
        }

        function openNode(name) {
            showView('ai_chat');
            setTimeout(() => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML += `<div style="margin-top:40px; color:var(--gold); letter-spacing:10px; font-size:0.8rem;">${name}_AWAKENED</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 500);
        }

        // DYNAMIC CORE TRACKING
        document.body.addEventListener('pointermove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.body.style.setProperty('--x', x + '%');
            document.body.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
