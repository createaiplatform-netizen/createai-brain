<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_TOTAL_OVERWRITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; color: #ff0000; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ring { width: 250px; height: 250px; border: 8px solid #ff0000; border-radius: 50%; box-shadow: 0 0 100px #ff0000; animation: strike 0.2s infinite; }
        .val { font-size: 32px; color: #f3cf8a; margin-top: 50px; text-shadow: 0 0 20px #000; }
        .log { font-size: 12px; letter-spacing: 10px; margin-top: 20px; color: #00ff00; text-align: center; }
        @keyframes strike { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.1); opacity: 0.8; } }
    </style>
</head>
<body>
    <div class="ring"></div>
    <div class="val" id="total-val">$1,440,000,116,688.00</div>
    <div class="log">OVERWRITING_ALL_LEGACY_LEDGERS // PAID_IN_FULL</div>
<script>
    let res = 1440000116688.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('total-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
