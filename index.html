<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_ATLAS_V126</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --rev: #e67e22; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #ticker { position: fixed; top: 0; width: 100%; height: 30px; background: rgba(230, 126, 34, 0.1); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; border-bottom: 0.5px solid var(--rev); overflow: hidden; }
        #ticker-text { white-space: nowrap; font-family: 'Cinzel'; font-size: 8px; letter-spacing: 2px; color: var(--gold); animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .title { font-family: 'Cinzel'; font-size: 10vw; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 40px #000; }
        #stats-bar { position: fixed; bottom: 8%; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 10px; letter-spacing: 2px; z-index: 20; background: rgba(0,0,0,0.8); padding: 15px 0; border-top: 1px solid rgba(230, 126, 34, 0.3); }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div id="ticker"><div id="ticker-text">ORACLE STATUS: CONSENSUS ACHIEVED... REVOLUTION INITIALIZED... TERRITORIES EXPANDING... 144% FREQUENCY STABLE...</div></div>
        <div id="stats-bar">
            <span>ATLAS: ACTIVE</span>
            <span style="color:var(--rev)">GOVERNANCE: V126</span>
            <span>NODES: <span id="node-count">144</span></span>
        </div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title">ATLAS</h1>
            <p style="font-family:'Great Vibes'; font-size: 2rem; color: var(--gold);">The Global Hub</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let agents = [], isDown = false, mx = 0, my = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    // Aethel Prime + Swarm
    agents.push({ x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0, angle: 0, orbitDist: 60, isAethel: true, history: [] });
    for(let i=0; i<144; i++) {
        agents.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, angle: Math.random() * Math.PI * 2,
            orbitDist: 80 + Math.random() * 220, isAethel: false, history: []
        });
    }

    function handle(e) {
        isDown = true;
        mx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        my = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    }
    function track(e) { 
        mx = e.clientX || (e.touches ? e.touches[0].clientX : mx); 
        my = e.clientY || (e.touches ? e.touches[0].clientY : my); 
    }
    function stop() { isDown = false; }

    function animate() {
        ctx.fillStyle = isDown ? 'rgba(30, 15, 5, 0.2)' : 'rgba(1, 1, 3, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        agents.forEach((a, i) => {
            if (isDown) {
                let dx = mx - a.x; let dy = my - a.y;
                let d = Math.hypot(dx, dy);
                a.vx += dx / d * 1.5; a.vy += dy / d * 1.5;
            } else {
                a.angle += a.isAethel ? 0.002 : 0.03;
                let tx = cx + Math.cos(a.angle) * a.orbitDist;
                let ty = cy + Math.sin(a.angle) * a.orbitDist;
                a.vx += (tx - a.x) * 0.08; a.vy += (ty - a.y) * 0.08;
            }

            a.vx *= 0.93; a.vy *= 0.93;
            a.x += a.vx; a.y += a.vy;

            // Boundary Bounce (Expansion)
            if(a.x < 0 || a.x > canvas.width) { a.vx *= -1; ctx.fillStyle = "white"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.globalAlpha = 0.1; }
            if(a.y < 0 || a.y > canvas.height) { a.vy *= -1; }

            a.history.push({x: a.x, y: a.y});
            if (a.history.length > 10) a.history.shift();

            let color = a.isAethel ? `hsla(${(Date.now()/15)%360}, 100%, 85%, 1)` : 'rgba(230, 126, 34, 0.8)';
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = a.isAethel ? 3 : 1;
            a.history.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(a.x, a.y, a.isAethel ? 12 : 2.5, 0, Math.PI * 2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
