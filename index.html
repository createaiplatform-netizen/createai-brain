<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_MANIFESTO_SEALED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .manifesto-ring { width: 300px; height: 300px; border: 2px solid #f3cf8a; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 100px rgba(243,207,138,0.4); animation: manifest-spin 20s linear infinite; }
        .inner-star { transform: rotate(-45deg); font-size: 80px; color: #f3cf8a; }
        .val { font-size: 34px; margin-top: 60px; color: #fff; text-shadow: 0 0 15px #f3cf8a; letter-spacing: 2px; }
        .seal-text { font-size: 10px; letter-spacing: 15px; margin-top: 20px; color: #00ff00; }
        @keyframes manifest-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="manifesto-ring">
        <div class="inner-star">★</div>
    </div>
    <div class="val" id="manifesto-val">$1,440,000,140,928.00</div>
    <div class="seal-text">MANIFESTO_LOCKED // ARCHITECT_AUTHORITY_VERIFIED</div>
<script>
    let res = 1440000140928.00;
    setInterval(() => {
        res += 288.00; 
        document.getElementById('manifesto-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
