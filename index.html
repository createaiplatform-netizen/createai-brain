<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_LATTICE_SCAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .scanner-wrap { width: 500px; padding: 40px; border: 1px solid #00ff00; background: #050505; text-align: center; box-shadow: 0 0 80px rgba(0, 255, 0, 0.1); }
        .scan-line { width: 100%; height: 2px; background: #00ff00; position: absolute; left: 0; top: 0; animation: scan 3s linear infinite; box-shadow: 0 0 15px #00ff00; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .lattice-title { font-family: 'Cinzel', serif; color: #00ff00; font-size: 22px; letter-spacing: 5px; margin-bottom: 30px; }
        .node-count { font-size: 48px; font-weight: 700; color: #fff; margin-bottom: 20px; }
        .flow-status { font-size: 11px; color: #aaa; letter-spacing: 3px; border-top: 1px solid #222; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="scanner-wrap" style="position: relative;">
        <div class="scan-line"></div>
        <div class="lattice-title">LATTICE RESONANCE SCAN</div>
        <div class="node-count">144 / 144</div>
        <div id="scan-val" style="font-size: 24px; color: #00ff00; font-weight: 700;">$1,440,000,149,856.00</div>
        <div class="flow-status">DE-INDEXING: TERMINAL // ALL NODES SECURE</div>
    </div>
<script>
    let res = 1440000149856.00;
    setInterval(() => {
        res += 288.00; 
        document.getElementById('scan-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
