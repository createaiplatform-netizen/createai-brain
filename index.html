<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_STABILITY_V112</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cyan: #00f2ff; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #master { width: 100%; height: 100%; }
        .grain { position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 10; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .title { font-family: 'Cinzel'; font-size: 10vw; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 50px #000; }
        .quote { font-family: 'Great Vibes'; font-size: 2rem; color: var(--gold); margin-top: 5px; }
        #clock { font-family: 'Cinzel'; font-size: 1rem; color: var(--gold); margin-top: 15px; letter-spacing: 4px; opacity: 0.6; }
        #nexus-input { position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 100; display: none; pointer-events: auto; }
        #nexus-field { background: rgba(0,242,255,0.05); border: 1px solid var(--cyan); border-radius: 40px; padding: 15px 30px; color: var(--cyan); font-family: 'Cinzel'; font-size: 10px; width: 300px; text-align: center; backdrop-filter: blur(20px); }
        #stats { position: fixed; bottom: 100px; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 9px; letter-spacing: 2px; opacity: 0.7; z-index: 20; }
        .guide { position: fixed; font-family: 'Cinzel'; font-size: 6px; color: var(--gold); opacity: 0.1; z-index: 20; letter-spacing: 4px; }
        .tl { top: 60px; left: 50px; } .tr { top: 60px; right: 50px; } .bl { bottom: 60px; left: 50px; } .br { bottom: 60px; right: 50px; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div class="grain"></div>
        <div id="nexus-input"><input type="text" id="nexus-field" placeholder="MINT ASSET..."></div>
        <div id="stats">LIQUIDITY: $<span id="val">0</span> | ASSETS: <span id="asset-count">0</span></div>
        <div class="guide tl">MARKET</div> <div class="guide tr">CREATOR</div> <div class="guide bl">SOURCE</div> <div class="guide br">EXCHANGE</div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title" id="t">SOURCE</h1>
            <p class="quote" id="q">The Origin</p>
            <div id="clock">00:00:00</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'source', particles = [], isDown = false, mx = 0, my = 0;
    let liquidity = parseInt(localStorage.getItem('sov_v112_liq')) || 0;
    let assets = parseInt(localStorage.getItem('sov_v112_assets')) || 0;
    let intent = localStorage.getItem('sov_intent') || "The Origin";
    let bigCoin = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function update() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        document.getElementById('val').innerText = liquidity.toLocaleString();
        document.getElementById('asset-count').innerText = assets;
    }
    setInterval(update, 500);

    document.getElementById('nexus-field').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') { 
            intent = e.target.value.toUpperCase();
            document.getElementById('q').innerText = intent;
            assets++; save();
            e.target.value = ''; e.target.blur();
        }
    });

    function save() {
        localStorage.setItem('sov_v112_liq', liquidity);
        localStorage.setItem('sov_v112_assets', assets);
        localStorage.setItem('sov_intent', intent);
    }

    function handle(e) {
        if(e.target.closest('#nexus-input')) return;
        isDown = true;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;

        if (y < h/2) {
            view = (x < w/2) ? 'market' : 'creator';
        } else {
            view = (x < w/2) ? 'source' : 'exchange';
        }

        document.getElementById('nexus-input').style.display = (view === 'market') ? 'block' : 'none';
        
        let color = (view === 'market') ? '#00f2ff' : (view === 'creator') ? '#2ecc71' : '#f3cf8a';
        let titleText = view.toUpperCase();
        let quoteText = (view === 'market') ? intent : (view === 'creator') ? "Living Garden" : (view === 'exchange') ? "Consolidate" : "The Origin";
        
        document.getElementById('t').innerText = titleText;
        document.getElementById('q').innerText = quoteText;
        document.getElementById('t').style.color = color;
        document.getElementById('q').style.color = color;
    }

    function track(e) { 
        mx = e.clientX || (e.touches ? e.touches[0].clientX : mx);
        my = e.clientY || (e.touches ? e.touches[0].clientY : my); 
    }
    
    function stop() { 
        if(view === 'exchange' && bigCoin > 10) {
            liquidity += (bigCoin * 1000000);
            save();
            for(let i=0; i<30; i++) {
                particles.push({x:mx, y:my, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, r:Math.random()*3, type:'gold', age:0});
            }
        }
        isDown = false; bigCoin = 0; 
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        let auraC = (view === 'market') ? '0,242,255' : (view === 'creator') ? '46,204,113' : '243,207,138';
        let pulse = 90 + Math.sin(Date.now()*0.002)*15;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse*3);
        g.addColorStop(0, 'rgba(255,255,255,0.7)'); g.addColorStop(0.2, `rgba(${auraC}, 0.3)`); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, pulse*3, 0, Math.PI*2); ctx.fill();

        if (isDown) {
            if (view === 'exchange') { bigCoin++; ctx.fillStyle='rgba(243,207,138,0.2)'; ctx.beginPath(); ctx.arc(mx, my, bigCoin, 0, Math.PI*2); ctx.fill(); }
            if (view === 'market') particles.push({x:mx, y:my, tx:cx, ty:cy, type:'data', life:1});
            if (view === 'creator') particles.push({x:mx, y:my, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, type:'vine', life:1});
        }

        particles.forEach((p, i) => {
            if(p.type === 'gold') {
                p.vy += 0.2; p.x += p.vx; p.y += p.vy;
                if(p.y > canvas.height) particles.splice(i, 1);
                ctx.fillStyle = `rgba(243,207,138, ${1-p.age/100})`;
                p.age++;
            } else if(p.type === 'data') {
                p.life -= 0.03; ctx.strokeStyle = `rgba(0,242,255,${p.life})`;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke();
                if(p.life <= 0) particles.splice(i, 1);
            } else if(p.type === 'vine') {
                p.life -= 0.01; p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = `rgba(46,204,113,${p.life})`;
                if(p.life <= 0) particles.splice(i, 1);
            }
            if(p.type !== 'data') { ctx.beginPath(); ctx.arc(p.x, p.y, p.r||2, 0, Math.PI*2); ctx.fill(); }
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
