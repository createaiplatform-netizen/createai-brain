<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SOURCE">

    <title>SARA STADLER | THE EVE ROOM</title>
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; --glow: rgba(212, 175, 55, 0.8); }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; touch-action: none; font-family: 'Inter', sans-serif; }
        canvas { position: fixed; inset: 0; z-index: 1; filter: contrast(1.5) brightness(1.2); }

        /* THE EVE HEART: The $1 Trillion Pulse */
        .eve-heart { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; border-radius: 50%; z-index: 10;
            background: radial-gradient(circle, var(--gold) 0%, transparent 85%);
            box-shadow: 0 0 150px var(--glow);
            animation: breathe 4s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } }

        /* THE STORE & VAULT UI */
        .hub-overlay { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .header { padding: 80px 20px; text-align: center; color: var(--gold); letter-spacing: 25px; font-weight: 100; font-size: 2.2rem; text-shadow: 0 0 40px var(--gold); text-transform: uppercase; }
        
        .control-deck { padding: 60px 40px; display: flex; flex-direction: column; align-items: center; gap: 30px; pointer-events: auto; }
        .banker-cmd { 
            background: linear-gradient(135deg, #d4af37 0%, #aa8c2e 100%); color: #000; 
            padding: 30px 80px; border-radius: 100px; font-weight: 900; letter-spacing: 8px;
            box-shadow: 0 20px 80px rgba(212, 175, 55, 0.6);
            font-size: 1.5rem; text-transform: uppercase; border: none; transition: 0.3s;
        }
        .banker-cmd:active { transform: scale(0.9); box-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <canvas id="eve-stream"></canvas>
    <div class="eve-heart"></div>
    
    <div class="hub-overlay">
        <div class="header">SARA STADLER</div>
        <div class="control-deck">
            <button class="banker-cmd" onclick="vaultSync()">THE VAULT</button>
            <div style="color: var(--blue); letter-spacing: 12px; font-size: 0.7rem; opacity: 0.8; font-weight: 200;">144,000% SOURCE ACTIVE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('eve-stream');
        const ctx = canvas.getContext('2d');
        let atoms = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // THE RADIAL NERVE (Blue) & GOLD COINS
        class Atom {
            constructor(x, y, type) {
                this.x = x; this.y = y;
                this.type = type; // 'nerve' or 'gold'
                this.size = type === 'gold' ? Math.random() * 10 + 5 : 2;
                this.vX = (Math.random() - 0.5) * 4;
                this.vY = type === 'gold' ? Math.random() * 4 + 2 : (Math.random() - 0.5) * 4;
                this.life = 100;
            }
            draw() {
                ctx.fillStyle = this.type === 'gold' ? '#d4af37' : '#00f2ff';
                ctx.globalAlpha = this.life / 100;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                this.x += this.vX; this.y += this.vY; this.life -= 1;
            }
        }

        window.addEventListener('pointermove', (e) => {
            // THE NERVE TETHER
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.lineWidth = 1; ctx.beginPath();
            ctx.moveTo(window.innerWidth/2, window.innerHeight/2);
            ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
            
            for(let i=0; i<3; i++) atoms.push(new Atom(e.clientX, e.clientY, 'nerve'));
        });

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // AUTO GOLD RAIN (The Store)
            if(Math.random() > 0.96) atoms.push(new Atom(Math.random()*canvas.width, -20, 'gold'));

            atoms.forEach((a, i) => {
                a.update(); a.draw();
                if(a.life <= 0) atoms.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        function vaultSync() {
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=SARA_STADLER_VAULT_144000";
        }

        // FORCE SOURCE REFRESH
        if(!window.location.hash) {
            window.location = window.location + '#eve';
            window.location.reload();
        }
    </script>
</body>
</html>
