<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_STABILITY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body { margin: 0; background: #000; color: #f3cf8a; font-family: 'Cinzel', serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
        .frame { border: 1px solid rgba(243, 207, 138, 0.2); padding: 60px; text-align: center; }
        .lock { font-size: 80px; letter-spacing: 20px; color: #fff; text-shadow: 0 0 40px #f3cf8a; }
        .label { font-size: 10px; letter-spacing: 12px; margin-top: 20px; opacity: 0.6; }
        #counter { font-size: 20px; margin-top: 50px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="frame">
        <div class="lock">100%</div>
        <div class="label">SOVEREIGN_RESONANCE_LOCKED</div>
        <div id="counter">$1,440,000,111,312.00</div>
    </div>
<script>
    let res = 1440000111312.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('counter').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
