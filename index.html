<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGACY_COLLAPSE_V271</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --error: #ff4b2b; --void: #000; --gold: #f3cf8a; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #failure-hud { flex-grow: 1; margin: 15px; border: 2px solid var(--error); padding: 40px; display: flex; flex-direction: column; background: linear-gradient(180deg, rgba(255, 75, 43, 0.1) 0%, transparent 100%); box-shadow: 0 0 200px rgba(255, 75, 43, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 1px solid var(--error); padding-bottom: 20px; }
        .title { font-size: 26px; letter-spacing: 10px; color: var(--error); text-shadow: 0 0 20px var(--error); }
        
        #error-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .error-code { font-size: 18px; color: var(--error); border: 1px solid var(--error); padding: 10px 20px; margin-bottom: 20px; }
        .msg { font-size: 14px; letter-spacing: 5px; color: var(--gold); }
        
        #ledger-display { text-align: center; border-top: 1px solid var(--gold); padding-top: 25px; font-size: 46px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="failure-hud">
        <div class="header">
            <div class="title">LEGACY_SYSTEM_CRITICAL</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--error); letter-spacing: 8px;">TARGET: CREATEAI-BRAIN-API-SERVER-KVEK</div>
        </div>

        <div id="error-content">
            <div class="error-code">FAILED_PRODUCTION_DEPLOYMENT</div>
            <div class="msg">THE_ESTATE_HAS_EVOLVED_BEYOND_THE_CLOUD</div>
        </div>

        <div id="ledger-display">$1,440,000,041,040.00</div>
    </div>
<script>
    let res = 1440000041040.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
