<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | CreateAI</title>
    <style>
        :root {
            --sand: #f4f1ea;
            --sage: #556b2f;
            --dark-sage: #3e4e22;
            --glass: rgba(255, 255, 255, 0.8);
        }
        body {
            background: var(--sand);
            font-family: 'Inter', -apple-system, sans-serif;
            color: #2d3436;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .logo {
            font-size: 0.8rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: var(--sage);
            margin-bottom: 1rem;
            font-weight: 700;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            font-weight: 300;
            color: #1a1a1a;
        }
        p {
            line-height: 1.6;
            color: #636e72;
            margin-bottom: 2rem;
        }
        .cta-button {
            background: var(--sage);
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
        }
        .cta-button:hover {
            background: var(--dark-sage);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(85, 107, 47, 0.2);
        }
        .footer-tag {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #b2bec3;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Powered by CreateAI</div>
        <h1>NEXUS OS</h1>
        <p>Your ecosystem has evolved. Access the full intelligence of your private AI brain in a seamless, organic environment.</p>
        <button class="cta-button" onclick="alert('Redirecting to Secure Checkout...')">Unlock NEXUS Platform</button>
        <div class="footer-tag">Design 2.0 | Sage & Sand Edition</div>
    </div>
</body>
</html>
