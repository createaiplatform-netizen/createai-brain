<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Interface | 144,000%</title>
    <style>
        /* This pushes the Index into the background layer */
        #lattice-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Moves it behind everything */
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 5px;
            padding: 10px;
            opacity: 0.15; /* Makes it a subtle, ambient atmosphere */
            background: #000;
            pointer-events: none; /* Allows you to click things on top of it */
        }

        .node {
            border: 1px solid #00ff99;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #00ff99;
            font-family: 'Courier New', monospace;
        }

        /* Your Foreground Content */
        .content-layer {
            position: relative;
            z-index: 10;
            color: #fff;
            padding: 50px;
            font-family: sans-serif;
            text-align: center;
        }

        h1 { font-size: 3rem; text-shadow: 0 0 20px #00ff99; }
    </style>
</head>
<body>

    <div id="lattice-background"></div>

    <div class="content-layer">
        <h1>SOVEREIGN CORE</h1>
        <p>The Lattice is now operational in the background.</p>
    </div>

    <script>
        const bg = document.getElementById('lattice-background');
        // Initializing the 2000 invention nodes into the background
        for (let i = 1; i <= 2000; i++) {
            const node = document.createElement('div');
            node.className = 'node';
            node.innerHTML = `INV-${i.toString().padStart(4, '0')}`;
            bg.appendChild(node);
        }
    </script>

</body>
</html>
