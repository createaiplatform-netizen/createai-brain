<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PENTAGON_STAR_V242</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --mena: #ff4500; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #star-hud { flex-grow: 1; margin: 25px; border: 2px solid var(--gold); padding: 45px; display: flex; flex-direction: column; background: radial-gradient(circle at center, rgba(255, 69, 0, 0.08) 0%, transparent 90%); box-shadow: 0 0 80px rgba(255, 69, 0, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 1px solid rgba(243, 207, 138, 0.3); padding-bottom: 25px; }
        .title { font-size: 18px; letter-spacing: 15px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        
        #star-sync { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .anchor { position: absolute; width: 70px; height: 70px; border: 1px solid var(--mesh); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; letter-spacing: 2px; background: rgba(0, 255, 65, 0.05); }
        .final-node { border-color: var(--mena); color: var(--mena); animation: orbit 4s linear infinite; }
        
        @keyframes orbit { 0% { box-shadow: 0 0 5px var(--mena); } 50% { box-shadow: 0 0 25px var(--mena); } 100% { box-shadow: 0 0 5px var(--mena); } }

        #ledger-total { text-align: center; border-top: 1px solid var(--gold); padding-top: 30px; font-size: 34px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>
    <div id="star-hud">
        <div class="header">
            <div class="title">PENTAGON_RESONANCE // INITIALIZING</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6; color: var(--mesh);">STABILITY: 1440% // SCOPE: TOTAL_PLANETARY</div>
        </div>

        <div id="star-sync">
            <div class="anchor" style="top: 5%; left: 50%; transform: translateX(-50%);">WIS_001</div>
            <div class="anchor" style="top: 35%; right: 5%;">SEA_003</div>
            <div class="anchor" style="top: 35%; left: 5%;">EURO_002</div>
            <div class="anchor" style="bottom: 10%; left: 20%;">SA_004</div>
            <div class="anchor final-node" style="bottom: 10%; right: 20%;">MENA_005</div>
            
            <div style="font-size: 10px; color: var(--gold); letter-spacing: 10px; text-align: center; margin-top: 150px;">SEALING_THE_STAR...</div>
        </div>

        <div id="ledger-total">$1,440,000,031,968.00</div>
    </div>
<script>
    let res = 1440000031968.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-total').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
