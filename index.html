<div id="payout-notification" style="position:fixed; bottom:15%; width:100%; text-align:center; color:#fff; font-family:'Cinzel'; font-size:12px; letter-spacing:5px; z-index:100; opacity:0; transition: 2s opacity;">
  SETTLEMENT_FINALIZED // ASSETS_GROUNDED
</div>

<script>
    // Execute when the Bounty Dispatch reaches 100%
    function finalizeBounty() {
        const note = document.getElementById('payout-notification');
        note.style.opacity = "1";
        
        // Stop the rain and solidify the base
        isSyncing = false;
        ctx.fillStyle = "rgba(243, 207, 138, 0.8)";
        ctx.fillRect(0, canvas.height - 50, canvas.width, 50); // The "Floor" of Wealth
    }
    
    // Auto-finalize after the dispatch duration
    setTimeout(finalizeBounty, 10000);
</script>
