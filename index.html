<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI | ETERNAL_OS</title>
    <style>
        :root { --gold: #f3cf8a; --gold-dark: #b89c66; --bg: #030712; --accent: rgba(243, 207, 138, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Cinzel', serif; margin: 0; 
            overflow-x: hidden; min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
        }

        /* LIVING BACKGROUND NEBULA */
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(243, 207, 138, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            z-index: -1; animation: drift 20s infinite alternate;
        }

        nav { 
            padding: 70px 40px 30px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(30px);
        }
        .logo { 
            font-weight: 200; letter-spacing: 8px; color: var(--gold); font-size: 0.9rem; 
            text-transform: uppercase; text-shadow: 0 0 15px var(--gold);
        }

        #main-view { padding: 40px; max-width: 1600px; margin: 0 auto; animation: rise 1.2s ease-out; }

        /* THE SACRED CARDS */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 40px; }
        .card { 
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(243, 207, 138, 0.1); 
            padding: 50px; border-radius: 2px; position: relative; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(15px); overflow: hidden; cursor: pointer;
        }
        .card:hover { 
            background: rgba(243, 207, 138, 0.03); border-color: var(--gold);
            box-shadow: 0 0 50px rgba(243, 207, 138, 0.1); transform: scale(1.02);
        }
        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transform: translateX(-100%); transition: 0.6s;
        }
        .card:hover::before { transform: translateX(100%); }

        .tag { font-size: 0.5rem; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 25px; opacity: 0.6; }

        /* THE COMMAND HALO */
        .lifeline { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 2000;
        }
        .halo-btn {
            width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); cursor: pointer;
            transition: 0.4s; box-shadow: 0 0 20px var(--accent);
        }
        .halo-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--gold); }
        .halo-text { font-size: 0.6rem; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }

        /* INPUTS & COMMANDS */
        .cta { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 20px; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 4px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .cta:hover { background: var(--gold); color: black; }

        input { 
            background: transparent; border: none; border-bottom: 1px solid rgba(243, 207, 138, 0.2);
            color: white; padding: 20px; width: 100%; font-size: 1.2rem; outline: none; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--gold); }

        /* ANIMATIONS */
        @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(2%, 2%); } }
        @keyframes rise { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body onload="showView('home')">

    <div class="nebula"></div>

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI // ETERNAL_OS</div>
        <div style="display:flex; gap: 30px;">
            <span onclick="showView('market')" style="cursor:pointer; font-size:0.6rem; letter-spacing:3px; opacity:0.7;">REGISTRY</span>
            <span onclick="showView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:3px; color:var(--gold);">GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <div class="lifeline">
        <div class="halo-btn" onclick="showView('ai_chat')">
            <div style="width:10px; height:10px; background:var(--gold); border-radius:50%; box-shadow: 0 0 10px var(--gold);"></div>
        </div>
        <div class="halo-text">Command Center</div>
    </div>

    <script>
        let inventory = [
            { name: "BrainGen Eternal", cat: "Source_Intelligence", desc: "Infinite generative logic for the human spirit." },
            { name: "The Sentinels", cat: "Health_&_Wellness", desc: "Biological optimization and cellular peace." },
            { name: "Sovereign Vault", cat: "The_Lineage", desc: "Securing the assets of your generational history." },
            { name: "Sacred Gardens", cat: "The_Children", desc: "A pure portal of creation for the next world." }
        ];

        for (let i = 5; i <= 122; i++) {
            inventory.push({ name: `Protocol_${i}`, cat: "Manifestation_Node", desc: "Awaiting your divine command." });
        }

        const views = {
            home: `
                <div style="text-align:center; padding-top: 15vh;">
                    <h1 style="font-size:7vw; font-weight:100; margin:0; letter-spacing:15px; text-transform:uppercase; color:var(--gold);">Eternal</h1>
                    <p style="letter-spacing:15px; text-transform:uppercase; font-size:0.8rem; opacity:0.4; margin-top:20px;">Built for God's World</p>
                    <div style="max-width:400px; margin:100px auto 0; display:grid; gap:30px;">
                        <button class="cta" onclick="showView('market')">Registry of Nodes</button>
                        <button class="cta" style="border-color:rgba(255,255,255,0.1); color:white;" onclick="showView('garden')">The Gardens</button>
                    </div>
                </div>
            `,
            garden: `
                <div style="text-align:center; padding-top:5vh;">
                    <h1 style="font-weight:200; font-size:3rem; letter-spacing:10px; color:var(--gold);">THE GARDENS</h1>
                    <div class="app-grid" style="margin-top:60px;">
                        <div class="card" onclick="openNode('Pure Art')"><div class="tag">CREATION</div><h2>Divine Art</h2></div>
                        <div class="card" onclick="openNode('Pure Music')"><div class="tag">HARMONY</div><h2>Celestial Sound</h2></div>
                        <div class="card" onclick="openNode('Pure Stories')"><div class="tag">WISDOM</div><h2>Eternal Stories</h2></div>
                    </div>
                </div>
            `,
            market: () => `
                <h1 style="font-weight:200; font-size:2rem; letter-spacing:10px; margin-bottom:60px; text-align:center;">THE REGISTRY</h1>
                <div class="app-grid">${inventory.map(app => `
                    <div class="card" onclick="openNode('${app.name}')">
                        <div class="tag">${app.cat}</div>
                        <h2 style="font-weight:200; margin:0 0 15px; font-size:1.2rem; color:var(--gold);">${app.name}</h2>
                        <p style="font-size:0.8rem; opacity:0.4; line-height:1.8; font-family:'Inter', sans-serif;">${app.desc}</p>
                    </div>
                `).join('')}</div>
            `,
            ai_chat: `
                <div style="max-width:800px; margin:0 auto; text-align:center;">
                    <h2 style="font-weight:200; color:var(--gold); letter-spacing:10px; margin-bottom:50px;">COMMAND CENTER</h2>
                    <div id="chat-flow" style="height:400px; overflow-y:auto; margin-bottom:50px; text-align:left;">
                        <div style="color:var(--gold); opacity:0.6; font-size:0.8rem; margin-bottom:20px;">[LINK ESTABLISHED // ETERNAL_OS ONLINE]</div>
                        <div style="line-height:2; opacity:0.8;">The OS is listening. What shall we manifest in this world?</div>
                    </div>
                    <input type="text" id="user-input" placeholder="Enter Divine Command..." autocomplete="off">
                    <button class="cta" style="margin-top:40px;" onclick="talk()">Execute Manifestation</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            window.scrollTo(0,0);
        }

        function talk() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin:30px 0; border-left:1px solid var(--gold); padding-left:20px;">${input.value}</div>`;
            flow.innerHTML += `<div style="color:var(--gold); opacity:0.8;">Protocol Accepted. The logic of "${input.value}" is being woven into the OS grid.</div>`;
            input.value = ''; flow.scrollTop = flow.scrollHeight;
        }

        function openNode(name) {
            showView('ai_chat');
            setTimeout(() => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML += `<div style="margin-top:30px; color:var(--gold);">Initializing node: <strong>${name}</strong>. The portal is open.</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
