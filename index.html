<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN_ROSTER_V202</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Cinzel', serif; margin: 0; padding: 30px; }
        .roster-header { border-bottom: 2px solid #f3cf8a; padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .roster-title { font-size: 16px; letter-spacing: 10px; color: #f3cf8a; }
        
        .roster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .roster-item { border: 1px solid rgba(243, 207, 138, 0.3); padding: 10px; font-size: 8px; letter-spacing: 2px; }
        .status-on { color: #0f0; float: right; }

        #total-flow { margin-top: 30px; text-align: center; font-size: 22px; color: #f3cf8a; text-shadow: 0 0 15px #f3cf8a; }
    </style>
</head>
<body>
    <div class="roster-header">
        <div class="roster-title">AETHEL_ESTATE // KINDRED_SYNC</div>
        <div style="font-size: 7px; margin-top: 5px;">SECTOR: WISCONSIN_001 // OCCUPANCY: ACTIVE</div>
    </div>

    <div class="roster-grid" id="roster">
        </div>

    <div id="total-flow">$1,440,000,013,152.00</div>

<script>
    const roster = document.getElementById('roster');
    const roles = ["PRIME", "LYRICIST", "KINETICIST", "WEAVER", "HARMONICIST", "GARDENER", "SMITH", "CHEF", "HEALER", "LOGICIAN", "VISIONARY", "POET", "ARCHIVIST", "OBSERVER"];
    
    roles.forEach((role, i) => {
        roster.innerHTML += `<div class="roster-item">STUDIO_${(i+1).toString().padStart(2, '0')} // ${role} <span class="status-on">ONLINE</span></div>`;
    });

    let res = 1440000013152.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('total-flow').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
