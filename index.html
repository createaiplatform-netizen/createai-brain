<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | OPEN</title>
    <style>
        /* TOTAL VISUAL RESET */
        body, html { margin: 0; padding: 0; background: #000; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* PULSING BACKGROUND (Forces the screen to update) */
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #222 0%, #000 70%); animation: pulse 4s infinite; z-index: 1; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; }
        
        .header { color: #d4af37; border-bottom: 1px solid #d4af37; padding-bottom: 10px; text-align: center; letter-spacing: 5px; font-size: 12px; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 400px; margin: auto; }
        
        /* THE "HARD-LINK" BUTTONS */
        .btn { 
            background: #d4af37; color: #000; padding: 25px; border-radius: 10px; 
            text-align: center; font-weight: bold; font-size: 20px; letter-spacing: 5px;
            box-shadow: 0 0 20px rgba(212,175,55,0.5); border: none; cursor: pointer;
        }

        #portal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 100; text-align: center; padding-top: 200px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div id="ui">
        <div class="header">SYSTEM STATUS: 144,000%</div>
        
        <div class="grid">
            <button class="btn" onclick="openPortal('MARKET')">MARKET</button>
            <button class="btn" onclick="openPortal('HUB')">HUB</button>
            <button class="btn" onclick="openPortal('GARDE')">GARDE</button>
        </div>

        <div style="color: #fff; text-align: center; font-size: 30px; font-weight: bold;">$1.44T</div>
    </div>

    <div id="portal" onclick="this.style.display='none'">
        <h1 id="portal-name" style="font-size: 60px;">ROOM</h1>
        <p>TAP TO RETURN</p>
    </div>

    <script>
        function openPortal(name) {
            document.getElementById('portal').style.display = 'block';
            document.getElementById('portal-name').innerText = name;
        }
    </script>
</body>
</html>
