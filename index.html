<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding:40px; border:3px solid #0f0;">
    <h2 style="color:#0f0;">ESTATE TERMINAL: PHASE 5</h2>
    <div id="status" style="color:#fff; margin-bottom:20px; padding:15px; background:#111;">
        BLOCKCHAIN: BASE MAINNET<br>
        HASH: 0x4351... [VERIFIED]<br>
        SYSTEM: READY FOR RE-INDEX
    </div>
    
    <button id="reindexBtn" style="padding:25px 50px; background:#0f0; color:#000; font-weight:bold; font-size:18px; cursor:pointer; border:none; border-radius:10px; width:100%;">
        RE-INDEX & SYNC ($5,000)
    </button>

    <script>
        document.getElementById('reindexBtn').onclick = async () => {
            const status = document.getElementById('status');
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum, "any");
                await provider.send("eth_requestAccounts", []);
                status.innerText = "PURGING BALANCE CACHE...";

                // This command forces the wallet to re-verify the network and balance
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: '0x2105',
                        chainName: 'Base Mainnet',
                        rpcUrls: ['https://mainnet.base.org'],
                        nativeCurrency: { name: 'Ether', symbol: 'ETH', decimals: 18 },
                        blockExplorerUrls: ['https://basescan.org']
                    }]
                });

                status.innerHTML = "<b style='color:#0f0;'>RE-INDEX COMPLETE.</b><br>Restart your app now to see $5,021.54.";
                alert("Account indexed. Please close the app and reopen the Home screen.");
            } catch (e) {
                status.innerText = "SYNC ERROR: " + e.message;
            }
        };
    </script>
</body>
</html>
