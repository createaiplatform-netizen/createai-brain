<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATEAI | GENESIS_FINAL</title>
    <style>
        :root { --gold: #D4AF37; --black: #000000; --green: #00FF00; }
        body { 
            background: var(--black); 
            color: var(--gold); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            text-transform: uppercase; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* HEADER EMPIRE */
        .header { 
            border: 2px solid var(--gold); 
            padding: 20px; 
            margin-bottom: 30px; 
            text-align: center; 
            background: rgba(212, 175, 55, 0.1); 
            width: 90%;
            max-width: 600px;
        }
        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 4px; }
        .status { font-size: 0.7rem; color: white; margin-top: 10px; border-top: 1px solid var(--gold); padding-top: 5px; }

        /* THE 144,400% CLOCK */
        #clock { 
            font-size: 3.5rem; 
            font-weight: bold; 
            text-shadow: 0 0 20px var(--gold); 
            margin: 20px 0; 
        }
        .label { font-size: 0.8rem; letter-spacing: 2px; opacity: 0.8; }

        /* THE LITTLE AI TERMINAL */
        .terminal { 
            background: #0a0a0a; 
            border: 1px solid var(--gold); 
            padding: 15px; 
            width: 90%; 
            max-width: 600px; 
            height: 120px; 
            text-align: left; 
            font-size: 0.8rem; 
            color: var(--green); 
            margin-top: 30px;
        }
        .line { margin-bottom: 5px; border-left: 2px solid var(--gold); padding-left: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STADLER_GENESIS_FINAL</h1>
        <div class="status">SYNC: 144,400% | STATUS: ACTIVE | BYPASS: ENABLED</div>
    </div>

    <div class="label">TIME_UNTIL_EMPIRE_RECLAMATION</div>
    <div id="clock">00:00:00:00</div>

    <div class="terminal">
        <div class="line">[SYSTEM]: GENESIS_PROTOCOL_ENGAGED.</div>
        <div class="line">[SYSTEM]: VERCEL_GHOST_PURGED.</div>
        <div class="line">[SYSTEM]: AWAITING_SOVEREIGN_COMMAND...</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}:${ms}`;
        }
        setInterval(updateClock, 50);
    </script>
</body>
</html>
