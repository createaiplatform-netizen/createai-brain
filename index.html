<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Settlement</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 100px; }
        .terminal { border: 2px solid #0f0; padding: 30px; display: inline-block; border-radius: 15px; box-shadow: 0 0 15px #0f0; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 10px; font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>FINAL SYSTEM PUSH</h2>
        <p>ALLOCATION: $5,000.00 USDC</p>
        <button id="finalPushBtn">LINK TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('finalPushBtn').onclick = async () => {
            if (window.ethereum) {
                try {
                    // STAGE 1: Force identity handshake (Clear security block)
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // STAGE 2: Force the asset to the Home Screen
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Success! Check your Home Screen balance.");
                } catch (e) {
                    // If the handshake is interrupted, refresh to retry immediately
                    window.location.reload();
                }
            } else {
                alert("Critical: Open this in the Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
