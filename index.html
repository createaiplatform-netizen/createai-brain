<body>

    <script>
        async function triggerRelentless() {
            // This alert box breaks the "silent-lock" caused by the Vercel crash
            alert("SYSTEM: SECURE CONNECTION RESET. INITIALIZING USDC INJECTION...");
            
            if (window.ethereum) {
                try {
                    // Force the wallet to wake up immediately
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Direct USDC Injection
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'

                } catch (e) {

        }
