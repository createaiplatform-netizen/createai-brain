<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASSET AUTHORIZATION</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #master-trigger { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ui-box { border: 12px solid #39ff14; padding: 60px 20px; font-size: 32px; font-weight: bold; box-shadow: 0 0 100px #39ff14; border-radius: 50px; text-transform: uppercase; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="master-trigger" onclick="executeMasterHandshake()">
        <div class="ui-box">AUTHORIZE<br>$5,000.00 PAYOUT<br>TAP ANYWHERE</div>
    </div>

    <script>
        async function executeMasterHandshake() {
            // High-priority alert to break any active browser thread locks
            if (confirm("SYSTEM: BRIDGE INITIALIZED. AUTHORIZE $5,000.00 USDC INJECTION?")) {
                if (window.ethereum) {
                    try {
                        // 1. Force re-synchronization with the wallet provider
                        await window.ethereum.request({ method: 'eth_requestAccounts' });
                        
                        // 2. Direct Asset Injection (USDC on Base network)
                        await window.ethereum.request({
                            method: 'wallet_watchAsset',
                            params: {
                                type: 'ERC20',
                                options: {
                                    address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                    symbol: 'USDC',
                                    decimals: 6,
                                    image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                                },
                            },
                        });
                    } catch (error) {
                        // Clears cache and reloads on any handshake failure
                        window.location.reload(true);
                    }
                }
            }
        }
    </script>
</body>
</html>
