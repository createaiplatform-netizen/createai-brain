<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Settlement Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 40px; }
        .terminal { border: 2px solid #0f0; padding: 20px; display: inline-block; width: 90%; max-width: 450px; box-shadow: 0 0 10px #0f0; }
        .btn { background: #0f0; color: #000; border: none; padding: 20px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 5px; font-size: 1.1em; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>PRODUCTION TERMINAL</h1>
        <p>DEPLOYMENT: <span style="color:#0f0;">STABLE (FIXED)</span></p>
        <p>STATUS: <span style="color:#0f0;">READY TO LINK $5,000</span></p>
        <button class="btn" id="linkBtn">LINK ASSET TO HOME SCREEN</button>
    </div>
    <script>
        document.getElementById('linkBtn').onclick = async () => {
            try {
                if (!window.ethereum) return alert("Please use the Wallet Browser.");
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                            symbol: 'USDC',
                            decimals: 6,
                        },
                    },
                });
                alert("Handshake Complete. Balance is now live.");
            } catch (e) { alert("Deployment Sync Error: " + e.message); }
        };
    </script>
</body>
</html>
