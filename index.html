<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN GRID</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .header { color: #d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }

        /* THE BUILDING DOME GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; height: 60vh; pointer-events: auto; }
        .sector { 
            border: 1px solid rgba(212,175,55,0.5); background: rgba(0,0,0,0.9); 
            display: flex; justify-content: center; align-items: center; 
            color: #fff; font-size: 20px; font-weight: 900; letter-spacing: 5px;
            transition: 0.1s; border-radius: 5px;
        }
        .sector:active { background: #fff; color: #000; transform: scale(1.05); }

        #room { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #000; text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        .footer { text-align: center; color: #fff; font-size: 32px; font-weight: bold; }
    </style>
</head>
<body onload="init()">
    <canvas id="c"></canvas>
    <div id="ui">
        <div class="header"><div>SYSTEM: DOME GRID</div><div>144,000%</div></div>
        <div style="text-align:center; color:#d4af37; font-size:35px; letter-spacing:10px; font-weight:bold;">SOVEREIGN</div>
        
        <div class="grid">
            <div class="sector" onclick="op('MARKET', '#00f2ff')">MKT</div>
            <div class="sector" onclick="op('HUB', '#d4af37')">HUB</div>
            <div class="sector" onclick="op('GARDE', '#fff')">GRD</div>
            <div class="sector" onclick="op('NET', '#39ff14')">NET</div>
        </div>
        <div class="footer">$1.44T</div>
    </div>

    <div id="room" onclick="this.style.display='none'">
        <h1 id="rn" style="font-size: 60px; letter-spacing: 15px; margin: 0;"></h1>
        <p style="color: #d4af37; letter-spacing: 5px;">SECTOR ACTIVE | TAP TO EXIT</p>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let parts = []; let tint = '#d4af37';

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<60; i++) parts.push({x: Math.random()*canvas.width, y: canvas.height, v: Math.random()*15+10, r: 2});
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = tint;
            parts.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.v; if(p.y < -10) p.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }

        function op(name, color) {
            tint = color;
            document.getElementById('room').style.display = 'flex';
            document.getElementById('rn').innerText = name;
            document.getElementById('rn').style.color = color;
        }
    </script>
</body>
</html>
