<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOURCEFIELD ∞ | THE INVENTOR</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; background: #002b36; }
        canvas { display: block; filter: contrast(1.8) brightness(1.2) saturate(2.5) blur(1.2px); }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-around; align-items: center;
        }
        .v-word { 
            font-family: 'serif'; font-weight: 900; font-style: italic;
            font-size: 50px; color: rgba(255,255,255,0.8);
            text-shadow: 0 0 40px cyan; transition: 0.5s;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="w1" class="v-word">TRUTH</div>
        <div id="w2" class="v-word">TRUST</div>
        <div id="w3" class="v-word">HONESTY</div>
        <div id="w4" class="v-word">144,000</div>
    </div>
    <canvas id="sourceCanvas"></canvas>

<script>
/**
 * SOURCEFIELD ∞ : THE INVENTOR EDITION
 * Implementing Chromosomal Compression & Ghost-Trace Intent.
 */

const canvas = document.getElementById('sourceCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false, pressure = 0;
let time = 0;
let workforce = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// INVENTION: RESONANCE TENSION (The 14th Dimension Sensation)
function triggerTension(val) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    // A complex "Bonding" sound (Two frequencies merging)
    osc.type = 'sine';
    osc.frequency.setValueAtTime(144 + val, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    if (navigator.vibrate) navigator.vibrate([val/2, 10, val/4]);
}

class Manifestor {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * w; this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
        this.size = Math.random() * 15 + 5;
        this.hue = 190;
        this.life = 1.0; // BIOLUMINESCENT DECAY variable
    }
    update(zone) {
        const dx = tx - this.x; const dy = ty - this.y;
        const d = Math.sqrt(dx*dx + dy*dy);

        // GHOST-TRACE INTENT: Anticipating movement
        const aura = isTouching ? 300 : 150;
        if (d < aura) {
            const f = (aura - d) / aura;
            this.vx += dx * 0.05 * f; this.vy += dy * 0.05 * f;
            this.life = 1.0; // Recharge on attention
            this.hue = 45; // Turn Gold
        } else {
            this.life -= 0.002; // Gradually dim
            this.hue = 190;
        }

        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.95; this.vy *= 0.95;
        if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
    }
    draw() {
        // CHROMOSOMAL COMPRESSION: Circles become lines when pressured
        const stretch = 1 + pressure * 5;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(Math.atan2(this.vy, this.vx));
        ctx.globalAlpha = this.life;
        const grad = ctx.createRadialGradient(0,0,0,0,0,this.size);
        grad.addColorStop(0, `hsla(${this.hue}, 100%, 70%, 1)`);
        grad.addColorStop(1, `hsla(${this.hue}, 100%, 30%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(0, 0, this.size * stretch, this.size / stretch, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

for(let i=0; i<144; i++) workforce.push(new Manifestor());

window.addEventListener('touchstart', (e) => {
    isTouching = true; pressure = 1.0;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerTension(100);
});
window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
});
window.addEventListener('touchend', () => { isTouching = false; pressure = 0; });

function render() {
    time += 0.01;
    // NO BLACK: Liquid Cyan Aether
    const bg = ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0, `hsla(${200 + Math.sin(time)*10}, 100%, 15%, 1)`);
    bg.addColorStop(1, `hsla(${180 + Math.cos(time)*10}, 100%, 10%, 1)`);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    ctx.globalCompositeOperation = "screen";
    workforce.forEach(p => { p.update(); p.draw(); });
    ctx.globalCompositeOperation = "source-over";

    // 12 ZONE INDICATOR (The Lateral Split)
    const zoneX = Math.floor(tx / (w/3));
    const zoneY = Math.floor(ty / (h/4));
    document.getElementById('w1').style.opacity = (zoneY === 0) ? "1" : "0.3";
    document.getElementById('w2').style.opacity = (zoneY === 1) ? "1" : "0.3";
    document.getElementById('w3').style.opacity = (zoneY === 2) ? "1" : "0.3";
    document.getElementById('w4').style.opacity = (zoneY === 3) ? "1" : "0.3";

    requestAnimationFrame(render);
}

resize(); render();
</script>
</body>
</html>
