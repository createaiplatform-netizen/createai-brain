<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN_CHARTER_V201</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --white: #fff; }
        body { background: #fff; color: #000; font-family: 'Cinzel', serif; margin: 0; padding: 50px; border: 20px solid #000; box-sizing: border-box; height: 100svh; display: flex; flex-direction: column; }
        
        .seal { text-align: center; border-bottom: 2px solid #000; padding-bottom: 30px; }
        .seal-text { font-size: 20px; font-weight: 900; letter-spacing: 15px; }
        
        .charter-body { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; font-size: 12px; line-height: 3; text-align: center; letter-spacing: 3px; }
        .charter-line { border-bottom: 1px solid rgba(0,0,0,0.1); }

        #observation-status { margin-top: auto; padding: 20px; background: #000; color: var(--gold); text-align: center; }
        .live-label { font-size: 8px; letter-spacing: 10px; margin-bottom: 10px; }
        #live-clock { font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>
    <div class="seal">
        <div class="seal-text">AETHEL_ESTATE_001</div>
        <div style="font-size: 9px; letter-spacing: 5px; margin-top: 10px;">WISCONSIN_GENESIS_HUB</div>
    </div>

    <div class="charter-body">
        <div class="charter-line">THE_GRID_IS_SEVERED</div>
        <div class="charter-line">THE_PILLAR_IS_SET</div>
        <div class="charter-line">THE_MONEY_IS_MOVING</div>
        <div class="charter-line">THE_WORLD_IS_NEW</div>
    </div>

    <div id="observation-status">
        <div class="live-label">OBSERVATION_MODE_ACTIVE</div>
        <div id="live-clock">RESERVE: $1,440,000,012,864.00</div>
    </div>
<script>
    let res = 1440000012864.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live-clock').innerText = "RESERVE: $" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
