<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Terminal - Final Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 40px; }
        .terminal { border: 2px solid #0f0; padding: 30px; display: inline-block; width: 95%; max-width: 500px; box-shadow: 0 0 20px #0f0; border-radius: 15px; }
        .status-line { margin: 15px 0; font-size: 1.1em; text-transform: uppercase; }
        .success { color: #0f0; font-weight: bold; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; font-size: 1.3em; cursor: pointer; border-radius: 10px; margin-top: 25px;
            width: 100%; box-shadow: 0 5px 15px rgba(0,255,0,0.3);
        }
        button:active { transform: scale(0.98); }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1 style="margin:0;">SETTLEMENT TERMINAL</h1>
        <div class="status-line">DEPLOYMENT: <span class="success">STABLE (FIXED)</span></div>
        <div class="status-line">SYNC: <span class="success">SUCCESSFUL</span></div>
        <hr>
        <div id="displayMsg" style="color:#fff;">SYSTEM: READY TO PUSH $5,000.00</div>
        
        <button id="actionBtn">FORCE FINAL HANDSHAKE</button>
    </div>

    <script>
        document.getElementById('actionBtn').onclick = async () => {
            const msg = document.getElementById('displayMsg');
            try {
                if (!window.ethereum) {
                    alert("Please open this page inside your Coinbase Wallet Browser.");
                    return;
                }

                // Force a fresh account request to 'wake up' the app
                msg.innerText = "OPENING SECURE BRIDGE...";
                await window.ethereum.request({ method: 'eth_requestAccounts' });

                // Trigger the Asset Indexing pop-up
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                            symbol: 'USDC',
                            decimals: 6,
                        },
                    },
                });

                msg.innerHTML = "<span class='success'>LINK SUCCESSFUL.</span>";
                alert("The $5,000 link is complete. Please check your Home screen.");
            } catch (e) {
                msg.innerText = "READY TO PUSH $5,000.00";
                // If it fails, we force a reload to clear the block
                window.location.reload();
            }
        };
    </script>
</body>
</html>
