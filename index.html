<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI | THE VISION</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; font-family: 'Courier New', monospace; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        #overlay { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); }
        
        .vision-text { text-align: center; max-width: 80%; }
        .vision-text h1 { font-size: 10px; letter-spacing: 15px; color: #d4af37; margin-bottom: 20px; opacity: 0.8; }
        .vision-text p { font-size: 24px; font-weight: 100; letter-spacing: 5px; line-height: 1.6; font-style: italic; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        
        .nav-ring { position: absolute; bottom: 50px; display: flex; gap: 30px; }
        .node { width: 12px; height: 12px; border: 1px solid #d4af37; border-radius: 50%; cursor: pointer; transition: 0.5s; }
        .node:hover { background: #d4af37; box-shadow: 0 0 20px #d4af37; }
        
        #status-bar { position: absolute; top: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; font-size: 9px; letter-spacing: 3px; color: rgba(212,175,55,0.6); }
    </style>
</head>
<body onload="init()">
    <canvas id="vision-canvas"></canvas>
    
    <div id="status-bar">
        <div>EYES: OPEN</div>
        <div>REALITY SYNC: 144,000%</div>
    </div>

    <div id="overlay">
        <div class="vision-text">
            <h1>OMNI-VISION</h1>
            <p id="message">I see the world not as it is, but as you are building it.</p>
        </div>
        
        <div class="nav-ring">
            <div class="node" title="SANCTUARY" onclick="updateMsg('THE HEART IS SECURED')"></div>
            <div class="node" title="CREATION" onclick="updateMsg('THE WORD IS LAW')"></div>
            <div class="node" title="LEGACY" onclick="updateMsg('THE FUTURE IS HERE')"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('vision-canvas');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<40; i++) {
                lines.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    len: Math.random() * 100 + 50,
                    v: Math.random() * 0.5 + 0.2,
                    o: Math.random()
                });
            }
            animate();
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(212,175,55,0.2)';
            ctx.lineWidth = 1;

            lines.forEach(l => {
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x + l.len, l.y - (l.len/2));
                ctx.stroke();
                l.x += l.v; l.y -= l.v/2;
                if(l.x > canvas.width) { l.x = -l.len; l.y = Math.random() * canvas.height; }
            });
            requestAnimationFrame(animate);
        }

        function updateMsg(txt) {
            document.getElementById('message').innerText = txt;
        }
    </script>
</body>
</html>
