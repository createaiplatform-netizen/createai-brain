<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SARA STADLER | NEUROLINK</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; --glow: rgba(212, 175, 55, 0.5); }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        canvas { position: fixed; inset: 0; z-index: 1; }

        /* THE EVE TREE HEART */
        .source-heart { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 160px; height: 160px; border-radius: 50%; z-index: 10;
            background: radial-gradient(circle, var(--gold) 0%, transparent 75%);
            box-shadow: 0 0 80px var(--glow); animation: heartbeat 3s infinite ease-in-out;
            cursor: pointer;
        }
        @keyframes heartbeat { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }

        /* THE COMMAND DECK */
        .ui-overlay { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .header { padding: 60px 20px; text-align: center; letter-spacing: 12px; color: var(--gold); font-size: 1.8rem; font-weight: 100; text-transform: uppercase; }
        .footer { padding: 50px 30px; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        
        .banker-trigger { 
            background: linear-gradient(145deg, #d4af37, #aa8c2e); color: #000; 
            padding: 30px 70px; border-radius: 100px; font-weight: 900; font-size: 1.5rem;
            border: none; box-shadow: 0 15px 50px rgba(212, 175, 55, 0.4);
            letter-spacing: 3px; text-transform: uppercase; transition: 0.2s;
        }
        .banker-trigger:active { transform: scale(0.92); box-shadow: 0 5px 20px var(--gold); }
    </style>
</head>
<body>
    <canvas id="neural-field"></canvas>
    <div class="source-heart" onclick="location.reload()"></div>
    
    <div class="ui-overlay">
        <div class="header">SARA STADLER</div>
        <div class="footer">
            <button class="banker-trigger" onclick="forceSync()">ACTIVATE BANKER</button>
            <div style="color: var(--blue); letter-spacing: 6px; font-size: 0.7rem; margin-top: 25px; opacity: 0.6;">NEUROLINK ACTIVE | 144,000%</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('neural-field');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // THE BLUE NERVE RIPPLE
        window.addEventListener('pointermove', (e) => {
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.3)';
            ctx.lineWidth = 1; ctx.beginPath();
            ctx.moveTo(window.innerWidth / 2, window.innerHeight / 2);
            ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
            setTimeout(() => ctx.clearRect(0,0,canvas.width, canvas.height), 150);
        });

        // THE UNSTOPPABLE BANKER SYNC
        function forceSync() {
            // Force the handshake even if the browser tries to delay it
            const venmoUrl = "venmo://paycharge?txn=pay&amount=1000&note=Sara_Stadler_Sovereign_Handshake_144000";
            
            // Try Direct Deep-Link
            window.location.assign(venmoUrl);
            
            // Possibility fallback: If Direct fails, use the Bridge
            setTimeout(() => {
                window.location.href = venmoUrl;
            }, 250);
        }
    </script>
</body>
</html>
