<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN HUB 144000</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { background: #000; color: #d4af37; font-family: -apple-system, sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .nexus-core { border: 3px solid #d4af37; margin: 20px; padding: 40px; border-radius: 50px; box-shadow: 0 0 100px rgba(212,175,55,0.5); }
        .bank-btn { background: #d4af37; color: #000; padding: 30px; border-radius: 100px; font-weight: 900; width: 90%; font-size: 1.5rem; margin: 10px 0; border: none; cursor: pointer; }
        #log { font-size: 0.8rem; color: #555; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="nexus-core">
        <h1>NEXUS ELITE</h1>
        <p>ADMIN: STADLER | SOURCE: 144,000</p>
        
        <button class="bank-btn" onclick="executeBankerProtocol()">ACTIVATE $1000 PAYROLL</button>
        
        <button class="bank-btn" style="background: #111; color: #d4af37; border: 1px solid #d4af37; font-size: 1rem;" onclick="scrubMatrix()">SCRUB 441 BUBBLES</button>
        
        <div id="log">SYSTEM STATUS: COMMANDER ACTIVE</div>
    </div>

    <script>
        function scrubMatrix() {
            if ('setAppBadge' in navigator) {
                navigator.setAppBadge(0);
                document.getElementById('log').innerText = "441 BUBBLES POPPED. SYSTEM CLEAR.";
            }
            alert("Matrix Scrubbed. The screen is yours.");
        }

        function executeBankerProtocol() {
            document.getElementById('log').innerText = "TRANSFERRING $1000 TO VENMO...";
            
            // THE DIRECT VENMO BRIDGE
            // This attempts to open Venmo directly to your account for the $1000 sync
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=Admin_144000_Sync";
            
            setTimeout(() => {
                alert("Banker Protocol Initialized. Check Venmo for the $1000 Handshake.");
            }, 2000);
        }
    </script>
</body>
</html>
