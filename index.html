<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS | SOVEREIGN MARKETPLACE</title>
    <style>
        :root { --gold: #c4a97a; --ink: #0a0a0a; --bg: #f2f2f0; --white: #ffffff; --junior: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--ink); line-height: 1.4; }

        /* HEADER & SEARCH */
        header { background: #131921; color: white; padding: 12px 18px; position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 900; letter-spacing: 4px; font-size: 0.9rem; margin-bottom: 8px; display: block; }
        .search-container { background: var(--white); border-radius: 4px; display: flex; align-items: center; padding: 8px; }
        .search-container input { border: none; width: 100%; outline: none; padding-left: 10px; font-size: 0.9rem; }

        /* CATEGORY SCROLL */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 12px 18px; background: #232f3e; scrollbar-width: none; }
        .cat-bar span { color: white; font-size: 0.7rem; font-weight: 600; white-space: nowrap; opacity: 0.8; }

        /* THE AMAZON GRID */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
        .product-card { background: var(--white); padding: 12px; border-radius: 4px; display: flex; flex-direction: column; border: 1px solid #ddd; }
        .img-placeholder { aspect-ratio: 1/1; background: #f9f9f9; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .product-card h3 { font-size: 0.8rem; font-weight: 500; margin: 8px 0; min-height: 2.4em; }
        .price { font-size: 1.1rem; font-weight: 700; color: #b12704; }
        .prime-text { font-size: 0.6rem; color: var(--gold); font-weight: 900; margin-top: 4px; }
        .btn-buy { background: #ffd814; border: 1px solid #fcd200; border-radius: 20px; padding: 8px; font-size: 0.7rem; font-weight: 600; margin-top: 10px; cursor: pointer; }

        /* FOOTER PORTALS */
        footer { position: fixed; bottom: 0; width: 100%; background: var(--white); border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 12px; }
        .nav-item { text-align: center; color: #555; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--ink); border-bottom: 2px solid var(--gold); }
        .nav-item.junior { color: var(--junior); }
    </style>
</head>
<body>

<header>
    <span class="brand">AXIS ®</span>
    <div class="search-container">
        <span>🔍</span>
        <input type="text" placeholder="Search 158 Sovereign Engines...">
    </div>
</header>

<div class="cat-bar">
    <span>Healthcare</span><span>Law</span><span>Utilities</span><span>Wealth</span><span>Security</span><span>Food</span>
</div>

<div class="market-grid" id="mainGrid">
    </div>

<div style="height: 80px;"></div>

<footer>
    <div class="nav-item active">Market</div>
    <div class="nav-item">Business</div>
    <div class="nav-item junior">Junior</div>
    <div class="nav-item">Creator</div>
    <div class="nav-item">Portal</div>
</footer>

<script>
    const engines = [
        { id: "001", name: "Sovereign Law Engine", price: "497.00", icon: "⚖️" },
        { id: "002", name: "Nurse-Flow Protocol", price: "197.00", icon: "🏥" },
        { id: "003", name: "Universal Utilities", price: "89.00", icon: "🔌" },
        { id: "004", name: "Wealth Intelligence", price: "299.00", icon: "📈" },
        { id: "005", name: "Hospitality Mesh", price: "149.00", icon: "🍱" },
        { id: "006", name: "Security Neural Link", price: "599.00", icon: "🛡️" },
        { id: "007", name: "Off-Grid Mesh Node", price: "899.00", icon: "📡" },
        { id: "008", name: "Legacy Trust Vault", price: "1,200.00", icon: "🔐" }
    ];

    const grid = document.getElementById('mainGrid');
    engines.forEach(e => {
        grid.innerHTML += `
            <div class="product-card">
                <div class="img-placeholder">${e.icon}</div>
                <p class="prime-text">NEURAL-LINK READY</p>
                <h3>${e.name}</h3>
                <div class="price">$${e.price}</div>
                <button class="btn-buy">Purchase Access</button>
            </div>
        `;
    });
</script>
</body>
</html>
