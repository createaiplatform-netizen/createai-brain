<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN FRAGMENT FIELD</title>
    <style>
        body, html { margin: 0; padding: 0; background: #080700; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        /* Prismatic filter to turn lines into glowing shards */
        canvas { display: block; filter: contrast(1.5) brightness(1.2) saturate(1.8); }
    </style>
</head>
<body>
    <canvas id="fragmentCanvas"></canvas>

<script>
/**
 * THE INVENTION: FRAGMENT FIELD DYNAMICS
 * Analyzed from user screenshots to eliminate 'Blob' failure states.
 */

const canvas = document.getElementById('fragmentCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE SENSORY MAP
function triggerFragmentSense(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    if (x < w * 0.5 && y < h * 0.5) {
        // TOP LEFT: THE RIP
        osc.type = 'square'; osc.frequency.setValueAtTime(90, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate([10, 5, 10]);
    } else if (x > w * 0.5 && y < h * 0.5) {
        // TOP RIGHT: THE SHIMMER
        osc.type = 'sine'; osc.frequency.setValueAtTime(1100, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(5);
    } else {
        // BOTTOM: THE WEIGHT
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(60, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(35);
    }

    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

// The Workforce (Fragmented Light)
const shards = [];
for(let i=0; i<800; i++) {
    shards.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: 0, vy: 0,
        len: 5 + Math.random() * 15,
        angle: Math.random() * Math.PI * 2,
        dna: Math.random()
    });
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerFragmentSense(tx, ty);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    if (Math.random() > 0.7) triggerFragmentSense(tx, ty);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // ANTI-BLACKOUT: Deep Gold Persistence
    ctx.fillStyle = 'rgba(15, 12, 0, 0.2)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    shards.forEach(s => {
        if (isTouching) {
            const dx = tx - s.x;
            const dy = ty - s.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 200) {
                const f = (200 - dist) / 200;
                // ZONAL PHYSICS
                if (tx < w * 0.5 && ty < h * 0.5) {
                    // RIP PHYSICS: Stretch and Snap
                    s.vx -= dx * 0.08; s.vy -= dy * 0.08;
                } else if (tx > w * 0.5 && ty < h * 0.5) {
                    // SHIMMER PHYSICS: Vortex
                    s.vx += dy * 0.1; s.vy -= dx * 0.1;
                } else {
                    // WEIGHT PHYSICS: Slow Suction
                    s.vx += dx * 0.02; s.vy += dy * 0.02;
                }
            }
        }

        s.vx *= 0.92; s.vy *= 0.92;
        s.x += s.vx; s.y += s.vy;

        // Screen Wrap
        if (s.x < 0) s.x = w; if (s.x > w) s.x = 0;
        if (s.y < 0) s.y = h; if (s.y > h) s.y = 0;

        // Visual Fragment Render
        const flicker = Math.sin(time * 5 + s.dna * 100) * 0.5 + 0.5;
        const hue = s.y < h * 0.5 ? 50 : 42; // Top is brighter gold
        
        ctx.strokeStyle = `hsla(${hue}, 100%, ${60 + flicker * 40}%, ${0.3 + flicker * 0.7})`;
        ctx.lineWidth = 1 + flicker * 2;
        
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        // Drawing lines instead of circles prevents the "Blob" failure
        ctx.lineTo(s.x + Math.cos(s.angle + time) * s.len, s.y + Math.sin(s.angle + time) * s.len);
        ctx.stroke();
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
