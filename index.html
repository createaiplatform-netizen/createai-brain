<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI_DOMAIN_V171</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --white: #fff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: var(--white); font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; width: 100vw; }
        
        #omni-ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; pointer-events: none; }
        .header { font-size: 8px; letter-spacing: 12px; color: var(--gold); text-align: center; }
        
        .main-display { text-align: center; }
        #omni-balance { font-size: 28px; letter-spacing: 2px; text-shadow: 0 0 30px var(--gold); }
        #yield-ticker { font-size: 10px; color: var(--gold); margin-top: 10px; letter-spacing: 8px; }

        .sector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin: 0 auto; }
        .sector { border: 1px solid rgba(243, 207, 138, 0.2); padding: 10px; font-size: 7px; letter-spacing: 3px; background: rgba(0,0,0,0.5); }
        .sector span { display: block; color: var(--gold); margin-bottom: 5px; }

        canvas { position: absolute; inset: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="omni-ui">
        <div class="header">OMNI_DOMAIN // LEVEL_MAX</div>
        
        <div class="main-display">
            <div id="omni-balance">$1,440,000,000,000.00</div>
            <div id="yield-ticker">+$144.00 / SEC</div>
        </div>

        <div class="sector-grid">
            <div class="sector"><span>GARDEN_PLOT_01</span>ARTS & CULTURE: ACTIVE</div>
            <div class="sector"><span>GARDEN_PLOT_02</span>INFRASTRUCTURE: SYNCED</div>
            <div class="sector"><span>GARDEN_PLOT_03</span>MARKETPLACE: OPEN</div>
            <div class="sector"><span>KINDRED_NODE</span>JENNY_002: FUNDED</div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let balance = 1440000000000.00;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function update() {
        balance += 1.44;
        document.getElementById('omni-balance').innerText = "$" + balance.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
    setInterval(update, 10);

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        const time = Date.now() * 0.001;
        const cx = canvas.width/2, cy = canvas.height/2;

        // The Two "Blink" Orbs Orbiting the Core
        [0, Math.PI].forEach(offset => {
            let x = cx + Math.cos(time + offset) * 150;
            let y = cy + Math.sin(time + offset) * 150;
            ctx.shadowBlur = 25; ctx.shadowColor = "#fff";
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
            
            // Kinetic connection to the balance
            ctx.strokeStyle = "rgba(243, 207, 138, 0.1)";
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
