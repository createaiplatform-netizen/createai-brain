<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE HEARTH | 100% OPERATIONAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Garamond", serif; }
        body { background: #faf9f6; color: #7a9068; }
        
        .universe-container { display: flex; flex-direction: column; height: 100vh; }
        .top-gateway { 
            height: 40vh; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            text-align: center; border-bottom: 1px solid #c4a97a;
        }
        
        .search-nexus {
            width: 80%; max-width: 800px; padding: 30px; border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.5); font-size: 1.8rem; outline: none;
            background: rgba(255,255,255,0.9); box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .engine-floor { 
            flex: 1; padding: 60px; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; overflow-y: auto;
        }

        .engine-node { 
            background: white; border: 1px solid #eee; padding: 25px; 
            border-radius: 20px; text-align: center; transition: 0.3s;
        }
        .engine-node:hover { transform: translateY(-5px); border-color: #7a9068; }
        
        .status-bar { padding: 10px 40px; background: #fff; border-top: 1px solid #eee; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="universe-container">
        <div class="top-gateway">
            <h1 style="font-size: 3rem; font-weight: 200; color: #fff; margin-bottom: 20px;">The Hearth Universe</h1>
            <input type="text" class="search-nexus" placeholder="Command your Reality (Cafe, Nursing, Legacy, Marketing)...">
        </div>

        <div class="engine-floor">
            <div class="engine-node"><h3>Family Hub</h3><p>97 Key</p></div>
            <div class="engine-node"><h3>Business OS</h3><p>97 Key</p></div>
            <div class="engine-node"><h3>Healthcare</h3><p>Enterprise</p></div>
            <div class="engine-node"><h3>Marketing</h3><p>Sovereign</p></div>
            <div class="engine-node"><h3>Construction</h3><p>Sovereign</p></div>
            <div class="engine-node"><h3>Inventory</h3><p>Sovereign</p></div>
            <div class="engine-node"><h3>Staffing</h3><p>Sovereign</p></div>
            <div class="engine-node"><h3>Journaling</h3><p>Sacred</p></div>
        </div>

        <div class="status-bar">
            SYSTEM STATUS: 150+ ENGINES SYNCHRONIZED | CREATED BY LAKESIDE TRINITY LLC
        </div>
    </div>

</body>
</html>
