<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIS | SOVEREIGN SYSTEM</title>
    <style>
        :root { --gold: #c4a97a; --ink: #111; --bg: #fcfcfc; --junior: #50b3a2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--ink); transition: 0.3s; overflow-x: hidden; }
        nav { 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 15px 25px; border-bottom: 1px solid #eee; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 999;
        }
        .nav-links { display: flex; gap: 8px; overflow-x: auto; }
        .nav-links button { 
            background: #eee; border: none; padding: 8px 15px; border-radius: 20px;
            font-size: 0.6rem; font-weight: 800; color: #888; cursor: pointer;
        }
        .nav-links button.active { background: var(--ink); color: #fff; }
        .nav-links button.j-btn { background: var(--junior); color: #fff; }
        .view { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #fff; border-radius: 25px; padding: 25px; border: 1px solid #eee; }
        .toy-card { border: 4px solid #f0f0f0; text-align: center; border-radius: 25px; padding: 20px; }
        .dark-view { background: #111; color: #fff; border-radius: 30px; padding: 40px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: 900; letter-spacing: 3px; font-size: 0.7rem;">AXIS</div>
        <div class="nav-links">
            <button id="n-m" class="active" onclick="sw('m')">Marketplace</button>
            <button id="n-b" onclick="sw('b')">Business Suite</button>
            <button id="n-j" class="j-btn" onclick="sw('j')">Junior Explorer</button>
            <button id="n-c" onclick="sw('c')">Creator Hub</button>
            <button id="n-f" onclick="sw('f')">Family Portal</button>
        </div>
    </nav>

    <div id="m" class="view active"><h1>Marketplace</h1><div class="grid" id="mG"></div></div>
    
    <div id="b" class="view">
        <h1>Business Suite</h1>
        <p>Subscription required for active nodes.</p>
    </div>

    <div id="j" class="view">
        <h1 style="color:var(--junior)">Junior Explorer</h1>
        <div class="grid">
            <div class="toy-card">🚀 <h3>World Builder</h3></div>
            <div class="toy-card">🧬 <h3>Clinic Hero</h3></div>
        </div>
    </div>

    <div id="c" class="view dark-view"><h1>Creator Hub</h1><p>Family Seat Verified.</p></div>
    
    <div id="f" class="view dark-view"><h1>Family Portal</h1><p>Genesis Level Authority.</p></div>

    <script>
        const data = [
            {t: "Nurse-Flow AI", p: 197},
            {t: "Trust Vault AI", p: 497},
            {t: "Mesh Router", p: 899}
        ];

        function sw(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id).classList.add('active');
            document.body.style.background = (id==='c'||id==='f') ? '#111' : (id==='j' ? '#f8fdfc' : '#fcfcfc');
        }

        const g = document.getElementById('mG');
        data.forEach(e => {
            g.innerHTML += `<div class="card"><h3>${e.t}</h3><p>$${e.p}</p></div>`;
        });
    </script>
</body>
</html>
