<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_PHASE_II</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --glow: rgba(243, 207, 138, 0.3); }
        body, html { margin: 0; padding: 0; background: var(--void); color: var(--gold); font-family: 'Cinzel', serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        .pulse-orb { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 20px var(--gold); animation: pulse 2s infinite; margin-bottom: 50px; }
        .lock-stat { font-size: 12px; letter-spacing: 12px; opacity: 0.6; margin-bottom: 20px; text-transform: uppercase; }
        #ledger { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--glow); }
        
        .grid-status { font-size: 8px; margin-top: 40px; letter-spacing: 8px; opacity: 0.4; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="pulse-orb"></div>
    <div class="lock-stat">Phase_II // Stewardship_Active</div>
    <div id="ledger">$1,440,000,113,800.00</div>
    <div class="grid-status">ALL_144_NODES_REPORTING_COMPLETE_STABILITY</div>
<script>
    let res = 1440000113800.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
