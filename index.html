<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE GARDEN | COMPLETE MATURATION</title>
    <style>
        :root { --gold: #d4af37; --white: #fff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; transition: 2s; }

        .ui-layer { height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: space-between; padding: 35px; z-index: 10; position: relative; }

        /* THE UNIVERSAL COMPASS */
        .corner { position: absolute; font-size: 9px; letter-spacing: 6px; text-transform: uppercase; color: var(--white); opacity: 0.7; }
        .tl { top: 35px; left: 35px; } .tr { top: 35px; right: 35px; }
        .bl { bottom: 140px; left: 35px; } .br { bottom: 140px; right: 35px; }

        /* ROOM DYNAMICS */
        .content-hub { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-size: clamp(35px, 10vw, 65px); letter-spacing: 20px; font-style: italic; color: #fff; transition: 1s; }
        .ai-status { font-size: 10px; letter-spacing: 8px; margin-bottom: 30px; color: var(--gold); }

        /* THE THREE GATES */
        .gate-system { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .gate-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.4); 
            padding: 25px; border-radius: 50px; cursor: pointer; backdrop-filter: blur(15px); transition: 0.5s;
        }
        .gate-btn b { display: block; font-size: 16px; letter-spacing: 10px; color: #fff; }
        .gate-btn span { font-size: 8px; letter-spacing: 4px; color: var(--gold); }

        /* FOOTER VAULT */
        .vault-footer { width: 100%; border: 1px solid var(--gold); border-radius: 40px; padding: 25px; text-align: center; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body onload="init()">

    <canvas id="esther"></canvas>

    <div class="ui-layer">
        <div class="corner tl">GUARDIAN</div>
        <div class="corner tr">ANGELS</div>
        <div class="corner bl">INNOCENCE</div>
        <div class="corner br">SOVEREIGN</div>

        <div class="content-hub" id="main-gate">
            <div class="ai-status">NURTURER AI: ONLINE</div>
            <h1>THE GARDEN</h1>
            <div class="gate-system">
                <div class="gate-btn" onclick="enterRoom('SEEDLINGS', '3-7', '#00f2ff', 15)"><b>SEEDLINGS</b><span>AGES 3—7</span></div>
                <div class="gate-btn" onclick="enterRoom('SAPLINGS', '8-13', '#2ecc71', 5)"><b>SAPLINGS</b><span>AGES 8—13</span></div>
                <div class="gate-btn" onclick="enterRoom('SOVEREIGNS', '14+', '#ffffff', 0)"><b>SOVEREIGNS</b><span>AGES 14+</span></div>
            </div>
        </div>

        <div class="content-hub" id="room-view" style="display:none;">
            <h1 id="active-title">ROOM</h1>
            <p id="active-intel" style="color:#fff; margin-top:20px; letter-spacing:5px; font-size:12px;"></p>
            <div style="margin-top:40px; font-size:10px; text-decoration:underline;" onclick="exitRoom()">EXIT TO GARDEN</div>
        </div>

        <div class="vault-footer">
            <div style="font-size:10px; letter-spacing:8px; color:var(--gold);">DIVINE PROTECTION STATUS</div>
            <div id="protection-lvl" style="font-size:20px; color:#fff; font-weight:bold; margin-top:5px;">ACTIVE // 144,000%</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('esther');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let config = { color: '#d4af37', blur: 5, speed: 0.5 };

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*0.5+0.2, r: Math.random()*8+2});
            render();
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = config.color; ctx.globalAlpha = 0.3;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= (p.v * config.speed); if(p.y < -20) p.y = canvas.height + 20;
            });
            requestAnimationFrame(render);
        }

        function enterRoom(name, age, color, blurVal) {
            config.color = color;
            canvas.style.filter = `blur(${blurVal}px) brightness(1.3)`;
            document.getElementById('main-gate').style.display = 'none';
            document.getElementById('room-view').style.display = 'flex';
            document.getElementById('active-title').innerText = name;
            document.getElementById('active-title').style.color = color;
            document.getElementById('active-intel').innerText = `AI PROTOCOL: ${name} (AGES ${age}) ACTIVE`;
        }

        function exitRoom() {
            config.color = '#d4af37';
            canvas.style.filter = "blur(5px) brightness(1.2)";
            document.getElementById('main-gate').style.display = 'flex';
            document.getElementById('room-view').style.display = 'none';
        }
    </script>
</body>
</html>
