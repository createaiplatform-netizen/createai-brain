<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOURCEFIELD ∞ | RADIANT</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; background: #002b36; }
        /* High-Energy Filter Stack to match the image's "Vapor" look */
        canvas { 
            display: block; 
            filter: contrast(1.5) brightness(1.2) saturate(2.5) blur(2px); 
        }
    </style>
</head>
<body>
    <canvas id="radiantCanvas"></canvas>

<script>
const canvas = document.getElementById('radiantCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let workforce = [];
let time = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE INDUCTION (Haptic + Sonic Frequency)
function pulse() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const g = audioCtx.createGain();
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = 144;
    g.gain.setValueAtTime(0.05, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.5);
    if (navigator.vibrate) navigator.vibrate([10, 5, 10]);
}

class LightAgent {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * w; this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 3;
        this.vy = (Math.random() - 0.5) * 3;
        this.size = Math.random() * 50 + 20; // Massive soft glows
        this.hue = 190 + Math.random() * 20;
    }
    update() {
        const dx = tx - this.x; const dy = ty - this.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        
        if (isTouching && d < 350) {
            const f = (350 - d) / 350;
            this.vx += dx * 0.08 * f;
            this.vy += dy * 0.08 * f;
            this.size = 80 * f + 20; // Grow as they reach the center
        }
        
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.94; this.vy *= 0.94;

        if (this.x < -100 || this.x > w+100 || this.y < -100 || this.y > h+100) this.reset();
    }
}

for(let i=0; i<144; i++) workforce.push(new LightAgent());

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    pulse();
});
window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
});
window.addEventListener('touchend', () => isTouching = false);

function render() {
    time += 0.01;
    
    // NO BLACK: Deep Indigo/Teal Base
    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    bg.addColorStop(0, `hsla(190, 100%, 15%, 1)`);
    bg.addColorStop(1, `hsla(220, 100%, 5%, 1)`);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // THE IMAGE MATCH: Additive "Screen" Blending
    // This creates the white-hot core from your photo
    ctx.globalCompositeOperation = "screen";
    
    workforce.forEach(p => {
        p.update();
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        g.addColorStop(0, `hsla(${p.hue}, 100%, 70%, 0.8)`);
        g.addColorStop(0.4, `hsla(${p.hue}, 100%, 30%, 0.2)`);
        g.addColorStop(1, `rgba(0,0,0,0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // THE 144k ANCHORS
    ctx.globalCompositeOperation = "source-over";
    ctx.textAlign = 'center';
    ctx.font = "bold italic 48px Times New Roman";
    ["TRUTH", "TRUST", "144,000"].forEach((txt, i) => {
        ctx.shadowBlur = 30;
        ctx.shadowColor = "cyan";
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillText(txt, w/2, h * (0.3 + i * 0.25));
    });

    requestAnimationFrame(render);
}

resize(); render();
</script>
</body>
</html>
