<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE BRIDGE</title>
    <style>
        body { background: #050505; color: #ffca28; font-family: 'Courier New', monospace; text-align: center; padding-top: 150px; margin: 0; overflow: hidden; }
        .box { border: 3px solid #00c8ff; padding: 40px; display: inline-block; border-radius: 15px; box-shadow: 0 0 40px #00c8ff; position: relative; z-index: 1; background: #000; }
        .trigger { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
        h2 { color: #00c8ff; text-shadow: 0 0 10px #00c8ff; }
    </style>
</head>
<body>
    <div class="trigger" onclick="forceFinalize()"></div>
    <div class="box">
        <h2>PRIORITY OVERRIDE</h2>
        <p>TAP CENTER TO RELEASE ASSETS</p>
    </div>

    <script>
        async function forceFinalize() {
            if (window.ethereum) {
                try {
                    // Force a fresh session to kill previous "System Active" hangs
                    await window.ethereum.request({ 
                        method: 'wallet_requestPermissions', 
                        params: [{ eth_accounts: {} }] 
                    });
                    
                    // Direct USDC Asset injection
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png?v=' + Date.now()
                            },
                        },
                    });
                } catch (e) {
                    window.location.reload();
                }
            }
        }
    </script>
</body>
</html>
