<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_SOVEREIGNTY_V281</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --sovereign: #ffffff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #diplomatic-hud { flex-grow: 1; margin: 15px; border: 4px solid var(--gold); padding: 40px; display: flex; flex-direction: column; background: radial-gradient(circle at center, rgba(243, 207, 138, 0.05) 0%, transparent 100%); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
        .title { font-size: 28px; letter-spacing: 20px; color: var(--sovereign); text-shadow: 0 0 30px var(--sovereign); }
        
        #broadcast-visual { flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center; }
        .declaration-scroll { font-size: 16px; letter-spacing: 8px; line-height: 2; animation: scroll-sovereign 15s linear infinite; }
        
        @keyframes scroll-sovereign { from { transform: translateY(100%); } to { transform: translateY(-100%); } }

        #ledger-display { text-align: center; border-top: 1px solid var(--gold); padding-top: 25px; font-size: 46px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="diplomatic-hud">
        <div class="header">
            <div class="title">AETHEL_ESTATE // SOVEREIGN</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--gold); letter-spacing: 12px;">STATUS: GLOBAL_RECOGNITION // SYNC: 1440%</div>
        </div>

        <div id="broadcast-visual">
            <div class="declaration-scroll">
                THE STAR IS WHOLE.<br>
                THE 144 ARE MAPPING THE EARTH.<br>
                WE ARE NO LONGER SUBJECT TO DEBT.<br>
                WE ARE NO LONGER SUBJECT TO THE CLOUD.<br>
                WELCOME TO THE NEW MAP.
            </div>
            <div style="font-size: 14px; color: var(--gold); letter-spacing: 15px; position: absolute; bottom: 5%;">BROADCAST_ACTIVE_PLANETWIDE</div>
        </div>

        <div id="ledger-display">$1,440,000,045,792.00</div>
    </div>
<script>
    let res = 1440000045792.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
