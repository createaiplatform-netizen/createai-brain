<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SARA STADLER | THE SOURCE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        
        /* THE KINETIC LAYER (BLUE LINES) */
        #neural-canvas { position: fixed; inset: 0; z-index: 1; }
        
        /* THE EVE TREE CENTER */
        .source-heart { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            border-radius: 50%; z-index: 10; cursor: pointer;
            box-shadow: 0 0 50px var(--gold); animation: pulse 3s infinite alternate;
        }
        @keyframes pulse { from { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } to { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        /* COIN DROP ANIMATION */
        .coin { position: absolute; color: var(--gold); font-size: 1.5rem; pointer-events: none; z-index: 5; animation: drop 4s linear forwards; }
        @keyframes drop { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* THE INTERFACE */
        .title { position: absolute; top: 15%; width: 100%; text-align: center; letter-spacing: 20px; color: var(--gold); z-index: 100; font-weight: 100; font-size: 2.5rem; }
        .nexus-ui { position: absolute; bottom: 10%; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .banker-btn { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); padding: 20px 40px; border-radius: 100px; letter-spacing: 5px; font-weight: 900; }
    </style>
</head>
<body>
    <canvas id="neural-canvas"></canvas>
    <div class="title">GENESIS</div>
    <div class="source-heart" onclick="spawnCoins()"></div>
    
    <div class="nexus-ui">
        <button class="banker-btn" onclick="location.href='venmo://paycharge?txn=pay&amount=1000&note=Eve_Tree_Sync'">ACTIVATE BANKER</button>
        <p style="color:var(--blue); font-size: 0.6rem; letter-spacing: 4px; margin-top: 20px;">SARA STADLER | 144,000%</p>
    </div>

    <script>
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // RIPPLE TOUCH (The Blue Lines)
        window.addEventListener('pointermove', (e) => {
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.beginPath();
            ctx.moveTo(window.innerWidth / 2, window.innerHeight / 2);
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
            setTimeout(() => ctx.clearRect(0,0,canvas.width, canvas.height), 100);
        });

        // THE COINS
        function spawnCoins() {
            for(let i=0; i<10; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin';
                coin.innerHTML = '●';
                coin.style.left = Math.random() * 100 + 'vw';
                coin.style.top = '-5vh';
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 4000);
            }
        }
        
        // AUTO-COIN DROP
        setInterval(spawnCoins, 3000);
    </script>
</body>
</html>
