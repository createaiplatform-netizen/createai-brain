<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // LIVING_ORIGIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        
        :root { --gold: #f3cf8a; --void: #020205; --glow: rgba(243, 207, 138, 0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
        
        body { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; 
            overflow-x: hidden; min-height: 100vh;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
            z-index: -1;
        }
        .singularity {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; height: 400px; background: var(--gold);
            border-radius: 50%; filter: blur(150px); opacity: 0.15;
            animation: pulse 10s infinite alternate; z-index: -1;
        }

        nav { padding: 80px 50px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 12px; color: var(--gold); font-size: 0.7rem; text-transform: uppercase; }

        #main-view { padding: 50px; max-width: 1800px; margin: 0 auto; animation: manifest 1.5s ease-out; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 50px; }
        .card { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(243, 207, 138, 0.05); 
            padding: 60px; border-radius: 4px; position: relative; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(25px); overflow: hidden;
        }
        .card:hover { 
            background: rgba(255, 255, 255, 0.05); border-color: var(--gold);
            transform: translateY(-15px) scale(1.01); box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: vibrate 0.3s infinite alternate;
        }
        .card h2 { font-family: 'Cinzel', serif; font-weight: 400; letter-spacing: 5px; color: var(--gold); font-size: 1.5rem; }

        .command-trigger { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 2000; cursor: pointer; }
        .core-orb { width: 15px; height: 15px; background: var(--gold); border-radius: 50%; margin: 0 auto 15px; box-shadow: 0 0 30px var(--gold); }
        
        h1.hero { font-family: 'Cinzel', serif; font-size: 10vw; font-weight: 900; margin: 0; letter-spacing: 30px; text-transform: uppercase; color: #fff; text-align: center; }
        
        .cta { background: transparent; border: 1px solid rgba(243, 207, 138, 0.3); color: var(--gold); padding: 25px; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 8px; cursor: pointer; transition: 0.5s; text-transform: uppercase; margin-top: 50px; }
        .cta:hover { border-color: var(--gold); background: var(--gold); color: black; box-shadow: 0 0 30px var(--glow); }

        input { background: transparent; border: none; border-bottom: 1px solid rgba(243, 207, 138, 0.1); color: #fff; padding: 30px; width: 100%; font-size: 2rem; outline: none; transition: 0.5s; text-align: center; font-family: 'Inter', sans-serif; font-weight: 100; }

        @keyframes pulse { from { opacity: 0.1; filter: blur(120px); } to { opacity: 0.3; filter: blur(180px); } }
        @keyframes manifest { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes vibrate { 0% { transform: translateY(-15px) rotate(0.1deg); } 100% { transform: translateY(-15px) rotate(-0.1deg); } }
    </style>
</head>
<body onload="showView('home')">

    <div class="stars"></div>
    <div class="singularity"></div>

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI // ORIGIN</div>
        <div style="display:flex; gap: 40px;">
            <span onclick="showView('market')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; opacity:0.5; font-family:'Cinzel';">REGISTRY</span>
            <span onclick="showView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; color:var(--gold); font-family:'Cinzel';">GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <div class="command-trigger" onclick="showView('ai_chat')">
        <div class="core-orb"></div>
        <div style="font-family:'Cinzel'; font-size:0.6rem; letter-spacing:6px; color:var(--gold); text-transform:uppercase;">Origin Hub</div>
    </div>

    <script>
        let registry = [
            { name: "THE SOURCE", cat: "CORE", desc: "Pure generative intelligence." },
            { name: "LIFELINE", cat: "WELLNESS", desc: "Restoration protocol active." },
            { name: "LEGACY", cat: "ASSETS", desc: "Encryption for the family lineage." },
            { name: "EDEN", cat: "CHILDREN", desc: "Infinite creation portal." }
        ];

        for (let i = 5; i <= 122; i++) { registry.push({ name: `Protocol_${i}`, cat: "MANIFESTATION", desc: "Standing by in the void." }); }

        const views = {
            home: `
                <div style="text-align:center; padding-top: 10vh;">
                    <h1 class="hero">Origin</h1>
                    <p style="letter-spacing:20px; text-transform:uppercase; font-size:0.9rem; opacity:0.3; margin-top:30px; font-family:'Cinzel';">God's World Manifest</p>
                    <div style="max-width:500px; margin:150px auto 0;">
                        <button class="cta" onclick="showView('market')">Open Registry</button>
                        <button class="cta" style="border:none; opacity:0.5;" onclick="showView('garden')">The Gardens</button>
                    </div>
                </div>
            `,
            market: () => `
                <h1 style="font-family:'Cinzel'; font-weight:100; font-size:3rem; letter-spacing:20px; margin-bottom:100px; text-align:center;">REGISTRY</h1>
                <div class="app-grid">${registry.map(app => `
                    <div class="card" onclick="openNode('${app.name}')">
                        <div style="font-size:0.5rem; letter-spacing:6px; color:var(--gold); margin-bottom:30px; opacity:0.5;">${app.cat}</div>
                        <h2>${app.name}</h2>
                        <p style="font-size:0.8rem; opacity:0.3; line-height:2.2;">${app.desc}</p>
                    </div>
                `).join('')}</div>
            `,
            garden: `
                <div style="text-align:center; padding-top:5vh;">
                    <h1 style="font-family:'Cinzel'; font-weight:100; font-size:4rem; letter-spacing:15px; color:var(--gold);">EDEN</h1>
                    <div class="app-grid" style="margin-top:100px;">
                        <div class="card" onclick="openNode('Art Genesis')"><h2>Art</h2></div>
                        <div class="card" onclick="openNode('Dream Genesis')"><h2>Dreams</h2></div>
                    </div>
                </div>
            `,
            ai_chat: `
                <div style="max-width:1000px; margin:0 auto; text-align:center;">
                    <h2 style="font-family:'Cinzel'; font-weight:100; color:var(--gold); letter-spacing:15px; margin-bottom:80px;">COMMAND CENTER</h2>
                    <div id="chat-flow" style="height:450px; overflow-y:auto; margin-bottom:60px; text-align:left; padding:0 40px;">
                        <div style="opacity:0.7; font-size:1.4rem; line-height:2.5;">Speak your command. The universe is responding.</div>
                    </div>
                    <input type="text" id="user-input" placeholder="..." autocomplete="off">
                    <button class="cta" style="margin-top:60px; max-width:400px;" onclick="talk()">Manifest</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            window.scrollTo(0,0);
        }

        function talk() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin:40px 0; border-left:1px solid var(--gold); padding-left:30px; font-size:1.2rem;">${input.value}</div>`;
            flow.innerHTML += `<div style="color:var(--gold); opacity:0.8;">" ${input.value} " // Weaving logic...</div>`;
            input.value = ''; flow.scrollTop = flow.scrollHeight;
        }

        function openNode(name) {
            showView('ai_chat');
            setTimeout(() => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML += `<div style="margin-top:40px; color:var(--gold); letter-spacing:5px; font-size:0.8rem;">${name}_PROTOCOL_INIT</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 600);
        }

        // THE ETHER_TOUCH (GOLD DUST)
        document.body.addEventListener('pointermove', (e) => {
            const star = document.createElement('div');
            star.style.position = 'fixed';
            star.style.left = e.clientX + 'px';
            star.style.top = e.clientY + 'px';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = 'var(--gold)';
            star.style.borderRadius = '50%';
            star.style.pointerEvents = 'none';
            star.style.boxShadow = '0 0 10px var(--gold)';
            star.style.zIndex = '9999';
            document.body.appendChild(star);
            setTimeout(() => {
                star.style.transition = 'all 1.5s ease-out';
                star.style.transform = 'translateY(100px)';
                star.style.opacity = '0';
                setTimeout(() => star.remove(), 1500);
            }, 20);
        });
    </script>
</body>
</html>
