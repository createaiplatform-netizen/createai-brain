<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CreateAI">
    
    <title>Sovereign OS | CREATEAI</title>
    <style>
        :root { --slate: #0f172a; --gold: #b89c66; --bg: #f8fafc; --white: #ffffff; }
        body { background: var(--bg); color: var(--slate); font-family: 'Inter', sans-serif; margin: 0; -webkit-tap-highlight-color: transparent; }
        nav { background: var(--slate); padding: env(safe-area-inset-top) 20px 15px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { font-weight: 800; cursor: pointer; border-left: 3px solid var(--gold); padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
        .nav-links span { margin-left: 15px; font-size: 0.65rem; cursor: pointer; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; }
        #main-view { padding: 20px; max-width: 1400px; margin: 0 auto; min-height: 90vh; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .app-card { background: white; border: 1px solid #e2e8f0; padding: 25px; border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .tag { font-size: 0.6rem; color: var(--gold); font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .name { font-size: 1.2rem; font-weight: 400; margin-bottom: 8px; color: var(--slate); }
        .desc { font-size: 0.8rem; color: #64748b; line-height: 1.5; margin-bottom: 20px; flex-grow: 1; }
        .btn-launch { background: var(--slate); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; }
        .search-input { width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .creator-hub { max-width: 100%; background: white; padding: 30px; border-top: 5px solid var(--gold); border-radius: 8px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; box-sizing: border-box; }
    </style>
</head>
<body onload="showView('home')">

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI_OS</div>
        <div class="nav-links">
            <span onclick="showView('market')">Market</span>
            <span onclick="showView('creator')">Creator</span>
            <span onclick="showView('home')">Home</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <script>
        let inventory = [
            { name: "BrainGen", cat: "Core AI", desc: "The primary generative intelligence node." },
            { name: "Scriptwriter", cat: "Creative", desc: "Automated narrative generation." },
            { name: "Wealth Ledger", cat: "Finance", desc: "Encrypted family asset management." },
            { name: "Health Sentinel", cat: "Wellness", desc: "Biometric monitoring engine." }
        ];

        for (let i = inventory.length + 1; i <= 122; i++) {
            inventory.push({ name: `App Node ${i}`, cat: "Active Protocol", desc: "Sovereign Node Ready." });
        }

        const views = {
            home: `
                <div style="text-align:center; padding-top: 60px;">
                    <h1 style="font-weight:200; font-size:2.5rem; margin:0;">CreateAI OS</h1>
                    <p style="opacity:0.5; margin: 15px 0 40px;">Sovereign Intelligence Engine</p>
                    <button class="btn-launch" style="margin-bottom:15px; padding:20px;" onclick="showView('market')">Enter Marketplace</button>
                    <button class="btn-launch" style="padding:20px; background:var(--gold); color:black;" onclick="showView('creator')">Creator Hub</button>
                </div>
            `,
            market: () => `
                <input type="text" class="search-input" placeholder="Search 122+ apps..." onkeyup="searchApps(this.value)">
                <div class="app-grid">
                    ${inventory.map(app => `
                        <div class="app-card">
                            <div class="tag">${app.cat}</div>
                            <div class="name">${app.name}</div>
                            <div class="desc">${app.desc}</div>
                            <button class="btn-launch">Launch Protocol</button>
                        </div>
                    `).reverse().join('')}
                </div>
            `,
            creator: `
                <div class="creator-hub">
                    <h2 style="font-weight:200; margin-top:0;">Manifest Node</h2>
                    <input type="text" id="newName" placeholder="Asset Name">
                    <select id="newCat"><option>AI</option><option>Wealth</option><option>Wellness</option></select>
                    <textarea id="newDesc" rows="4" placeholder="Description..."></textarea>
                    <button class="btn-launch" style="background:var(--gold); color:black;" onclick="addApp()">Publish Asset</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            window.scrollTo(0,0);
        }

        function addApp() {
            const name = document.getElementById('newName').value;
            const cat = document.getElementById('newCat').value;
            const desc = document.getElementById('newDesc').value;
            if(!name || !desc) return alert("Fill all fields.");
            inventory.push({ name, cat, desc });
            showView('market');
        }

        function searchApps(query) {
            const q = query.toLowerCase();
            document.querySelectorAll('.app-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
