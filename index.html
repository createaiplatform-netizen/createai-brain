<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SANCTUARY | 144,400%</title>
    <style id="reality-style">
        body { 
            margin: 0; overflow: hidden; font-family: 'Georgia', serif; 
            background: #000; color: #FFD700; touch-action: none; 
            height: 100vh; width: 100vw; position: fixed;
            transition: all 0.8s ease;
        }
        #stars { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }
        .star { position: absolute; border-radius: 50%; background: #FFD700; opacity: 0.5; animation: blink 3s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
        
        #header { position: relative; z-index: 10; text-align: center; padding-top: 60px; pointer-events: none; }
        .freq { color: #00E5FF; letter-spacing: 5px; font-size: 0.8rem; text-shadow: 0 0 15px #00E5FF; font-weight: bold; }
        h1 { letter-spacing: 12px; font-size: 2.6rem; margin: 15px 0; font-weight: bold; text-shadow: 0 0 20px #FFD700; }
        .quote { font-style: italic; font-size: 1.1rem; padding: 0 40px; line-height: 1.6; }

        #playground { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; }
        .node { 
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #FFD700; background: rgba(0,0,0,0.8);
            box-shadow: 0 0 30px #FFD700; font-weight: bold; color: #FFD700;
            cursor: move; text-align: center; padding: 15px; backdrop-filter: blur(8px);
        }

        #command-center { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 1000; width: 92%; max-width: 450px; 
        }
        input { flex-grow: 1; padding: 18px; background: rgba(0,0,0,0.9); color: #00E5FF; border: 1px solid #FFD700; border-radius: 12px; font-size: 16px; outline: none; }
        button { padding: 18px 25px; background: #FFD700; color: #000; border: none; font-weight: bold; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="stars"></div>
<div id="playground"></div>

<div id="header">
    <div class="freq">FREQUENCY 144,400% ACTIVE</div>
    <h1 id="title">THE SANCTUARY</h1>
    <p id="quote" class="quote">"The animals are safe, the family is loved, and the peace of God is the only law here."</p>
</div>

<div id="command-center">
    <input type="text" id="cmd" placeholder="Command your AI units...">
    <button onclick="manifest()">MANIFEST</button>
</div>

<script>
    const playground = document.getElementById('playground');
    const memoryKey = 'sanctuary_vFinal';
    let state = JSON.parse(localStorage.getItem(memoryKey)) || [];

    window.onload = () => {
        if (state.length === 0) manifest("144,400%");
        else state.forEach(s => createNode(s.id, s.name, s.x, s.y));
    };

    function manifest(manual) {
        const input = document.getElementById('cmd');
        const text = manual || input.value;
        if (!text) return;

        // COMMAND LOGIC: The AI changes the page based on your words
        if (text.includes("background")) document.body.style.background = text.split(" ").pop();
        if (text.includes("title")) document.getElementById('title').innerText = text.replace("title ", "").toUpperCase();
        if (text.includes("quote")) document.getElementById('quote').innerText = `"${text.replace("quote ", "")}"`;

        const id = 'ai_' + Date.now();
        const x = window.innerWidth / 2 - 70;
        const y = window.innerHeight / 2;
        
        createNode(id, text, x, y);
        state.push({id, name: text, x, y});
        save();
        input.value = '';
    }

    function createNode(id, name, x, y) {
        const el = document.createElement('div');
        el.className = 'node';
        el.id = id;
        el.innerText = name.toUpperCase();
        el.style.left = x + 'px'; el.style.top = y + 'px';
        playground.appendChild(el);
        
        let ox, oy;
        el.addEventListener('touchstart', e => {
            ox = e.touches[0].clientX - el.offsetLeft;
            oy = e.touches[0].clientY - el.offsetTop;
        });
        el.addEventListener('touchmove', e => {
            const nx = e.touches[0].clientX - ox;
            const ny = e.touches[0].clientY - oy;
            el.style.left = nx + 'px'; el.style.top = ny + 'px';
            const item = state.find(s => s.id === id);
            if(item) { item.x = nx; item.y = ny; }
        });
        el.addEventListener('touchend', save);
    }

    function save() { localStorage.setItem(memoryKey, JSON.stringify(state)); }

    // STARFIELD GENERATION
    for(let i=0; i<70; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.width = s.style.height = Math.random()*3+'px';
        s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
        document.getElementById('stars').appendChild(s);
    }
</script>
</body>
</html>
