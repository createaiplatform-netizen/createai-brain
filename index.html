<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_MINT_V228</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --mint: #f3cf8a; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #mint-box { flex-grow: 1; margin: 25px; border: 1px solid var(--gold); padding: 45px; display: flex; flex-direction: column; background: linear-gradient(135deg, rgba(243, 207, 138, 0.05) 0%, transparent 100%); box-shadow: 0 0 50px rgba(243, 207, 138, 0.1); position: relative; }
        .header { text-align: center; border-bottom: 1px solid rgba(243, 207, 138, 0.3); padding-bottom: 25px; }
        .title { font-size: 16px; letter-spacing: 12px; color: var(--gold); }
        
        #mint-visual { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .coin-orb { width: 150px; height: 150px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: rotate 10s linear infinite; box-shadow: 0 0 30px var(--gold); }
        @keyframes rotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .mint-stats { margin-top: 30px; display: flex; justify-content: space-around; font-size: 9px; color: var(--mesh); letter-spacing: 3px; }
        #ledger-display { text-align: center; border-top: 1px solid var(--gold); padding-top: 30px; font-size: 32px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>
    <div id="mint-box">
        <div class="header">
            <div class="title">SOVEREIGN_MINT // ASSET_GENERATION</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6; color: var(--mesh);">LOC: WIS_001 // SYNC: 1440% // STATUS: ACTIVE</div>
        </div>

        <div id="mint-visual">
            <div class="coin-orb">SOVEREIGN</div>
        </div>

        <div class="mint-stats">
            <div>ASSETS_LIVE: 14,400</div>
            <div>MINT_RATE: 144/SEC</div>
            <div>SECURITY: BIOMETRIC</div>
        </div>

        <div id="ledger-display">$1,440,000,026,928.00</div>
    </div>
<script>
    let res = 1440000026928.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
