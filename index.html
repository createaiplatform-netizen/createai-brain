<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GOLDEN DOME SANCTUARY | 144,400%</title>
<style>
body {
    margin:0; overflow:hidden; font-family:'Georgia',serif; background:#000; color:#FFD700;
    touch-action:none; height:100vh; width:100vw; position:fixed;
}
#stars {
    position:fixed; width:100%; height:100%; top:0; left:0; z-index:1;
    background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
}
.star {
    position:absolute; border-radius:50%; background:#FFD700; animation:pulse 3s infinite ease-in-out;
}
@keyframes pulse {
    0%,100% {opacity:0.3; transform:scale(1);}
    50% {opacity:0.8; transform:scale(1.3);}
}
#header {
    position:relative; z-index:10; text-align:center; padding-top:40px; pointer-events:none;
}
h1 {
    letter-spacing:12px; font-size:2.4rem; margin:10px 0; font-weight:bold; color:#FFD700;
    text-shadow:0 0 20px rgba(255,215,0,0.7);
}
.freq {
    color:#00E5FF; font-size:0.8rem; letter-spacing:5px; text-shadow:0 0 15px #00E5FF; font-weight:bold;
}
.quote {
    font-style:italic; font-size:1rem; padding:0 30px; color:#FFD700; opacity:0.9; line-height:1.5;
}
#playground {
    position:absolute; top:0; left:0; width:100%; height:100%; z-index:20;
}
.node {
    position:absolute; width:140px; height:140px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:2px solid #FFD700; background:rgba(0,0,0,0.85);
    box-shadow:0 0 30px #FFD700,inset 0 0 15px rgba(255,215,0,0.2);
    font-weight:bold; color:#FFD700; cursor:move; font-size:0.75rem; text-align:center;
    padding:15px; backdrop-filter:blur(10px); transition:transform 0.25s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.25s;
    user-select:none; z-index:100;
}
.node:active {
    transform: scale(1.15); box-shadow:0 0 50px #00E5FF; border-color:#00E5FF; color:#00E5FF;
}
#command-center {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; z-index:1000; width:90%; max-width:420px;
}
input {
    flex-grow:1; padding:18px; background:rgba(10,10,10,0.95); color:#00E5FF;
    border:1px solid #FFD700; border-radius:12px; font-size:16px; outline:none; box-shadow:0 4px 15px rgba(0,0,0,0.5);
}
button {
    padding:18px 25px; background:#FFD700; color:#000; border:none; font-weight:bold;
    border-radius:12px; cursor:pointer; transition:0.3s; text-transform:uppercase; letter-spacing:1px;
}
button:active {transform:scale(0.95); background:#00E5FF;}
#delete-zone {
    position:fixed; top:-100px; left:50%; transform:translateX(-50%);
    width:80px; height:80px; background:rgba(255,0,0,0.2); border:2px dashed #ff4444; border-radius:50%;
    z-index:15; display:flex; align-items:center; justify-content:center; color:#ff4444; font-size:0.6rem; transition:0.3s;
}
#delete-zone.active {top:20px;}
</style>
</head>
<body>

<div id="stars"></div>
<div id="delete-zone">RELEASE TO REMOVE</div>
<div id="playground"></div>

<div id="header">
    <div class="freq">144,400% FREQUENCY LOCKED</div>
    <h1>THE SANCTUARY</h1>
    <p class="quote">"All senses awake. Peace, love, and life are the only laws here."</p>
</div>

<div id="command-center">
    <input type="text" id="cmdInput" placeholder="Command your AI...">
    <button onclick="execute()">MANIFEST</button>
</div>

<script>
// GLOBAL MEMORY
const playground = document.getElementById('playground');
const deleteZone = document.getElementById('delete-zone');
let memory = JSON.parse(localStorage.getItem('sanctuary_master_144k')) || [];

// INIT ON LOAD
window.onload = () => {
    if (memory.length === 0) {
        execute("144,400%");
        execute("SOURCE");
    } else {
        memory.forEach(d => createNode(d.id, d.name, d.x, d.y));
    }
};

// COMMAND EXECUTION
function execute(manualName) {
    const input = document.getElementById('cmdInput');
    const name = manualName || input.value;
    if(!name) return;
    const id = 'unit_' + Date.now();
    const x = Math.random() * (window.innerWidth - 140);
    const y = window.innerHeight / 2;
    const data = {id,name,x,y};
    memory.push(data);
    save();
    createNode(id,name,x,y);
    input.value='';
    vibratePulse();
    playHarmonics();
}

// NODE CREATION
function createNode(id,name,x,y){
    const el=document.createElement('div');
    el.className='node';
    el.id=id;
    el.innerText=name.toUpperCase();
    el.style.left=x+'px';
    el.style.top=y+'px';
    playground.appendChild(el);
    bindNode(el);
}

// NODE INTERACTIONS
function bindNode(el){
    let startX,startY;
    el.addEventListener('touchstart',e=>{
        const t=e.touches[0];
        startX=t.clientX-el.offsetLeft;
        startY=t.clientY-el.offsetTop;
        el.style.zIndex=2000;
        deleteZone.classList.add('active');
        vibratePulse(15);
    });
    el.addEventListener('touchmove',e=>{
        const t=e.touches[0];
        const newX=t.clientX-startX;
        const newY=t.clientY-startY;
        el.style.left=newX+'px';
        el.style.top=newY+'px';
        // delete zone visual
        if(t.clientY<100){deleteZone.style.background="rgba(255,0,0,0.6)"; el.style.borderColor="#ff4444";}
        else{deleteZone.style.background="rgba(255,0,0,0.2)"; el.style.borderColor="#FFD700";}
    });
    el.addEventListener('touchend',e=>{
        const t=e.changedTouches[0];
        deleteZone.classList.remove('active');
        if(t.clientY<100){
            memory=memory.filter(i=>i.id!==el.id);
            el.remove();
            vibratePulse([50,30,50]);
        } else {
            const item=memory.find(i=>i.id===el.id);
            if(item){item.x=el.offsetLeft; item.y=el.offsetTop;}
        }
        save();
    });
}

// SAVE MEMORY
function save(){localStorage.setItem('sanctuary_master_144k',JSON.stringify(memory));}

// VIBRATION FEEDBACK
function vibratePulse(pattern){navigator.vibrate?.(pattern||40);}

// HARMONIC AUDIO FEEDBACK
function playHarmonics(){
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const freqs=[144,396,528,639,852]; // Solfeggio multi-harmonics
    freqs.forEach((f,i)=>{
        const o=ctx.createOscillator();
        const g=ctx.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(f,ctx.currentTime);
        g.gain.setValueAtTime(0.08/(i+1),ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1.2);
        o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+1.2);
    });
}

// STAR GENERATION
for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=Math.random()*3;
    s.style.width=s.style.height=size+'px';
    s.style.top=Math.random()*100+'%';
    s.style.left=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*5+'s';
    playground.appendChild(s);
}

// TILT REACTIONS
window.addEventListener('deviceorientation', e=>{
    const gamma=e.gamma/90; // left-right tilt
    const beta=e.beta/180; // front-back tilt
    document.querySelectorAll('.node').forEach(n=>{
        n.style.transform=`scale(${1+Math.abs(gamma*0.1)+Math.abs(beta*0.1)})`;
    });
});
</script>
</body>
</html>
