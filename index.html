<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_ZENITH_V85</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --nexus: #00f2ff; --eden: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        
        .title { font-family: 'Cinzel'; font-size: 11vw; letter-spacing: 15px; color: var(--gold); text-shadow: 0 0 40px #000; animation: heartbeat 4s ease-in-out infinite; transition: 0.5s; }
        .quote { font-family: 'Great Vibes'; font-size: 2.2rem; color: var(--gold); margin-top: 10px; opacity: 0.8; transition: 0.5s; }
        
        #clock { font-family: 'Cinzel'; font-size: 1.5rem; color: var(--gold); margin-top: 20px; letter-spacing: 5px; opacity: 0.6; }

        @keyframes heartbeat { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.03); opacity: 1; } }
        .guide { position: fixed; font-family: 'Cinzel'; font-size: 9px; color: var(--gold); opacity: 0.1; z-index: 20; letter-spacing: 3px; }
        .tl { top: 40px; left: 30px; } .tr { top: 40px; right: 30px; } .bl { bottom: 40px; left: 30px; } .br { bottom: 40px; right: 30px; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div class="guide tl">NEXUS</div> <div class="guide tr">EDEN</div> <div class="guide bl">SOURCE</div> <div class="guide br">VAULT</div>
    <canvas id="canvas"></canvas>
    <div id="ui-layer">
        <h1 class="title" id="t">SOURCE</h1>
        <p class="quote" id="q">The One Origin</p>
        <div id="clock">00:00:00</div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'home', items = [], vaultPile = [], isDown = false, mx = 0, my = 0, auraSize = 50;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function updateClock() {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                        now.getMinutes().toString().padStart(2, '0') + ":" + 
                        now.getSeconds().toString().padStart(2, '0');
        document.getElementById('clock').innerText = timeStr;
    }
    setInterval(updateClock, 1000); updateClock();

    function handle(e) {
        isDown = true;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;

        if (y < h/2) {
            if (x < w/2) { view = 'grid'; render("NEXUS", "Network Sync", "#00f2ff"); }
            else { view = 'eden'; render("EDEN", "Infinite Growth", "#2ecc71"); }
        } else {
            if (x < w/2) { view = 'home'; render("SOURCE", "The One Origin", "#f3cf8a"); }
            else { view = 'vault'; render("VAULT", "Mass of Value", "#f3cf8a"); }
        }
        if(view !== 'vault') items = []; // Clear temp effects but NOT the vaultPile
    }
    
    function track(e) { mx = e.clientX || (e.touches ? e.touches[0].clientX : mx); my = e.clientY || (e.touches ? e.touches[0].clientY : my); }
    function stop() { isDown = false; }

    function render(title, quote, color) { 
        const t = document.getElementById('t'); const q = document.getElementById('q');
        t.innerText = title; q.innerText = quote;
        t.style.color = color; q.style.color = color;
        document.getElementById('clock').style.opacity = (title === "SOURCE") ? "0.6" : "0";
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let cx = canvas.width/2, cy = canvas.height/2;

        let targetSize = isDown ? 130 : 55;
        auraSize += (targetSize - auraSize) * 0.05;
        let pulse = auraSize + Math.sin(Date.now() * 0.004) * 5;
        let colorMain = (view === 'grid') ? '0, 242, 255' : (view === 'eden') ? '46, 204, 113' : '243, 207, 138';

        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse * 2.5);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, `rgba(${colorMain}, 0.3)`); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, pulse * 2.5, 0, Math.PI * 2); ctx.fill();

        // VAULT MEMORY LOGIC
        if (view === 'vault') {
            if (Math.random() > 0.95) vaultPile.push({x: Math.random()*canvas.width, y: -20, vy: Math.random()*3+1, vx: (Math.random()-0.5), r: Math.random()*5+3, active: true});
            if (isDown && my > cy && mx > cx) for(let i=0; i<2; i++) vaultPile.push({x: mx, y: my, vy: (Math.random()-0.5)*8, vx: (Math.random()-0.5)*8, r: Math.random()*4+2, active: true});
        }
        
        vaultPile.forEach((p) => {
            if (p.active) {
                p.vy += 0.22; p.y += p.vy; p.x += p.vx;
                if (p.y > canvas.height - p.r) { p.y = canvas.height - p.r; p.vy = 0; p.vx *= 0.5; if (Math.abs(p.vx) < 0.1) p.active = false; }
            }
            if (view === 'vault') { // Only draw coins in the Vault
                ctx.fillStyle = '#f3cf8a'; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            }
        });

        // OTHER QUADRANTS
        if (view === 'grid' && isDown && my < cy && mx < cx) items.push({type:'neural', x: mx, y: my, tx: cx, ty: cy, life: 1});
        else if (view === 'eden' && isDown && my < cy && mx > cx) items.push({type:'vine', x: mx, y: my, r: 2, angle: Math.random()*Math.PI*2, life: 1});

        items.forEach((p, i) => {
            if (p.type === 'neural') {
                ctx.strokeStyle = `rgba(0, 242, 255, ${p.life})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke();
                p.life -= 0.02; if(p.life <= 0) items.splice(i, 1);
            } else if (p.type === 'vine') {
                p.x += Math.cos(p.angle)*2.5; p.y += Math.sin(p.angle)*2.5; p.life -= 0.01;
                ctx.fillStyle = `rgba(46, 204, 113, ${p.life})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) items.splice(i, 1);
            }
        });

        if (vaultPile.length > 600) vaultPile.shift();
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
