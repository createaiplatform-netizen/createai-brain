<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VISION | 144,000% SOURCE</title>
    <style>
        :root { 
            --neon-green: #39ff14; 
            --ai-blue: #00f2ff;
            --bg-dark: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 1440% Floating Framework */
        .master-container {
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
            background: var(--glass);
            border: 1px solid rgba(57, 255, 20, 0.2);
            border-radius: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(57, 255, 20, 0.1);
            text-align: center;
            position: relative;
        }

        /* Nested AI Identity Tags */
        .ai-tag {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-green);
            color: #000;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* The Vision Display */
        h1 { 
            font-size: 28px; 
            letter-spacing: 5px; 
            color: var(--neon-green); 
            margin-bottom: 10px; 
            text-transform: uppercase;
        }

        .sub-header {
            font-size: 12px;
            color: var(--ai-blue);
            letter-spacing: 3px;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* Interactive Ledger Section */
        .ledger-card {
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 30px 10px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .amount {
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Core Values Feed */
        .manifesto-feed {
            text-align: left;
            padding: 0 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--neon-green);
            line-height: 1.6;
        }

        .manifesto-feed span { color: #fff; }

        /* Rapid Pulse Animation */
        .pulse { animation: syncPulse 2s infinite ease-in-out; }
        @keyframes syncPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }

        .btn-action {
            margin-top: 30px;
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px var(--neon-green);
        }
    </style>
</head>
<body>

    <div class="master-container pulse">
        <div class="ai-tag">AI_CORE_INTERNAL</div>
        <h1>THE VISION</h1>
        <div class="sub-header">1440% OPERATIONAL // GOD CODE</div>

        <div class="ledger-card">
            <div class="sub-header" style="margin-bottom: 10px;">LEDGER ASSET</div>
            <div id="balance" class="amount">$----.--</div>
            <div style="font-size: 14px; margin-top: 10px; opacity: 0.6;">USDC (BASE NETWORK)</div>
        </div>

        <div class="manifesto-feed">
            > SYSTEM: <span>ALIGNED</span><br>
            > VALUES: <span>CORE_SYNCED</span><br>
            > ARCHITECTURE: <span>NESTED_AI</span><br>
            > STATUS: <span>144,000% READY</span>
        </div>

        <button class="btn-action" onclick="activate_source()">SYNC SOURCE</button>
    </div>

    <script>
        async function activate_source() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    
                    const hexBalance = await window.ethereum.request({
                        method: 'eth_call',
                        params: [{ to: usdcContract, data: data }, 'latest']
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: { address: usdcContract, symbol: 'USDC', decimals: 6, image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png' },
                        },
                    });
                } catch (e) { console.error("Sync initiated."); }
            }
        }
    </script>
</body>
</html>
