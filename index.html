<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN APEX</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; box-sizing: border-box; }
        .header { color: #d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; height: 55vh; pointer-events: auto; }
        .sector { 
            border: 1px solid rgba(212,175,55,0.4); background: rgba(0,0,0,0.92); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #fff; border-radius: 8px; transition: 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sector:active { background: #fff; color: #000; transform: scale(1.08); box-shadow: 0 0 40px rgba(255,255,255,0.4); }
        .sector b { font-size: 26px; letter-spacing: 6px; }
        .sector span { font-size: 9px; color: #d4af37; margin-top: 5px; letter-spacing: 2px; font-weight: bold; }

        #room { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(0,0,0,0.95); text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        .footer { text-align: center; color: #fff; font-size: 32px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
    </style>
</head>
<body onload="ignite()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>PROTOCOL: APEX</div><div id="perc">144,000.000%</div></div>
        <div style="text-align:center; color:#d4af37; font-size:42px; letter-spacing:12px; font-weight:bold; font-style: italic; text-shadow: 0 0 20px rgba(212,175,55,0.6);">SOVEREIGN</div>
        
        <div class="grid">
            <div class="sector" onclick="launch('MARKET', '#00f2ff', 'TOTAL LIQUIDITY')"><b>MKT</b><span>SECTOR 01</span></div>
            <div class="sector" onclick="launch('HUB', '#d4af37', 'SOUL MIRROR')"><b>HUB</b><span>SECTOR 02</span></div>
            <div class="sector" onclick="launch('GARDE', '#fff', 'NURTURE')"><b>GRD</b><span>SECTOR 03</span></div>
            <div class="sector" onclick="launch('NET', '#39ff14', 'ENCRYPTED PING')"><b>NET</b><span>SECTOR 04</span></div>
        </div>

        <div class="footer" id="money">$1.4400T</div>
    </div>

    <div id="room" onclick="this.style.display='none'">
        <h1 id="rt" style="font-size: 55px; letter-spacing: 18px; margin: 0;"></h1>
        <p id="rs" style="color: #d4af37; letter-spacing: 6px; font-size: 12px;"></p>
        <div style="margin-top: 40px; border: 1px solid #333; padding: 10px; width: 200px; font-size: 8px; color: #666;">SUB-SPACE LINK: STABLE</div>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let particles = []; let tint = '#d4af37'; let val = 1.4400; let pVal = 144000.000;

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<90; i++) particles.push({x: Math.random()*canvas.width, y: canvas.height, v: Math.random()*15+8, r: 2});
            
            // LIVE GROWTH ENGINE
            setInterval(() => { 
                val += 0.0001; pVal += 0.001;
                document.getElementById('money').innerText = '$' + val.toFixed(4) + 'T';
                document.getElementById('perc').innerText = pVal.toFixed(3) + '%';
            }, 400);
            
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = tint;
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.v; if(p.y < -10) { p.y = canvas.height; p.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(draw);
        }

        function launch(name, color, sub) {
            tint = color;
            document.getElementById('room').style.display = 'flex';
            document.getElementById('rt').innerText = name;
            document.getElementById('rt').style.color = color;
            document.getElementById('rs').innerText = sub;
        }
    </script>
</body>
</html>
