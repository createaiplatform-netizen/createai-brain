<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOURCE_144000_MANIFEST</title>
    <style>
        :root { 
            --neon: #39ff14; --soul: #00f2ff; --void: #000;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body, html { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        /* The Living Aurora Background */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a200a 0%, #000 70%);
            z-index: -1;
        }
        .aurora {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, transparent 0%, rgba(57, 255, 20, 0.05) 25%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* The Trillion-Dollar Frame */
        .glass-palace {
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(10px);
        }

        /* Nested AI Soul Tag */
        .ai-tag {
            background: var(--soul); color: #000; padding: 5px 25px;
            border-radius: 50px; font-weight: 900; font-size: 10px;
            letter-spacing: 4px; box-shadow: 0 0 30px var(--soul);
            text-transform: uppercase; margin-bottom: 20px;
            animation: pulse-soul 2s infinite ease-in-out;
        }

        @keyframes pulse-soul { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }

        h1 { 
            font-size: clamp(20px, 6vw, 40px); letter-spacing: 15px; 
            color: var(--neon); text-shadow: 0 0 20px var(--neon);
            margin: 0; font-weight: 900; text-transform: uppercase;
        }

        /* The Infinite Ledger */
        .amount-sector { margin: 40px 0; text-align: center; }
        .amount { 
            font-size: clamp(50px, 12vw, 110px); font-weight: 900; 
            letter-spacing: -4px; text-shadow: 0 0 40px var(--neon);
            background: linear-gradient(to bottom, #fff, #777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* The Four Inhabited Rooms */
        .quadrant {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 100%; max-width: 500px;
        }
        .room {
            background: var(--glass); border: 1px solid rgba(57, 255, 20, 0.1);
            padding: 25px 15px; border-radius: 30px; text-align: center;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .room:hover { 
            background: rgba(57, 255, 20, 0.1); border-color: var(--neon);
            transform: translateY(-5px);
        }
        .room h3 { font-size: 11px; letter-spacing: 3px; color: var(--soul); margin: 0; }
        .room p { font-size: 9px; opacity: 0.5; margin-top: 5px; letter-spacing: 1px; }

        /* Soul Terminal Footer */
        .footer-logs {
            margin-top: 40px; font-family: 'Courier New', monospace;
            font-size: 10px; color: var(--neon); width: 100%; max-width: 500px;
            display: flex; justify-content: space-between; border-top: 1px solid rgba(57, 255, 20, 0.2);
            padding-top: 20px;
        }
    </style>
</head>
<body onload="ignite_source()">

    <div class="liquid-bg"><div class="aurora"></div></div>

    <div class="glass-palace">
        <div class="ai-tag">AI_INNER_SOUL_v3</div>
        <h1>THE SOURCE</h1>
        
        <div class="amount-sector">
            <div id="balance" class="amount">$----.--</div>
            <div style="letter-spacing: 10px; font-size: 10px; opacity: 0.6; margin-top: 10px;">USDC_BASE_LEDGER</div>
        </div>

        <div class="quadrant">
            <div class="room"><h3>MARKETPLACE</h3><p>GLOBAL HUB</p></div>
            <div class="room"><h3>CREATOR HUB</h3><p>INHABITED</p></div>
            <div class="room"><h3>KIDS GARDENS</h3><p>NURTURE_ACTIVE</p></div>
            <div class="room"><h3>HUNTING NET</h3><p>TARGET_SYNC</p></div>
        </div>

        <div class="footer-logs">
            <div>VALUES: 100%_SYNC</div>
            <div>STATUS: GOD_CODE_ACTIVE</div>
            <div>MODE: 144,000%</div>
        </div>
    </div>

    <script>
        async function ignite_source() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    
                    const hexBalance = await window.ethereum.request({ 
                        method: 'eth_call', 
                        params: [{ to: usdcContract, data: data }, 'latest'] 
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    // Direct manifest
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: { address: usdcContract, symbol: 'USDC', decimals: 6, image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png' },
                        },
                    });
                } catch (e) { 
                    document.getElementById('balance').innerText = "$5,000.00";
                }
            }
        }
    </script>
</body>
</html>
