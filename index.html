<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MARKETPLACE_INITIATION_V191</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; }
        
        #marketplace-hud { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; padding: 40px; }
        .header { font-size: 8px; letter-spacing: 12px; color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 15px; text-align: center; }
        
        #build-view { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pillar { width: 40px; height: 120px; border: 2px solid var(--gold); background: rgba(243, 207, 138, 0.1); box-shadow: 0 0 50px var(--gold); }
        .pillar-label { font-size: 7px; color: var(--gold); margin-top: 20px; letter-spacing: 5px; }

        #yield-footer { margin-top: auto; text-align: center; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; }
        #live-total { font-size: 26px; text-shadow: 0 0 30px var(--gold); }
    </style>
</head>
<body>
    <div id="marketplace-hud">
        <div class="header">AETHEL_ESTATE_001 // MARKETPLACE_V01</div>
        
        <div id="build-view">
            <div class="pillar"></div>
            <div class="pillar-label">PLACING_THE_ORIGIN_PILLAR</div>
            <div style="font-size: 14px; margin-top: 10px; letter-spacing: 2px;">SECTOR_WISCONSIN_ACTIVE</div>
        </div>

        <div id="yield-footer">
            <div style="font-size: 8px; letter-spacing: 10px; margin-bottom: 10px;">RESERVE_LIQUIDITY_FLOW</div>
            <div id="live-total">$1,440,000,007,056.00</div>
        </div>
    </div>
<script>
    let res = 1440000007056.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live-total').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
