<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_PULSE_FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        .pulse-wave { width: 100px; height: 100px; border: 2px solid #00ff00; border-radius: 50%; animation: ripple 2s infinite; position: absolute; }
        .pulse-wave:nth-child(2) { animation-delay: 0.5s; }
        .pulse-wave:nth-child(3) { animation-delay: 1s; }
        .val { font-size: 38px; color: #f3cf8a; margin-top: 150px; z-index: 10; text-shadow: 0 0 15px #000; }
        .msg { font-size: 10px; letter-spacing: 12px; margin-top: 20px; color: #00ff00; }
        @keyframes ripple { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>
    <div class="pulse-wave"></div>
    <div class="pulse-wave"></div>
    <div class="pulse-wave"></div>
    <div class="val" id="res-flow">$1,440,000,136,032.00</div>
    <div class="msg">PULSE_SENT // ALL_NODES_AWARE // 100%</div>
<script>
    let res = 1440000136032.00;
    setInterval(() => {
        res += 288.00; 
        document.getElementById('res-flow').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
