<div id="room-layer">
    <h1 id="room-name">HUB</h1>
    <p id="room-status" style="letter-spacing: 5px; font-size: 11px;"></p>
    
    <div id="garden-gates" style="display:none; margin-top: 30px;" class="grid">
        <div class="btn" onclick="tuneGarden('SEEDLINGS', '#00f2ff', 20)"><b>3—7</b><span>SEEDLINGS</span></div>
        <div class="btn" onclick="tuneGarden('SAPLINGS', '#2ecc71', 8)"><b>8—13</b><span>SAPLINGS</span></div>
        <div class="btn" onclick="tuneGarden('SOVEREIGNS', '#fff', 0)"><b>14+</b><span>SOVEREIGNS</span></div>
    </div>

    <div class="back-btn" onclick="resetGalaxy()">RETURN TO GALAXY</div>
</div>

<script>
    // UPDATE THE FLIP FUNCTION TO HANDLE THE GARDEN
    function flip(name, color, status) {
        accent = color;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('room-layer').style.display = 'block';
        document.getElementById('room-name').innerText = name;
        document.getElementById('room-name').style.color = color;
        document.getElementById('room-status').innerText = status;
        
        // Show Age-Gates if entering the Garden
        if(name === 'GARDE') {
            document.getElementById('garden-gates').style.display = 'grid';
            canvas.style.filter = "blur(15px) brightness(1.2)";
        } else {
            document.getElementById('garden-gates').style.display = 'none';
            canvas.style.filter = "blur(8px) brightness(1.5)";
        }
    }

    // SPECIAL FUNCTION FOR THE CHILDREN
    function tuneGarden(level, color, blurVal) {
        accent = color;
        canvas.style.filter = "blur(" + blurVal + "px) brightness(1.4)";
        document.getElementById('room-name').innerText = level;
        document.getElementById('room-name').style.color = color;
        document.getElementById('room-status').innerText = "PROTECTION ACTIVE // 144,000%";
    }
</script>
