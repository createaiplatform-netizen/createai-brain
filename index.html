<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://js.stripe.com/v3/"></script> <!-- Include Stripe.js -->
  <title>Stripe Payment</title>
</head>
<body>
  <h1>Stripe Payment</h1>
  <form id="payment-form">
    <div id="card-element"><!-- Stripe.js will inject card input here --></div>
    <button id="submit">Pay</button>
    <div id="error-message"></div>
  </form>

  <script>
    // Replace this with your actual client secret from the backend
    const clientSecret = "pi_3TEad7DYLQul2zXy0mcWn6o2_secret_urjv19eS4IvxKljwfgAII1n1B";

    // Initialize Stripe with your publishable key
    const stripe = Stripe("pk_test_YOUR_PUBLISHABLE_KEY"); // Replace with your own publishable key
    const elements = stripe.elements(); // Initialize Stripe elements
    const cardElement = elements.create("card"); // Create a card input
    cardElement.mount("#card-element"); // Embed card input into your form

    // Handle form submission
    const form = document.getElementById("payment-form");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
        payment_method: {
          card: cardElement,
          billing_details: {
            name: "Customer Name", // Replace with your customer's name
          },
        },
      });

      if (error) {
        // Show error to customer
        document.getElementById("error-message").textContent = error.message;
      } else {
        // Payment successful!
        alert("Payment was successful!");
        console.log(paymentIntent);
      }
    });
  </script>
</body>
</html>
