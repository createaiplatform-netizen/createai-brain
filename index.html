<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEARTH | CORE</title>
    <style>
        :root { --gold: #c4a97a; --ink: #1d1d1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #fff; color: var(--ink); line-height: 1.5; padding-bottom: 100px; }
        
        .header { padding: 60px 20px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .logo { font-weight: 900; letter-spacing: 15px; font-size: 1.2rem; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; background: #f0f0f0; gap: 1px; border-bottom: 1px solid #f0f0f0; }
        .card { background: #fff; padding: 35px 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 300px; text-decoration: none; color: inherit; }
        
        .icon { font-size: 2.8rem; margin-bottom: 20px; display: block; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.05)); }
        .tag { font-size: 0.55rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #bbb; display: block; margin-bottom: 8px; }
        .name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; display: block; }
        .price { font-size: 0.75rem; font-weight: 800; color: var(--gold); }

        nav { position: fixed; bottom: 25px; left: 15px; right: 15px; background: #000; padding: 20px; border-radius: 100px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 40px rgba(0,0,0,0.3); z-index: 999; }
        .nav-item { color: #fff; font-size: 0.55rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; opacity: 0.4; }
        .nav-item.active { opacity: 1; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">HEARTH</div>
    </header>

    <main class="grid">
        <div class="card">
            <span class="icon">⚙️</span>
            <div>
                <span class="tag">Flagship</span>
                <span class="name">Sovereign Home-Port</span>
                <span class="price">$1,299</span>
            </div>
        </div>
        <div class="card">
            <span class="icon">👕</span>
            <div>
                <span class="tag">Apparel</span>
                <span class="name">Custom AI Skin</span>
                <span class="price">$45</span>
            </div>
        </div>
        <div class="card">
            <span class="icon">🛠️</span>
            <div>
                <span class="tag">Utility</span>
                <span class="name">Sovereign Tool v1</span>
                <span class="price">$89</span>
            </div>
        </div>
        <div class="card">
            <span class="icon">🔑</span>
            <div>
                <span class="tag">Subscription</span>
                <span class="name">Family Port Vault</span>
                <span class="price">$197/yr</span>
            </div>
        </div>
    </main>

    <nav>
        <a href="#" class="nav-item active">Market</a>
        <a href="#" class="nav-item" style="color:#00ff88;">Garden</a>
        <a href="#" class="nav-item" style="color:#007aff;">Junior</a>
        <a href="#" class="nav-item" style="color:#ff9500;">Vault</a>
    </nav>

</body>
</html>
