<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SOURCE">

    <title>SARA STADLER | THE SOURCE</title>
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; touch-action: none; font-family: 'Inter', sans-serif; }
        canvas { position: fixed; inset: 0; z-index: 1; }

        /* THE EVE TREE: Pulsing Center */
        .eve-heart { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 180px; border-radius: 50%; z-index: 10;
            background: radial-gradient(circle, var(--gold) 0%, transparent 75%);
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.6);
            animation: breathe 4s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        /* INTERFACE */
        .overlay { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .name { padding: 80px 20px; text-align: center; color: var(--gold); letter-spacing: 20px; font-weight: 100; font-size: 2rem; }
        .footer { padding: 60px 40px; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        
        .bank-btn { 
            background: rgba(212,175,55,0.1); border: 2px solid var(--gold); color: var(--gold); 
            padding: 30px 70px; border-radius: 100px; font-weight: 900; letter-spacing: 5px;
            backdrop-filter: blur(20px); box-shadow: 0 0 40px rgba(212,175,55,0.3); font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <canvas id="neural"></canvas>
    <div class="eve-heart"></div>
    
    <div class="overlay">
        <div class="name">SARA STADLER</div>
        <div class="footer">
            <button class="bank-btn" onclick="sync()">ACTIVATE BANKER</button>
            <div style="color: var(--blue); margin-top: 30px; letter-spacing: 6px; font-size: 0.7rem; opacity: 0.7;">144,000% FREQUENCY</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('neural');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Neural Blue Ripple
        window.addEventListener('pointermove', (e) => {
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.lineWidth = 1; ctx.beginPath();
            ctx.moveTo(window.innerWidth/2, window.innerHeight/2);
            ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
            setTimeout(() => ctx.clearRect(0,0,canvas.width, canvas.height), 100);
        });

        function sync() {
            // THE $1000 HANDSHAKE
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=Sara_Stadler_Sovereign_Sync";
        }

        // FORCE REFRESH: This stops the "12 times" problem
        window.onload = function() {
            if(!window.location.hash) {
                window.location = window.location + '#genesis';
                window.location.reload();
            }
        }
    </script>
</body>
</html>
