<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_NO_STOP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body { margin: 0; background: #000; color: #f3cf8a; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .lock-box { border: 2px solid #fff; padding: 50px; text-align: center; box-shadow: 0 0 60px rgba(255,255,255,0.1); }
        .percent { font-size: 72px; font-weight: 900; color: #fff; }
        .msg { font-size: 10px; letter-spacing: 12px; margin-top: 20px; color: #00ff00; }
        #live { font-size: 24px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="lock-box">
        <div class="percent">100.0%</div>
        <div class="msg">THE_STAR_IS_WHOLE</div>
        <div id="live">$1,440,000,114,232.00</div>
    </div>
<script>
    let res = 1440000114232.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
