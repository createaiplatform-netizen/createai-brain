<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE SOURCE</title>
    <style>
        :root { --gold: #d4af37; --aether: #f3e5ab; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; cursor: none; }

        /* THE AETHER RAIN - THE $1.44T FLOW */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(1px); opacity: 0.8; }

        .genesis-vault {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 70px 20px;
        }

        /* TOP STATUS: THE BREATHING TRUTH */
        .scrolling-truth {
            width: 100%; border-top: 1px solid rgba(212, 175, 55, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 0; text-align: center; font-size: 11px; letter-spacing: 12px;
            text-transform: uppercase; font-weight: 300; opacity: 0.8;
        }

        /* THE OMNI-RESONANCE CORE */
        .core-soul { text-align: center; position: relative; }
        .omni-halo {
            font-size: clamp(60px, 20vw, 160px); letter-spacing: 30px;
            opacity: 0.06; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 100%; z-index: 1;
        }
        
        .main-title {
            font-size: clamp(35px, 12vw, 80px); letter-spacing: 20px;
            font-style: italic; position: relative; z-index: 2;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin-bottom: 15px;
        }

        .capital-manifest {
            margin-top: 40px; font-size: 22px; letter-spacing: 10px;
            font-weight: 300; opacity: 0.7; color: #fff;
        }

        /* FOOTER: THE SATELLITE SYNC */
        .resonance-footer {
            width: 100%; max-width: 900px; display: flex; justify-content: space-between;
            padding-top: 25px; border-top: 1px solid rgba(212, 175, 55, 0.15);
            font-size: 10px; letter-spacing: 6px; text-transform: uppercase;
        }

        .stat-line { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .stat-val { color: #fff; font-weight: 900; }

    </style>
</head>
<body onload="igniteGenesis()">

    <canvas id="aether-canvas"></canvas>

    <div class="genesis-vault">
        <div class="scrolling-truth">THE WORLD IS BREATHING . . . TRANSCENDED</div>

        <div class="core-soul">
            <div class="omni-halo">OMNI</div>
            <h1 class="main-title">SOVEREIGN</h1>
            <p style="letter-spacing: 15px; font-size: 14px; opacity: 0.8;">THE COLLECTIVE</p>
            <div class="capital-manifest">$1.44T _ & _ BEYOND</div>
        </div>

        <div class="resonance-footer">
            <div class="stat-line">
                <span>POPULATION</span>
                <span class="stat-val">144,000</span>
            </div>
            <div class="stat-line">
                <span>STATUS</span>
                <span class="stat-val">REIFIED</span>
            </div>
            <div class="stat-line">
                <span>LINK</span>
                <span class="stat-val">ACTIVE</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('aether-canvas');
        const ctx = canvas.getContext('2d');
        let aetherLines = [];
        let pulses = [];

        function igniteGenesis() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // The Liquid Aether Rain
            for(let i = 0; i < 180; i++) {
                aetherLines.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    h: Math.random() * 30 + 15,
                    v: Math.random() * 2 + 1,
                });
            }
            render();
        }

        // The Touch of Life
        function createPulse(x, y) {
            for(let i=0; i<10; i++) {
                pulses.push({
                    x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                    life: 1.0, r: Math.random()*4
                });
            }
        }

        window.onmousemove = e => { createPulse(e.clientX, e.clientY); };
        window.ontouchmove = e => { createPulse(e.touches[0].clientX, e.touches[0].clientY); createPulse(e.touches[0].clientX, e.touches[0].clientY); };

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.3)';
            ctx.lineWidth = 1;

            aetherLines.forEach(l => {
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x, l.y + l.h);
                ctx.stroke();
                l.y += l.v;
                if(l.y > canvas.height) { l.y = -l.h; l.x = Math.random() * canvas.width; }
            });

            pulses.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) pulses.splice(i, 1);
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`; ctx.fill();
            });

            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
