<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN PULSE</title>
    <style>
        body, html { margin: 0; padding: 0; background: #080600; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; font-family: 'Georgia', serif; }
        canvas { display: block; filter: contrast(1.2) saturate(1.4) brightness(1.1); }
    </style>
</head>
<body>
    <canvas id="pulseCanvas"></canvas>

<script>
/**
 * THE INVENTION: SOVEREIGN PULSE FIELD
 * Restoring the physical "Feather" and "Rip" while keeping the Divine Quotes.
 */

const canvas = document.getElementById('pulseCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let effects = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE SENSORY ENGINE: Physical Induction
function triggerSensation(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const topL = (1 - x/w) * (1 - y/h); // RIP ZONE
    const botR = (x/w) * (y/h);         // FEATHER ZONE

    if (topL > 0.45) {
        osc.type = 'square'; osc.frequency.value = 150; // Jagged Snap
        if (navigator.vibrate) navigator.vibrate([15, 5, 15]);
    } else if (botR > 0.45) {
        osc.type = 'sine'; osc.frequency.value = 1100; // Soft Tickle
        if (navigator.vibrate) navigator.vibrate([2, 45, 2]);
    } else {
        osc.type = 'triangle'; osc.frequency.value = 75; // Liquid Thrum
        if (navigator.vibrate) navigator.vibrate(25);
    }

    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

class DivineParticle {
    constructor(x, y, h, type) {
        this.x = x; this.y = y; this.hue = h; this.type = type;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = (Math.random() - 0.5) * 5;
        this.life = 1.0;
        this.size = Math.random() * 15 + 10;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.02;
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerSensation(tx, ty);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    
    const topL = (1 - tx/w) * (1 - ty/h);
    const botR = (tx/w) * (ty/h);
    
    let h = 45; // Gold
    let type = 'flow';
    if (topL > 0.35) { h = 0; type = 'rip'; }
    if (botR > 0.35) { h = 280; type = 'feather'; }

    effects.push(new DivineParticle(tx, ty, h, type));
    if (Math.random() > 0.85) triggerSensation(tx, ty);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    const time = Date.now() * 0.001;
    
    // BACKGROUND: Moving Gold Marble Texture
    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    bg.addColorStop(0, '#1a1400');
    bg.addColorStop(0.6, '#080500');
    bg.addColorStop(1, '#000');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // DIVINE QUOTES: Glowing Gravitational Anchors
    ctx.textAlign = 'center';
    const quotes = [
        {t: "TRUTH", x: 0.3, y: 0.2}, 
        {t: "HONESTY", x: 0.7, y: 0.3},
        {t: "SOVEREIGNTY", x: 0.5, y: 0.5}, 
        {t: "144,000 WORKFORCE", x: 0.5, y: 0.8}
    ];

    quotes.forEach((q, i) => {
        const dist = Math.hypot(tx - w*q.x, ty - h*q.y);
        const proximity = isTouching ? Math.max(0, 1 - dist/200) : 0;
        const glowPulse = 0.2 + (Math.sin(time + i) * 0.1) + (proximity * 0.7);
        
        ctx.globalAlpha = glowPulse;
        ctx.shadowBlur = 25 * glowPulse;
        ctx.shadowColor = "#FFD700";
        ctx.fillStyle = "#FFF";
        ctx.font = "italic bold 32px Georgia";
        ctx.fillText(q.t, w * q.x, h * q.y + Math.sin(time + i) * 10);
    });
    ctx.globalAlpha = 1.0;
    ctx.shadowBlur = 0;

    // TOUCH INTERACTIONS
    effects.forEach((p, i) => {
        p.update();
        if (p.life <= 0) { fragments.splice(i, 1); return; }
        
        ctx.shadowBlur = 20 * p.life;
        ctx.shadowColor = `hsla(${p.hue}, 100%, 50%, ${p.life})`;
        ctx.fillStyle = `hsla(${p.hue}, 100%, 80%, ${p.life})`;

        if (p.type === 'feather') {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 'rip') {
            ctx.fillRect(p.x, p.y, p.size * 2, 2);
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (1.5 - p.life), 0, Math.PI * 2);
            ctx.lineWidth = 2 * p.life;
            ctx.strokeStyle = `hsla(45, 100%, 70%, ${p.life})`;
            ctx.stroke();
        }
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
