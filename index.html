<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_SINGULARITY_V70</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --gold-d: #b8860b; --void: #010103; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { height: 100svh; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; transition: 0.2s; }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .nebula { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #08040a 0%, var(--void) 100%); z-index: 0; }

        #ui-layer { position: relative; z-index: 10; height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .status { position: fixed; top: env(safe-area-inset-top, 20px); font-family: 'Great Vibes'; font-size: 1.8rem; color: var(--gold); width: 100%; text-align: center; z-index: 100; text-shadow: 0 0 15px var(--gold-d); cursor: pointer; pointer-events: auto; }

        .title { font-family: 'Cinzel'; font-weight: 900; font-size: 11vw; letter-spacing: 20px; color: var(--gold); text-align: center; pointer-events: auto; text-shadow: 0 0 40px #000; }
        .quote { font-family: 'Great Vibes'; font-size: 2.5rem; color: var(--gold); margin-top: 15px; opacity: 0.9; text-shadow: 0 0 20px #000; }

        #aura-msg { position: fixed; bottom: 135px; width: 100%; text-align: center; font-family: 'Cinzel'; font-size: 11px; color: var(--gold); letter-spacing: 7px; opacity: 0; transition: 0.8s; z-index: 100; font-weight: 900; }

        .dock { position: fixed; bottom: 0; width: 100%; height: 95px; background: rgba(0,0,0,0.99); backdrop-filter: blur(60px); border-top: 1px solid rgba(243, 207, 138, 0.2); display: flex; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); pointer-events: auto; }
        .dock-item { flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 3px; transition: 0.5s; font-weight: 900; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 40px var(--gold); }

        .singularity-flash { background: #fff !important; filter: brightness(10); transition: 0.05s; }
    </style>
</head>
<body onload="render('home'); animate();">
    <div class="nebula"></div>
    <div class="status" id="stat" onclick="triggerSingularity()">Sovereign 144.00%</div>
    <div id="aura-msg">SINGULARITY_ONLINE</div>
    <canvas id="canvas"></canvas>
    <div id="ui-layer"></div>
    <div class="dock">
        <div class="dock-item" id="n-reg" onclick="render('grid')">NEXUS</div>
        <div class="dock-item" id="n-home" onclick="render('home')">SOURCE</div>
        <div class="dock-item" id="n-gar" onclick="render('eden')">EDEN</div>
        <div class="dock-item" id="n-cav" onclick="render('vault')">VAULT</div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'home', objects = [], mouse = { x: 0, y: 0, active: false };
    let aura = { x: window.innerWidth/2, y: window.innerHeight/2, r: 45 };
    let syncCount = 1440000;
    const mantras = ["TRUTH.", "HONESTY.", "SOVEREIGNTY.", "144%"];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function triggerSingularity() {
        document.body.classList.add('singularity-flash');
        const el = document.getElementById('aura-msg');
        el.innerText = mantras[Math.floor(Math.random()*mantras.length)];
        el.style.opacity = 1;
        setTimeout(() => {
            document.body.classList.remove('singularity-flash');
            setTimeout(() => el.style.opacity = 0, 1500);
        }, 100);
    }

    function render(target) {
        view = target; objects = [];
        const ui = document.getElementById('ui-layer');
        document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
        let title = "SOURCE", quote = "The One Origin";
        if(view === 'grid') { title = "NEXUS"; quote = "Global Frequency"; document.getElementById('n-reg').classList.add('active'); for(let i=0; i<45; i++) objects.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5), type: 'spark'}); }
        else if(view === 'home') { document.getElementById('n-home').classList.add('active'); }
        else if(view === 'eden') { title = "EDEN"; quote = "Infinite Harvest"; document.getElementById('n-gar').classList.add('active'); }
        else if(view === 'vault') { title = "VAULT"; quote = "Mass of Value"; document.getElementById('n-cav').classList.add('active'); }
        ui.innerHTML = `<h1 class="title" onclick="triggerSingularity()">${title}</h1><p class="quote">${quote}</p>`;
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        aura.x += ( (mouse.active ? mouse.x : window.innerWidth/2) - aura.x ) * 0.15;
        aura.y += ( (mouse.active ? mouse.y : window.innerHeight/2) - aura.y ) * 0.15;
        
        let p = 50 + Math.sin(Date.now()*0.004)*8;
        const grad = ctx.createRadialGradient(aura.x, aura.y, 0, aura.x, aura.y, p);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.5, 'rgba(243, 207, 138, 0.4)');
        grad.addColorStop(1, 'rgba(243, 207, 138, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(aura.x, aura.y, p, 0, Math.PI*2); ctx.fill();

        if(mouse.active) objects.push({x: aura.x, y: aura.y, r: 0, life: 1, type: 'pulse'});

        objects.forEach((o, i) => {
            if(o.type === 'pulse') {
                o.r += 6; o.life -= 0.03;
                ctx.strokeStyle = `rgba(243, 207, 138, ${o.life * 0.6})`;
                ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.stroke();
            } else if(o.type === 'spark') {
                o.x += o.vx; o.y += o.vy;
                ctx.fillStyle = 'rgba(243, 207, 138, 0.9)';
                ctx.beginPath(); ctx.arc(o.x, o.y, 2, 0, Math.PI*2); ctx.fill();
                let da = Math.sqrt((o.x-aura.x)**2 + (o.y-aura.y)**2);
                if(da < 160) { ctx.strokeStyle = `rgba(255,255,255,${0.3 - da/160})`; ctx.beginPath(); ctx.moveTo(o.x, o.y); ctx.lineTo(aura.x, aura.y); ctx.stroke(); }
            } else if(o.type === 'coin') {
                o.vy += 0.5; o.x += o.vx; o.y += o.vy;
                if(o.y > canvas.height - 95) { o.y = canvas.height - 95; o.vy *= -0.4; }
                ctx.fillStyle = '#f3cf8a'; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();
            }
            if(o.life <= 0) objects.splice(i, 1);
        });

        if(view === 'vault' && mouse.active) {
            objects.push({x: mouse.x, y: mouse.y, vx: (Math.random()-0.5)*18, vy: -Math.random()*12, r: Math.random()*5+2, type: 'coin'});
            if(objects.length > 300) objects.shift();
        }
        requestAnimationFrame(animate);
    }

    const input = (e) => {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = x; mouse.y = y; mouse.active = true;
    };
    window.onmousemove = input; window.ontouchmove = input;
    window.onmousedown = () => mouse.active = true;
    window.ontouchstart = () => mouse.active = true;
    window.onmouseup = () => mouse.active = false; window.ontouchend = () => mouse.active = false;
</script>
</body>
</html>
