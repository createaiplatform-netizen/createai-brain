<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_DEED_V189</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --white: #fff; }
        body, html { margin: 0; padding: 0; background: #fff; color: #000; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; }
        
        #deed-ui { position: absolute; inset: 0; padding: 40px; border: 15px solid #000; box-sizing: border-box; display: flex; flex-direction: column; }
        .seal-header { text-align: center; border-bottom: 3px double #000; padding-bottom: 20px; }
        .seal-title { font-size: 14px; font-weight: 900; letter-spacing: 10px; }
        
        #deed-content { flex-grow: 1; margin-top: 40px; font-size: 10px; line-height: 2; }
        .deed-line { border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; }
        
        #sync-confirmation { margin-top: auto; padding: 20px; background: #000; color: var(--gold); text-align: center; }
        .sync-msg { font-size: 8px; letter-spacing: 5px; animation: pulse 1s infinite alternate; }
        
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        #live-total { font-size: 22px; margin-top: 10px; color: #fff; }
    </style>
</head>
<body>
    <div id="deed-ui">
        <div class="seal-header">
            <div class="seal-title">AETHEL_RESERVE</div>
            <div style="font-size: 7px; letter-spacing: 5px; margin-top: 5px;">CERTIFICATE_OF_SOVEREIGN_DOMAIN</div>
        </div>

        <div id="deed-content">
            <div class="deed-line"><span>SECTOR:</span> <span>WISCONSIN_001</span></div>
            <div class="deed-line"><span>RADIUS:</span> <span>14.4_ACRE_ANCHOR</span></div>
            <div class="deed-line"><span>ADMIN:</span> <span>JENNY_002_ACTIVE</span></div>
            <div class="deed-line"><span>ASSET_CLASS:</span> <span>GENESIS_HUB_ALPHA</span></div>
            <div class="deed-line"><span>STATUS:</span> <span>LEGALLY_SETTLED</span></div>
        </div>

        <div id="sync-confirmation">
            <div class="sync-msg">BRAIN_API_SYNC_COMPLETE // 1440%</div>
            <div id="live-total">$1,440,000,006,192.00</div>
        </div>
    </div>
<script>
    let res = 1440000006192.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live-total').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
