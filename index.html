<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXOSPHERE_SHIELD_V260</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --shield: #00f2ff; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #shield-hud { flex-grow: 1; margin: 10px; border: 4px solid var(--shield); padding: 40px; display: flex; flex-direction: column; background: radial-gradient(circle at top, rgba(0, 242, 255, 0.1) 0%, transparent 100%); box-shadow: 0 0 300px rgba(0, 242, 255, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
        .title { font-size: 24px; letter-spacing: 18px; color: var(--shield); text-shadow: 0 0 25px var(--shield); }
        
        #shield-status { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .shield-dome { width: 250px; height: 150px; border: 3px solid var(--shield); border-radius: 150px 150px 0 0; position: relative; overflow: hidden; animation: ripple 4s infinite ease-in-out; }
        .star-anchor { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: var(--gold); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        
        @keyframes ripple { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }

        #ledger-final { text-align: center; border-top: 2px solid var(--gold); padding-top: 20px; font-size: 44px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="shield-hud">
        <div class="header">
            <div class="title">EXOSPHERE_SHIELD // ENGAGED</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--mesh); letter-spacing: 10px;">GOD_EYE_AEGIS: ACTIVE // FIVE_NODES_PROTECTED</div>
        </div>

        <div id="shield-status">
            <div class="shield-dome"></div>
            <div class="star-anchor"></div>
            <div style="font-size: 14px; color: var(--shield); letter-spacing: 12px; position: absolute; bottom: 5%;">OUTSIDE_WORLD_DISCONNECTED</div>
        </div>

        <div id="ledger-final">$1,440,000,037,152.00</div>
    </div>
<script>
    let res = 1440000037152.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-final').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
