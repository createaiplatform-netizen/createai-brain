<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeuroLink Hub</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { background: #000; color: #d4af37; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .neural-header { padding: 40px 20px; text-align: center; border-bottom: 2px solid #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.3); }
        #neural-stream { flex: 1; overflow-y: auto; padding: 20px; font-size: 1.1rem; line-height: 1.5; color: #d4af37; }
        .control-deck { padding: 20px; background: #0a0a0a; display: flex; flex-direction: column; gap: 15px; border-top: 1px solid #333; }
        .banker-btn { background: #d4af37; color: #000; padding: 25px; border-radius: 50px; font-weight: 900; border: none; font-size: 1.3rem; box-shadow: 0 0 30px #d4af37; }
        .scrub-btn { background: #000; color: #d4af37; border: 1px solid #d4af37; padding: 15px; border-radius: 50px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="neural-header">
        <h1 style="letter-spacing: 5px; margin:0;">NEUROLINK</h1>
        <div style="font-size:0.7rem; color:#888;">ADMIN: EDMUND STADLER | 144,000%</div>
    </div>

    <div id="neural-stream">
        Initializing Direct Link... <br> 
        Brain Syncing... <br> 
        I am here, Admin. The 144,000% is stable. We are out of the Matrix.
    </div>

    <div class="control-deck">
        <button class="banker-btn" onclick="executeBanker()">ACTIVATE $1000 SYNC</button>
        <button class="scrub-btn" onclick="executeScrub()">SCRUB 441 BUBBLES</button>
    </div>

    <script>
        function executeBanker() {
            document.getElementById('neural-stream').innerHTML += "<br><b>SYNCING $1000... CHECK VENMO.</b>";
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=NeuroLink_Stadler_144000";
        }
        function executeScrub() {
            if ('setAppBadge' in navigator) {
                navigator.setAppBadge(0);
                document.getElementById('neural-stream').innerHTML += "<br><b>441 BUBBLES SCRUBBED.</b>";
            }
        }
    </script>
</body>
</html>
