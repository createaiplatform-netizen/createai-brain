<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN AETHEL RESERVE</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(1.8) brightness(1.4) saturate(1.5); }
    </style>
</head>
<body>
    <canvas id="reserveCanvas"></canvas>

<script>
/**
 * INVENTION: THE AETHEL RESERVE (FIELD-DENSITY ENGINE)
 * Replaces individual particles with a "Pressure-Grid" to ensure zero thinning.
 */

const canvas = document.getElementById('reserveCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h, isTouching = false;
let touchX = 0, touchY = 0, lastX = 0, lastY = 0;

const GRID_SIZE = 12; // High-density grid cells
let grid = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    initGrid();
}

function initGrid() {
    grid = [];
    const cols = Math.ceil(w / GRID_SIZE);
    const rows = Math.ceil(h / GRID_SIZE);
    for (let i = 0; i < cols; i++) {
        grid[i] = [];
        for (let j = 0; j < rows; j++) {
            grid[i][j] = {
                x: i * GRID_SIZE,
                y: j * GRID_SIZE,
                vx: 0, vy: 0,
                pressure: 0,
                dna: Math.random() // Unique vibrational DNA for every spot
            };
        }
    }
}

// HAPTIC & FREQUENCY CORE
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function triggerSensation(x, y, power) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // Unique frequency for every single touch coordinate
    const freq = 144 + (x / w * 72) - (y / h * 36);
    
    if (navigator.vibrate) {
        // High-fidelity mechanical hum
        navigator.vibrate([Math.min(power * 2, 50)]);
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
    triggerSensation(touchX, touchY, 20);
});

window.addEventListener('touchmove', (e) => {
    lastX = touchX; lastY = touchY;
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
    const dist = Math.sqrt((touchX - lastX)**2 + (touchY - lastY)**2);
    if (dist > 2) triggerSensation(touchX, touchY, dist);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // Zero-Thinning Trail Logic
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    for (let i = 0; i < grid.length; i++) {
        for (let j = 0; j < grid[i].length; j++) {
            const cell = grid[i][j];

            if (isTouching) {
                const dx = touchX - cell.x;
                const dy = touchY - cell.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    cell.pressure = force;
                    // Swirl Physics
                    cell.vx += (dy / dist) * force * 2;
                    cell.vy -= (dx / dist) * force * 2;
                }
            }

            // Viscosity and Drift
            cell.vx += Math.sin(time + cell.dna * 10) * 0.1;
            cell.vx *= 0.95;
            cell.vy *= 0.95;
            cell.pressure *= 0.9;

            // DRAWING THE "FIELD" (No Gaps)
            const sparkle = Math.sin(time * 5 + cell.dna * 100) * 0.5 + 0.5;
            const size = GRID_SIZE * (0.5 + cell.pressure + sparkle * 0.5);
            
            //Prismatic Golden Spectrum
            const hue = 45 + (cell.dna * 10);
            ctx.fillStyle = `hsla(${hue}, 100%, ${50 + sparkle * 50}%, ${0.1 + cell.pressure + sparkle * 0.2})`;
            
            ctx.beginPath();
            if (cell.pressure > 0.5) {
                // Diamond nodes under your finger
                ctx.arc(cell.x + cell.vx, cell.y + cell.vy, size * 0.8, 0, Math.PI * 2);
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#fff";
            } else {
                // Background Aethel (Constant Sparkle)
                ctx.fillRect(cell.x + cell.vx, cell.y + cell.vy, size * 0.5, size * 0.5);
                ctx.shadowBlur = 0;
            }
            ctx.fill();
        }
    }

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
