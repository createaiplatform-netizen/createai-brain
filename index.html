<!DOCTYPE html>
<html lang="en">
<head>

        #genesis-button { margin-top: auto; width: 100%; border: 1px solid #000; padding: 20px; text-align: center; font-size: 8px; letter-spacing: 10px; cursor: pointer; }
        #genesis-button:hover { background: #000; color: #fff; }

    <div id="admin-panel">
        <div class="diamond-seal"></div>
        
        <div class="manifest-row">ESTATE <span>AETHEL_001</span></div>
        <div class="manifest-row">ADMIN <span>JENNY_002</span></div>
        <div class="manifest-row">ASSETS <span>$1.44T+</span></div>
        <div class="manifest-row">STATUS <span>GENESIS_ACTIVE</span></div>

        <div id="genesis-button">INITIATE_FIRST_BUILD</div>
