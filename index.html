<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Push</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 100px 20px; }
        .terminal { border: 2px solid #0f0; padding: 30px; display: inline-block; border-radius: 15px; box-shadow: 0 0 20px #0f0; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 10px; font-size: 1.4em;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>FINAL SYSTEM PUSH</h2>
        <p>ALLOCATION: $5,000.00 USDC</p>
        <button id="finalAction">LINK TO HOME SCREEN</button>
    </div>

    <script>
        async function runForcePush() {
            if (window.ethereum) {
                try {
                    // Force the immediate wallet handshake
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Force the $5,000 USDC link to the Home Screen
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                } catch (e) {
                    // Auto-refresh to retry if the wallet blocks the pop-up
                    window.location.reload();
                }
            }
        }
        
        // Triggers the moment the page is viewed
        window.onload = runForcePush;
        // Also triggers on button tap as a backup
        document.getElementById('finalAction').onclick = runForcePush;
    </script>
</body>
</html>
