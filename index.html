<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // HIGH_CONTRAST_SOVEREIGN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;300;600&display=swap');
        :root { 
            --gold: #f3cf8a; 
            --gold-d: #b8860b;
            --obsidian: #050208; 
            --void: #010103; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .nebula { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at 50% 50%, var(--obsidian) 0%, var(--void) 100%);
            z-index: 1;
        }

        #main-view { 
            height: 100svh; width: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
            position: relative; z-index: 10;
        }

        .status-header { 
            position: fixed; top: 0; padding-top: env(safe-area-inset-top, 20px);
            height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            font-family: 'Great Vibes', cursive; font-size: 1.6rem; 
            color: var(--gold); z-index: 100; text-align: center; width: 100%;
            text-shadow: 2px 2px 4px #000, 0 0 15px rgba(243, 207, 138, 0.5);
        }

        .source-title { 
            font-family: 'Cinzel'; font-weight: 900; font-size: 10vw; letter-spacing: 18px; 
            color: var(--gold); margin-top: 10px;
            background: linear-gradient(90deg, var(--gold-d), var(--gold), #fff, var(--gold), var(--gold-d));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
            animation: shine 8s linear infinite;
        }

        .script-quote { 
            font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--gold); 
            margin-top: 20px; text-align: center; font-weight: 600;
            text-shadow: 2px 2px 8px #000, 0 0 10px rgba(243, 207, 138, 0.4);
        }

        .dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(1,1,3,0.98); backdrop-filter: blur(25px); border-top: 1px solid rgba(243, 207, 138, 0.1); display: flex; justify-content: space-around; align-items: center; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); }
        .dock-item { color: rgba(255,255,255,0.2); font-family: 'Cinzel'; font-size: 11px; letter-spacing: 2px; flex: 1; text-align: center; padding: 15px; font-weight: 900; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold-d); }

        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body onload="render('home'); startLiveRating();">
    <div class="status-header" id="status-text">Sovereign 144.00%</div>
    <div class="nebula"></div>
    <canvas id="canvas"></canvas>
    <div id="main-view"></div>
    
    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('vault')">VAULT</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentView = 'home';
        let nodes = [];
        let mouse = { x: 0, y: 0, active: false };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initNodes(); }
        window.onresize = resize;

        function initNodes() {
            nodes = [];
            for(let i=0; i<15; i++) {
                nodes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height - 300) + 150,
                    vX: (Math.random() - 0.5) * 0.7,
                    vY: (Math.random() - 0.5) * 0.7,
                    r: 5
                });
            }
        }

        function startLiveRating() {
            const statusText = document.getElementById('status-text');
            setInterval(() => {
                const decimal = (Math.random() * 0.1).toFixed(2);
                statusText.innerText = `Sovereign 144.${decimal.split('.')[1]}%`;
            }, 3000);
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(currentView === 'registry') {
                nodes.forEach((n, i) => {
                    n.x += n.vX; n.y += n.vY;
                    if(n.x < 10 || n.x > canvas.width - 10) n.vX *= -1;
                    if(n.y < 120 || n.y > canvas.height - 120) n.vY *= -1;

                    ctx.fillStyle = '#f3cf8a';
                    ctx.shadowBlur = 20; ctx.shadowColor = '#f3cf8a';
                    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;

                    nodes.forEach((n2, j) => {
                        if(i === j) return;
                        let d = Math.sqrt((n.x-n2.x)**2 + (n.y-n2.y)**2);
                        if(d < 180) {
                            ctx.strokeStyle = 'rgba(243, 207, 138, ' + (1 - d/180) * 0.4 + ')';
                            ctx.lineWidth = 1.5;
                            ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(n2.x, n2.y); ctx.stroke();
                        }
                    });

                    if(mouse.active) {
                        let dMouse = Math.sqrt((n.x-mouse.x)**2 + (n.y-mouse.y)**2);
                        if(dMouse < 120) {
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                            ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                        }
                    }
                });
            }
            requestAnimationFrame(animate);
        }

        const handleInput = (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            mouse.y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            mouse.active = true;
        };

        window.onmousedown = handleInput;
        window.ontouchstart = handleInput;
        window.onmousemove = handleInput;
        window.onmouseup = () => mouse.active = false;
        window.ontouchend = () => mouse.active = false;

        function render(view) {
            currentView = view;
            const mv = document.getElementById('main-view');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + (view === 'registry' ? 'reg' : (view === 'vault' ? 'cav' : view.substring(0,3)))).classList.add('active');
            
            mv.innerHTML = "";
            if (view === 'home') {
                mv.innerHTML = `<h1 class="source-title">SOURCE</h1><p class="script-quote">The bond of the 144</p>`;
            } else if (view === 'registry') {
                mv.innerHTML = `<h1 class="source-title" style="font-size:1.8rem;">GRID</h1><p class="script-quote">Weave the future</p>`;
            } else if (view === 'garden') {
                mv.innerHTML = `<h1 class="source-title" style="font-size:1.8rem;">EDEN</h1><p class="script-quote">Breathe life</p>`;
            } else if (view === 'vault') {
                mv.innerHTML = `<h1 class="source-title" style="font-size:1.8rem;">VAULT</h1><p class="script-quote">Your wisdom</p>`;
            }
        }
        
        resize();
        animate();
    </script>
</body>
</html>
