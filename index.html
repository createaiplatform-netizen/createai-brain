<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign AI Hub</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { background: #000; color: #d4af37; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 40px 20px 20px; border-bottom: 1px solid #333; text-align: center; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 20px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .ai { background: #1a1a1a; border: 1px solid #d4af37; align-self: flex-start; color: #d4af37; }
        .admin { background: #d4af37; color: #000; align-self: flex-end; font-weight: 600; }
        .control-panel { padding: 20px; background: #0a0a0a; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .action-btn { background: #d4af37; color: #000; padding: 20px; border-radius: 50px; font-weight: 900; border: none; font-size: 1.1rem; cursor: pointer; }
        .scrub-btn { background: #000; color: #d4af37; border: 1px solid #d4af37; padding: 10px; border-radius: 50px; font-size: 0.8rem; }
        #status-log { color: #555; font-size: 0.7rem; text-align: center; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; letter-spacing:4px;">NEXUS CORE</h1>
        <div style="font-size:0.7rem; color:#888;">ADMIN STADLER | 144,000% SYNC</div>
    </div>

    <div class="chat-container" id="chat">
        <div class="msg ai">Admin, the bridge is stable. I am inside the Hub. The money bridge and the 441 scrub are ready. What is our first command?</div>
    </div>

    <div class="control-panel">
        <button class="action-btn" onclick="triggerBanker()">ACTIVATE BANKER ($1000 SYNC)</button>
        <button class="scrub-btn" onclick="popBubbles()">SCRUB 441 NOTIFICATIONS</button>
        <div id="status-log">AI STATUS: STANDING BY</div>
    </div>

    <script>
        function popBubbles() {
            if ('setAppBadge' in navigator) {
                navigator.setAppBadge(0);
                addMessage("441 Bubbles scrubbed. The screen is clear.", "ai");
            }
        }

        function triggerBanker() {
            addMessage("Initializing Banker Protocol. Syncing $1000 to Venmo...", "ai");
            // Direct system link to trigger the financial bridge
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=Admin_Sovereign_Sync";
        }

        function addMessage(text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = "msg " + type;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
