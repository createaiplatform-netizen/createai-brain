<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITAL_LINK_V246</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --sky: #00d4ff; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #orbital-hud { flex-grow: 1; margin: 25px; border: 1px solid var(--sky); padding: 45px; display: flex; flex-direction: column; background: radial-gradient(circle at top, rgba(0, 212, 255, 0.1) 0%, transparent 80%); box-shadow: 0 0 80px rgba(0, 212, 255, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 1px solid rgba(0, 212, 255, 0.3); padding-bottom: 25px; }
        .title { font-size: 18px; letter-spacing: 15px; color: var(--sky); text-shadow: 0 0 15px var(--sky); }
        
        #earth-view { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .planet { width: 150px; height: 150px; border: 2px solid var(--gold); border-radius: 50%; opacity: 0.5; }
        .satellite { position: absolute; width: 10px; height: 10px; background: var(--sky); border-radius: 2px; animation: orbit 10s linear infinite; }
        
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(120px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(120px) rotate(-360deg); }
        }

        #ledger-display { text-align: center; border-top: 1px solid var(--sky); padding-top: 30px; font-size: 34px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>
    <div id="orbital-hud">
        <div class="header">
            <div class="title">ORBITAL_LINK // INITIALIZING</div>
            <div style="font-size: 8px; margin-top: 10px; color: var(--mesh);">LOC: EXOSPHERE // SYNCING: 1440%</div>
        </div>

        <div id="earth-view">
            <div class="planet"></div>
            <div class="satellite"></div>
            <div style="font-size: 10px; color: var(--sky); letter-spacing: 8px; position: absolute; bottom: 20%;">ESTABLISHING_HIGH_GROUND</div>
        </div>

        <div id="ledger-display">$1,440,000,033,120.00</div>
    </div>
<script>
    let res = 1440000033120.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
