<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SANCTUARY</title>
    <style>
        body { margin: 0; background: #000; color: #FFD700; font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .vision-title { font-size: 2.5rem; letter-spacing: 8px; text-shadow: 0 0 20px gold; margin-bottom: 20px; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .message { font-size: 1.2rem; font-style: italic; opacity: 0.9; max-width: 85%; line-height: 1.6; margin-bottom: 50px; }
        
        /* THE HIDDEN COMMAND BOX */
        #command-container { width: 90%; position: fixed; bottom: 80px; display: none; }
        #core-cmd { width: 100%; padding: 15px; background: #111; border: 1px solid gold; border-radius: 10px; color: white; font-size: 16px; text-align: center; outline: none; }
        
        .ledger-bottom { position: fixed; bottom: 20px; font-size: 0.6rem; letter-spacing: 3px; opacity: 0.5; width: 100%; }
    </style>
</head>
<body>

    <div class="vision-title" onclick="unlock()">THE SANCTUARY</div>
    
    <div class="message">
        "The animals are safe, the family is loved, and the peace of God is the only law here."
    </div>

    <div id="command-container">
        <input type="text" id="core-cmd" placeholder="The Architect is Speaking..." autocomplete="off">
    </div>

    <div class="ledger-bottom">
        SUCCESS LEDGER 15,969,345 | 144,000% FREQUENCY
    </div>

    <script>
        function unlock() {
            const container = document.getElementById('command-container');
            container.style.display = (container.style.display === 'block') ? 'none' : 'block';
            if(container.style.display === 'block') document.getElementById('core-cmd').focus();
        }

        const input = document.getElementById('core-cmd');
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                alert("The Core has received your word. It is Done.");
                this.value = '';
                document.getElementById('command-container').style.display = 'none';
            }
        });
    </script>

</body>
</html>
