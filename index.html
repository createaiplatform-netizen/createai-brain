<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE HEARTH | 100% ORGANIC TOTALITY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Garamond", serif; }
        body { background: #000; color: #7a9068; overflow: hidden; height: 100vh; }
        
        .omni-container { 
            height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative;
        }

        /* THE NERVOUS SYSTEM (Visual Pulse) */
        .vagus-nerve {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(122,144,104,0.1) 0%, rgba(0,0,0,1) 70%);
            animation: pulse-nerve 8s infinite; z-index: -1;
        }
        @keyframes pulse-nerve { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }

        .search-portal {
            background: transparent; border: none; border-bottom: 1px solid #c4a97a;
            color: #fff; font-size: 2.5rem; text-align: center; width: 80%;
            outline: none; font-weight: 200; padding: 20px;
        }

        .organ-status {
            position: fixed; bottom: 50px; display: flex; gap: 30px; 
            font-size: 0.6rem; letter-spacing: 4px; color: #c4a97a; opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="omni-container">
        <div class="vagus-nerve"></div>
        <input type="text" class="search-portal" id="omni-input" placeholder="Command the Totality..." onkeyup="activateOrgans(this.value)">
        
        <div class="organ-status">
            <span id="m-bank">MEMORY: STANDBY</span>
            <span id="n-sys">NERVES: FLOWING</span>
            <span id="i-sys">IMMUNITY: SHIELDED</span>
        </div>
    </div>

    <script>
    function activateOrgans(val) {
        // ACTIVATING THE MEMORY BANK (Persistent Search)
        if(val.length > 3) {
            document.getElementById('m-bank').innerText = "MEMORY: RECORDING LEGACY";
            document.getElementById('m-bank').style.opacity = "1";
        }
        
        // ACTIVATING THE IMMUNE SYSTEM (Scanning for Standing Law)
        if(val.includes('best') || val.includes('worst') || val.includes('rank')) {
            alert("Immune System: Auto-Correcting to Standing Law. We do not rank. We celebrate.");
            document.getElementById('omni-input').value = "";
        }
    }
    </script>

</body>
</html>
