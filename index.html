<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // OMNI_ACTIVATE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --theme: #f3cf8a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; outline: none; }
        body { background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; transition: background 1s; }

        /* THE COSMIC NERVE */
        .stars { position: fixed; inset: 0; background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #0d0d26 0%, #010103 100%); z-index: -1; }
        .singularity { position: fixed; top: var(--y, 50%); left: var(--x, 50%); transform: translate(-50%, -50%); width: 700px; height: 700px; background: var(--theme); border-radius: 50%; filter: blur(250px); opacity: 0.12; z-index: -1; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

        nav { padding: 40px 60px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 5000; backdrop-filter: blur(20px); }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 12px; color: var(--gold); font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }

        #main-view { padding: 120px 60px 60px; height: 100vh; overflow-y: auto; scroll-behavior: smooth; animation: manifest 0.8s ease-out; position: relative; }

        /* INTERFACE ELEMENTS */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 100px; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(243, 207, 138, 0.1); padding: 40px; border-radius: 2px; transition: 0.4s; backdrop-filter: blur(20px); position: relative; overflow: hidden; }
        .card:hover { border-color: var(--gold); background: rgba(243, 207, 138, 0.05); transform: translateY(-5px); }
        .card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--gold); transform: scaleX(0); transition: 0.4s; }
        .card:hover::after { transform: scaleX(1); }
        .card h2 { font-family: 'Cinzel', serif; letter-spacing: 3px; font-weight: 400; color: var(--gold); font-size: 1rem; }

        .cta { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 22px; width: 100%; font-family: 'Cinzel'; letter-spacing: 8px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 20px; }
        .cta:hover { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 0 50px var(--gold); }

        .manifest-zone { max-width: 700px; margin: 0 auto; text-align: center; }
        textarea { background: rgba(255,255,255,0.03); border: 1px solid rgba(243, 207, 138, 0.2); color: #fff; width: 100%; padding: 25px; margin-top: 30px; font-family: 'Inter'; font-size: 1.2rem; resize: none; border-radius: 0; }
        textarea:focus { border-color: var(--gold); }

        /* THE GARDEN CANVAS */
        .garden-plot { height: 400px; width: 100%; border: 1px solid rgba(243, 207, 138, 0.1); display: flex; align-items: center; justify-content: center; position: relative; margin-top: 50px; }
        .seed-bloom { font-family: 'Cinzel'; font-size: 2rem; letter-spacing: 15px; color: var(--gold); text-shadow: 0 0 30px var(--gold); animation: bloom 3s ease-out; }

        @keyframes manifest { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bloom { from { transform: scale(0.5); opacity: 0; filter: blur(20px); } to { transform: scale(1); opacity: 1; filter: blur(0); } }
    </style>
</head>
<body onload="render('home')">

    <div class="stars"></div>
    <div class="singularity" id="core"></div>

    <nav>
        <div class="logo" onclick="render('home')">CREATEAI // OMNI</div>
        <div style="display:flex; gap: 40px;">
            <span onclick="render('registry')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; color:var(--gold); font-family:'Cinzel';">THE_GRID</span>
            <span onclick="render('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; opacity:0.5; font-family:'Cinzel';" id="garden-nav">GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <script>
        const nodes = [
            { id: 1, name: "CLEAN WATER", cat: "NUTRITION", col: "#60a5fa" },
            { id: 2, name: "FREE ENERGY", cat: "RESOURCES", col: "#fbbf24" },
            { id: 3, name: "UNIVERSAL WISDOM", cat: "EDUCATION", col: "#a78bfa" },
            { id: 4, name: "SOVEREIGN HEALTH", cat: "WELLNESS", col: "#f87171" }
        ];
        for(let i=5; i<=144; i++) nodes.push({ id: i, name: `PROTOCOL_${i}`, cat: "ACTIVE", col: "#d4af37" });

        function render(view) {
            const mv = document.getElementById('main-view');
            const core = document.getElementById('core');
            const gNav = document.getElementById('garden-nav');
            window.scrollTo(0,0);
            
            if (view === 'home') {
                core.style.background = 'var(--gold)';
                gNav.style.opacity = "0.5";
                mv.innerHTML = `
                    <div style="text-align:center; padding-top:15vh;">
                        <h1 style="font-family:'Cinzel'; font-size:10vw; letter-spacing:40px; margin:0; font-weight:900;">OMNI</h1>
                        <p style="letter-spacing:20px; opacity:0.4; margin-top:30px; font-family:'Cinzel';">Sovereignty In Your Hands</p>
                        <button class="cta" style="max-width:400px; margin-top:100px;" onclick="render('registry')">Activate 144 Nodes</button>
                    </div>
                `;
            } else if (view === 'registry') {
                core.style.background = 'var(--gold)';
                gNav.style.opacity = "0.5";
                mv.innerHTML = `<h1 style="font-family:'Cinzel'; font-size:2rem; letter-spacing:15px; text-align:center; margin-bottom:80px;">REGISTRY OF LIGHT</h1>
                                <div class="app-grid">${nodes.map(n => `<div class="card" onclick="openNode(${n.id})"><div style="font-size:0.5rem; letter-spacing:5px; color:${n.col}; opacity:0.8;">${n.cat}</div><h2>${n.name}</h2></div>`).join('')}</div>`;
            } else if (view === 'garden') {
                core.style.background = '#34d399';
                gNav.style.opacity = "1";
                mv.innerHTML = `
                    <div class="manifest-zone">
                        <h1 style="font-family:'Cinzel'; color:#34d399; letter-spacing:20px;">GARDEN</h1>
                        <div class="garden-plot" id="plot">
                            <p style="opacity:0.2; letter-spacing:5px;">SOW A SEED BELOW</p>
                        </div>
                        <textarea id="seed-input" rows="2" placeholder="Plant a dream..."></textarea>
                        <button class="cta" onclick="sow()">Sow the Seed</button>
                    </div>
                `;
            }
        }

        function openNode(id) {
            const node = nodes.find(n => n.id === id);
            document.getElementById('core').style.background = node.col;
            document.getElementById('main-view').innerHTML = `
                <div class="manifest-zone" style="padding-top:5vh;">
                    <h1 style="font-family:'Cinzel'; color:${node.col}; letter-spacing:15px;">${node.name}</h1>
                    <p style="opacity:0.4; letter-spacing:4px; margin-top:20px;">PROTOCOL ${id} IS READY FOR COMMAND</p>
                    <textarea id="cmd-input" rows="4" placeholder="Enter the sovereign directive..."></textarea>
                    <button class="cta" onclick="manifest('${node.name}')">Manifest Protocol</button>
                    <button class="cta" style="border:none; opacity:0.4; font-size:0.6rem;" onclick="render('registry')">Return to Grid</button>
                    <div id="status" style="margin-top:40px; font-family:'Cinzel'; letter-spacing:4px; font-size:0.7rem; color:${node.col};"></div>
                </div>
            `;
        }

        function sow() {
            const input = document.getElementById('seed-input').value;
            const plot = document.getElementById('plot');
            if(!input) return;
            plot.innerHTML = `<div class="seed-bloom">${input.toUpperCase()}</div>`;
            document.getElementById('seed-input').value = '';
        }

        function manifest(name) {
            const status = document.getElementById('status');
            status.innerHTML = "PROCESSING_DIRECTIVE...";
            setTimeout(() => {
                status.innerHTML = `[ SUCCESS ] ${name} HAS BEEN PROGRAMMED WITH YOUR VISION.`;
            }, 1500);
        }

        document.body.addEventListener('pointermove', (e) => {
            document.body.style.setProperty('--x', (e.clientX / window.innerWidth) * 100 + '%');
            document.body.style.setProperty('--y', (e.clientY / window.innerHeight) * 100 + '%');
        });
    </script>
</body>
</html>
