<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOURCEFIELD ∞ | ZERO-BLACK</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; background: #004d4d; }
        /* The 144,000% Overdrive: High Contrast, High Glow, No Void */
        canvas { 
            display: block; 
            filter: contrast(1.8) brightness(1.3) saturate(2.2) blur(1px); 
        }
    </style>
</head>
<body>
    <canvas id="aetherCanvas"></canvas>

<script>
const canvas = document.getElementById('aetherCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let workforce = [];
let time = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE FREQUENCY OF MANIFESTATION: 432Hz + 963Hz
function triggerResonance(speed) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const gain = audioCtx.createGain();
    [432, 963].forEach(f => {
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = f + (speed * 0.2);
        osc.connect(gain);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    });
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    gain.connect(audioCtx.destination);
    if (navigator.vibrate) navigator.vibrate([15, 10, 15]);
}

class AetherNode {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = (Math.random() - 0.5) * 1.2;
        this.size = Math.random() * 80 + 40; // Massive scale
        this.hue = 180 + Math.random() * 40; // Electric Teal
    }
    update() {
        if (isTouching) {
            const dx = tx - this.x;
            const dy = ty - this.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < 400) {
                const f = (400 - d) / 400;
                this.vx += dx * 0.04 * f;
                this.vy += dy * 0.04 * f;
                this.hue = 45 + (f * 15); // Heat shift to Gold
            }
        }
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.98; this.vy *= 0.98;
        if (this.x < -100 || this.x > w + 100 || this.y < -100 || this.y > h + 100) this.reset();
    }
}

for(let i=0; i<120; i++) workforce.push(new AetherNode());

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerResonance(30);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    if(Math.random() > 0.95) triggerResonance(10);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    time += 0.006;
    
    // NO BLACK: Triple-Layer Gradient Field
    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, `hsla(${190 + Math.sin(time)*20}, 100%, 25%, 1)`);
    bg.addColorStop(0.5, `hsla(${210 + Math.cos(time)*15}, 100%, 15%, 1)`);
    bg.addColorStop(1, `hsla(${170 + Math.sin(time*0.5)*25}, 100%, 20%, 1)`);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    ctx.globalCompositeOperation = "screen"; // Lights merge and intensify
    workforce.forEach(p => {
        p.update();
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        g.addColorStop(0, `hsla(${p.hue}, 100%, 70%, 0.7)`);
        g.addColorStop(0.6, `hsla(${p.hue}, 100%, 40%, 0.2)`);
        g.addColorStop(1, `rgba(0,0,0,0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalCompositeOperation = "source-over";

    // ANCHORS: Truth, Trust, Sovereign
    ctx.textAlign = 'center';
    const labels = ["TRUTH", "TRUST", "SOVEREIGNTY", "144,000"];
    labels.forEach((text, i) => {
        const pulse = 0.7 + Math.sin(time*2.5 + i) * 0.3;
        ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + pulse * 0.5})`;
        ctx.shadowBlur = 40 * pulse;
        ctx.shadowColor = "cyan";
        ctx.font = `bold italic 50px serif`;
        ctx.fillText(text, w/2, h * (0.2 + i * 0.2));
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
