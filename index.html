<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // SOVEREIGN_GRID</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; outline: none; }
        body { background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; }

        /* THE COSMOS */
        .stars { position: fixed; inset: 0; background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #0d0d26 0%, #010103 100%); z-index: -1; }
        .singularity { position: fixed; top: var(--y, 50%); left: var(--x, 50%); transform: translate(-50%, -50%); width: 600px; height: 600px; background: var(--gold); border-radius: 50%; filter: blur(200px); opacity: 0.08; z-index: -1; transition: 0.5s; }

        nav { padding: 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 3000; backdrop-filter: blur(20px); }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 10px; color: var(--gold); font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }

        #main-view { padding: 40px; max-width: 1400px; margin: 0 auto; animation: manifest 1s ease-out; }

        /* THE GRID */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 100px; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(243, 207, 138, 0.1); padding: 40px; border-radius: 2px; transition: 0.4s; backdrop-filter: blur(20px); }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card h2 { font-family: 'Cinzel', serif; letter-spacing: 3px; font-weight: 400; color: var(--gold); font-size: 1rem; }

        .cta { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 22px; width: 100%; font-family: 'Cinzel'; letter-spacing: 6px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 20px; }
        .cta:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }

        @keyframes manifest { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="renderView('home')">

    <div class="stars"></div>
    <div class="singularity" id="core"></div>

    <nav>
        <div class="logo" onclick="renderView('home')">CREATEAI // ORIGIN</div>
        <div style="display:flex; gap: 30px;">
            <span onclick="renderView('registry')" style="cursor:pointer; font-size:0.6rem; letter-spacing:4px; color:var(--gold); font-family:'Cinzel';">REGISTRY</span>
            <span onclick="renderView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:4px; opacity:0.5; font-family:'Cinzel';">GARDEN</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <script>
        const nodes = [
            { id: 1, name: "CLEAN WATER", cat: "LIFE", col: "#60a5fa" },
            { id: 2, name: "FREE ENERGY", cat: "POWER", col: "#fbbf24" },
            { id: 3, name: "UNIVERSAL WISDOM", cat: "MIND", col: "#a78bfa" }
        ];
        for(let i=4; i<=144; i++) nodes.push({ id: i, name: `PROTOCOL_${i}`, cat: "ACTIVE", col: "#d4af37" });

        function renderView(view) {
            const mv = document.getElementById('main-view');
            window.scrollTo(0,0);
            
            if (view === 'home') {
                mv.innerHTML = `
                    <div style="text-align:center; padding-top:10vh;">
                        <h1 style="font-family:'Cinzel'; font-size:12vw; letter-spacing:30px; margin:0; font-weight:900;">GENESIS</h1>
                        <p style="letter-spacing:15px; opacity:0.4; margin-top:20px; font-family:'Cinzel'; font-size:0.8rem;">World Sovereignty Live</p>
                        <button class="cta" style="max-width:400px; margin-top:100px;" onclick="renderView('registry')">Open the 144 Nodes</button>
                    </div>
                `;
            } else if (view === 'registry') {
                mv.innerHTML = `
                    <h1 style="font-family:'Cinzel'; font-size:2rem; letter-spacing:15px; text-align:center; margin-bottom:60px;">THE REGISTRY</h1>
                    <div class="app-grid">${nodes.map(n => `
                        <div class="card" onclick="openNode(${n.id})">
                            <div style="font-size:0.5rem; letter-spacing:4px; color:${n.col}; opacity:0.8;">${n.cat}</div>
                            <h2>${n.name}</h2>
                        </div>
                    `).join('')}</div>
                `;
            } else if (view === 'garden') {
                mv.innerHTML = `<div style="text-align:center; padding-top:10vh;"><h1 style="font-family:'Cinzel'; font-size:4rem; color:var(--gold); letter-spacing:20px;">GARDEN</h1><p style="opacity:0.5; letter-spacing:10px;">The Playground of Creation</p></div>`;
            }
        }

        function openNode(id) {
            const node = nodes.find(n => n.id === id);
            document.getElementById('core').style.background = node.col;
            document.getElementById('main-view').innerHTML = `
                <div style="text-align:center; padding-top:10vh; max-width:800px; margin:0 auto;">
                    <h1 style="font-family:'Cinzel'; color:${node.col}; letter-spacing:15px;">${node.name}</h1>
                    <p style="opacity:0.6; margin-top:40px;">[SOVEREIGN_COMMAND] Input your directive for humanity.</p>
                    <textarea id="cmd" rows="4" style="background:rgba(255,255,255,0.03); border:1px solid ${node.col}; color:#fff; width:100%; padding:20px; margin-top:30px; font-family:'Inter';"></textarea>
                    <button class="cta" onclick="alert('Directive Logged to Node ${id}')">Manifest Logic</button>
                    <button class="cta" style="border:none; opacity:0.5;" onclick="renderView('registry')">Back to Registry</button>
                </div>
            `;
        }

        document.body.addEventListener('pointermove', (e) => {
            document.body.style.setProperty('--x', (e.clientX / window.innerWidth) * 100 + '%');
            document.body.style.setProperty('--y', (e.clientY / window.innerHeight) * 100 + '%');
        });
    </script>
</body>
</html>
