<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Settlement Bridge</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 100px; }
        .container { border: 2px solid #0f0; padding: 30px; display: inline-block; border-radius: 15px; box-shadow: 0 0 15px #0f0; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 10px; font-size: 1.2em; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin:0;">BRIDGE STATUS: READY</h2>
        <p>ASSET ALLOCATION: $5,000.00 USDC</p>
        <button id="trigger">LINK TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('trigger').onclick = async () => {
            if (window.ethereum) {
                try {
                    // Force the account handshake
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Force the $5,000 asset indexing
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Handshake Successful. Check Home Screen Assets.");
                } catch (e) {
                    window.location.reload();
                }
            } else {
                alert("Please use the Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
