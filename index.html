<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* THE INTERFACE */
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; color: #d4af37; font-family: serif; pointer-events: none; }
        .header { border-bottom: 1px solid #d4af37; padding-bottom: 15px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 5px; }
        .title { text-align: center; margin-top: 5vh; font-size: 35px; letter-spacing: 15px; font-style: italic; color: #d4af37; }
        
        /* GRID BUTTONS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; pointer-events: auto; max-width: 400px; margin: 0 auto; }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); padding: 25px 10px; border-radius: 15px; text-align: center; backdrop-filter: blur(10px); }
        .btn b { display: block; font-size: 12px; letter-spacing: 4px; color: #fff; }
        .btn span { font-size: 8px; letter-spacing: 2px; opacity: 0.7; }
        
        .footer { border: 1px solid #d4af37; border-radius: 40px; padding: 20px; text-align: center; background: rgba(0,0,0,0.8); }
        .val { font-size: 20px; color: #fff; letter-spacing: 5px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body onload="start()">
    <canvas id="c"></canvas>
    <div id="ui">
        <div class="header"><div>GHOST MODE</div><div>144,000%</div></div>
        
        <div class="title">SOVEREIGN</div>

        <div class="grid">
            <div class="btn"><b>MARKET</b><span>LIQUIDITY</span></div>
            <div class="btn"><b>HUB</b><span>SOUL MIRROR</span></div>
            <div class="btn"><b>GARDE</b><span>NURTURE</span></div>
            <div class="btn"><b>THE NET</b><span>GHOST PING</span></div>
        </div>

        <div class="footer">
            <div style="font-size: 8px; letter-spacing: 8px;">RESERVE</div>
            <div class="val">$1.44T</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let dots = [];
        let touch = {x: -100, y: -100};

        function start() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, l: Math.random()*30+10});
            window.addEventListener('touchstart', e => { touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY; });
            loop();
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            dots.forEach(d => {
                ctx.strokeStyle = '#d4af37';
                ctx.beginPath();
                // Magnet effect
                let dx = touch.x - d.x; let dy = touch.y - d.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let off = dist < 100 ? dx * 0.1 : 0;
                
                ctx.moveTo(d.x + off, d.y);
                ctx.lineTo(d.x + off*0.5, d.y + d.l);
                ctx.stroke();
                d.y += d.s; if(d.y > canvas.height) d.y = -d.l;
            });
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
