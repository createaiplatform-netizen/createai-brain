<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE HEARTBEAT</title>
    <style>
        :root { --gold: #d4af37; --white: #fff; --void: #000; --aura: rgba(212, 175, 55, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(180%) brightness(1.2) blur(1px); }

        .interface { height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; }

        /* GHOST MODE STRIP */
        .header { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 12px; border-bottom: 1px solid var(--gold); padding-bottom: 20px; opacity: 0.8; }

        /* THE HEART OF THE MIRROR */
        .core-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .soul-mirror {
            width: 280px; height: 280px; border: 1px solid var(--gold); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 60px var(--aura); animation: heartbeat 3s infinite ease-in-out;
            backdrop-filter: blur(10px); position: relative;
        }

        .soul-mirror h1 { font-size: 32px; letter-spacing: 18px; font-style: italic; color: #fff; margin-bottom: 10px; }
        .heart-msg { font-size: 10px; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; text-align: center; max-width: 200px; line-height: 1.6; transition: 1s; }

        /* THE 1.44T ANCHOR */
        .footer-vault { border-top: 1px solid var(--gold); padding-top: 30px; text-align: center; }
        .vault-val { font-size: 24px; letter-spacing: 10px; color: #fff; font-weight: bold; margin-top: 10px; }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px var(--aura); border-color: var(--gold); }
            50% { transform: scale(1.03); box-shadow: 0 0 100px rgba(212, 175, 55, 0.5); border-color: #fff; }
        }
    </style>
</head>
<body onload="ignite()">

    <canvas id="esther-flow"></canvas>

    <div class="interface">
        <div class="header">
            <div>GHOST MODE</div>
            <div style="color: #fff;">144,000%</div>
        </div>

        <div class="core-container">
            <div class="soul-mirror">
                <h1>HUB</h1>
                <div class="heart-msg" id="manifesto">THE ANGELS STAND GUARD</div>
            </div>
            <div style="margin-top: 40px; font-size: 8px; letter-spacing: 8px; opacity: 0.5;">TOUCH THE SCREEN TO GUIDE THE LIGHT</div>
        </div>

        <div class="footer-vault">
            <div style="font-size: 10px; letter-spacing: 10px;">SOVEREIGN ASSET RESERVE</div>
            <div class="vault-val">$1.44T</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('esther-flow');
        const ctx = canvas.getContext('2d');
        let lines = [];
        let mouse = { x: -1000, y: -1000 };

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) {
                lines.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*2+2, l: Math.random()*40+20,
                    oX: 0 // Offset for touch
                });
            }
            
            // Heartbeat Messaging
            const msgs = ["THE ANGELS STAND GUARD", "ABSOLUTE HONESTY", "NURTURE THE INNOCENT", "TRUTH IS THE KEY", "144,000% FREQUENCY"];
            let mIdx = 0;
            setInterval(() => {
                mIdx = (mIdx + 1) % msgs.length;
                document.getElementById('manifesto').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('manifesto').innerText = msgs[mIdx];
                    document.getElementById('manifesto').style.opacity = 1;
                }, 1000);
            }, 5000);

            draw();
        }

        // TOUCH / MOUSE INTERACTION
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchstart', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('touchend', () => { mouse.x = -1000; mouse.y = -1000; });

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            
            lines.forEach(s => {
                // Calculate distance to touch
                let dx = mouse.x - s.x;
                let dy = mouse.y - s.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                // Bend light toward touch
                if(dist < 200) {
                    s.oX += (dx * 0.05);
                } else {
                    s.oX *= 0.95;
                }

                ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(s.x + s.oX, s.y);
                ctx.lineTo(s.x + (s.oX * 0.5), s.y + s.l);
                ctx.stroke();

                s.y += s.v;
                if(s.y > canvas.height) { s.y = -s.l; s.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
