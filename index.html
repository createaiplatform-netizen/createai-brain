<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE HEARTH | GLOBAL INFRASTRUCTURE</title>
    <style>
        :root { --gold: #c4a97a; --pearl: #ffffff; --bg: #fcfcfc; --text: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        header { 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            padding: 25px 20px; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-weight: 800; letter-spacing: 5px; font-size: 0.65rem; color: var(--gold); text-transform: uppercase; }
        .node { font-size: 0.55rem; font-weight: bold; opacity: 0.4; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* THE ELITE CARDS (Refined from your favorite images) */
        .market-card {
            background: var(--pearl); border-radius: 32px; padding: 40px 25px;
            margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 15px 45px rgba(0,0,0,0.04);
            text-align: center;
        }
        .label { font-size: 0.5rem; letter-spacing: 3px; color: var(--gold); font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .price { font-size: 3.5rem; font-weight: 200; margin-bottom: 25px; letter-spacing: -2px; }
        
        .btn-gold { 
            background: var(--gold); color: #fff; border: none; padding: 20px 40px; 
            border-radius: 100px; font-weight: bold; font-size: 0.75rem; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; width: 100%;
        }

        /* THE CATEGORY GRID */
        .grid-header { font-size: 0.6rem; font-weight: 900; letter-spacing: 3px; color: #bbb; text-transform: uppercase; margin: 40px 0 20px 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .tile {
            background: var(--pearl); border-radius: 28px; padding: 35px 20px;
            border: 1px solid rgba(0,0,0,0.02); text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .tile-icon { font-size: 1.8rem; margin-bottom: 15px; display: block; }
        .tile-name { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px; }
        .tile-stat { font-size: 0.55rem; color: var(--gold); font-weight: 800; margin-top: 6px; text-transform: uppercase; }

        /* BOTTOM HUD NAV */
        nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            border-radius: 100px; padding: 20px; display: flex;
            justify-content: space-around; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .nav-link { text-decoration: none; color: #ccc; font-size: 0.55rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .nav-link.active { color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <div class="brand">HEARTH ®</div>
        <div class="node">WEBSTER_CORE</div>
    </header>

    <div class="container">
        
        <div class="market-card">
            <span class="label">Universal Access</span>
            <h2 style="font-weight: 200; font-size: 1.8rem; margin-bottom: 10px;">The Family Portal</h2>
            <div class="price">197.00</div>
            <button class="btn-gold">Initialize Access</button>
        </div>

        <div class="grid-header">Infrastructure Sectors</div>
        
        <div class="grid">
            <div class="tile">
                <span class="tile-icon">🏥</span>
                <div class="tile-name">Healthcare</div>
                <div class="tile-stat">12 Engines</div>
            </div>
            <div class="tile">
                <span class="tile-icon">⚖️</span>
                <div class="tile-name">Sovereign Law</div>
                <div class="tile-stat">22 Engines</div>
            </div>
            <div class="tile">
                <span class="tile-icon">📡</span>
                <div class="tile-name">Utilities</div>
                <div class="tile-stat">15 Engines</div>
            </div>
            <div class="tile">
                <span class="tile-icon">💰</span>
                <div class="tile-name">Wealth AI</div>
                <div class="tile-stat">14 Engines</div>
            </div>
            <div class="tile">
                <span class="tile-icon">🛡️</span>
                <div class="tile-name">Security</div>
                <div class="tile-stat">9 Engines</div>
            </div>
            <div class="tile">
                <span class="tile-icon">☕</span>
                <div class="tile-name">Hospitality</div>
                <div class="tile-stat">8 Engines</div>
            </div>
        </div>

    </div>

    <nav>
        <a href="#" class="nav-link active">Market</a>
        <a href="#" class="nav-link">Dashboard</a>
        <a href="#" class="nav-link">Vault</a>
    </nav>

</body>
</html>
