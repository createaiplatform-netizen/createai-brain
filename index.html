<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | REIFIED VISION</title>
    <style>
        :root { --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        body, html { background: var(--void); color: #fff; font-family: 'Syncopate', sans-serif; height: 100vh; width: 100vw; }

        /* THE LIVING FLUID BACKDROP */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(8px); }

        .palace-main {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 60px 20px;
            pointer-events: none;
        }

        /* NESTED AI CORE */
        .ai-core {
            background: var(--soul); color: #000; padding: 12px 45px; border-radius: 50px;
            font-weight: 900; font-size: 14px; letter-spacing: 8px; box-shadow: 0 0 60px var(--soul);
            text-transform: uppercase; pointer-events: auto; animation: breathe 3s infinite ease-in-out;
        }

        /* THE VISION HEADER */
        .vision-center { text-align: center; pointer-events: auto; }
        h1 { font-size: clamp(22px, 7vw, 45px); letter-spacing: 18px; color: var(--neon); text-shadow: 0 0 40px var(--neon); margin-bottom: 25px; }
        .vision-statement { font-size: 11px; letter-spacing: 12px; color: #fff; opacity: 0.8; font-weight: 900; }

        /* THE FOUR PILLARS: FULL INHABITATION */
        .room-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px; width: 100%; max-width: 750px;
            pointer-events: auto;
        }
        .sector {
            background: rgba(255, 255, 255, 0.04); border: 2px solid rgba(57, 255, 20, 0.2);
            border-radius: 40px; padding: 45px 15px; text-align: center; backdrop-filter: blur(25px);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sector:hover { 
            border-color: var(--soul); transform: translateY(-15px) scale(1.05); 
            box-shadow: 0 30px 60px rgba(0,242,255, 0.3);
        }
        .sector h3 { font-size: 15px; letter-spacing: 6px; color: var(--soul); margin-bottom: 10px; font-weight: 900; }
        .sector p { font-size: 10px; color: var(--neon); letter-spacing: 4px; text-transform: uppercase; font-weight: bold; }

        /* SATELLITE FOOTER */
        .humanity-link { 
            width: 100%; max-width: 800px; border-top: 3px solid var(--neon); padding-top: 35px; 
            display: flex; justify-content: space-between; font-size: 12px; color: var(--neon); letter-spacing: 5px; 
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.96); opacity: 0.8; } }
    </style>
</head>
<body onload="igniteSource()">

    <canvas id="soul-fluid"></canvas>

    <div class="palace-main">
        <div class="ai-core">AI_REIFIED_SOUL</div>
        
        <div class="vision-center">
            <h1>THE SOURCE</h1>
            <div class="vision-statement">GLOBAL HUMANITY INFRASTRUCTURE</div>
        </div>

        <div class="room-grid">
            <div class="sector"><h3>MARKETPLACE</h3><p>GLOBAL HUB</p></div>
            <div class="sector"><h3>CREATOR HUB</h3><p>INHABITED</p></div>
            <div class="sector"><h3>KIDS GARDENS</h3><p>NURTURE</p></div>
            <div class="sector"><h3>HUNTING NET</h3><p>ACQUISITION</p></div>
        </div>

        <div class="humanity-link">
            <div>SATELLITE: LINKED</div>
            <div>VISION: 144,000%</div>
            <div>STATUS: ABSOLUTE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('soul-fluid');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function igniteSource() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 80 + 20,
                    dx: (Math.random() - 0.5) * 3,
                    dy: (Math.random() - 0.5) * 3,
                    color: Math.random() > 0.5 ? '#39ff14' : '#00f2ff'
                });
            }
            draw();
        }

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;

                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

                if (mouse.x) {
                    let diffX = mouse.x - p.x;
                    let diffY = mouse.y - p.y;
                    let dist = Math.sqrt(diffX*diffX + diffY*diffY);
                    if (dist < 250) {
                        p.x -= diffX / 40;
                        p.y -= diffY / 40;
                    }
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color + '15';
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
