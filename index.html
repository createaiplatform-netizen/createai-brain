<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE_V01_KINETIC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #market-box { flex-grow: 1; margin: 20px; border: 2px solid var(--gold); padding: 40px; display: flex; flex-direction: column; position: relative; box-shadow: inset 0 0 100px rgba(243, 207, 138, 0.1); }
        .header { text-align: center; border-bottom: 1px solid rgba(243, 207, 138, 0.3); padding-bottom: 20px; }
        .title { font-size: 14px; letter-spacing: 12px; color: var(--gold); }
        
        #kinetic-grid { flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 30px 0; }
        .tile { border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; }
        .active-node { background: rgba(243, 207, 138, 0.05); border-color: var(--gold); animation: pulse 1.44s infinite; color: var(--gold); }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        
        #reserve-footer { text-align: center; padding: 20px; border-top: 1px solid var(--gold); }
        #live-res { font-size: 26px; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>
    <div id="market-box">
        <div class="header">
            <div class="title">MARKETPLACE_V01 // KINETIC_HUB</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6;">PHASE: INFRASTRUCTURE_IGNITION // SECTOR: WIS_001</div>
        </div>

        <div id="kinetic-grid">
            <div class="tile active-node">STUDIO_01</div>
            <div class="tile">STUDIO_02</div>
            <div class="tile active-node">STUDIO_03</div>
            <div class="tile">STUDIO_04</div>
            <div class="tile active-node">STUDIO_05</div>
            <div class="tile">STUDIO_06</div>
            <div class="tile">STUDIO_07</div>
            <div class="tile active-node">STUDIO_08</div>
            <div class="tile">STUDIO_09</div>
            <div class="tile active-node">STUDIO_10</div>
            <div class="tile">STUDIO_11</div>
            <div class="tile active-node">STUDIO_12</div>
            <div class="tile">STUDIO_13</div>
            <div class="tile active-node">STUDIO_14</div>
        </div>

        <div id="reserve-footer">
            <div style="font-size: 8px; letter-spacing: 12px; margin-bottom: 5px; opacity: 0.8;">AETHEL_ESTATE_RESERVE</div>
            <div id="live-res">$1,440,000,019,440.00</div>
        </div>
    </div>
<script>
    let res = 1440000019440.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live-res').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
