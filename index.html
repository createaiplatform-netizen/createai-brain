<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_UNIFIED_V124</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --white: #ffffff; --quartet: #f3cf8a; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .title { font-family: 'Cinzel'; font-size: 10vw; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 40px #000; }
        .quote { font-family: 'Great Vibes'; font-size: 2.2rem; color: var(--gold); margin-top: 10px; }
        #truth-meter { position: fixed; top: 10%; width: 80%; height: 2px; background: rgba(255,255,255,0.1); z-index: 30; }
        #truth-fill { width: 100%; height: 100%; background: var(--gold); box-shadow: 0 0 20px var(--gold); }
        #stats-bar { position: fixed; bottom: 8%; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 10px; letter-spacing: 2px; opacity: 0.8; z-index: 20; background: rgba(0,0,0,0.5); padding: 15px 0; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div id="truth-meter"><div id="truth-fill"></div></div>
        <div id="stats-bar">
            <span>LIQUIDITY: $<span id="val">0</span></span>
            <span>QUARTET: ACTIVE</span>
            <span>SYSTEM: V124_ULTIMATE</span>
        </div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title" id="t">SOURCE</h1>
            <p class="quote" id="q">The Unified Quartet</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'source', agents = [], isDown = false, mx = 0, my = 0;
    let liquidity = parseInt(localStorage.getItem('sov_v124_liq')) || 1000000000;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    // Aethel Prime + 144 Harmonic Agents
    agents.push({ x: 0, y: 0, vx: 0, vy: 0, angle: 0, orbitDist: 70, isAethel: true, history: [] });
    for(let i=0; i<144; i++) spawnAgent();

    function spawnAgent() {
        agents.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            vx: 0, vy: 0, angle: Math.random() * Math.PI * 2,
            orbitDist: 100 + Math.random() * 200, isAethel: false, history: []
        });
    }

    function update() {
        liquidity += 144000; // Trillion-scale velocity
        document.getElementById('val').innerText = liquidity.toLocaleString();
    }
    setInterval(update, 100);

    function handle(e) {
        isDown = true;
        mx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        my = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        const w = window.innerWidth, h = window.innerHeight;
        view = (my < h/2) ? (mx < w/2 ? 'oracle' : 'kinetic') : (mx < w/2 ? 'kindred' : 'phonos');
        document.getElementById('t').innerText = view.toUpperCase();
    }
    function track(e) { mx = e.clientX || (e.touches ? e.touches[0].clientX : mx); my = e.clientY || (e.touches ? e.touches[0].clientY : my); }
    function stop() { isDown = false; }

    function animate() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        // Core Pulse
        let pulse = 120 + Math.sin(Date.now()*0.005)*40;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse*4);
        g.addColorStop(0, 'rgba(255,255,255,0.9)'); g.addColorStop(0.1, 'rgba(243, 207, 138, 0.4)'); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, pulse*4, 0, Math.PI*2); ctx.fill();

        agents.forEach((a, i) => {
            if (isDown) {
                let dx = a.x - mx; let dy = a.y - my;
                let d = Math.hypot(dx, dy);
                a.vx += dx/d * 4; a.vy += dy/d * 4;
            } else {
                a.angle += a.isAethel ? 0.004 : 0.04;
                let tx = cx + Math.cos(a.angle) * a.orbitDist;
                let ty = cy + Math.sin(a.angle) * a.orbitDist;
                a.vx += (tx - a.x) * 0.12; a.vy += (ty - a.y) * 0.12;
            }
            a.vx *= 0.92; a.vy *= 0.92; a.x += a.vx; a.y += a.vy;

            a.history.push({x: a.x, y: a.y});
            if (a.history.length > 12) a.history.shift();

            let color = a.isAethel ? `hsla(${(Date.now()/10)%360}, 100%, 90%, 1)` : 'rgba(243, 207, 138, 0.7)';
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = a.isAethel ? 3 : 1;
            a.history.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(a.x, a.y, a.isAethel ? 10 : 2, 0, Math.PI*2); ctx.fill();
            
            // Connecting Web
            if(i % 10 === 0) {
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(cx, cy); ctx.stroke();
            }
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
