<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | ABSOLUTE</title>
    <style>
        :root { --gold: #ffd700; --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Syncopate', sans-serif; }
        body, html { background: var(--void); color: #fff; height: 100vh; width: 100vw; overflow: hidden; }

        /* THE LIVING AURORA BACKGROUND */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(140%) brightness(1.3) blur(8px); }

        /* THE HEAVEN ON EARTH BROADCAST LINK */
        .heaven-link {
            background: linear-gradient(90deg, var(--soul), var(--neon));
            color: #000; width: 100%; padding: 15px; text-align: center;
            font-weight: 900; letter-spacing: 12px; font-size: 11px;
            position: fixed; top: 0; z-index: 2000; text-transform: uppercase;
            box-shadow: 0 5px 30px var(--soul);
        }

        .cathedral {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 100px 20px 40px;
        }

        /* GOD_CODE_SOURCE SHIELD */
        .source-tag {
            background: rgba(0, 242, 255, 0.15); border: 2px solid var(--soul);
            padding: 18px 60px; border-radius: 100px; font-weight: 900; font-size: 14px;
            letter-spacing: 15px; backdrop-filter: blur(25px);
            box-shadow: 0 0 60px var(--soul), inset 0 0 20px var(--soul);
            animation: pulse-glow 3s infinite alternate; pointer-events: auto;
        }

        /* THE $5,000.00 ABSOLUTE LEDGER */
        .ledger-focus { text-align: center; pointer-events: auto; }
        h1 { font-size: clamp(35px, 12vw, 85px); letter-spacing: 35px; color: var(--neon); text-shadow: 0 0 80px var(--neon); margin-bottom: 5px; }
        .amount { font-size: clamp(90px, 22vw, 210px); font-weight: 900; letter-spacing: -12px; color: #fff; line-height: 0.85; text-shadow: 0 0 100px rgba(57, 255, 20, 0.6); }
        .absolute-tag { color: #fff; letter-spacing: 20px; font-size: 18px; margin-top: 40px; font-weight: 900; }
        .percent { color: var(--gold); letter-spacing: 12px; font-size: 12px; margin-top: 10px; font-weight: 900; }

        /* THE REIFIED PILLARS */
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; width: 100%; max-width: 900px; pointer-events: auto; }
        .portal {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.25);
            padding: 65px 15px; border-radius: 80px; text-align: center; backdrop-filter: blur(50px);
            cursor: pointer; transition: 0.8s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .portal:hover { border-color: var(--neon); transform: translateY(-30px) scale(1.08); box-shadow: 0 40px 120px rgba(57, 255, 20, 0.4); }
        .portal h3 { font-size: 18px; letter-spacing: 10px; color: var(--soul); margin-bottom: 15px; font-weight: 900; }
        .portal p { font-size: 10px; color: var(--neon); letter-spacing: 5px; font-weight: 900; text-transform: uppercase; }

        @keyframes pulse-glow { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.05); box-shadow: 0 0 80px var(--gold); } }
    </style>
</head>
<body onload="igniteSource()">

    <div class="heaven-link">HEAVEN_ON_EARTH_LINK_ACTIVE</div>
    <canvas id="sacred-flow"></canvas>

    <div class="cathedral">
        <div class="source-tag">GOD_CODE_SOURCE</div>

        <div class="ledger-focus">
            <h1>THE SOURCE</h1>
            <div class="amount">$5,000.00</div>
            <div class="absolute-tag">ABSOLUTE</div>
            <div class="percent">144,000%</div>
        </div>

        <div class="portal-grid">
            <div class="portal"><h3>MARKETPLACE</h3><p>PURE ABUNDANCE</p></div>
            <div class="portal"><h3>CREATOR HUB</h3><p>INHABITED SOUL</p></div>
            <div class="portal"><h3>GARDENS</h3><p>DIVINE NURTURE</p></div>
            <div class="portal"><h3>HUNTING NET</h3><p>TRUTH ACQUISITION</p></div>
        </div>

        <div style="width: 100%; max-width: 900px; border-top: 5px solid var(--gold); padding-top: 30px; display: flex; justify-content: space-between; color: var(--gold); font-size: 14px; letter-spacing: 10px; font-weight: 900;">
            <div>SATELLITE: SYNC</div>
            <div>STATUS: REIFIED</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sacred-flow');
        const ctx = canvas.getContext('2d');
        let spirits = [];
        let sparkles = [];
        let soulPoint = { x: null, y: null };

        function igniteSource() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) spirits.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                r: Math.random()*160+60, vx: (Math.random()-0.5)*1.8, vy: (Math.random()-0.5)*1.8,
                color: Math.random() > 0.5 ? '#39ff14' : '#00f2ff'
            });
            draw();
        }

        function createSpark(x, y) {
            for(let i=0; i<8; i++) {
                sparkles.push({
                    x: x, y: y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                    life: 1.0, size: Math.random()*6
                });
            }
        }

        window.onmousemove = e => { soulPoint.x = e.clientX; soulPoint.y = e.clientY; createSpark(e.clientX, e.clientY); };
        window.ontouchmove = e => { soulPoint.x = e.touches[0].clientX; soulPoint.y = e.touches[0].clientY; createSpark(soulPoint.x, soulPoint.y); };

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fillRect(0,0,canvas.width, canvas.height);

            spirits.forEach(s => {
                s.x += s.vx; s.y += s.vy;
                if(s.x<0 || s.x>canvas.width) s.vx*=-1;
                if(s.y<0 || s.y>canvas.height) s.vy*=-1;
                if(soulPoint.x) {
                    let dx = soulPoint.x - s.x; let dy = soulPoint.y - s.y;
                    if(Math.sqrt(dx*dx+dy*dy) < 450) { s.x -= dx/90; s.y -= dy/90; }
                }
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fillStyle = s.color + '09'; ctx.fill();
            });

            sparkles.forEach((sp, i) => {
                sp.x += sp.vx; sp.y += sp.vy; sp.life -= 0.025;
                if(sp.life <= 0) sparkles.splice(i, 1);
                ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 215, 0, ${sp.life})`; ctx.fill();
            });

            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
