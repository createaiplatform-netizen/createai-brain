<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_TRILLION_ENGINE_V111</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cyan: #00f2ff; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #master { width: 100%; height: 100%; transition: opacity 1.5s; }
        .grain { position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 10; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .title { font-family: 'Cinzel'; font-size: 9vw; letter-spacing: 14px; color: var(--gold); text-shadow: 0 0 50px #000; }
        .quote { font-family: 'Great Vibes'; font-size: 1.8rem; color: var(--gold); margin-top: 5px; opacity: 0.8; }
        #clock { font-family: 'Cinzel'; font-size: 1rem; color: var(--gold); margin-top: 15px; letter-spacing: 5px; opacity: 0.5; }
        #nexus-input { position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 100; display: none; pointer-events: auto; }
        #nexus-field { background: rgba(0,242,255,0.02); border: 1px solid rgba(0,242,255,0.4); border-radius: 40px; padding: 18px 35px; color: var(--cyan); font-family: 'Cinzel'; font-size: 10px; width: 320px; text-align: center; backdrop-filter: blur(30px); }
        #stats-bar { position: fixed; bottom: 100px; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 8px; letter-spacing: 3px; opacity: 0.6; z-index: 20; background: linear-gradient(transparent, rgba(0,0,0,0.5)); padding: 20px 0; }
        .guide { position: fixed; font-family: 'Cinzel'; font-size: 6px; color: var(--gold); opacity: 0.15; z-index: 20; letter-spacing: 4px; }
        .tl { top: 60px; left: 50px; } .tr { top: 60px; right: 50px; } .bl { bottom: 60px; left: 50px; } .br { bottom: 60px; right: 50px; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div class="grain"></div>
        <div id="nexus-input"><input type="text" id="nexus-field" placeholder="MINT NEW ASSET..."></div>
        <div id="stats-bar">
            <span>LIQUIDITY: $<span id="val">0</span></span>
            <span>ASSET_MINT: <span id="asset-count">0</span></span>
            <span>FREQ: 144%</span>
        </div>
        <div class="guide tl">MARKET</div> <div class="guide tr">CREATOR</div> <div class="guide bl">SOURCE</div> <div class="guide br">EXCHANGE</div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title" id="t">SOURCE</h1>
            <p class="quote" id="q">The Trillion Engine</p>
            <div id="clock">00:00:00</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'source', particles = [], isDown = false, mx = 0, my = 0;
    let liquidity = parseInt(localStorage.getItem('sov_trillion_liq')) || 0;
    let assets = parseInt(localStorage.getItem('sov_trillion_assets')) || 0;
    let intent = localStorage.getItem('sov_intent') || "The Origin";
    let bigCoin = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function update() {
        document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
        // Passive Yield Engine
        if (assets > 0 && Math.random() < 0.05) {
            liquidity += (assets * 10);
            document.getElementById('val').innerText = liquidity.toLocaleString();
            particles.push({x: Math.random()*canvas.width, y: 0, vx: 0, vy: 2, r: 1, type: 'gold', age: 0});
        }
    }
    setInterval(update, 100);

    document.getElementById('nexus-field').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') { 
            intent = e.target.value.toUpperCase();
            document.getElementById('q').innerText = intent;
            assets++;
            save();
            e.target.value = ''; e.target.blur();
        }
    });

    function save() {
        localStorage.setItem('sov_trillion_liq', liquidity);
        localStorage.setItem('sov_trillion_assets', assets);
        localStorage.setItem('sov_intent', intent);
        document.getElementById('val').innerText = liquidity.toLocaleString();
        document.getElementById('asset-count').innerText = assets;
    }

    function handle(e) {
        if(e.target.closest('#nexus-input')) return;
        isDown = true;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;
        document.getElementById('nexus-input').style.display = (x < w/2 && y < h/2) ? 'block' : 'none';
        
        if (y < h/2) {
            view = (x < w/2) ? 'market' : 'creator';
            setUI(view.toUpperCase(), view==='market' ? intent : "Genesis Garden", view==='market' ? "#00f2ff" : "#2ecc71");
        } else {
            view = (x < w/2) ? 'source' : 'exchange';
            setUI("SOURCE", "The Trillion Engine", "#f3cf8a");
        }
    }
    
    function setUI(t, q, c) {
        document.getElementById('t').innerText = t; document.getElementById('q').innerText = q;
        document.getElementById('t').style.color = c; document.getElementById('q').style.color = c;
    }

    function stop() { 
        if(view === 'exchange' && bigCoin > 5) {
            liquidity += Math.round(bigCoin * 1000000); // Scale to Trillion
            save();
            for(let i=0; i<40; i++) {
                let a = Math.random()*Math.PI*2; let f = Math.random()*10+5;
                particles.push({x:mx, y:my, vx:Math.cos(a)*f, vy:Math.sin(a)*f, r:Math.random()*3+1, type:'gold', age:0});
            }
        }
        isDown = false; bigCoin = 0; 
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        let auraC = (view === 'market') ? '0,242,255' : (view === 'creator') ? '46,204,113' : '243,207,138';
        let pulse = 90 + Math.sin(Date.now()*0.002)*12;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse*3);
        g.addColorStop(0, 'rgba(255,255,255,0.8)'); g.addColorStop(0.2, `rgba(${auraC}, 0.3)`); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, pulse*3, 0, Math.PI*2); ctx.fill();

        if (isDown) {
            if (view === 'exchange') { bigCoin = Math.min(bigCoin+1.5, 100); ctx.fillStyle='rgba(243,207,138,0.2)'; ctx.beginPath(); ctx.arc(mx, my, bigCoin, 0, Math.PI*2); ctx.fill(); }
            if (view === 'market') particles.push({x:mx, y:my, tx:cx, ty:cy, type:'data', life:1});
            if (view === 'creator') particles.push({x:mx, y:my, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, type:'vine', life:1});
        }

        particles.forEach((p, i) => {
            if(p.type === 'gold') {
                p.vy += 0.3; p.x += p.vx; p.y += p.vy;
                if(p.y > canvas.height-p.r) { p.y = canvas.height-p.r; p.vy *= -0.3; p.vx *= 0.8; }
                ctx.fillStyle = `rgba(243,207,138, ${Math.max(0, 1-p.age/2000)})`;
                p.age++; if(p.age > 2000) particles.splice(i, 1);
            } else if(p.type === 'data') {
                p.life -= 0.02; ctx.strokeStyle = `rgba(0,242,255,${p.life})`;
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke();
                if(p.life <= 0) particles.splice(i, 1);
            } else if(p.type === 'vine') {
                p.life -= 0.01; p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = `rgba(46,204,113,${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            }
            if(p.type !== 'data') { ctx.beginPath(); ctx.arc(p.x, p.y, p.r||2, 0, Math.PI*2); ctx.fill(); }
        });
        requestAnimationFrame(animate);
    }
    animate();
    save(); // Trigger initial load
</script>
</body>
</html>
