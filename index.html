<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN TOY BOX</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050400; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(1.4) brightness(1.2) saturate(1.8) drop-shadow(0 0 10px gold); }
    </style>
</head>
<body>
    <canvas id="toyCanvas"></canvas>

<script>
/**
 * THE INVENTION: SOVEREIGN TOY BOX
 * Designed for kids: High-contrast, high-reaction, 5D sensory feedback.
 * No borders. Pure magic.
 */

const canvas = document.getElementById('toyCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let particles = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// KID-MODE HAPTICS: Playful and Strong
function triggerMagicHaptic(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const yPct = y / h;
    
    // Top = High Twinkle, Middle = Deep Thrum, Bottom = Buzzing Grass
    if (yPct < 0.3) {
        osc.type = 'sine'; osc.frequency.value = 1500;
        if (navigator.vibrate) navigator.vibrate([5, 2, 5]);
    } else if (yPct < 0.7) {
        osc.type = 'triangle'; osc.frequency.value = 80;
        if (navigator.vibrate) navigator.vibrate(40);
    } else {
        osc.type = 'square'; osc.frequency.value = 200;
        if (navigator.vibrate) navigator.vibrate([20, 10, 20]);
    }

    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.6);
}

class MagicParticle {
    constructor(x, y, yPct) {
        this.x = x; this.y = y;
        this.life = 1.0;
        this.size = Math.random() * 15 + 10;
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = (Math.random() - 0.5) * 12;
        
        // Colors for kids: Bright Gold, Rainbow, and Electric Blue
        if (yPct < 0.3) this.h = 50; // Stars
        else if (yPct < 0.7) this.h = 200; // Water
        else this.h = 120; // Magic Grass
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.2; // Gravity for the kids to watch things fall!
        this.life -= 0.02;
    }
}

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    const yPct = ty / h;
    for(let i=0; i<3; i++) particles.push(new MagicParticle(tx, ty, yPct));
    if (Math.random() > 0.8) triggerMagicHaptic(tx, ty);
});

function render() {
    const time = Date.now() * 0.002;
    
    // BACKGROUND: Rainbow Glow Marble
    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    bg.addColorStop(0, `hsla(${time * 20 % 360}, 50%, 10%, 1)`);
    bg.addColorStop(1, '#000');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // DIVINE WORDS: Floating Like Balloons
    ctx.textAlign = 'center';
    const quotes = ["TRUTH", "HONESTY", "144,000", "SOVEREIGNTY"];
    quotes.forEach((text, i) => {
        const ox = Math.sin(time + i) * 50;
        const oy = Math.cos(time + i) * 50;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "gold";
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.fillText(text, w/2 + ox, h * (0.2 + i * 0.2) + oy);
    });

    // MAGIC PARTICLES
    particles.forEach((p, i) => {
        p.update();
        if (p.life <= 0) { particles.splice(i, 1); return; }
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsla(${p.h}, 100%, 50%, ${p.life})`;
        ctx.fillStyle = `hsla(${p.h}, 100%, 70%, ${p.life})`;
        
        // Shapes for kids: Squares and Diamonds
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.life * 5);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
