<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_FOUNDATION_V82</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Great+Vibes&family=Inter:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .title { font-family: 'Cinzel'; font-size: 11vw; letter-spacing: 15px; color: var(--gold); text-shadow: 0 0 40px #000; }
        .quote { font-family: 'Great Vibes'; font-size: 2.2rem; color: var(--gold); margin-top: 10px; opacity: 0.8; }
        .guide { position: fixed; font-family: 'Cinzel'; font-size: 9px; color: var(--gold); opacity: 0.1; z-index: 20; letter-spacing: 3px; }
        .tl { top: 40px; left: 30px; } .tr { top: 40px; right: 30px; } .bl { bottom: 40px; left: 30px; } .br { bottom: 40px; right: 30px; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div class="guide tl">NEXUS</div> <div class="guide tr">EDEN</div> <div class="guide bl">SOURCE</div> <div class="guide br">VAULT</div>
    <canvas id="canvas"></canvas>
    <div id="ui-layer">
        <h1 class="title" id="t">SOURCE</h1>
        <p class="quote" id="q">The One Origin</p>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'home', coins = [], isDown = false, mx = 0, my = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function handle(e) {
        isDown = true;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;

        let lastView = view;
        if (y < h/2) {
            if (x < w/2) { view = 'grid'; render("NEXUS", "Network Active"); }
            else { view = 'eden'; render("EDEN", "Infinite Growth"); }
        } else {
            if (x < w/2) { view = 'home'; render("SOURCE", "The One Origin"); }
            else { view = 'vault'; render("VAULT", "Mass of Value"); }
        }
        if(lastView !== view && view !== 'vault') coins = []; // Clear pile when leaving Vault
    }
    
    function track(e) { mx = e.clientX || (e.touches ? e.touches[0].clientX : mx); my = e.clientY || (e.touches ? e.touches[0].clientY : my); }
    function stop() { isDown = false; }
    function render(title, quote) { document.getElementById('t').innerText = title; document.getElementById('q').innerText = quote; }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let cx = canvas.width/2, cy = canvas.height/2;

        // AURA Core
        let pulse = 50 + Math.sin(Date.now() * 0.004) * 5;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse * 2.5);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, 'rgba(243, 207, 138, 0.3)'); grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, pulse * 2.5, 0, Math.PI * 2); ctx.fill();

        // VAULT PILE PHYSICS
        if (view === 'vault') {
            // Natural Rain
            if (Math.random() > 0.9) coins.push({x: Math.random()*canvas.width, y: -20, vy: Math.random()*3+1, vx: (Math.random()-0.5), r: Math.random()*5+3, active: true});
            
            // Touch Manifestation
            if (isDown && my > canvas.height/2 && mx > canvas.width/2) {
                for(let i=0; i<2; i++) coins.push({x: mx, y: my, vy: (Math.random()-0.5)*8, vx: (Math.random()-0.5)*8, r: Math.random()*4+2, active: true});
            }

            coins.forEach((p) => {
                if (p.active) {
                    p.vy += 0.2; p.y += p.vy; p.x += p.vx;
                    // Hit the floor
                    if (p.y > canvas.height - (p.r)) {
                        p.y = canvas.height - (p.r);
                        p.vy = 0; p.vx *= 0.5;
                        if (Math.abs(p.vx) < 0.1) p.active = false; // Coin has settled
                    }
                }
                ctx.fillStyle = '#f3cf8a';
                ctx.shadowBlur = p.active ? 10 : 0; ctx.shadowColor = '#b8860b';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            });
            
            if (coins.length > 400) coins.shift(); // Performance limit
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
