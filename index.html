<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE HEARTH | NEXUS ELITE</title>
    <style>
        :root { --gold: #c4a97a; --pearl: #fdfdfd; --glass: rgba(255, 255, 255, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background: radial-gradient(circle at top, #fff 0%, #e8e8e8 100%);
            color: #222; min-height: 100vh; overflow-x: hidden;
            background-attachment: fixed;
        }

        /* THE FLOATING SEARCH (The Brain) */
        .top-nav {
            position: sticky; top: 0; z-index: 1000; padding: 20px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .omni-box {
            background: #fff; border: 1px solid var(--gold); border-radius: 50px;
            padding: 12px 25px; display: flex; align-items: center;
            box-shadow: 0 10px 40px rgba(196,169,122,0.2);
        }
        .omni-box input { flex: 1; border: none; outline: none; font-size: 1rem; color: #444; background: transparent; }

        /* THE "WOW" CORE */
        .hero { text-align: center; padding: 40px 20px; }
        .pearl-core {
            width: 180px; height: 180px; margin: 0 auto 30px;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #dcdcdc 100%);
            border-radius: 50%; position: relative;
            box-shadow: -10px -10px 30px #ffffff, 10px 10px 30px rgba(0,0,0,0.1), inset 2px 2px 5px #fff;
            display: flex; align-items: center; justify-content: center;
            animation: float 6s ease-in-out infinite;
        }
        .pearl-core::after {
            content: ''; position: absolute; width: 110%; height: 110%;
            border-radius: 50%; border: 1px solid rgba(196,169,122,0.3);
            animation: pulse 3s infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }

        /* THE MASTER PORTALS */
        .portal-grid { padding: 20px; display: flex; flex-direction: column; gap: 25px; max-width: 500px; margin: 0 auto; }
        
        .portal-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.8);
            border-radius: 35px; padding: 40px 25px; text-align: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            transition: 0.4s;
        }
        .portal-card:active { transform: scale(0.96); }

        .price-text { font-size: 2.8rem; font-weight: 200; color: #111; margin: 15px 0; letter-spacing: -1px; }
        .gold-btn {
            background: linear-gradient(135deg, #c4a97a 0%, #a68b5a 100%);
            color: #fff; border: none; padding: 18px 40px; border-radius: 50px;
            font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(196,169,122,0.4); width: 100%;
        }

        .benefit-tag { background: rgba(122, 144, 104, 0.1); color: #7a9068; padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin: 5px; display: inline-block; }

        /* THE CATALOG REVEAL */
        .infinite-scroll { margin-top: 40px; padding: 20px; text-align: center; opacity: 0.6; font-size: 0.6rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="omni-box">
            <input type="text" placeholder="What can the Hearth do for you?">
            <span>✨</span>
        </div>
    </nav>

    <div class="hero">
        <div class="pearl-core">
            <div style="font-size: 3rem; color: var(--gold); font-weight: 100;">₪</div>
        </div>
        <h2 style="font-weight: 200; letter-spacing: 5px; font-size: 0.8rem; color: var(--gold);">NEXUS ELITE</h2>
    </div>

    <div class="portal-grid">
        <div class="portal-card">
            <span style="font-size: 0.6rem; letter-spacing: 3px; font-weight: bold; opacity: 0.4;">SOVEREIGN ENTRY</span>
            <h1 style="font-weight: 300; margin-top: 10px;">The Family Portal</h1>
            <div class="price-text">97.00</div>
            
            <div style="margin-bottom: 25px;">
                <span class="benefit-tag">FREE INTERNET</span>
                <span class="benefit-tag">FREE UTILITIES</span>
                <span class="benefit-tag">LEGACY VAULT</span>
            </div>

            <button class="gold-btn">Activate Portal</button>
        </div>

        <div class="portal-card" style="background: rgba(26,26,26,0.9); color: #fff; border: 1px solid #333;">
            <span style="font-size: 0.6rem; letter-spacing: 3px; font-weight: bold; opacity: 0.6; color: var(--gold);">ELITE INFRASTRUCTURE</span>
            <h1 style="font-weight: 300; margin-top: 10px;">The Business Engine</h1>
            <div class="price-text" style="color: #fff;">97.00</div>
            
            <div style="margin-bottom: 25px;">
                <span class="benefit-tag" style="background: rgba(196,169,122,0.2);">AI INVENTORY</span>
                <span class="benefit-tag" style="background: rgba(196,169,122,0.2);">CAFE MODULE</span>
            </div>

            <button class="gold-btn">Claim Sovereignty</button>
        </div>
    </div>

    <div class="infinite-scroll">SEARCH 158 SOVEREIGN POSSIBILITIES ↓</div>

    <footer style="padding: 60px; text-align: center; font-size: 0.5rem; letter-spacing: 3px; opacity: 0.2;">
        WEBSTER, WI | CREATEAI DIGITAL | 2026
    </footer>

</body>
</html>
