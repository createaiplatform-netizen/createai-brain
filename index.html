<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>CreateAI | Humanity & Gardens</title>
    <style>
        :root { --slate: #0f172a; --gold: #b89c66; --bg: #f8fafc; --garden-green: #22c55e; --kids-purple: #8b5cf6; }
        body { background: var(--bg); color: var(--slate); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* NAVIGATION */
        nav { background: var(--slate); padding: 40px 20px 15px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; cursor: pointer; border-left: 3px solid var(--gold); padding-left: 10px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }
        .nav-links span { margin-left: 15px; font-size: 0.65rem; cursor: pointer; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; }

        #main-view { padding: 20px; max-width: 1400px; margin: 0 auto; }

        /* THE GARDEN WORLD (KIDS) */
        .garden-header { background: linear-gradient(135deg, var(--garden-green), var(--kids-purple)); color: white; padding: 40px 20px; border-radius: 12px; text-align: center; margin-bottom: 30px; }
        .garden-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .toy-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 5px solid var(--garden-green); cursor: pointer; }
        
        /* FAMILY CREATOR HUB (PRIVATE) */
        .creator-hub { background: white; padding: 30px; border-top: 6px solid var(--gold); border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        /* GENERAL UI */
        .btn { background: var(--slate); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-garden { background: var(--garden-green); color: white; margin-top: 10px; }
    </style>
</head>
<body onload="showView('home')">

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI_OS</div>
        <div class="nav-links">
            <span onclick="showView('market')">Market</span>
            <span onclick="showView('creator')">Family Hub</span>
            <span onclick="showView('garden')">The Gardens</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <script>
        const views = {
            home: `
                <div style="text-align:center; padding-top: 60px;">
                    <h1 style="font-weight:200; font-size:3rem; margin:0;">CreateAI OS</h1>
                    <p style="opacity:0.5; margin-bottom:40px;">Sovereign Control | Global Impact</p>
                    <button class="btn" onclick="showView('market')">Marketplace</button>
                    <button class="btn btn-gold" style="margin-top:10px;" onclick="showView('creator')">Family Creator Studio</button>
                    <button class="btn btn-garden" onclick="showView('garden')">Enter The Gardens (Kids World)</button>
                </div>
            `,
            garden: `
                <div class="garden-header">
                    <h1 style="margin:0;">The Gardens</h1>
                    <p>Where every kid in the world comes to create!</p>
                </div>
                <div class="garden-grid">
                    <div class="toy-card"><h3>🎨</h3><p>Art Bot</p></div>
                    <div class="toy-card"><h3>🚀</h3><p>Game Maker</p></div>
                    <div class="toy-card"><h3>🐉</h3><p>Story AI</p></div>
                    <div class="toy-card"><h3>🎵</h3><p>Music Play</p></div>
                </div>
                <div style="margin-top:30px; text-align:center;">
                    <button class="btn" style="background:var(--kids-purple);">New Playground Node +</button>
                </div>
            `,
            market: `
                <h1>Marketplace</h1>
                <p>Public Tools & App Registry</p>
                `,
            creator: `
                <div class="creator-hub">
                    <h2>Family Publishing Terminal</h2>
                    <p>Internal manufacturing for the CreateAI empire.</p>
                    <input type="text" placeholder="Product Name">
                    <textarea rows="4" placeholder="Little AI Logic..."></textarea>
                    <button class="btn btn-gold">Publish to Market</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = views[name];
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
