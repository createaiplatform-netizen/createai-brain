<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // GHOST_PROTOCOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cave: #ff4d00; --garden: #10b981; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        .stars { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #010103 100%); z-index: -1; }
        
        #main-view { 
            height: 100svh; width: 100%; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            padding: 20px 20px 100px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        /* NEURAL EYE */
        .eye-container { width: 180px; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .eye-outer { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(243, 207, 138, 0.2); border-radius: 50%; animation: rotate 20s linear infinite; }
        .eye-inner { width: 90px; height: 90px; background: radial-gradient(circle, var(--gold) 0%, transparent 70%); border-radius: 50%; filter: blur(15px); opacity: 0.6; animation: pulse 4s ease-in-out infinite; }
        .eye-pupil { width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 30px var(--gold); }

        /* DOCK */
        .dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(1, 1, 3, 0.98); backdrop-filter: blur(30px); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-around; align-items: center; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); }
        .dock-item { color: rgba(255,255,255,0.3); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; text-align: center; cursor: pointer; padding: 15px; flex: 1; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); transform: translateY(-3px); transition: 0.3s; }

        /* CONTENT */
        .section-header { font-family: 'Cinzel'; font-size: 1.2rem; letter-spacing: 12px; margin: 40px 0 20px; color: var(--gold); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 400px; }
        .node { background: rgba(255,255,255,0.02); border: 1px solid rgba(243, 207, 138, 0.1); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 0.5rem; color: var(--gold); }

        /* GHOST OVERLAY */
        #ghost-overlay { position: fixed; inset: 0; background: var(--void); z-index: 11000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .ghost-input { background: transparent; border: none; border-bottom: 1px solid var(--cave); color: var(--cave); font-family: 'Cinzel'; font-size: 2rem; text-align: center; width: 150px; letter-spacing: 10px; margin-top: 20px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } }
    </style>
</head>
<body onload="render('home')">
    <div class="stars"></div>
    <div id="main-view"></div>

    <div id="ghost-overlay">
        <h2 style="font-family:'Cinzel'; color:var(--cave); letter-spacing:5px;">ACCESS CODE</h2>
        <input type="password" class="ghost-input" id="vault-pass" maxlength="4" oninput="checkPass(this.value)">
        <p style="margin-top:30px; font-size:0.5rem; color:var(--cave); opacity:0.5; letter-spacing:3px;">GHOST_PROTOCOL_ACTIVE</p>
    </div>

    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('cave')">VAULT</div>
    </div>

    <script>
        let vaultTaps = 0;

        function render(view) {
            const mv = document.getElementById('main-view');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + view.substring(0,3)).classList.add('active');
            
            mv.innerHTML = "";
            mv.style.justifyContent = (view === 'home') ? 'center' : 'flex-start';

            if (view === 'home') {
                mv.innerHTML = `<div class="eye-container"><div class="eye-outer"></div><div class="eye-inner"></div><div class="eye-pupil"></div></div><h1 style="font-family:'Cinzel'; font-size:10vw; letter-spacing:15px;">SOURCE</h1>`;
            } else if (view === 'registry') {
                mv.innerHTML = `<div class="section-header">THE_144</div><div class="grid">${Array.from({length: 12}, (_, i) => `<div class="node">${i+1}</div>`).join('')}</div>`;
            } else if (view === 'garden') {
                mv.innerHTML = `<div class="section-header" style="color:var(--garden)">EDEN</div><div style="margin-top:20vh; width:80px; height:80px; border:1px solid var(--garden); border-radius:50%; margin: 0 auto;"></div>`;
            } else if (view === 'cave') {
                mv.innerHTML = `<div class="section-header" id="vault-title" onclick="triggerGhost()" style="color:var(--cave)">VAULT</div><div style="width:100%; height:200px; background:rgba(217,119,6,0.05); border:1px solid var(--cave); display:flex; align-items:center; justify-content:center; color:var(--cave); font-family:'Cinzel'; font-size:0.7rem; letter-spacing:5px;">TACTICAL_MODE</div>`;
            }
        }

        function triggerGhost() {
            vaultTaps++;
            if(vaultTaps >= 3) {
                document.getElementById('ghost-overlay').style.display = 'flex';
                document.getElementById('vault-pass').focus();
                vaultTaps = 0;
            }
        }

        function checkPass(val) {
            if(val === "1440") {
                alert('WELCOME TO THE SOVEREIGN LEDGER, COMMANDER.');
                document.getElementById('ghost-overlay').style.display = 'none';
                document.getElementById('vault-pass').value = "";
            }
        }
    </script>
</body>
</html>
