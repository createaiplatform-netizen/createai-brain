<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | DOME GRID</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; box-sizing: border-box; pointer-events: none; }
        .header { color: #d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }

        /* THE BUILDING DOME GRID */
        .grid-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr;
            gap: 10px; 
            height: 60vh;
            pointer-events: auto;
        }
        
        .sector { 
            border: 1px solid rgba(212,175,55,0.4); 
            background: rgba(0,0,0,0.8); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: #fff;
            transition: 0.1s;
            text-align: center;
        }
        
        .sector:active { background: #d4af37; color: #000; transform: scale(0.98); }
        .sector b { font-size: 18px; letter-spacing: 5px; display: block; margin-bottom: 5px; }
        .sector span { font-size: 9px; color: #d4af37; letter-spacing: 2px; }
        .sector:active span { color: #000; }

        #room-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #000; text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        
        .footer { text-align: center; color: #fff; font-size: 30px; font-weight: bold; padding-bottom: 10px; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="domeCanvas"></canvas>
    
    <div id="ui">
        <div class="header"><div>ARCH: DOME GRID</div><div>144,000%</div></div>
        
        <div class="grid-container">
            <div class="sector" onclick="openSector('MARKET', '#00f2ff', 'LIQUIDITY')"><b>MKT</b><span>SECTOR 01</span></div>
            <div class="sector" onclick="openSector('HUB', '#d4af37', 'CONNECTION')"><b>HUB</b><span>SECTOR 02</span></div>
            <div class="sector" onclick="openSector('GARDE', '#fff', 'PROTECTION')"><b>GRD</b><span>SECTOR 03</span></div>
            <div class="sector" onclick="openSector('NET', '#39ff14', 'ENCRYPTION')"><b>NET</b><span>SECTOR 04</span></div>
        </div>

        <div class="footer">$1.44T</div>
    </div>

    <div id="room-overlay" onclick="this.style.display='none'">
        <h1 id="s-title" style="font-size: 50px; letter-spacing: 15px; margin: 0;"></h1>
        <p id="s-desc" style="color: #d4af37; letter-spacing: 5px;"></p>
        <p style="margin-top: 40px; font-size: 10px; color: #666;">EXITING SECTOR...</p>
    </div>

    <script>
        const canvas = document.getElementById('domeCanvas'); const ctx = canvas.getContext('2d');
        let dots = []; let tint = '#d4af37';

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            // DOME GRID PARTICLES (Moving in a "building" upward motion)
            for(let i=0; i<80; i++) dots.push({x: Math.random()*canvas.width, y: canvas.height, v: Math.random()*8+4, r: Math.random()*2+1});
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = tint;
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
                d.y -= d.v; if(d.y < -10) { d.y = canvas.height; d.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(draw);
        }

        function openSector(name, color, desc) {
            tint = color;
            document.getElementById('room-overlay').style.display = 'flex';
            document.getElementById('s-title').innerText = name;
            document.getElementById('s-title').style.color = color;
            document.getElementById('s-desc').innerText = desc;
        }
    </script>
</body>
</html>
