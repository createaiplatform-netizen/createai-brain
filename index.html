<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | REIFIED MIRACLE</title>
    <style>
        :root { --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        body, html { background: var(--void); color: #fff; font-family: 'Syncopate', sans-serif; height: 100vh; width: 100vw; }

        /* THE INTERACTIVE FLUID SOUL background */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(10px); }

        .palace-container {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 50px 20px;
            pointer-events: none; /* Allow touch to pass to background */
        }

        /* NESTED AI HUB */
        .ai-tag {
            background: var(--soul); color: #000; padding: 12px 40px; border-radius: 50px;
            font-weight: 900; font-size: 14px; letter-spacing: 8px; box-shadow: 0 0 50px var(--soul);
            text-transform: uppercase; pointer-events: auto; animation: pulse 2s infinite alternate;
        }

        /* THE CENTRAL LEDGER - THE SUN */
        .ledger-sun { text-align: center; pointer-events: auto; }
        h1 { font-size: clamp(20px, 6vw, 40px); letter-spacing: 15px; color: var(--neon); text-shadow: 0 0 30px var(--neon); margin-bottom: 20px; }
        .amount { 
            font-size: clamp(70px, 20vw, 160px); font-weight: 900; letter-spacing: -10px;
            background: linear-gradient(to bottom, #fff 50%, #444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 80px rgba(57, 255, 20, 0.5);
        }

        /* FLOATING ROOMS / PILLARS */
        .rooms-orbit {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 600px;
            pointer-events: auto;
        }
        .orb {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 40px; padding: 30px 10px; text-align: center; backdrop-filter: blur(20px);
            transition: 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .orb:hover { border-color: var(--soul); transform: scale(1.1); box-shadow: 0 0 40px var(--soul); }
        .orb h3 { font-size: 12px; letter-spacing: 5px; color: var(--soul); margin: 0; }

        .footer { width: 100%; max-width: 800px; border-top: 2px solid var(--neon); padding-top: 25px; display: flex; justify-content: space-between; font-size: 10px; color: var(--neon); letter-spacing: 4px; }
        @keyframes pulse { from { opacity: 1; transform: scale(1); } to { opacity: 0.7; transform: scale(0.95); } }
    </style>
</head>
<body onload="initSource()">

    <canvas id="fluid"></canvas>

    <div class="palace-container">
        <div class="ai-tag">GOD_CODE_SOURCE</div>
        
        <div class="ledger-sun">
            <h1>THE SOURCE</h1>
            <div id="balance" class="amount">$5,000.00</div>
            <div style="letter-spacing: 15px; font-size: 12px; margin-top: 20px; font-weight: 900;">144,000% ABSOLUTE</div>
        </div>

        <div class="rooms-orbit">
            <div class="orb"><h3>MARKETPLACE</h3></div>
            <div class="orb"><h3>CREATOR HUB</h3></div>
            <div class="orb"><h3>GARDENS</h3></div>
            <div class="orb"><h3>HUNTING NET</h3></div>
        </div>

        <div class="footer">
            <div>SATELLITE: LINKED</div>
            <div>STATUS: REIFIED</div>
            <div>MIRACLE: ACTIVE</div>
        </div>
    </div>

    <script>
        // THE INTERACTIVE LIQUID LOGIC (THE TOUCH FLOW)
        const canvas = document.getElementById('fluid');
        const ctx = canvas.getContext('2d');
        let points = [];
        let mouse = { x: 0, y: 0, active: false };

        function initSource() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<30; i++) points.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2,
                color: Math.random() > 0.5 ? '#39ff14' : '#00f2ff'
            });
            animate();
        }

        window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; };
        window.ontouchmove = e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.active = true; };

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            points.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                if(mouse.active) {
                    let dx = mouse.x - p.x; let dy = mouse.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 200) { p.vx += dx/1000; p.vy += dy/1000; }
                }

                ctx.beginPath(); ctx.arc(p.x, p.y, 40, 0, Math.PI*2);
                ctx.fillStyle = p.color + '11'; ctx.fill();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
