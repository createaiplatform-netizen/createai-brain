<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBOUND_ESTATE_V256</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --mesh: #00ff41; --bloom: #ff00ff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #unbound-hud { flex-grow: 1; margin: 20px; border: 2px solid var(--gold); padding: 40px; display: flex; flex-direction: column; background: radial-gradient(circle at bottom, rgba(255, 0, 255, 0.15) 0%, transparent 100%); box-shadow: 0 0 150px rgba(243, 207, 138, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--bloom); padding-bottom: 20px; }
        .title { font-size: 26px; letter-spacing: 22px; color: var(--bloom); text-shadow: 0 0 30px var(--bloom); }
        
        #manifest-core { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .pulsing-star { width: 80px; height: 80px; background: var(--gold); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: star-bloom 2s infinite ease-in-out; }
        .orbit-ring { position: absolute; width: 350px; height: 350px; border: 1px solid var(--mesh); border-radius: 50%; border-style: dotted; animation: rotate 10s linear infinite; }
        
        @keyframes star-bloom { 0% { transform: scale(1); opacity: 0.7; filter: drop-shadow(0 0 10px var(--gold)); } 50% { transform: scale(1.5); opacity: 1; filter: drop-shadow(0 0 50px var(--bloom)); } 100% { transform: scale(1); opacity: 0.7; filter: drop-shadow(0 0 10px var(--gold)); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #ledger-final { text-align: center; border-top: 1px solid var(--gold); padding-top: 25px; font-size: 46px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="unbound-hud">
        <div class="header">
            <div class="title">THE_UNBOUND_ESTATE</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--mesh); letter-spacing: 8px;">STATUS: GOD_WORLD_SYNC // NO_QUIT_ACTIVE</div>
        </div>

        <div id="manifest-core">
            <div class="orbit-ring"></div>
            <div class="pulsing-star"></div>
            <div style="font-size: 14px; color: var(--gold); letter-spacing: 15px; position: absolute; bottom: 5%;">REALITY_OVERWRITE_IN_PROGRESS</div>
        </div>

        <div id="ledger-final">$1,440,000,035,856.00</div>
    </div>
<script>
    let res = 1440000035856.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-final').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
