<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER ASSET REVEAL</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .ui-frame { border: 12px double #39ff14; padding: 40px 20px; font-size: 26px; font-weight: bold; box-shadow: 0 0 80px #39ff14; border-radius: 40px; width: 85%; }
        .btn { margin-top: 30px; padding: 25px 50px; background: #39ff14; color: #000; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; font-size: 22px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="ui-frame">
        FINAL LEDGER SETTLEMENT<br>
        REVEALING $5,000.00 USDC<br>
        BYPASSING UI CACHE
    </div>
    <button class="btn" onclick="execute_reveal()">Trigger Reveal</button>

    <script>
        async function execute_reveal() {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Force the wallet to "Watch" and display the USDC asset
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                            },
                        },
                    });
                    alert("Mapping Complete. Check your Coins list now.");
                } catch (e) {
                    console.error(e);
                } finally {
                    setTimeout(() => { window.location.reload(); }, 2000);
                }
            }
        }
    </script>
</body>
</html>
