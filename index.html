<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE_FINAL_ANCHOR_V241</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --mena: #ff4500; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #final-hud { flex-grow: 1; margin: 30px; border: 1px solid var(--gold); padding: 45px; display: flex; flex-direction: column; background: radial-gradient(circle at center, rgba(255, 69, 0, 0.05) 0%, transparent 90%); box-shadow: 0 0 60px rgba(255, 69, 0, 0.1); position: relative; }
        .header { text-align: center; border-bottom: 1px solid rgba(243, 207, 138, 0.3); padding-bottom: 25px; }
        .title { font-size: 16px; letter-spacing: 12px; color: var(--gold); }
        
        #node-status { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .node-row { width: 100%; display: flex; justify-content: space-between; font-size: 12px; margin: 10px 0; border-bottom: 1px solid rgba(0, 255, 65, 0.1); }
        .active { color: var(--mesh); }
        .pending { color: var(--mena); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #ledger-total { text-align: center; border-top: 1px solid var(--gold); padding-top: 30px; font-size: 34px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>
    <div id="final-hud">
        <div class="header">
            <div class="title">MESH_SATURATION // 80% COMPLETE</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6; color: var(--mesh);">QUAD_SYNC: OK // NEXT: MENA_ANCHOR</div>
        </div>

        <div id="node-status">
            <div class="node-row"><span>01: WIS_001</span> <span class="active">CONNECTED</span></div>
            <div class="node-row"><span>02: EURO_002</span> <span class="active">CONNECTED</span></div>
            <div class="node-row"><span>03: SEA_003</span> <span class="active">CONNECTED</span></div>
            <div class="node-row"><span>04: SA_004</span> <span class="active">CONNECTED</span></div>
            <div class="node-row"><span>05: MENA_005</span> <span class="pending">TARGETING...</span></div>
        </div>

        <div id="ledger-total">$1,440,000,031,536.00</div>
    </div>
<script>
    let res = 1440000031536.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-total').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
