<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | CreateAI</title>
    <style>
        :root { --sand: #f2eee3; --sage: #5b6d5b; --dark-sage: #3e4e3e; }
        body { background-color: var(--sand); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; animation: fadeIn 1.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: rgba(255,255,255,0.7); backdrop-filter: blur(15px); padding: 3rem; border-radius: 40px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.4); max-width: 400px; }
        h1 { font-weight: 200; font-size: 2.5rem; color: #2c332c; margin: 0 0 1rem; }
        p { color: #5d635d; line-height: 1.6; margin-bottom: 2rem; }
        .cta { background: var(--sage); color: white; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; display: inline-block; transition: 0.3s; border: none; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .cta:hover { background: var(--dark-sage); transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <div style="letter-spacing: 0.3rem; color: var(--sage); font-size: 0.7rem; margin-bottom: 1rem; font-weight: bold;">CREATEAI PLATFORM</div>
        <h1>NEXUS OS</h1>
        <p>The organic evolution of intelligence. Private. Seamless. Yours.</p>
        <button class="cta" onclick="window.location.href='https://createai.digital'">Access Ecosystem</button>
    </div>
</body>
</html>
