<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_PULSE_REPORT</title>
    <style>
        body { margin: 0; background: #000; color: #f3cf8a; font-family: 'Cinzel', serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .pulse-orb { width: 5px; height: 5px; background: #f3cf8a; border-radius: 50%; animation: pulse 10s ease-in-out infinite; box-shadow: 0 0 15px #f3cf8a; }
        @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.4; transform: scale(3); } }
        .valuation { position: absolute; bottom: 40px; font-size: 16px; letter-spacing: 3px; color: #fff; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div class="pulse-orb"></div>
    <div class="valuation" id="heartbeat">$1,440,000,152,736.00</div>
<script>
    let val = 1440000152736.00;
    setInterval(() => {
        val += 288.00; 
        document.getElementById('heartbeat').innerText = "$" + val.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
