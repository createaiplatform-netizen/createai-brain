<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // SOVEREIGN_VAULT_V58</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --gold-d: #b8860b; --obsidian: #050208; --void: #010103; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        #ripple-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .nebula { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, var(--obsidian) 0%, var(--void) 100%); z-index: 0; }

        #main-view { height: 100svh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); }

        .status-header { position: fixed; top: 0; padding-top: env(safe-area-inset-top, 20px); font-family: 'Great Vibes', cursive; font-size: 1.6rem; color: var(--gold); z-index: 100; text-align: center; width: 100%; text-shadow: 0 0 10px rgba(243, 207, 138, 0.5); }

        .source-title { 
            font-family: 'Cinzel'; font-weight: 900; font-size: 10vw; letter-spacing: 18px; 
            color: var(--gold); background: linear-gradient(90deg, var(--gold-d), var(--gold), #fff, var(--gold), var(--gold-d));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px #000); animation: shine 8s linear infinite; cursor: pointer; transition: 0.6s;
        }

        .app-container { position: absolute; width: 100%; height: 100%; opacity: 0; pointer-events: none; transition: 0.8s; transform: scale(0.7); }
        .app-container.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        .app-orb {
            width: 85px; height: 85px; border-radius: 50%; border: 1.5px solid var(--gold);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            font-family: 'Cinzel'; font-size: 9px; color: var(--gold); font-weight: 900;
            background: rgba(243, 207, 138, 0.08); backdrop-filter: blur(10px);
            position: absolute; box-shadow: 0 0 25px rgba(243, 207, 138, 0.2);
            animation: orbFloat 6s ease-in-out infinite; transition: 0.3s;
        }
        .app-orb:active { transform: scale(0.9); box-shadow: 0 0 40px var(--gold); }

        .close-portal { position: absolute; bottom: 120px; font-family: 'Cinzel'; color: var(--gold); letter-spacing: 4px; font-size: 12px; cursor: pointer; opacity: 0; transition: 0.5s; }

        .dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(1,1,3,0.98); backdrop-filter: blur(25px); border-top: 1px solid rgba(243, 207, 138, 0.1); display: flex; justify-content: space-around; align-items: center; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); }
        .dock-item { color: rgba(255,255,255,0.2); font-family: 'Cinzel'; font-size: 11px; letter-spacing: 2px; flex: 1; text-align: center; padding: 15px; font-weight: 900; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes orbFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
        .system-hum { animation: hum 0.1s infinite; }
        @keyframes hum { 0% { transform: translate(1px, 0); } 50% { transform: translate(-1px, 0); } }
    </style>
</head>
<body onload="render('vault'); startLiveRating();">
    <div class="status-header" id="status-text">Sovereign 144.00%</div>
    <div class="nebula"></div>
    <canvas id="ripple-canvas"></canvas>
    
    <div id="main-view">
        <div id="room-content" style="text-align: center; transition: 0.8s;"></div>
        <div id="portal-apps" class="app-container">
            <div class="app-orb" style="top: 15%; left: 15%; animation-delay: 0s;">MINT_AI</div>
            <div class="app-orb" style="top: 10%; right: 15%; animation-delay: 1s;">LEDGER</div>
            <div class="app-orb" style="bottom: 30%; left: 10%; animation-delay: 0.5s;">RESERVE</div>
            <div class="app-orb" style="bottom: 35%; right: 15%; animation-delay: 1.5s;">SWAP_AI</div>
        </div>
        <div class="close-portal" id="close-btn" onclick="togglePortal(false)">[ COLLAPSE ]</div>
    </div>
    
    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('vault')">VAULT</div>
    </div>

    <script>
        const canvas = document.getElementById('ripple-canvas');
        const ctx = canvas.getContext('2d');
        let ripples = [];
        let isPortalOpen = false;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function togglePortal(open) {
            isPortalOpen = open;
            document.getElementById('portal-apps').classList.toggle('active', open);
            document.getElementById('close-btn').style.opacity = open ? "1" : "0";
            document.getElementById('room-content').style.transform = open ? "scale(0.55) translateY(-200px)" : "scale(1) translateY(0)";
        }

        class Ripple {
            constructor(x, y) { this.x = x; this.y = y; this.r = 0; this.life = 1; }
            update() { this.r += 7; this.life -= 0.02; }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(243, 207, 138, ${this.life * 0.35})`;
                ctx.lineWidth = 1.5; ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ripples.forEach((r, i) => { r.update(); r.draw(); if (r.life <= 0) ripples.splice(i, 1); });
            requestAnimationFrame(animate);
        }
        animate();

        const handleInput = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            ripples.push(new Ripple(x, y));
            document.body.classList.add('system-hum');
            setTimeout(() => document.body.classList.remove('system-hum'), 100);
        };

        window.onmousedown = handleInput;
        window.ontouchstart = handleInput;

        function render(view) {
            togglePortal(false);
            const rc = document.getElementById('room-content');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + (view === 'vault' ? 'cav' : (view === 'registry' ? 'reg' : view.substring(0,3)))).classList.add('active');
            
            let title = view.toUpperCase();
            if(view === 'home') title = "SOURCE";
            if(view === 'registry') title = "GRID";
            if(view === 'garden') title = "EDEN";

            rc.innerHTML = `<h1 class="source-title" onclick="togglePortal(true)">${title}</h1>
                            <p style="font-family:'Great Vibes'; color:var(--gold); font-size:2.4rem; margin-top:15px;">Legacy of the 144</p>`;
        }

        function startLiveRating() {
            const statusText = document.getElementById('status-text');
            setInterval(() => {
                const decimal = (Math.random() * 0.1).toFixed(2);
                statusText.innerText = `Sovereign 144.${decimal.split('.')[1]}%`;
            }, 3000);
        }
    </script>
</body>
</html>
