<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // THE_SINGULARITY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        
        :root { --gold: #f3cf8a; --void: #020205; --glow: rgba(243, 207, 138, 0.4); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; 
            overflow-x: hidden; min-height: 100vh; cursor: crosshair;
        }

        /* THE COSMIC FABRIC */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
            z-index: -1;
        }
        .singularity {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; background: var(--gold);
            border-radius: 50%; filter: blur(120px); opacity: 0.15;
            animation: pulse 8s infinite alternate; z-index: -1;
        }

        nav { 
            padding: 80px 50px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo { 
            font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 12px; color: var(--gold); 
            font-size: 0.7rem; text-transform: uppercase;
        }

        #main-view { padding: 50px; max-width: 1800px; margin: 0 auto; animation: manifest 2s ease-out; }

        /* THE MANIFESTATION CARDS */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 50px; }
        .card { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(243, 207, 138, 0.05); 
            padding: 60px; border-radius: 4px; position: relative; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(25px); overflow: hidden;
        }
        .card:hover { 
            background: rgba(255, 255, 255, 0.05); border-color: var(--gold);
            transform: translateY(-20px) scale(1.02); box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .card h2 { font-family: 'Cinzel', serif; font-weight: 400; letter-spacing: 5px; color: var(--gold); font-size: 1.5rem; }

        /* THE ETERNAL COMMAND */
        .command-trigger {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            text-align: center; z-index: 2000; cursor: pointer;
        }
        .core-orb {
            width: 15px; height: 15px; background: var(--gold); border-radius: 50%;
            margin: 0 auto 15px; box-shadow: 0 0 30px var(--gold); animation: blink 2s infinite;
        }
        .core-text { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; opacity: 0.7; }

        /* TYPOGRAPHY OF THE GODS */
        h1.hero { font-family: 'Cinzel', serif; font-size: 10vw; font-weight: 900; margin: 0; letter-spacing: 30px; text-transform: uppercase; color: #fff; text-align: center; opacity: 0.9; }
        
        .cta { 
            background: transparent; border: 1px solid rgba(243, 207, 138, 0.3); color: var(--gold); 
            padding: 25px; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 8px;
            cursor: pointer; transition: 0.5s; text-transform: uppercase; margin-top: 50px;
        }
        .cta:hover { border-color: var(--gold); background: var(--gold); color: black; box-shadow: 0 0 30px var(--glow); }

        /* INPUT REALM */
        input { 
            background: transparent; border: none; border-bottom: 1px solid rgba(243, 207, 138, 0.1);
            color: #fff; padding: 30px; width: 100%; font-size: 2rem; font-family: 'Inter', sans-serif; font-weight: 100;
            outline: none; transition: 0.5s; text-align: center;
        }
        input:focus { border-bottom-color: var(--gold); }

        /* ANIMATIONS */
        @keyframes pulse { from { opacity: 0.1; filter: blur(120px); } to { opacity: 0.3; filter: blur(150px); } }
        @keyframes manifest { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body onload="showView('home')">

    <div class="stars"></div>
    <div class="singularity"></div>

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI // ORIGIN</div>
        <div style="display:flex; gap: 40px;">
            <span onclick="showView('market')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; opacity:0.5; font-family:'Cinzel';">NODES</span>
            <span onclick="showView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; color:var(--gold); font-family:'Cinzel';">GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <div class="command-trigger" onclick="showView('ai_chat')">
        <div class="core-orb"></div>
        <div class="core-text">Ascend to Command</div>
    </div>

    <script>
        let registry = [
            { name: "THE SOURCE", cat: "CORE", desc: "Infinite generative logic of the first mover." },
            { name: "LIFELINE", cat: "WELLNESS", desc: "The biological restoration protocol for humanity." },
            { name: "LEGACY", cat: "ASSETS", desc: "Encryption of the family lineage and wealth." },
            { name: "EDEN", cat: "CHILDREN", desc: "The pure, free portal for the creators of tomorrow." }
        ];

        for (let i = 5; i <= 122; i++) {
            registry.push({ name: `Protocol_${i}`, cat: "MANIFESTATION", desc: "Standing by in the void." });
        }

        const views = {
            home: `
                <div style="text-align:center; padding-top: 10vh;">
                    <h1 class="hero">Origin</h1>
                    <p style="letter-spacing:20px; text-transform:uppercase; font-size:0.9rem; opacity:0.3; margin-top:30px; font-family:'Cinzel';">Built for God's World</p>
                    <div style="max-width:500px; margin:150px auto 0;">
                        <button class="cta" onclick="showView('market')">Registry of Power</button>
                        <button class="cta" style="border:none; opacity:0.5;" onclick="showView('garden')">The Sacred Gardens</button>
                    </div>
                </div>
            `,
            market: () => `
                <h1 style="font-family:'Cinzel'; font-weight:100; font-size:3rem; letter-spacing:20px; margin-bottom:100px; text-align:center; opacity:0.8;">THE REGISTRY</h1>
                <div class="app-grid">${registry.map(app => `
                    <div class="card" onclick="openNode('${app.name}')">
                        <div style="font-size:0.5rem; letter-spacing:6px; color:var(--gold); margin-bottom:30px; opacity:0.5;">${app.cat}</div>
                        <h2>${app.name}</h2>
                        <p style="font-size:0.8rem; opacity:0.3; line-height:2.2; font-weight:300;">${app.desc}</p>
                    </div>
                `).join('')}</div>
            `,
            garden: `
                <div style="text-align:center; padding-top:5vh;">
                    <h1 style="font-family:'Cinzel'; font-weight:100; font-size:4rem; letter-spacing:15px; color:var(--gold);">EDEN</h1>
                    <p style="opacity:0.4; letter-spacing:5px;">A Pure Sanctuary for Children</p>
                    <div class="app-grid" style="margin-top:100px;">
                        <div class="card" onclick="openNode('Art Genesis')"><h2>Art</h2></div>
                        <div class="card" onclick="openNode('Sound Genesis')"><h2>Music</h2></div>
                        <div class="card" onclick="openNode('Dream Genesis')"><h2>Dreams</h2></div>
                    </div>
                </div>
            `,
            ai_chat: `
                <div style="max-width:1000px; margin:0 auto; text-align:center; animation: manifest 1s ease-out;">
                    <h2 style="font-family:'Cinzel'; font-weight:100; color:var(--gold); letter-spacing:15px; margin-bottom:80px;">COMMAND CENTER</h2>
                    <div id="chat-flow" style="height:450px; overflow-y:auto; margin-bottom:60px; text-align:left; font-weight:100; line-height:2.5; padding:0 40px;">
                        <div style="color:var(--gold); opacity:0.4; letter-spacing:4px; font-size:0.7rem; margin-bottom:40px;">[LINK ESTABLISHED // SOVEREIGN_VOICE ONLINE]</div>
                        <div style="opacity:0.7; font-size:1.4rem;">Speak your truth. The Universe is listening.</div>
                    </div>
                    <input type="text" id="user-input" placeholder="..." autocomplete="off">
                    <button class="cta" style="margin-top:60px; max-width:400px;" onclick="talk()">Manifest Command</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            window.scrollTo(0,0);
        }

        function talk() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin:40px 0; border-left:1px solid var(--gold); padding-left:30px; font-size:1.2rem;">${input.value}</div>`;
            flow.innerHTML += `<div style="color:var(--gold); opacity:0.8;">" ${input.value} " // Manifesting logic...</div>`;
            input.value = ''; flow.scrollTop = flow.scrollHeight;
        }

        function openNode(name) {
            showView('ai_chat');
            setTimeout(() => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML += `<div style="margin-top:40px; color:var(--gold); letter-spacing:5px; font-size:0.8rem;">PROTOCOL_${name}_ACTIVE</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
