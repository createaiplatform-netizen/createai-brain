<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN NEBULA</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        /* The glow filter that turns shards into beautiful light-paint */
        canvas { display: block; filter: saturate(1.8) brightness(1.2) contrast(1.1); }
    </style>
</head>
<body>
    <canvas id="nebulaCanvas"></canvas>

<script>
/**
 * THE INVENTION: ATMOSPHERIC DEPTH RENDERING
 * Eliminating the grid. Creating a living, beautiful world.
 */

const canvas = document.getElementById('nebulaCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// ZONAL HAPTICS
function triggerZonalHaptic(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    if (x < w/2 && y < h/2) { osc.type = 'square'; osc.frequency.value = 120; if(navigator.vibrate) navigator.vibrate([10,5,10]); }
    else if (x >= w/2 && y < h/2) { osc.type = 'sine'; osc.frequency.value = 1000; if(navigator.vibrate) navigator.vibrate(5); }
    else if (x < w/2 && y >= h/2) { osc.type = 'sawtooth'; osc.frequency.value = 60; if(navigator.vibrate) navigator.vibrate(40); }
    else { osc.type = 'triangle'; osc.frequency.value = 300; if(navigator.vibrate) navigator.vibrate(20); }

    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

const particles = [];
class Particle {
    constructor(x, y, hue) {
        this.x = x; this.y = y;
        this.hue = hue;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.decay = 0.01 + Math.random() * 0.02;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= this.decay;
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
});
window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    // Spawn color based on zone
    let h = (tx < w/2 && ty < h/2) ? 0 : (tx >= w/2 && ty < h/2) ? 200 : (tx < w/2 && ty >= h/2) ? 45 : 280;
    for(let i=0; i<5; i++) particles.push(new Particle(tx, ty, h));
    triggerZonalHaptic(tx, ty);
});
window.addEventListener('touchend', () => isTouching = false);

function render() {
    const time = Date.now() * 0.001;
    
    // THE BACKGROUND: Swirling Prismatic Nebula
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    grad.addColorStop(0, `hsla(${200 + Math.sin(time)*30}, 100%, 5%, 1)`);
    grad.addColorStop(0.5, `hsla(${280 + Math.cos(time)*30}, 100%, 2%, 1)`);
    grad.addColorStop(1, '#000');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // THE TOUCH PARTICLES
    for(let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        if(p.life <= 0) { particles.splice(i, 1); continue; }
        
        ctx.shadowBlur = p.life * 20;
        ctx.shadowColor = `hsla(${p.hue}, 100%, 50%, ${p.life})`;
        ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.life})`;
        
        // Draw shards, not dots
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.life * Math.PI);
        ctx.fillRect(-10 * p.life, -1 * p.life, 20 * p.life, 2);
        ctx.restore();
    }

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
