<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN MEMBRANE</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        /* The Filter merges everything into a solid liquid - NO DOTS */
        canvas { display: block; filter: blur(4px) contrast(20) brightness(1.2) saturate(1.8); }
    </style>
</head>
<body>
    <canvas id="fluidCanvas"></canvas>

<script>
/**
 * INVENTION: THE NON-PARTICULATE MEMBRANE
 * Uses a Metaball Blur-Contrast technique to turn dots into a solid liquid.
 */

const canvas = document.getElementById('fluidCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// ZONAL HAPTICS: Different feeling for different corners
function triggerZonalSense(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    if (y < h * 0.2 && x < w * 0.2) {
        // TOP LEFT: "The Command" - Sharp, glass-like chime
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate([5, 5, 5]);
    } else if (y > h * 0.8) {
        // BOTTOM: "The Foundation" - Deep, heavy thrum
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(60, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(40);
    } else {
        // CENTER: "The Liquid Core" - Smooth, warm ripple
        osc.type = 'triangle'; osc.frequency.setValueAtTime(144, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(15);
    }

    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

// The "Workforce" is now a high-density liquid mesh
const points = [];
for(let i=0; i<300; i++) {
    points.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: 0, vy: 0, size: 40 + Math.random() * 60
    });
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerZonalSense(tx, ty);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    if (Math.random() > 0.8) triggerZonalSense(tx, ty);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // Background is now a deep gold base so it NEVER goes black
    ctx.fillStyle = '#1a1400';
    ctx.fillRect(0, 0, w, h);

    points.forEach(p => {
        if (isTouching) {
            const dx = tx - p.x;
            const dy = ty - p.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < 300) {
                p.vx += dx * 0.01;
                p.vy += dy * 0.01;
            }
        }
        p.vx *= 0.95; p.vy *= 0.95;
        p.x += p.vx; p.y += p.vy;

        // Visual Zonal Logic: Colors change based on position
        const hue = p.y < h * 0.3 ? 55 : (p.y > h * 0.7 ? 40 : 48);
        ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        // Edge Wrap
        if (p.x < -100) p.x = w + 100; if (p.x > w + 100) p.x = -100;
        if (p.y < -100) p.y = h + 100; if (p.y > h + 100) p.y = -100;
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
