<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEARTH | OMNI-HUB</title>
    <style>
        :root { --gold: #c4a97a; --ink: #1d1d1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #fff; color: var(--ink); height: 100vh; overflow: hidden; }
        .view { display: none; height: 100vh; flex-direction: column; overflow-y: auto; padding-bottom: 120px; }
        .view.active { display: flex; }
        .header { padding: 60px 20px; text-align: center; letter-spacing: 15px; font-weight: 900; border-bottom: 1px solid #f0f0f0; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; background: #f0f0f0; gap: 1px; }
        .card { background: #fff; padding: 35px 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 280px; }
        .icon { font-size: 2.5rem; margin-bottom: 15px; }
        .tag { font-size: 0.5rem; font-weight: 900; color: #bbb; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 0.85rem; font-weight: 700; margin-top: 5px; }
        .price { font-size: 0.75rem; color: var(--gold); font-weight: 800; margin-top: 5px; }
        .admin-box { margin: 20px; padding: 30px; background: #f9f9f9; border-radius: 20px; border: 1px solid #eee; }
        input { width: 100%; padding: 15px; margin: 10px 0 20px 0; border: 1px solid #eee; border-radius: 12px; font-size: 1rem; }
        .btn-deploy { width: 100%; padding: 20px; background: var(--ink); color: #fff; border: none; border-radius: 50px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        nav { position: fixed; bottom: 25px; left: 15px; right: 15px; background: #000; padding: 20px; border-radius: 100px; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-link { color: #fff; font-size: 0.55rem; font-weight: 900; text-transform: uppercase; opacity: 0.4; text-decoration: none; cursor: pointer; }
        .nav-link.active { opacity: 1; }
    </style>
</head>
<body>
    <div id="marketView" class="view active">
        <header class="header"><div>HEARTH</div></header>
        <div class="grid" id="mainStore">
            <div class="card"><span class="icon">⚙️</span><div><span class="tag">Flagship</span><p class="name">Home-Port</p><p class="price">$1,299</p></div></div>
        </div>
    </div>
    <div id="creatorView" class="view">
        <div style="padding: 40px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase;">Command Deck</div>
        <div class="admin-box">
            <input type="text" id="pName" placeholder="Product Name">
            <input type="text" id="pPrice" placeholder="Price">
            <input type="text" id="pIcon" placeholder="Emoji Icon">
            <button class="btn-deploy" onclick="deployToMarket()">Push to Marketplace</button>
            <button class="btn-deploy" style="background:#ff3b30; margin-top:10px;" onclick="clearMarket()">Clear My Pushes</button>
        </div>
    </div>
    <nav>
        <div class="nav-link active" onclick="showPortal('marketView', this)">Market</div>
        <div class="nav-link" onclick="showPortal('creatorView', this)">Creator Hub</div>
    </nav>
    <script>
        function showPortal(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
        function deployToMarket() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const icon = document.getElementById('pIcon').value || '📦';
            if(!name || !price) return alert("Fill in Name and Price.");
            const asset = { name, price, icon };
            let saved = JSON.parse(localStorage.getItem('hearth_assets') || '[]');
            saved.push(asset);
            localStorage.setItem('hearth_assets', JSON.stringify(saved));
            loadAssets();
            showPortal('marketView', document.querySelectorAll('.nav-link')[0]);
        }
        function loadAssets() {
            const store = document.getElementById('mainStore');
            const saved = JSON.parse(localStorage.getItem('hearth_assets') || '[]');
            let html = '<div class="card"><span class="icon">⚙️</span><div><span class="tag">Flagship</span><p class="name">Home-Port</p><p class="price">$1,299</p></div></div>';
            saved.forEach(a => {
                html += `<div class="card"><span class="icon">${a.icon}</span><div><span class="tag">Sovereign Asset</span><p class="name">${a.name}</p><p class="price">${a.price}</p></div></div>`;
            });
            store.innerHTML = html;
        }
        function clearMarket() {
            localStorage.removeItem('hearth_assets');
            loadAssets();
            alert("Local storage cleared.");
        }
        loadAssets();
    </script>
</body>
</html>
