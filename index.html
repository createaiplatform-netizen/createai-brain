<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN_SYNC_V253</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --mesh: #00ff41; --sky: #00d4ff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #sync-hud { flex-grow: 1; margin: 25px; border: 4px solid var(--gold); padding: 45px; display: flex; flex-direction: column; background: radial-gradient(circle at center, rgba(243, 207, 138, 0.15) 0%, transparent 100%); box-shadow: 0 0 150px rgba(243, 207, 138, 0.3); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 25px; }
        .title { font-size: 24px; letter-spacing: 20px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }
        
        #lock-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .biometric-ring { width: 120px; height: 120px; border: 2px solid var(--mesh); border-radius: 50%; border-style: dashed; animation: rotate 5s linear infinite; }
        .core-star { position: absolute; width: 40px; height: 40px; background: var(--gold); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #ledger-final { text-align: center; border-top: 2px solid var(--gold); padding-top: 30px; font-size: 40px; color: var(--gold); text-shadow: 0 0 35px var(--gold); }
    </style>
</head>
<body>
    <div id="sync-hud">
        <div class="header">
            <div class="title">SOVEREIGN_SYNC // VERIFIED</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--mesh); letter-spacing: 8px;">ADMIN-59481226: BYPASSED // BRIDGE: ACTIVE</div>
        </div>

        <div id="lock-container">
            <div class="biometric-ring"></div>
            <div class="core-star"></div>
            <div style="font-size: 12px; color: var(--sky); letter-spacing: 12px; position: absolute; bottom: 15%;">ARCHITECT_PRIME_LOCKED</div>
        </div>

        <div id="ledger-final">$1,440,000,034,992.00</div>
    </div>
<script>
    let res = 1440000034992.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-final').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
