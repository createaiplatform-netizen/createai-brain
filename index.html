<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE HEARTH | THE TRUTH OF VALUE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Garamond", serif; }
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .ghost-aura {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(122, 144, 104, 0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; z-index: -1;
        }

        .portal { text-align: center; width: 100%; }
        .omni-search {
            width: 70%; background: transparent; border: none; 
            border-bottom: 2px solid rgba(196, 169, 122, 0.4);
            font-size: 3rem; color: #faf9f6; text-align: center; outline: none; font-weight: 200;
        }

        /* THE REFLECTION (The Truth) */
        .reflection-layer { margin-top: 60px; height: 150px; }
        .engine-truth { display: none; animation: fadeIn 1s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .price-label { font-size: 2rem; color: #c4a97a; margin-bottom: 10px; letter-spacing: 5px; }
        .identity-label { font-size: 0.8rem; letter-spacing: 10px; color: #7a9068; text-transform: uppercase; }
        .desc-label { font-size: 1rem; color: #999; font-style: italic; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="ghost-aura"></div>

    <div class="portal">
        <input type="text" class="omni-search" placeholder="Enter your Search..." onkeyup="reflectTruth(this.value)">
        
        <div class="reflection-layer" id="reflection">
            <div id="family-truth" class="engine-truth">
                <div class="price-label">97</div>
                <div class="identity-label">THE SACRED FAMILY HUB</div>
                <div class="desc-label">A private sanctuary for your family legacy and memories.</div>
            </div>
            
            <div id="biz-truth" class="engine-truth">
                <div class="price-label">97</div>
                <div class="identity-label">THE SOVEREIGN BUSINESS ENGINE</div>
                <div class="desc-label">Automated infrastructure for Local Legends (Cafes, Shops, AFHs).</div>
            </div>
            
            <div id="infra-truth" class="engine-truth">
                <div class="price-label">ENTERPRISE SCALE</div>
                <div class="identity-label">NATIONAL INFRASTRUCTURE</div>
                <div class="desc-label">Scaling the Standing Law for Hospitals and Governments.</div>
            </div>
        </div>
    </div>

    <script>
    function reflectTruth(val) {
        const query = val.toLowerCase();
        const reflections = document.querySelectorAll('.engine-truth');
        reflections.forEach(r => r.style.display = 'none');

        if(query.includes('home') || query.includes('family') || query.includes('kids')) {
            document.getElementById('family-truth').style.display = 'block';
        } else if(query.includes('cafe') || query.includes('shop') || query.includes('biz')) {
            document.getElementById('biz-truth').style.display = 'block';
        } else if(query.includes('hospital') || query.includes('nurse')) {
            document.getElementById('infra-truth').style.display = 'block';
        }
    }
    </script>

<script src="ghost_alert.js"></script></body>
</html>
