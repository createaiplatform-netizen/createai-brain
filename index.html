<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_KINETIC_V103</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #master { width: 100%; height: 100%; transition: opacity 1.5s; opacity: 1; }
        .grain { position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 5; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .title { font-family: 'Cinzel'; font-size: 10vw; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 50px rgba(0,0,0,1); text-align: center; }
        .quote { font-family: 'Great Vibes'; font-size: 2rem; color: var(--gold); margin-top: 10px; opacity: 0.8; }
        #vault-stats { position: fixed; bottom: 120px; right: 30px; font-family: 'Cinzel'; color: var(--gold); font-size: 14px; letter-spacing: 2px; text-align: right; }
        #whisper { position: fixed; bottom: 85px; width: 100%; text-align: center; font-family: 'Cinzel'; font-size: 7px; color: var(--gold); opacity: 0.4; }
        .guide { position: fixed; font-family: 'Cinzel'; font-size: 7px; color: var(--gold); opacity: 0.1; }
        .tl { top: 50px; left: 30px; } .tr { top: 50px; right: 30px; } .bl { bottom: 50px; left: 30px; } .br { bottom: 40px; right: 30px; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div class="grain"></div>
        <div id="vault-stats">VALUE: 0</div>
        <div class="guide tl">NEXUS</div> <div class="guide tr">EDEN</div> <div class="guide bl">SOURCE</div> <div class="guide br">VAULT</div>
        <div id="whisper">KINETIC_VALUE_ENGAGED</div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title" id="t">SOURCE</h1>
            <p class="quote" id="q">The One Origin</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'home', items = [], vaultPile = [], isDown = false, mx = 0, my = 0, auraSize = 65;
    let totalValue = 0, bigCoin = 0, gravity = 0.25, friction = 0.98, bounce = -0.4;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function handle(e) {
        isDown = true;
        const x = e.clientX || e.touches[0].clientX; const y = e.clientY || e.touches[0].clientY;
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;
        if (y < h/2) {
            view = (x < w/2) ? 'grid' : 'eden';
            setUI(view.toUpperCase(), view === 'grid' ? "Neural Sync" : "Living Garden", view === 'grid' ? "#00f2ff" : "#2ecc71");
        } else {
            view = (x < w/2) ? 'home' : 'vault';
            setUI(view.toUpperCase(), view === 'home' ? "The One Origin" : "Mass of Value", view === 'home' ? "#a188ff" : "#f3cf8a");
        }
    }
    function track(e) { mx = e.clientX || e.touches[0].clientX; my = e.clientY || e.touches[0].clientY; }
    function stop() { 
        if(view === 'vault' && bigCoin > 5) {
            totalValue += Math.round(bigCoin * 10);
            document.getElementById('vault-stats').innerText = "VALUE: " + totalValue.toLocaleString();
            // SHATTER EFFECT
            for(let i=0; i<40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let force = Math.random() * 10 + 5;
                vaultPile.push({
                    x: mx, y: my, 
                    vx: Math.cos(angle) * force, 
                    vy: Math.sin(angle) * force, 
                    r: Math.random() * 3 + 2, 
                    age: 0
                });
            }
        }
        isDown = false; bigCoin = 0; 
    }

    function setUI(t, q, c) { document.getElementById('t').innerText = t; document.getElementById('q').innerText = q; document.getElementById('t').style.color = c; }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;
        
        // Aura
        let auraColor = (view === 'grid') ? '0, 242, 255' : (view === 'eden') ? '46, 204, 113' : (view === 'home' ? '161, 136, 255' : '243, 207, 138');
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, (auraSize + (totalValue/2000)) * 3);
        g.addColorStop(0, 'rgba(255,255,255,0.8)'); g.addColorStop(0.2, `rgba(${auraColor}, 0.2)`); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, (auraSize + (totalValue/2000)) * 3, 0, Math.PI*2); ctx.fill();

        if (isDown && view === 'vault') {
            bigCoin = Math.min(bigCoin + 0.6, 50);
            ctx.fillStyle = 'rgba(243, 207, 138, 0.8)';
            ctx.beginPath(); ctx.arc(mx, my, bigCoin, 0, Math.PI*2); ctx.fill();
        }

        vaultPile.forEach((p, i) => {
            p.vy += gravity;
            p.x += p.vx;
            p.y += p.vy;

            // Floor Collision
            if (p.y + p.r > canvas.height) {
                p.y = canvas.height - p.r;
                p.vy *= bounce;
                p.vx *= friction;
            }
            // Wall Collision
            if (p.x + p.r > canvas.width || p.x - p.r < 0) p.vx *= -1;

            p.age++;
            ctx.fillStyle = `rgba(243, 207, 138, ${Math.max(0, 1 - p.age/800)})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            if (p.age > 800) vaultPile.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
