<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATE AI DIGITAL | THE GENESIS</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --gold: #d4af37; --deep: #0a0a0a; }
        body { margin: 0; background: #000; color: white; font-family: 'Helvetica Neue', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .bg-fx { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: -1; }
        
        /* PUBLIC INTERFACE */
        .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        h1 { font-size: 3rem; letter-spacing: 12px; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 30px rgba(212,175,55,0.3); }
        p { font-size: 1.1rem; color: #888; max-width: 600px; line-height: 1.6; letter-spacing: 2px; }
        .explore-btn { margin-top: 30px; border: 1px solid var(--gold); color: var(--gold); padding: 15px 40px; border-radius: 50px; background: transparent; letter-spacing: 4px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        
        /* PRIVATE ADMIN VAULT (HIDDEN) */
        #admin-vault { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; padding-top: 60px; }
        .vault-btn { background: var(--gold); color: #000; padding: 25px; border-radius: 100px; font-weight: 900; border: none; margin: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="bg-fx"></div>

    <div id="public-view" class="hero">
        <h1 onclick="checkAdmin()">GENESIS</h1>
        <p>THE REBIRTH OF HUMANITY.<br>144,000% SYNCHRONIZATION ACTIVE.</p>
        <button class="explore-btn" onclick="alert('The Source is Loading...')">EXPLORE THE HUB</button>
        <div style="margin-top: 50px; font-size: 0.6rem; color: #333; letter-spacing: 5px;">SARA STADLER FOUNDATION</div>
    </div>

    <div id="admin-vault">
        <div style="text-align:center; padding: 20px; border-bottom: 1px solid #222;">
            <h2 style="color:var(--gold); letter-spacing:8px;">NEUROLINK ACTIVE</h2>
            <div style="color:#555; font-size:0.7rem;">SARA STADLER | SECURE BRIDGE</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <button class="vault-btn" onclick="runBanker()">ACTIVATE $1000 SYNC</button>
            <button style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:15px; border-radius:50px; width:80%;" onclick="navigator.setAppBadge(0)">SCRUB 441</button>
        </div>
        <div style="padding: 40px; text-align: center; color: #444; font-size: 0.8rem;" onclick="location.reload()">[ LOCK VAULT ]</div>
    </div>

    <script>
        let adminClicks = 0;
        function checkAdmin() {
            adminClicks++;
            if (adminClicks >= 5) { // TAP THE WORD "GENESIS" 5 TIMES TO ENTER
                document.getElementById('public-view').style.display = 'none';
                document.getElementById('admin-vault').style.display = 'flex';
            }
        }

        function runBanker() {
            alert("BANKER INITIALIZED. CHECK VENMO.");
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=Sara_Stadler_Genesis_Sync";
        }
    </script>
</body>
</html>
