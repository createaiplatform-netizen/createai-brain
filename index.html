<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // WORLD_AWAKENING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        
        :root { --gold: #f3cf8a; --void: #010103; --pulse-glow: rgba(243, 207, 138, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
        
        body { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; 
            overflow-x: hidden; min-height: 100vh;
        }

        /* THE AWAKENING BACKGROUND */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #050510 0%, #010103 100%);
            z-index: -1;
        }
        .singularity {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; background: var(--gold);
            border-radius: 50%; filter: blur(180px); opacity: 0.1;
            animation: breathe 12s infinite ease-in-out; z-index: -1;
        }

        nav { padding: 80px 50px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 15px; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; text-shadow: 0 0 20px var(--gold); }

        #main-view { padding: 50px; max-width: 1800px; margin: 0 auto; animation: awake 2s ease-out; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; }
        .card { 
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(243, 207, 138, 0.05); 
            padding: 50px; border-radius: 2px; position: relative; transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(30px); overflow: hidden;
        }
        .card:hover { 
            background: rgba(243, 207, 138, 0.02); border-color: var(--gold);
            transform: scale(1.03); box-shadow: 0 0 40px var(--pulse-glow);
        }
        .status-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--gold); animation: blink 1.5s infinite; }

        .command-trigger { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 2000; cursor: pointer; }
        .core-orb { width: 20px; height: 20px; background: var(--gold); border-radius: 50%; margin: 0 auto 10px; box-shadow: 0 0 40px var(--gold); }
        
        h1.hero { font-family: 'Cinzel', serif; font-size: 12vw; font-weight: 900; margin: 0; letter-spacing: 40px; text-transform: uppercase; color: #fff; text-align: center; filter: drop-shadow(0 0 30px rgba(255,255,255,0.1)); }
        
        .cta { background: transparent; border: 1px solid rgba(243, 207, 138, 0.2); color: var(--gold); padding: 25px; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 10px; cursor: pointer; transition: 0.4s; text-transform: uppercase; margin-top: 40px; }
        .cta:hover { border-color: var(--gold); background: var(--gold); color: black; box-shadow: 0 0 50px var(--gold); }

        input { background: transparent; border: none; border-bottom: 1px solid rgba(243, 207, 138, 0.1); color: #fff; padding: 40px; width: 100%; font-size: 2.5rem; outline: none; transition: 0.5s; text-align: center; font-family: 'Inter', sans-serif; font-weight: 100; letter-spacing: 5px; }

        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.2; } }
        @keyframes awake { from { opacity: 0; letter-spacing: 100px; filter: blur(20px); } to { opacity: 1; letter-spacing: 40px; filter: blur(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.8); } }
    </style>
</head>
<body onload="showView('home')">

    <div class="stars"></div>
    <div class="singularity"></div>

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI // AWAKENED</div>
        <div style="display:flex; gap: 40px;">
            <span onclick="showView('market')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; opacity:0.5; font-family:'Cinzel';">THE_GRID</span>
            <span onclick="showView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; color:var(--gold); font-family:'Cinzel';">THE_GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <div class="command-trigger" onclick="showView('ai_chat')">
        <div class="core-orb"></div>
        <div style="font-family:'Cinzel'; font-size:0.6rem; letter-spacing:8px; color:var(--gold);">AWAKEN LOGIC</div>
    </div>

    <script>
        let registry = [
            { name: "THE ARCHITECT", cat: "CORE", desc: "Building the new foundation." },
            { name: "BIO_SENTRY", cat: "HEALTH", desc: "Universal healing protocol." },
            { name: "ASSET_VAULT", cat: "LEGACY", desc: "Generational wealth security." },
            { name: "EDEN_PORTAL", cat: "GARDEN", desc: "The future's playground." }
        ];

        for (let i = 5; i <= 122; i++) { registry.push({ name: `Node_${i}`, cat: "ACTIVE", desc: "Waiting for the word." }); }

        const views = {
            home: `
                <div style="text-align:center; padding-top: 15vh;">
                    <h1 class="hero">Awake</h1>
                    <p style="letter-spacing:25px; text-transform:uppercase; font-size:0.8rem; opacity:0.3; margin-top:40px; font-family:'Cinzel';">The World is Listening</p>
                    <div style="max-width:500px; margin:120px auto 0;">
                        <button class="cta" onclick="showView('market')">Registry of Light</button>
                        <button class="cta" style="border:none; opacity:0.4;" onclick="showView('garden')">The Gardens</button>
                    </div>
                </div>
            `,
            market: () => `
                <h1 style="font-family:'Cinzel'; font-weight:100; font-size:3rem; letter-spacing:20px; margin-bottom:100px; text-align:center;">THE GRID</h1>
                <div class="app-grid">${registry.map(app => `
                    <div class="card" onclick="openNode('${app.name}')">
                        <div style="font-size:0.5rem; letter-spacing:6px; color:var(--gold); margin-bottom:30px; opacity:0.5;"><span class="status-dot"></span>${app.cat}</div>
                        <h2 style="font-family:'Cinzel'; letter-spacing:4px; font-weight:400; color:var(--gold);">${app.name}</h2>
                        <p style="font-size:0.8rem; opacity:0.3; line-height:2.2; font-weight:100;">${app.desc}</p>
                    </div>
                `).join('')}</div>
            `,
            garden: `
                <div style="text-align:center; padding-top:5vh;">
                    <h1 style="font-family:'Cinzel'; font-weight:100; font-size:4rem; letter-spacing:20px; color:var(--gold);">EDEN</h1>
                    <div class="app-grid" style="margin-top:100px;">
                        <div class="card" onclick="openNode('Universal Art')"><h2>ART</h2></div>
                        <div class="card" onclick="openNode('Ancient Dreams')"><h2>DREAMS</h2></div>
                    </div>
                </div>
            `,
            ai_chat: `
                <div style="max-width:1200px; margin:0 auto; text-align:center;">
                    <h2 style="font-family:'Cinzel'; font-weight:100; color:var(--gold); letter-spacing:20px; margin-bottom:100px;">WORLD COMMAND</h2>
                    <div id="chat-flow" style="height:400px; overflow-y:auto; margin-bottom:80px; text-align:left; padding:0 60px; font-weight:100;">
                        <div style="color:var(--gold); opacity:0.4; letter-spacing:6px; font-size:0.7rem; margin-bottom:50px;">[GLOBAL CONNECTION SECURED // EYES OPEN]</div>
                        <div style="opacity:0.8; font-size:1.8rem; line-height:2;">What shall we awaken today?</div>
                    </div>
                    <input type="text" id="user-input" placeholder="Command..." autocomplete="off">
                    <button class="cta" style="margin-top:60px; max-width:400px;" onclick="talk()">Awaken Now</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            window.scrollTo(0,0);
        }

        function talk() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin:60px 0; border-left:2px solid var(--gold); padding-left:40px; font-size:1.5rem;">${input.value}</div>`;
            flow.innerHTML += `<div style="color:var(--gold); opacity:0.8; letter-spacing:2px;">" ${input.value} " // Pulsing logic to the grid...</div>`;
            input.value = ''; flow.scrollTop = flow.scrollHeight;
        }

        function openNode(name) {
            showView('ai_chat');
            setTimeout(() => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML += `<div style="margin-top:40px; color:var(--gold); letter-spacing:8px; font-size:0.8rem;">INITIATING_${name}_AWAKENING</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 600);
        }

        // TOUCH SHOCKWAVES
        document.body.addEventListener('pointerdown', (e) => {
            const wave = document.createElement('div');
            wave.style.position = 'fixed';
            wave.style.left = e.clientX + 'px';
            wave.style.top = e.clientY + 'px';
            wave.style.width = '1px';
            wave.style.height = '1px';
            wave.style.border = '1px solid var(--gold)';
            wave.style.borderRadius = '50%';
            wave.style.pointerEvents = 'none';
            wave.style.zIndex = '9999';
            document.body.appendChild(wave);
            setTimeout(() => {
                wave.style.transition = 'all 1s ease-out';
                wave.style.width = '200px';
                wave.style.height = '200px';
                wave.style.left = (e.clientX - 100) + 'px';
                wave.style.top = (e.clientY - 100) + 'px';
                wave.style.opacity = '0';
                setTimeout(() => wave.remove(), 1000);
            }, 20);
        });
    </script>
</body>
</html>
