<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXIS | MOLECULAR</title>
    <style>
        :root { --gold: #c4a97a; --ink: #000; --junior: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro Display", -apple-system, sans-serif; }
        
        body { 
            background: #000; color: #fff; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* DYNAMIC LIGHTING ENGINE */
        .glow-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(196, 169, 122, 0.15) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        header {
            padding: 30px 20px; text-align: center; z-index: 10;
        }
        .brand { font-weight: 900; letter-spacing: 12px; font-size: 0.8rem; opacity: 0.8; }

        /* THE "LIVING" GRID */
        .engine-room {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; z-index: 1;
        }

        .engine-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px; padding: 25px;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }

        .engine-card:active { transform: scale(0.94); border-color: var(--gold); }

        .icon { font-size: 2.2rem; margin-bottom: 20px; display: block; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        
        .label { font-size: 0.55rem; font-weight: 900; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
        
        h3 { font-size: 0.85rem; font-weight: 300; letter-spacing: 0.5px; line-height: 1.3; color: #eee; margin-bottom: 15px; }

        .price { font-size: 1.1rem; font-weight: 200; color: #fff; opacity: 0.9; }

        /* JUNIOR COMMAND CENTER (FLOATING) */
        .junior-orb {
            position: fixed; bottom: 30px; align-self: center;
            background: var(--junior); color: #000;
            padding: 16px 35px; border-radius: 100px;
            font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.4);
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body onmousemove="updateGlow(event)" ontouchmove="updateGlowTouch(event)">

    <div class="glow-bg"></div>

    <header>
        <div class="brand">AXIS</div>
        <p style="font-size: 0.5rem; letter-spacing: 4px; opacity: 0.4; margin-top: 10px;">MOLECULAR OS v5.0</p>
    </header>

    <div class="engine-room">
        <div class="engine-card">
            <span class="icon">⚖️</span>
            <div class="label">Legal Engine</div>
            <h3>Sovereign Trust Node</h3>
            <div class="price">$497.00</div>
        </div>

        <div class="engine-card">
            <span class="icon">🏥</span>
            <div class="label">Medical Hub</div>
            <h3>Nurse-Flow Neural</h3>
            <div class="price">$197.00</div>
        </div>

        <div class="engine-card">
            <span class="icon">📈</span>
            <div class="label">Capital</div>
            <h3>Wealth Intelligence</h3>
            <div class="price">$299.00</div>
        </div>

        <div class="engine-card">
            <span class="icon">📡</span>
            <div class="label">Telecom</div>
            <h3>Mesh Router V2</h3>
            <div class="price">$899.00</div>
        </div>
    </div>

    <div class="junior-orb">Junior Explorer</div>

    <script>
        function updateGlow(e) {
            document.body.style.setProperty('--x', e.clientX + 'px');
            document.body.style.setProperty('--y', e.clientY + 'px');
        }
        function updateGlowTouch(e) {
            let touch = e.touches[0];
            document.body.style.setProperty('--x', touch.clientX + 'px');
            document.body.style.setProperty('--y', touch.clientY + 'px');
        }
    </script>
</body>
</html>
