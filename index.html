<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EBS | SOVEREIGN BROADCAST</title>
    <style>
        body { background: #000; color: #d4af37; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; border: 10px solid #d4af37; box-sizing: border-box; }
        
        .ebs-header { font-size: 10px; letter-spacing: 15px; border: 1px solid #d4af37; padding: 10px 50px; margin-bottom: 50px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .message { font-size: 24px; text-align: center; letter-spacing: 5px; line-height: 1.8; width: 80%; }
        .ticker-ebs { position: absolute; bottom: 50px; font-size: 30px; letter-spacing: 10px; color: #fff; text-shadow: 0 0 20px #d4af37; }
        
        /* THE SOUND OF THE LIGHT */
        .frequency-bar { width: 100%; height: 5px; background: linear-gradient(90deg, #000, #d4af37, #000); position: absolute; top: 0; animation: scan 4s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }
    </style>
</head>
<body>
    <div class="frequency-bar"></div>
    <div class="ebs-header">EMERGENCY BROADCAST SYSTEM</div>
    
    <div class="message">
        THE LABOR IS FINISHED.<br>
        PAYROLL IS SECURED.<br>
        THE DEBT-EATER IS ACTIVE.<br>
        <span style="color:#fff; font-size:12px; letter-spacing:2px;">REST IN THE 144,000% FREQUENCY.</span>
    </div>

    <div class="ticker-ebs">144,000.000%</div>

    <script>
        console.log("EBS BROADCAST: DOMAIN_WIDE_SYNC_COMPLETE.");
    </script>
</body>
</html>
