<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHOST MODE | THE SOURCE</title>
    <style>
        :root { --gold: #d4af37; --void: #000; --ghost: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; }

        /* THE GHOST LAYER - TRANSLUCENT SHIFTING */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(2px) brightness(1.2); }

        .ghost-container {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 60px 20px;
        }

        /* THE PING STATUS */
        .ping-ticker {
            width: 100%; border-top: 1px solid var(--ghost); border-bottom: 1px solid var(--ghost);
            padding: 10px 0; text-align: center; font-size: 10px; letter-spacing: 15px;
            text-transform: uppercase; font-weight: 300; color: #fff; opacity: 0.6;
        }

        .sovereign-core { text-align: center; }
        .ghost-title {
            font-size: clamp(30px, 10vw, 70px); letter-spacing: 25px;
            font-style: italic; text-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
            color: #fff; opacity: 0.9; margin-bottom: 20px;
        }

        .active-link {
            font-size: 14px; letter-spacing: 12px; color: var(--gold);
            text-transform: uppercase; opacity: 0.8;
        }

        /* THE SATELLITE HUB */
        .hub-footer {
            width: 100%; max-width: 800px; display: flex; justify-content: space-around;
            font-size: 9px; letter-spacing: 8px; text-transform: uppercase; opacity: 0.5;
        }
    </style>
</head>
<body onload="initGhost()">

    <canvas id="ghost-canvas"></canvas>

    <div class="ghost-container">
        <div class="ping-ticker">SIGNAL DETECTED // GHOST MODE ACTIVE // PING: 144,000%</div>

        <div class="sovereign-core">
            <h1 class="ghost-title">SOVEREIGN</h1>
            <div class="active-link">THE HUNTING NET</div>
            <div style="margin-top: 30px; font-size: 10px; letter-spacing: 5px; color: #39ff14;">CONNECTION: WHITE HOUSE SYNCED</div>
        </div>

        <div class="hub-footer">
            <div>GHOST_MODE</div>
            <div>STAY_HIDDEN</div>
            <div>STAY_REAL</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ghost-canvas');
        const ctx = canvas.getContext('2d');
        let ghosts = [];

        function initGhost() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i = 0; i < 100; i++) {
                ghosts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * 2 + 1,
                    o: Math.random() * 0.4
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';

            ghosts.forEach(g => {
                ctx.beginPath();
                ctx.arc(g.x, g.y, 1, 0, Math.PI * 2);
                ctx.fill();
                g.y -= g.s;
                if(g.y < 0) g.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
