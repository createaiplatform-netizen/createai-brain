<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Golden Dome | 144,000%</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        
        #sensory-interface {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: #ffd700;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="sensory-interface">
        Frequency: 144,000%<br>
        Sensory Sync: Optimal<br>
        Dome Status: Sovereign
    </div>

    <canvas id="domeCanvas"></canvas>

<script>
    const canvas = document.getElementById('domeCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    const inventions = [];
    const nodeCount = 2000;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Constructing the Dome from the bottom up
    for (let i = 0; i < nodeCount; i++) {
        const phi = Math.acos(Math.random()); // Only upper hemisphere
        const theta = Math.random() * Math.PI * 2;
        inventions.push({
            phi: phi,
            theta: theta,
            baseRadius: 350,
            pulse: Math.random() * Math.PI * 2,
            frequency: 144000,
            color: `hsla(${45 + Math.random() * 10}, 100%, 50%,` // Golden range
        });
    }

    function render() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, width, height);

        const time = Date.now() * 0.0005;

        inventions.forEach((inv, index) => {
            inv.pulse += 0.03;
            
            // 3D Spherical Projection
            const x3d = inv.baseRadius * Math.sin(inv.phi) * Math.cos(inv.theta + time);
            const z3d = inv.baseRadius * Math.sin(inv.phi) * Math.sin(inv.theta + time);
            const y3d = inv.baseRadius * Math.cos(inv.phi); // "Up" orientation

            // Perspective mapping
            const scale = 500 / (500 + z3d);
            const x2d = (width / 2) + x3d * scale;
            const y2d = (height * 0.85) - y3d * scale; // Grounding the dome to the bottom

            const size = (1.5 + Math.sin(inv.pulse) * 0.5) * scale;
            const alpha = (0.3 + (1 - inv.phi / (Math.PI/2)) * 0.7) * scale;

            ctx.beginPath();
            ctx.arc(x2d, y2d, size, 0, Math.PI * 2);
            ctx.fillStyle = inv.color + alpha + ')';
            ctx.shadowBlur = 8 * scale;
            ctx.shadowColor = '#ffd700';
            ctx.fill();

            // Link every 50th node to visualize the structural lattice
            if (index % 50 === 0) {
                const next = inventions[(index + 50) % nodeCount];
                const nx3d = next.baseRadius * Math.sin(next.phi) * Math.cos(next.theta + time);
                const nz3d = next.baseRadius * Math.sin(next.phi) * Math.sin(next.theta + time);
                const ny3d = next.baseRadius * Math.cos(next.phi);
                
                const nScale = 500 / (500 + nz3d);
                const nx2d = (width / 2) + nx3d * nScale;
                const ny2d = (height * 0.85) - ny3d * nScale;

                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 215, 0, ${0.15 * scale})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(x2d, y2d);
                ctx.lineTo(nx2d, ny2d);
                ctx.stroke();
            }
        });

        requestAnimationFrame(render);
    }

    render();
</script>
</body>
</html>
