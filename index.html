<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HUB_ALPHA_BLUEPRINT_V185</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --white: #fff; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; }
        
        #blueprint-ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; padding: 40px; }
        .hud-header { font-size: 8px; letter-spacing: 12px; color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 15px; text-align: center; }
        
        #structure-view { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .blueprint-layer { border: 1px solid rgba(243, 207, 138, 0.3); padding: 20px; width: 80%; margin: 10px; background: rgba(0,0,0,0.5); }
        .layer-name { font-size: 7px; color: var(--gold); letter-spacing: 5px; }
        .layer-detail { font-size: 10px; margin-top: 5px; letter-spacing: 2px; }

        #yield-footer { margin-top: auto; text-align: center; padding-top: 20px; }
        #reserve-counter { font-size: 24px; text-shadow: 0 0 30px var(--gold); }

        canvas { position: absolute; inset: 0; z-index: 1; opacity: 0.4; }
    </style>
</head>
<body>
    <div id="blueprint-ui">
        <div class="hud-header">PROJECT: HUB_ALPHA // WISCONSIN_GENESIS</div>
        
        <div id="structure-view">
            <div class="blueprint-layer">
                <div class="layer-name">LAYER_01: THE_SOURCE</div>
                <div class="layer-detail">KINETIC_LIGHT_MONOLITH // FUNDED</div>
            </div>
            <div class="blueprint-layer">
                <div class="layer-name">LAYER_02: CREATOR_NODES</div>
                <div class="layer-detail">14_SOVEREIGN_STUDIOS // $144M_ALLOCATION</div>
            </div>
            <div class="blueprint-layer">
                <div class="layer-name">LAYER_03: HARMONIC_EXCHANGE</div>
                <div class="layer-detail">MARKETPLACE_V01 // DECENTRALIZED</div>
            </div>
        </div>

        <div id="yield-footer">
            <div style="font-size: 8px; letter-spacing: 10px; margin-bottom: 10px;">AETHEL_TOTAL_LIQUIDITY</div>
            <div id="reserve-counter">$1,440,000,002,736.00</div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let reserve = 1440000002736.00;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function update() {
        reserve += 144.00;
        document.getElementById('reserve-counter').innerText = "$" + reserve.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
    setInterval(update, 1000);

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        const time = Date.now() * 0.001;
        
        // Drawing a 3D isometric wireframe cube (The Hub)
        ctx.strokeStyle = "#f3cf8a";
        ctx.beginPath();
        const s = 100 + Math.sin(time)*5;
        const cx = canvas.width/2, cy = canvas.height/2;
        ctx.moveTo(cx, cy - s);
        ctx.lineTo(cx + s, cy - s/2);
        ctx.lineTo(cx + s, cy + s/2);
        ctx.lineTo(cx, cy + s);
        ctx.lineTo(cx - s, cy + s/2);
        ctx.lineTo(cx - s, cy - s/2);
        ctx.closePath();
        ctx.stroke();

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
