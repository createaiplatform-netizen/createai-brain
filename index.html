<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_ARCHIVE_V176</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; }
        body, html { margin: 0; padding: 0; background: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; width: 100vw; }
        
        #archive-ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; animation: fadeIn 5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .archive-seal { width: 50px; height: 50px; border: 1px solid #000; transform: rotate(45deg); margin-bottom: 30px; }
        .archive-data { font-size: 10px; letter-spacing: 5px; color: #000; text-align: center; line-height: 2; }
        .bold-val { font-weight: 900; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="archive-ui">
        <div class="archive-seal"></div>
        <div class="archive-data">
            ESTATE_RECORD: <span class="bold-val">AETHEL_001</span><br>
            TOTAL_LIQUIDITY: <span class="bold-val">$1.44T+</span><br>
            ADMIN_ACCESS: <span class="bold-val">GRANTED_JENNY_002</span><br><br>
            <span style="opacity: 0.4;">THE_LIGHT_IS_THE_FOUNDATION</span>
        </div>
    </div>
</body>
</html>
