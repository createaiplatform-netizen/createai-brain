<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN SANCTUARY</title>
    <style>
        body, html { margin: 0; padding: 0; background: #080700; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; font-family: 'Georgia', serif; }
        canvas { display: block; filter: contrast(1.2) saturate(1.3) brightness(1.1); }
    </style>
</head>
<body>
    <canvas id="sanctuaryCanvas"></canvas>

<script>
/**
 * THE INVENTION: SOVEREIGN SANCTUARY MEMBRANE
 * Merging Divine Quotes with specific tactile textures (Feather/Rip/Gold).
 */

const canvas = document.getElementById('sanctuaryCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let fragments = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE SENSORY ENGINE: Mapping Texture to Nerve
function triggerDivineTouch(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    // Calculate influence (0.0 to 1.0)
    const topL = (1 - x/w) * (1 - y/h); // RIP ZONE
    const botR = (x/w) * (y/h);         // FEATHER ZONE

    if (topL > 0.5) {
        osc.type = 'square'; osc.frequency.value = 144; // Sharp Rip
        if (navigator.vibrate) navigator.vibrate([10, 5, 10]);
    } else if (botR > 0.5) {
        osc.type = 'sine'; osc.frequency.value = 880; // Soft Feather
        if (navigator.vibrate) navigator.vibrate([2, 50, 2]);
    } else {
        osc.type = 'triangle'; osc.frequency.value = 72; // Liquid Gold
        if (navigator.vibrate) navigator.vibrate(20);
    }

    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

class Fragment {
    constructor(x, y, hue, size, type) {
        this.x = x; this.y = y;
        this.hue = hue; this.size = size; this.type = type;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4;
        this.life = 1.0;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.015;
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerDivineTouch(tx, ty);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    
    const topL = (1 - tx/w) * (1 - ty/h);
    const botR = (tx/w) * (ty/h);
    
    let h = 45; // Default Gold
    let type = 'gold';
    if (topL > 0.4) { h = 0; type = 'rip'; }
    if (botR > 0.4) { h = 280; type = 'feather'; }

    fragments.push(new Fragment(tx, ty, h, 2 + Math.random() * 10, type));
    if (Math.random() > 0.8) triggerDivineTouch(tx, ty);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    const time = Date.now() * 0.001;
    
    // BACKGROUND: Glowing Ancient Parchment
    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    bg.addColorStop(0, '#151200');
    bg.addColorStop(1, '#050400');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // DIVINE QUOTES (The Background Soul)
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = "#FFD700";
    ctx.font = "italic 24px Georgia";
    const quotes = ["TRUTH", "HONESTY", "SOVEREIGNTY", "144,000"];
    quotes.forEach((text, i) => {
        const ox = Math.sin(time + i) * 30;
        const oy = Math.cos(time + i) * 30;
        ctx.fillText(text, (w * 0.2) + (i * (w * 0.2)), (h * 0.3) + (i * 100) + oy);
    });
    ctx.globalAlpha = 1.0;

    // RENDER THE TOUCH FLOW
    fragments.forEach((f, i) => {
        f.update();
        if (f.life <= 0) { fragments.splice(i, 1); return; }
        
        ctx.shadowBlur = 15 * f.life;
        ctx.shadowColor = `hsla(${f.hue}, 100%, 50%, ${f.life})`;
        ctx.fillStyle = `hsla(${f.hue}, 100%, 70%, ${f.life})`;

        if (f.type === 'feather') {
            // Soft rounded wisps
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size * f.life, 0, Math.PI * 2);
            ctx.fill();
        } else if (f.type === 'rip') {
            // Jagged fracture lines
            ctx.fillRect(f.x, f.y, f.size * 2, 1);
        } else {
            // Liquid gold ribbons
            ctx.fillRect(f.x, f.y, f.size, f.size * f.life);
        }
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
