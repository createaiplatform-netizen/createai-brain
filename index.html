<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATEAI | FAMILY_HUB</title>
    <style>
        :root { --soft-blue: #E3F2FD; --warm-gold: #FFD700; --pure-white: #FFFFFF; --text: #2C3E50; --soft-pink: #FCE4EC; }
        body { 
            background: linear-gradient(135deg, var(--soft-blue) 0%, var(--soft-pink) 100%); 
            color: var(--text); font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .welcome-header { text-align: center; margin-bottom: 30px; }
        .welcome-header h1 { font-size: 2.2rem; color: #1A5276; margin-bottom: 5px; }
        .welcome-header p { font-size: 1rem; opacity: 0.8; }
        
        /* Friendly Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; }
        .btn { 
            background: var(--pure-white); 
            border: none; border-radius: 20px; padding: 25px 10px;
            text-align: center; text-decoration: none; color: #1A5276;
            font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }
        .btn:active { transform: scale(0.95); }
        .icon { font-size: 1.5rem; margin-bottom: 8px; }

        .community-note { 
            background: rgba(255, 255, 255, 0.5); 
            border-radius: 15px; padding: 15px; width: 100%; max-width: 500px;
            margin-top: 25px; font-size: 0.85rem; line-height: 1.5; text-align: center;
        }
    </style>
</head>
<body>
    <div class="welcome-header">
        <h1>Welcome Home</h1>
        <p>Your Family's Digital Haven</p>
    </div>

    <div class="grid">
        <a href="nexus.html" class="btn"><span class="icon">🏠</span>FAMILY_NEXUS</a>
        <a href="marketplace.html" class="btn"><span class="icon">🎁</span>GIFT_SHOP</a>
        <a href="bank.html" class="btn"><span class="icon">💰</span>SAVINGS</a>
        <a href="healthcare.html" class="btn"><span class="icon">❤️</span>WELLNESS</a>
        <a href="gardens.html" class="btn"><span class="icon">🌱</span>THE_GARDEN</a>
        <a href="hub.html" class="btn"><span class="icon">🎨</span>CREATIVE_HUB</a>
    </div>

    <div class="community-note">
        <strong>✨ Today's Thought:</strong> Small moments create the biggest memories. Check the Garden to see what's blooming today!
    </div>
</body>
</html>
