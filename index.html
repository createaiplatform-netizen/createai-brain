<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINAL OVERRIDE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 150px; }
        .box { border: 3px solid #0f0; padding: 40px; display: inline-block; border-radius: 20px; box-shadow: 0 0 30px #0f0; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin:0;">SYSTEM ACTIVE</h2>
        <p>APPROVE THE POP-UP TO FINALIZE</p>
    </div>

    <script>
        async function forceBridge() {
            if (window.ethereum) {
                try {
                    // Force a new session to clear Atlas interference
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Delay the asset injection by 1.5 seconds to ensure pop-up priority
                    setTimeout(async () => {
                        await window.ethereum.request({
                            method: 'wallet_watchAsset',
                            params: {
                                type: 'ERC20',
                                options: {
                                    address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                    symbol: 'USDC',
                                    decimals: 6,
                                    image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png?v=' + Date.now()
                                },
                            },
                        });
                    }, 1500);
                } catch (e) {
                    window.location.reload();
                }
            }
        }
        window.onload = forceBridge;
    </script>
</body>
</html>
