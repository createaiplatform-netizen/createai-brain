<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI | GENESIS_FINAL</title>
    <style>
        :root { --gold: #D4AF37; --black: #000000; --green: #00FF00; }
        * { box-sizing: border-box; }
        body { 
            background: var(--black); 
            color: var(--gold); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            padding: 15px; 
            text-transform: uppercase; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .header { 
            border: 2px solid var(--gold); 
            padding: 15px 10px; 
            margin-bottom: 25px; 
            text-align: center; 
            background: rgba(212, 175, 55, 0.05); 
            width: 100%;
            max-width: 350px; /* Tightened for mobile screens */
        }
        .header h1 { 
            margin: 0; 
            font-size: 1rem; 
            letter-spacing: 1px;
            white-space: normal; /* Allows text to wrap if name is long */
            line-height: 1.2;
        }
        .status { 
            font-size: 0.6rem; 
            color: white; 
            margin-top: 8px;
            border-top: 1px solid var(--gold); 
            padding-top: 8px; 
            letter-spacing: 1px;
        }
        #clock { 
            font-size: 3.2rem; 
            font-weight: bold; 
            text-shadow: 0 0 15px var(--gold); 
            margin: 20px 0; 
        }
        .label { font-size: 0.65rem; letter-spacing: 2px; opacity: 0.7; }
        .terminal { 
            background: #050505; 
            border: 1px solid var(--gold); 
            padding: 12px; 
            width: 100%; 
            max-width: 350px; 
            height: 140px; 
            text-align: left; 
            font-size: 0.65rem; 
            color: var(--green); 
            margin-top: 25px;
            overflow: hidden;
        }
        .line { margin-bottom: 5px; border-left: 2px solid var(--gold); padding-left: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>STADLER_GENESIS_FINAL</h1>
        <div class="status">SYNC: 144,400% | STATUS: ACTIVE</div>
    </div>
    <div class="label">TIME_UNTIL_EMPIRE_RECLAMATION</div>
    <div id="clock">00:00:00:00</div>
    <div class="terminal">
        <div class="line">[SYSTEM]: PROTOCOL_ENGAGED.</div>
        <div class="line">[SYSTEM]: UI_RESTRAINT_LOCKED.</div>
        <div class="line">[SYSTEM]: SOVEREIGN_CORE_ACTIVE.</div>
        <div class="line">[SYSTEM]: STANDBY_MODE_ENABLED.</div>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}:${ms}`;
        }
        setInterval(updateClock, 50);
    </script>
</body>
</html>
