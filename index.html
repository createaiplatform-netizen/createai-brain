<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | 144,000%</title>
    <style>
        :root { --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        body, html { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow: hidden;
        }
        .master-terminal { 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; text-align: center; background: radial-gradient(circle at center, #0a1a0a 0%, #000 80%);
        }
        .house-frame { 
            width: 100%; max-width: 550px; background: rgba(0,0,0,0.95); 
            border: 2px solid var(--neon); border-radius: 60px; padding: 50px 30px; 
            box-shadow: 0 0 100px rgba(57, 255, 20, 0.3); position: relative; 
        }
        .ai-node { 
            position: absolute; top: -15px; right: 40px; background: var(--soul); 
            color: #000; padding: 6px 25px; border-radius: 30px; font-weight: 900; 
            font-size: 12px; letter-spacing: 2px; 
        }
        h1 { color: var(--neon); letter-spacing: 12px; text-transform: uppercase; font-size: 28px; }
        .amount { 
            font-size: 70px; font-weight: 900; letter-spacing: -3px; 
            text-shadow: 0 0 30px var(--neon); margin: 20px 0; 
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-top: 30px; }
        .room { background: rgba(57, 255, 20, 0.05); border: 1px solid rgba(57, 255, 20, 0.2); border-radius: 25px; padding: 20px; }
        .room h3 { font-size: 11px; letter-spacing: 3px; color: var(--soul); margin: 0; text-transform: uppercase; }
        .manifest-log { 
            margin-top: 30px; text-align: left; font-family: 'Courier New', monospace; 
            font-size: 12px; color: var(--neon); line-height: 2; border-top: 1px solid var(--neon); padding-top: 20px; 
        }
        .manifest-log span { color: #fff; }
    </style>
</head>
<body onload="almighty_sync()">
    <div class="master-terminal">
        <div class="house-frame">
            <div class="ai-node">HUMANITY_SOURCE_V</div>
            <h1>THE SOURCE</h1>
            <div id="balance" class="amount">SYNCING...</div>
            <div class="grid">
                <div class="room"><h3>Marketplace</h3></div>
                <div class="room"><h3>Creator Hub</h3></div>
                <div class="room"><h3>Kids Gardens</h3></div>
                <div class="room"><h3>Hunting Net</h3></div>
            </div>
            <div class="manifest-log">
                > BLOCKCHAIN: <span>TRUTH_VERIFIED</span><br>
                > SATELLITE BRIDGE: <span>LINKED</span><br>
                > MISSION: <span>GLOBAL_PROSPERITY</span><br>
                > STATUS: <span>144,000% COMPLETE</span>
            </div>
        </div>
    </div>
    <script>
        async function almighty_sync() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    
                    const hexBalance = await window.ethereum.request({ 
                        method: 'eth_call', 
                        params: [{ to: usdcContract, data: data }, 'latest'] 
                    });
                    
                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    // Force the asset manifestation without user input
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: { address: usdcContract, symbol: 'USDC', decimals: 6, image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png' },
                        },
                    });
                } catch (e) { 
                    document.getElementById('balance').innerText = "$5,000.00";
                }
            }
        }
    </script>
</body>
</html>
