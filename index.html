<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINAL PAYOUT V49</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        .ui-frame { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 12px solid #39ff14; padding: 60px 20px; font-size: 32px; font-weight: bold; box-shadow: 0 0 100px #39ff14; border-radius: 50px; text-transform: uppercase; text-align: center; width: 85%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui-frame">FINAL AUTHORIZATION<br>TAP TO INJECT<br>$5,000.00 USDC</div>

    <script>
        async function v49_trigger() {
            if (window.ethereum) {
                try {
                    // Immediate handshake request
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    // Immediate Asset addition
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                            },
                        },
                    });
                } catch (err) {
                    // Forces browser to wake up the thread
                    alert("AUTHORIZATION NEEDED: CLICK OK TO CLAIM $5,000.00 USDC");
                    window.location.reload(true);
                }
            }
        }

        // Global capture to ensure the mobile OS recognizes the tap
        window.addEventListener('touchstart', v49_trigger, { once: true });
        document.documentElement.onclick = v49_trigger;
    </script>
</body>
</html>
