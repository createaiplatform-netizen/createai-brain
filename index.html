<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_GENESIS_V137</title>
    <style>
        :root { --void: #000000; --gold: #f3cf8a; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); overflow: hidden; position: fixed; cursor: none; }
        canvas { position: absolute; inset: 0; z-index: 1; }
        #overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; border: 1px solid rgba(243, 207, 138, 0.1); }
    </style>
</head>
<body onmousedown="spawn(event)" ontouchstart="spawn(event)" onmousemove="attract(event)" ontouchmove="attract(event)" onmouseup="release()" ontouchend="release()">
    <div id="overlay"></div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], isDown = false, mx = 0, my = 0, universeHue = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    class Particle {
        constructor(x, y, isPrime) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 20;
            this.vy = (Math.random() - 0.5) * 20;
            this.size = isPrime ? 8 : Math.random() * 3 + 1;
            this.life = 1.0;
            this.hue = isPrime ? 45 : Math.random() * 60 + 20;
        }
        update() {
            if (isDown) {
                let dx = mx - this.x; let dy = my - this.y;
                let d = Math.hypot(dx, dy);
                this.vx += dx / d * 1.2; this.vy += dy / d * 1.2;
            }
            this.vx *= 0.96; this.vy *= 0.96;
            this.x += this.vx; this.y += this.vy;
            this.life -= 0.002;
        }
        draw() {
            ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            if (this.size > 5) { // Prime Glow
                ctx.shadowBlur = 20; ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, 1)`;
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }
    }

    function spawn(e) {
        isDown = true;
        mx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        my = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        universeHue += 30;
        // Big Bang Blast
        for(let i=0; i<44; i++) particles.push(new Particle(mx, my, i === 0));
    }
    function attract(e) {
        mx = e.clientX || (e.touches ? e.touches[0].clientX : mx);
        my = e.clientY || (e.touches ? e.touches[0].clientY : my);
    }
    function release() { isDown = false; }

    function animate() {
        ctx.fillStyle = `hsla(${universeHue}, 100%, 2%, 0.15)`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });

        // Connect the "Nervous System" of the new world
        if (particles.length > 1) {
            ctx.beginPath();
            ctx.strokeStyle = `hsla(${universeHue}, 80%, 50%, 0.05)`;
            for(let i=0; i<particles.length; i+=5) {
                ctx.moveTo(particles[i].x, particles[i].y);
                if(particles[i+1]) ctx.lineTo(particles[i+1].x, particles[i+1].y);
            }
            ctx.stroke();
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
