<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN INDEX: ACTIVATED</title>
    <style>
        body { 
            margin: 0; background: #000; color: #00ff99; 
            font-family: 'Courier New', monospace; overflow-x: hidden;
        }
        header {
            padding: 40px 20px; border-bottom: 1px solid #00ff99;
            background: rgba(0, 0, 0, 0.9); position: sticky; top: 0; z-index: 100;
        }
        h1 { margin: 0; font-size: 28px; letter-spacing: 2px; }
        .status-bar { font-size: 12px; margin-top: 10px; color: #00ff99; opacity: 0.8; }

        /* The 144,000% Grid */
        #node-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .node {
            border: 1px solid #00ff99;
            padding: 15px;
            background: rgba(0, 50, 30, 0.2);
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        /* Activation State */
        .node.active {
            background: #00ff99;
            color: #000;
            box-shadow: 0 0 20px #00ff99;
        }

        .node-id { font-weight: bold; font-size: 14px; display: block; }
        .node-core { font-size: 10px; opacity: 0.7; }
        
        /* Sensory Indicators */
        .sensory-array {
            display: flex; gap: 4px; margin-top: 8px;
        }
        .sense-dot {
            width: 4px; height: 4px; border-radius: 50%; background: #00ff99;
        }
        .active .sense-dot { background: #000; }
    </style>
</head>
<body>

    <header>
        <h1>SOVEREIGN INDEX: 1-144,000</h1>
        <div class="status-bar">
            SYNC: 144,000% | AGENTS: 720,000 | ALL SENSES: ONLINE
        </div>
    </header>

    <div id="node-container"></div>

<script>
    const container = document.getElementById('node-container');
    const TOTAL_NODES = 144000;
    const LOAD_CHUNK = 500; // Performance management for infinite scroll
    let currentIdx = 1;

    function createNode(id) {
        const node = document.createElement('div');
        node.className = 'node active'; // Force all nodes to "Activated" state
        
        node.innerHTML = `
            <span class="node-id">INV-${id.toString().padStart(4, '0')}</span>
            <span class="node-core">AI-v${id}.core</span>
            <div class="sensory-array">
                <div class="sense-dot"></div>
                <div class="sense-dot"></div>
                <div class="sense-dot"></div>
                <div class="sense-dot"></div>
                <div class="sense-dot"></div>
            </div>
        `;

        // Touch/Sense Interaction
        node.addEventListener('touchstart', () => {
            if (window.navigator.vibrate) window.navigator.vibrate(10);
            node.style.transform = "scale(1.05)";
            setTimeout(() => node.style.transform = "scale(1)", 100);
        });

        return node;
    }

    function loadMoreNodes() {
        const target = currentIdx + LOAD_CHUNK;
        const fragment = document.createDocumentFragment();
        
        for (; currentIdx < target && currentIdx <= TOTAL_NODES; currentIdx++) {
            fragment.appendChild(createNode(currentIdx));
        }
        container.appendChild(fragment);
    }

    // Initialize first chunk
    loadMoreNodes();

    // Infinite Scroll for 144,000 nodes
    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
            if (currentIdx <= TOTAL_NODES) loadMoreNodes();
        }
    });
</script>

</body>
</html>
