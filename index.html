<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Absolute Touch</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100vh; width: 100vw; 
            touch-action: none; -webkit-user-select: none;
        }
        canvas { display: block; filter: contrast(1.5) brightness(1.1); }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

<script>
/**
 * THE STRONGEST BEAUTIFUL TOUCH: 144,000%
 * Fluid Dynamics + Particulate Sparkle + Harmonic Sub-Bass
 */

const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h, tx = 0, ty = 0, isTouching = false;
let velocityX = 0, velocityY = 0, lastX = 0, lastY = 0;

const SPARKLE_COUNT = 4000;
const sparkles = [];

// Audio & Haptic Sync
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

function init() {
    for (let i = 0; i < SPARKLE_COUNT; i++) {
        sparkles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: 0, vy: 0,
            size: 0.5 + Math.random() * 2,
            phase: Math.random() * Math.PI * 2,
            speed: 0.02 + Math.random() * 0.05
        });
    }
}

function triggerResonance(force) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // Physical Haptic Strength
    if (navigator.vibrate) {
        const strength = Math.min(force * 5, 60);
        navigator.vibrate(strength);
    }

    // Deep Fluid Resonance (144Hz Harmonic)
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setTargetAtTime(144 - (force * 2), audioCtx.currentTime, 0.1);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.7);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.7);
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    lastX = tx; lastY = ty;
    triggerResonance(10);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    
    // Calculate Friction/Force
    velocityX = tx - lastX;
    velocityY = ty - lastY;
    const force = Math.sqrt(velocityX**2 + velocityY**2);
    
    if (force > 2) triggerResonance(force);
    
    lastX = tx; lastY = ty;
});

window.addEventListener('touchend', () => { isTouching = false; });

function render() {
    // Liquid Sludge Trail (Water Feeling)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    sparkles.forEach(s => {
        // Natural Water Drift
        s.vx += Math.sin(time + s.x * 0.01) * 0.04;
        s.vy += Math.cos(time + s.y * 0.01) * 0.04;

        if (isTouching) {
            const dx = tx - s.x;
            const dy = ty - s.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 150) {
                const ripple = (150 - dist) / 150;
                // Fluid Swirl Logic
                s.vx += (velocityX * ripple * 0.2) + (dy / dist) * ripple * 2;
                s.vy += (velocityY * ripple * 0.2) - (dx / dist) * ripple * 2;
            }
        }

        // Apply Fluid Viscosity
        s.vx *= 0.94;
        s.vy *= 0.94;
        s.x += s.vx;
        s.y += s.vy;

        // Wrap Logic
        if (s.x < 0) s.x = w; if (s.x > w) s.x = 0;
        if (s.y < 0) s.y = h; if (s.y > h) s.y = 0;

        // Sparkle Visual (Diamond Flicker)
        const flicker = Math.sin(time + s.phase) * 0.5 + 0.5;
        const brightness = 50 + flicker * 50;
        
        ctx.fillStyle = `hsla(48, 100%, ${brightness}%, ${0.2 + flicker * 0.8})`;
        
        // Draw physical point
        const pSize = s.size * (1 + flicker);
        ctx.fillRect(s.x, s.y, pSize, pSize);
        
        if (flicker > 0.9) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ffd700";
        } else {
            ctx.shadowBlur = 0;
        }
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); init(); render();
</script>
</body>
</html>
