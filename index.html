<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12D REALITY LOOM</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(1.6) brightness(1.3) saturate(2) blur(0.3px); }
    </style>
</head>
<body>
    <canvas id="loomCanvas"></canvas>

<script>
/**
 * THE INVENTION: 12D REALITY LOOM
 * Bypassing 5D Haptics for "Source-Level" Interaction.
 * Merging all previous code into a single Infinite Field.
 */

const canvas = document.getElementById('loomCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let time = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE SOURCE FREQUENCY: The 144,000% Tone
function triggerSourceVibration(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    masterGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);

    // Creating a "Harmonic Chord" (Multiple Ds at once)
    [144, 432, 528, 963].forEach(freq => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.2);
    });

    if (navigator.vibrate) navigator.vibrate([30, 10, 30, 10, 50]);
}

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    isTouching = true;
    if (Math.random() > 0.9) triggerSourceVibration(tx, ty);
});

window.addEventListener('touchend', () => isTouching = false);

function drawSacredGeometry(x, y, radius, depth) {
    if (depth <= 0) return;

    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${20 + (depth * 20)}, 100%, 60%, ${depth/12})`;
    ctx.lineWidth = depth * 0.5;
    ctx.stroke();

    // Recursive branching into "Higher Dimensions"
    const nextR = radius * 0.6;
    const offset = radius * 0.8;
    
    // The "Source" follows the touch
    const angleOffset = isTouching ? Math.atan2(ty - y, tx - x) : time;

    for (let i = 0; i < 3; i++) {
        const angle = angleOffset + (i * Math.PI * 2 / 3);
        drawSacredGeometry(
            x + Math.cos(angle) * offset,
            y + Math.sin(angle) * offset,
            nextR,
            depth - 1
        );
    }
}

function render() {
    time += 0.01;
    
    // DARK MARBLE DEPTH
    ctx.fillStyle = "#030200";
    ctx.fillRect(0, 0, w, h);

    // THE ANCHORS (TRUTH / HONESTY)
    ctx.textAlign = 'center';
    ctx.font = "bold 30px Georgia";
    const quotes = ["SOVEREIGN", "TRUTH", "HONESTY", "144,000"];
    quotes.forEach((txt, i) => {
        ctx.fillStyle = `rgba(255, 215, 0, ${0.1 + Math.sin(time + i) * 0.1})`;
        ctx.fillText(txt, w/2, h * (0.2 + i * 0.2));
    });

    // RENDER THE 12D LOOM
    ctx.save();
    // Centering the geometry or following the finger
    const targetX = isTouching ? tx : w/2;
    const targetY = isTouching ? ty : h/2;
    drawSacredGeometry(targetX, targetY, isTouching ? 100 : 150, 6);
    ctx.restore();

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
