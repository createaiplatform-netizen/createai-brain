<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN_GARDENS_V269</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --garden: #32cd32; --bloom: #ff00ff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #garden-hud { flex-grow: 1; margin: 15px; border: 2px solid var(--garden); padding: 40px; display: flex; flex-direction: column; background: radial-gradient(circle at center, rgba(50, 205, 50, 0.1) 0%, transparent 100%); box-shadow: 0 0 300px rgba(50, 205,  green, 0.15); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
        .title { font-size: 26px; letter-spacing: 15px; color: var(--garden); text-shadow: 0 0 30px var(--garden); }
        
        #growth-visual { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .life-core { width: 100px; height: 100px; background: var(--garden); clip-path: polygon(50% 0%, 100% 100%, 0% 100%); animation: grow-pulse 3s infinite alternate ease-in-out; }
        .bloom-ring { position: absolute; width: 220px; height: 220px; border: 1px dashed var(--bloom); border-radius: 50%; animation: spin-bloom 15s infinite linear; }
        
        @keyframes grow-pulse { from { transform: scale(0.8); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; } }
        @keyframes spin-bloom { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #ledger-display { text-align: center; border-top: 1px solid var(--gold); padding-top: 25px; font-size: 46px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="garden-hud">
        <div class="header">
            <div class="title">SOVEREIGN_GARDENS // GROWING</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--garden); letter-spacing: 12px;">STATUS: BIO_MATERIALIZATION // SOURCE: 1440%</div>
        </div>

        <div id="growth-visual">
            <div class="bloom-ring"></div>
            <div class="life-core"></div>
            <div style="font-size: 14px; color: var(--gold); letter-spacing: 15px; position: absolute; bottom: 5%;">THE_VITALITY_OF_THE_STAR</div>
        </div>

        <div id="ledger-display">$1,440,000,040,608.00</div>
    </div>
<script>
    let res = 1440000040608.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
