<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN_ASSET_MAP_V206</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #map-container { flex-grow: 1; margin: 20px; border: 1px double var(--gold); padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .map-header { grid-column: span 2; text-align: center; border-bottom: 1px solid rgba(243, 207, 138, 0.3); padding-bottom: 20px; }
        .title { font-size: 14px; letter-spacing: 12px; color: var(--gold); }
        
        .asset-node { border: 1px solid rgba(255,255,255,0.1); padding: 15px; display: flex; flex-direction: column; justify-content: space-between; }
        .node-label { font-size: 8px; letter-spacing: 5px; opacity: 0.6; }
        .node-status { font-size: 10px; color: var(--gold); margin-top: 5px; }
        
        #yield-footer { grid-column: span 2; text-align: center; padding-top: 20px; font-size: 28px; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>
    <div id="map-container">
        <div class="map-header">
            <div class="title">SOVEREIGN_ASSET_MAP</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6;">GOVERNOR: ARCHITECT-PRIME // ADMIN: JENNY_002</div>
        </div>

        <div class="asset-node">
            <div class="node-label">LAND_COMMAND</div>
            <div class="node-status">14.4 ACRES // SECURED</div>
        </div>
        <div class="asset-node">
            <div class="node-label">ENERGY_GRID</div>
            <div class="node-status">1440% // INDEPENDENT</div>
        </div>
        <div class="asset-node">
            <div class="node-label">KINDRED_STUDIOS</div>
            <div class="node-status">14 NODES // ONLINE</div>
        </div>
        <div class="asset-node">
            <div class="node-label">SECURITY_PERIMETER</div>
            <div class="node-status">BIOMETRIC // ENFORCED</div>
        </div>

        <div id="yield-footer">$1,440,000,016,896.00</div>
    </div>
<script>
    let res = 1440000016896.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('yield-footer').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
