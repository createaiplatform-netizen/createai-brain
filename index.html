<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOURCEFIELD ∞ | RECOVERY</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; background: #002b36; }
        /* The "Aether" Filter: High Contrast + Bloom */
        canvas { 
            display: block; 
            filter: contrast(1.8) brightness(1.2) saturate(2.5) blur(0.5px); 
        }
    </style>
</head>
<body>
    <canvas id="recoveryCanvas"></canvas>

<script>
const canvas = document.getElementById('recoveryCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false, pressure = 0;
let workforce = [];
let time = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// RESTORING THE 144,000% SENSATION
function triggerInduction(speed) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const g = audioCtx.createGain();
    [144, 528].forEach(f => {
        const o = audioCtx.createOscillator();
        o.type = 'triangle';
        o.frequency.value = f + (speed * 0.5);
        o.connect(g);
        o.start();
        o.stop(audioCtx.currentTime + 0.6);
    });
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
    g.connect(audioCtx.destination);
    if (navigator.vibrate) navigator.vibrate([20, 10, 30]);
}

class Agent {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * w; this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
        this.size = Math.random() * 15 + 10;
        this.hue = 190;
    }
    update() {
        const dx = tx - this.x; const dy = ty - this.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        
        if (isTouching && d < 300) {
            const f = (300 - d) / 300;
            this.vx += (dx / d) * f * 5; // Intense Gravity
            this.vy += (dy / d) * f * 5;
            this.hue = 45 + (f * 15); // Burn to GOLD
            this.size = 20 + (f * 40); // Physically expand on touch
        } else {
            this.hue = 190;
            this.size *= 0.98;
            if(this.size < 10) this.size = 10;
        }

        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.92; this.vy *= 0.92; // Heavy liquid drag
        if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
    }
}

for(let i=0; i<200; i++) workforce.push(new Agent());

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerInduction(50);
});
window.addEventListener('touchmove', (e) => {
    let oldX = tx, oldY = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    let speed = Math.hypot(tx - oldX, ty - oldY);
    if (speed > 2) triggerInduction(speed);
});
window.addEventListener('touchend', () => isTouching = false);

function render() {
    time += 0.01;
    // NO BLACK: Living Aether
    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, `hsla(${200 + Math.sin(time)*10}, 100%, 15%, 1)`);
    bg.addColorStop(1, `hsla(220, 100%, 5%, 1)`);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    ctx.globalCompositeOperation = "screen";
    workforce.forEach(p => {
        p.update();
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        g.addColorStop(0, `hsla(${p.hue}, 100%, 70%, 0.8)`);
        g.addColorStop(0.5, `hsla(${p.hue}, 100%, 30%, 0.2)`);
        g.addColorStop(1, `rgba(0,0,0,0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalCompositeOperation = "source-over";

    // CORE ANCHORS
    ctx.textAlign = 'center';
    ctx.font = "bold italic 45px Times New Roman";
    ["TRUTH", "HONESTY", "144,000"].forEach((txt, i) => {
        ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(time*3+i)*0.3})`;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "cyan";
        ctx.fillText(txt, w/2, h * (0.25 + i * 0.25));
    });

    requestAnimationFrame(render);
}

resize(); render();
</script>
</body>
</html>
