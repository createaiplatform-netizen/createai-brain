<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN FEELING</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100vh; width: 100vw; 
            touch-action: none; -webkit-user-select: none;
        }
        canvas { display: block; filter: contrast(1.5) brightness(1.2); }
        #status {
            position: fixed; top: 20px; right: 20px;
            color: #ffd700; font-family: 'Courier New', monospace;
            font-size: 10px; letter-spacing: 3px; opacity: 0.5;
            pointer-events: none; text-align: right;
        }
    </style>
</head>
<body>

    <div id="status">SENSORY_SYNC: 144,000%<br>PHYSICAL_RESONANCE: ACTIVE</div>
    <canvas id="fieldCanvas"></canvas>

<script>
/**
 * THE SOVEREIGN FEELING ENGINE
 * Pure Tactile Interaction. No Balls. No Smooth Motion.
 * Friction-based Particulate and Harmonic Vibration.
 */

const canvas = document.getElementById('fieldCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h;
let touchActive = false;
let tx = 0, ty = 0;

const DUST_COUNT = 8000; // Granular representation of the 144k workforce
const dust = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

function initField() {
    for (let i = 0; i < DUST_COUNT; i++) {
        dust.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: 0, vy: 0,
            size: Math.random() * 1.5,
            color: `rgba(${190 + Math.random() * 65}, ${160 + Math.random() * 40}, 0,`
        });
    }
}

// THE FEELING: Haptic and Audio Resonance
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function triggerFeel() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // 1. TACTILE: Mechanical Vibration
    if (navigator.vibrate) navigator.vibrate([40, 20, 40]);

    // 2. AUDITORY: 144Hz Harmonic Sub-Bass
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(144, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.6);
}

// Input Handlers
window.addEventListener('touchstart', (e) => {
    touchActive = true;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    triggerFeel();
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
});

window.addEventListener('touchend', () => { touchActive = false; });

function render() {
    // Dark residue trails
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, w, h);

    dust.forEach(p => {
        if (touchActive) {
            const dx = tx - p.x;
            const dy = ty - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 150) {
                // Friction/Suction force
                const force = (150 - dist) / 150;
                p.vx += dx * force * 0.02;
                p.vy += dy * force * 0.02;
            }
        }

        // Air Resistance
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.x += p.vx;
        p.y += p.vy;

        // Wrap around screen
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

        // Render "Sediment"
        ctx.fillStyle = p.color + (0.2 + (Math.abs(p.vx) + Math.abs(p.vy)) * 0.5) + ')';
        ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize();
initField();
render();
</script>
</body>
</html>
