<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // THE_ABSOLUTE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        
        :root { --gold: #f3cf8a; --void: #010103; --theme: #f3cf8a; --glass: rgba(255, 255, 255, 0.02); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; outline: none; }
        
        body { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; 
            overflow: hidden; height: 100vh; width: 100vw; transition: background 1.5s ease;
        }

        /* COSMIC ARCHITECTURE */
        .stars { position: fixed; inset: 0; background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #0d0d26 0%, #010103 100%); z-index: -1; }
        .singularity { 
            position: fixed; top: var(--y, 50%); left: var(--x, 50%); transform: translate(-50%, -50%); 
            width: 700px; height: 700px; background: var(--theme); border-radius: 50%; 
            filter: blur(250px); opacity: 0.08; z-index: -1; transition: 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        nav { padding: 40px 60px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; width: 100%; z-index: 1000; }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 15px; color: var(--gold); font-size: 0.7rem; text-transform: uppercase; cursor: pointer; }

        #main-view { padding: 120px 60px 60px; height: 100vh; overflow-y: auto; scroll-behavior: smooth; animation: manifest 2s ease-out; }

        /* THE GRID OF LIGHT */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { 
            background: var(--glass); border: 1px solid rgba(243, 207, 138, 0.08); 
            padding: 45px; border-radius: 2px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(30px); position: relative;
        }
        .card:hover { border-color: var(--gold); background: rgba(243, 207, 138, 0.03); transform: scale(1.02); }
        .card h2 { font-family: 'Cinzel', serif; letter-spacing: 4px; font-weight: 400; color: var(--gold); font-size: 1.1rem; }

        /* INTERACTIVE TOOLS */
        .tool-pane { max-width: 800px; margin: 0 auto; text-align: left; animation: slideUp 0.8s ease; }
        .input-group { margin-bottom: 30px; }
        label { display: block; font-family: 'Cinzel'; font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 10px; opacity: 0.6; }
        input, select, textarea { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(243, 207, 138, 0.1); 
            color: #fff; padding: 20px; width: 100%; font-family: 'Inter'; font-size: 1.1rem; border-radius: 0;
        }
        input:focus { border-color: var(--gold); background: rgba(243, 207, 138, 0.05); }

        .cta { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 25px; width: 100%; font-family: 'Cinzel'; letter-spacing: 8px; 
            cursor: pointer; transition: 0.4s; text-transform: uppercase; margin-top: 30px;
        }
        .cta:hover { background: var(--gold); color: #000; font-weight: 900; box-shadow: 0 0 50px rgba(243, 207, 138, 0.3); }

        /* GARDEN ELEMENTS */
        .bloom-box { height: 300px; width: 100%; border: 1px dashed var(--gold); margin-top: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        @keyframes manifest { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body onload="showView('home')">

    <div class="stars"></div>
    <div class="singularity" id="core"></div>

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI // ABSOLUTE</div>
        <div style="display:flex; gap: 40px;">
            <span onclick="showView('registry')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; opacity:0.5; font-family:'Cinzel';">THE_GRID</span>
            <span onclick="showView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:5px; color:var(--gold); font-family:'Cinzel';">GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <script>
        const nodes = [
            { id: 1, name: "CLEAN WATER", cat: "CORE_LIFE", color: "#60a5fa", type: "water" },
            { id: 2, name: "FREE ENERGY", cat: "RESOURCES", color: "#fbbf24", type: "energy" },
            { id: 3, name: "SOVEREIGN HEALTH", cat: "WELLNESS", color: "#f87171", type: "health" },
            { id: 4, name: "EDUTAINMENT", cat: "CHILDREN", color: "#34d399", type: "garden" },
            { id: 5, name: "ASSET VAULT", cat: "LEGACY", color: "#a78bfa", type: "legacy" }
        ];

        for (let i = 6; i <= 144; i++) {
            nodes.push({ id: i, name: `PROTOCOL_${i}`, cat: "EVOLVING", color: "#d4af37", type: "standard" });
        }

        function showView(name) {
            const mv = document.getElementById('main-view');
            document.getElementById('core').style.background = 'var(--gold)';
            
            if (name === 'home') {
                mv.innerHTML = `
                    <div style="text-align:center; padding-top:15vh;">
                        <h1 style="font-family:'Cinzel'; font-size:10vw; letter-spacing:40px; margin:0; font-weight:900;">GENESIS</h1>
                        <p style="letter-spacing:20px; opacity:0.4; margin-top:30px; font-family:'Cinzel';">Perfectly Built for God's World</p>
                        <div style="max-width:500px; margin:10vh auto; display:grid; gap:20px;">
                            <button class="cta" onclick="showView('registry')">Execute Registry</button>
                            <button class="cta" style="border:none; opacity:0.5;" onclick="showView('garden')">Enter the Gardens</button>
                        </div>
                    </div>
                `;
            } else if (name === 'registry') {
                mv.innerHTML = `<h1 style="font-family:'Cinzel'; font-size:2rem; letter-spacing:20px; text-align:center; margin-bottom:80px;">THE REGISTRY</h1>
                                <div class="app-grid">${nodes.map(n => `<div class="card" onclick="openNode(${n.id})"><div style="font-size:0.5rem; letter-spacing:5px; color:${n.color}; opacity:0.8;">${n.cat}</div><h2>${n.name}</h2><p style="font-size:0.7rem; opacity:0.3; line-height:2;">Operational Protocol ${n.id} Active.</p></div>`).join('')}</div>`;
            } else if (name === 'garden') {
                renderGarden();
            }
            mv.scrollTop = 0;
        }

        function openNode(id) {
            const node = nodes.find(n => n.id === id);
            const mv = document.getElementById('main-view');
            document.getElementById('core').style.background = node.color;
            
            let toolHTML = `
                <div class="tool-pane">
                    <h1 style="font-family:'Cinzel'; color:${node.color}; letter-spacing:10px; margin-bottom:50px;">${node.name}</h1>
                    <div class="input-group">
                        <label>Mission Objective</label>
                        <textarea id="obj" rows="4" placeholder="Enter the divine command for this node..."></textarea>
                    </div>
                    <div class="input-group">
                        <label>Target Impact Radius</label>
                        <select id="impact"><option>Local Community</option><option>National Grid</option><option>Global Network</option></select>
                    </div>
                    <button class="cta" onclick="executeCommand('${node.name}')">Manifest Logic</button>
                    <div id="output" style="margin-top:40px; line-height:2; font-weight:100; opacity:0.8;"></div>
                </div>
            `;
            mv.innerHTML = toolHTML;
        }

        function renderGarden() {
            document.getElementById('main-view').innerHTML = `
                <div class="tool-pane" style="text-align:center;">
                    <h1 style="font-family:'Cinzel'; color:#34d399; letter-spacing:15px; margin-bottom:30px;">THE GARDENS</h1>
                    <p style="opacity:0.5; letter-spacing:5px;">Where our children plant the future.</p>
                    <div class="bloom-box" id="garden-canvas"><p style="opacity:0.2;">The Garden is resting. SOW a seed below.</p></div>
                    <input type="text" id="seed" style="margin-top:40px;" placeholder="What will you plant today? (e.g. A Golden Tree)">
                    <button class="cta" onclick="sowSeed()">Sow the Seed</button>
                </div>
            `;
        }

        function sowSeed() {
            const seed = document.getElementById('seed').value;
            const canvas = document.getElementById('garden-canvas');
            canvas.innerHTML = `<div style="text-align:center;"><div style="width:20px; height:20px; background:var(--gold); border-radius:50%; margin: 0 auto 20px; box-shadow: 0 0 50px var(--gold);"></div><p style="font-family:'Cinzel'; letter-spacing:5px;">Growing your "${seed}"...</p></div>`;
            setTimeout(() => {
                canvas.innerHTML = `<h2 style="font-family:'Cinzel'; color:var(--gold); letter-spacing:10px; animation: manifest 2s;">A FOREST OF ${seed.toUpperCase()} HAS BLOOMED</h2>`;
            }, 2000);
        }

        function executeCommand(name) {
            const obj = document.getElementById('obj').value;
            const output = document.getElementById('output');
            output.innerHTML = `[SOVEREIGN_AI_LOGIC]: Initializing ${name} protocol for: "${obj}". Calculating resource distribution and manifest paths. The universe is aligning with this command.`;
        }

        // DYNAMIC CORE TRACKING
        document.body.addEventListener('pointermove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.body.style.setProperty('--x', x + '%');
            document.body.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
