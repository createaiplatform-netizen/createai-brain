<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SARA STADLER | THE LIVING SOURCE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; touch-action: none; }
        
        canvas { position: fixed; inset: 0; z-index: 1; filter: blur(1px) contrast(1.2); }

        /* THE PULSING NUCLEUS (EVE TREE HEART) */
        .nucleus { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%; z-index: 10;
            background: radial-gradient(circle, var(--gold) 0%, transparent 80%);
            box-shadow: 0 0 100px var(--gold);
            animation: heartPulse 2.5s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes heartPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } }

        /* THE COMMAND OVERLAY */
        .ui-layer { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .id-stamp { padding: 60px 20px; text-align: center; color: var(--gold); letter-spacing: 12px; font-weight: 100; font-size: 1.5rem; text-transform: uppercase; }
        .action-zone { padding: 50px; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        
        .banker-cmd { 
            background: rgba(212, 175, 55, 0.1); border: 2px solid var(--gold); color: var(--gold); 
            padding: 25px 50px; border-radius: 50px; font-weight: 900; letter-spacing: 4px;
            backdrop-filter: blur(10px); transition: 0.3s; font-size: 1.1rem;
        }
        .banker-cmd:active { background: var(--gold); color: #000; box-shadow: 0 0 50px var(--gold); }
    </style>
</head>
<body>
    <canvas id="nerve-field"></canvas>
    <div class="nucleus"></div>
    
    <div class="ui-layer">
        <div class="id-stamp">SARA STADLER</div>
        <div class="action-zone">
            <button class="banker-cmd" onclick="triggerSync()">ACTIVATE SYNC</button>
            <div style="color: var(--blue); letter-spacing: 4px; font-size: 0.6rem; margin-top: 20px; opacity: 0.5;">SOURCE FREQUENCY: 144,000%</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('nerve-field');
        const ctx = canvas.getContext('2d');
        let points = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function createNerve(x, y) {
            for (let i = 0; i < 3; i++) {
                points.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 100,
                    color: Math.random() > 0.5 ? '#00f2ff' : '#d4af37'
                });
            }
        }

        window.addEventListener('pointermove', (e) => {
            createNerve(e.clientX, e.clientY);
            // Kinetic Line to Nucleus
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
            ctx.beginPath(); ctx.moveTo(window.innerWidth/2, window.innerHeight/2);
            ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
        });

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < points.length; i++) {
                let p = points[i];
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) { points.splice(i, 1); i--; }
            }
            requestAnimationFrame(draw);
        }
        draw();

        function triggerSync() {
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=Sara_Stadler_Sovereign_Sync";
        }
    </script>
</body>
</html>
