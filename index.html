<!DOCTYPE html>
<html>
<head>
    <title>Production Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        .terminal { border: 2px solid #0f0; padding: 20px; display: inline-block; width: 90%; }
        button { background: #0f0; color: #000; border: none; padding: 20px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>PRODUCTION TERMINAL</h2>
        <p>DEPLOYMENT: <span style="color:#0f0;">STABLE</span></p>
        <p>STATUS: <span style="color:#0f0;">READY TO LINK $5,000</span></p>
        <button id="linkBtn">LINK ASSET TO HOME SCREEN</button>
    </div>
    <script>
        document.getElementById('linkBtn').onclick = async () => {
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913',
                            symbol: 'USDC',
                            decimals: 6,
                        },
                    },
                });
                alert("Link confirmed. Check your home screen.");
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
