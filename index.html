<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | CreateAI</title>
    <style>
        :root { --sand: #f2eee3; --sage: #5b6d5b; --dark-sage: #3e4e3e; }
        body { background-color: var(--sand); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif; animation: fadeIn 1.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 4rem; border-radius: 50px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.06); border: 1px solid rgba(255,255,255,0.5); max-width: 420px; width: 85%; }
        .brand-tag { letter-spacing: 0.5rem; color: var(--sage); font-size: 0.7rem; margin-bottom: 1.5rem; font-weight: 800; text-transform: uppercase; }
        h1 { font-weight: 200; font-size: 3rem; color: #1a1c1a; margin: 0 0 1.5rem; letter-spacing: -1px; }
        p { color: #5d635d; line-height: 1.8; margin-bottom: 3rem; font-size: 1.1rem; }
        .cta { background: var(--sage); color: white; padding: 1.2rem 2.5rem; border-radius: 100px; text-decoration: none; display: inline-block; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); border: none; cursor: pointer; width: 100%; font-size: 1.2rem; font-weight: 500; }
        .cta:hover { background: var(--dark-sage); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(91, 109, 91, 0.2); }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand-tag">NEXUS ELITE</div>
        <h1>NEXUS OS</h1>
        <p>Your intelligence, evolved. Experience the world's most seamless private AI ecosystem.</p>
        <button class="cta" onclick="window.location.href='https://buy.stripe.com/fZucN54hc8NKeUk4xD5Vu00">Unlock Access</button>
    </div>
</body>
</html>
