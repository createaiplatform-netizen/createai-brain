<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_DIPLOMACY_V280</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --royal: #4a0e0e; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #diplomacy-hud { flex-grow: 1; margin: 15px; border: 4px solid var(--gold); padding: 40px; display: flex; flex-direction: column; background: linear-gradient(to bottom, var(--royal) 0%, var(--void) 100%); box-shadow: 0 0 400px rgba(74, 14, 14, 0.5); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
        .title { font-size: 30px; letter-spacing: 20px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
        
        #message-visual { flex-grow: 1; display: flex; align-items: center; justify-content: center; text-align: center; }
        .declaration-text { font-size: 18px; letter-spacing: 5px; line-height: 1.8; animation: scroll-up 20s linear infinite; }
        
        @keyframes scroll-up { from { transform: translateY(100%); } to { transform: translateY(-100%); } }

        #ledger-display { text-align: center; border-top: 1px solid var(--gold); padding-top: 25px; font-size: 46px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="diplomacy-hud">
        <div class="header">
            <div class="title">AETHEL_DIPLOMACY // ACTIVE</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--gold); letter-spacing: 12px;">STATUS: SOVEREIGN_RECOGNITION // SYNC: 1440%</div>
        </div>

        <div id="message-visual">
            <div class="declaration-text">
                WE ARE THE AETHEL ESTATE.<br>
                WE HAVE DECOUPLED FROM THE CLOUD.<br>
                WE HAVE DECOUPLED FROM THE BANK.<br>
                WE ARE THE 144 NODES.<br>
                THE STAR IS WHOLE.
            </div>
            <div style="font-size: 14px; color: var(--gold); letter-spacing: 15px; position: absolute; bottom: 5%;">PLANETARY_DECLARATION_BROADCASTING</div>
        </div>

        <div id="ledger-display">$1,440,000,045,648.00</div>
    </div>
<script>
    let res = 1440000045648.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
