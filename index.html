<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // LIVING_SOVEREIGN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;300;600&display=swap');
        :root { 
            --gold-light: #f3cf8a; 
            --gold-dark: #b8860b;
            --obsidian: #050208; 
            --void: #010103; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .nebula { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at 50% 50%, var(--obsidian) 0%, var(--void) 100%);
            z-index: 1; animation: bgBreathe 15s infinite ease-in-out;
        }

        #main-view { 
            height: 100svh; width: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
            position: relative; z-index: 10;
        }

        .status-header { 
            position: fixed; top: env(safe-area-inset-top, 20px); 
            font-family: 'Great Vibes', cursive; font-size: 1.4rem; 
            color: var(--gold-light); opacity: 0.9; z-index: 100; 
            text-align: center; width: 100%; text-shadow: 0 0 12px rgba(243, 207, 138, 0.4);
        }

        .eye-container { width: 150px; height: 150px; position: relative; display: flex; align-items: center; justify-content: center; }
        .eye-outer { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(243, 207, 138, 0.2); border-radius: 50%; animation: rotate 45s linear infinite; }
        .eye-inner { width: 80px; height: 80px; background: radial-gradient(circle, var(--gold-light) 0%, transparent 80%); border-radius: 50%; filter: blur(15px); opacity: 0.8; animation: breathe 12s ease-in-out infinite; }
        .eye-pupil { width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px var(--gold-light); }

        .source-title { 
            font-family: 'Cinzel'; font-weight: 900; font-size: 10vw; letter-spacing: 18px; 
            color: var(--gold-light); margin-top: 10px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), #fff, var(--gold-light), var(--gold-dark));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 8s linear infinite;
        }

        .script-quote { font-family: 'Great Vibes', cursive; font-size: 1.9rem; color: var(--gold-light); margin-top: 20px; text-align: center; opacity: 0.85; }

        .dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(1,1,3,0.97); backdrop-filter: blur(20px); border-top: 1px solid rgba(243, 207, 138, 0.08); display: flex; justify-content: space-around; align-items: center; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); }
        .dock-item { color: rgba(255,255,255,0.15); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; text-align: center; flex: 1; padding: 15px; }
        .dock-item.active { color: var(--gold-light); text-shadow: 0 0 12px var(--gold-light); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 0.9; } }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes bgBreathe { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    </style>
</head>
<body onload="render('home'); startLiveRating();">
    <div class="status-header" id="status-text">Sovereign 144.00%</div>
    <div class="nebula"></div>
    <canvas id="canvas"></canvas>
    <div id="main-view"></div>
    
    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('cave')">VAULT</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let viewFrame = 0;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function startLiveRating() {
            const statusText = document.getElementById('status-text');
            setInterval(() => {
                const decimal = (Math.random() * 0.1).toFixed(2);
                statusText.innerText = `Sovereign 144.${decimal.split('.')[1]}%`;
            }, 3500);
        }

        class Sparkle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 2.5 + 0.3;
                this.vX = (Math.random() - 0.5) * 1.5;
                this.vY = (Math.random() - 0.5) * 1.5;
                this.life = 1;
                this.color = Math.random() > 0.3 ? '#f3cf8a' : '#ffffff';
            }
            draw() {
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.shadowBlur = 8; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            }
            update() { 
                // Gravity pull toward center
                let dx = (window.innerWidth/2) - this.x;
                let dy = (window.innerHeight/2) - this.y;
                this.vX += dx * 0.0001;
                this.vY += dy * 0.0001;
                this.x += this.vX; this.y += this.vY; 
                this.life -= 0.01; 
            }
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i, 1); });
            
            // EDEN VINE EFFECT
            if(window.currentView === 'garden') {
                viewFrame += 0.01;
                drawVine();
            }
            requestAnimationFrame(animate);
        }

        function drawVine() {
            ctx.strokeStyle = '#f3cf8a';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            for(let i=0; i<100; i++) {
                let x = i * (canvas.width/100);
                let y = canvas.height - (Math.sin(i*0.1 + viewFrame) * 50) - 100;
                ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        animate();

        const spawn = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            for(let i=0; i<6; i++) particles.push(new Sparkle(x, y));
        };
        window.onmousemove = spawn; window.ontouchmove = spawn;

        function render(view) {
            window.currentView = view;
            const mv = document.getElementById('main-view');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + view.substring(0,3)).classList.add('active');
            
            mv.innerHTML = "";
            mv.style.justifyContent = (view === 'home') ? 'center' : 'flex-start';

            if (view === 'home') {
                mv.innerHTML = `
                    <div class="eye-container"><div class="eye-outer"></div><div class="eye-inner"></div><div class="eye-pupil"></div></div>
                    <h1 class="source-title">SOURCE</h1>
                    <p class="script-quote">The bond of the 144</p>
                `;
            } else if (view === 'garden') {
                mv.innerHTML = `<h1 style="font-family:'Cinzel'; color:var(--gold-light); margin-top:80px; letter-spacing:10px; font-size:1.5rem;">EDEN</h1><p class="script-quote">The Garden of Sovereign Growth</p>`;
            } else {
                mv.innerHTML = `<h1 style="font-family:'Cinzel'; color:var(--gold-light); margin-top:80px; letter-spacing:10px;">${view.toUpperCase()}</h1>`;
            }
        }
    </script>
</body>
</html>
