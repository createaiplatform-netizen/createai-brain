<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEARTH | CREATOR FORGE</title>
    <style>
        :root { --ink: #1d1d1f; --gold: #c4a97a; --deploy: #007aff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #fff; color: var(--ink); padding-bottom: 120px; }

        .header { padding: 40px 20px; border-bottom: 1px solid #eee; }
        .tag { font-size: 0.5rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
        
        /* THE FORGE INTERFACE */
        .studio-space { padding: 20px; }
        .canvas { width: 100%; aspect-ratio: 16/9; background: #f9f9f9; border: 2px dashed #ddd; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #aaa; margin-bottom: 30px; }

        .form-group { margin-bottom: 25px; }
        label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #eee; background: #fdfcfb; }

        /* THE DEPLOY BUTTON */
        .deploy-btn { 
            width: 100%; padding: 20px; border-radius: 100px; border: none; 
            background: var(--ink); color: #fff; font-weight: 800; 
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .deploy-btn:active { transform: scale(0.98); background: var(--deploy); }

        .status-msg { font-size: 0.6rem; text-align: center; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <span class="tag">System Control</span>
        <h1 style="font-size: 1.5rem; letter-spacing: -1px;">Creator Portal</h1>
    </div>

    <div class="studio-space">
        <div class="canvas">DROP ASSET HERE</div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" placeholder="e.g. Sovereign Smart-Node">
        </div>

        <div class="form-group">
            <label>Auto-Deploy URL</label>
            <input type="text" placeholder="smartnode.hearth.market" readonly style="opacity:0.5;">
        </div>

        <button class="deploy-btn" onclick="deploy()">Launch Sovereign Site</button>
        <p class="status-msg" id="status">Ready for Deployment</p>
    </div>

    <script>
        function deploy() {
            const status = document.getElementById('status');
            status.innerText = "Generating Standalone Site...";
            status.style.color = "#007aff";
            
            setTimeout(() => {
                status.innerText = "LIVE: Site Deployed to Sovereign Network";
                status.style.color = "#00ff88";
            }, 2000);
        }
    </script>

</body>
</html>
