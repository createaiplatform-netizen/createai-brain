<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEDGER TERMINAL 100</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .vision-frame { border: 15px double #39ff14; padding: 60px 20px; box-shadow: 0 0 120px #39ff14; border-radius: 50px; width: 85%; background: rgba(0, 255, 0, 0.05); }
        .amount { font-size: 72px; font-weight: bold; margin: 30px 0; text-shadow: 0 0 20px #39ff14; }
        .label { font-size: 22px; text-transform: uppercase; letter-spacing: 6px; opacity: 0.8; }
        .status { margin-top: 20px; font-size: 14px; color: #fff; text-transform: uppercase; }
    </style>
</head>
<body onload="execute_vision()">
    <div class="vision-frame">
        <div class="label">Confirmed Ledger</div>
        <div id="balance" class="amount">---</div>
        <div class="label">USDC (Base Network)</div>
        <div class="status" id="status">Syncing Terminal...</div>
    </div>

    <script>
        async function execute_vision() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    
                    // Hex data for balanceof(address)
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    
                    const hexBalance = await window.ethereum.request({
                        method: 'eth_call',
                        params: [{ to: usdcContract, data: data }, 'latest']
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    document.getElementById('status').innerText = "LEDGER SYNC 100% COMPLETE";
                    
                    // Force-manifest the token in the wallet UI
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: usdcContract,
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                            },
                        },
                    });
                } catch (e) {
                    document.getElementById('balance').innerText = "LINK ERROR";
                    document.getElementById('status').innerText = "CONNECTION REQUIRED";
                }
            }
        }
    </script>
</body>
</html>
