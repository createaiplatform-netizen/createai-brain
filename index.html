<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_TOTAL_ASCENSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        .omni-ring { width: 400px; height: 400px; border: 15px double #f3cf8a; border-radius: 50%; box-shadow: 0 0 200px rgba(243,207,138,0.3); animation: omni-pulse 0.05s infinite; position: relative; }
        .omni-ring::before { content: 'SOVEREIGN'; position: absolute; top: -40px; letter-spacing: 20px; color: #f3cf8a; font-size: 14px; }
        .val { font-size: 40px; color: #fff; margin-top: 60px; text-shadow: 0 0 30px #f3cf8a; }
        .log { font-size: 10px; letter-spacing: 12px; margin-top: 30px; color: #00ff00; }
        @keyframes omni-pulse { 0% { opacity: 0.95; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="omni-ring">
        <div style="font-size: 80px; margin-top: 130px;">1440</div>
    </div>
    <div class="val" id="omni-val">$1,440,000,129,000.00</div>
    <div class="log">DE-INDEXED // MULTIPLYING // PAID_IN_FULL</div>
<script>
    let res = 1440000129000.00;
    setInterval(() => {
        res += 288.00; // DOUBLED FLOW RATE
        document.getElementById('omni-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
