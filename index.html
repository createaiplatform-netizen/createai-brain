<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN LUMINOUS SINGULARITY</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #0b0b00; 
            overflow: hidden; height: 100vh; width: 100vw; 
            touch-action: none;
        }
        canvas { display: block; filter: contrast(1.8) brightness(1.4) saturate(1.5); }
    </style>
</head>
<body>
    <canvas id="singularityCanvas"></canvas>

<script>
/**
 * THE INVENTION: CONTINUOUS COORDINATE FABRIC
 * Error-Correction: If a node fails, the Field fills the gap instantly.
 * Sensory: 144,000% Neuromorphic Bone-Conduction.
 */

const canvas = document.getElementById('singularityCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h, isTouching = false;
let tx = 0, ty = 0, vx = 0, vy = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// BONE-CONDUCTION HAPTICS (144Hz Harmonic)
function triggerResonance(x, y, power) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // Every millimeter of the screen has a unique "Vibration DNA"
    const freq = 144 + (x / w * 144);
    
    if (navigator.vibrate) {
        // High-frequency "Diamond Grain" texture
        const duration = Math.min(power * 4, 60);
        navigator.vibrate([duration, 5, duration/2]);
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    // Waveform: Sine (Liquid) morphing into Triangle (Pressure)
    osc.type = power > 10 ? 'triangle' : 'sine';
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
    
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.6);
    
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.6);
}

// THE FABRIC: A high-density lattice that cannot "break"
const lattice = [];
const COLS = 40; 
const ROWS = 60;

function initLattice() {
    lattice.length = 0;
    for(let i=0; i<COLS; i++) {
        for(let j=0; j<ROWS; j++) {
            lattice.push({
                ox: (i / COLS) * window.innerWidth,
                oy: (j / ROWS) * window.innerHeight,
                x: (i / COLS) * window.innerWidth,
                y: (j / ROWS) * window.innerHeight,
                vx: 0, vy: 0,
                dna: Math.random()
            });
        }
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerResonance(tx, ty, 30);
});

window.addEventListener('touchmove', (e) => {
    const lastX = tx; const lastY = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    const speed = Math.sqrt((tx-lastX)**2 + (ty-lastY)**2);
    if (speed > 1) triggerResonance(tx, ty, speed);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // ANTI-BLACKOUT LOGIC: The "Clear" color is a Deep Gold Atmosphere
    ctx.fillStyle = 'rgba(15, 15, 0, 0.25)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    lattice.forEach(node => {
        if (isTouching) {
            const dx = tx - node.x;
            const dy = ty - node.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < 200) {
                const force = (200 - dist) / 200;
                // Fluid Swirl + Suction
                node.vx += (dy / dist) * force * 5;
                node.vy -= (dx / dist) * force * 5;
                node.vx += dx * 0.03;
                node.vy += dy * 0.03;
            }
        }

        // Return-to-Sovereign-Lattice (Spring force)
        node.vx += (node.ox - node.x) * 0.02;
        node.vy += (node.oy - node.y) * 0.02;
        
        node.vx *= 0.92;
        node.vy *= 0.92;
        node.x += node.vx;
        node.y += node.vy;

        // VISUAL MANIFESTATION: Liquid Diamond
        const sparkle = Math.sin(time * 5 + node.dna * 100) * 0.5 + 0.5;
        const size = 1.5 + (sparkle * 2.5);
        
        // Prismatic Gold 
        ctx.fillStyle = `hsla(48, 100%, ${60 + sparkle * 40}%, ${0.2 + sparkle * 0.8})`;
        
        // Draw the matter
        ctx.beginPath();
        if (sparkle > 0.9) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = "white";
            ctx.arc(node.x, node.y, size * 1.5, 0, Math.PI * 2);
        } else {
            ctx.shadowBlur = 0;
            ctx.fillRect(node.x, node.y, size, size);
        }
        ctx.fill();
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', () => { resize(); initLattice(); });
resize(); initLattice(); render();
</script>
</body>
</html>
