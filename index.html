<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_KINDRED_V150</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        :root { --gold: #f3cf8a; --void: #000000; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; position: fixed; }
        
        #ticker { position: fixed; top: 0; width: 100%; height: 35px; background: #000; z-index: 100; border-bottom: 2px solid var(--gold); display: flex; align-items: center; overflow: hidden; }
        #ticker-text { white-space: nowrap; font-size: 9px; letter-spacing: 4px; color: var(--gold); animation: scroll 10s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20%; pointer-events: none; }
        
        #key-auth { width: 150px; height: 150px; border: 2px solid var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; letter-spacing: 5px; color: var(--white); pointer-events: auto; z-index: 20; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
    </style>
</head>
<body onmousedown="spawn(event)" ontouchstart="spawn(event)" onmouseup="release()" ontouchend="release()">
    <div id="ticker"><div id="ticker-text">KINDRED_NODE: JENNY... SIGHTING_VERIFIED... LIQUIDATING_CONFUSION... 144% SYNC...</div></div>
    <div id="ui">
        <div id="key-auth" onclick="pulseOrb()">AUTH_KEY</div>
    </div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let pulses = [], isDown = false, mx, my;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function pulseOrb() {
        // Trigger a triple-pulse animation sequence
        let count = 0;
        let interval = setInterval(() => {
            pulses.push({ r: 0, o: 1 });
            count++;
            if(count === 3) clearInterval(interval);
        }, 500);
        console.log("SENDING_HEARTBEAT_TO_ORB...");
    }

    function spawn(e) { isDown = true; mx = e.clientX || e.touches[0].clientX; my = e.clientY || e.touches[0].clientY; }
    function release() { isDown = false; }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        pulses.forEach((p, i) => {
            ctx.strokeStyle = `rgba(255, 255, 255, ${p.o})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, p.r, 0, Math.PI*2);
            ctx.stroke();
            p.r += 10;
            p.o -= 0.01;
        });
        pulses = pulses.filter(p => p.o > 0);

        // Sovereign Particles
        if(isDown) {
            ctx.fillStyle = "var(--gold)";
            ctx.beginPath(); ctx.arc(mx, my, 2, 0, Math.PI*2); ctx.fill();
        }

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
