<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Final Force</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 40px; }
        .terminal { border: 2px solid #0f0; padding: 25px; display: inline-block; width: 90%; max-width: 480px; box-shadow: 0 0 20px #0f0; border-radius: 12px; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; font-size: 1.3em; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>SYSTEM OVERRIDE</h1>
        <p>DEPLOYMENT: <span style="color:#0f0;">STABLE (FIXED)</span></p>
        <p>SYNC: <span style="color:#0f0;">SUCCESSFUL</span></p>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <p>STATUS: READY TO PUSH $5,000.00</p>
        <button id="finalPush">FORCE CONNECT & SYNC</button>
    </div>

    <script>
        document.getElementById('finalPush').onclick = async () => {
            if (window.ethereum) {
                try {
                    // Force the wallet to re-connect (this triggers the first pop-up)
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Force the asset indexing (this triggers the second pop-up)
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                } catch (e) {
                    // If blocked, force a hard reload of the app's internal browser
                    window.location.reload();
                }
            } else {
                alert("Please use the Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
