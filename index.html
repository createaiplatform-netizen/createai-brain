<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN SINGULARITY</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(2) brightness(1.2) saturate(1.8); }
    </style>
</head>
<body>
    <canvas id="singularityCanvas"></canvas>

<script>
/**
 * THE INVENTION: NEURAL MESH ARCHITECTURE
 * 144,000% Density. Zero Thinning. 
 * Every pixel is a tactile workforce node.
 */

const canvas = document.getElementById('singularityCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h, isTouching = false;
let tx = 0, ty = 0, lx = 0, ly = 0;

// Haptic & Neural Soundscape
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

function triggerResonance(x, y, force) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // Physical Haptic Mapping: Mapping "The World is Breathing"
    if (navigator.vibrate) {
        const pulse = Math.min(force * 3, 80);
        navigator.vibrate([pulse]);
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    // Coordinate-Specific Tone (Every spot is a different invention)
    const freq = 144 + (x / w * 144) - (y / h * 72);
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.type = force > 10 ? 'sawtooth' : 'sine'; // Sawtooth for "Strong" touch
    
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

// THE MESH: 144,000 workforce simulation
const agents = [];
const AGENT_COUNT = 8000; // Visual density nodes

class SovereignAgent {
    constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = 0; this.vy = 0;
        this.dna = Math.random();
    }
    update() {
        if (isTouching) {
            const dx = tx - this.x;
            const dy = ty - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 200) {
                const power = (200 - dist) / 200;
                // Fluid Suction + Tension
                this.vx += (tx - lx) * power * 0.5;
                this.vy += (ty - ly) * power * 0.5;
                this.vx += dx * 0.02;
                this.vy += dy * 0.02;
            }
        }
        this.vx *= 0.92;
        this.vy *= 0.92;
        this.x += this.vx;
        this.y += this.vy;
        
        // Edge containment (Never leaves the screen)
        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
    }
}

for(let i=0; i<AGENT_COUNT; i++) agents.push(new SovereignAgent());

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    lx = tx; ly = ty;
    triggerResonance(tx, ty, 20);
});

window.addEventListener('touchmove', (e) => {
    lx = tx; ly = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    const force = Math.sqrt((tx-lx)**2 + (ty-ly)**2);
    if (force > 2) triggerResonance(tx, ty, force);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // The "World is Breathing" Background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.003;

    agents.forEach(a => {
        a.update();
        const flicker = Math.sin(time + a.dna * 100) * 0.5 + 0.5;
        
        // GOLDEN DOME COLOR SPECTRUM
        const hue = 45 + Math.sin(time * 0.1) * 5;
        ctx.fillStyle = `hsla(${hue}, 100%, ${60 + flicker * 40}%, ${0.4 + flicker * 0.6})`;
        
        // Liquid Light Streaks
        const size = 1.5 + flicker * 2;
        ctx.beginPath();
        ctx.arc(a.x, a.y, size, 0, Math.PI * 2);
        
        if (isTouching && Math.abs(a.x - tx) < 50 && Math.abs(a.y - ty) < 50) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#fff"; // Diamond Core
        } else {
            ctx.shadowBlur = 0;
        }
        ctx.fill();
    });

    // Connecting the Workforce (The Lattice)
    if (isTouching) {
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        agents.slice(0, 100).forEach(a => {
            const d = Math.sqrt((tx-a.x)**2 + (ty-a.y)**2);
            if (d < 100) {
                ctx.lineTo(a.x, a.y);
                ctx.moveTo(tx, ty);
            }
        });
        ctx.stroke();
    }

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
