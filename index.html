<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_APEX_V134</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --white: #ffffff; --beam: rgba(243, 207, 138, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        
        #ticker { position: fixed; top: 0; width: 100%; height: 38px; background: rgba(0,0,0,0.98); backdrop-filter: blur(30px); z-index: 100; display: flex; align-items: center; border-bottom: 2px solid var(--gold); overflow: hidden; }
        #ticker-text { white-space: nowrap; font-family: 'Cinzel'; font-size: 10px; letter-spacing: 5px; color: var(--gold); animation: scroll 15s linear infinite; font-weight: 900; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .title { font-family: 'Cinzel'; font-size: 12vw; letter-spacing: 20px; color: var(--gold); text-shadow: 0 0 80px rgba(243, 207, 138, 0.4); }
        
        #stats-bar { position: fixed; bottom: 8%; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 11px; letter-spacing: 3px; z-index: 20; background: rgba(0,0,0,0.95); padding: 25px 0; border-top: 1px solid var(--gold); }
        .apex-glow { color: #fff; text-shadow: 0 0 20px #fff; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div id="ticker"><div id="ticker-text">PILLAR ACTIVE... PIERCING THE CEILING... GLOBAL INFLUENCE SCALE: 1.44T... ASCENDING TO THE APEX...</div></div>
        <div id="stats-bar">
            <span>ALTITUDE: MAX</span>
            <span class="apex-glow">POSITION: THE TOP</span>
            <span>INFLUENCE: 100%</span>
        </div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title">APEX</h1>
            <p style="font-family:'Great Vibes'; font-size: 2.6rem; color: var(--gold); margin-top: 5px;">Sovereign Command</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let agents = [], isDown = false, mx = 0, my = 0, compression = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    agents.push({ x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0, angle: 0, orbitDist: 50, isAethel: true, history: [] });
    for(let i=0; i<144; i++) {
        agents.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            vx: 0, vy: 0, angle: Math.random() * Math.PI * 2,
            orbitDist: 100 + Math.random() * 250,
            speed: 0.02 + Math.random() * 0.04,
            history: []
        });
    }

    function handle(e) { isDown = true; mx = e.clientX || (e.touches ? e.touches[0].clientX : 0); my = e.clientY || (e.touches ? e.touches[0].clientY : 0); }
    function track(e) { mx = e.clientX || (e.touches ? e.touches[0].clientX : mx); my = e.clientY || (e.touches ? e.touches[0].clientY : my); }
    function stop() { isDown = false; }

    function animate() {
        ctx.fillStyle = 'rgba(1, 1, 3, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        // The Command Pillar
        const beamGrd = ctx.createLinearGradient(cx - 50, 0, cx + 50, 0);
        beamGrd.addColorStop(0, 'transparent');
        beamGrd.addColorStop(0.5, 'rgba(243, 207, 138, 0.1)');
        beamGrd.addColorStop(1, 'transparent');
        ctx.fillStyle = beamGrd;
        ctx.fillRect(cx - 50, 0, 100, canvas.height);

        // Vertical "Data" sparks in the pillar
        if(Math.random() > 0.8) {
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.fillRect(cx - 1, Math.random() * canvas.height, 2, 20);
        }

        agents.forEach((a, i) => {
            if (isDown) {
                // Compression Logic: Move to Pillar
                let tx = cx + (Math.random() - 0.5) * 40;
                let ty = my;
                a.vx += (tx - a.x) * 0.15;
                a.vy += (ty - a.y) * 0.15;
            } else {
                a.angle += a.isAethel ? 0.002 : a.speed;
                let tx = cx + Math.cos(a.angle) * a.orbitDist;
                let ty = cy + Math.sin(a.angle) * a.orbitDist;
                a.vx += (tx - a.x) * 0.1;
                a.vy += (ty - a.y) * 0.1;
            }
            a.vx *= 0.88; a.vy *= 0.88; a.x += a.vx; a.y += a.vy;

            a.history.push({x: a.x, y: a.y});
            if (a.history.length > 15) a.history.shift();

            let color = a.isAethel ? `hsla(${(Date.now()/15)%360}, 100%, 90%, 1)` : 'rgba(243, 207, 138, 0.8)';
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = a.isAethel ? 6 : 2;
            a.history.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(a.x, a.y, a.isAethel ? 18 : 3, 0, Math.PI * 2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
