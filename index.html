<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | OMNI</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Times New Roman', serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; pointer-events: none; }
        .header { border-bottom: 1px solid #d4af37; padding-bottom: 15px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 5px; color: #d4af37; }
        .title { text-align: center; font-size: 45px; letter-spacing: 15px; color: #d4af37; font-style: italic; margin-top: 20px; text-shadow: 0 0 20px rgba(212,175,55,0.6); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; pointer-events: auto; max-width: 400px; margin: 0 auto; }
        .btn { 
            background: rgba(0,0,0,0.85); border: 1px solid #d4af37; padding: 35px 10px; 
            border-radius: 15px; text-align: center; color: #fff; cursor: pointer;
            transition: 0.1s; -webkit-tap-highlight-color: transparent; backdrop-filter: blur(10px);
        }
        .btn:active { background: #fff; color: #000; transform: scale(1.1); }
        .btn b { display: block; font-size: 14px; letter-spacing: 5px; }

        /* MULTI-ENGINE OVERLAYS */
        #portal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(0,0,0,0.92); text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        .age-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .age-btn { border: 1px solid #fff; padding: 15px; color: #fff; border-radius: 10px; font-size: 10px; }
        
        .footer { text-align: center; font-size: 32px; font-weight: bold; color: #fff; letter-spacing: 2px; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>SYSTEM: OMNI</div><div>144,000%</div></div>
        <div class="title">SOVEREIGN</div>
        <div class="grid">
            <div class="btn" onclick="fire('MARKET', '#00f2ff', 'LIQUIDITY FLOW')"><b>MARKET</b></div>
            <div class="btn" onclick="fire('HUB', '#d4af37', 'SOUL MIRROR')"><b>HUB</b></div>
            <div class="btn" onclick="fire('GARDE', '#fff', 'FAMILY ACCESS')"><b>GARDE</b></div>
            <div class="btn" onclick="fire('NET', '#39ff14', 'TRUTH FEED')"><b>NET</b></div>
        </div>
        <div class="footer">$1,440,000,000,000</div>
    </div>

    <div id="portal">
        <h1 id="rn" style="font-size: 50px; letter-spacing: 15px; margin: 0;"></h1>
        <p id="rs" style="color: #d4af37; letter-spacing: 5px; margin-bottom: 30px;"></p>
        
        <div id="age-gates" class="age-grid">
            <div class="age-btn" onclick="tune(25)">3-7</div>
            <div class="age-btn" onclick="tune(10)">8-13</div>
            <div class="age-btn" onclick="tune(0)">14+</div>
        </div>

        <div style="margin-top: 50px; color: #fff; text-decoration: underline;" onclick="closePortal()">CLOSE ENGINE</div>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let lines = []; let accent = '#d4af37'; let velocity = 12;

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*10+5, l: Math.random()*60+20});
            loop();
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = accent; ctx.lineWidth = 2;
            lines.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + l.l); ctx.stroke();
                l.y += (velocity); if(l.y > canvas.height) l.y = -l.l;
            });
            requestAnimationFrame(loop);
        }

        function fire(name, color, status) {
            accent = color;
            velocity = (name === 'MARKET') ? 25 : 12;
            document.getElementById('portal').style.display = 'flex';
            document.getElementById('rn').innerText = name;
            document.getElementById('rn').style.color = color;
            document.getElementById('rs').innerText = status;
            document.getElementById('age-gates').style.display = (name === 'GARDE') ? 'grid' : 'none';
        }

        function tune(blur) {
            canvas.style.filter = `blur(${blur}px)`;
            closePortal();
        }

        function closePortal() { document.getElementById('portal').style.display = 'none'; }
    </script>
</body>
</html>
