<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding:50px;">
    <h2>FINALIZE ACCOUNT UPDATE</h2>
    <p>Status: All Transactions Confirmed</p>
    <button id="refreshBtn" style="padding:20px; background:#0f0; font-weight:bold; cursor:pointer;">
        FORCE BALANCE REFRESH
    </button>
    <script>
        document.getElementById('refreshBtn').onclick = async () => {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                // This command forces the wallet to re-index all assets
                await provider.send("wallet_requestPermissions", [{ eth_accounts: {} }]);
                alert("Refresh Command Sent. Please restart the app.");
            } catch (e) { alert("Refresh error: " + e.message); }
        };
    </script>
</body>
</html>
