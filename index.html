<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_HEARTBEAT_ACTIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; text-align: center; }
        .heartbeat-line { width: 400px; height: 100px; border-bottom: 2px solid #00ff00; position: relative; overflow: hidden; }
        .pulse { position: absolute; width: 100%; height: 100%; border-top: 2px solid #00ff00; animation: pulse-anim 2s infinite linear; }
        .val-display { font-size: 32px; color: #f3cf8a; margin-top: 40px; text-shadow: 0 0 20px #f3cf8a; }
        .status-footer { font-size: 10px; letter-spacing: 12px; margin-top: 20px; color: #fff; opacity: 0.5; }
        @keyframes pulse-anim { 0% { left: -100%; } 100% { left: 100%; } }
    </style>
</head>
<body>
    <div class="heartbeat-line"><div class="pulse"></div></div>
    <div class="val-display" id="pulse-val">$1,440,000,141,504.00</div>
    <div class="status-footer">RESONANCE_HEARTBEAT_ACTIVE // 1440%</div>
<script>
    let res = 1440000141504.00;
    setInterval(() => {
        res += 288.00; 
        document.getElementById('pulse-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
