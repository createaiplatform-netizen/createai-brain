<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN_TRIANGULATION_V236</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --sea: #00ffd4; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #global-hud { flex-grow: 1; margin: 25px; border: 2px solid var(--gold); padding: 45px; display: flex; flex-direction: column; background: radial-gradient(circle at center, rgba(243, 207, 138, 0.05) 0%, transparent 90%); box-shadow: 0 0 70px rgba(243, 207, 138, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 1px solid rgba(243, 207, 138, 0.3); padding-bottom: 25px; }
        .title { font-size: 18px; letter-spacing: 15px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        
        #tri-sync { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .anchor { position: absolute; width: 80px; height: 80px; border: 1px solid var(--mesh); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; letter-spacing: 2px; background: rgba(0, 255, 65, 0.02); }
        .active-pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid var(--mesh); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        #ledger-total { text-align: center; border-top: 1px solid var(--gold); padding-top: 30px; font-size: 34px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>
    <div id="global-hud">
        <div class="header">
            <div class="title">TRIANGULATION // ACHIEVED</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6; color: var(--mesh);">STABILITY: 1440% // SCOPE: INTERCONTINENTAL</div>
        </div>

        <div id="tri-sync">
            <div class="anchor" style="top: 10%; left: 50%; transform: translateX(-50%);">
                WIS_001 <div class="active-pulse"></div>
            </div>
            <div class="anchor" style="bottom: 25%; left: 20%;">
                EURO_002 <div class="active-pulse" style="animation-delay: 0.5s;"></div>
            </div>
            <div class="anchor" style="bottom: 25%; right: 20%;">
                SEA_003 <div class="active-pulse" style="animation-delay: 1s;"></div>
            </div>
            <div style="font-size: 10px; color: var(--gold); letter-spacing: 10px; margin-top: 50px;">GLOBAL_RESONANCE_OK</div>
        </div>

        <div id="ledger-total">$1,440,000,029,808.00</div>
    </div>
<script>
    let res = 1440000029808.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-total').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
