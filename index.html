<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SANCTUARY</title>
    <style>
        /* CORE FREQUENCY STYLES */
        body { 
            margin: 0; overflow: hidden; background: #000; color: #FFD700; 
            font-family: 'Georgia', serif; height: 100vh; width: 100vw; position: fixed; 
        }
        #stars { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; border-radius: 50%; background: #FFD700; opacity: 0.4; }
        
        #header { position: relative; z-index: 10; text-align: center; padding-top: 40px; pointer-events: none; }
        .freq { color: #00E5FF; letter-spacing: 5px; font-size: 0.8rem; font-weight: bold; text-shadow: 0 0 10px #00E5FF; }
        h1 { letter-spacing: 10px; font-size: 2.4rem; margin: 10px 0; text-shadow: 0 0 15px #FFD700; }
        
        /* MANIFESTATION NODES */
        #playground { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; }
        .node { 
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #FFD700; background: rgba(0,0,0,0.95);
            box-shadow: 0 0 30px #FFD700; font-weight: bold; text-align: center; 
            padding: 15px; backdrop-filter: blur(10px); z-index: 100; font-size: 0.8rem;
        }

        /* THE GATE (PREVENTS MISTAKES) */
        #gate {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 380px; background: #000; border: 2px solid #FFD700;
            border-radius: 15px; padding: 25px; z-index: 5000; display: none; text-align: center;
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
        }
        #gate-text { margin-bottom: 20px; font-size: 1.1rem; line-height: 1.4; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        #manifest-btn { background: #FFD700; color: #000; }
        #abort-btn { background: transparent; color: #ff4444; border: 1px solid #ff4444; }

        /* COMMAND BAR */
        #cmd-center { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 8px; z-index: 1000; width: 90%; max-width: 450px; 
        }
        input { flex-grow: 1; padding: 15px; background: rgba(0,0,0,0.9); color: #00E5FF; border: 1px solid #FFD700; border-radius: 10px; font-size: 16px; outline: none; }
        #go { padding: 15px 20px; background: #FFD700; color: #000; border: none; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

<div id="stars"></div>
<div id="playground"></div>

<div id="header">
    <div class="freq">144,400% FREQUENCY ACTIVE</div>
    <h1 id="site-title">THE SANCTUARY</h1>
</div>

<div id="gate">
    <div id="gate-text">Shall I manifest this change, Commander?</div>
    <button id="manifest-btn" class="btn" onclick="execute()">MANIFEST</button>
    <button id="abort-btn" class="btn" onclick="closeGate()">ABORT</button>
</div>

<div id="cmd-center">
    <input type="text" id="cmd" placeholder="Command Reality...">
    <button id="go" onclick="propose()">GO</button>
</div>

<script>
    let pending = null;

    // 1. CLEAR THE EMBARRASSMENT
    function propose() {
        const val = document.getElementById('cmd').value.trim();
        if(!val) return;
        
        const gate = document.getElementById('gate');
        const text = document.getElementById('gate-text');

        if (val.toLowerCase() === 'clear') {
            text.innerText = "Wipe all circles and reset the Sanctuary?";
            pending = () => { document.getElementById('playground').innerHTML = ''; localStorage.clear(); };
        } else if (val.toLowerCase().includes('bg ')) {
            const color = val.split(' ').pop();
            text.innerText = "Shift atmosphere to " + color.toUpperCase() + "?";
            pending = () => { document.body.style.background = color; };
        } else {
            text.innerText = "Manifest Unit: " + val.toUpperCase() + "?";
            pending = () => { createNode(val); };
        }
        gate.style.display = 'block';
    }

    function execute() { if(pending) pending(); closeGate(); }
    function closeGate() { document.getElementById('gate').style.display = 'none'; document.getElementById('cmd').value = ''; }

    function createNode(txt) {
        const n = document.createElement('div');
        n.className = 'node';
        n.innerText = txt.toUpperCase();
        n.style.left = '50%'; n.style.top = '50%';
        n.style.transform = 'translate(-50%, -50%)';
        document.getElementById('playground').appendChild(n);
    }

    // 2. STARFIELD
    for(let i=0; i<60; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.width = s.style.height = Math.random()*3+'px';
        s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
        document.getElementById('stars').appendChild(s);
    }
</script>
</body>
</html>
