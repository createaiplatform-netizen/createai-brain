<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS ELITE | OMNI-SEARCH</title>
    <style>
        :root { --gold: #c4a97a; --pearl: #fdfdfd; --sage: #7a9068; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top, #fff 0%, #e8e8e8 100%);
            color: #222; min-height: 100vh; overflow-x: hidden;
        }

        /* THE BRAIN HEADER */
        .top-nav {
            position: sticky; top: 0; z-index: 1000; padding: 20px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .omni-box {
            background: #fff; border: 1px solid var(--gold); border-radius: 50px;
            padding: 12px 25px; display: flex; align-items: center;
            box-shadow: 0 10px 40px rgba(196,169,122,0.2);
        }
        .omni-box input { flex: 1; border: none; outline: none; font-size: 1rem; color: #444; background: transparent; }

        /* THE FLOATING CORE */
        .hero { text-align: center; padding: 30px 20px; }
        .pearl-core {
            width: 120px; height: 120px; margin: 0 auto 20px;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #dcdcdc 100%);
            border-radius: 50%; position: relative;
            box-shadow: -10px -10px 30px #fff, 10px 10px 30px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* SEARCH RESULTS & CARDS */
        .results-area { padding: 20px; max-width: 500px; margin: 0 auto; min-height: 400px; }
        
        .engine-card {
            background: rgba(255,255,255,0.8); border: 1px solid rgba(0,0,0,0.05);
            border-radius: 25px; padding: 25px; margin-bottom: 20px;
            backdrop-filter: blur(10px); transition: 0.3s;
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .tag { font-size: 0.6rem; letter-spacing: 2px; color: var(--gold); font-weight: bold; text-transform: uppercase; }
        .price { font-size: 1.8rem; font-weight: 200; margin: 10px 0; }
        .btn { 
            width: 100%; background: var(--gold); color: #fff; border: none; 
            padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer;
            margin-top: 15px; text-transform: uppercase; font-size: 0.7rem;
        }

        .no-results { text-align: center; color: #aaa; margin-top: 50px; font-size: 0.8rem; font-style: italic; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="omni-box">
            <input type="text" id="engineSearch" placeholder="Search 158 Engines (e.g. Cafe, Hospital, Internet)..." onkeyup="searchEngines()">
            <span>✨</span>
        </div>
    </nav>

    <div class="hero">
        <div class="pearl-core"><span style="font-size: 2rem; color: var(--gold);">₪</span></div>
    </div>

    <div class="results-area" id="results">
        <div class="engine-card">
            <span class="tag">The Family Portal</span>
            <div class="price">97.00</div>
            <p style="font-size: 0.75rem; color: #666;">Free Internet, Utilities, and Legacy Vault.</p>
            <button class="btn">Activate Portal</button>
        </div>

        <div class="engine-card" style="background: #1a1a1a; color: #fff;">
            <span class="tag">The Business Engine</span>
            <div class="price" style="color:#fff;">97.00</div>
            <p style="font-size: 0.75rem; color: #aaa;">Inventory AI, Cafe Pulse, and Staff Management.</p>
            <button class="btn">Scale Business</button>
        </div>
    </div>

    <script>
        const engines = [
            { name: "Cafe Pulse", cat: "Business", price: "97", desc: "Real-time inventory and profit tracking for restaurants." },
            { name: "Free Internet", cat: "Family", price: "97", desc: "Sovereign Mesh-Net access for your whole household." },
            { name: "Hospital Node", cat: "Infrastructure", price: "Custom", desc: "Nurse-Flow and patient coordination systems." },
            { name: "AFH Manager", cat: "Care", price: "97", desc: "Adult Family Home management and compliance tools." },
            { name: "Legacy Vault", cat: "Family", price: "97", desc: "100-year encrypted storage for family history." },
            { name: "Utility Shield", cat: "Family", price: "97", desc: "Off-grid utility management and cost reduction." },
            { name: "Asset Shield", cat: "Security", price: "97", desc: "Financial encryption and wealth protection nodes." },
            { name: "Nurse Flow", cat: "Hospital", price: "Custom", desc: "Optimized shift and patient routing for healthcare." }
        ];

        function searchEngines() {
            const input = document.getElementById('engineSearch').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (input === '') {
                // Show default keys if search is empty
                location.reload();
                return;
            }

            const filtered = engines.filter(e => 
                e.name.toLowerCase().includes(input) || e.desc.toLowerCase().includes(input)
            );

            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">The Hearth is searching for "' + input + '"... Try "Cafe" or "Internet".</div>';
            } else {
                filtered.forEach(e => {
                    resultsDiv.innerHTML += `
                        <div class="engine-card">
                            <span class="tag">${e.cat}</span>
                            <h3 style="margin-top:5px;">${e.name}</h3>
                            <div class="price">${e.price}</div>
                            <p style="font-size: 0.75rem; color: #666;">${e.desc}</p>
                            <button class="btn">Learn More</button>
                        </div>
                    `;
                });
            }
        }
    </script>

</body>
</html>
