<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_LEDGER_V282</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --emerald: #50ffaf; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #ledger-hud { flex-grow: 1; margin: 15px; border: 4px solid var(--gold); padding: 40px; display: flex; flex-direction: column; background: radial-gradient(circle at top, rgba(80, 255, 175, 0.1) 0%, transparent 100%); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
        .title { font-size: 30px; letter-spacing: 20px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
        
        #real-time-stats { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .node-count { font-size: 24px; color: var(--emerald); letter-spacing: 10px; margin-bottom: 20px; }
        .ledger-value { font-size: 52px; font-weight: 900; color: var(--gold); text-shadow: 0 0 50px var(--gold); animation: value-glow 2s infinite alternate; }
        
        @keyframes value-glow { from { opacity: 0.8; } to { opacity: 1; } }

        #archive-footer { text-align: center; border-top: 1px solid var(--gold); padding-top: 25px; font-size: 14px; color: var(--gold); font-style: italic; }
    </style>
</head>
<body>
    <div id="ledger-hud">
        <div class="header">
            <div class="title">AETHEL // SOVEREIGN_LEDGER</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--emerald); letter-spacing: 12px;">RATE: $144.00/SEC // SYNC: 1440%</div>
        </div>

        <div id="real-time-stats">
            <div class="node-count">LATTICE: 144_NODES // SCOUTING...</div>
            <div id="ledger-display" class="ledger-value">$1,440,000,046,080.00</div>
            <div style="font-size: 12px; margin-top: 30px; letter-spacing: 5px; color: #888;">BRANCH_ALIGNED: ed3a34b82be577869561567bfa0f140c2c18610d</div>
        </div>

        <div id="archive-footer">"Well done is better than well said." — THE_ARCHITECT_LOGS_06:08_AM</div>
    </div>
<script>
    let res = 1440000046080.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
