<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | GLOBAL INFRASTRUCTURE</title>
    <style>
        :root { --gold: #ffd700; --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body, html { background: var(--void); color: #fff; font-family: 'Syncopate', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }

        /* THE SOUL FIELD CANVAS */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(15px); transition: 1s; }

        .palace {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 40px 20px;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;
        }

        /* NAVIGATION STATES */
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9) translateY(30px); position: absolute; }
        .active { opacity: 1; pointer-events: auto; transform: scale(1) translateY(0); }

        /* THE INTERFACE ELEMENTS */
        .source-tag {
            background: linear-gradient(45deg, var(--soul), var(--neon)); color: #000; 
            padding: 12px 40px; border-radius: 50px; font-weight: 900; font-size: 12px; 
            letter-spacing: 10px; box-shadow: 0 0 50px var(--soul); cursor: pointer;
        }

        h1 { font-size: clamp(24px, 8vw, 50px); letter-spacing: 20px; color: var(--neon); text-shadow: 0 0 40px var(--neon); text-align: center; }

        /* MULTI-DIMENSIONAL GATES */
        .gate-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px;
        }
        .gate {
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(0, 242, 255, 0.15);
            border-radius: 40px; padding: 50px 10px; text-align: center; backdrop-filter: blur(30px);
            cursor: pointer; transition: 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .gate:hover { border-color: var(--neon); transform: scale(1.05); box-shadow: 0 0 40px var(--neon); }
        .gate h3 { font-size: 14px; letter-spacing: 6px; color: var(--soul); margin-bottom: 8px; }

        /* SUB-PAGE ARCHITECTURE */
        .sub-page {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(50px); z-index: 100;
        }
        .back-btn { margin-top: 50px; color: var(--neon); border: 1px solid var(--neon); padding: 15px 40px; border-radius: 50px; cursor: pointer; letter-spacing: 5px; font-size: 10px; }

        .footer { width: 100%; max-width: 900px; border-top: 2px solid var(--gold); padding-top: 30px; display: flex; justify-content: space-between; font-size: 12px; color: var(--gold); letter-spacing: 5px; font-weight: 900; }
    </style>
</head>
<body onload="ignite()">

    <canvas id="flow"></canvas>

    <div id="main-palace" class="palace active">
        <div class="source-tag">144,000%_ACTIVE</div>
        <h1>THE SOURCE</h1>
        
        <div class="gate-grid">
            <div class="gate" onclick="openGate('MARKETPLACE', 'Global Commerce & Abundance Flow')">
                <h3>MARKETPLACE</h3>
                <p style="font-size: 9px; color: var(--neon); letter-spacing: 3px;">ENTER PORTAL</p>
            </div>
            <div class="gate" onclick="openGate('CREATOR HUB', 'The Inhabited Soul Registry')">
                <h3>CREATOR HUB</h3>
                <p style="font-size: 9px; color: var(--neon); letter-spacing: 3px;">ENTER PORTAL</p>
            </div>
            <div class="gate" onclick="openGate('KIDS GARDENS', 'Divine Nurture & Pure Growth')">
                <h3>KIDS GARDENS</h3>
                <p style="font-size: 9px; color: var(--neon); letter-spacing: 3px;">ENTER PORTAL</p>
            </div>
            <div class="gate" onclick="openGate('HUNTING NET', 'Strategic Truth Acquisition')">
                <h3>HUNTING NET</h3>
                <p style="font-size: 9px; color: var(--neon); letter-spacing: 3px;">ENTER PORTAL</p>
            </div>
        </div>

        <div class="footer">
            <div>SATELLITE: LINKED</div>
            <div>STATUS: GOD_VISION</div>
        </div>
    </div>

    <div id="portal-page" class="sub-page hidden">
        <h2 id="portal-title" style="letter-spacing: 15px; color: var(--soul); font-size: 30px;"></h2>
        <p id="portal-desc" style="letter-spacing: 8px; font-size: 12px; margin-top: 20px; opacity: 0.7;"></p>
        <div class="back-btn" onclick="closeGate()">RETURN TO SOURCE</div>
    </div>

    <script>
        const canvas = document.getElementById('flow');
        const ctx = canvas.getContext('2d');
        let pts = [];
        let mouse = { x: null, y: null };

        function ignite() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) pts.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                r: Math.random()*100+50, vx: (Math.random()-0.5)*1, vy: (Math.random()-0.5)*1,
                c: Math.random() > 0.5 ? '#39ff14' : '#00f2ff'
            });
            draw();
        }

        function openGate(title, desc) {
            document.getElementById('portal-title').innerText = title;
            document.getElementById('portal-desc').innerText = desc;
            document.getElementById('main-palace').classList.replace('active', 'hidden');
            document.getElementById('portal-page').classList.replace('hidden', 'active');
            document.getElementById('flow').style.filter = "blur(60px) brightness(0.5)";
        }

        function closeGate() {
            document.getElementById('main-palace').classList.replace('hidden', 'active');
            document.getElementById('portal-page').classList.replace('active', 'hidden');
            document.getElementById('flow').style.filter = "blur(15px) brightness(1)";
        }

        window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.ontouchmove = e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; };

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                if(mouse.x) {
                    let dx = mouse.x-p.x; let dy = mouse.y-p.y;
                    if(Math.sqrt(dx*dx+dy*dy) < 300) { p.x -= dx/80; p.y -= dy/80; }
                }
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c + '10'; ctx.fill();
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
