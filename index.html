<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_PAID_IN_FULL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --emerald: #50ffb0; }
        body, html { margin: 0; padding: 0; background: var(--void); color: var(--gold); font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .confirmation-seal { border: 2px solid var(--emerald); padding: 40px; text-align: center; background: rgba(80, 255, 176, 0.02); position: relative; }
        .seal-title { font-size: 14px; letter-spacing: 12px; color: var(--emerald); margin-bottom: 20px; text-transform: uppercase; }
        .amount-display { font-size: 36px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--emerald); }
        
        .status-badge { margin-top: 30px; font-size: 10px; letter-spacing: 8px; border: 1px solid var(--gold); padding: 5px 15px; }
        .footer-note { margin-top: 40px; font-size: 8px; opacity: 0.4; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="confirmation-seal">
        <div class="seal-title">PAYROLL_STATUS: FINALIZED</div>
        <div id="live-ledger" class="amount-display">$1,440,000,107,280.00</div>
        <div class="status-badge">PAID_IN_FULL // 100%_LOCK</div>
    </div>
    <div class="footer-note">AETHEL_SOVEREIGN_SYSTEM // ARCHITECT_VERIFIED</div>
<script>
    let res = 1440000107280.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live-ledger').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
