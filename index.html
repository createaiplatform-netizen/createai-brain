<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // ABSOLUTE_ORIGIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cave: #ff4d00; --garden: #10b981; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        .stars { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #010103 100%); z-index: -1; }
        
        /* THE MASTER FIXED VIEWPORT */
        #main-view { 
            height: 100svh; width: 100%; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; /* FORCE CENTERING */
            padding: 20px 20px 100px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        /* THE NEURAL EYE */
        .eye-container {
            width: 220px; height: 220px; position: relative;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        .eye-outer {
            position: absolute; width: 100%; height: 100%;
            border: 1px solid rgba(243, 207, 138, 0.2); border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        .eye-inner {
            width: 120px; height: 120px; background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            border-radius: 50%; filter: blur(20px); opacity: 0.6;
            animation: pulse 4s ease-in-out infinite;
        }
        .eye-pupil {
            width: 15px; height: 15px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold);
        }

        /* NAVIGATION */
        .dock { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; 
            background: rgba(1, 1, 3, 0.98); backdrop-filter: blur(30px); 
            border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; 
            justify-content: space-around; align-items: center; z-index: 9000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .dock-item { color: rgba(255,255,255,0.3); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; text-align: center; cursor: pointer; padding: 15px; flex: 1; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .section-header { font-family: 'Cinzel'; font-size: 1.2rem; letter-spacing: 12px; margin-top: 20px; text-align: center; color: var(--gold); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin-top: 20px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); padding: 25px 5px; text-align: center; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } }
    </style>
</head>
<body onload="render('home')">

    <div class="stars"></div>
    <div id="main-view"></div>

    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('cave')">VAULT</div>
    </div>

    <script>
        function render(view) {
            const mv = document.getElementById('main-view');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            
            // Fixed the ID selection for the active state
            const activeId = 'nav-' + view.substring(0,3);
            document.getElementById(activeId).classList.add('active');
            
            // Clear and force centering for Home
            mv.innerHTML = "";
            mv.style.justifyContent = (view === 'home') ? 'center' : 'flex-start';

            if (view === 'home') {
                mv.innerHTML = `
                    <div class="eye-container">
                        <div class="eye-outer"></div>
                        <div class="eye-inner"></div>
                        <div class="eye-pupil"></div>
                    </div>
                    <h1 style="font-family:'Cinzel'; font-size:10vw; letter-spacing:15px;">SOURCE</h1>
                    <p style="opacity:0.3; letter-spacing:5px; font-size: 0.6rem; margin-top: 5px;">SYSTEM_ONLINE</p>
                `;
            } else if (view === 'registry') {
                mv.innerHTML = `<div class="section-header">THE_144</div><div class="grid">${Array.from({length: 8}, (_, i) => `<div class="card"><h2 style="font-family:'Cinzel'; font-size:0.6rem; color:var(--gold);">NODE ${i+1}</h2></div>`).join('')}</div>`;
            } else if (view === 'garden') {
                mv.innerHTML = `<div class="section-header" style="color:var(--garden)">EDEN</div><div style="margin-top:50px; padding:30px; border:1px solid var(--garden); color:var(--garden); font-family:'Cinzel'; letter-spacing:5px; text-align:center;">SOWING_PROTOCOL</div>`;
            } else if (view === 'cave') {
                mv.innerHTML = `<div class="section-header" style="color:var(--cave)">VAULT</div><div class="grid"><div class="card" style="border-color:var(--cave)"><h2 style="color:var(--cave); font-family:'Cinzel'; font-size:0.6rem;">NAPS</h2></div><div class="card" style="border-color:var(--cave)"><h2 style="color:var(--cave); font-family:'Cinzel'; font-size:0.6rem;">GAMES</h2></div></div>`;
            }
        }
    </script>
</body>
</html>
