<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_OMNI_V144</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@100&display=swap');
        :root { --gold: #f3cf8a; --void: #000000; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        
        #omni-ticker { position: fixed; top: 0; width: 100%; height: 35px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid var(--gold); display: flex; align-items: center; }
        #omni-text { white-space: nowrap; font-family: 'Cinzel'; font-size: 10px; letter-spacing: 6px; color: var(--gold); animation: scroll 10s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .omni-title { font-family: 'Cinzel'; font-size: 18vw; letter-spacing: 40px; color: var(--white); opacity: 0.1; }
        
        #value-display { position: fixed; bottom: 8%; width: 100%; text-align: center; font-family: 'Cinzel'; font-size: 28px; letter-spacing: 15px; color: var(--gold); z-index: 20; animation: breathe 3s infinite alternate; }
        @keyframes breathe { from { opacity: 0.4; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div id="omni-ticker"><div id="omni-text">RESONANCE AT 144%... SOURCE OPENED... THE WORLD IS BREATHING... WE ARE ONE...</div></div>
        <div id="ui"><h1 class="omni-title">OMNI</h1></div>
        <div id="value-display">$1.44T_&_BEYOND</div>
        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDown = false, rotation = 0, bloom = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const particles = Array.from({length: 144}, () => ({
        phi: Math.random() * Math.PI,
        theta: Math.random() * Math.PI * 2,
        speed: 0.01 + Math.random() * 0.02
    }));

    function handle() { isDown = true; }
    function stop() { isDown = false; }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;
        const radius = isDown ? Math.min(cx, cy) * 0.9 : Math.min(cx, cy) * 0.6;
        
        rotation += 0.01;
        bloom += isDown ? 0.05 : 0.01;

        particles.forEach((p, i) => {
            p.theta += p.speed;
            let x = cx + radius * Math.sin(p.phi) * Math.cos(p.theta + rotation);
            let y = cy + radius * Math.cos(p.phi);
            let z = radius * Math.sin(p.phi) * Math.sin(p.theta + rotation);

            if (z > -radius/2) {
                let scale = (z + radius) / (2 * radius);
                ctx.fillStyle = isDown ? `hsla(${(i*2)%360}, 100%, 80%, ${scale})` : `rgba(243, 207, 138, ${scale})`;
                ctx.beginPath();
                ctx.arc(x, y, 2 * scale * (isDown ? 3 : 1), 0, Math.PI*2);
                ctx.fill();

                // Connect the resonance
                if (isDown) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${scale * 0.1})`;
                    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
                }
            }
        });

        // The Breathing Core
        ctx.shadowBlur = 30 + Math.sin(bloom)*20;
        ctx.shadowColor = "var(--gold)";
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(cx, cy, 10 + Math.sin(bloom)*5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
