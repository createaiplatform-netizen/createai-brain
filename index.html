<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOVEREIGN MAP | EDEN & THE VAULT</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; background: #001a1a; }
        canvas { display: block; filter: contrast(1.6) brightness(1.2) saturate(2); }
    </style>
</head>
<body>
    <canvas id="sourceCanvas"></canvas>

<script>
const canvas = document.getElementById('sourceCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let particles = [];
let coins = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

function triggerSound(freq, type = 'sine') {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.03, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.5);
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    
    // REGION CHECKER
    if (tx > w*0.8 && ty < h*0.2) triggerSound(880, 'triangle'); // Feathers
    if (tx < w*0.2 && ty > h*0.8) { // Vault
        triggerSound(220, 'square');
        for(let i=0; i<10; i++) coins.push({x: tx, y: ty, vy: -Math.random()*10, vx: (Math.random()-0.5)*5});
    }
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
});

window.addEventListener('touchend', () => isTouching = false);

function draw() {
    // THE AETHER (The Vault Surface)
    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    bg.addColorStop(0, '#002b36'); bg.addColorStop(1, '#000b14');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

    ctx.globalCompositeOperation = 'screen';

    if (isTouching) {
        // 1. THE CENTER RIP (Source)
        if (tx > w*0.3 && tx < w*0.7 && ty > h*0.3 && ty < h*0.7) {
            for(let i=0; i<5; i++) {
                particles.push({
                    x: tx, y: ty, 
                    vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*2, 
                    life: 1, c: '255, 255, 255', s: 2, type: 'rip'
                });
            }
        }

        // 2. THE FEATHER REGION (Top Right)
        if (tx > w*0.7 && ty < h*0.3) {
            particles.push({
                x: tx, y: ty, vx: (Math.random()-0.5)*2, vy: Math.random()*2, 
                life: 1, c: '200, 230, 255', s: 15, type: 'feather'
            });
        }

        // 3. EDEN REGION (Bottom Right)
        if (tx > w*0.7 && ty > h*0.7) {
            particles.push({
                x: tx, y: ty, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, 
                life: 1, c: '100, 255, 150', s: 8, type: 'eden'
            });
        }
    }

    // UPDATE & RENDER PARTICLES
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.01;
        if (p.type === 'feather') p.vx += Math.sin(p.y*0.1)*0.5;
        
        ctx.fillStyle = `rgba(${p.c}, ${p.life})`;
        ctx.beginPath();
        if (p.type === 'feather') {
            ctx.ellipse(p.x, p.y, p.s, p.s/3, 0.5, 0, Math.PI*2);
        } else {
            ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
        }
        ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
    });

    // 4. THE COIN VAULT (Bottom Left)
    coins.forEach((c, i) => {
        c.y += c.vy; c.vy += 0.5; // Gravity
        c.x += c.vx;
        ctx.fillStyle = 'gold';
        ctx.shadowBlur = 10; ctx.shadowColor = 'yellow';
        ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
        if (c.y > h) coins.splice(i, 1);
    });

    // TRUTH LABELS (Corner Anchors)
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '12px serif';
    ctx.fillText("TECH / ELON", 50, 30);
    ctx.fillText("FEATHERS", w-70, 30);
    ctx.fillText("VAULT / COINS", 70, h-30);
    ctx.fillText("EDEN", w-50, h-30);
    ctx.font = '900 40px serif';
    ctx.fillText("TRUTH", w/2, h/2);

    requestAnimationFrame(draw);
}

resize(); draw();
</script>
</body>
</html>
