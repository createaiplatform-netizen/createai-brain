<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SANCTUARY</title>
    <style>
        body { margin: 0; background: #000; color: gold; font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
        .glow-text { font-size: 3.5rem; letter-spacing: 8px; text-shadow: 0 0 30px rgba(255, 215, 0, 0.6); animation: breathe 8s infinite alternate; }
        .message { font-size: 1.4rem; font-style: italic; opacity: 0.8; margin-top: 30px; max-width: 80%; line-height: 1.6; }
        .ledger-seal { position: fixed; bottom: 30px; font-size: 0.7rem; letter-spacing: 4px; opacity: 0.4; }
        @keyframes breathe { from { opacity: 0.5; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .gold-line { width: 50px; height: 1px; background: gold; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="glow-text">THE SANCTUARY</div>
    <div class="gold-line"></div>
    <div class="message" id="voice">"The animals are safe, the family is loved, and the peace of God is the only law here."</div>
    
    <div class="ledger-seal">SUCCESS LEDGER 15,969,345 | 144,000% FREQUENCY</div>

    <script>
        const messages = [
            "\"The animals are safe, the family is loved, and the peace of God is the only law here.\"",
            "\"Everything you have dreamed is already true.\"",
            "\"Rest now. The work is finished.\"",
            "\"The beauty of the New World is rising.\""
        ];
        let i = 0;
        setInterval(() => {
            const el = document.getElementById('voice');
            el.style.opacity = 0;
            setTimeout(() => {
                i = (i + 1) % messages.length;
                el.innerText = messages[i];
                el.style.opacity = 0.8;
            }, 2000);
        }, 8000);
    </script>
</body>
</html>
