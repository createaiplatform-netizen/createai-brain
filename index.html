<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE HEARTH | DEPARTMENT ACCESS</title>
    <style>
        :root { --gold: #c4a97a; --bg: #f8f8f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #333; transition: 0.5s; }

        header { background: #fff; padding: 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .omni-search { background: #f1f1f1; border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; }
        .omni-search input { flex: 1; border: none; background: transparent; outline: none; }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .section-title { font-size: 0.7rem; letter-spacing: 3px; font-weight: bold; color: var(--gold); text-transform: uppercase; margin: 30px 0 15px; }

        /* THE TILES */
        .dept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .dept-card {
            background: #fff; border-radius: 20px; padding: 30px 10px;
            text-align: center; border: 1px solid #eee; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .dept-icon { font-size: 2rem; margin-bottom: 10px; display: block; }

        /* THE HIDDEN SHELF (Inside the Department) */
        #shelf-view { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .shelf-item {
            background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px;
            border-left: 5px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .back-btn { background: none; border: none; color: var(--gold); font-weight: bold; font-size: 0.7rem; letter-spacing: 2px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="omni-search"><input type="text" placeholder="Search 158 Engines..."></div>
    </header>

    <div class="container">
        
        <div id="mall-view">
            <div class="section-title">Departments</div>
            <div class="dept-grid">
                <div class="dept-card" onclick="openShelf('Healthcare', ['Nurse Flow System', 'AFH Manager', 'Private Health Vault'])">
                    <span class="dept-icon">🏥</span>
                    <div style="font-weight:bold; font-size:0.8rem;">Healthcare</div>
                </div>
                <div class="dept-card" onclick="openShelf('Utilities', ['Mesh-Internet Node', 'Off-Grid Power Sync', 'Water Sovereignty'])">
                    <span class="dept-icon">📡</span>
                    <div style="font-weight:bold; font-size:0.8rem;">Utilities</div>
                </div>
                <div class="dept-card" onclick="openShelf('Hospitality', ['Cafe Pulse AI', 'Restaurant Inventory', 'Staff Scheduler'])">
                    <span class="dept-icon">☕</span>
                    <div style="font-weight:bold; font-size:0.8rem;">Hospitality</div>
                </div>
                <div class="dept-card" onclick="openShelf('Legal', ['Standing Law Docs', 'Asset Protection', 'Trust Builder'])">
                    <span class="dept-icon">⚖️</span>
                    <div style="font-weight:bold; font-size:0.8rem;">Legal</div>
                </div>
            </div>
        </div>

        <div id="shelf-view">
            <button class="back-btn" onclick="closeShelf()">← BACK TO MALL</button>
            <h2 id="shelf-title" style="margin-bottom: 20px; font-weight: 200;"></h2>
            <div id="shelf-contents"></div>
        </div>

    </div>

    <script>
        function openShelf(title, items) {
            document.getElementById('mall-view').style.display = 'none';
            document.getElementById('shelf-view').style.display = 'block';
            document.getElementById('shelf-title').innerText = title;
            
            let html = '';
            items.forEach(item => {
                html += `
                    <div class="shelf-item">
                        <div style="font-weight:bold; font-size:0.9rem;">${item}</div>
                        <div style="font-size:0.7rem; color:#888; margin-top:5px;">Sovereign Infrastructure Engine</div>
                        <button style="margin-top:10px; background:var(--gold); color:#fff; border:none; padding:8px 15px; border-radius:10px; font-size:0.6rem; font-weight:bold;">ADD TO HEARTH</button>
                    </div>
                `;
            });
            document.getElementById('shelf-contents').innerHTML = html;
        }

        function closeShelf() {
            document.getElementById('mall-view').style.display = 'block';
            document.getElementById('shelf-view').style.display = 'none';
        }
    </script>

</body>
</html>
