<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Link</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 100px 20px; }
        .terminal { border: 2px solid #0f0; padding: 30px; display: inline-block; border-radius: 15px; box-shadow: 0 0 25px #0f0; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 12px; font-size: 1.4em;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h2>FINAL SYSTEM PUSH</h2>
        <p>ALLOCATION: $5,000.00 USDC</p>
        <button id="directBtn">LINK TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('directBtn').onclick = async () => {
            if (window.ethereum) {
                try {
                    // This forces the wallet to acknowledge the site immediately
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // This forces the 'Add Asset' pop-up for the $5,000.00
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                } catch (e) {
                    // If it hangs, we force a refresh to clear the wallet's memory
                    window.location.reload();
                }
            } else {
                alert("Open this inside the Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
