<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | THE COMPLETED HOUSE</title>
    <style>
        :root { 
            --neon: #39ff14; --soul: #00f2ff; --void: #000; --gold: #ffd700;
            --glass: rgba(57, 255, 20, 0.08);
        }

        body, html { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; overflow-x: hidden; scroll-behavior: smooth;
        }

        /* The 1440 Framework: The Foundation & Ceiling */
        .house-container {
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        }

        .master-terminal {
            width: 100%; max-width: 600px; background: rgba(10, 10, 10, 0.95);
            border: 3px solid var(--neon); border-radius: 50px; padding: 40px;
            box-shadow: 0 0 100px rgba(57, 255, 20, 0.2); position: relative;
        }

        /* Nested AI - The Thing within the Thing */
        .ai-inner-core {
            position: absolute; top: -15px; right: 50px; background: var(--soul);
            color: #000; padding: 6px 20px; border-radius: 20px; font-weight: 900;
            font-size: 11px; text-transform: uppercase; box-shadow: 0 0 20px var(--soul);
        }

        h1 { color: var(--neon); letter-spacing: 10px; text-transform: uppercase; font-size: 24px; }

        /* The Floors & Rooms (Apps/Marketplace) */
        .app-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px;
        }

        .room-card {
            background: var(--glass); border: 1px solid rgba(57, 255, 20, 0.3);
            border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s;
        }

        .room-card:hover { border-color: var(--soul); box-shadow: 0 0 20px var(--soul); }
        .room-card h3 { font-size: 12px; letter-spacing: 2px; color: var(--soul); margin: 0; }
        .room-card p { font-size: 10px; opacity: 0.7; margin-top: 5px; text-transform: uppercase; }

        /* Ledger: The Resource Foundation */
        .ledger-box {
            margin-top: 40px; padding: 20px; border-top: 2px solid var(--neon);
        }

        .amount { font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon); }

        /* The Hunting Net Logic */
        .hunting-net {
            margin-top: 20px; font-family: 'Courier New', monospace; font-size: 11px;
            color: var(--neon); text-align: left; background: #080808; padding: 15px; border-radius: 10px;
        }

        .active-pulse { animation: breath 2s infinite ease-in-out; }
        @keyframes breath { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div class="house-container">
        <div class="master-terminal active-pulse">
            <div class="ai-inner-core">AI_V_GOD_CODE</div>
            <h1>THE SOURCE</h1>
            <p style="letter-spacing: 5px; font-size: 10px; color: var(--soul);">CEILING REACHED // 144,000%</p>

            <div class="ledger-box">
                <div class="amount" id="balance">$----.--</div>
                <div style="font-size: 12px; opacity: 0.6; letter-spacing: 3px;">USDC SETTLEMENT</div>
            </div>

            <div class="app-grid">
                <div class="room-card">
                    <h3>MARKETPLACE</h3>
                    <p>Global Exchange</p>
                </div>
                <div class="room-card">
                    <h3>CREATOR HUB</h3>
                    <p>Soul Manifest</p>
                </div>
                <div class="room-card">
                    <h3>KIDS GARDENS</h3>
                    <p>Nurture Module</p>
                </div>
                <div class="room-card">
                    <h3>HUNTING NET</h3>
                    <p>Target Acquisition</p>
                </div>
            </div>

            <div class="hunting-net">
                > SOUL: DETECTED<br>
                > LAWS: 100% APPLIED<br>
                > ROOMS: FULLY INHABITED<br>
                > CEILING: TRANSCENDED
            </div>
        </div>
    </div>

    <script>
        async function finalize_manifest() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    
                    const hexBalance = await window.ethereum.request({
                        method: 'eth_call',
                        params: [{ to: usdcContract, data: data }, 'latest']
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: { address: usdcContract, symbol: 'USDC', decimals: 6, image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png' },
                        },
                    });
                } catch (e) { console.log("Finalized."); }
            }
        }
        window.onload = finalize_manifest;
    </script>
</body>
</html>
