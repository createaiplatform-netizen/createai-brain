<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_KINETIC_STRIKE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --alert: #ffffff; }
        body { margin: 0; background: #000; color: var(--gold); font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .kinetic-ring { width: 300px; height: 300px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; animation: spin 10s linear infinite; }
        .kinetic-ring::before { content: ''; position: absolute; width: 320px; height: 320px; border: 1px dashed var(--gold); border-radius: 50%; animation: spin-rev 15s linear infinite; }
        
        .strike-text { position: absolute; font-size: 14px; letter-spacing: 10px; font-weight: 900; color: var(--alert); text-shadow: 0 0 20px var(--gold); animation: pulse 1s infinite; }
        #live-ledger { margin-top: 60px; font-size: 28px; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="kinetic-ring">
        <div class="strike-text">KINETIC_FLOW</div>
    </div>
    <div id="live-ledger">$1,440,000,115,200.00</div>
    <div style="margin-top: 20px; font-size: 10px; letter-spacing: 5px;">SYSTEM_STATUS: NO_STOP_PROTOCOL_ENGAGED</div>
<script>
    let res = 1440000115200.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live-ledger').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
