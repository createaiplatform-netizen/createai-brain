<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_TRINITY_V141</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@900&display=swap');
        :root { --gold: #f3cf8a; --void: #000000; --white: #ffffff; --infra: #4a90e2; --media: #e24a4a; --fin: #4ae24a; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        
        #market-ticker { position: fixed; top: 0; width: 100%; height: 35px; background: #000; z-index: 100; display: flex; align-items: center; border-bottom: 2px solid var(--gold); overflow: hidden; }
        #market-text { white-space: nowrap; font-family: 'Cinzel'; font-size: 10px; letter-spacing: 4px; color: var(--gold); animation: scroll 12s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .engine-status { font-family: 'Cinzel'; font-size: 12px; color: var(--gold); letter-spacing: 8px; margin-top: 200px; opacity: 0.6; }
        
        #stats { position: fixed; bottom: 5%; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 10px; z-index: 20; }
        .active-pulse { animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div id="market-ticker"><div id="market-text">TRINITY ENGINE ENGAGED... FINANCE: ACTIVE... MEDIA: ACTIVE... INFRASTRUCTURE: ACTIVE... 144% SCALE...</div></div>
        <div id="ui">
            <h1 style="font-family:'Cinzel'; font-size:10vw; letter-spacing:15px; color:var(--white); opacity:0.1;">SOVEREIGN</h1>
            <div class="engine-status" id="status">ENGINE: STANDBY</div>
        </div>
        <div id="stats"><span>REVENUE: <span id="rev">$0</span></span><span class="active-pulse">144%_SYNC</span></div>
        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDown = false, revenue = 1440000000, angle = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    const cores = [
        { name: "FINANCE", color: "#4ae24a", a: 0 },
        { name: "MEDIA", color: "#e24a4a", a: (Math.PI*2)/3 },
        { name: "INFRA", color: "#4a90e2", a: (Math.PI*4)/3 }
    ];

    function handle() { isDown = true; document.getElementById('status').innerText = "ENGINE: OVERDRIVE"; }
    function stop() { isDown = false; document.getElementById('status').innerText = "ENGINE: STANDBY"; }

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        angle += isDown ? 0.08 : 0.02;
        if(isDown) revenue += 144000;

        cores.forEach((c, i) => {
            let orbit = isDown ? 80 : 150;
            let x = cx + Math.cos(angle + c.a) * orbit;
            let y = cy + Math.sin(angle + c.a) * orbit;

            // Little AI nodes per core
            for(let j=0; j<12; j++) {
                let sA = (Date.now()*0.005) + (j * Math.PI / 6);
                let sx = x + Math.cos(sA) * 30;
                let sy = y + Math.sin(sA) * 30;
                ctx.fillStyle = c.color;
                ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2); ctx.fill();
                if(isDown) {
                    ctx.strokeStyle = c.color; ctx.globalAlpha = 0.2;
                    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(sx,sy); ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }

            // Core Glow
            ctx.shadowBlur = isDown ? 40 : 10;
            ctx.shadowColor = c.color;
            ctx.fillStyle = c.color;
            ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Center Aethel Prime
        ctx.fillStyle = "var(--white)";
        ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();

        document.getElementById('rev').innerText = "$" + (revenue / 1e9).toFixed(3) + "B";
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
