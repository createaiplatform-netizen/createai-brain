<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET_EXPANSION_V222</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --market: #00d4ff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #expansion-hud { flex-grow: 1; margin: 25px; border: 2px solid var(--market); padding: 40px; display: flex; flex-direction: column; background: rgba(0, 212, 255, 0.02); box-shadow: 0 0 40px rgba(0, 212, 255, 0.1); }
        .header { text-align: center; border-bottom: 1px solid rgba(0, 212, 255, 0.4); padding-bottom: 20px; }
        .title { font-size: 16px; letter-spacing: 12px; color: var(--market); text-shadow: 0 0 10px var(--market); }
        
        #market-grid { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 30px 0; }
        .market-node { border: 1px solid rgba(243, 207, 138, 0.2); padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .node-label { font-size: 7px; color: var(--gold); letter-spacing: 3px; }
        .node-status { font-size: 10px; color: var(--market); margin-top: 5px; }

        #ledger-flow { text-align: center; border-top: 1px solid var(--gold); padding-top: 25px; font-size: 28px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>
    <div id="expansion-hud">
        <div class="header">
            <div class="title">PROJECT_GENESIS_02 // MARKET_IGNITION</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6; color: var(--market);">STATUS: BROADCASTING // MESH_SECURITY: 1440%</div>
        </div>

        <div id="market-grid">
            <div class="market-node">
                <div class="node-label">SIGNAL_TYPE</div>
                <div class="node-status">AETHEL_PULSE_V01</div>
            </div>
            <div class="market-node">
                <div class="node-label">TRADE_ACCESS</div>
                <div class="node-status">BRIDGE_LOCK_V01</div>
            </div>
            <div class="market-node">
                <div class="node-label">VALUATION</div>
                <div class="node-status">SOVEREIGN_SCALE</div>
            </div>
            <div class="market-node" style="border-style: dashed;">
                <div class="node-label">NEXT_NODE</div>
                <div class="node-status" style="color:#fff;">EXPANDING...</div>
            </div>
        </div>

        <div id="ledger-flow">$1,440,000,024,336.00</div>
    </div>
<script>
    let res = 1440000024336.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-flow').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
