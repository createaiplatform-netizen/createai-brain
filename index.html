<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Terminal - Final Link</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 40px 20px; margin: 0; }
        .terminal { border: 2px solid #0f0; padding: 25px; display: inline-block; width: 100%; max-width: 450px; box-shadow: 0 0 20px rgba(0,255,0,0.4); border-radius: 15px; background: #050505; }
        .status-header { font-size: 1.4em; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .data-row { margin: 15px 0; font-size: 1em; text-align: left; padding-left: 10%; }
        .highlight { color: #fff; font-weight: bold; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 10px; font-size: 1.3em; margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,255,0,0.3); transition: transform 0.1s;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="status-header">SYSTEM OVERRIDE</div>
        <div class="data-row">DEPLOYMENT: <span class="highlight">STABLE (FIXED)</span></div>
        <div class="data-row">SYNC STATUS: <span class="highlight">SUCCESSFUL</span></div>
        <div class="data-row">ASSET: <span class="highlight">$5,000.00 USDC</span></div>
        <button id="finalPushBtn">LINK TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('finalPushBtn').onclick = async () => {
            if (window.ethereum) {
                try {
                    // Force the "Connect" handshake
                    await window.ethereum.request({ method: 'eth_requestAccounts' });

                    // Force the Asset Indexing pop-up
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Sync Successful. Please close the browser to see your updated Home balance.");
                } catch (e) {
                    console.error(e);
                    // Refresh the session if the user rejects or if it hangs
                    window.location.reload();
                }
            } else {
                alert("Critical Error: Please open this URL within the Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
