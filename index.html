<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // SOVEREIGN_FIT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cave: #ff4d00; --garden: #10b981; }
        
        /* THE FOUNDATION: FORCE THE FIT */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { 
            height: 100%; 
            width: 100vw; 
            overflow: hidden; /* Prevents the whole body from bouncing */
            background: var(--void);
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .stars { position: fixed; inset: 0; background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #0d0d26 0%, #010103 100%); z-index: -1; }
        .singularity { position: fixed; top: var(--y, 50%); left: var(--x, 50%); transform: translate(-50%, -50%); width: 100vw; height: 100vw; background: var(--gold); border-radius: 50%; filter: blur(150px); opacity: 0.05; z-index: -1; transition: 0.8s; }

        /* THE CONTAINER: ADAPTIVE HEIGHT */
        #main-view { 
            height: 100svh; /* Uses dynamic height to fit mobile screens perfectly */
            width: 100%;
            padding: 40px 20px 120px; /* Extra bottom padding for the dock */
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NAVIGATION DOCK: MOBILE OPTIMIZED */
        .dock { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 90px; 
            background: rgba(1, 1, 3, 0.9); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 9000;
            padding-bottom: env(safe-area-inset-bottom); /* Fixes iPhone home bar overlap */
        }
        .dock-item { color: rgba(255,255,255,0.3); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; text-align: center; cursor: pointer; padding: 10px; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* FLUID ELEMENTS */
        .section-header { font-family: 'Cinzel'; font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 30px; text-align: center; width: 100%; }
        .responsive-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            width: 100%; 
            max-width: 500px;
        }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px 15px; text-align: center; transition: 0.3s; }
        .card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.08); }
        .card h2 { font-family: 'Cinzel'; font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; }

        .cta { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 20px; width: 100%; font-family: 'Cinzel'; letter-spacing: 5px; margin-top: 20px; text-transform: uppercase; }

    </style>
</head>
<body onload="render('home')">

    <div class="stars"></div>
    <div class="singularity" id="core"></div>
    <div id="main-view"></div>

    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('cave')">VAULT</div>
    </div>

    <script>
        function render(view) {
            const mv = document.getElementById('main-view');
            const core = document.getElementById('core');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + (view.substring(0,3))).classList.add('active');
            
            mv.scrollTop = 0;

            if (view === 'home') {
                core.style.background = 'var(--gold)';
                mv.innerHTML = `
                    <div style="text-align:center; margin: auto 0;">
                        <h1 style="font-family:'Cinzel'; font-size:12vw; letter-spacing:15px; margin:0;">SOURCE</h1>
                        <p style="opacity:0.3; letter-spacing:5px; font-size: 0.7rem; margin-top: 10px;">WORLD SOVEREIGNTY SYSTEM</p>
                    </div>
                `;
            } else if (view === 'registry') {
                core.style.background = 'var(--gold)';
                mv.innerHTML = `
                    <div class="section-header">THE_144</div>
                    <div class="responsive-grid">
                        ${Array.from({length: 12}, (_, i) => `<div class="card"><h2>NODE ${i+1}</h2></div>`).join('')}
                    </div>
                `;
            } else if (view === 'garden') {
                core.style.background = 'var(--garden)';
                mv.innerHTML = `
                    <div class="section-header" style="color:var(--garden)">EDEN</div>
                    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; width: 100%;">
                        <div style="padding: 40px; border: 1px solid var(--garden); text-align: center; color: var(--garden); font-family: 'Cinzel'; letter-spacing: 4px;">SOW THE FUTURE</div>
                        <button class="cta" style="border-color:var(--garden); color:var(--garden); margin-top: 20px;">PLANT SEED</button>
                    </div>
                `;
            } else if (view === 'cave') {
                core.style.background = 'var(--cave)';
                mv.innerHTML = `
                    <div class="section-header" style="color:var(--cave)">VAULT</div>
                    <div class="responsive-grid">
                        <div class="card" style="border-color:var(--cave)"><h2 style="color:var(--cave)">HOT NAPS</h2></div>
                        <div class="card" style="border-color:var(--cave)"><h2 style="color:var(--cave)">DUCK HUNT</h2></div>
                        <div class="card" style="border-color:var(--cave)"><h2 style="color:var(--cave)">ARMORY</h2></div>
                        <div class="card" style="border-color:var(--cave)"><h2 style="color:var(--cave)">MARKET</h2></div>
                    </div>
                `;
            }
        }

        document.body.addEventListener('pointermove', (e) => {
            document.body.style.setProperty('--x', (e.clientX / window.innerWidth) * 100 + '%');
            document.body.style.setProperty('--y', (e.clientY / window.innerHeight) * 100 + '%');
        });
    </script>
</body>
</html>
