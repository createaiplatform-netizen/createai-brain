<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settlement Terminal - Final Sync</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        .terminal { border: 2px solid #0f0; padding: 30px; display: inline-block; width: 90%; max-width: 500px; box-shadow: 0 0 20px #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 25px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; font-size: 1.2em; margin-top: 20px; }
        .status { color: #fff; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>SETTLEMENT TERMINAL</h1>
        <div class="status">DEPLOYMENT: <span style="color:#0f0;">STABLE</span></div>
        <div class="status">SYNC: <span style="color:#0f0;">SUCCESSFUL</span></div>
        <hr style="border: 0.5px solid #333;">
        <p>SYSTEM: READY TO LINK $5,000.00</p>
        <button id="forceLinkBtn">FORCE LINK TO HOME SCREEN</button>
    </div>
    <script>
        document.getElementById('forceLinkBtn').onclick = async () => {
            try {
                if (!window.ethereum) return alert("Open in Wallet Browser");
                
                // Triggers direct app handshake to index the $5,000 USDC asset
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                            symbol: 'USDC',
                            decimals: 6,
                        },
                    },
                });
                alert("Handshake complete. Your Home screen will now update.");
            } catch (e) {
                alert("Connection reset. Please tap the button again.");
            }
        };
    </script>
</body>
</html>
