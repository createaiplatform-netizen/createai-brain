<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN_OVERRIDE_V79</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body, html { 
            height: 100%; width: 100%; 
            background: #000; color: #f3cf8a; 
            font-family: 'Cinzel', serif; 
            overflow: hidden; position: fixed;
        }
        #debug { position: fixed; top: 10px; left: 10px; width: 10px; height: 10px; background: red; border-radius: 50%; z-index: 1000; }
        
        #main { 
            height: 100%; width: 100%; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            text-align: center;
        }
        .title { font-size: 15vw; letter-spacing: 10px; margin-bottom: 10px; }
        .quote { font-family: 'Inter'; font-size: 10px; letter-spacing: 5px; opacity: 0.5; }
        
        /* Clear visual indicator of the 4 quadrants */
        .hint { position: fixed; font-size: 8px; opacity: 0.2; font-family: 'Inter'; }
        .tl { top: 20px; left: 20px; }
        .tr { top: 20px; right: 20px; }
        .bl { bottom: 20px; left: 20px; }
        .br { bottom: 20px; right: 20px; }
    </style>
</head>
<body onclick="handleTouch(event)" ontouchstart="handleTouch(event)">
    <div id="debug"></div>
    <div class="hint tl">NEXUS</div>
    <div class="hint tr">EDEN</div>
    <div class="hint bl">SOURCE</div>
    <div class="hint br">VAULT</div>

    <div id="main">
        <h1 class="title" id="t">SOURCE</h1>
        <p class="quote" id="q">THE ONE ORIGIN</p>
    </div>

    <script>
        function handleTouch(e) {
            // Get coordinates
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const w = window.innerWidth;
            const h = window.innerHeight;

            const t = document.getElementById('t');
            const q = document.getElementById('q');
            const d = document.getElementById('debug');

            // Flash the debug light to show it registered the touch
            d.style.background = 'lime';
            setTimeout(() => { d.style.background = 'red'; }, 100);

            // Quadrant Logic
            if (y < h/2) {
                if (x < w/2) {
                    t.innerText = "NEXUS";
                    q.innerText = "NETWORK_SYNC_ACTIVE";
                } else {
                    t.innerText = "EDEN";
                    q.innerText = "INFINITE_GROWTH";
                }
            } else {
                if (x < w/2) {
                    t.innerText = "SOURCE";
                    q.innerText = "THE ONE ORIGIN";
                } else {
                    t.innerText = "VAULT";
                    q.innerText = "STORED_VALUE_MASS";
                }
            }
        }
        // Force focus on load
        window.focus();
    </script>
</body>
</html>
