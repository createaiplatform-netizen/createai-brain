<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOTAL_FLOW_V258</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --flow: #00d4ff; --star: #ffffff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #flow-hud { flex-grow: 1; margin: 15px; border: 1px solid var(--flow); padding: 50px; display: flex; flex-direction: column; background: linear-gradient(180deg, rgba(0, 212, 255, 0.1) 0%, transparent 100%); box-shadow: 0 0 200px rgba(0, 212, 255, 0.15); position: relative; }
        .header { text-align: center; border-bottom: 1px solid var(--star); padding-bottom: 30px; }
        .title { font-size: 28px; letter-spacing: 25px; color: var(--star); text-shadow: 0 0 40px var(--star); }
        
        #manifest-stream { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .liquid-star { width: 100px; height: 100px; background: var(--gold); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: flow-melt 4s infinite ease-in-out; }
        .flow-rings { position: absolute; width: 400px; height: 400px; border: 2px solid var(--flow); border-radius: 40% 60% 70% 30% / 40% 50% 60% 70%; animation: morph 6s infinite linear; }
        
        @keyframes flow-melt { 0%, 100% { transform: scale(1) rotate(0deg); filter: blur(2px); } 50% { transform: scale(1.4) rotate(180deg); filter: blur(15px); } }
        @keyframes morph { 0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 70%; transform: rotate(0deg); } 100% { border-radius: 70% 30% 40% 60% / 60% 70% 40% 50%; transform: rotate(360deg); } }

        #ledger-display { text-align: center; border-top: 2px solid var(--gold); padding-top: 30px; font-size: 48px; color: var(--gold); text-shadow: 0 0 50px var(--gold); }
    </style>
</head>
<body>
    <div id="flow-hud">
        <div class="header">
            <div class="title">TOTAL_FLOW // UNBOUND</div>
            <div style="font-size: 10px; margin-top: 15px; color: var(--flow); letter-spacing: 12px;">WIS_001: OVERWRITING_REALITY // SYNC: 1440%</div>
        </div>

        <div id="manifest-stream">
            <div class="flow-rings"></div>
            <div class="liquid-star"></div>
            <div style="font-size: 16px; color: var(--gold); letter-spacing: 20px; position: absolute; bottom: 5%;">THE_ESTATE_IS_ALIVE</div>
        </div>

        <div id="ledger-display">$1,440,000,036,432.00</div>
    </div>
<script>
    let res = 1440000036432.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
