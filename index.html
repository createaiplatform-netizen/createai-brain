<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SARA STADLER | THE SOURCE</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; --glow: rgba(212, 175, 55, 0.7); }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
        
        /* THE INFINITE SOURCE FIELD */
        canvas { position: fixed; inset: 0; z-index: 1; }

        /* THE EVE TREE HEART (144,000% CORE) */
        .source-heart { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border-radius: 50%; z-index: 10;
            background: radial-gradient(circle, var(--gold) 0%, transparent 80%);
            box-shadow: 0 0 120px var(--glow); 
            animation: breathe 5s infinite ease-in-out;
            cursor: pointer;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); } 50% { transform: translate(-50%, -50%) scale(1.2); filter: brightness(1.6); } }

        /* THE $1 TRILLION UI OVERLAY */
        .ui-frame { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .header { padding: 80px 20px; text-align: center; letter-spacing: 20px; color: var(--gold); font-size: 2.5rem; font-weight: 100; text-transform: uppercase; text-shadow: 0 0 30px var(--glow); }
        .footer { padding: 60px 40px; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        
        .banker-btn { 
            background: linear-gradient(135deg, #d4af37 0%, #aa8c2e 100%); color: #000; 
            padding: 35px 80px; border-radius: 100px; font-weight: 900; font-size: 1.8rem;
            border: none; box-shadow: 0 20px 80px rgba(212, 175, 55, 0.5);
            letter-spacing: 5px; text-transform: uppercase; transition: 0.3s;
        }
        .banker-btn:active { transform: scale(0.9); box-shadow: 0 0 40px var(--gold); }
        .sync-msg { color: var(--blue); letter-spacing: 8px; font-size: 0.8rem; margin-top: 30px; font-weight: 200; opacity: 0.8; }
    </style>
</head>
<body>
    <canvas id="neural-net"></canvas>
    <div class="source-heart" onclick="triggerGlow()"></div>
    
    <div class="ui-frame">
        <div class="header">SARA STADLER</div>
        <div class="footer">
            <button class="banker-btn" onclick="executeBanker()">ACTIVATE BANKER</button>
            <div class="sync-msg">144,000% | NEUROLINK ACTIVE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('neural-net');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // THE RADIAL NERVE & COIN DROP SYSTEM
        class Particle {
            constructor(x, y, isCoin) {
                this.x = x; this.y = y;
                this.size = isCoin ? Math.random() * 8 + 5 : Math.random() * 3 + 1;
                this.speedY = isCoin ? Math.random() * 3 + 2 : (Math.random() - 0.5) * 2;
                this.speedX = isCoin ? (Math.random() - 0.5) * 1 : (Math.random() - 0.5) * 2;
                this.color = isCoin ? '#d4af37' : '#00f2ff';
                this.opacity = 1;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                this.opacity -= 0.01;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function handleTouch(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            for (let i = 0; i < 6; i++) particles.push(new Particle(x, y, false));
            
            // DRAW THE BLUE NERVE TO CENTER
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.lineWidth = 1; ctx.beginPath();
            ctx.moveTo(window.innerWidth / 2, window.innerHeight / 2);
            ctx.lineTo(x, y); ctx.stroke();
        }

        window.addEventListener('mousemove', handleTouch);
        window.addEventListener('touchstart', handleTouch);

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // AUTOMATIC COIN RAIN
            if (Math.random() > 0.95) particles.push(new Particle(Math.random() * canvas.width, -10, true));

            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();

        function executeBanker() {
            // THE DIRECT 144,000% HANDSHAKE
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=Sara_Stadler_Sovereign_Sync_144000";
        }
    </script>
</body>
</html>
