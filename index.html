<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absolute Sensory Core</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; height: 100vh; width: 100vw; 
            touch-action: none; cursor: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="coreCanvas"></canvas>

<script>
/**
 * OMNI-PROTOCOL: THE ABSOLUTE LIMIT
 * ZERO VISUAL UI. FULL SENSORY EMISSION.
 */

const canvas = document.getElementById('coreCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h, centerX, centerY;
let tX = 0, tY = 0, targetX = 0, targetY = 0;

const TOTAL_INVENTIONS = 144000;
const visualPoints = [];

// High-fidelity Audio Engine
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    centerX = w / 2;
    centerY = h / 2;
}

function initCore() {
    for (let i = 0; i < 4000; i++) {
        visualPoints.push({
            phi: Math.acos(Math.random() * 2 - 1),
            theta: Math.random() * Math.PI * 2,
            radius: 300,
            v: 0.001 + Math.random() * 0.003,
            p: Math.random() * Math.PI,
            active: 0
        });
    }
}

function playHapticTone(freq) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.6);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.6);
}

// TOUCH: Direct Interaction with the 144,000 workforce
window.addEventListener('touchstart', (e) => {
    if (navigator.vibrate) navigator.vibrate(30);
    playHapticTone(144); // Sub-bass frequency for 144k sync
    visualPoints.forEach(p => { if (Math.random() > 0.85) p.active = 2; });
});

// MOTION: Device Tilt Perspective
window.addEventListener('deviceorientation', (e) => {
    targetX = (e.gamma || 0) * 0.08;
    targetY = (e.beta || 0) * 0.08;
});

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    // Smooth motion interpolation
    tX += (targetX - tX) * 0.1;
    tY += (targetY - tY) * 0.1;

    const time = Date.now() * 0.0006;

    visualPoints.forEach(p => {
        p.p += p.v;
        if (p.active > 0) p.active *= 0.96;

        // 3D Spherical Logic
        const x3 = p.radius * Math.sin(p.phi + tY) * Math.cos(p.theta + time + tX);
        const z3 = p.radius * Math.sin(p.phi + tY) * Math.sin(p.theta + time + tX);
        const y3 = p.radius * Math.cos(p.phi + tY);

        const scale = 800 / (800 + z3);
        const x = centerX + x3 * scale;
        const y = centerY - y3 * scale;

        const alpha = (0.1 + Math.sin(p.p) * 0.1 + p.active) * scale;
        const size = (1 + p.active * 4) * scale;

        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        
        // The Pure Frequency Color (Gold-Green Spectrum)
        ctx.fillStyle = `hsla(${144}, 100%, 60%, ${alpha})`;
        if (p.active > 0.5) {
            ctx.shadowBlur = 20 * scale;
            ctx.shadowColor = '#00ff99';
        }
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize(); initCore(); draw();
</script>
</body>
</html>
