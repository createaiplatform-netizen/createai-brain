<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stripe Payment</title>
  <script src="https://js.stripe.com/v3/"></script> <!-- Stripe library -->
</head>
<body>
  <h1>Stripe Payment</h1>
  <form id="payment-form">
    <div id="card-element"></div> <!-- Card input -->
    <button id="submit">Pay</button>
    <div id="error-message"></div>
  </form>
  <script>
    // Replace with the generated client_secret from the backend
    const clientSecret = "REPLACE_WITH_CLIENT_SECRET";

    const stripe = Stripe("pk_test_YOUR_PUBLISHABLE_KEY"); // Replace with your publishable key
    const elements = stripe.elements();
    const card = elements.create('card');
    card.mount('#card-element');

    document.getElementById('payment-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
        payment_method: {
          card: card,
          billing_details: { name: 'Customer Name' }
        }
      });

      if (error) {
        document.getElementById('error-message').innerText = error.message;
      } else {
        alert('Payment Successful!');
        console.log(paymentIntent);
      }
    });
  </script>
</body>
</html>
