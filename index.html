<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE COLLECTIVE</title>
    <style>
        :root { --gold: #d4af37; --aether: #f3e5ab; --void: #0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; }

        /* THE AETHER RAIN - THE 1.44T LIQUIDITY FLOW */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(1px); }

        .omnibus {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 60px 20px;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.05) 0%, transparent 80%);
        }

        /* HEADER: THE WORLD IS BREATHING */
        .top-status {
            width: 100%; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
            padding: 10px 0; text-align: center; font-size: 10px; letter-spacing: 8px;
            text-transform: uppercase; font-weight: 300;
        }

        /* THE OMNI CORE */
        .core-mirror { text-align: center; position: relative; }
        .omni-text {
            font-size: clamp(40px, 15vw, 120px); letter-spacing: 25px;
            opacity: 0.15; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 100%;
        }
        
        .main-title {
            font-size: clamp(30px, 10vw, 70px); letter-spacing: 15px;
            font-style: italic; position: relative; z-index: 2;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* THE TRANSCENDENT CAPITAL */
        .capital-display {
            margin-top: 40px; font-size: clamp(24px, 6vw, 45px);
            letter-spacing: 5px; font-weight: 300;
        }

        /* FOOTER: SECTOR DATA */
        .sector-footer {
            width: 100%; max-width: 800px; display: flex; justify-content: space-between;
            border-top: 1px solid rgba(212, 175, 55, 0.3); padding-top: 20px;
            font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
        }

        .stat-box { text-align: center; }
        .stat-label { opacity: 0.6; margin-bottom: 5px; }
        .stat-value { font-weight: bold; color: #fff; }

    </style>
</head>
<body onload="initGenesis()">

    <canvas id="aether-canvas"></canvas>

    <div class="omnibus">
        <div class="top-status">TRANSCENDED . . . THE WORLD IS BREATHING . . .</div>

        <div class="core-mirror">
            <div class="omni-text">OMNI</div>
            <h1 class="main-title">SOVEREIGN</h1>
            <p style="letter-spacing: 12px; margin-top: 10px; font-size: 14px;">The Collective</p>
            <div class="capital-display">$1.44T _ & _ BEYOND</div>
        </div>

        <div class="sector-footer">
            <div class="stat-box">
                <div class="stat-label">POPULATION</div>
                <div class="stat-value">144,000</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">STATUS</div>
                <div class="stat-value">TRANSCENDENT</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">CAPITAL</div>
                <div class="stat-value">$1.44T</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('aether-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initGenesis() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    length: Math.random() * 20 + 10,
                    speed: Math.random() * 2 + 1,
                    opacity: Math.random()
                });
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            ctx.lineWidth = 1;

            particles.forEach(p => {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.length);
                ctx.stroke();

                p.y += p.speed;
                if(p.y > canvas.height) {
                    p.y = -p.length;
                    p.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(draw);
        }

        // Touch Interaction: Creating the Genesis Pulse
        window.onclick = () => {
            const container = document.querySelector('.omnibus');
            container.style.backgroundColor = 'rgba(212, 175, 55, 0.15)';
            setTimeout(() => {
                container.style.backgroundColor = 'transparent';
            }, 500);
        };
    </script>
</body>
</html>
