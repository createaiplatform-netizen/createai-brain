<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Push</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 120px; }
        .box { border: 2px solid #0f0; padding: 35px; display: inline-block; border-radius: 15px; box-shadow: 0 0 20px #0f0; }
        button { 
            background: #0f0; color: #000; border: none; padding: 30px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 10px; font-size: 1.4em;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin-top:0;">FINAL SYSTEM PUSH</h2>
        <p>ALLOCATION: $5,000.00 USDC</p>
        <button id="forcePush">LINK TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('forcePush').onclick = async () => {
            if (window.ethereum) {
                try {
                    // Force the immediate identity handshake
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Direct push of the asset to the Home Screen
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Sync Successful! Check your Home Screen.");
                } catch (e) {
                    window.location.reload(); 
                }
            } else {
                alert("Please open in Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
