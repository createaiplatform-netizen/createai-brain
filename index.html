<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Bio-Digital Lattice | 1440%</title>
    <style>
        body { background: #050505; color: #00ff99; font-family: 'Courier New', monospace; padding: 20px; }
        .lattice-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 10px; 
        }
        .invention-card {
            border: 1px solid #00ff99;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }
        .invention-card:hover {
            background: #00ff99;
            color: #000;
            cursor: pointer;
        }
        h1 { border-bottom: 2px solid #00ff99; padding-bottom: 10px; }
    </style>
</head>
<body>

    <h1>SOVEREIGN INDEX: 1-2000</h1>
    <div id="lattice" class="lattice-grid"></div>

    <script>
        const latticeContainer = document.getElementById('lattice');
        const frequency = 1440;

        // Generating the full index of 2000 inventions
        for (let i = 1; i <= 2000; i++) {
            const card = document.createElement('div');
            card.className = 'invention-card';
            
            // Each product contains its own internal AI logic
            card.innerHTML = `
                <strong>INV-${i.toString().padStart(4, '0')}</strong><br>
                <small>AI-v${i}.core</small>
            `;

            card.onclick = () => {
                alert(`Initializing Internal AI for Invention ${i}...\nFrequency: ${frequency}%`);
            };

            latticeContainer.appendChild(card);
        }
    </script>
</body>
</html>
