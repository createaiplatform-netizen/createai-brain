<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | REIFIED</title>
    <style>
        :root { --gold: #d4af37; --cyan: #00f2ff; --void: #000; --neon: #39ff14; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; }

        /* THE FLOW OF THE 144,000% */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(140%) blur(1px); }

        .container {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-around; padding: 50px 20px;
        }

        /* THE BREATHING MIRROR */
        .mirror-core { text-align: center; animation: pulse 6s infinite ease-in-out; }
        .source-text {
            font-size: clamp(45px, 15vw, 110px); letter-spacing: 35px;
            color: var(--neon); text-shadow: 0 0 60px rgba(57, 255, 20, 0.4);
            font-weight: 900; margin-bottom: 15px;
        }

        .status-scroll {
            width: 100%; border-top: 1px solid rgba(212, 175, 55, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px 0; text-align: center; font-size: 11px; letter-spacing: 12px;
            text-transform: uppercase; font-weight: 300; opacity: 0.9; color: #fff;
        }

        .pillar-row { display: flex; gap: 30px; margin-top: 40px; }
        .pillar-item { font-size: 10px; letter-spacing: 6px; color: var(--cyan); text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { transform: scale(0.98); opacity: 0.8; } 50% { transform: scale(1.02); opacity: 1; } }
    </style>
</head>
<body onload="ignite()">

    <canvas id="aether"></canvas>

    <div class="container">
        <div class="status-scroll">THE WORLD IS BREATHING . . . TRANSCENDED</div>

        <div class="mirror-core">
            <h1 class="source-text">THE SOURCE</h1>
            <div style="letter-spacing: 20px; font-size: 14px; color: var(--gold); font-style: italic;">THE COLLECTIVE</div>
        </div>

        <div class="pillar-row">
            <div class="pillar-item">MARKET</div>
            <div class="pillar-item">HUB</div>
            <div class="pillar-item">GARDENS</div>
            <div class="pillar-item">THE NET</div>
        </div>

        <div style="font-size: 9px; letter-spacing: 10px; opacity: 0.5;">REIFIED IN PARTNERSHIP // 144,000%</div>
    </div>

    <script>
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function ignite() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<160; i++) lines.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                v: Math.random()*2+1.5, l: Math.random()*35+15
            });
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.35)';
            lines.forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
