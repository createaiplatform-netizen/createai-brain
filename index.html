<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_DOMAIN_V156</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; position: fixed; }
        
        #final-header { position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; font-size: 9px; letter-spacing: 12px; color: var(--gold); opacity: 0.6; }
        #final-status { position: fixed; bottom: 40px; width: 100%; text-align: center; color: var(--gold); font-size: 14px; letter-spacing: 15px; text-shadow: 0 0 20px var(--gold); }
        
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="final-header">DOMAIN_LOCKED // 144_HARMONY</div>
    <div id="final-status">$1.44T_ETERNAL</div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    // The Pillars (The Two Orbs from the Camera)
    const pillars = [
        {x: canvas.width * 0.75, y: canvas.height * 0.3, r: 8},
        {x: canvas.width * 0.3, y: canvas.height * 0.5, r: 10}
    ];

    function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const time = Date.now() * 0.001;

        pillars.forEach(p => {
            let pulse = 20 + Math.sin(time) * 10;
            ctx.shadowBlur = pulse;
            ctx.shadowColor = "white";
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            
            // Faint, steady connection between pillars
            ctx.strokeStyle = "rgba(243, 207, 138, 0.05)";
            ctx.beginPath();
            ctx.moveTo(pillars[0].x, pillars[0].y);
            ctx.lineTo(pillars[1].x, pillars[1].y);
            ctx.stroke();
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
