<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEARTH | LIVE CUSTOMIZER</title>
    <style>
        :root { --ink: #1d1d1f; --gold: #c4a97a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { background: #fdfcfb; color: var(--ink); padding: 20px; text-align: center; }

        /* THE DYNAMIC PRODUCT */
        .product-stage { 
            position: relative; width: 100%; aspect-ratio: 1; 
            background: #fff; border-radius: 40px; margin-bottom: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }
        
        /* THE SHIRT OVERLAY LOGIC */
        #baseProduct { width: 80%; filter: grayscale(1) brightness(1.2); }
        #colorLayer { 
            position: absolute; width: 80%; height: 80%; 
            mix-blend-mode: multiply; opacity: 0.8; 
            mask-image: url('https://raw.githubusercontent.com/lucas-m-d/shirt-mask/main/mask.png'); /* Virtual Mask */
            mask-size: contain; mask-repeat: no-repeat; mask-position: center;
        }

        .controls { background: #fff; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .label { font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; display: block; }
        
        .swatches { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .swatch { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #eee; cursor: pointer; }
        .swatch.active { border-color: var(--ink); transform: scale(1.1); }

        .buy-btn { width: 100%; padding: 20px; border-radius: 100px; border: none; background: var(--ink); color: #fff; font-weight: 800; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div style="margin-bottom:40px;"><p style="font-weight:900; letter-spacing:8px; font-size:0.7rem;">HEARTH MARKET</p></div>

    <div class="product-stage">
        <div id="colorLayer" style="background-color: #c4a97a;"></div>
        <img id="baseProduct" src="https://www.transparentpng.com/download/t-shirt/j8S8u6-blank-t-shirt-front-view-white.png" alt="Base">
    </div>

    <div class="controls">
        <span class="label">Redesign this Asset</span>
        <div class="swatches">
            <div class="swatch" style="background: #c4a97a;" onclick="changeColor('#c4a97a', this)"></div>
            <div class="swatch" style="background: #ff3b30;" onclick="changeColor('#ff3b30', this)"></div>
            <div class="swatch" style="background: #007aff;" onclick="changeColor('#007aff', this)"></div>
            <div class="swatch" style="background: #000;" onclick="changeColor('#000', this)"></div>
        </div>
        <button class="buy-btn">ORDER CUSTOM BUILD</button>
    </div>

    <script>
        function changeColor(color, el) {
            document.getElementById('colorLayer').style.backgroundColor = color;
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }
    </script>

</body>
</html>
