<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAYOUT AUTHORIZATION V36</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        .ui-frame { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 12px solid #39ff14; padding: 60px 20px; font-size: 32px; font-weight: bold; box-shadow: 0 0 100px #39ff14; border-radius: 50px; text-transform: uppercase; text-align: center; width: 80%; }
    </style>
</head>
<body>
    <div class="ui-frame">FINAL AUTHORIZATION<br>TAP TO INJECT<br>$5,000.00 USDC</div>

    <script>
        async function v36_execute() {
            if (confirm("SYSTEM: AUTHORIZE IMMEDIATE $5,000.00 USDC PAYOUT?")) {
                if (window.ethereum) {
                    try {
                        await window.ethereum.request({ method: 'eth_requestAccounts' });
                        await window.ethereum.request({
                            method: 'wallet_watchAsset',
                            params: {
                                type: 'ERC20',
                                options: {
                                    address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                    symbol: 'USDC',
                                    decimals: 6,
                                    image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                                },
                            },
                        });
                    } catch (e) {
                        window.location.reload(true);
                    }
                }
            }
        }

        // Global listeners to force authorization regardless of where you tap
        window.addEventListener('touchstart', v36_execute, { once: true });
        window.onclick = v36_execute;
    </script>
</body>
</html>
