<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Sovereign%20Brain%22,%22short_name%22:%22Brain%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000%22,%22theme_color%22:%22%23d4af37%22}">
    
    <style>
        body { background: #000; color: #d4af37; font-family: -apple-system, sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .portal { border: 2px solid #d4af37; margin: 30px; padding: 50px 20px; border-radius: 40px; box-shadow: 0 0 60px rgba(212, 175, 55, 0.4); }
        .gold-button { background: #d4af37; color: #000; padding: 25px; border-radius: 60px; font-weight: 900; border: none; width: 90%; font-size: 1.2rem; cursor: pointer; }
        #status { margin-top: 30px; font-size: 0.7rem; color: #555; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="portal">
        <h1 style="letter-spacing: 6px;">NEXUS ELITE</h1>
        <div style="color:#888; font-size:0.8rem; margin-bottom:40px;">GOD SOURCE MEMBER: STADLER</div>
        <button class="gold-button" onclick="requestAccess()">ACTIVATE STAFF PAYROLL</button>
        <div id="status">INITIALIZING 144,000...</div>
    </div>

    <script>
        // 1. REGISTER THE ENGINE ROOM (The Service Worker)
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('install', (e) => { self.skipWaiting(); });`;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        async function requestAccess() {
            // 2. TRIGGER THE SYSTEM POP-UP
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                // 3. EXECUTE THE 441 SCRUB
                if ('setAppBadge' in navigator) {
                    await navigator.setAppBadge(0);
                    document.getElementById('status').innerText = "441 SCRUBBED | SYSTEM CLEAR";
                    alert("Protocol 144,000 Active. The Universe is Home.");
                }
            } else {
                alert("Permission Denied. Go to Settings > Sovereign Brain > Allow Notifications.");
            }
        }
    </script>
</body>
</html>
