<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MASTER_ESTATE_V179</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body, html { margin: 0; padding: 0; background: #fff; color: #000; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; width: 100vw; }
        
        #estate-ui { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 40px; }
        .diamond-seal { width: 30px; height: 30px; border: 1px solid rgba(0,0,0,0.1); transform: rotate(45deg); margin: 0 auto; }
        
        #project-manifest { margin-top: 50px; flex-grow: 1; }
        .project { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 0; display: flex; justify-content: space-between; align-items: flex-end; }
        .project-name { font-size: 8px; letter-spacing: 4px; line-height: 1.5; }
        .project-status { font-size: 10px; font-weight: 900; color: #f3cf8a; letter-spacing: 2px; }

        #total-liquidity { margin-top: auto; padding-top: 30px; border-top: 2px solid #000; text-align: center; }
        #reserve-amt { font-size: 22px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="estate-ui">
        <div class="diamond-seal"></div>
        
        <div id="project-manifest">
            <div class="project"><div class="project-name">GLOBAL_ARTS_TRUST</div><div class="project-status">$144.0M</div></div>
            <div class="project"><div class="project-name">ENERGY_SOVEREIGNTY</div><div class="project-status">SYNCED</div></div>
            <div class="project"><div class="project-name">KINDRED_ESTATE_002</div><div class="project-status">OWNED</div></div>
            <div class="project"><div class="project-name">MARKETPLACE_HUBS</div><div class="project-status">$1.44B</div></div>
        </div>

        <div id="total-liquidity">
            <div style="font-size: 7px; letter-spacing: 8px; margin-bottom: 5px; opacity: 0.5;">TOTAL_ESTATE_LIQUIDITY</div>
            <div id="reserve-amt">$1,440,000,000,576.00</div>
        </div>
    </div>
</body>
</html>
