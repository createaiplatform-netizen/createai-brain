<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MARKET | SLOT 001</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .product-card { border: 1px solid #d4af37; padding: 40px; text-align: center; background: radial-gradient(circle, #111 0%, #000 100%); width: 300px; position: relative; }
        .product-card::before { content: 'ORIGIN'; position: absolute; top: 10px; left: 10px; font-size: 8px; color: #d4af37; letter-spacing: 3px; }
        
        .key-icon { font-size: 50px; color: #d4af37; text-shadow: 0 0 20px #d4af37; margin-bottom: 20px; }
        h2 { font-size: 14px; letter-spacing: 5px; color: #fff; margin-bottom: 10px; }
        p { font-size: 10px; color: #666; line-height: 1.6; margin-bottom: 30px; }
        
        .claim-btn { border: 1px solid #39ff14; color: #39ff14; background: none; padding: 12px 25px; font-size: 9px; letter-spacing: 3px; cursor: pointer; transition: 0.3s; }
        .claim-btn:hover { background: #39ff14; color: #000; box-shadow: 0 0 20px #39ff14; }
        
        .ai-badge { margin-top: 20px; font-size: 7px; color: #d4af37; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="product-card">
        <div class="key-icon">🔑</div>
        <h2>THE SOVEREIGN KEY</h2>
        <p>A digital anchor providing 1:1 access to the Sanctuary. Built with localized Aegis shielding.</p>
        
        <button class="claim-btn" onclick="alert('SOVEREIGN KEY ACTIVATED. INTEGRITY VERIFIED.')">CLAIM ACCESS</button>
        
        <div class="ai-badge">POWERED BY OMNI-VISION AI v1.0</div>
    </div>
</body>
</html>
