<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI | MARKETPLACE</title>
    <style>
        :root { --gold: #D4AF37; --black: #000000; --green: #00FF00; }
        body { background: var(--black); color: var(--gold); font-family: 'Courier New', monospace; margin: 0; padding: 15px; text-transform: uppercase; text-align: center; min-height: 100vh; display: flex; flex-direction: column; }
        .nav-back { border: 1px solid var(--gold); padding: 8px; text-decoration: none; color: var(--gold); font-size: 0.6rem; display: inline-block; margin-bottom: 20px; width: fit-content; }
        .header { border: 2px solid var(--gold); padding: 15px; background: rgba(212, 175, 55, 0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; margin: 0 auto; }
        .card { border: 1px solid var(--gold); padding: 15px; background: #050505; position: relative; }
        .price { color: var(--green); font-size: 1.2rem; display: block; margin: 10px 0; }
        .buy-btn { background: var(--gold); color: var(--black); border: none; padding: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 0.8rem; }
        .footer { margin-top: auto; padding: 20px; font-size: 0.5rem; opacity: 0.5; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">< RETURN_TO_CORE</a>
    <div class="header">
        <h1>THE_MARKETPLACE</h1>
        <div style="font-size: 0.6rem; color: white;">DROPSHIPPING // AFFILIATE // MEMBERSHIPS</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>SOVEREIGN_MEMBERSHIP</h3>
            <div style="font-size: 0.5rem;">ACCESS: THE_VAULT + AI_CORE</div>
            <span class="price">$144.00 / MO</span>
            <button class="buy-btn" onclick="alert('REDIRECTING TO SECURE CHECKOUT...')">ORDER_MEMBERSHIP</button>
        </div>

        <div class="card">
            <h3>DROPSHIP_UTILITY_NODE</h3>
            <div style="font-size: 0.5rem;">GLOBAL_INVENTORY_SYNC_ACTIVE</div>
            <span class="price">$299.00</span>
            <button class="buy-btn">ACQUIRE_ASSET</button>
        </div>
    </div>

    <div class="footer">ENCRYPTED COMMERCE // CREATEAI DIGITAL EMPIRE</div>
</body>
</html>
