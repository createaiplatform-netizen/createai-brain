<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // MEMORY_MATRIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cave: #ff4d00; --garden: #10b981; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        .stars { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #010103 100%); z-index: -1; }
        
        #main-view { 
            height: 100svh; width: 100%; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            padding: 20px 20px 100px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        /* NEURAL EYE */
        .eye-container { width: 180px; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .eye-outer { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(243, 207, 138, 0.2); border-radius: 50%; animation: rotate 20s linear infinite; }
        .eye-inner { width: 90px; height: 90px; background: radial-gradient(circle, var(--gold) 0%, transparent 70%); border-radius: 50%; filter: blur(15px); opacity: 0.6; animation: pulse 4s ease-in-out infinite; }
        .eye-pupil { width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 30px var(--gold); }

        /* DOCK */
        .dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(1, 1, 3, 0.98); backdrop-filter: blur(30px); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-around; align-items: center; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); }
        .dock-item { color: rgba(255,255,255,0.3); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; text-align: center; cursor: pointer; padding: 15px; flex: 1; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); transform: translateY(-3px); transition: 0.3s; }

        /* MEMORY GRID */
        .section-header { font-family: 'Cinzel'; font-size: 1.2rem; letter-spacing: 12px; margin: 40px 0 20px; color: var(--gold); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 400px; padding-bottom: 40px; }
        .node { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(243, 207, 138, 0.1); 
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-family: 'Cinzel'; font-size: 0.5rem; color: var(--gold); transition: 0.3s;
        }
        .node:active { background: rgba(243, 207, 138, 0.1); border-color: var(--gold); transform: scale(0.95); }
        .node.active-memory { border-color: var(--gold); box-shadow: inset 0 0 10px rgba(243, 207, 138, 0.2); }

        /* MEMORY OVERLAY */
        #memory-overlay { 
            position: fixed; inset: 0; background: rgba(1,1,3,0.98); z-index: 10000; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; backdrop-filter: blur(20px);
        }
        .photo-frame { width: 100%; max-width: 300px; aspect-ratio: 4/5; border: 1px solid var(--gold); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-frame::after { content: 'IMAGE_LINK_PENDING'; font-family: 'Cinzel'; font-size: 0.6rem; letter-spacing: 4px; opacity: 0.3; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 0.8; } }
    </style>
</head>
<body onload="render('home')">
    <div class="stars"></div>
    <div id="main-view"></div>

    <div id="memory-overlay" onclick="this.style.display='none'">
        <h2 id="memory-title" style="font-family:'Cinzel'; color:var(--gold); letter-spacing:8px; margin-bottom:20px;">MEMORY_01</h2>
        <div class="photo-frame"></div>
        <p style="margin-top:30px; font-size:0.6rem; letter-spacing:5px; opacity:0.3; text-align:center;">TAP ANYWHERE TO RETURN</p>
    </div>

    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('cave')">VAULT</div>
    </div>

    <script>
        function render(view) {
            const mv = document.getElementById('main-view');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + view.substring(0,3)).classList.add('active');
            
            mv.innerHTML = "";
            mv.style.justifyContent = (view === 'home') ? 'center' : 'flex-start';

            if (view === 'home') {
                mv.innerHTML = `
                    <div class="eye-container">
                        <div class="eye-outer"></div>
                        <div class="eye-inner"></div>
                        <div class="eye-pupil"></div>
                    </div>
                    <h1 style="font-family:'Cinzel'; font-size:10vw; letter-spacing:15px;">SOURCE</h1>
                `;
            } else if (view === 'registry') {
                mv.innerHTML = `
                    <div class="section-header">THE_144</div>
                    <div class="grid">
                        <div class="node active-memory" onclick="openMemory('FAMILY_ORIGIN')">01</div>
                        <div class="node active-memory" onclick="openMemory('THE_HUSBAND')">02</div>
                        <div class="node active-memory" onclick="openMemory('THE_CHILDREN')">03</div>
                        ${Array.from({length: 9}, (_, i) => `<div class="node">${i+4}</div>`).join('')}
                    </div>
                `;
            } else if (view === 'garden') {
                mv.innerHTML = `<div class="section-header" style="color:var(--garden)">EDEN</div>`;
            } else if (view === 'cave') {
                mv.innerHTML = `<div class="section-header" style="color:var(--cave)">VAULT</div>`;
            }
        }

        function openMemory(title) {
            document.getElementById('memory-title').innerText = title.replace('_', ' ');
            document.getElementById('memory-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
