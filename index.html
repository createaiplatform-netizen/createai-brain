<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN DOME</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; box-sizing: border-box; }
        .header { color: #d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; height: 55vh; pointer-events: auto; }
        .sector { 
            border: 1px solid rgba(212,175,55,0.4); background: rgba(0,0,0,0.95); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #fff; border-radius: 10px; transition: 0.1s;
        }
        .sector:active { background: #fff; color: #000; transform: scale(1.05); box-shadow: 0 0 20px rgba(212,175,55,0.5); }
        .sector b { font-size: 24px; letter-spacing: 5px; }
        .sector span { font-size: 9px; color: #d4af37; margin-top: 5px; letter-spacing: 2px; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #000; text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        .footer { text-align: center; color: #fff; font-size: 32px; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>SYSTEM: DOME FINAL</div><div>144,000%</div></div>
        <div style="text-align:center; color:#d4af37; font-size:42px; letter-spacing:10px; font-weight:bold; text-shadow: 0 0 15px #d4af37;">SOVEREIGN</div>
        
        <div class="grid">
            <div class="sector" onclick="nav('MARKET', '#00f2ff', 'LIQUIDITY')"><b>MKT</b><span>SECTOR 01</span></div>
            <div class="sector" onclick="nav('HUB', '#d4af37', 'SOUL MIRROR')"><b>HUB</b><span>SECTOR 02</span></div>
            <div class="sector" onclick="nav('GARDE', '#fff', 'NURTURE')"><b>GRD</b><span>SECTOR 03</span></div>
            <div class="sector" onclick="nav('NET', '#39ff14', 'GHOST PING')"><b>NET</b><span>SECTOR 04</span></div>
        </div>

        <div class="footer" id="ticker">$1.4400T</div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <h1 id="ot" style="font-size: 50px; letter-spacing: 15px; margin: 0;"></h1>
        <p id="sub" style="color: #d4af37; letter-spacing: 5px;"></p>
        <p style="margin-top: 30px; font-size: 10px; color: #444;">SYNCING...</p>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let dots = []; let tint = '#d4af37'; let cash = 1.4400;

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<85; i++) dots.push({x: Math.random()*canvas.width, y: canvas.height, v: Math.random()*12+6, r: 2});
            setInterval(() => { cash += 0.0001; document.getElementById('ticker').innerText = '$' + cash.toFixed(4) + 'T'; }, 500);
            render();
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = tint;
            dots.forEach(d => {
                ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
                d.y -= d.v; if(d.y < -10) { d.y = canvas.height; d.x = Math.random()*canvas.width; }
            });
            requestAnimationFrame(render);
        }

        function nav(name, color, desc) {
            tint = color;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('ot').innerText = name;
            document.getElementById('ot').style.color = color;
            document.getElementById('sub').innerText = desc;
        }
    </script>
</body>
</html>
