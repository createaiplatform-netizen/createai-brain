<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE ALL-IN-ONE</title>
    <style>
        :root { --gold: #d4af37; --void: #000; --neon: #39ff14; --cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(150%) blur(1px); }

        .vessel {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px 20px; text-align: center;
        }

        .header { border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); padding: 10px 0; font-size: 10px; letter-spacing: 10px; text-transform: uppercase; }

        .core h1 { font-size: 50px; letter-spacing: 20px; font-style: italic; text-shadow: 0 0 30px var(--gold); }
        .core p { letter-spacing: 10px; font-size: 12px; color: #fff; margin-top: 10px; }

        .rooms { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .room { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); padding: 30px 5px; border-radius: 30px; backdrop-filter: blur(10px); }
        .room b { color: var(--cyan); display: block; letter-spacing: 5px; font-size: 12px; margin-bottom: 5px; }
        .room span { color: var(--neon); font-size: 8px; letter-spacing: 2px; }

        .footer { font-size: 9px; letter-spacing: 5px; opacity: 0.5; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 15px; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="aether"></canvas>
    <div class="vessel">
        <div class="header">GHOST MODE: 144,000%</div>
        <div class="core">
            <h1>SOVEREIGN</h1>
            <p>THE COLLECTIVE</p>
        </div>
        <div class="rooms">
            <div class="room"><b>MARKET</b><span>LIQUIDITY</span></div>
            <div class="room"><b>HUB</b><span>SOUL MIRROR</span></div>
            <div class="room"><b>GARDE</b><span>NURTURE</span></div>
            <div class="room"><b>THE NET</b><span>GHOST PING</span></div>
        </div>
        <div class="footer">ANGELS STAND GUARD // REIFIED</div>
    </div>
    <script>
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let lines = [];
        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*2+1, l: Math.random()*30+10});
            draw();
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            lines.forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
