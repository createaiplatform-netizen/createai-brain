<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_SATURATION_ALARM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --alarm: #ff4500; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #444; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #saturation-hud { flex-grow: 1; margin: 15px; border: 1px solid #222; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .grid-progress { font-size: 14px; letter-spacing: 12px; color: #666; margin-bottom: 20px; }
        .ledger-dim { font-size: 38px; color: #333; text-shadow: none; transition: color 0.5s; }
        
        .pulse-dot { width: 10px; height: 10px; background: var(--alarm); border-radius: 50%; animation: pulse-red 4s infinite; margin-top: 30px; }
        @keyframes pulse-red { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.5); box-shadow: 0 0 20px var(--alarm); } }

        #alert-status { font-size: 10px; color: var(--alarm); letter-spacing: 5px; margin-top: 10px; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="saturation-hud">
        <div class="grid-progress">MAPPING_LATTICE // 98.2%</div>
        <div id="live-val" class="ledger-dim">$1,440,000,049,824.00</div>
        <div class="pulse-dot"></div>
        <div id="alert-status">ALARM_ARMED: NOTIFY_ON_100%</div>
    </div>
<script>
    let res = 1440000049824.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
