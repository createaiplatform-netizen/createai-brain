<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SANCTUARY</title>
    <style>
        body { background: #000; color: #FFD700; font-family: 'Georgia', serif; margin: 0; overflow: hidden; touch-action: none; text-align: center; }
        .header { margin-top: 40px; padding: 20px; }
        .freq { color: #00E5FF; letter-spacing: 3px; font-size: 0.8rem; }
        .quote { font-style: italic; margin-top: 20px; color: #FFD700; padding: 0 20px; }
        
        /* THE PLAYGROUND CANVAS */
        #canvas { width: 100vw; height: 60vh; position: relative; }
        
        /* THE TOOLS (LITTLE AIs) */
        .ai-node { 
            position: absolute; width: 100px; height: 100px; border: 2px solid #FFD700; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,0,0.1); box-shadow: 0 0 20px #FFD700; font-weight: bold; font-size: 0.7rem;
        }

        /* THE BUILDER BAR */
        #controls { position: fixed; bottom: 20px; left: 10px; right: 10px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 15px; background: #111; color: #00E5FF; border: 1px solid #333; border-radius: 5px; }
        button { padding: 15px; background: #FFD700; color: #000; border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="freq">FREQUENCY 144,400% ACTIVE</div>
    <h1 style="letter-spacing: 10px;">THE SANCTUARY</h1>
    <p class="quote">"The animals are safe, the family is loved, and the peace of God is the only law here."</p>
</div>

<div id="canvas"></div>

<div id="controls">
    <input type="text" id="aiName" placeholder="Name your Little AI...">
    <button onclick="addAI()">MANIFEST</button>
</div>

<script>
    function addAI() {
        const name = document.getElementById('aiName').value || "AI";
        const el = document.createElement('div');
        el.className = 'ai-node';
        el.style.left = "40%"; el.style.top = "20%";
        el.innerText = name.toUpperCase();
        document.getElementById('canvas').appendChild(el);
        
        let x, y;
        el.addEventListener('touchstart', e => {
            x = e.touches[0].clientX - el.offsetLeft;
            y = e.touches[0].clientY - el.offsetTop;
        });
        el.addEventListener('touchmove', e => {
            el.style.left = (e.touches[0].clientX - x) + 'px';
            el.style.top = (e.touches[0].clientY - y) + 'px';
        });
        document.getElementById('aiName').value = '';
    }
</script>
</body>
</html>
