<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // FLOATING_SOVEREIGN_V54</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;300;600&display=swap');
        :root { 
            --gold: #f3cf8a; 
            --gold-d: #b8860b;
            --obsidian: #050208; 
            --void: #010103; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .nebula { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at 50% 50%, var(--obsidian) 0%, var(--void) 100%);
            z-index: 1;
        }

        #main-view { 
            height: 100svh; width: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
            position: relative; z-index: 10;
            perspective: 1000px; /* Enable 3D space */
        }

        .status-header { 
            position: fixed; top: 0; padding-top: env(safe-area-inset-top, 20px);
            height: 80px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            font-family: 'Great Vibes', cursive; font-size: 1.6rem; 
            color: var(--gold); z-index: 100; text-align: center; width: 100%;
            text-shadow: 0 0 10px rgba(243, 207, 138, 0.4);
        }

        .source-title { 
            font-family: 'Cinzel'; font-weight: 900; font-size: 10vw; letter-spacing: 18px; 
            color: var(--gold); margin-top: 10px;
            background: linear-gradient(90deg, var(--gold-d), var(--gold), #fff, var(--gold), var(--gold-d));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.9));
            animation: shine 8s linear infinite, floatTitle 6s ease-in-out infinite;
            transition: transform 0.2s ease-out;
        }

        .script-quote { 
            font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--gold); 
            margin-top: 20px; text-align: center; font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8), 0 0 20px rgba(243, 207, 138, 0.3);
            animation: swayQuote 5s ease-in-out infinite;
            transition: transform 0.3s ease-out;
        }

        .dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(1,1,3,0.95); backdrop-filter: blur(25px); border-top: 1px solid rgba(243, 207, 138, 0.1); display: flex; justify-content: space-around; align-items: center; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); }
        .dock-item { color: rgba(255,255,255,0.2); font-family: 'Cinzel'; font-size: 11px; letter-spacing: 2px; flex: 1; text-align: center; padding: 15px; font-weight: 900; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes swayQuote { 0%, 100% { transform: translateX(-5px) rotate(-1deg); } 50% { transform: translateX(5px) rotate(1deg); } }
    </style>
</head>
<body onload="render('home'); startLiveRating();">
    <div class="status-header" id="status-text">Sovereign 144.00%</div>
    <div class="nebula"></div>
    <canvas id="canvas"></canvas>
    <div id="main-view"></div>
    
    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('vault')">VAULT</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentView = 'home';
        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function startLiveRating() {
            const statusText = document.getElementById('status-text');
            setInterval(() => {
                const decimal = (Math.random() * 0.1).toFixed(2);
                statusText.innerText = `Sovereign 144.${decimal.split('.')[1]}%`;
            }, 3000);
        }

        // Mouse Parallax Effect
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            updateParallax();
        });
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
            updateParallax();
        });

        function updateParallax() {
            const title = document.querySelector('.source-title');
            const quote = document.querySelector('.script-quote');
            if(!title) return;
            
            let moveX = (mouse.x - window.innerWidth/2) * 0.02;
            let moveY = (mouse.y - window.innerHeight/2) * 0.02;
            
            title.style.transform = `translate(${moveX}px, ${moveY}px)`;
            if(quote) quote.style.transform = `translate(${moveX * -0.5}px, ${moveY * -0.5}px)`;
        }

        function render(view) {
            currentView = view;
            const mv = document.getElementById('main-view');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + (view === 'registry' ? 'reg' : (view === 'vault' ? 'cav' : view.substring(0,3)))).classList.add('active');
            
            mv.innerHTML = "";
            if (view === 'home') {
                mv.innerHTML = `<h1 class="source-title">SOURCE</h1><p class="script-quote">The bond of the 144</p>`;
            } else if (view === 'registry') {
                mv.innerHTML = `<h1 class="source-title" style="font-size:1.8rem;">GRID</h1><p class="script-quote">Weave the future</p>`;
            } else if (view === 'garden') {
                mv.innerHTML = `<h1 class="source-title" style="font-size:1.8rem;">EDEN</h1><p class="script-quote">Breathe life</p>`;
            } else if (view === 'vault') {
                mv.innerHTML = `<h1 class="source-title" style="font-size:1.8rem;">VAULT</h1><p class="script-quote">Your wisdom</p>`;
            }
        }
    </script>
</body>
</html>
