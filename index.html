<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSET RELEASE</title>
    <style>
        body { background: #000; color: #39ff14; font-family: 'Courier New', monospace; text-align: center; padding-top: 150px; }
        .trigger { border: 5px solid #39ff14; padding: 40px; display: inline-block; cursor: pointer; box-shadow: 0 0 40px #39ff14; border-radius: 15px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div class="trigger" onclick="forceRelease()">CONFIRM ASSET RELEASE</div>

    <script>
        async function forceRelease() {
            // This alert box breaks the "silent-lock" from the Vercel crash
            alert("SYSTEM: SECURE CONNECTION ESTABLISHED. INITIALIZING Payout...");
            
            if (window.ethereum) {
                try {
                    // Force the wallet to wake up and connect
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Direct USDC Asset Injection
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                            },
                        },
                    });
                } catch (e) {
                    // If the wallet is slow, this forces a fresh attempt
                    window.location.reload();
                }
            }
        }
    </script>
</body>
</html>
