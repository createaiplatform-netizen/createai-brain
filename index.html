<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JUNIOR | THE GARDEN</title>
    <style>
        :root { --magic: #00ff88; --berry: #ff2d55; --sky: #007aff; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Rounded Mplus 1c", sans-serif; }
        
        body { background: var(--dark); color: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* THE MAGIC SKYLINE */
        header { 
            padding: 25px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,255,136,0.15), transparent);
        }
        .logo { font-weight: 900; letter-spacing: 4px; color: var(--magic); font-size: 0.8rem; }

        /* IMAGINATION STATION */
        .creation-zone { flex: 1; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-content: start; }
        
        .activity-card { 
            aspect-ratio: 1; border-radius: 40px; border: 4px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 3rem; position: relative; overflow: hidden; transition: 0.3s;
        }
        .activity-card:active { transform: scale(0.9); border-color: var(--magic); }
        .activity-card span { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin-top: 10px; letter-spacing: 2px; }

        /* RECENT CREATIONS (THE REFRIGERATOR DOOR) */
        .fridge-door { padding: 20px; }
        .fridge-title { font-size: 0.8rem; font-weight: 800; color: #555; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase; }
        .gallery { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; }
        .drawing { min-width: 100px; height: 100px; border-radius: 20px; background: #222; border: 2px dashed #444; }

        /* THE JUNIOR NAV (SOFTER) */
        nav { 
            padding: 20px 40px 40px; display: flex; justify-content: space-around;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .nav-btn { font-size: 1.8rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
    </style>
</head>
<body>

    <header>
        <div class="logo">JUNIOR GARDEN</div>
        <div style="width: 35px; height: 35px; background: var(--berry); border-radius: 50%; border: 2px solid #fff;"></div>
    </header>

    <div class="creation-zone">
        <div class="activity-card" style="background: rgba(0, 255, 136, 0.05);">🎨<span>Color</span></div>
        <div class="activity-card" style="background: rgba(0, 122, 255, 0.05);">🧱<span>Build</span></div>
        <div class="activity-card" style="background: rgba(255, 45, 85, 0.05);">🚀<span>Play</span></div>
        <div class="activity-card" style="background: rgba(255, 255, 255, 0.05);">📖<span>Stories</span></div>
    </div>

    <div class="fridge-door">
        <div class="fridge-title">My Creations</div>
        <div class="gallery">
            <div class="drawing" style="background: url('https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=200'); background-size: cover;"></div>
            <div class="drawing"></div>
            <div class="drawing"></div>
        </div>
    </div>

    <nav>
        <div class="nav-btn">🏠</div>
        <div class="nav-btn">✨</div>
        <div class="nav-btn">❤️</div>
    </nav>

</body>
</html>
