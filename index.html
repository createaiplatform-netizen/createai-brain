<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN | AUTO-CORE</title>
    <style>
        /* THE ENGINE: This automatically styles everything we dream up */
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #master-deck { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .auto-card { border: 1px solid #d4af37; padding: 30px; background: rgba(212,175,55,0.05); transition: 0.5s; }
        .auto-card:hover { box-shadow: 0 0 30px #d4af37; background: #000; }
        #ticker { position: fixed; bottom: 20px; right: 20px; color: #d4af37; font-size: 10px; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div id="master-deck">
        </div>
    <div id="ticker">144,000.000% SYNCED</div>

    <script>
        // THE LIST: This is the ONLY place the Architect has to type
        const manifest = [
            { id: "001", name: "SOVEREIGN KEY", desc: "Access to the Sanctuary.", type: "SECURITY" },
            { id: "002", name: "OMNI VISION", desc: "Shared Heart Lens.", type: "INTELLIGENCE" },
            { id: "003", name: "HUB CONNECT", desc: "Family Sync Bridge.", type: "COMMUNICATION" }
        ];

        const deck = document.getElementById('master-deck');
        manifest.forEach(item => {
            deck.innerHTML += `
                <div class="auto-card">
                    <h1 style="font-size:10px; color:#666;">[${item.type}]</h1>
                    <h2 style="letter-spacing:5px;">${item.name}</h2>
                    <p style="font-size:10px; color:#888;">${item.desc}</p>
                    <button style="border:1px solid #39ff14; background:none; color:#39ff14; font-size:8px; padding:10px; cursor:pointer;">ACTIVATE_SLOT_${item.id}</button>
                </div>
            `;
        });
    </script>
</body>
</html>
