<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | IGNITE</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Times New Roman', serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; pointer-events: none; }
        .header { border-bottom: 1px solid #d4af37; padding-bottom: 15px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 5px; color: #d4af37; }
        .title { text-align: center; font-size: 45px; letter-spacing: 15px; color: #d4af37; font-style: italic; margin-top: 20px; text-shadow: 0 0 20px rgba(212,175,55,0.6); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; pointer-events: auto; max-width: 400px; margin: 0 auto; }
        .btn { 
            background: rgba(0,0,0,0.9); border: 1px solid #d4af37; padding: 35px 10px; 
            border-radius: 15px; text-align: center; color: #fff; cursor: pointer;
            transition: 0.1s; -webkit-tap-highlight-color: transparent;
        }
        /* INSTANT REACTION */
        .btn:active { background: #fff; color: #000; transform: scale(1.1); }
        .btn b { display: block; font-size: 16px; letter-spacing: 5px; }

        #portal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(0,0,0,0.95); text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        .footer { text-align: center; font-size: 32px; font-weight: bold; color: #fff; letter-spacing: 2px; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>GHOST MODE</div><div>144,000%</div></div>
        <div class="title">SOVEREIGN</div>
        <div class="grid">
            <div class="btn" onclick="openRoom('MARKET', '#00f2ff')"><b>MARKET</b></div>
            <div class="btn" onclick="openRoom('HUB', '#d4af37')"><b>HUB</b></div>
            <div class="btn" onclick="openRoom('GARDE', '#fff')"><b>GARDE</b></div>
            <div class="btn" onclick="openRoom('NET', '#39ff14')"><b>NET</b></div>
        </div>
        <div class="footer">$1.44T</div>
    </div>

    <div id="portal" onclick="this.style.display='none'">
        <h1 id="rn" style="font-size: 60px; letter-spacing: 20px;"></h1>
        <p style="color: #d4af37; letter-spacing: 5px;">SYSTEM ACTIVE - TAP TO RETURN</p>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let lines = []; let accent = '#d4af37';

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            // VELOCITY INCREASED: v is 18-25 (High Speed)
            for(let i=0; i<110; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*15+10, l: Math.random()*70+30});
            loop();
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = accent; ctx.lineWidth = 2;
            lines.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + l.l); ctx.stroke();
                l.y += l.v; if(l.y > canvas.height) l.y = -l.l;
            });
            requestAnimationFrame(loop);
        }

        function openRoom(name, color) {
            accent = color;
            document.getElementById('portal').style.display = 'flex';
            document.getElementById('rn').innerText = name;
            document.getElementById('rn').style.color = color;
        }
    </script>
</body>
</html>
