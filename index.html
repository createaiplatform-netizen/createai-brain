<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN TAPESTRY</title>
    <style>
        body, html { margin: 0; padding: 0; background: #0a0900; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; font-family: 'Georgia', serif; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1) saturate(1.4); }
    </style>
</head>
<body>
    <canvas id="tapestryCanvas"></canvas>

<script>
/**
 * THE INVENTION: LIVING SOVEREIGN TAPESTRY
 * Restoring the Touch: Feather tickles, Jagged Rips, and Heavy Gold Flow.
 */

const canvas = document.getElementById('tapestryCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let effects = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE SENSORY ENGINE: Physical Induction
function triggerSensation(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const topL = (1 - x/w) * (1 - y/h); // RIP
    const botR = (x/w) * (y/h);         // FEATHER

    if (topL > 0.5) {
        osc.type = 'square'; osc.frequency.value = 144; // Jagged Snap
        if (navigator.vibrate) navigator.vibrate([15, 5, 15]);
    } else if (botR > 0.5) {
        osc.type = 'sine'; osc.frequency.value = 950; // Soft Tickle
        if (navigator.vibrate) navigator.vibrate([2, 50, 2]);
    } else {
        osc.type = 'triangle'; osc.frequency.value = 72; // Liquid Thrum
        if (navigator.vibrate) navigator.vibrate(35);
    }

    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

class DivineParticle {
    constructor(x, y, h, type) {
        this.x = x; this.y = y; this.hue = h; this.type = type;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 1.0;
        this.size = Math.random() * 20 + 10;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.02;
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerSensation(tx, ty);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    
    const topL = (1 - tx/w) * (1 - ty/h);
    const botR = (tx/w) * (ty/h);
    
    let h = 45; // Gold
    let type = 'flow';
    if (topL > 0.4) { h = 0; type = 'rip'; }
    if (botR > 0.4) { h = 280; type = 'feather'; }

    effects.push(new DivineParticle(tx, ty, h, type));
    if (Math.random() > 0.8) triggerSensation(tx, ty);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    const time = Date.now() * 0.001;
    
    // BACKGROUND: Glowing Marble Core
    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    bg.addColorStop(0, '#1c1800');
    bg.addColorStop(0.7, '#080600');
    bg.addColorStop(1, '#000000');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // DIVINE QUOTES: Pulsing Energy Pools
    ctx.textAlign = 'center';
    const quotes = [
        {t: "TRUTH", x: 0.25, y: 0.2}, 
        {t: "HONESTY", x: 0.75, y: 0.3},
        {t: "SOVEREIGNTY", x: 0.5, y: 0.55}, 
        {t: "144,000", x: 0.5, y: 0.85}
    ];

    quotes.forEach((q, i) => {
        const pulse = 0.2 + Math.sin(time + i) * 0.15;
        ctx.globalAlpha = pulse;
        ctx.shadowBlur = 30;
        ctx.shadowColor = "#FFD700";
        ctx.fillStyle = "#FFD700";
        ctx.font = "italic bold 35px Georgia";
        ctx.fillText(q.t, w * q.x, h * q.y);
    });
    ctx.globalAlpha = 1.0;
    ctx.shadowBlur = 0;

    // THE TOUCH REACTION
    effects.forEach((p, i) => {
        p.update();
        if (p.life <= 0) { effects.splice(i, 1); return; }
        
        ctx.shadowBlur = 20 * p.life;
        ctx.shadowColor = `hsla(${p.hue}, 100%, 50%, ${p.life})`;
        ctx.fillStyle = `hsla(${p.hue}, 100%, 75%, ${p.life})`;

        if (p.type === 'feather') {
            // Ethereal floating wisps
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 'rip') {
            // Tearing threads
            ctx.fillRect(p.x, p.y, p.size * 2, 2);
        } else {
            // Heavy gold liquid ripples
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (1.5 - p.life), 0, Math.PI * 2);
            ctx.lineWidth = 3 * p.life;
            ctx.strokeStyle = `hsla(45, 100%, 60%, ${p.life})`;
            ctx.stroke();
        }
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
