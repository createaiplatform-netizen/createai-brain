<script>
    // ... inside animate() ...
    
    // SOURCERoom: Add Floating Golden Dust
    if (view === 'home' && Math.random() > 0.92) {
        items.push({type:'dust', x: cx + (Math.random()-0.5)*200, y: cy + (Math.random()-0.5)*200, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, life: 1});
    }

    items.forEach((p, i) => {
        if (p.type === 'dust') {
            p.x += p.vx; p.y += p.vy; p.life -= 0.005;
            ctx.fillStyle = `rgba(243, 207, 138, ${p.life * 0.5})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
            if(p.life <= 0) items.splice(i, 1);
        }
        // ... neural and vine logic ...
        else if (p.type === 'neural') {
            p.life -= 0.01; // Slower fade for late night memory
        }
    });
</script>
