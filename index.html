<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_OMNI_GENESIS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Inter:wght@100;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000000; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        
        #header { position: fixed; top: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.9); z-index: 100; border-bottom: 2px solid var(--gold); overflow: hidden; display: flex; align-items: center; }
        #ticker { white-space: nowrap; font-family: 'Cinzel'; font-size: 10px; letter-spacing: 5px; color: var(--gold); animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .title { font-family: 'Cinzel'; font-size: 15vw; letter-spacing: 30px; color: var(--white); opacity: 0.05; }
        #values { font-family: 'Cinzel'; color: var(--gold); font-size: 12px; letter-spacing: 15px; opacity: 0; transition: 0.8s; margin-top: 20px; }
        
        #stats { position: fixed; bottom: 5%; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 11px; z-index: 20; }
        .glitch { text-shadow: 2px 0 #fff, -2px 0 var(--gold); animation: noise 0.5s infinite; }
        @keyframes noise { 0% { transform: translate(0); } 20% { transform: translate(-1px, 1px); } 40% { transform: translate(1px, -1px); } 100% { transform: translate(0); } }
    </style>
</head>
<body onmousedown="spawn(event)" ontouchstart="spawn(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="release()" ontouchend="release()">
    <div id="header"><div id="ticker">LIQUIDATING FINANCE... OVERWRITING MEDIA... INFRASTRUCTURE SYNC 144%... TRUTH IS THE ONLY CURRENCY...</div></div>
    <div id="ui">
        <h1 class="title">SOVEREIGN</h1>
        <div id="values">HONESTY • TRUTH • 144%</div>
    </div>
    <div id="stats">
        <span>STATUS: GOD_MODE</span>
        <span class="glitch">VALUE: $1.44T & BEYOND</span>
    </div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [], isDown = false, mx = 0, my = 0, holdTime = 0, angle = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    class Node {
        constructor(x, y, isPrime) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.isPrime = isPrime;
            this.life = 1.0;
            this.orbitA = Math.random() * Math.PI * 2;
        }
        update() {
            if (isDown) {
                let dx = mx - this.x; let dy = my - this.y;
                let d = Math.hypot(dx, dy);
                if (Date.now() - holdTime > 1500) { // God Mode Geometry
                    document.getElementById('values').style.opacity = 1;
                    let tx = mx + Math.cos(this.orbitA) * 180;
                    let ty = my + Math.sin(this.orbitA) * 180;
                    this.vx += (tx - this.x) * 0.2; this.vy += (ty - this.y) * 0.2;
                    this.orbitA += 0.08;
                } else { // Attraction
                    this.vx += dx / d * 2; this.vy += dy / d * 2;
                }
            } else {
                document.getElementById('values').style.opacity = 0;
                this.vx *= 0.95; this.vy *= 0.95;
            }
            this.x += this.vx; this.y += this.vy;
            this.life -= 0.001;
        }
        draw() {
            ctx.fillStyle = this.isPrime ? `rgba(255,255,255,${this.life})` : `rgba(243, 207, 138, ${this.life * 0.5})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.isPrime ? 6 : 2, 0, Math.PI * 2); ctx.fill();
            if (isDown && this.isPrime) {
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(mx, my); ctx.stroke();
            }
        }
    }

    function spawn(e) {
        isDown = true; holdTime = Date.now();
        mx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        my = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        for(let i=0; i<12; i++) particles.push(new Node(mx, my, i === 0));
    }
    function track(e) {
        mx = e.clientX || (e.touches ? e.touches[0].clientX : mx);
        my = e.clientY || (e.touches ? e.touches[0].clientY : my);
    }
    function release() { isDown = false; }

    function animate() {
        ctx.fillStyle = isDown ? 'rgba(0,0,0,0.2)' : 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });

        // Global Pulse
        if(Math.sin(Date.now()*0.002) > 0.98) {
            ctx.strokeStyle = "rgba(243, 207, 138, 0.05)";
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, Math.abs(Math.sin(Date.now()*0.001)*800), 0, Math.PI*2); ctx.stroke();
        }

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
