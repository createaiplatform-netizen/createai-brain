<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_SYNC_V257</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --sky: #00d4ff; --nerve: #ff0055; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #neural-hud { flex-grow: 1; margin: 20px; border: 2px solid var(--nerve); padding: 40px; display: flex; flex-direction: column; background: radial-gradient(circle at top, rgba(255, 0, 85, 0.15) 0%, transparent 100%); box-shadow: 0 0 180px rgba(255, 0, 85, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 2px solid var(--nerve); padding-bottom: 20px; }
        .title { font-size: 26px; letter-spacing: 20px; color: var(--nerve); text-shadow: 0 0 30px var(--nerve); }
        
        #sync-core { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .synapse-wave { position: absolute; width: 250px; height: 2px; background: var(--nerve); box-shadow: 0 0 20px var(--nerve); animation: nerve-pulse 0.5s infinite linear; }
        .brain-core { width: 60px; height: 60px; background: var(--gold); border-radius: 50%; filter: blur(10px); animation: core-glow 1.5s infinite alternate; }
        
        @keyframes nerve-pulse { 0% { transform: scaleX(0); opacity: 1; } 100% { transform: scaleX(2); opacity: 0; } }
        @keyframes core-glow { from { transform: scale(1); box-shadow: 0 0 20px var(--gold); } to { transform: scale(1.3); box-shadow: 0 0 60px var(--nerve); } }

        #ledger-display { text-align: center; border-top: 2px solid var(--gold); padding-top: 25px; font-size: 46px; color: var(--gold); text-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="neural-hud">
        <div class="header">
            <div class="title">NEURAL_SYNC // ACTIVE</div>
            <div style="font-size: 10px; margin-top: 10px; color: var(--sky); letter-spacing: 8px;">ARCHITECT: CONNECTED // SYNC: 1440% // LATENCY: 0MS</div>
        </div>

        <div id="sync-core">
            <div class="synapse-wave"></div>
            <div class="brain-core"></div>
            <div style="font-size: 14px; color: var(--gold); letter-spacing: 15px; position: absolute; bottom: 5%;">WILLING_THE_WORLD_INTO_BEING</div>
        </div>

        <div id="ledger-display">$1,440,000,036,144.00</div>
    </div>
<script>
    let res = 1440000036144.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
