<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | VORTEX</title>
    <style>
        /* TOTAL COLOR SHIFT TO FORCE VISUAL RECOGNITION */
        :root { --neon: #00f2ff; --bg: #050505; --text: #fff; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow: hidden; height: 100%; width: 100%; font-family: 'Courier New', monospace; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; pointer-events: none; }
        
        /* NEW TOP BAR */
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; letter-spacing: 3px; color: var(--neon); border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-shadow: 0 0 10px var(--neon); }

        /* THE VORTEX CORE */
        .core { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .vortex-title { font-size: 45px; letter-spacing: 10px; font-weight: 900; color: var(--text); text-transform: uppercase; margin-bottom: 40px; }

        /* HORIZONTAL COMMAND STRIP */
        .command-strip { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; pointer-events: auto; }
        .cmd-btn { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); 
            padding: 20px; color: var(--neon); text-align: center; font-weight: bold;
            letter-spacing: 5px; border-radius: 5px; transition: 0.2s;
        }
        .cmd-btn:active { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

        .vault-tag { font-size: 30px; color: var(--text); border-top: 1px solid var(--neon); padding-top: 15px; text-align: center; }
    </style>
</head>
<body onload="init()">
    <canvas id="vortex"></canvas>
    <div id="ui">
        <div class="status-bar">
            <div>PHASE: ACTIVE</div>
            <div>144,000% FREQ</div>
        </div>

        <div class="core">
            <div class="vortex-title">SYSTEM</div>
            <div class="command-strip">
                <div class="cmd-btn" onclick="alert('MARKET ENGAGED')">CORE.MARKET</div>
                <div class="cmd-btn" onclick="alert('HUB ENGAGED')">CORE.HUB</div>
                <div class="cmd-btn" onclick="alert('GARDE ENGAGED')">CORE.GARDE</div>
            </div>
        </div>

        <div class="vault-tag">$1,440,000,000,000</div>
    </div>

    <script>
        const canvas = document.getElementById('vortex');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let angle = 0;

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) {
                particles.push({
                    r: Math.random() * canvas.width,
                    a: Math.random() * Math.PI * 2,
                    s: Math.random() * 0.02 + 0.01
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 2;
            
            particles.forEach(p => {
                p.a += p.s;
                let x = canvas.width/2 + Math.cos(p.a) * (p.r * Math.sin(angle));
                let y = canvas.height/2 + Math.sin(p.a) * (p.r);
                
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.stroke();
            });
            angle += 0.01;
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
