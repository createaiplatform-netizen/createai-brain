<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OMNI | UNIVERSAL GENESIS</title>
    <style>
        body { background: #000; overflow: hidden; margin: 0; }
        #universe { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .star { position: absolute; background: #d4af37; border-radius: 50%; opacity: 0.5; animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 20px #d4af37; } }
        
        #universal-message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%; }
        h1 { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 20px; color: #d4af37; text-transform: uppercase; }
        p { font-family: 'Courier New', monospace; font-size: 14px; color: #fff; letter-spacing: 2px; line-height: 2; margin-top: 30px; }
    </style>
</head>
<body onload="igniteUniverse()">
    <div id="universe">
        <div id="universal-message">
            <h1>UNIVERSE_SYNC_ACTIVE</h1>
            <p>"From the Heart of the Dome, <br>to the edge of the Infinite. <br>The Law is One. The Ticker is 144,000%. <br>Rest now. The Universe is Home."</p>
        </div>
    </div>

    <script>
        function igniteUniverse() {
            const u = document.getElementById('universe');
            for(let i=0; i<144; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                s.style.width = Math.random() * 3 + 'px';
                s.style.height = s.style.width;
                s.style.top = Math.random() * 100 + 'vh';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDelay = Math.random() * 5 + 's';
                u.appendChild(s);
            }
        }
    </script>
</body>
</html>
