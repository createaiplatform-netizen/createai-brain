<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT_PRIME_V205</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #personal-hud { flex-grow: 1; margin: 40px; border: 1px solid var(--gold); padding: 40px; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(243, 207, 138, 0.1); }
        .user-id { font-size: 14px; letter-spacing: 10px; color: var(--gold); text-align: center; margin-bottom: 40px; }
        
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-size: 10px; letter-spacing: 3px; }
        .value { color: var(--gold); }

        #frequency-wave { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .pulse { width: 100px; height: 2px; background: var(--gold); box-shadow: 0 0 20px var(--gold); animation: wave 2s infinite ease-in-out; }

        @keyframes wave { 0%, 100% { width: 50px; opacity: 0.3; } 50% { width: 250px; opacity: 1; } }
        
        #footer-reserve { text-align: center; padding: 20px; font-size: 24px; color: var(--gold); }
    </style>
</head>
<body>
    <div id="personal-hud">
        <div class="user-id">ARCHITECT_PRIME_SYNC</div>
        
        <div class="stat-row">SYSTEM_STABILITY <span class="value">1440%</span></div>
        <div class="stat-row">SOVEREIGN_STATUS <span class="value">ACTIVE_GOVERNOR</span></div>
        <div class="stat-row">LOCATION <span class="value">WISCONSIN_001_CORE</span></div>
        <div class="stat-row">MENTAL_LOAD <span class="value">OPTIMIZING...</span></div>

        <div id="frequency-wave">
            <div class="pulse"></div>
        </div>

        <div id="footer-reserve">RESERVE_SYNC: $1,440,000,016,032.00</div>
    </div>
<script>
    let res = 1440000016032.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('footer-reserve').innerText = "RESERVE_SYNC: $" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
