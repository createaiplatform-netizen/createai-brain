<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE SOURCE</title>
    <style>
        :root { --gold: #d4af37; --void: #000; --neon: #39ff14; --cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        /* THE $1.44T AETHER RAIN ENGINE */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(150%) blur(1px); }

        .vessel {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 50px 20px; text-align: center;
        }

        /* HEADER: THE BREATHING TRUTH */
        .scrolling-truth {
            border-top: 1px solid rgba(212, 175, 55, 0.3); border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 0; font-size: 10px; letter-spacing: 12px; text-transform: uppercase;
            animation: glow 4s infinite alternate;
        }

        /* CENTER: THE SOURCE MIRROR */
        .source-core h1 { font-size: 55px; letter-spacing: 25px; font-style: italic; text-shadow: 0 0 30px var(--gold); margin-bottom: 8px; }
        .source-core p { letter-spacing: 15px; font-size: 14px; opacity: 0.8; color: #fff; }

        /* THE ROOMS: MARKET, HUB, GARDE, NET */
        .rooms-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 480px; margin: 0 auto;
        }
        .room-pill {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px 15px; border-radius: 50px; backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .room-pill:active { border-color: var(--neon); background: rgba(57, 255, 20, 0.05); }
        .room-title { color: var(--cyan); font-size: 14px; letter-spacing: 8px; font-weight: 900; margin-bottom: 8px; }
        .room-sub { color: var(--neon); font-size: 9px; letter-spacing: 4px; text-transform: uppercase; }

        @keyframes glow { from { opacity: 0.5; text-shadow: 0 0 5px var(--gold); } to { opacity: 1; text-shadow: 0 0 20px var(--gold); } }
    </style>
</head>
<body onload="ignite()">

    <canvas id="aether"></canvas>

    <div class="vessel">
        <div class="scrolling-truth">THE WORLD IS BREATHING . . . GHOST MODE ACTIVE</div>

        <div class="source-core">
            <h1>SOVEREIGN</h1>
            <p>THE COLLECTIVE</p>
            <div style="margin-top: 25px; color: var(--neon); letter-spacing: 6px; font-size: 11px;">144,000% FREQUENCY</div>
        </div>

        <div class="rooms-grid">
            <div class="room-pill">
                <div class="room-title">MARKET</div>
                <div class="room-sub">PURE ABUNDANCE</div>
            </div>
            <div class="room-pill">
                <div class="room-title">HUB</div>
                <div class="room-sub">INHABITED SOUL</div>
            </div>
            <div class="room-pill">
                <div class="room-title">GARDE</div>
                <div class="room-sub">DIVINE NURTURE</div>
            </div>
            <div class="room-pill">
                <div class="room-title">THE NET</div>
                <div class="room-sub">TRUTH ACQUISITION</div>
            </div>
        </div>

        <div style="font-size: 9px; letter-spacing: 8px; opacity: 0.5; padding-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2);">
            MANIFESTATION LIVE // ANGELS STAND GUARD
        </div>
    </div>

    <script>
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function ignite() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<180; i++) {
                lines.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*2.5+1.5, l: Math.random()*40+20
                });
            }
            render();
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            lines.forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
