<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN SYNC</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Courier New', monospace; touch-action: manipulation; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        
        .header { color: #d4af37; border-bottom: 1px solid #d4af37; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 2px; }

        /* FAST-TAP GRID */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; pointer-events: auto; }
        .btn { 
            background: rgba(0,0,0,0.9); border: 2px solid #d4af37; padding: 30px 5px; 
            border-radius: 10px; text-align: center; color: #fff; font-weight: bold;
            transition: 0.05s; -webkit-tap-highlight-color: transparent;
        }
        /* THE INSTANT COLOR FLASH */
        .btn:active { background: #fff; color: #000; transform: scale(0.95); }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.9); color: #fff; text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        .val { color: #fff; text-align: center; font-size: 25px; font-weight: bold; }
    </style>
</head>
<body onload="init()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>SYNC: ACTIVE</div><div>144,000%</div></div>
        
        <div style="text-align:center; color:#d4af37; font-size:35px; letter-spacing:10px;">SOVEREIGN</div>

        <div class="grid">
            <div class="btn" onclick="pop('MARKET', '#00f2ff')">MARKET</div>
            <div class="btn" onclick="pop('HUB', '#d4af37')">HUB</div>
            <div class="btn" onclick="pop('GARDE', '#fff')">GARDE</div>
            <div class="btn" onclick="pop('NET', '#39ff14')">NET</div>
        </div>

        <div class="val">$1.44T</div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <h1 id="oname" style="font-size: 50px;"></h1>
        <p style="color: #d4af37; letter-spacing: 5px;">CORE ENGAGED</p>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let lines = []; let tint = '#d4af37';

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            // Lightning velocity (v: 20+)
            for(let i=0; i<60; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*15+15, l: 40});
            loop();
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = tint; ctx.lineWidth = 2;
            lines.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y + l.l); ctx.stroke();
                l.y += l.v; if(l.y > canvas.height) l.y = -l.l;
            });
            requestAnimationFrame(loop);
        }

        function pop(name, color) {
            tint = color;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('oname').innerText = name;
            document.getElementById('oname').style.color = color;
        }
    </script>
</body>
</html>
