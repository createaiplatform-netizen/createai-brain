<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreateAI | 365 Sovereign OS</title>
    <style>
        :root { --slate: #0f172a; --gold: #b89c66; --bg: #f8fafc; --white: #ffffff; }
        body { background: var(--bg); color: var(--slate); font-family: 'Inter', sans-serif; margin: 0; }
        
        /* NAVIGATION */
        nav { background: var(--slate); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; cursor: pointer; border-left: 3px solid var(--gold); padding-left: 10px; }
        .nav-links span { margin-left: 20px; font-size: 0.7rem; cursor: pointer; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; }

        #main-view { padding: 40px 20px; max-width: 1400px; margin: 0 auto; }

        /* THE 365 GRID */
        .grid-365 { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 30px; }
        .node { background: white; border: 1px solid #e2e8f0; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; cursor: pointer; transition: 0.2s; position: relative; }
        .node:hover { border-color: var(--gold); transform: scale(1.05); z-index: 10; }
        .node.active { border-color: var(--gold); background: #fffcf5; }
        .node.active::after { content: 'LIVE'; position: absolute; top: 2px; right: 2px; font-size: 0.4rem; color: var(--gold); font-weight: bold; }

        /* CREATOR TERMINAL */
        .terminal { max-width: 500px; margin: 0 auto; background: white; padding: 40px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; font-family: inherit; }
        .btn { background: var(--slate); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body onload="showView('home')">

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI_365</div>
        <div class="nav-links">
            <span onclick="showView('market')">The 365 Marketplace</span>
            <span onclick="showView('creator')">Creator Hub</span>
            <span onclick="showView('home')">Home</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <script>
        // DATA CORE: This tracks which of the 365 days have apps
        let sovereignNodes = {
            1: { name: "BrainGen Core", cat: "AI", desc: "Day 1: The foundation." },
            122: { name: "Marketplace Strategist", cat: "Wealth", desc: "Day 122: Current node." }
        };

        const views = {
            home: `
                <div style="text-align:center;">
                    <h1 style="font-weight:200; font-size:2.5rem;">Sovereign 365</h1>
                    <p style="opacity:0.6;">One year. One vision. 365 Nodes.</p>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; max-width:600px; margin: 40px auto;">
                        <div class="node" style="width:100%;" onclick="showView('market')">Marketplace</div>
                        <div class="node" style="width:100%;" onclick="showView('creator')">Creator Hub</div>
                    </div>
                </div>
            `,
            market: () => `
                <h1>The 365 Marketplace</h1>
                <p>Select a node to launch the app or product.</p>
                <div class="grid-365">
                    ${Array.from({length: 365}, (_, i) => i + 1).map(day => `
                        <div class="node ${sovereignNodes[day] ? 'active' : ''}" onclick="launchNode(${day})">
                            <span style="opacity:0.4;">DAY</span>
                            <strong style="font-size:1rem;">${day}</strong>
                            <div style="font-size:0.5rem; text-align:center;">${sovereignNodes[day] ? sovereignNodes[day].name : 'EMPTY'}</div>
                        </div>
                    `).join('')}
                </div>
            `,
            creator: `
                <div class="terminal">
                    <h2 style="margin:0;">Node Publisher</h2>
                    <p style="font-size:0.8rem; color:#666;">Assign an app or product to a specific day in the 365 cycle.</p>
                    
                    <label>Select Day (1-365)</label>
                    <input type="number" id="nDay" min="1" max="365" placeholder="e.g. 123">
                    
                    <label>App Name</label>
                    <input type="text" id="nName" placeholder="What are we building?">
                    
                    <label>Category</label>
                    <select id="nCat">
                        <option>Technology</option><option>Wellness</option><option>Wealth</option><option>Creative</option>
                    </select>
                    
                    <button class="btn" style="background:var(--gold); color:black;" onclick="deployNode()">PUBLISH TO 365 GRID</button>
                </div>
            `
        };

        function showView(name) {
            const content = typeof views[name] === 'function' ? views[name]() : views[name];
            document.getElementById('main-view').innerHTML = content;
        }

        function deployNode() {
            const day = document.getElementById('nDay').value;
            const name = document.getElementById('nName').value;
            const cat = document.getElementById('nCat').value;
            
            if(!day || !name) return alert("Day and Name required.");
            
            sovereignNodes[day] = { name: name, cat: cat, desc: "New manifestation." };
            alert(`Node ${day} is now LIVE.`);
            showView('market');
        }

        function launchNode(day) {
            if(sovereignNodes[day]) {
                alert(`Launching Day ${day}: ${sovereignNodes[day].name}`);
            } else {
                alert(`Day ${day} is currently in development.`);
            }
        }
    </script>
</body>
</html>
