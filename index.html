<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_ETERNAL_V107</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cyan: #00f2ff; --green: #2ecc71; --purple: #a188ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #master { width: 100%; height: 100%; transition: filter 0.4s; }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-3px, 0, 0); } 40%, 60% { transform: translate3d(3px, 0, 0); } }
        .grain { position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.08; pointer-events: none; z-index: 10; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .title { font-family: 'Cinzel'; font-size: 10vw; letter-spacing: 14px; color: var(--gold); text-shadow: 0 0 40px rgba(0,0,0,1); transition: color 0.4s; }
        .quote { font-family: 'Great Vibes'; font-size: 1.8rem; color: var(--gold); margin-top: 5px; opacity: 0.8; text-align: center; }
        #nexus-input { position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 100; display: none; pointer-events: auto; }
        #nexus-field { background: rgba(0,242,255,0.03); border: 1px solid rgba(0,242,255,0.3); border-radius: 25px; padding: 14px 30px; color: var(--cyan); font-family: 'Cinzel'; font-size: 12px; width: 280px; text-align: center; backdrop-filter: blur(25px); box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        #stats { position: fixed; bottom: 120px; right: 35px; font-family: 'Cinzel'; color: var(--gold); font-size: 10px; letter-spacing: 2px; text-align: right; line-height: 2; opacity: 0.5; }
        .guide { position: fixed; font-family: 'Cinzel'; font-size: 7px; color: var(--gold); opacity: 0.12; z-index: 20; letter-spacing: 3px; }
        .tl { top: 60px; left: 40px; } .tr { top: 60px; right: 40px; } .bl { bottom: 60px; left: 40px; } .br { bottom: 60px; right: 40px; }
        #timer-ring { position: absolute; width: 260px; height: 260px; border-radius: 50%; border: 1px solid rgba(243,207,138,0.03); display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        #progress { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--cyan); border-top-color: transparent; border-left-color: transparent; transform: rotate(-45deg); opacity: 0; transition: opacity 0.6s; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div class="grain"></div>
        <div id="nexus-input"><input type="text" id="nexus-field" placeholder="DEFINE INTENT..."></div>
        <div id="stats">VALUE: <span id="val">0</span><br>INTENT: <span id="int-disp">SOURCE</span></div>
        <div class="guide tl">NEXUS</div> <div class="guide tr">EDEN</div> <div class="guide bl">SOURCE</div> <div class="guide br">VAULT</div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <div id="timer-ring" onclick="toggleTimer()">
                <div id="progress"></div>
                <div style="text-align:center">
                    <h1 class="title" id="t">SOURCE</h1>
                    <p class="quote" id="q">144% Frequency</p>
                </div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'home', particles = [], isDown = false, mx = 0, my = 0;
    let totalValue = 0, bigCoin = 0, timerActive = false, timerProg = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function toggleTimer() {
        timerActive = !timerActive;
        document.getElementById('progress').style.opacity = timerActive ? "0.8" : "0";
        if(!timerActive) timerProg = 0;
    }

    document.getElementById('nexus-field').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') { 
            let val = e.target.value.toUpperCase();
            document.getElementById('q').innerText = val;
            document.getElementById('int-disp').innerText = val;
            triggerShake(); e.target.value = ''; e.target.blur();
        }
    });

    function triggerShake() {
        const m = document.getElementById('master');
        m.classList.add('shake'); setTimeout(() => m.classList.remove('shake'), 500);
    }

    function handle(e) {
        if(e.target.closest('#nexus-input')) return;
        isDown = true;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;
        document.getElementById('nexus-input').style.display = (x < w/2 && y < h/2) ? 'block' : 'none';
        
        if (y < h/2) view = (x < w/2) ? 'nexus' : 'eden';
        else view = (x < w/2) ? 'home' : 'vault';
        
        let c = (view==='nexus')?'var(--cyan)':(view==='eden')?'var(--green)':(view==='home')?'var(--purple)':'var(--gold)';
        document.getElementById('t').innerText = view.toUpperCase();
        document.getElementById('t').style.color = c;
    }

    function track(e) { 
        mx = e.clientX || (e.touches ? e.touches[0].clientX : mx);
        my = e.clientY || (e.touches ? e.touches[0].clientY : my); 
    }
    
    function stop() { 
        if(view === 'vault' && bigCoin > 5) {
            totalValue += Math.round(bigCoin * 15);
            document.getElementById('val').innerText = totalValue.toLocaleString();
            triggerShake();
            for(let i=0; i<50; i++) {
                let a = Math.random()*Math.PI*2; let f = Math.random()*15+2;
                particles.push({x:mx, y:my, vx:Math.cos(a)*f, vy:Math.sin(a)*f, r:Math.random()*4+1, type:'gold', age:0});
            }
        }
        isDown = false; bigCoin = 0; 
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        if (timerActive) {
            timerProg += 0.0003;
            document.getElementById('progress').style.transform = `rotate(${-45 + (timerProg * 360)}deg)`;
            if(timerProg >= 1) { triggerShake(); toggleTimer(); }
        }

        let auraC = (view==='nexus')?'0,242,255':(view==='eden')?'46,204,113':(view==='home')?'161,136,255':'243,207,138';
        let pulse = 85 + Math.sin(Date.now()*0.001)*15 + (totalValue/700);
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse*3);
        g.addColorStop(0, 'rgba(255,255,255,0.8)'); g.addColorStop(0.2, `rgba(${auraC}, 0.3)`); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, pulse*3, 0, Math.PI*2); ctx.fill();

        if (isDown) {
            if (view === 'vault') { bigCoin = Math.min(bigCoin+0.9, 70); ctx.fillStyle='rgba(243,207,138,0.3)'; ctx.beginPath(); ctx.arc(mx, my, bigCoin, 0, Math.PI*2); ctx.fill(); }
            if (view === 'nexus') particles.push({x:mx, y:my, tx:cx, ty:cy, type:'data', life:1});
            if (view === 'eden') particles.push({x:mx, y:my, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, type:'vine', life:1});
        }

        particles.forEach((p, i) => {
            if(p.type === 'gold') {
                p.vy += 0.3; p.x += p.vx; p.y += p.vy;
                if(p.y > canvas.height-p.r) { p.y = canvas.height-p.r; p.vy *= -0.3; p.vx *= 0.8; }
                if(isDown && Math.hypot(mx-p.x, my-p.y) < 70) { p.vx += (p.x-mx)*0.2; p.vy += (p.y-my)*0.2; }
                ctx.fillStyle = `rgba(243,207,138, ${Math.max(0, 1-p.age/3000)})`;
                p.age++; if(p.age > 3000) particles.splice(i, 1);
            } else if(p.type === 'data') {
                p.life -= 0.025; ctx.strokeStyle = `rgba(0,242,255,${p.life})`;
                ctx.lineWidth = 0.4; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke();
                if(p.life <= 0) particles.splice(i, 1);
            } else if(p.type === 'vine') {
                p.life -= 0.006; p.x += p.vx; p.y += p.vy; p.vx += (cx-p.x)*0.001; p.vy += (cy-p.y)*0.001;
                ctx.fillStyle = `rgba(46,204,113,${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            }
            if(p.type !== 'data') { ctx.beginPath(); ctx.arc(p.x, p.y, p.r||1.8, 0, Math.PI*2); ctx.fill(); }
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
