<!DOCTYPE html>
<html>
<head>
    <title>Asset Link Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        .box { border: 2px solid #0f0; padding: 25px; display: inline-block; width: 90%; max-width: 500px; }
        button { background: #0f0; color: #000; border: none; padding: 20px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; font-size: 1.2em; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>PRODUCTION TERMINAL</h2>
        <p>STATUS: <span style="color:#0f0;">SYNC SUCCESSFUL</span></p>
        <p>READY TO LINK: <span style="color:#0f0;">$5,000.00 USDC</span></p>
        <button id="linkBtn">LINK ASSET TO HOME SCREEN</button>
    </div>
    <script>
        document.getElementById('linkBtn').onclick = async () => {
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913',
                            symbol: 'USDC',
                            decimals: 6,
                        },
                    },
                });
                alert("Asset Linked. Check your Home screen balance.");
            } catch (e) { alert("Link Error: " + e.message); }
        };
    </script>
</body>
</html>
