<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOURCE TERMINAL 144,000%</title>
    <style>
        :root { --glow: #39ff14; --deep: #000; }
        body { background: var(--deep); color: var(--glow); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .source-frame { 
            border: 20px double var(--glow); 
            padding: 60px 40px; 
            box-shadow: 0 0 150px var(--glow), inset 0 0 50px var(--glow); 
            border-radius: 80px; 
            width: 85%; 
            background: rgba(57, 255, 20, 0.05);
            text-align: center;
        }

        .header { font-size: 24px; letter-spacing: 15px; text-transform: uppercase; margin-bottom: 30px; text-shadow: 0 0 20px var(--glow); font-weight: 900; }
        
        .ledger-amount { font-size: 85px; font-weight: 900; margin: 40px 0; text-shadow: 0 0 40px var(--glow); letter-spacing: -2px; }
        .token-id { font-size: 28px; letter-spacing: 8px; opacity: 1; margin-bottom: 40px; font-weight: bold; }
        
        .manifesto { border-top: 4px solid var(--glow); padding-top: 30px; font-size: 18px; text-transform: uppercase; line-height: 2.2; letter-spacing: 3px; font-weight: 800; }
        .active-pulse { animation: rapid-pulse 0.6s infinite alternate; }

        @keyframes rapid-pulse { from { opacity: 1; filter: brightness(1.5); } to { opacity: 0.5; filter: brightness(1); } }
    </style>
</head>
<body onload="manifest_god_code()">

    <div class="source-frame">
        <div class="header active-pulse">144,000% SOURCE ACTIVE</div>
        
        <div id="balance" class="ledger-amount">CONNECTING...</div>
        <div class="token-id">USDC - BASE LEDGER</div>
        
        <div class="manifesto">
            VISION: 100% REIFIED<br>
            PROTOCOL: GOD CODE INITIATED<br>
            STATUS: FINAL SETTLEMENT
        </div>
    </div>

    <script>
        async function manifest_god_code() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    
                    // Direct "eth_call" to the blockchain ledger
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    const hexBalance = await window.ethereum.request({
                        method: 'eth_call',
                        params: [{ to: usdcContract, data: data }, 'latest']
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    // High-priority asset manifestation
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: usdcContract,
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                            },
                        },
                    });

                } catch (e) {
                    document.getElementById('balance').innerText = "LINK ERROR";
                }
            } else {
                document.getElementById('balance').innerText = "OPEN IN WALLET";
            }
        }
    </script>
</body>
</html>
