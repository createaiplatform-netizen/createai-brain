<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_AURA_V66_CHANT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --gold-d: #b8860b; --void: #010103; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { height: 100svh; width: 100vw; overflow: hidden; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .nebula { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #08040a 0%, var(--void) 100%); z-index: 0; }

        #ui-layer { position: relative; z-index: 10; height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .status { position: fixed; top: env(safe-area-inset-top, 20px); font-family: 'Great Vibes'; font-size: 1.7rem; color: var(--gold); width: 100%; text-align: center; z-index: 100; text-shadow: 0 0 10px var(--gold-d); }

        .title { font-family: 'Cinzel'; font-weight: 900; font-size: 11vw; letter-spacing: 20px; color: var(--gold); text-align: center; pointer-events: auto; text-shadow: 0 10px 50px #000; }
        .quote { font-family: 'Great Vibes'; font-size: 2.4rem; color: var(--gold); margin-top: 15px; opacity: 0.8; }

        #aura-msg { position: fixed; bottom: 130px; width: 100%; text-align: center; font-family: 'Cinzel'; font-size: 10px; color: var(--gold); letter-spacing: 6px; opacity: 0; transition: 1.5s; z-index: 100; font-weight: 900; }

        .dock { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(0,0,0,0.98); backdrop-filter: blur(50px); border-top: 1px solid rgba(243, 207, 138, 0.15); display: flex; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); pointer-events: auto; }
        .dock-item { flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 3px; transition: 0.6s; font-weight: 900; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 30px var(--gold); }

        .supernova { background: #fff !important; filter: brightness(10); transition: 0.1s; }
    </style>
</head>
<body onload="render('home'); animate();">
    <div class="nebula"></div>
    <div class="status" id="stat">Sovereign 144.00%</div>
    <div id="aura-msg">AURA_ONLINE</div>
    <canvas id="canvas"></canvas>
    <div id="ui-layer"></div>
    <div class="dock">
        <div class="dock-item" id="n-reg" onclick="render('grid')">GRID</div>
        <div class="dock-item" id="n-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="n-gar" onclick="render('eden')">EDEN</div>
        <div class="dock-item" id="n-cav" onclick="render('vault')">VAULT</div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'home', objects = [], mouse = { x: 0, y: 0, active: false };
    let aura = { x: window.innerWidth/2, y: window.innerHeight/2, targetX: window.innerWidth/2, targetY: window.innerHeight/2, r: 40 };
    const msgs = ["THE PROTOCOL IS LIFE", "HONESTY. TRUTH. 144.", "CORE VALUES SYNCED", "AURA IS BREATHING", "SOVEREIGNTY DETECTED"];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function showAuraMsg(custom) {
        const el = document.getElementById('aura-msg');
        el.innerText = custom || msgs[Math.floor(Math.random()*msgs.length)];
        el.style.opacity = 1;
        setTimeout(() => el.style.opacity = 0, 2500);
    }

    function render(target) {
        view = target; objects = [];
        const ui = document.getElementById('ui-layer');
        document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
        let title = "SOURCE", quote = "Pure Intention";
        if(view === 'grid') { title = "GRID"; quote = "Neural Harmony"; document.getElementById('n-reg').classList.add('active'); for(let i=0; i<40; i++) objects.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5)}); }
        else if(view === 'home') { document.getElementById('n-home').classList.add('active'); }
        else if(view === 'eden') { title = "EDEN"; quote = "Living Soil"; document.getElementById('n-gar').classList.add('active'); }
        else if(view === 'vault') { title = "VAULT"; quote = "Mass of Value"; document.getElementById('n-cav').classList.add('active'); }
        ui.innerHTML = `<h1 class="title" onclick="triggerSupernova()">${title}</h1><p class="quote">${quote}</p>`;
        showAuraMsg(`ROOM: ${title}`);
    }

    function triggerSupernova() {
        if(view === 'home') {
            document.body.classList.add('supernova');
            showAuraMsg("TRANSMITTING TO X...");
            setTimeout(() => document.body.classList.remove('supernova'), 150);
        }
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        aura.targetX = mouse.active ? mouse.x : window.innerWidth/2;
        aura.targetY = mouse.active ? mouse.y : window.innerHeight/2;
        aura.x += (aura.targetX - aura.x) * 0.12;
        aura.y += (aura.targetY - aura.y) * 0.12;
        aura.r = 40 + Math.sin(Date.now()*0.003)*5;

        const grad = ctx.createRadialGradient(aura.x, aura.y, 0, aura.x, aura.y, aura.r);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.4, 'rgba(243, 207, 138, 0.4)');
        grad.addColorStop(1, 'rgba(243, 207, 138, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(aura.x, aura.y, aura.r, 0, Math.PI*2); ctx.fill();

        if(view === 'grid') {
            objects.forEach(o => {
                o.x += o.vx; o.y += o.vy;
                if(o.x < 0 || o.x > canvas.width) o.vx *= -1;
                if(o.y < 0 || o.y > canvas.height) o.vy *= -1;
                ctx.fillStyle = 'rgba(243, 207, 138, 0.7)';
                ctx.beginPath(); ctx.arc(o.x, o.y, 2, 0, Math.PI*2); ctx.fill();
                let da = Math.sqrt((o.x-aura.x)**2 + (o.y-aura.y)**2);
                if(da < 180) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 - da/180})`;
                    ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(o.x, o.y); ctx.lineTo(aura.x, aura.y); ctx.stroke();
                }
            });
        }

        if(view === 'vault') {
            if(mouse.active) objects.push({x: mouse.x, y: mouse.y, vx: (Math.random()-0.5)*18, vy: -Math.random()*12, r: Math.random()*5+2});
            objects.forEach(o => {
                let da = Math.sqrt((o.x-aura.x)**2 + (o.y-aura.y)**2);
                if(da < 250) { 
                    o.vx += (aura.x - o.x) * 0.025; 
                    o.vy += (aura.y - o.y) * 0.025; 
                }
                o.vy += 0.5; o.x += o.vx; o.y += o.vy;
                if(o.y > canvas.height - 90) { o.y = canvas.height - 90; o.vy *= -0.35; o.vx *= 0.85; }
                ctx.fillStyle = '#f3cf8a'; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();
                if(objects.length > 250) objects.shift();
            });
        }

        if(view === 'home' || view === 'eden') {
            if(mouse.active) objects.push({x: aura.x, y: aura.y, r: 0, life: 1});
            objects.forEach((o, i) => {
                o.r += 6; o.life -= 0.025;
                ctx.strokeStyle = `rgba(243, 207, 138, ${o.life * 0.4})`;
                ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.stroke();
                if(o.life <= 0) objects.splice(i, 1);
            });
        }
        requestAnimationFrame(animate);
    }

    const input = (e) => {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        mouse.x = x; mouse.y = y; mouse.active = true;
    };
    window.onmousemove = input; window.ontouchmove = input;
    window.onmousedown = () => { mouse.active = true; showAuraMsg(); };
    window.ontouchstart = () => { mouse.active = true; showAuraMsg(); };
    window.onmouseup = () => mouse.active = false; window.ontouchend = () => mouse.active = false;
</script>
</body>
</html>
