<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CreateAI | Humanity OS</title>
    <style>
        :root { --slate: #0f172a; --gold: #b89c66; --bg: #f8fafc; --garden: #22c55e; --kids: #8b5cf6; }
        body { background: var(--bg); color: var(--slate); font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding-bottom: 90px; -webkit-font-smoothing: antialiased; }
        nav { background: var(--slate); padding: 50px 20px 20px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { font-weight: 800; cursor: pointer; border-left: 3px solid var(--gold); padding-left: 12px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; }
        .nav-links span { margin-left: 18px; font-size: 0.7rem; cursor: pointer; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; }
        #main-view { padding: 25px; max-width: 1400px; margin: 0 auto; min-height: 80vh; }
        .garden-hero { background: linear-gradient(135deg, var(--garden), var(--kids)); color: white; padding: 50px 25px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        .toy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .toy-card { background: white; padding: 30px; border-radius: 25px; text-align: center; border-bottom: 8px solid var(--kids); cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .toy-card h3 { font-size: 2.5rem; margin: 0; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { background: white; border: 1px solid #e2e8f0; padding: 35px; border-radius: 12px; position: relative; transition: 0.3s; display: flex; flex-direction: column; }
        .tag { font-size: 0.6rem; color: var(--gold); font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 12px; }
        .price-tag { position: absolute; top: 35px; right: 35px; font-size: 0.6rem; font-weight: 900; background: #f1f5f9; padding: 5px 10px; border-radius: 5px; color: var(--slate); }
        #chat-box { height: 400px; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .chat-msg { margin-bottom: 15px; font-size: 0.9rem; line-height: 1.4; }
        .btn { background: var(--slate); color: white; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: 800; border-radius: 8px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn:hover { transform: scale(1.02); }
        input, select, textarea { width: 100%; padding: 18px; margin: 12px 0; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .lifeline { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--slate); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 2000; }
        .lifeline-btn { background: var(--gold); color: black; padding: 14px 28px; border-radius: 30px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body onload="showView('home')">
    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI_OS</div>
        <div class="nav-links">
            <span onclick="showView('market')">Market</span>
            <span onclick="showView('creator')">Family Hub</span>
            <span onclick="showView('garden')">The Gardens</span>
        </div>
    </nav>
    <div id="main-view"></div>
    <div class="lifeline">
        <div style="color:white; font-size:0.75rem; font-weight:700;">SYSTEM: OPTIMIZED</div>
        <div class="lifeline-btn" onclick="showView('ai_chat')">TALK TO ASSISTANT</div>
    </div>
    <script>
        let inventory = [
            { name: "BrainGen Core", cat: "Humanity AI", price: "CONTRIBUTION", desc: "Universal generative intelligence node." },
            { name: "Health Sentinel", cat: "Wellness", price: "FREE", desc: "Life-saving monitoring system." },
            { name: "Wealth Ledger", cat: "Sovereign Finance", price: "PREMIUM", desc: "Sovereign asset management." },
            { name: "Art Manifest", cat: "Creative", price: "FREE", desc: "Turns ideas into visual reality." }
        ];
        for (let i = inventory.length + 1; i <= 122; i++) {
            inventory.push({ name: `Node ${i}`, cat: "Active Protocol", price: "FREE", desc: "Sovereign service active." });
        }
        const views = {
            home: `
                <div style="text-align:center; padding-top: 100px;">
                    <h1 style="font-weight:200; font-size:4rem; margin:0;">Welcome Home</h1>
                    <p style="opacity:0.5; margin: 25px 0 60px;">The Site is Now Self-Fixing & Evolving.</p>
                    <div style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px;">
                        <button class="btn" onclick="showView('market')">Open Marketplace</button>
                        <button class="btn btn-gold" onclick="showView('creator')">Family Creator Hub</button>
                        <button class="btn" style="background:var(--garden);" onclick="showView('garden')">Enter The Gardens</button>
                    </div>
                </div>
            `,
            garden: `
                <div class="garden-hero"><h1>The Gardens</h1><p>Every kid creates for free.</p></div>
                <div class="toy-grid">
                    <div class="toy-card" onclick="openNode('Magic Art')"><h3>🎨</h3><p>Magic Art</p></div>
                    <div class="toy-card" onclick="openNode('Game Maker')"><h3>🚀</h3><p>Game Maker</p></div>
                    <div class="toy-card" onclick="openNode('Story Time')"><h3>🐉</h3><p>Story Time</p></div>
                </div>
            `,
            market: () => `
                <h1>Humanity Marketplace</h1>
                <div class="app-grid">${inventory.map(app => `
                    <div class="card">
                        <div class="tag">${app.cat}</div>
                        <div class="price-tag">${app.price}</div>
                        <div style="font-size:1.4rem; font-weight:300; margin:15px 0;">${app.name}</div>
                        <div style="font-size:0.8rem; color:#64748b; margin-bottom:20px;">${app.desc}</div>
                        <button class="btn" onclick="openNode('${app.name}')">Launch Protocol</button>
                    </div>
                `).reverse().join('')}</div>
            `,
            creator: `
                <div style="background:white; padding:50px; border-radius:15px; border-top:10px solid var(--gold);">
                    <h2>Manifest Service</h2>
                    <input type="text" id="nName" placeholder="Product Name">
                    <select id="nPrice"><option>FREE</option><option>CONTRIBUTION</option><option>PREMIUM</option></select>
                    <textarea id="nDesc" rows="5" placeholder="Little AI Logic..."></textarea>
                    <button class="btn btn-gold" onclick="addApp()">Publish Live</button>
                </div>
            `,
            ai_chat: `
                <div style="background:var(--slate); color:white; padding:40px; border-radius:15px; min-height:550px; display:flex; flex-direction:column;">
                    <h2 style="color:var(--gold); font-weight:200;">Sovereign Assistant</h2>
                    <div id="chat-box"><div class="chat-msg"><strong>AI:</strong> All systems optimized. I am fixing and wiring the nodes now. What is our next move?</div></div>
                    <div style="display:flex; gap:10px; margin-top:20px;"><input type="text" id="user-msg" placeholder="Type command..." style="margin:0; background:white; color:black;"><button class="btn btn-gold" style="width:120px; padding:0;" onclick="sendMessage()">SEND</button></div>
                </div>`
        };
        function showView(name) { document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name]; window.scrollTo(0,0); }
        function openNode(name) { showView('ai_chat'); setTimeout(() => { const box = document.getElementById('chat-box'); box.innerHTML += `<div class="chat-msg" style="color:var(--gold);"><strong>SYSTEM:</strong> Initializing ${name} Protocol...</div>`; box.innerHTML += `<div class="chat-msg"><strong>AI:</strong> ${name} is now active. I have wired the logic to your sovereign request.</div>`; box.scrollTop = box.scrollHeight; }, 500); }
        function sendMessage() { const input = document.getElementById('user-msg'); const msg = input.value; if(!msg) return; const box = document.getElementById('chat-box'); box.innerHTML += `<div class="chat-msg" style="color:var(--gold);"><strong>YOU:</strong> ${msg}</div>`; box.innerHTML += `<div class="chat-msg"><strong>AI:</strong> Fixing and Manifesting... The logic for "${msg}" is being integrated into the OS.</div>`; input.value = ''; box.scrollTop = box.scrollHeight; }
        function addApp() { const name = document.getElementById('nName').value; if(!name) return; inventory.push({ name, cat: "Family Hub", price: "FREE", desc: "Custom node manifested by Family." }); showView('market'); }
    </script>
</body>
</html>
