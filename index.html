<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE HEARTH | NEXUS ELITE</title>
    <style>
        :root { --gold: #c4a97a; --bg: #f8f9fb; --dark: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #222; overflow-x: hidden; padding-bottom: 80px; }

        header { background: #fff; padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .status { font-size: 0.6rem; font-weight: bold; color: #7a9068; display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: #7a9068; border-radius: 50%; box-shadow: 0 0 8px #7a9068; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* VIEWS */
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* THE MASTER CARD */
        .portal-hero {
            background: var(--dark); border-radius: 30px; padding: 40px 25px;
            color: #fff; margin-bottom: 30px; position: relative;
        }
        .price-tag { font-size: 2.5rem; font-weight: 200; color: var(--gold); margin: 15px 0; }
        .cta-btn { background: var(--gold); color: #fff; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        /* SHELVES & ITEMS */
        .shelf-header { font-size: 0.65rem; font-weight: 900; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin: 30px 0 10px; }
        .shelf { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 15px; scrollbar-width: none; }
        .item { min-width: 140px; background: #fff; border-radius: 25px; padding: 20px; border: 1px solid #eee; text-align: center; cursor: pointer; }
        
        /* DEPARTMENT DETAIL VIEW */
        .back-link { color: var(--gold); font-size: 0.7rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: inline-block; }
        .engine-list-item { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 10px; border-left: 4px solid var(--gold); }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-link { text-align: center; font-size: 0.6rem; font-weight: bold; color: #bbb; cursor: pointer; }
        .nav-link.active { color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; letter-spacing: 2px; color: var(--gold); font-size: 0.7rem;">HEARTH</div>
        <div class="status"><div class="dot"></div> MESH ACTIVE</div>
    </header>

    <div class="container">
        
        <div id="market-view" class="view active">
            <div class="portal-hero">
                <span style="font-size: 0.5rem; letter-spacing: 3px; color: var(--gold);">MASTER KEY</span>
                <h1 style="font-weight: 200;">Family Portal</h1>
                <div class="price-tag">197.00</div>
                <button class="cta-btn" onclick="showDept('Portal Manifest', ['Free Internet Node', 'Utility Cost Shield', 'Private Family Vault'])">Activate All</button>
            </div>

            <div class="shelf-header">Infrastructure</div>
            <div class="shelf">
                <div class="item" onclick="showDept('Healthcare', ['Nurse Flow AI', 'Clinic Sync', 'AFH Manager'])">🏥<br><br><b>Healthcare</b></div>
                <div class="item" onclick="showDept('Utilities', ['Mesh-Net Internet', 'Grid Sync', 'Water Sovereignty'])">📡<br><br><b>Utilities</b></div>
                <div class="item" onclick="showDept('Sovereign Law', ['Asset Shield', 'Trust Documents', 'Common Law Prep'])">⚖️<br><br><b>Law</b></div>
            </div>
        </div>

        <div id="dept-view" class="view">
            <span class="back-link" onclick="showMarket()">← BACK TO MARKET</span>
            <h2 id="dept-title" style="font-weight: 200; margin-bottom: 20px;"></h2>
            <div id="dept-list"></div>
        </div>

    </div>

    <nav>
        <div class="nav-link active" onclick="showMarket()">Market</div>
        <div class="nav-link">My Portal</div>
        <div class="nav-link">Settings</div>
    </nav>

    <script>
        function showDept(title, engines) {
            document.getElementById('market-view').classList.remove('active');
            document.getElementById('dept-view').classList.add('active');
            document.getElementById('dept-title').innerText = title;
            
            let listHtml = '';
            engines.forEach(eng => {
                listHtml += `
                    <div class="engine-list-item">
                        <div style="font-size: 0.8rem; font-weight: bold;">${eng}</div>
                        <div style="font-size: 0.6rem; color: #aaa; margin-top: 5px;">Sovereign Infrastructure Engine</div>
                    </div>
                `;
            });
            document.getElementById('dept-list').innerHTML = listHtml;
            window.scrollTo(0,0);
        }

        function showMarket() {
            document.getElementById('dept-view').classList.remove('active');
            document.getElementById('market-view').classList.add('active');
        }
    </script>

</body>
</html>
