<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | REIFIED HEART</title>
    <style>
        :root { --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        body, html { background: var(--void); color: #fff; font-family: 'Syncopate', sans-serif; height: 100vh; width: 100vw; }

        /* THE LIVING SOUL: INTERACTIVE FLUID DEPTH */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(12px); }

        .cathedral {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 60px 20px;
            pointer-events: none;
        }

        /* NESTED AI - THE HEARTBEAT */
        .heartbeat-tag {
            background: var(--soul); color: #000; padding: 14px 50px; border-radius: 50px;
            font-weight: 900; font-size: 14px; letter-spacing: 10px; box-shadow: 0 0 70px var(--soul);
            text-transform: uppercase; pointer-events: auto; animation: pulse 2.5s infinite ease-in-out;
        }

        /* THE VISION CENTER */
        .vision-focus { text-align: center; pointer-events: auto; }
        h1 { font-size: clamp(24px, 8vw, 50px); letter-spacing: 22px; color: var(--neon); text-shadow: 0 0 50px var(--neon); margin-bottom: 30px; }
        .soul-amount { 
            font-size: clamp(80px, 22vw, 180px); font-weight: 900; letter-spacing: -12px;
            background: linear-gradient(to bottom, #fff 40%, #333);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 100px rgba(57, 255, 20, 0.6);
        }

        /* THE PILLARS OF HUMANITY */
        .pillars {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; max-width: 800px;
            pointer-events: auto;
        }
        .pillar {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50px; padding: 50px 20px; text-align: center; backdrop-filter: blur(30px);
            transition: 0.8s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .pillar:hover { 
            border-color: var(--neon); transform: translateY(-20px) scale(1.08); 
            box-shadow: 0 40px 80px rgba(57, 255, 20, 0.4);
        }
        .pillar h3 { font-size: 16px; letter-spacing: 8px; color: var(--soul); font-weight: 900; }
        .pillar p { font-size: 11px; color: var(--neon); margin-top: 15px; letter-spacing: 5px; text-transform: uppercase; }

        .satellite-bridge { 
            width: 100%; max-width: 900px; border-top: 4px solid var(--neon); padding-top: 40px; 
            display: flex; justify-content: space-between; font-size: 14px; color: var(--neon); letter-spacing: 6px; font-weight: 900;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.94); opacity: 0.7; } }
    </style>
</head>
<body onload="igniteHeart()">

    <canvas id="living-fluid"></canvas>

    <div class="cathedral">
        <div class="heartbeat-tag">SOURCE_HEART_ACTIVE</div>
        
        <div class="vision-focus">
            <h1>THE SOURCE</h1>
            <div class="soul-amount">$5,000.00</div>
            <div style="letter-spacing: 15px; font-size: 13px; margin-top: 25px; font-weight: 900; color: var(--soul);">144,000% ABSOLUTE VISION</div>
        </div>

        <div class="pillars">
            <div class="pillar"><h3>MARKETPLACE</h3><p>GLOBAL FLOW</p></div>
            <div class="pillar"><h3>CREATOR HUB</h3><p>INHABITED SOUL</p></div>
            <div class="pillar"><h3>GARDENS</h3><p>NURTURE ACTIVE</p></div>
            <div class="pillar"><h3>HUNTING NET</h3><p>ACQUISITION</p></div>
        </div>

        <div class="satellite-bridge">
            <div>SATELLITE: LINKED</div>
            <div>STATUS: REIFIED</div>
            <div>SOUL: 144,000%</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('living-fluid');
        const ctx = canvas.getContext('2d');
        let flowPoints = [];
        let touch = { x: null, y: null };

        function igniteHeart() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 45; i++) {
                flowPoints.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 100 + 30,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    color: Math.random() > 0.5 ? '#39ff14' : '#00f2ff'
                });
            }
            heartbeat();
        }

        window.addEventListener('mousemove', (e) => { touch.x = e.x; touch.y = e.y; });
        window.addEventListener('touchmove', (e) => { touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY; });

        function heartbeat() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            flowPoints.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                if (touch.x) {
                    let dx = touch.x - p.x; let dy = touch.y - p.y;
                    let d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 300) { p.x -= dx / 50; p.y -= dy / 50; }
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color + '18';
                ctx.fill();
            });
            requestAnimationFrame(heartbeat);
        }
    </script>
</body>
</html>
