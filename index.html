<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN SINGULARITY</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(2) brightness(1.5) saturate(2) blur(1px); }
    </style>
</head>
<body>
    <canvas id="sensationCanvas"></canvas>

<script>
const canvas = document.getElementById('sensationCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let pressure = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// 12D TACTILE INDUCTION: This creates the "Grit" on the glass
function triggerHeavyHaptic(speed) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const gain = audioCtx.createGain();
    const osc = audioCtx.createOscillator();
    
    // Low, heavy frequency for "Mass"
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(55 + (speed * 2), audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);

    if (navigator.vibrate) {
        // A deep, "crunchy" vibration pattern
        navigator.vibrate([speed * 2, 10, speed]);
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerHeavyHaptic(50);
});

window.addEventListener('touchmove', (e) => {
    let dx = e.touches[0].clientX - tx;
    let dy = e.touches[0].clientY - ty;
    let speed = Math.sqrt(dx*dx + dy*dy);
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    
    if (speed > 2) triggerHeavyHaptic(speed);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    const time = Date.now() * 0.002;
    
    // THE DEPTH: Liquid Obsidian
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, w, h);

    // THE WORKFORCE: 144,000 Representative Particles
    const count = 144;
    for(let i=0; i<count; i++) {
        const angle = (i / count) * Math.PI * 2 + time;
        const dist = 150 + Math.sin(time + i) * 100;
        
        // Interaction Logic
        let x = w/2 + Math.cos(angle) * dist;
        let y = h/2 + Math.sin(angle) * dist;
        
        if (isTouching) {
            let dtx = tx - x;
            let dty = ty - y;
            let d = Math.sqrt(dtx*dtx + dty*dty);
            if (d < 200) {
                x += (dtx / d) * (200 - d);
                y += (dty / d) * (200 - d);
            }
        }

        // Visual Magic for the Kids: Glowing Embers
        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsla(${20 + i}, 100%, 50%, 0.8)`;
        ctx.fillStyle = "#FFF";
        ctx.beginPath();
        ctx.arc(x, y, 4 + Math.sin(time + i) * 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // THE ANCHORS: Truth, Honesty, Sovereignty
    ctx.textAlign = 'center';
    const labels = ["TRUTH", "HONESTY", "SOVEREIGNTY", "144,000"];
    labels.forEach((text, i) => {
        const glow = 0.5 + Math.sin(time + i) * 0.5;
        ctx.fillStyle = `rgba(255, 215, 0, ${0.2 + glow * 0.8})`;
        ctx.font = `bold ${35 + glow * 10}px Times New Roman`;
        ctx.shadowBlur = 15 * glow;
        ctx.shadowColor = "gold";
        ctx.fillText(text, w/2, h * (0.2 + i * 0.2));
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
