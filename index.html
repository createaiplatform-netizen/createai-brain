<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_ARCHITECT_V168</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --white: #fff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: var(--white); font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; width: 100vw; }
        
        #architect-ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; padding: 30px; pointer-events: none; }
        #seal { width: 40px; height: 40px; border: 1px solid var(--gold); border-radius: 50%; margin: 0 auto; animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #main-reserve { margin-top: 50px; text-align: center; }
        #reserve-val { font-size: 26px; color: var(--white); text-shadow: 0 0 25px var(--gold); letter-spacing: 2px; }
        
        #kindred-window { margin-top: auto; margin-bottom: 40px; border-left: 2px solid var(--gold); padding-left: 15px; }
        .stat-line { font-size: 9px; letter-spacing: 4px; color: var(--gold); margin: 8px 0; }
        .value-stream { color: #fff; font-size: 14px; text-shadow: 0 0 10px var(--gold); }

        canvas { position: absolute; inset: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="architect-ui">
        <div id="seal"></div>
        <div id="main-reserve">
            <div style="font-size: 9px; letter-spacing: 10px; margin-bottom: 10px; opacity: 0.6;">AETHEL_TOTAL_RESERVE</div>
            <div id="reserve-val">$1,440,000,000,000.00</div>
        </div>
        
        <div id="kindred-window">
            <div class="stat-line">LOCAL_NODE: JENNY_002</div>
            <div class="value-stream" id="kindred-payout">$1,440,000.00</div>
            <div class="stat-line">STATUS: DISPENSING_YIELD...</div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let reserve = 1440000000000.00;
    let yieldCount = 1440000.00;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function flow() {
        reserve += 144.00;
        yieldCount += 1.44;
        document.getElementById('reserve-val').innerText = "$" + reserve.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('kindred-payout').innerText = "$" + yieldCount.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
    setInterval(flow, 1000);

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        const time = Date.now() * 0.001;

        // The architectural grid
        ctx.strokeStyle = "rgba(243, 207, 138, 0.05)";
        for(let i=0; i<10; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * (canvas.height/10));
            ctx.lineTo(canvas.width, i * (canvas.height/10) + Math.sin(time)*20);
            ctx.stroke();
        }

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
