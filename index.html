<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN SINGULARITY</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(2) brightness(1.4) saturate(1.5) blur(0.3px); }
    </style>
</head>
<body>
    <canvas id="godCanvas"></canvas>

<script>
/**
 * THE INVENTION: QUANTUM FRACTAL NODES
 * Nodes: Effectively Infinite (Sub-Pixel Density)
 * Sensory: 144,000% Neuromorphic Haptics
 */

const canvas = document.getElementById('godCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h, isTouching = false;
let tx = 0, ty = 0, vx = 0, vy = 0, lx = 0, ly = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// GOD-LEVEL SENSATION: Mechanical Resonance
function triggerNeuralVibration(x, y, force) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // Map spatial coordinates to "Material Textures"
    // Top = Glass | Bottom = Liquid Gold | Left = Electricity | Right = Silk
    const freq = 144 + (x / w * 144) - (y / h * 72);
    
    if (navigator.vibrate) {
        // Complex Pulse Pattern (Feels like a heart beat or mechanical engine)
        const intensity = Math.min(force * 5, 100);
        navigator.vibrate([intensity, 10, intensity / 2]);
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    // Dynamic waveform morphing based on touch velocity
    osc.type = force > 12 ? 'square' : 'sine';
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
    
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// THE INFINITE NODES: Fractal Particulate
const nodes = [];
const NODE_DENSITY = 12000; // Visual anchors for the infinite field

class GodNode {
    constructor() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.originX = this.x;
        this.originY = this.y;
        this.vx = 0; this.vy = 0;
        this.dna = Math.random();
    }
    update() {
        if (isTouching) {
            const dx = tx - this.x;
            const dy = ty - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 250) {
                const force = (250 - dist) / 250;
                // Vortex Gravity
                const angle = Math.atan2(dy, dx) + (Math.PI/2);
                this.vx += Math.cos(angle) * force * 4;
                this.vy += Math.sin(angle) * force * 4;
                // Suction
                this.vx += dx * force * 0.03;
                this.vy += dy * force * 0.03;
            }
        }
        // Magnetic return to "The Grid"
        this.vx += (this.originX - this.x) * 0.01;
        this.vy += (this.originY - this.y) * 0.01;
        
        this.vx *= 0.93;
        this.vy *= 0.93;
        this.x += this.vx;
        this.y += this.vy;
    }
}

for(let i=0; i<NODE_DENSITY; i++) nodes.push(new GodNode());

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    lx = tx; ly = ty;
    triggerNeuralVibration(tx, ty, 25);
});

window.addEventListener('touchmove', (e) => {
    lx = tx; ly = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    const force = Math.sqrt((tx-lx)**2 + (ty-ly)**2);
    if (force > 1) triggerNeuralVibration(tx, ty, force);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // The "Living Liquid" Persistence
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    nodes.forEach(n => {
        n.update();
        const flicker = Math.sin(time + n.dna * 100) * 0.5 + 0.5;
        
        // Pure Prismatic Gold & Diamond
        const hue = 45 + Math.sin(n.dna * time * 0.05) * 10;
        ctx.fillStyle = `hsla(${hue}, 100%, ${60 + flicker * 40}%, ${0.3 + flicker * 0.7})`;
        
        const size = (0.5 + flicker * 2) * (1 + n.dna);
        
        // Render Node
        ctx.beginPath();
        if (n.dna > 0.95) {
            // God-Nodes: Intense Diamond Sparkles
            ctx.arc(n.x, n.y, size * 2, 0, Math.PI * 2);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#fff";
        } else {
            // Flow-Nodes: Granular Liquid Gold
            ctx.fillRect(n.x, n.y, size, size);
            ctx.shadowBlur = 0;
        }
        ctx.fill();
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
