<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_TOTALITY_V118</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cyan: #00f2ff; --green: #2ecc71; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #master { width: 100%; height: 100%; }
        .grain { position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 10; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .title { font-family: 'Cinzel'; font-size: 10vw; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 40px #000; }
        .quote { font-family: 'Great Vibes'; font-size: 2.2rem; color: var(--gold); margin-top: 10px; }
        #stats-bar { position: fixed; bottom: 8%; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 10px; letter-spacing: 2px; opacity: 0.6; z-index: 20; }
        #nexus-input { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); z-index: 100; display: none; pointer-events: auto; }
        #nexus-field { background: rgba(255,255,255,0.05); border: 1px solid var(--white); border-radius: 40px; padding: 15px 30px; color: var(--white); font-family: 'Cinzel'; font-size: 12px; width: 300px; text-align: center; backdrop-filter: blur(20px); }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div class="grain"></div>
        <div id="nexus-input"><input type="text" id="nexus-field" placeholder="MINT SOVEREIGN TRUTH..."></div>
        <div id="stats-bar">
            <span>LIQUIDITY: $<span id="val">0</span></span>
            <span>DIRECTIVE: THE_ALL</span>
            <span>GOVERNOR: AETHEL_PRIME</span>
        </div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title" id="t">SOURCE</h1>
            <p class="quote" id="q">The Totality</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'source', agents = [], isDown = false, mx = 0, my = 0;
    
    let liquidity = parseInt(localStorage.getItem('sov_v118_liq')) || 0;
    let assets = parseInt(localStorage.getItem('sov_v118_assets')) || 0;
    let intent = localStorage.getItem('sov_v118_intent') || "The Totality";

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    // Aethel Prime (The Governor)
    agents.push({ x: 0, y: 0, vx: 0, vy: 0, angle: 0, orbitDist: 70, color: '255, 255, 255', isAethel: true });
    for(let i=0; i<assets; i++) spawnAgent();

    function spawnAgent() {
        agents.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            vx: 0, vy: 0, angle: Math.random() * Math.PI * 2,
            orbitDist: 100 + Math.random() * 150, color: '255, 255, 255', isAethel: false
        });
    }

    function update() {
        // High-velocity Trillion Scale Yield
        liquidity += (assets * 1440) + 10000; 
        document.getElementById('val').innerText = liquidity.toLocaleString();
    }
    setInterval(update, 500);

    document.getElementById('nexus-field').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') { 
            intent = e.target.value.toUpperCase();
            document.getElementById('q').innerText = intent;
            assets++; spawnAgent(); save();
            e.target.value = ''; e.target.blur();
        }
    });

    function save() {
        localStorage.setItem('sov_v118_liq', liquidity);
        localStorage.setItem('sov_v118_assets', assets);
        localStorage.setItem('sov_v118_intent', intent);
    }

    function handle(e) {
        if(e.target.closest('#nexus-input')) return;
        isDown = true;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;
        view = (y < h/2) ? (x < w/2 ? 'market' : 'creator') : (x < w/2 ? 'source' : 'exchange');
        updateUI();
    }

    function updateUI() {
        const title = document.getElementById('t');
        const quote = document.getElementById('q');
        document.getElementById('nexus-input').style.display = (view === 'market') ? 'block' : 'none';
        let c = (view === 'market') ? 'var(--cyan)' : (view === 'creator') ? 'var(--green)' : 'var(--gold)';
        title.innerText = view.toUpperCase();
        title.style.color = c; quote.style.color = c;
        quote.innerText = (view === 'market') ? intent : (view === 'creator') ? "Living Values" : (view === 'exchange') ? "Harvest All" : "The Totality";
    }

    function track(e) { mx = e.clientX || (e.touches ? e.touches[0].clientX : mx); my = e.clientY || (e.touches ? e.touches[0].clientY : my); }
    function stop() { isDown = false; }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        let auraColor = (view === 'market') ? '0,242,255' : (view === 'creator') ? '46,204,113' : '255,191,0';
        let pulse = 100 + Math.sin(Date.now()*0.004)*30;
        
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse*3.5);
        g.addColorStop(0, 'rgba(255,255,255,0.9)');
        g.addColorStop(0.1, `rgba(${auraColor}, 0.4)`);
        g.addColorStop(1, 'transparent');
        
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, pulse*3.5, 0, Math.PI*2); ctx.fill();

        agents.forEach(a => {
            if (isDown) {
                let dx = mx - a.x; let dy = my - a.y;
                let d = Math.hypot(dx, dy);
                a.vx += dx / d * (a.isAethel ? 1.2 : 0.6); a.vy += dy / d * (a.isAethel ? 1.2 : 0.6);
            } else {
                a.angle += a.isAethel ? 0.005 : 0.012;
                let tx = cx + Math.cos(a.angle) * a.orbitDist;
                let ty = cy + Math.sin(a.angle) * a.orbitDist;
                a.vx += (tx - a.x) * 0.06; a.vy += (ty - a.y) * 0.06;
            }

            a.vx *= 0.9; a.vy *= 0.9; a.x += a.vx; a.y += a.vy;

            // Totality Color Shift
            if (a.isAethel) {
                let hue = (Date.now() / 20) % 360;
                a.color = `hsla(${hue}, 100%, 90%, 1)`;
            } else {
                if (a.y < cy) a.color = (a.x < cx) ? 'rgb(0, 242, 255)' : 'rgb(46, 204, 113)';
                else a.color = 'rgb(243, 207, 138)';
            }

            ctx.shadowBlur = a.isAethel ? 30 : 10; ctx.shadowColor = a.color;
            ctx.fillStyle = a.color;
            ctx.beginPath(); ctx.arc(a.x, a.y, a.isAethel ? 6 : 2.5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.strokeStyle = a.isAethel ? `rgba(255,255,255,0.3)` : `rgba(255,255,255,0.05)`;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(cx, cy); ctx.stroke();
        });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
