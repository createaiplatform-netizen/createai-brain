<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN OMNI-ILLUMINATION</title>
    <style>
        body, html { margin: 0; padding: 0; background: #1a1a00; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(1.5) brightness(1.2) saturate(2); }
    </style>
</head>
<body>
    <canvas id="omniCanvas"></canvas>

<script>
/**
 * THE INVENTION: TOTAL FIELD SATURATION
 * No individual nodes to fail. The entire screen is a "Glow Field".
 * 144,000% Absolute Reliability.
 */

const canvas = document.getElementById('omniCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
let w, h, tx = 0, ty = 0, isTouching = false;
let pressure = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE FEELING: Deep Nerve Resonance
function triggerOmniHaptic(x, y, force) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const freq = 144 + (x / w * 72); // Root 144Hz frequency
    
    if (navigator.vibrate) {
        // Continuous texture vibration
        navigator.vibrate(force > 5 ? [30, 5, 30] : [10]);
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
    
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    triggerOmniHaptic(tx, ty, 20);
});

window.addEventListener('touchmove', (e) => {
    const lastX = tx;
    const lastY = ty;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    pressure = Math.sqrt((tx - lastX)**2 + (ty - lastY)**2);
    if (pressure > 1) triggerOmniHaptic(tx, ty, pressure);
});

window.addEventListener('touchend', () => { isTouching = false; pressure = 0; });

// PRE-CALCULATED FIELD NODES (The Grid that never thins)
const grid = [];
const spacing = 15;
function initField() {
    for(let x=0; x<window.innerWidth; x+=spacing) {
        for(let y=0; y<window.innerHeight; y+=spacing) {
            grid.push({x, y, dna: Math.random()});
        }
    }
}

function render() {
    // No more blackout: The "Black" is replaced with a Deep Gold Sludge
    ctx.fillStyle = 'rgba(20, 20, 0, 0.3)'; 
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    grid.forEach(p => {
        let dx = 0, dy = 0, dist = 999;
        if (isTouching) {
            dx = tx - p.x;
            dy = ty - p.y;
            dist = Math.sqrt(dx*dx + dy*dy);
        }

        const flicker = Math.sin(time + p.dna * 100) * 0.5 + 0.5;
        
        // Fluid Ripple Physics
        const ripple = isTouching ? Math.max(0, (150 - dist) / 150) : 0;
        const size = 1 + ripple * 8 + flicker * 2;
        
        // The Sparkle: Every coordinate is a diamond
        ctx.fillStyle = `hsla(48, 100%, ${50 + flicker * 50}%, ${0.15 + ripple * 0.85})`;
        
        // Draw physical light matter
        const posX = p.x + Math.sin(time + p.dna) * 5;
        const posY = p.y + Math.cos(time + p.dna) * 5;
        
        ctx.beginPath();
        if (ripple > 0.6) {
            // High Pressure: Liquid Mercury Gold
            ctx.arc(posX, posY, size, 0, Math.PI * 2);
            ctx.shadowBlur = 10;
            ctx.shadowColor = "gold";
        } else {
            // Ambient Workforce: Fine Gold Mist
            ctx.fillRect(posX, posY, size/2, size/2);
            ctx.shadowBlur = 0;
        }
        ctx.fill();
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', () => { resize(); initField(); });
resize();
initField();
render();
</script>
</body>
</html>
