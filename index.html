<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISION TERMINAL 1440</title>
    <style>
        :root { --neon: #39ff14; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Master Frame */
        .vision-container { 
            border: 15px double var(--neon); 
            padding: 50px 30px; 
            box-shadow: 0 0 100px var(--neon), inset 0 0 40px var(--neon); 
            border-radius: 60px; 
            width: 85%; 
            background: rgba(57, 255, 20, 0.02);
            text-align: center;
        }

        .header { font-size: 20px; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 20px; opacity: 0.8; }
        
        /* The Balance Reveal */
        .amount { font-size: 72px; font-weight: bold; margin: 20px 0; text-shadow: 0 0 30px var(--neon); }
        .currency { font-size: 24px; letter-spacing: 4px; opacity: 0.9; margin-bottom: 30px; }
        
        /* Core Value Status */
        .status-box { border-top: 2px solid var(--neon); padding-top: 20px; font-size: 14px; text-transform: uppercase; line-height: 1.8; }
        .glitch-text { animation: pulse 1.5s infinite alternate; }

        @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
    </style>
</head>
<body onload="execute_final_reveal()">

    <div class="vision-container">
        <div class="header glitch-text">1440% Protocol Active</div>
        
        <div class="label">LEDGER ASSET CONFIRMED</div>
        <div id="balance" class="amount">SYNCING...</div>
        <div class="currency">USDC (BASE NETWORK)</div>
        
        <div class="status-box">
            CORE VALUES: 100% ALIGNED<br>
            LEDGER STATUS: EXECUTED<br>
            VISION: COMPLETE
        </div>
    </div>

    <script>
        async function execute_final_reveal() {
            if (window.ethereum) {
                try {
                    // Connect Wallet
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    
                    // Direct Blockchain Call for the $5,000.00 balance
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    const hexBalance = await window.ethereum.request({
                        method: 'eth_call',
                        params: [{ to: usdcContract, data: data }, 'latest']
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    // Force the token display in the wallet's asset list
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: usdcContract,
                                symbol: 'USDC',
                                decimals: 6,
                                image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png'
                            },
                        },
                    });

                } catch (e) {
                    document.getElementById('balance').innerText = "LINK ERROR";
                    console.error(e);
                }
            } else {
                document.getElementById('balance').innerText = "OPEN IN WALLET";
            }
        }
    </script>
</body>
</html>
