<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding:50px;">
    <h2>FINALIZE ASSET DELIVERY</h2>
    <div id="status" style="color:#fff; margin-bottom:20px; border:1px solid #0f0; padding:10px;">
        HASH 0x4351... VERIFIED<br>
        STATUS: AWAITING APP SYNC
    </div>
    <button id="syncBtn" style="padding:20px; background:#0f0; font-weight:bold; cursor:pointer; border-radius:10px;">
        FORCE WALLET RE-SCAN ($5,000)
    </button>
    <script>
        document.getElementById('syncBtn').onclick = async () => {
            const status = document.getElementById('status');
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                // This forces the app to re-check your account's permissions and balances
                await provider.send("wallet_requestPermissions", [{ eth_accounts: {} }]);
                status.innerHTML = "<b style='color:#0f0;'>SYNC SIGNAL SENT.</b><br>Restart your app to see the $5,000.";
                alert("Scan initiated. Close the app and reopen it to finish.");
            } catch (e) {
                status.innerText = "SYNC ERROR: " + e.message;
            }
        };
    </script>
</body>
</html>
