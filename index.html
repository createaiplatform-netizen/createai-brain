<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final System Push</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px 20px; margin: 0; }
        .terminal-box { border: 2px solid #0f0; padding: 30px; display: inline-block; width: 100%; max-width: 450px; border-radius: 15px; box-shadow: 0 0 25px rgba(0,255,0,0.5); background: #080808; }
        .header { font-size: 1.5em; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .status-row { margin: 15px 0; text-align: left; padding-left: 10%; font-size: 1.1em; }
        .val { color: #fff; font-weight: bold; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 12px; font-size: 1.4em; margin-top: 25px;
            box-shadow: 0 4px 15px rgba(0,255,0,0.4); 
        }
        button:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="terminal-box">
        <div class="header">FINAL SYSTEM PUSH</div>
        <div class="status-row">DEPLOYMENT: <span class="val">STABLE (FIXED)</span></div>
        <div class="status-row">SYNC: <span class="val">SUCCESSFUL</span></div>
        <div class="status-row">ALLOCATION: <span class="val">$5,000.00 USDC</span></div>
        <button id="mainAction">LINK TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('mainAction').onclick = async () => {
            if (window.ethereum) {
                try {
                    // Force the immediate identity handshake
                    await window.ethereum.request({ method: 'eth_requestAccounts' });

                    // Force the asset index pop-up directly to the home screen
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Success! The $5,000 asset has been indexed. Check your home screen.");
                } catch (e) {
                    // If the bridge hangs due to the Vercel error, force a refresh
                    window.location.reload();
                }
            } else {
                alert("Please open this page inside your Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
