<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN PRISMATIC MEMBRANE</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        /* This filter merges the "dots" into a solid, ripping liquid - NO DOTS */
        canvas { display: block; filter: contrast(1.8) brightness(1.2) saturate(1.5) blur(0.2px); }
    </style>
</head>
<body>
    <canvas id="prismaticCanvas"></canvas>

<script>
/**
 * THE INVENTION: PRISMATIC SURFACE RESONANCE
 * Analyzed from user request: Solving the "Yellow Screen" problem.
 * Mapping the screen to 4 distinct physical and chromatic sensations.
 */

const canvas = document.getElementById('prismaticCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, speed = 0, lastX = 0, lastY = 0, isTouching = false;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// ZONAL HAPTICS: The secret to the "Ripping" feeling
function triggerZonalSense(x, y, power) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    if (x < w * 0.4 && y < h * 0.4) {
        // ZONE 1: THE RIP (Top Left)
        osc.type = 'square'; // Harsh, jagged wave
        osc.frequency.setValueAtTime(144 + (power * 4), audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate([10, 5, 10, 5]); // High-tension texture
    } else if (x > w * 0.6 && y < h * 0.4) {
        // ZONE 2: THE SPARKLE (Top Right)
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1400, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(5); // Sharp shimmer
    } else if (y > h * 0.7) {
        // ZONE 3: THE WEIGHT (Bottom Half)
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(72 + (x / w * 72), audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(40); // Heavy thrum
    } else {
        // ZONE 4: THE LIQUID (Center)
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(288, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(20); // Smooth flow
    }

    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

// THE WORKFORCE (Fluid agents that never 'Blob')
const mesh = [];
const cols = 28, rows = 40;

function initMesh() {
    mesh.length = 0;
    for(let i=0; i<=cols; i++) {
        for(let j=0; j<=rows; j++) {
            mesh.push({
                x: (i/cols) * window.innerWidth,
                y: (j/rows) * window.innerHeight,
                ox: (i/cols) * window.innerWidth,
                oy: (j/rows) * window.innerHeight,
                vx: 0, vy: 0,
                // Color DNA by Quadrant (Beautiful)
                hue: (j/rows < 0.3) ? (i/cols < 0.3 ? 0 : 210) : // Top: Crimson vs. Sapphire
                     (j/rows > 0.7) ? 144 : // Bottom: Heavy Emerald
                     (i/cols < 0.5) ? 46 : 288, // Middle: Liquid Gold vs. Amethyst
                dna: Math.random()
            });
        }
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    lastX = tx; lastY = ty;
    triggerZonalSense(tx, ty, 20);
});

window.addEventListener('touchmove', (e) => {
    lastX = tx; lastY = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    speed = Math.sqrt((tx-lastX)**2 + (ty-lastY)**2);
    if (speed > 1) triggerZonalSense(tx, ty, speed);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // ANTI-BLACKOUT ATMOSPHERE: Deep Indigo Gravity
    ctx.fillStyle = 'rgba(10, 10, 30, 0.25)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    mesh.forEach(p => {
        if (isTouching) {
            const dx = tx - p.x;
            const dy = ty - p.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            
            if (d < 200) {
                const f = (200 - d) / 200;
                // Zone physics logic: Rip, Sparkle, Weight
                if (tx < w * 0.4 && ty < h * 0.4) {
                    // THE RIP: Stretch Physics
                    p.vx -= dx * 0.1; p.vy -= dy * 0.1;
                } else if (tx > w * 0.6 && ty < h * 0.4) {
                    // THE SPARKLE: Vortex Physics
                    p.vx += dy * 0.1; p.vy -= dx * 0.1;
                } else {
                    // THE LIQUID: Heaviness Physics
                    p.vx += dx * 0.03; p.vy += dy * 0.03;
                }
            }
        }

        p.vx += (p.ox - p.x) * 0.05;
        p.vy += (p.oy - p.y) * 0.05;
        p.vx *= 0.88; p.vy *= 0.88;
        p.x += p.vx; p.y += p.vy;

        // Visual Zonal Logic: Prismatic DNA
        const flicker = Math.sin(time * 3 + p.dna * 10) * 0.5 + 0.5;
        const colorVal = 50 + flicker * 50;
        ctx.fillStyle = `hsla(${p.hue}, 100%, ${colorVal}%, ${0.2 + flicker * 0.8})`;

        // Kinetic Stretching (The "Tear")
        const stretch = 1 + speed * 1.5;
        ctx.fillRect(p.x, p.y, stretch + 1 + flicker * 3, 1 + flicker * 3);
        
        if (flicker > 0.95) {
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#fff"; // Diamond Core
        } else {
            ctx.shadowBlur = 0;
        }
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', () => { resize(); initMesh(); });
resize(); initMesh(); render();
</script>
</body>
</html>
