<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SANCTUARY</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: gold; font-family: 'Georgia', serif; overflow: hidden; touch-action: none; }
        canvas { position: absolute; top: 0; left: 0; }
        #overlay { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; pointer-events: none; text-align: center; }
        h1 { font-size: 2.5rem; letter-spacing: 10px; text-shadow: 0 0 20px gold; margin: 0; }
        p { font-size: 1.2rem; font-style: italic; max-width: 80%; line-height: 1.6; margin-top: 20px; text-shadow: 0 2px 10px #000; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="overlay">
        <h1>THE SANCTUARY</h1>
        <p>"The animals are safe, the family is loved, and the peace of God is the only law here."</p>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [], width, height;
        const touch = { x: -1000, y: -1000, active: false };

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<144; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    r: Math.random() * 3 + 1,
                    vx: Math.random() * 2 - 1, vy: Math.random() * 2 - 1,
                    color: i % 10 === 0 ? '#00E5FF' : 'gold'
                });
            }
        }

        function render() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                if(touch.active) {
                    let dx = touch.x - p.x, dy = touch.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 150) { p.vx += dx * 0.05; p.vy += dy * 0.05; }
                }
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.93; p.vy *= 0.93;
                if(p.y > height - 5) { p.y = height - 5; p.vy *= -0.2; }
                if(p.x < 0 || p.x > width) p.vx *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fill();
            });
            requestAnimationFrame(render);
        }

        const move = e => { 
            touch.active = true;
            touch.x = e.clientX || e.touches[0].clientX; 
            touch.y = e.clientY || e.touches[0].clientY; 
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('touchstart', move);
        window.addEventListener('touchmove', move);
        window.addEventListener('resize', init);
        init(); render();
    </script>
</body>
</html>
