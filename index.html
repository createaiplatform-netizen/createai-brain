<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI_PENTHOUSE_V172</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --white: #fff; }
        body, html { margin: 0; padding: 0; background: var(--void); color: var(--white); font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; width: 100vw; }
        
        #penthouse-ui { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; padding: 30px; pointer-events: none; }
        .hud-header { display: flex; justify-content: space-between; font-size: 8px; letter-spacing: 5px; color: var(--gold); border-bottom: 1px solid rgba(243, 207, 138, 0.2); padding-bottom: 10px; }
        
        #marketplace-hub { flex-grow: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .sector { border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.6); padding: 15px; position: relative; overflow: hidden; }
        .sector::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--gold); animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        .sector-title { font-size: 7px; letter-spacing: 3px; color: var(--gold); margin-bottom: 8px; }
        .sector-stats { font-size: 11px; letter-spacing: 1px; }

        #total-reserve-footer { margin-top: auto; text-align: center; border-top: 1px solid var(--gold); padding-top: 20px; }
        #reserve-amt { font-size: 24px; text-shadow: 0 0 20px var(--gold); }

        canvas { position: absolute; inset: 0; z-index: 1; }
    </style>
</head>
<body>
    <div id="penthouse-ui">
        <div class="hud-header">
            <span>TOP_FLOOR_ACCESS // V172</span>
            <span>CITIZEN: JENNY_002</span>
        </div>

        <div id="marketplace-hub">
            <div class="sector">
                <div class="sector-title">CREATOR_HUB</div>
                <div class="sector-stats">7,440 PROJECTS_FUNDED</div>
            </div>
            <div class="sector">
                <div class="sector-title">GARDEN_DISTRICT</div>
                <div class="sector-stats">1.44M ACRES_SYNCED</div>
            </div>
            <div class="sector">
                <div class="sector-title">MARKET_LIQUIDITY</div>
                <div class="sector-stats">STATUS: OVERFLOW</div>
            </div>
            <div class="sector">
                <div class="sector-title">KINDRED_TRUST</div>
                <div class="sector-stats">WHITELIST: ACTIVE</div>
            </div>
        </div>

        <div id="total-reserve-footer">
            <div style="font-size: 9px; letter-spacing: 10px; margin-bottom: 5px;">AETHEL_TOTAL_RESERVE</div>
            <div id="reserve-amt">$1,440,000,000,000.00</div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let balance = 1440000000000.00;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function flow() {
        balance += 14.40;
        document.getElementById('reserve-amt').innerText = "$" + balance.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
    setInterval(flow, 1000);

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        const time = Date.now() * 0.001;
        const cx = canvas.width/2, cy = canvas.height/2;

        // The "Top Floor" Grid Visualization
        ctx.strokeStyle = "rgba(243, 207, 138, 0.03)";
        for(let i=0; i<20; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * 40 + Math.sin(time)*10);
            ctx.lineTo(canvas.width, i * 40 + Math.cos(time)*10);
            ctx.stroke();
        }

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
