<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HEARTH | LIVE</title>
    <style>
        :root { --gold: #c4a97a; --dark: #0a0a0a; --white: #faf9f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Garamond', serif; }
        body { background: var(--dark); color: var(--white); overflow-x: hidden; }

        header { 
            padding: 15px; background: #000; border-bottom: 1px solid rgba(196,169,122,0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .search-container {
            max-width: 90%; margin: 0 auto; display: flex;
            background: rgba(255,255,255,0.05); border-radius: 50px; padding: 5px 15px;
            border: 1px solid var(--gold); align-items: center;
        }
        .search-container input {
            flex: 1; background: transparent; border: none; color: #fff;
            padding: 8px; font-size: 0.9rem; outline: none;
        }

        .hero { text-align: center; padding: 40px 10px; }
        .hero h1 { font-size: 2rem; font-weight: 200; margin-bottom: 30px; letter-spacing: 2px; }

        .instant-keys { 
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }

        /* THE CARD FIX */
        .key-card {
            background: linear-gradient(145deg, #111, #050505); 
            border: 1px solid var(--gold);
            padding: 30px 10px; border-radius: 20px; 
            width: 90%; max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .key-card .tag { font-size: 0.6rem; letter-spacing: 3px; color: #777; margin-bottom: 15px; display: block; text-transform: uppercase; }
        
        /* THE PRICE FIX: Adding the $ and sizing it to fit */
        .price { 
            font-size: 3.5rem; /* Reduced from the massive size that caused the cutoff */
            font-weight: bold; 
            color: var(--white); 
            margin-bottom: 20px;
            display: block;
            width: 100%;
        }

        .cta-button {
            background: var(--gold); color: #000; border: none;
            padding: 15px 40px; border-radius: 50px; font-weight: bold;
            text-transform: uppercase; font-size: 0.8rem; cursor: pointer;
            width: 80%;
        }

        .catalog-title { text-align: center; margin-top: 50px; font-size: 0.6rem; letter-spacing: 5px; color: var(--gold); opacity: 0.5; }
    </style>
</head>
<body>

    <header>
        <div class="search-container">
            <input type="text" placeholder="Search: Family, Cafe, Hospital...">
            <span>🔍</span>
        </div>
    </header>

    <section class="hero">
        <h1>The Hearth</h1>
        
        <div class="instant-keys">
            <div class="key-card">
                <span class="tag">Private Family Hub</span>
                <div class="price">97</div>
                <button class="cta-button">Get Your Key</button>
            </div>

            <div class="key-card">
                <span class="tag">Sovereign Biz Engine</span>
                <div class="price">97</div>
                <button class="cta-button">Claim Your Engine</button>
            </div>
        </div>
    </section>

    <div class="catalog-title">STANDING LAW INFRASTRUCTURE</div>

</body>
</html>
