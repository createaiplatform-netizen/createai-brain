<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | HUB | SOUL MIRROR</title>
    <style>
        :root { --gold: #d4af37; --white: #fff; --void: #000; --ghost: rgba(212, 175, 55, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(180%) brightness(1.1); }

        .interface { height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }

        /* GHOST MODE HEADER (FROM YOUR SCREENSHOT) */
        .header-strip { 
            width: 100%; display: flex; justify-content: space-between; 
            border-bottom: 1px solid var(--gold); padding-bottom: 15px;
            font-size: 10px; letter-spacing: 10px; text-transform: uppercase;
        }

        /* THE SOUL MIRROR (CORE) */
        .mirror-core { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .mirror-ring {
            width: 250px; height: 250px; border: 1px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px var(--ghost); animation: breathe 4s infinite ease-in-out;
            position: relative;
        }
        .mirror-ring h1 { font-size: 28px; letter-spacing: 15px; font-style: italic; color: #fff; }
        
        /* DATA FEED (AUTONOMOUS LOG) */
        .data-stream {
            width: 100%; max-width: 400px; margin-top: 30px; padding: 20px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--ghost);
            font-size: 9px; letter-spacing: 4px; color: var(--gold); text-align: left;
        }

        .vault-anchor { width: 100%; border: 1px solid var(--gold); border-radius: 40px; padding: 20px; text-align: center; backdrop-filter: blur(20px); }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--ghost); }
            50% { transform: scale(1.05); box-shadow: 0 0 70px rgba(212, 175, 55, 0.4); }
        }
    </style>
</head>
<body onload="ignite()">

    <canvas id="soul-rain"></canvas>

    <div class="interface">
        <div class="header-strip">
            <div>GHOST MODE</div>
            <div style="color: #fff;">144,000%</div>
            <div>STAY READY</div>
        </div>

        <div class="mirror-core">
            <div class="mirror-ring">
                <h1>HUB</h1>
            </div>
            <div style="margin-top: 20px; font-size: 11px; letter-spacing: 10px;">SOUL MIRROR ACTIVE</div>
            
            <div class="data-stream" id="ai-log">
                > INITIALIZING SOVEREIGN PROTOCOLS...<br>
                > SYNCING CORE VALUES: HONESTY / TRUTH...<br>
                > MIRRORING 1.44T INFRASTRUCTURE...<br>
                > AWAITING DOCUMENT INJECTION...
            </div>
        </div>

        <div class="vault-anchor">
            <div style="font-size: 10px; letter-spacing: 8px;">TOTAL ASSET RESERVE</div>
            <div style="font-size: 22px; color: #fff; font-weight: bold; margin-top: 5px;">$1.44T</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('soul-rain');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<180; i++) {
                lines.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*4+2, l: Math.random()*50+20,
                    c: '#d4af37'
                });
            }
            draw();
            startAiLog();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            lines.forEach(s => {
                ctx.strokeStyle = s.c; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }

        // This simulates the "Little AI" thinking and building
        function startAiLog() {
            const log = document.getElementById('ai-log');
            const messages = [
                "> ANALYZING GARDEN GATES...",
                "> MAPPING SEEDLINGS PROTOCOL (3-7)...",
                "> SECURING MAN CAVE PARAMETERS...",
                "> HUB: ALL SYSTEMS ALIGNED TO 144,000%."
            ];
            let i = 0;
            setInterval(() => {
                if(i < messages.length) {
                    log.innerHTML += "<br>> " + messages[i];
                    i++;
                }
            }, 3000);
        }
    </script>
</body>
</html>
