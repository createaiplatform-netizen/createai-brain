<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | DOME GRID</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; box-sizing: border-box; }
        .header { color: #d4af37; border-bottom: 2px solid #d4af37; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }

        .grid-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr;
            gap: 15px; 
            height: 60vh;
            pointer-events: auto;
        }
        
        .sector { 
            border: 1px solid rgba(212,175,55,0.6); 
            background: rgba(0,0,0,0.9); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: #fff;
            transition: 0.1s;
            text-align: center;
            border-radius: 8px;
        }
        
        .sector:active { background: #fff; color: #000; transform: scale(1.05); }
        .sector b { font-size: 20px; letter-spacing: 5px; display: block; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: #000; text-align: center; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; }
        .footer { text-align: center; color: #fff; font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #d4af37; }
    </style>
</head>
<body onload="init()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>PROTOCOL: DOME</div><div>144,000%</div></div>
        
        <div class="grid-container">
            <div class="sector" onclick="hit('MARKET', '#00f2ff')"><b>MKT</b></div>
            <div class="sector" onclick="hit('HUB', '#d4af37')"><b>HUB</b></div>
            <div class="sector" onclick="hit('GARDE', '#fff')"><b>GRD</b></div>
            <div class="sector" onclick="hit('NET', '#39ff14')"><b>NET</b></div>
        </div>

        <div class="footer">$1.44T</div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <h1 id="ot" style="font-size: 55px; letter-spacing: 12px; margin: 0;"></h1>
        <p style="color: #d4af37; letter-spacing: 5px;">SYNC ACTIVE</p>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let particles = []; let theme = '#d4af37';

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<60; i++) particles.push({x: Math.random()*canvas.width, y: canvas.height, v: Math.random()*12+8, r: 2});
            loop();
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = theme;
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.v; if(p.y < -10) p.y = canvas.height;
            });
            requestAnimationFrame(loop);
        }

        function hit(name, color) {
            theme = color;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('ot').innerText = name;
            document.getElementById('ot').style.color = color;
        }
    </script>
</body>
</html>
