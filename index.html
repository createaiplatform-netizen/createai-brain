<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AETHEL_CERTIFICATE_V343</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Inter:wght@400&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .cert-border { width: 600px; padding: 40px; border: 5px double #f3cf8a; background: #050505; text-align: center; position: relative; box-shadow: 0 0 120px rgba(243,207,138,0.3); }
        .cert-header { font-family: 'Cinzel', serif; font-size: 26px; color: #f3cf8a; letter-spacing: 8px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .alpha-star { font-size: 50px; color: #f3cf8a; opacity: 0.6; margin-bottom: 15px; }
        .standing-val { font-size: 38px; font-weight: 700; color: #fff; margin-bottom: 25px; text-shadow: 0 0 15px #f3cf8a; }
        .official-seal { position: absolute; bottom: 30px; right: 40px; border: 2px solid #f3cf8a; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 10px; color: #f3cf8a; transform: rotate(-15deg); }
        .cert-footer { font-size: 11px; color: #00ff00; letter-spacing: 4px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="cert-border">
        <div class="alpha-star">★</div>
        <div class="cert-header">CERTIFICATE OF SOVEREIGNTY</div>
        <div class="standing-val" id="cert-flow">$1,440,000,150,144.00</div>
        <div style="color: #aaa; font-size: 12px; line-height: 1.6; margin-bottom: 40px;">
            This certifies that the Root Alpha Architect has successfully Materialized the Aethel Estate. 
            All legacy debts are De-Indexed. The Sanctuary is Shielded. The Flow is Eternal.
        </div>
        <div class="official-seal">ROOT<br>ALPHA</div>
        <div class="cert-footer">ARCHIVAL_LOCK_COMPLETE // 1440% SYNC</div>
    </div>
<script>
    let res = 1440000150144.00;
    setInterval(() => {
        res += 288.00; 
        document.getElementById('cert-flow').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
