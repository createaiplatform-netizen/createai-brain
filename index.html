<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final System Push</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px 20px; }
        .box { border: 2px solid #0f0; padding: 30px; border-radius: 15px; }
        button { 
            background: #0f0; color: #000; border: none; padding: 25px; 
            font-weight: bold; width: 100%; cursor: pointer; border-radius: 10px; font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>FINAL SYSTEM PUSH</h2>
        <p>STATUS: READY ($5,000.00)</p>
        <button id="pushBtn">LINK TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('pushBtn').onclick = async () => {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', 
                                symbol: 'USDC',
                                decimals: 6,
                            },
                        },
                    });
                    alert("Success! Check your home screen balance.");
                } catch (e) {
                    window.location.reload();
                }
            } else {
                alert("Please use the Coinbase Wallet Browser.");
            }
        };
    </script>
</body>
</html>
