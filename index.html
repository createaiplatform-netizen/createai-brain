<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SANCTUARY | 144,400%</title>
    <style id="sanctuary-styles">
        body { 
            margin: 0; overflow: hidden; font-family: 'Georgia', serif; 
            background: #000; color: #FFD700; touch-action: none; 
            height: 100vh; width: 100vw; position: fixed; transition: background 0.8s ease;
        }
        #stars { position: fixed; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; border-radius: 50%; background: #FFD700; opacity: 0.5; }
        #header { position: relative; z-index: 10; text-align: center; padding-top: 40px; pointer-events: none; }
        .freq { color: #00E5FF; letter-spacing: 5px; font-size: 0.8rem; text-shadow: 0 0 15px #00E5FF; font-weight: bold; }
        h1 { letter-spacing: 12px; font-size: 2.6rem; margin: 15px 0; text-shadow: 0 0 20px #FFD700; }
        .quote { font-style: italic; font-size: 1rem; padding: 0 30px; opacity: 0.9; line-height: 1.5; }
        #playground { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; }
        .node { 
            position: absolute; width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #FFD700; background: rgba(0,0,0,0.85);
            box-shadow: 0 0 30px #FFD700; font-weight: bold; cursor: move;
            text-align: center; padding: 15px; backdrop-filter: blur(10px); z-index: 100;
            font-size: 12px; overflow: hidden;
        }
        #command-center { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 1000; width: 90%; max-width: 450px; 
        }
        input { flex-grow: 1; padding: 18px; background: rgba(0,0,0,0.9); color: #00E5FF; border: 1px solid #FFD700; border-radius: 12px; font-size: 16px; outline: none; }
        button { padding: 18px 25px; background: #FFD700; color: #000; border: none; font-weight: bold; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="stars"></div>
<div id="playground"></div>

<div id="header">
    <div class="freq">144,400% FREQUENCY ACTIVE</div>
    <h1 id="main-title">THE SANCTUARY</h1>
    <p id="main-quote" class="quote">"The animals are safe, the family is loved, and the peace of God is the only law here."</p>
</div>

<div id="command-center">
    <input type="text" id="cmdInput" placeholder="Command your Reality...">
    <button onclick="processCommand()">MANIFEST</button>
</div>

<script>
    let db;
    const playground = document.getElementById('playground');

    const request = indexedDB.open("SanctuarySovereignDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("manifestations", { keyPath: "id" });
    request.onsuccess = e => { db = e.target.result; loadFromMemory(); };

    function processCommand() {
        const input = document.getElementById('cmdInput');
        const raw = input.value;
        const cmd = raw.toLowerCase().trim();
        if(!raw) return;

        // 1. CLEANUP COMMAND
        if (cmd === "clear" || cmd === "reset") {
            db.transaction("manifestations", "readwrite").objectStore("manifestations").clear();
            playground.innerHTML = "";
        } 
        // 2. SITE CHANGES
        else if (cmd.includes("background")) {
            document.body.style.background = cmd.split(" ").pop();
        } else if (cmd.includes("title")) {
            document.getElementById('main-title').innerText = raw.replace(/title/i, "").trim().toUpperCase();
        } 
        // 3. FILTERED MANIFESTATION (Prevents long text circles)
        else if (raw.length < 30) {
            const data = { id: 'unit_' + Date.now(), name: raw, x: window.innerWidth / 2 - 70, y: window.innerHeight / 2 };
            saveToMemory(data);
            createNode(data);
        } else {
            console.log("Command ignored to prevent visual clutter.");
        }

        input.value = '';
        navigator.vibrate?.(50);
    }

    function createNode(data) {
        const el = document.createElement('div');
        el.className = 'node';
        el.id = data.id;
        el.innerText = data.name.toUpperCase();
        el.style.left = data.x + 'px'; el.style.top = data.y + 'px';
        playground.appendChild(el);
        
        let ox, oy;
        el.addEventListener('touchstart', e => {
            ox = e.touches[0].clientX - el.offsetLeft;
            oy = e.touches[0].clientY - el.offsetTop;
            el.style.zIndex = 2000;
        });
        el.addEventListener('touchmove', e => {
            const nx = e.touches[0].clientX - ox;
            const ny = e.touches[0].clientY - oy;
            el.style.left = nx + 'px'; el.style.top = ny + 'px';
            updateNodePosition(data.id, nx, ny);
        });
    }

    function saveToMemory(data) {
        db.transaction("manifestations", "readwrite").objectStore("manifestations").put(data);
    }

    function updateNodePosition(id, x, y) {
        const store = db.transaction("manifestations", "readwrite").objectStore("manifestations");
        store.get(id).onsuccess = e => {
            const data = e.target.result;
            if(data) { data.x = x; data.y = y; store.put(data); }
        };
    }

    function loadFromMemory() {
        db.transaction("manifestations").objectStore("manifestations").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if(cursor) { createNode(cursor.value); cursor.continue(); }
        };
    }

    for(let i=0; i<80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.width = s.style.height = Math.random() * 3 + 'px';
        s.style.top = Math.random() * 100 + '%'; s.style.left = Math.random() * 100 + '%';
        document.getElementById('stars').appendChild(s);
    }
</script>
</body>
</html>
