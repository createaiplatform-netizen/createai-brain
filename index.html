<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE HEARTH | LIVE V1.0.9</title>
    <style>
        :root { --gold: #c4a97a; --dark: #0a0a0a; --white: #faf9f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Garamond', serif; }
        body { background: var(--dark); color: var(--white); overflow-x: hidden; width: 100vw; }

        .container { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; text-align: center;
        }

        .key-card {
            background: #000; border: 1px solid var(--gold);
            margin-bottom: 25px; padding: 30px 10px; border-radius: 15px;
            width: 100%; max-width: 320px;
            box-shadow: 0 0 20px rgba(196, 169, 122, 0.1);
        }

        .tag { font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 10px; display: block; text-transform: uppercase; opacity: 0.7; }

        /* THE HARD FIX: Ensuring the full number stays inside the card */
        .price-box {
            font-size: 2.8rem; /* Scaled down for safe mobile fit */
            font-weight: bold;
            color: #fff;
            margin: 15px 0;
            width: 100%;
            display: block;
        }

        .buy-btn {
            background: var(--gold); color: #000; border: none;
            padding: 12px 0; width: 80%; border-radius: 50px;
            font-weight: bold; text-transform: uppercase; font-size: 0.7rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="font-weight: 200; margin-bottom: 30px; letter-spacing: 5px;">THE HEARTH</h1>

        <div class="key-card">
            <span class="tag">Private Family Hub</span>
            <div class="price-box">97</div>
            <button class="buy-btn">Get Your Key</button>
        </div>

        <div class="key-card">
            <span class="tag">Sovereign Biz Engine</span>
            <div class="price-box">97</div>
            <button class="buy-btn">Claim Your Engine</button>
        </div>
    </div>

</body>
</html>
