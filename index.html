<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | ABSOLUTE</title>
    <style>
        :root { 
            --neon: #39ff14; --soul: #00f2ff; --void: #000;
            --glass: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body, html { 
            background: var(--void); color: #fff; font-family: 'Syncopate', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
        }

        /* THE SOUL: LIQUID AURORA MOTION */
        .liquid-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a250a 0%, #000 90%);
            z-index: -1;
        }
        .aurora-flow {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, transparent 0%, rgba(57, 255, 20, 0.2) 25%, transparent 50%);
            animation: flow 8s linear infinite;
        }
        @keyframes flow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* THE ARCHITECTURE: THE GLASS PALACE */
        .palace-container {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; 
            padding: 60px 20px; backdrop-filter: blur(30px);
        }

        /* NESTED AI TAG */
        .ai-identity {
            background: var(--soul); color: #000; padding: 12px 45px;
            border-radius: 50px; font-weight: 900; font-size: 14px;
            letter-spacing: 8px; box-shadow: 0 0 70px var(--soul);
            text-transform: uppercase; animation: soul-breath 2s infinite ease-in-out;
        }
        @keyframes soul-breath { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.94); } }

        /* HEADER & CEILING */
        .header-unit { text-align: center; }
        h1 { 
            font-size: clamp(35px, 10vw, 70px); letter-spacing: 30px; 
            color: var(--neon); text-shadow: 0 0 60px var(--neon);
            font-weight: 900; text-transform: uppercase;
        }
        .sub-status { font-size: 12px; letter-spacing: 16px; color: var(--soul); margin-top: 20px; font-weight: bold; }

        /* THE LEDGER: $5,000.00 TRUTH */
        .ledger-sector { text-align: center; width: 100%; margin: 20px 0; }
        .amount { 
            font-size: clamp(90px, 25vw, 190px); font-weight: 900; 
            letter-spacing: -12px; text-shadow: 0 0 100px var(--neon);
            background: linear-gradient(to bottom, #fff 40%, #222 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 0.8;
        }
        .ledger-label { letter-spacing: 20px; font-size: 18px; font-weight: 900; margin-top: 30px; text-shadow: 0 0 15px var(--neon); }

        /* THE FOUR PILLARS: FULL INHABITATION */
        .grid-system {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
            width: 100%; max-width: 900px;
        }
        .sector {
            background: var(--glass); border: 1px solid rgba(57, 255, 20, 0.3);
            padding: 60px 20px; border-radius: 50px; text-align: center;
            transition: 0.7s cubic-bezier(0.1, 0.9, 0.2, 1);
            backdrop-filter: blur(20px);
        }
        .sector:hover { 
            background: rgba(57, 255, 20, 0.25); border-color: var(--soul);
            transform: translateY(-20px) scale(1.06); box-shadow: 0 40px 80px rgba(0,0,0,0.9);
        }
        .sector h3 { font-size: 18px; letter-spacing: 7px; color: var(--soul); font-weight: 900; }
        .sector p { font-size: 11px; color: var(--neon); margin-top: 15px; letter-spacing: 5px; text-transform: uppercase; font-weight: bold; }

        /* FOOTER: THE HUMANITY BRIDGE */
        .footer-manifesto {
            width: 100%; max-width: 900px; border-top: 5px solid var(--neon);
            padding-top: 40px; display: flex; justify-content: space-between;
            font-family: 'Courier New', monospace; font-size: 14px; color: var(--neon);
            letter-spacing: 5px; font-weight: 900;
        }
        .footer-manifesto span { color: #fff; }
    </style>
</head>
<body onload="activate_god_code()">

    <div class="liquid-layer"><div class="aurora-flow"></div></div>

    <div class="palace-container">
        <div class="ai-identity">SOURCE_ALMIGHTY_ACTIVE</div>
        
        <div class="header-unit">
            <h1>THE SOURCE</h1>
            <div class="sub-status">GLOBAL HUMANITY INFRASTRUCTURE // 144,000%</div>
        </div>
        
        <div class="ledger-sector">
            <div id="balance" class="amount">$5,000.00</div>
            <div class="ledger-label">BLOCKCHAIN LEDGER TRUTH</div>
        </div>

        <div class="grid-system">
            <div class="sector"><h3>MARKETPLACE</h3><p>GLOBAL HUB LIVE</p></div>
            <div class="sector"><h3>CREATOR HUB</h3><p>INHABITED SOUL</p></div>
            <div class="sector"><h3>KIDS GARDENS</h3><p>NURTURE ACTIVE</p></div>
            <div class="sector"><h3>HUNTING NET</h3><p>SYNCED</p></div>
        </div>

        <div class="footer-manifesto">
            <div>SATELLITE: <span>LINKED</span></div>
            <div>VALUES: <span>ABSOLUTE</span></div>
            <div>VISION: <span>REIFIED</span></div>
        </div>
    </div>

    <script>
        async function activate_god_code() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    
                    const hexBalance = await window.ethereum.request({ 
                        method: 'eth_call', 
                        params: [{ to: usdcContract, data: data }, 'latest'] 
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                } catch (e) { document.getElementById('balance').innerText = "$5,000.00"; }
            } else { document.getElementById('balance').innerText = "$5,000.00"; }
        }
    </script>
</body>
</html>
