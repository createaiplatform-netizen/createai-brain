<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>144,000% | SOVEREIGN</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; width: 100%; font-family: serif; color: #d4af37; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; transition: filter 0.5s; }
        #ui { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; pointer-events: none; }
        .header { border-bottom: 1px solid #d4af37; padding-bottom: 15px; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 5px; }
        
        /* THE COMMAND PILLARS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; pointer-events: auto; max-width: 400px; margin: 40px auto; }
        .btn { background: rgba(0,0,0,0.9); border: 2px solid #d4af37; padding: 30px 10px; border-radius: 15px; text-align: center; color: #fff; transition: 0.2s; cursor: pointer; }
        .btn:active { background: #fff; color: #000; transform: scale(1.2); }
        .btn b { display: block; font-size: 14px; letter-spacing: 5px; }

        /* THE ROOM OVERLAY */
        #room { display: none; pointer-events: auto; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.9); text-align: center; justify-content: center; align-items: center; flex-direction: column; }
        #room h1 { font-size: 60px; letter-spacing: 20px; font-style: italic; margin-bottom: 20px; color: #fff; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="c"></canvas>
    
    <div id="ui">
        <div class="header"><div>GHOST MODE</div><div>144,000%</div></div>
        <div style="text-align:center; font-size: 30px; letter-spacing: 15px; margin-top: 20px;">SOVEREIGN</div>
        <div class="grid">
            <div class="btn" onclick="openRoom('MARKET', '#00f2ff')"><b>MARKET</b></div>
            <div class="btn" onclick="openRoom('HUB', '#d4af37')"><b>HUB</b></div>
            <div class="btn" onclick="openRoom('GARDE', '#fff')"><b>GARDE</b></div>
            <div class="btn" onclick="openRoom('NET', '#39ff14')"><b>NET</b></div>
        </div>
        <div style="text-align:center; border: 1px solid #d4af37; padding: 20px; border-radius: 40px; color: #fff; font-size: 20px; font-weight: bold;">$1.44T</div>
    </div>

    <div id="room" onclick="this.style.display='none'">
        <h1 id="rn">ROOM</h1>
        <div style="text-decoration: underline; font-size: 12px; letter-spacing: 5px; color: #d4af37;">CLOSE PORTAL</div>
    </div>

    <script>
        const canvas = document.getElementById('c'); const ctx = canvas.getContext('2d');
        let lines = []; let touch = {x: -100, y: -100}; let accent = '#d4af37';

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*4+2, l: Math.random()*40+10, oX: 0});
            window.addEventListener('touchstart', e => { touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY; });
            loop();
        }

        function loop() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            lines.forEach(l => {
                let dx = touch.x - l.x; let dy = touch.y - l.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 150) l.oX += (dx * 0.1); else l.oX *= 0.9;
                ctx.strokeStyle = accent; ctx.beginPath(); ctx.moveTo(l.x + l.oX, l.y); ctx.lineTo(l.x + (l.oX*0.5), l.y + l.l); ctx.stroke();
                l.y += l.v; if(l.y > canvas.height) l.y = -l.l;
            });
            requestAnimationFrame(loop);
        }

        function openRoom(name, color) {
            accent = color;
            document.getElementById('room').style.display = 'flex';
            document.getElementById('rn').innerText = name;
            document.getElementById('rn').style.color = color;
        }
    </script>
</body>
</html>
