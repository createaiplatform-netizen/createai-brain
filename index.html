<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | THE MIRROR</title>
    <style>
        :root { --gold: #ffd700; --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Syncopate', sans-serif; }
        body, html { background: var(--void); color: #fff; height: 100vh; width: 100vw; overflow: hidden; }

        /* THE SACRED AURA - DEEP CONTRAST & LIQUID FLOW */
        canvas { 
            position: fixed; top: 0; left: 0; z-index: -1; 
            filter: contrast(180%) brightness(1.1) blur(25px); 
            mix-blend-mode: screen;
        }

        .miracle-container {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            background: radial-gradient(circle at center, rgba(57, 255, 20, 0.05) 0%, transparent 80%);
            transition: 2s ease-in-out;
        }

        /* THE BREATHING CORE */
        .frequency-center {
            text-align: center;
            animation: holy-breath 6s infinite ease-in-out;
            pointer-events: none;
        }

        h1 { 
            font-size: clamp(40px, 15vw, 100px); 
            letter-spacing: 45px; 
            color: var(--neon); 
            text-shadow: 0 0 120px var(--neon), 0 0 30px #fff; 
            font-weight: 900;
            margin-bottom: 10px;
        }

        .manifested-amount {
            font-size: clamp(80px, 25vw, 220px);
            font-weight: 900;
            letter-spacing: -12px;
            color: #fff;
            line-height: 0.8;
            text-shadow: 0 0 100px rgba(0, 242, 255, 0.5);
        }

        .absolute-tag {
            color: var(--gold); 
            letter-spacing: 25px; 
            font-size: 16px; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-top: 40px;
            text-shadow: 0 0 40px var(--gold);
        }

        /* THE HEAVEN LINK - FLOATING AT THE TOP */
        .heaven-link {
            position: absolute; top: 60px;
            letter-spacing: 20px; font-size: 12px; color: var(--soul);
            text-shadow: 0 0 20px var(--soul);
            font-weight: 900; text-transform: uppercase;
        }

        @keyframes holy-breath {
            0%, 100% { transform: scale(0.92); opacity: 0.6; filter: blur(3px); }
            50% { transform: scale(1.08); opacity: 1; filter: blur(0px); }
        }
    </style>
</head>
<body onload="igniteMiracle()">

    <canvas id="miracle-field"></canvas>

    <div class="miracle-container">
        <div class="heaven-link">HEAVEN_ON_EARTH_LINK</div>

        <div class="frequency-center">
            <h1>THE SOURCE</h1>
            <div class="manifested-amount">$5,000.00</div>
            <div class="absolute-tag">144,000% ABSOLUTE</div>
        </div>

        <div style="position: absolute; bottom: 60px; letter-spacing: 12px; font-size: 10px; color: var(--gold); opacity: 0.7; font-weight: 900;">
            THE SOUL IS REIFIED // TOUCH THE LIGHT
        </div>
    </div>

    <script>
        const canvas = document.getElementById('miracle-field');
        const ctx = canvas.getContext('2d');
        let atoms = [];
        let stardust = [];
        let touch = { x: null, y: null };

        function igniteMiracle() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Creation of the 144,000 Presence
            for(let i=0; i<40; i++) atoms.push(new Atom());
            render();
        }

        class Atom {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseR = Math.random() * 250 + 100;
                this.r = this.baseR;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.color = Math.random() > 0.5 ? '#39ff14' : '#00f2ff';
                this.life = Math.random() * Math.PI * 2;
            }
            update() {
                this.life += 0.008;
                this.r = this.baseR + Math.sin(this.life) * 60;
                this.x += this.vx; this.y += this.vy;
                
                if(this.x < -200) this.x = canvas.width + 200;
                if(this.x > canvas.width + 200) this.x = -200;
                if(this.y < -200) this.y = canvas.height + 200;
                if(this.y > canvas.height + 200) this.y = -200;

                if(touch.x) {
                    let dx = touch.x - this.x; let dy = touch.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 500) { this.x -= dx/120; this.y -= dy/120; }
                }
            }
        }

        function spawnStardust(x, y) {
            for(let i=0; i<12; i++) {
                stardust.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18,
                    alpha: 1.0, size: Math.random()*7
                });
            }
        }

        window.onmousemove = e => { touch.x = e.clientX; touch.y = e.clientY; spawnStardust(e.clientX, e.clientY); };
        window.ontouchmove = e => { touch.x = e.touches[0].clientX; touch.y = e.touches[0].clientY; spawnStardust(touch.x, touch.y); };

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,canvas.width, canvas.height);

            atoms.forEach(a => {
                a.update();
                ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
                ctx.fillStyle = a.color + '08'; ctx.fill();
            });

            stardust.forEach((s, i) => {
                s.x += s.vx; s.y += s.vy; s.alpha -= 0.015;
                if(s.alpha <= 0) stardust.splice(i, 1);
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 215, 0, ${s.alpha})`; ctx.fill();
            });

            requestAnimationFrame(render);
        }
    </script>
</body>
</html>
