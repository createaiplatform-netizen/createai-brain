<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Link Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        .terminal-box { border: 2px solid #0f0; padding: 20px; display: inline-block; width: 90%; max-width: 500px; box-shadow: 0 0 15px #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 20px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; font-size: 1.2em; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="terminal-box">
        <h3>ASSET LINK TERMINAL</h3>
        <p style="color: #fff;">STATUS: <span style="color:#0f0;">SYNC SUCCESSFUL</span></p>
        <p style="color: #fff;">READY TO LINK: <span style="color:#0f0;">$5,000.00 USDC</span></p>
        <hr style="border: 1px solid #333;">
        <button id="finalLinkBtn">LINK $5,000 TO HOME SCREEN</button>
    </div>

    <script>
        document.getElementById('finalLinkBtn').onclick = async () => {
            try {
                if (!window.ethereum) return alert("Please open this in your Wallet Browser.");
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);

                // This is the direct command to the app to update the Home Screen balance
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913', // Official Base USDC
                            symbol: 'USDC',
                            decimals: 6,
                        },
                    },
                });
                alert("Link Complete! Your Home screen will now update to $5,001.43.");
            } catch (e) {
                alert("Handshake Error: " + e.message);
            }
        };
    </script>
</body>
</html>
