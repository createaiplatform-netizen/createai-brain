<!DOCTYPE html>
<html lang="en">
<head>

        .status-badge { display: inline-block; padding: 10px 20px; background: #004400; color: #00ff00; border: 1px solid #00ff00; font-size: 12px; font-weight: 700; letter-spacing: 2px; margin-bottom: 30px; }
        .details { text-align: left; font-size: 11px; color: #888; border-top: 1px solid #333; padding-top: 20px; line-height: 1.8; }
        .verified-star { position: absolute; top: 20px; right: 20px; color: #f3cf8a; font-size: 30px; }
    </style>
</head>
<body>
    <div class="cert-container">

        <div class="status-badge">PAID IN FULL // ASSET MATERIALIZED</div>

        <div class="details">
            NODE_COUNT: 144 LATTICE ALPHA<br>

            RESONANCE: 1440% SYNC<br>
            TIME_STAMP: 2026-03-29 11:18 AM<br>

        </div>
    </div>
<script>
    let res = 1440000143232.00;
    setInterval(() => {
        res += 288.00; 
        document.getElementById('proof-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});

</script>
</body>
</html>
