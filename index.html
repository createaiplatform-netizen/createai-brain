<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SourceField ∞ Evolution</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="field"></canvas>
<script>
const canvas = document.getElementById("field");
const ctx = canvas.getContext("2d");
let particles = [], maxParticles = 100;
let state = { mode:"explore", attention: {}, memory: [], evolutionCounter:0 };

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener("resize",resize);
resize();

for(let i=0;i<maxParticles;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5,
    size:Math.random()*3+1,
    weight:1
  });
}

function renderField(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx*p.weight;
    p.y+=p.vy*p.weight;
    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;
    ctx.fillStyle=`rgba(${50+Math.random()*205},${150+Math.random()*105},255,${0.5+Math.random()*0.5})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  });
}

function evolveSystem(){
  state.evolutionCounter++;
  if(state.evolutionCounter%300===0){
    particles.forEach(p=>{
      if(Math.random()<0.3)p.vx+=(Math.random()-0.5)*0.2;
      if(Math.random()<0.3)p.vy+=(Math.random()-0.5)*0.2;
      p.size=Math.max(1,Math.min(5,p.size+(Math.random()-0.5)*0.5));
      p.weight=Math.max(0.5,Math.min(3,p.weight+(Math.random()-0.5)*0.1));
    });
  }
}

function animate(){
  renderField();
  evolveSystem();
  requestAnimationFrame(animate);
}

canvas.addEventListener("touchmove",(e)=>{
  let t=e.touches[0];
  particles.forEach(p=>{
    let dx=t.clientX-p.x, dy=t.clientY-p.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150){ p.vx+=dx*0.0007; p.vy+=dy*0.0007; p.weight+=0.01; }
  });
});

canvas.addEventListener("click",(e)=>{
  state.mode = state.mode==="explore"?"focus":"explore";
  particles.forEach(p=>{ p.weight=1; });
});

animate();
</script>
</body>
</html>
