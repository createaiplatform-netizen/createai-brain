<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS OS | CreateAI</title>
    <style>
        :root {
            --sand: #f2eee3;
            --sage: #5b6d5b;
            --dark-sage: #3e4e3e;
            --text: #2c332c;
        }
        body {
            background-color: var(--sand);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            animation: fadeIn 1.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nexus-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3.5rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            max-width: 420px;
            width: 85%;
        }
        .brand {
            font-size: 0.75rem;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            color: var(--sage);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        h1 {
            font-size: 2.8rem;
            margin: 0 0 1.2rem 0;
            font-weight: 200;
            letter-spacing: -1px;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #5d635d;
            margin-bottom: 2.5rem;
        }
        .cta {
            background-color: var(--sage);
            color: white;
            text-decoration: none;
            padding: 1.2rem 2.8rem;
            border-radius: 100px;
            font-weight: 500;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
        }
        .cta:hover {
            background-color: var(--dark-sage);
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(91, 109, 91, 0.25);
        }
    </style>
</head>
<body>
    <div class="nexus-card">
        <div class="brand">CreateAI Platform</div>
        <h1>NEXUS OS</h1>
        <p>The organic evolution of intelligence. Seamlessly integrated, privately hosted, and uniquely yours.</p>
        <button class="cta" onclick="window.location.href='https://buy.stripe.com/YOUR_LINK_HERE'">Unlock Access</button>
    </div>
</body>
</html>
