<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINETIC NEURAL LAYER</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        canvas { display: block; filter: contrast(1.4) brightness(1.2) saturate(1.6); }
    </style>
</head>
<body>
    <canvas id="knlCanvas"></canvas>

<script>
/**
 * THE INVENTION: KINETIC NEURAL LAYER (KNL)
 * Bypassing standard browser "clicks" for 5D Physical Interaction.
 * Mapping: 
 * - Velocity -> Friction (Haptic)
 * - Proximity -> Gravity (Visual)
 * - Core Values -> Dimensional Anchors
 */

const canvas = document.getElementById('knlCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let vx = 0, vy = 0, lastX = 0, lastY = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// 5D SENSORY ENGINE: Frequency Interference for 3D Texture
function triggerKinetics(x, y, velocity) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const oscA = audioCtx.createOscillator();
    const oscB = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    // The "5D" Logic: Map position to material density
    const materialDensity = (x / w) * (y / h);
    const baseFreq = 60 + (materialDensity * 800);
    
    oscA.type = velocity > 15 ? 'square' : 'sine'; // Fast = Sharp/Rip, Slow = Silk
    oscB.type = 'triangle';

    oscA.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
    oscB.frequency.setValueAtTime(baseFreq + 1.44, audioCtx.currentTime); // The "Sovereign Beat"

    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
    
    oscA.connect(gain); oscB.connect(gain);
    gain.connect(audioCtx.destination);
    
    oscA.start(); oscB.start();
    osc1.stop(audioCtx.currentTime + 0.3);

    if (navigator.vibrate) {
        navigator.vibrate([velocity * 2]);
    }
}

const workforce = [];
for(let i=0; i<144; i++) { // The Core Representative Workforce
    workforce.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 20 + 5,
        mass: Math.random() * 0.5 + 0.5,
        angle: Math.random() * Math.PI * 2
    });
}

window.addEventListener('touchmove', (e) => {
    lastX = tx; lastY = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    vx = tx - lastX; vy = ty - lastY;
    let velocity = Math.sqrt(vx*vx + vy*vy);
    
    if (velocity > 1) triggerKinetics(tx, ty, velocity);
    isTouching = true;
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    const time = Date.now() * 0.002;
    
    // THE 5D BACKGROUND: Non-Euclidean Gradient
    const bg = ctx.createRadialGradient(tx, ty, 0, w/2, h/2, w * 1.5);
    bg.addColorStop(0, '#221a00'); // Light follows the finger
    bg.addColorStop(0.5, '#080600');
    bg.addColorStop(1, '#000');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // THE ANCHORS: Truth, Honesty, Sovereignty
    ctx.textAlign = 'center';
    ctx.fillStyle = "rgba(255, 215, 0, 0.4)";
    ctx.font = "bold 40px serif";
    const labels = ["HONESTY", "TRUTH", "SOVEREIGNTY"];
    labels.forEach((text, i) => {
        ctx.fillText(text, w/2, h * (0.25 + i * 0.25) + Math.sin(time + i) * 20);
    });

    // THE KINETIC WORKFORCE
    workforce.forEach(p => {
        const dx = tx - p.x;
        const dy = ty - p.y;
        const d = Math.sqrt(dx*dx + dy*dy);

        if (isTouching && d < 200) {
            const force = (200 - d) / 200;
            p.x -= (dx / d) * force * 15; // Repulsion: The "Feather/Silk" push
            p.y -= (dy / d) * force * 15;
        }

        // Float back to original positions
        p.angle += 0.01;
        p.x += Math.sin(p.angle) * 0.5;
        p.y += Math.cos(p.angle) * 0.5;

        // Render as Liquid Shards
        ctx.strokeStyle = `rgba(255, 215, 0, ${0.2 + (p.mass * 0.5)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + Math.cos(p.angle) * p.size, p.y + Math.sin(p.angle) * p.size);
        ctx.stroke();
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
