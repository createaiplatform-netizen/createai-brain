<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CREATEAI // OMNI_ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        
        :root { --gold: #f3cf8a; --void: #010103; --theme: #f3cf8a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
        
        body { background: var(--void); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; min-height: 100vh; transition: background 1s ease; }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #010103 100%); z-index: -1; }
        .singularity { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: var(--theme); border-radius: 50%; filter: blur(200px); opacity: 0.12; z-index: -1; transition: 1s; }

        nav { padding: 60px 50px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-family: 'Cinzel', serif; font-weight: 900; letter-spacing: 15px; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; }

        #main-view { padding: 50px; max-width: 1600px; margin: 0 auto; animation: manifest 1.5s ease-out; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { 
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(243, 207, 138, 0.05); 
            padding: 40px; border-radius: 4px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px);
        }
        .card:hover { background: rgba(255, 255, 255, 0.03); border-color: var(--gold); transform: translateY(-10px); }
        .card h2 { font-family: 'Cinzel', serif; letter-spacing: 3px; font-weight: 400; color: var(--gold); font-size: 1.1rem; }

        .command-trigger { position: fixed; bottom: 40px; right: 40px; z-index: 2000; cursor: pointer; }
        .core-orb { width: 50px; height: 50px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        
        h1.hero { font-family: 'Cinzel', serif; font-size: 10vw; font-weight: 900; margin: 10vh 0 0; letter-spacing: 30px; text-transform: uppercase; text-align: center; }
        
        .cta { background: transparent; border: 1px solid rgba(243, 207, 138, 0.2); color: var(--gold); padding: 20px; width: 100%; font-family: 'Cinzel', serif; letter-spacing: 5px; cursor: pointer; transition: 0.4s; text-transform: uppercase; margin-top: 30px; }
        .cta:hover { background: var(--gold); color: black; }

        #chat-flow { height: 50vh; overflow-y: auto; padding: 20px; font-weight: 100; line-height: 2; font-size: 1.1rem; }
        input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 20px; width: 100%; font-size: 1.5rem; outline: none; text-align: center; font-family: 'Inter'; }

        @keyframes manifest { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="showView('home')">

    <div class="stars"></div>
    <div class="singularity" id="core"></div>

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI // OMNI</div>
        <div style="display:flex; gap: 30px;">
            <span onclick="showView('market')" style="cursor:pointer; font-size:0.6rem; letter-spacing:4px; opacity:0.5; font-family:'Cinzel';">REGISTRY</span>
            <span onclick="showView('garden')" style="cursor:pointer; font-size:0.6rem; letter-spacing:4px; color:var(--gold); font-family:'Cinzel';">GARDENS</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <div class="command-trigger" onclick="showView('ai_chat')">
        <div class="core-orb"><div style="width:6px; height:6px; background:var(--gold); border-radius:50%;"></div></div>
    </div>

    <script>
        const nodes = [
            { id: 1, name: "CLEAN WATER", cat: "NUTRITION", color: "#60a5fa" },
            { id: 2, name: "FREE ENERGY", cat: "RESOURCES", color: "#fbbf24" },
            { id: 3, name: "GLOBAL WISDOM", cat: "EDUCATION", color: "#a78bfa" },
            { id: 4, name: "BIO_SENTRY", cat: "HEALTH", color: "#f87171" },
            { id: 5, name: "EDEN_PORTAL", cat: "GARDEN", color: "#34d399" }
        ];

        // AUTO-GENERATE ALL 122+ NODES
        for (let i = 6; i <= 144; i++) {
            nodes.push({ id: i, name: `PROTOCOL_${i}`, cat: "EVOLVING", color: "#d4af37" });
        }

        const views = {
            home: `
                <div style="text-align:center;">
                    <h1 class="hero">Engine</h1>
                    <p style="letter-spacing:20px; text-transform:uppercase; font-size:0.7rem; opacity:0.3; margin-top:20px; font-family:'Cinzel';">The Complete Empire Live</p>
                    <div style="max-width:400px; margin:10vh auto 0;">
                        <button class="cta" onclick="showView('market')">Registry [144 Nodes]</button>
                        <button class="cta" style="border:none; opacity:0.4;" onclick="showView('garden')">The Gardens</button>
                    </div>
                </div>
            `,
            market: () => `
                <h1 style="font-family:'Cinzel'; font-weight:100; font-size:2rem; letter-spacing:15px; margin:60px 0; text-align:center;">THE REGISTRY</h1>
                <div class="app-grid">${nodes.map(n => `
                    <div class="card" onclick="openNode(${n.id})">
                        <div style="font-size:0.5rem; letter-spacing:4px; color:${n.color}; opacity:0.7;">${n.cat}</div>
                        <h2>${n.name}</h2>
                        <p style="font-size:0.7rem; opacity:0.3;">Sovereign Protocol Active.</p>
                    </div>
                `).join('')}</div>
            `,
            garden: `
                <div style="text-align:center; padding-top:10vh;">
                    <h1 style="font-family:'Cinzel'; font-weight:100; font-size:4rem; letter-spacing:20px; color:var(--gold);">EDEN</h1>
                    <div class="app-grid" style="margin-top:60px;">
                        <div class="card" onclick="openNode(5)"><h2>Art Genesis</h2></div>
                        <div class="card" onclick="openNode(5)"><h2>Dream Builder</h2></div>
                    </div>
                </div>
            `,
            ai_chat: `
                <div style="max-width:900px; margin:0 auto; text-align:center;">
                    <h2 id="chat-title" style="font-family:'Cinzel'; font-weight:100; color:var(--gold); letter-spacing:15px; margin-bottom:50px;">OMNI_COMMAND</h2>
                    <div id="chat-flow">
                        <div style="opacity:0.6;">All 144 nodes are synchronized with the Source. Speak to manifest.</div>
                    </div>
                    <input type="text" id="user-input" placeholder="..." autocomplete="off">
                    <button class="cta" style="margin-top:40px; max-width:300px;" onclick="talk()">Manifest Logic</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            document.getElementById('core').style.background = 'var(--gold)';
            window.scrollTo(0,0);
        }

        function openNode(id) {
            const node = nodes.find(n => n.id === id);
            showView('ai_chat');
            document.getElementById('core').style.background = node.color;
            document.getElementById('chat-title').innerText = node.name;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = `<div style="color:${node.color}; letter-spacing:5px; font-size:0.7rem; margin-bottom:30px;">[ ${node.name} // PROTOCOL_CONNECTED ]</div>
                              <div style="opacity:0.8; font-size:1.3rem;">This node is dedicated to <strong>${node.cat}</strong>. How shall we utilize its power?</div>`;
        }

        function talk() {
            const input = document.getElementById('user-input');
            if(!input.value) return;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="margin:40px 0; border-left:1px solid var(--gold); padding-left:30px; font-size:1.2rem;">${input.value}</div>`;
            flow.innerHTML += `<div style="color:var(--gold); opacity:0.7;">Processing "${input.value}" through the Omni-Engine...</div>`;
            input.value = ''; flow.scrollTop = flow.scrollHeight;
        }
    </script>
</body>
</html>
