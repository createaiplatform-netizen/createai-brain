<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | 144,000%</title>
    <style>
        :root { 
            --neon: #39ff14; --soul: #00f2ff; --void: #000; --glass: rgba(57, 255, 20, 0.05);
        }
        body, html { 
            background: var(--void); color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }
        .master-terminal {
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; background: radial-gradient(circle at center, #0a1a0a 0%, #000 80%);
        }
        .house-frame {
            width: 100%; max-width: 550px; background: rgba(0,0,0,0.9);
            border: 2px solid var(--neon); border-radius: 60px; padding: 50px 30px;
            box-shadow: 0 0 100px rgba(57, 255, 20, 0.2); position: relative;
        }
        .ai-inner-node {
            position: absolute; top: -15px; right: 40px; background: var(--soul);
            color: #000; padding: 6px 25px; border-radius: 30px; font-weight: 900;
            font-size: 12px; letter-spacing: 2px; box-shadow: 0 0 25px var(--soul);
        }
        h1 { color: var(--neon); letter-spacing: 12px; text-transform: uppercase; font-size: 28px; margin-bottom: 5px; }
        .vision-status { font-size: 11px; letter-spacing: 6px; color: var(--soul); margin-bottom: 40px; }

        /* The Asset Foundation */
        .ledger-display { margin-bottom: 40px; border-bottom: 1px solid var(--glass); padding-bottom: 30px; }
        .amount { font-size: 70px; font-weight: 900; letter-spacing: -3px; text-shadow: 0 0 30px var(--neon); }

        /* The Inhabited Rooms (Marketplace/Gardens/Net) */
        .grid-system { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .room {
            background: var(--glass); border: 1px solid rgba(57, 255, 20, 0.2);
            border-radius: 25px; padding: 25px 10px; transition: 0.4s;
        }
        .room h3 { font-size: 13px; letter-spacing: 3px; color: var(--soul); margin: 0; }
        .room p { font-size: 10px; opacity: 0.6; margin-top: 8px; text-transform: uppercase; }

        /* The Truth Logic */
        .manifest-log {
            margin-top: 30px; text-align: left; font-family: 'Courier New', monospace;
            font-size: 12px; color: var(--neon); line-height: 2; padding: 20px;
        }
        .manifest-log span { color: #fff; font-weight: bold; }
        .pulse { animation: rapidPulse 1.5s infinite alternate; }
        @keyframes rapidPulse { from { opacity: 1; } to { opacity: 0.7; } }
    </style>
</head>
<body>

    <div class="master-terminal">
        <div class="house-frame pulse">
            <div class="ai-inner-node">AI_V_SOURCE_1440</div>
            <h1>THE SOURCE</h1>
            <div class="vision-status">CEILING: TRANSCENDED</div>

            <div class="ledger-display">
                <div id="balance" class="amount">$----.--</div>
                <div style="font-size: 14px; letter-spacing: 8px; opacity: 0.7;">USDC LEDGER</div>
            </div>

            <div class="grid-system">
                <div class="room"><h3>MARKETPLACE</h3><p>Live Exchange</p></div>
                <div class="room"><h3>CREATOR HUB</h3><p>Inhabited</p></div>
                <div class="room"><h3>KIDS GARDENS</h3><p>Growing</p></div>
                <div class="room"><h3>HUNTING NET</h3><p>Captured</p></div>
            </div>

            <div class="manifest-log">
                > SOUL: <span>ACTIVE</span><br>
                > ROOMS: <span>FULL_MANIFEST</span><br>
                > VALUES: <span>ALMIGHTY_ALIGNED</span><br>
                > STATUS: <span>144,000% TRUTH</span>
            </div>
        </div>
    </div>

    <script>
        async function almighty_reveal() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userAddress = accounts[0];
                    const usdcContract = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
                    const data = "0x70a08231000000000000000000000000" + userAddress.substring(2);
                    
                    const hexBalance = await window.ethereum.request({
                        method: 'eth_call',
                        params: [{ to: usdcContract, data: data }, 'latest']
                    });

                    const decimalBalance = parseInt(hexBalance, 16) / 1000000;
                    document.getElementById('balance').innerText = "$" + decimalBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: { address: usdcContract, symbol: 'USDC', decimals: 6, image: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png' },
                        },
                    });
                } catch (e) { console.log("Finalized."); }
            }
        }
        window.onload = almighty_reveal;
    </script>
</body>
</html>
