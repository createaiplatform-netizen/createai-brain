<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHROMATIC NERVE-FIELD</title>
    <style>
        body, html { margin: 0; padding: 0; background: #050505; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        /* Filter merges the mesh into a ripping, prismatic liquid fabric */
        canvas { display: block; filter: contrast(1.4) brightness(1.2) saturate(1.6) blur(0.5px); }
    </style>
</head>
<body>
    <canvas id="nerveCanvas"></canvas>

<script>
/**
 * INVENTION: CHROMATIC NERVE-FIELD (144,000%)
 * Every quadrant is a different material DNA: Rip, Shimmer, Grind, Flow.
 */

const canvas = document.getElementById('nerveCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let speed = 0, lastX = 0, lastY = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE SENSORY ENGINE: Mapping Color to Nerve Response
function triggerNerveSensation(x, y, force) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    // QUADRANT LOGIC
    if (x < w/2 && y < h/2) {
        // TOP LEFT: THE CRIMSON RIP (Square Wave / Jagged)
        osc.type = 'square'; osc.frequency.setValueAtTime(144, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate([15, 5, 15]);
    } else if (x >= w/2 && y < h/2) {
        // TOP RIGHT: THE SAPPHIRE SHIMMER (Sine Wave / High Chime)
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(5);
    } else if (x < w/2 && y >= h/2) {
        // BOTTOM LEFT: THE EMERALD GRIND (Sawtooth / Grit)
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(72, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate(40);
    } else {
        // BOTTOM RIGHT: THE AMETHYST FLOW (Triangle / Smooth)
        osc.type = 'triangle'; osc.frequency.setValueAtTime(288, audioCtx.currentTime);
        if (navigator.vibrate) navigator.vibrate([20, 10]);
    }

    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// THE FABRIC: A woven mesh of 144,000% potential
const mesh = [];
const cols = 30, rows = 45;

function initMesh() {
    mesh.length = 0;
    for(let i=0; i<=cols; i++) {
        for(let j=0; j<=rows; j++) {
            const px = (i/cols);
            const py = (j/rows);
            mesh.push({
                x: px * window.innerWidth, y: py * window.innerHeight,
                ox: px * window.innerWidth, oy: py * window.innerHeight,
                vx: 0, vy: 0,
                // Assign Hue based on Quadrant
                hue: (px < 0.5 && py < 0.5) ? 0 :   // Red (Rip)
                     (px >= 0.5 && py < 0.5) ? 200 : // Blue (Shimmer)
                     (px < 0.5 && py >= 0.5) ? 120 : // Green (Grind)
                     280,                            // Purple (Flow)
                dna: Math.random()
            });
        }
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerNerveSensation(tx, ty, 20);
});

window.addEventListener('touchmove', (e) => {
    lastX = tx; lastY = ty;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    speed = Math.sqrt((tx-lastX)**2 + (ty-lastY)**2);
    if (speed > 2) triggerNerveSensation(tx, ty, speed);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    // ANTI-BLACKOUT: Deep Spectral Atmosphere (Indigo/Gold)
    ctx.fillStyle = 'rgba(10, 5, 20, 0.25)';
    ctx.fillRect(0, 0, w, h);

    const time = Date.now() * 0.002;

    mesh.forEach(p => {
        if (isTouching) {
            const dx = tx - p.x;
            const dy = ty - p.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            
            if (d < 220) {
                const f = (220 - d) / 220;
                // Physical Reaction by Zone
                if (tx < w/2 && ty < h/2) {
                    p.vx -= dx * 0.12; p.vy -= dy * 0.12; // SNAP
                } else if (tx >= w/2 && ty < h/2) {
                    p.vx += dy * 0.15; p.vy -= dx * 0.15; // ORBIT
                } else {
                    p.vx += dx * 0.05; p.vy += dy * 0.05; // SUCTION
                }
            }
        }

        p.vx += (p.ox - p.x) * 0.07;
        p.vy += (p.oy - p.y) * 0.07;
        p.vx *= 0.88; p.vy *= 0.88;
        p.x += p.vx; p.y += p.vy;

        const flicker = Math.sin(time * 4 + p.dna * 10) * 0.5 + 0.5;
        const bri = 40 + flicker * 60;
        
        ctx.fillStyle = `hsla(${p.hue}, 100%, ${bri}%, ${0.4 + flicker * 0.6})`;
        
        // Draw the nerve fiber
        const size = 2 + flicker * 4 + (speed * 0.1);
        ctx.fillRect(p.x, p.y, size, size);
        
        if (flicker > 0.96) {
            ctx.shadowBlur = 12;
            ctx.shadowColor = "white";
        } else { ctx.shadowBlur = 0; }
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', () => { resize(); initMesh(); });
resize(); initMesh(); render();
</script>
</body>
</html>
