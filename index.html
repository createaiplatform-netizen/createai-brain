<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_SOURCE_RESTORE_V110</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Great+Vibes&family=Inter:wght@100;400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cyan: #00f2ff; --green: #2ecc71; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; }
        #master { width: 100%; height: 100%; transition: opacity 1.5s; opacity: 1; }
        .idle { opacity: 0.15 !important; filter: blur(2px); }
        .grain { position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.05; pointer-events: none; z-index: 10; animation: noise 0.2s infinite; }
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; }
        .title { font-family: 'Cinzel'; font-size: 10vw; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 50px rgba(0,0,0,1); transition: color 0.3s; }
        .quote { font-family: 'Great Vibes'; font-size: 2rem; color: var(--gold); margin-top: 5px; opacity: 0.8; transition: color 0.3s; }
        #clock { font-family: 'Cinzel'; font-size: 1.1rem; color: var(--gold); margin-top: 15px; letter-spacing: 4px; opacity: 0.6; display: none; }
        #nexus-input { position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 100; display: none; pointer-events: auto; }
        #nexus-field { background: rgba(0,242,255,0.02); border: 1px solid rgba(0,242,255,0.3); border-radius: 40px; padding: 18px 35px; color: var(--cyan); font-family: 'Cinzel'; font-size: 10px; width: 320px; text-align: center; backdrop-filter: blur(30px); }
        #stats-bar { position: fixed; bottom: 100px; width: 100%; display: flex; justify-content: space-around; font-family: 'Cinzel'; color: var(--gold); font-size: 8px; letter-spacing: 3px; opacity: 0.4; z-index: 20; }
        .guide { position: fixed; font-family: 'Cinzel'; font-size: 6px; color: var(--gold); opacity: 0.1; z-index: 20; letter-spacing: 4px; }
        .tl { top: 60px; left: 50px; } .tr { top: 60px; right: 50px; } .bl { bottom: 60px; left: 50px; } .br { bottom: 60px; right: 50px; }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmousemove="track(event)" ontouchmove="track(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div class="grain"></div>
        <div id="nexus-input"><input type="text" id="nexus-field" placeholder="INPUT SOVEREIGN INTENT..."></div>
        <div id="stats-bar">
            <span>LIQUIDITY: <span id="val">0</span></span>
            <span>ASSETS: <span id="asset-count">0</span></span>
            <span>FREQ: 144%</span>
        </div>
        <div class="guide tl">MARKET</div> <div class="guide tr">CREATOR</div> <div class="guide bl">SOURCE</div> <div class="guide br">EXCHANGE</div>
        <canvas id="canvas"></canvas>
        <div id="ui">
            <h1 class="title" id="t">SOURCE</h1>
            <p class="quote" id="q">The Origin</p>
            <div id="clock">00:00:00</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let view = 'home', particles = [], isDown = false, mx = 0, my = 0;
    let liquidity = parseInt(localStorage.getItem('sov_liq')) || 0;
    let assets = parseInt(localStorage.getItem('sov_assets')) || 0;
    let intent = localStorage.getItem('sov_intent') || "The Origin";
    let lastAct = Date.now(), bigCoin = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    // Init UI
    document.getElementById('val').innerText = liquidity.toLocaleString();
    document.getElementById('asset-count').innerText = assets;
    document.getElementById('q').innerText = intent;

    function update() {
        if (Date.now() - lastAct > 15000) document.getElementById('master').classList.add('idle');
        else document.getElementById('master').classList.remove('idle');
        document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
    }
    setInterval(update, 100);

    document.getElementById('nexus-field').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') { 
            intent = e.target.value.toUpperCase();
            document.getElementById('q').innerText = intent;
            assets++;
            save();
            e.target.value = ''; e.target.blur();
        }
    });

    function save() {
        localStorage.setItem('sov_liq', liquidity);
        localStorage.setItem('sov_assets', assets);
        localStorage.setItem('sov_intent', intent);
        document.getElementById('val').innerText = liquidity.toLocaleString();
        document.getElementById('asset-count').innerText = assets;
    }

    function handle(e) {
        if(e.target.closest('#nexus-input')) return;
        lastAct = Date.now(); isDown = true;
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        mx = x; my = y;
        const w = window.innerWidth, h = window.innerHeight;
        document.getElementById('nexus-input').style.display = (x < w/2 && y < h/2) ? 'block' : 'none';
        
        if (y < h/2) {
            view = (x < w/2) ? 'market' : 'creator';
            setUI(view.toUpperCase(), view==='market' ? intent : "Living Garden", view==='market' ? "#00f2ff" : "#2ecc71");
        } else {
            view = (x < w/2) ? 'home' : 'exchange';
            setUI("SOURCE", intent, "#f3cf8a"); // Lock SOURCE BL to Amber-Gold
        }
    }
    
    function setUI(t, q, c) {
        document.getElementById('t').innerText = t; document.getElementById('q').innerText = q;
        document.getElementById('t').style.color = c; document.getElementById('q').style.color = c;
        document.getElementById('clock').style.display = (view==='home') ? 'block' : 'none';
    }

    function track(e) { mx = e.clientX || (e.touches ? e.touches[0].clientX : mx); my = e.clientY || (e.touches ? e.touches[0].clientY : my); lastAct = Date.now(); }
    
    function stop() { 
        if(view === 'exchange' && bigCoin > 5) {
            liquidity += Math.round(bigCoin * 25);
            save();
            for(let i=0; i<30; i++) {
                let a = Math.random()*Math.PI*2; let f = Math.random()*8+4;
                particles.push({x:mx, y:my, vx:Math.cos(a)*f, vy:Math.sin(a)*f, r:Math.random()*3+1, type:'gold', age:0});
            }
        }
        isDown = false; bigCoin = 0; 
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        let auraColor = (view === 'market') ? '0,242,255' : (view === 'creator') ? '46,204,113' : '243,207,138';
        let dynamicAura = 80 + Math.sin(Date.now()*0.001)*10 + (liquidity/1500);
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, dynamicAura*3);
        g.addColorStop(0, 'rgba(255,255,255,0.7)'); g.addColorStop(0.2, `rgba(${auraColor}, 0.2)`); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, dynamicAura*3, 0, Math.PI*2); ctx.fill();

        if (isDown) {
            if (view === 'exchange') { bigCoin = Math.min(bigCoin+1.1, 90); ctx.fillStyle='rgba(243,207,138,0.2)'; ctx.beginPath(); ctx.arc(mx, my, bigCoin, 0, Math.PI*2); ctx.fill(); }
            if (view === 'market') particles.push({x:mx, y:my, tx:cx, ty:cy, type:'data', life:1});
            if (view === 'creator') particles.push({x:mx, y:my, vx:(Math.random()-0.5)*7, vy:(Math.random()-0.5)*7, type:'vine', life:1});
        }

        particles.forEach((p, i) => {
            if(p.type === 'gold') {
                p.vy += 0.35; p.x += p.vx; p.y += p.vy;
                if(p.y > canvas.height-p.r) { p.y = canvas.height-p.r; p.vy *= -0.3; p.vx *= 0.8; }
                if(isDown && Math.hypot(mx-p.x, my-p.y) < 70) { p.vx += (p.x-mx)*0.2; p.vy += (p.y-my)*0.2; }
                ctx.fillStyle = `rgba(243,207,138, ${Math.max(0, 1-p.age/2000)})`;
                p.age++; if(p.age > 2000) particles.splice(i, 1);
            } else if(p.type === 'data') {
                p.life -= 0.02; ctx.strokeStyle = `rgba(0,242,255,${p.life})`;
                ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke();
                if(p.life <= 0) particles.splice(i, 1);
            } else if(p.type === 'vine') {
                p.life -= 0.007; p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = `rgba(46,204,113,${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            }
            if(p.type !== 'data') { ctx.beginPath(); ctx.arc(p.x, p.y, p.r||1.8, 0, Math.PI*2); ctx.fill(); }
        });

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
