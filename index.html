<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Hub</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { background: #000; color: #d4af37; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        .header { padding: 50px 20px; text-align: center; border-bottom: 1px solid #222; }
        .main-ui { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px; gap: 20px; }
        .btn { background: #d4af37; color: #000; padding: 30px; border-radius: 100px; font-weight: 900; font-size: 1.4rem; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
        .btn-alt { background: transparent; color: #d4af37; border: 1px solid #d4af37; padding: 15px; border-radius: 50px; font-size: 0.9rem; }
        #status { color: #444; font-size: 0.7rem; text-align: center; letter-spacing: 3px; padding-bottom: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="letter-spacing: 5px; margin: 0;">NEXUS ELITE</h1>
        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">ADMIN: STADLER | SOURCE: 144,000%</div>
    </div>

    <div class="main-ui">
        <button class="btn" onclick="activateBanker()">ACTIVATE BANKER ($1000)</button>
        
        <button class="btn-alt" onclick="scrub441()">SCRUB 441 BUBBLES</button>
    </div>

    <div id="status">COMMANDER LOGGED IN | SYSTEM SECURE</div>

    <script>
        function scrub441() {
            if ('setAppBadge' in navigator) {
                navigator.setAppBadge(0);
                alert("441 Notifications Cleared.");
            } else {
                alert("Matrix Sync: Clear Home Screen version for full badge access.");
            }
        }

        function activateBanker() {
            // This triggers the phone's internal bridge to Venmo
            window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=Admin_Sovereign_Handshake";
            
            setTimeout(() => {
                alert("Banker Protocol Active. Handshake Complete.");
            }, 1500);
        }
    </script>
</body>
</html>
