<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEARTH | LIVE BUILD</title>
    <style>
        :root { --gold: #c4a97a; --ink: #1d1d1f; --safe: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; transition: 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1); }
        body { background: #fff; color: var(--ink); height: 100vh; overflow: hidden; }
        .view { display: none; height: 100vh; flex-direction: column; overflow-y: auto; padding-bottom: 120px; }
        .view.active { display: flex; }
        .header { padding: 60px 20px; text-align: center; letter-spacing: 15px; font-weight: 900; border-bottom: 1px solid #f0f0f0; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; background: #f0f0f0; gap: 1px; }
        .card { background: #fff; padding: 35px 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 320px; position: relative; }
        .icon { font-size: 2.5rem; margin-bottom: 15px; }
        .tag { font-size: 0.5rem; font-weight: 900; color: #bbb; text-transform: uppercase; letter-spacing: 2px; }
        .name { font-size: 0.85rem; font-weight: 700; margin-top: 5px; }
        .price { font-size: 0.75rem; color: var(--gold); font-weight: 800; margin-top: 5px; }
        
        /* THE AI TALK BUTTON */
        .ai-btn { margin-top: 15px; padding: 10px; border: 1px solid #eee; border-radius: 50px; font-size: 0.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; background: #fff; }
        .ai-btn:active { background: var(--ink); color: #fff; }

        /* THE AI SLIDE-UP PANEL */
        #aiPanel { position: fixed; bottom: -100%; left: 0; right: 0; background: #fff; height: 70vh; z-index: 2000; border-radius: 30px 30px 0 0; box-shadow: 0 -20px 50px rgba(0,0,0,0.1); padding: 40px; display: flex; flex-direction: column; }
        #aiPanel.open { bottom: 0; }
        .panel-close { align-self: flex-end; font-weight: 900; opacity: 0.3; }

        nav { position: fixed; bottom: 25px; left: 15px; right: 15px; background: #000; padding: 20px; border-radius: 100px; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-link { color: #fff; font-size: 0.55rem; font-weight: 900; text-transform: uppercase; opacity: 0.4; cursor: pointer; }
        .nav-link.active { opacity: 1; }
        .live-status { position: fixed; top: 15px; right: 20px; font-size: 0.5rem; font-weight: 900; color: #00ff88; letter-spacing: 1px; z-index: 3000; }
    </style>
</head>
<body>
    <div class="live-status">● LIVE WITH GEMINI</div>
    
    <div id="marketPortal" class="view active">
        <header class="header"><div>HEARTH</div></header>
        <div class="grid">
            <div class="card">
                <span class="icon">⚙️</span>
                <div><span class="tag">Flagship</span><p class="name">Home-Port</p><p class="price">$1,299</p></div>
                <button class="ai-btn" onclick="openAI('Home-Port')">Initialize AI</button>
            </div>
            <div class="card">
                <span class="icon">👕</span>
                <div><span class="tag">Apparel</span><p class="name">AI Skin Shirt</p><p class="price">$45</p></div>
                <button class="ai-btn" onclick="openAI('AI Skin Shirt')">Initialize AI</button>
            </div>
        </div>
    </div>

    <div id="aiPanel">
        <div class="panel-close" onclick="closeAI()">CLOSE</div>
        <h2 id="aiTitle" style="margin-top:20px; letter-spacing: -1px;">AI System</h2>
        <p id="aiDesc" style="margin-top:10px; font-size: 0.9rem; line-height: 1.6; opacity: 0.6;">Connecting to product core...</p>
        <div style="margin-top: auto; border-top: 1px solid #eee; padding-top: 20px;">
            <input type="text" placeholder="Speak to asset..." style="width:100%; padding:20px; border:none; background:#f5f5f5; border-radius:15px;">
        </div>
    </div>

    <nav>
        <div class="nav-link active">Market</div>
        <div class="nav-link" style="color:var(--safe);">Safe Zone</div>
    </nav>

    <script>
        function openAI(name) {
            document.getElementById('aiTitle').innerText = name + " AI";
            document.getElementById('aiDesc').innerText = "I am the local intelligence for your " + name + ". How can I assist you today?";
            document.getElementById('aiPanel').classList.add('open');
        }
        function closeAI() {
            document.getElementById('aiPanel').classList.remove('open');
        }
    </script>
</body>
</html>
