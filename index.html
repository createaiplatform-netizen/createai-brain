<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_KINETIC_STRIKE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body { margin: 0; background: #000; color: #f3cf8a; font-family: 'Cinzel', serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; overflow: hidden; }
        
        .kinetic-core { width: 150px; height: 150px; border: 4px double #fff; border-radius: 50%; box-shadow: 0 0 50px rgba(255,255,255,0.4); animation: pulse 1s infinite alternate; }
        .ledger-val { font-size: 36px; font-weight: 900; margin-top: 40px; color: #fff; }
        .node-map { font-size: 10px; letter-spacing: 10px; margin-top: 20px; color: #00ff00; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="kinetic-core"></div>
    <div id="live" class="ledger-val">$1,440,000,114,088.00</div>
    <div class="node-map">ALL_144_NODES_KINETIC // NO_STOP</div>
<script>
    let res = 1440000114088.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('live').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
