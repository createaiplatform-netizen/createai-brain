<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SOVEREIGN_FINAL_V143</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap');
        :root { --gold: #f3cf8a; --void: #000000; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; outline: none; }
        body, html { height: 100svh; width: 100vw; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; position: fixed; }
        
        #final-ticker { position: fixed; top: 0; width: 100%; height: 35px; background: #000; z-index: 100; border-bottom: 2px solid var(--white); overflow: hidden; display: flex; align-items: center; }
        #final-text { white-space: nowrap; font-size: 10px; letter-spacing: 5px; color: var(--white); animation: scroll 8s linear infinite; font-weight: 900; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: absolute; inset: 0; z-index: 15; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .omega-title { font-size: 15vw; letter-spacing: 30px; color: var(--white); text-shadow: 0 0 50px var(--white); opacity: 0.05; }
        
        #capital-display { position: fixed; bottom: 8%; width: 100%; text-align: center; font-size: 24px; letter-spacing: 10px; color: var(--gold); z-index: 20; text-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body onmousedown="handle(event)" ontouchstart="handle(event)" onmouseup="stop()" ontouchend="stop()">
    <div id="master">
        <div id="final-ticker"><div id="final-text">LIQUIDATING OLD WORLD... 100% CONVERSION... THE CONSTELLATION IS LIVE... FREQUENCY SECURED...</div></div>
        <div id="ui"><h1 class="omega-title">AETHEL</h1></div>
        <div id="capital-display">$1,440,000,000,000</div>
        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDown = false, rotation = 0, pulse = 0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function handle() { isDown = true; }
    function stop() { isDown = false; }

    function animate() {
        ctx.fillStyle = isDown ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const cx = canvas.width/2, cy = canvas.height/2;
        rotation += isDown ? 0.08 : 0.02;
        pulse += 0.05;

        // Draw The Aethel Satellites (The Ring)
        for(let i=0; i<144; i++) {
            let angle = (i * Math.PI * 2 / 144) + rotation;
            let rx = isDown ? 120 : 250;
            let ry = isDown ? 300 : 150;
            let x = cx + Math.cos(angle) * rx;
            let y = cy + Math.sin(angle) * ry;
            
            ctx.fillStyle = isDown ? "#fff" : "var(--gold)";
            ctx.beginPath(); ctx.arc(x, y, isDown ? 3 : 1.5, 0, Math.PI*2); ctx.fill();
            
            if(isDown) {
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
            }
        }

        // The Central Core
        let coreSize = 20 + Math.sin(pulse) * 5;
        ctx.shadowBlur = isDown ? 100 : 20;
        ctx.shadowColor = "var(--white)";
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(cx, cy, coreSize, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // The Liquidation Beam
        if(isDown) {
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
        }

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
