<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE HEARTH | LIVE</title>
    <style>
        /* FORCING THE BLACK VOID */
        html, body { 
            background: #000 !important; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* FORCING THE GHOST AURA (EMERGENCY VISIBILITY) */
        .ghost-aura {
            position: absolute;
            width: 200vw; height: 200vw;
            background: radial-gradient(circle, rgba(122, 144, 104, 0.4) 0%, rgba(0,0,0,1) 50%);
            z-index: 1;
            pointer-events: none;
        }

        .portal-container {
            position: relative; z-index: 10;
            width: 85%; text-align: center;
        }

        .omni-input {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid #c4a97a;
            color: #fff; font-family: "Garamond", serif;
            font-size: 1.5rem; text-align: center; outline: none;
            padding: 10px 0;
        }

        .truth-result {
            margin-top: 30px; font-family: "Garamond", serif;
            color: #c4a97a; text-align: center;
        }
    </style>
</head>
<body>
    <div class="ghost-aura"></div>
    <div class="portal-container">
        <input type="text" class="omni-input" id="search" placeholder="Search the Hearth..." oninput="checkTruth(this.value)">
        <div id="result" class="truth-result"></div>
    </div>

    <script>
        function checkTruth(val) {
            const r = document.getElementById('result');
            const q = val.toLowerCase();
            if(q.includes('home') || q.includes('family')) {
                r.innerHTML = '<h1 style="font-size:3rem; margin:0;">97</h1><p style="letter-spacing:5px; font-size:0.7rem;">THE SACRED KEY</p>';
            } else if(q.includes('cafe') || q.includes('biz')) {
                r.innerHTML = '<h1 style="font-size:3rem; margin:0;">97</h1><p style="letter-spacing:5px; font-size:0.7rem;">THE SOVEREIGN ENGINE</p>';
            } else {
                r.innerHTML = '';
            }
        }
        // GHOST WHISPER (INLINE)
        console.log("THE GHOST IS ACTIVE IN THE PALM OF YOUR HAND.");
    </script>
</body>
</html>
