<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:title" content="THE SOURCE | 144,000% MANIFEST">
    <meta property="og:description" content="Heaven on Earth is Reified. The Global Humanity Infrastructure is Live.">
    <meta property="og:image" content="https://yourdomain.com/source-miracle.png">
    <meta name="twitter:card" content="summary_large_image">
    
    <style>
        /* [EXISTING PALACE STYLES INTEGRATED] */
        :root { --gold: #ffd700; --neon: #39ff14; --soul: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Syncopate', sans-serif; }
        body, html { background: var(--void); color: #fff; height: 100vh; width: 100vw; overflow: hidden; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(18px); }

        .broadcast-layer {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; padding: 40px 20px;
        }

        /* THE WILDFIRE BUTTONS */
        .viral-hub {
            display: flex; gap: 20px; margin-top: 20px; pointer-events: auto;
        }
        .share-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--soul);
            padding: 15px 30px; border-radius: 50px; color: var(--soul);
            font-size: 10px; letter-spacing: 5px; cursor: pointer; font-weight: 900;
            transition: 0.4s; backdrop-filter: blur(10px);
        }
        .share-btn:hover { background: var(--soul); color: #000; box-shadow: 0 0 40px var(--soul); }
        .share-btn.twitter { border-color: #1DA1F2; color: #1DA1F2; }
        .share-btn.twitter:hover { background: #1DA1F2; color: #fff; }

        /* THE SOURCE CENTER */
        .manifest-center { text-align: center; }
        h1 { font-size: clamp(30px, 10vw, 70px); letter-spacing: 25px; color: var(--neon); text-shadow: 0 0 60px var(--neon); }
        
        .pillar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
        .pillar {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,215,0,0.2);
            padding: 40px 10px; border-radius: 40px; text-align: center; backdrop-filter: blur(30px);
            cursor: pointer; transition: 0.5s;
        }
        .pillar:hover { transform: translateY(-10px); border-color: var(--gold); }

        .news-flash {
            background: var(--gold); color: #000; width: 100%; text-align: center;
            padding: 10px; font-weight: 900; letter-spacing: 10px; font-size: 12px;
            position: fixed; top: 0; z-index: 100;
        }
    </style>
</head>
<body onload="ignite()">

    <div class="news-flash">BREAKING: THE SOURCE IS LIVE // 144,000% MANIFESTED</div>
    <canvas id="flow"></canvas>

    <div class="broadcast-layer">
        <div style="margin-top: 60px;">
            <div class="viral-hub">
                <div class="share-btn twitter" onclick="shareToX()">SHARE TO X</div>
                <div class="share-btn" onclick="copyLink()">COPY SOURCE LINK</div>
            </div>
        </div>

        <div class="manifest-center">
            <h1>THE SOURCE</h1>
            <div style="letter-spacing: 15px; color: var(--gold); margin-top: 20px; font-weight: 900;">HEAVEN ON EARTH</div>
        </div>

        <div class="pillar-grid">
            <div class="pillar"><h3>MARKETPLACE</h3></div>
            <div class="pillar"><h3>CREATOR HUB</h3></div>
            <div class="pillar"><h3>GARDENS</h3></div>
            <div class="pillar"><h3>HUNTING NET</h3></div>
        </div>

        <div style="border-top: 2px solid var(--gold); width: 100%; max-width: 800px; padding-top: 20px; display: flex; justify-content: space-between; color: var(--gold); font-size: 10px; letter-spacing: 5px;">
            <div>TRUTH: ABSOLUTE</div>
            <div>SOUL: REIFIED</div>
        </div>
    </div>

    <script>
        function shareToX() {
            const text = encodeURIComponent("The Source is Live. 144,000% Manifestation. Heaven on Earth is Reified. Look now: ");
            const url = encodeURIComponent(window.location.href);
            window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("SOURCE LINK COPIED TO CLIPBOARD. SPREAD THE WILDFIRE.");
        }

        // [ANGELIC FLOW LOGIC]
        const canvas = document.getElementById('flow');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) pts.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                r: Math.random()*100+50, vx: (Math.random()-0.5)*1, vy: (Math.random()-0.5)*1,
                c: Math.random() > 0.5 ? '#39ff14' : '#00f2ff'
            });
            draw();
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c + '10'; ctx.fill();
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
