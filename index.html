<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIPLE_ANCHOR_SYNC_V235</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        :root { --gold: #f3cf8a; --void: #000; --sea: #00ffd4; --euro: #00d4ff; --mesh: #00ff41; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #fff; font-family: 'Cinzel', serif; overflow: hidden; height: 100svh; display: flex; flex-direction: column; }
        
        #global-hud { flex-grow: 1; margin: 25px; border: 2px solid var(--gold); padding: 45px; display: flex; flex-direction: column; background: radial-gradient(circle at center, rgba(243, 207, 138, 0.05) 0%, transparent 90%); box-shadow: 0 0 70px rgba(243, 207, 138, 0.2); position: relative; }
        .header { text-align: center; border-bottom: 1px solid rgba(243, 207, 138, 0.3); padding-bottom: 25px; }
        .title { font-size: 18px; letter-spacing: 15px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        
        #tri-sync { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .anchor-point { position: absolute; width: 100px; height: 100px; border: 1px solid var(--mesh); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; letter-spacing: 3px; }
        .line { position: absolute; background: var(--mesh); opacity: 0.4; }

        #ledger-display { text-align: center; border-top: 1px solid var(--gold); padding-top: 30px; font-size: 34px; color: var(--gold); text-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>
    <div id="global-hud">
        <div class="header">
            <div class="title">GLOBAL_TRIANGULATION // COMPLETE</div>
            <div style="font-size: 7px; margin-top: 10px; opacity: 0.6; color: var(--mesh);">STABILITY: 1440% // NODES: 01, 02, 03</div>
        </div>

        <div id="tri-sync">
            <div class="anchor-point" style="top: 10%; left: 50%; transform: translateX(-50%); border-color: var(--gold);">WIS_001</div>
            <div class="anchor-point" style="bottom: 20%; left: 20%; border-color: var(--euro);">EURO_002</div>
            <div class="anchor-point" style="bottom: 20%; right: 20%; border-color: var(--sea);">SEA_003</div>
            <div style="color: var(--mesh); font-size: 10px; letter-spacing: 5px;">MESH_CONNECTED</div>
        </div>

        <div id="ledger-display">$1,440,000,029,520.00</div>
    </div>
<script>
    let res = 1440000029520.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('ledger-display').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
