<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CreateAI | Humanity OS</title>
    <style>
        :root { --slate: #0f172a; --gold: #b89c66; --bg: #f8fafc; --garden: #22c55e; --kids: #8b5cf6; }
        body { background: var(--bg); color: var(--slate); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; }
        
        nav { background: var(--slate); padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; cursor: pointer; border-left: 3px solid var(--gold); padding-left: 10px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
        .nav-links span { margin-left: 15px; font-size: 0.65rem; cursor: pointer; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; }

        #main-view { padding: 20px; max-width: 1400px; margin: 0 auto; }

        /* THE GARDENS */
        .garden-hero { background: linear-gradient(135deg, var(--garden), var(--kids)); color: white; padding: 40px 20px; border-radius: 15px; text-align: center; margin-bottom: 25px; }
        .toy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .toy-card { background: white; padding: 25px; border-radius: 20px; text-align: center; border-bottom: 6px solid var(--kids); cursor: pointer; transition: 0.2s; }

        /* MARKETPLACE WITH FAIR PRICING */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid #e2e8f0; padding: 30px; border-radius: 8px; position: relative; }
        .tag { font-size: 0.6rem; color: var(--gold); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .price-tag { position: absolute; top: 30px; right: 30px; font-size: 0.55rem; font-weight: 900; background: #f1f5f9; padding: 4px 8px; border-radius: 4px; color: var(--slate); }
        
        /* LIFELINE */
        .lifeline { position: fixed; bottom: 0; width: 100%; background: var(--slate); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 2000; }
        .lifeline-btn { background: var(--gold); color: black; text-decoration: none; padding: 12px 25px; border-radius: 25px; font-weight: 900; font-size: 0.75rem; }

        .btn { background: var(--slate); color: white; border: none; padding: 18px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
        .btn-gold { background: var(--gold); color: black; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; box-sizing: border-box; }
    </style>
</head>
<body onload="showView('home')">

    <nav>
        <div class="logo" onclick="showView('home')">CREATEAI_OS</div>
        <div class="nav-links">
            <span onclick="showView('market')">Market</span>
            <span onclick="showView('creator')">Family Hub</span>
            <span onclick="showView('garden')">The Gardens</span>
        </div>
    </nav>

    <div id="main-view"></div>

    <div class="lifeline">
        <div style="color:white; font-size:0.75rem; font-weight:600;">AI_ASSISTANT_READY</div>
        <a href="https://gemini.google.com/" target="_blank" class="lifeline-btn">GET HELP NOW</a>
    </div>

    <script>
        // CORE INVENTORY WITH AUTOMATED FAIR PRICING LOGIC
        let inventory = [
            { name: "BrainGen Core", cat: "Humanity AI", price: "CONTRIBUTION", desc: "Universal intelligence node." },
            { name: "Health Sentinel", cat: "Wellness", price: "FREE", desc: "Life-saving biometric monitoring." },
            { name: "Wealth Sentinel", cat: "Sovereign Finance", price: "PREMIUM", desc: "Asset protection for high-value nodes." },
            { name: "Scriptwriter", cat: "Creative", price: "CONTRIBUTION", desc: "Narrative and content automation." }
        ];

        for (let i = inventory.length + 1; i <= 122; i++) {
            inventory.push({ name: `Node ${i}`, cat: "Active Protocol", price: "FREE", desc: "Standing by for deployment." });
        }

        const views = {
            home: `
                <div style="text-align:center; padding-top: 80px;">
                    <h1 style="font-weight:200; font-size:3.5rem; margin:0;">Welcome Home</h1>
                    <p style="opacity:0.5; margin: 20px 0 50px;">A Fair Economy for a Sovereign Future.</p>
                    <button class="btn" onclick="showView('market')">Marketplace</button>
                    <button class="btn btn-gold" style="margin:10px 0;" onclick="showView('creator')">Family Creator Hub</button>
                    <button class="btn" style="background:var(--garden);" onclick="showView('garden')">The Gardens (Kids Area)</button>
                </div>
            `,
            garden: `
                <div class="garden-hero">
                    <h1 style="margin:0;">The Gardens</h1>
                    <p>Always Free. Always Fun. Create Anything!</p>
                </div>
                <div class="toy-grid">
                    <div class="toy-card"><h3>🎨</h3><p>Magic Art</p></div>
                    <div class="toy-card"><h3>🚀</h3><p>Game Maker</p></div>
                    <div class="toy-card"><h3>🎵</h3><p>Music Box</p></div>
                </div>
            `,
            market: () => `
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
                    <h1 style="margin:0; font-weight:200;">Marketplace</h1>
                    <div style="font-size:0.7rem; color:var(--gold); font-weight:bold;">122 NODES | FAIR VALUE ACTIVE</div>
                </div>
                <div class="app-grid">
                    ${inventory.map(app => `
                        <div class="card">
                            <div class="tag">${app.cat}</div>
                            <div class="price-tag">${app.price}</div>
                            <div style="font-size:1.2rem; margin: 15px 0 10px;">${app.name}</div>
                            <div style="font-size:0.8rem; color:#666;">${app.desc}</div>
                        </div>
                    `).reverse().join('')}
                </div>
            `,
            creator: `
                <div style="background:white; padding:40px; border-radius:10px; border-top:8px solid var(--gold);">
                    <h2>Manifest Service</h2>
                    <input type="text" id="nName" placeholder="Application Name">
                    <select id="nPrice"><option>FREE</option><option>CONTRIBUTION</option><option>PREMIUM</option></select>
                    <textarea id="nDesc" rows="5" placeholder="Description..."></textarea>
                    <button class="btn btn-gold" onclick="addApp()">Publish to Marketplace</button>
                </div>
            `
        };

        function showView(name) {
            document.getElementById('main-view').innerHTML = typeof views[name] === 'function' ? views[name]() : views[name];
            window.scrollTo(0,0);
        }

        function addApp() {
            const name = document.getElementById('nName').value;
            const price = document.getElementById('nPrice').value;
            const desc = document.getElementById('nDesc').value;
            if(!name) return;
            inventory.push({ name, cat: "User Manifested", price, desc });
            showView('market');
        }
    </script>
</body>
</html>
