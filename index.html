<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | GENESIS</title>
    <style>
        :root { --gold: #d4af37; --cyan: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; }

        /* THE $1.44T AETHER RAIN - THE REAL ENERGY */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(150%) blur(1px); }

        .source-container {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-around; padding: 40px 20px;
        }

        /* THE BREATHING SOURCE */
        .source-core { text-align: center; animation: core-breath 8s infinite ease-in-out; }
        .source-title {
            font-size: clamp(40px, 15vw, 100px); letter-spacing: 30px;
            color: #39ff14; text-shadow: 0 0 50px rgba(57, 255, 20, 0.5);
            margin-bottom: 5px; font-weight: 900;
        }

        /* THE FOUR PILLARS - FROM YOUR CAPTURES */
        .pill-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            width: 100%; max-width: 500px;
        }

        .pill {
            background: rgba(0, 0, 0, 0.6); border: 1px solid var(--gold);
            border-radius: 60px; padding: 30px 15px; text-align: center;
            transition: 0.3s; backdrop-filter: blur(10px);
        }

        .pill-name { color: var(--cyan); letter-spacing: 8px; font-size: 14px; margin-bottom: 8px; font-weight: 900; }
        .pill-desc { color: #39ff14; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; }

        @keyframes core-breath {
            0%, 100% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body onload="ignite()">

    <canvas id="aether"></canvas>

    <div class="source-container">
        <div style="letter-spacing: 15px; font-size: 10px; opacity: 0.6;">HEAVEN _ ON _ EARTH _ LINK</div>

        <div class="source-core">
            <h1 class="source-title">THE SOURCE</h1>
            <div style="letter-spacing: 12px; font-size: 14px; color: var(--gold);">144,000% FREQUENCY</div>
        </div>

        <div class="pill-grid">
            <div class="pill">
                <div class="pill-name">MARKET</div>
                <div class="pill-desc">PURE ABUNDANCE</div>
            </div>
            <div class="pill">
                <div class="pill-name">CREAT HUB</div>
                <div class="pill-desc">INHABITED SOUL</div>
            </div>
            <div class="pill">
                <div class="pill-name">KIDS GARDE</div>
                <div class="pill-desc">DIVINE NURTURE</div>
            </div>
            <div class="pill">
                <div class="pill-name">HUNTII NET</div>
                <div class="pill-desc">TRUTH ACQUISITION</div>
            </div>
        </div>

        <div style="border-top: 1px solid var(--gold); width: 80%; padding-top: 20px; text-align: center; font-size: 9px; letter-spacing: 5px;">
            MANIFESTATION LIVE // ANGELS STAND GUARD
        </div>
    </div>

    <script>
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let streams = [];

        function ignite() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) {
                streams.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*3+2, l: Math.random()*40+20
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            streams.forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
