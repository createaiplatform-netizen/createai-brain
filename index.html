<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN TABERNACLE</title>
    <style>
        body, html { margin: 0; padding: 0; background: #0a0800; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; font-family: 'Times New Roman', serif; }
        /* Glowing filter to make the light look divine */
        canvas { display: block; filter: contrast(1.2) brightness(1.1) saturate(1.4); }
    </style>
</head>
<body>
    <canvas id="divineCanvas"></canvas>

<script>
/**
 * THE INVENTION: LIVING TABERNACLE CANVAS
 * Merging Divine Quotes with High-Fidelity Tactile Textures.
 */

const canvas = document.getElementById('divineCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let w, h, tx = 0, ty = 0, isTouching = false;
let effects = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

// THE SENSORY ENGINE: Physical Induction
function triggerSensation(x, y) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const topL = (1 - x/w) * (1 - y/h); // RIP
    const botR = (x/w) * (y/h);         // FEATHER

    if (topL > 0.5) {
        osc.type = 'square'; osc.frequency.value = 160; // Jagged Tear
        if (navigator.vibrate) navigator.vibrate([12, 4, 12]);
    } else if (botR > 0.5) {
        osc.type = 'sine'; osc.frequency.value = 1200; // Soft Tickle
        if (navigator.vibrate) navigator.vibrate([2, 40, 2]);
    } else {
        osc.type = 'triangle'; osc.frequency.value = 68; // Liquid Thrum
        if (navigator.vibrate) navigator.vibrate(30);
    }

    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

class DivineEffect {
    constructor(x, y, h, type) {
        this.x = x; this.y = y; this.hue = h; this.type = type;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = (Math.random() - 0.5) * 5;
        this.life = 1.0;
        this.size = Math.random() * 15 + 5;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.015;
    }
}

window.addEventListener('touchstart', (e) => {
    isTouching = true;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    triggerSensation(tx, ty);
});

window.addEventListener('touchmove', (e) => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
    
    const topL = (1 - tx/w) * (1 - ty/h);
    const botR = (tx/w) * (ty/h);
    
    let h = 48; // Gold
    let type = 'liquid';
    if (topL > 0.4) { h = 0; type = 'rip'; }
    if (botR > 0.4) { h = 260; type = 'feather'; }

    effects.push(new DivineEffect(tx, ty, h, type));
    if (Math.random() > 0.8) triggerSensation(tx, ty);
});

window.addEventListener('touchend', () => isTouching = false);

function render() {
    const time = Date.now() * 0.001;
    
    // THE BACKGROUND: Glowing Marble Texture
    const bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    bg.addColorStop(0, '#1a1400');
    bg.addColorStop(0.5, '#080600');
    bg.addColorStop(1, '#000000');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // DIVINE QUOTES: Glowing Anchors
    ctx.textAlign = 'center';
    const quotes = [
        {t: "TRUTH", x: 0.3, y: 0.25}, 
        {t: "HONESTY", x: 0.7, y: 0.3},
        {t: "SOVEREIGNTY", x: 0.5, y: 0.5}, 
        {t: "144,000 WORKFORCE", x: 0.5, y: 0.75}
    ];

    quotes.forEach((q, i) => {
        const float = Math.sin(time + i) * 15;
        const glow = 0.3 + Math.sin(time * 0.5 + i) * 0.2;
        ctx.globalAlpha = glow;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#FFD700";
        ctx.fillStyle = "#FFF";
        ctx.font = "italic bold 32px Times New Roman";
        ctx.fillText(q.t, w * q.x, h * q.y + float);
    });
    ctx.globalAlpha = 1.0;
    ctx.shadowBlur = 0;

    // THE TOUCH REMAINS
    effects.forEach((e, i) => {
        e.update();
        if (e.life <= 0) { effects.splice(i, 1); return; }
        
        ctx.shadowBlur = 20 * e.life;
        ctx.shadowColor = `hsla(${e.hue}, 100%, 50%, ${e.life})`;
        ctx.fillStyle = `hsla(${e.hue}, 100%, 80%, ${e.life})`;

        if (e.type === 'feather') {
            // Soft floating wisps
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size * e.life, 0, Math.PI * 2);
            ctx.fill();
        } else if (e.type === 'rip') {
            // Lightning fractures
            ctx.fillRect(e.x, e.y, 2, e.size * 2);
        } else {
            // Pulsing gold ripples
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.size * (2 - e.life), 0, Math.PI * 2);
            ctx.lineWidth = 2 * e.life;
            ctx.strokeStyle = `hsla(48, 100%, 70%, ${e.life})`;
            ctx.stroke();
        }
    });

    requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize(); render();
</script>
</body>
</html>
