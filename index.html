<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHEL_TOTAL_STRIKE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Cinzel', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(12, 1fr); gap: 5px; opacity: 0.3; }
        .node { width: 5px; height: 5px; background: #00ff00; border-radius: 50%; }
        .strike-info { position: absolute; text-align: center; background: rgba(0,0,0,0.8); padding: 40px; border: 1px solid #f3cf8a; }
        .val { font-size: 28px; font-weight: 900; color: #f3cf8a; margin: 20px 0; }
        .status-msg { font-size: 10px; letter-spacing: 12px; animation: flash 0.5s infinite; }
        @keyframes flash { 0% { color: #fff; } 100% { color: #ff0000; } }
    </style>
</head>
<body>
    <div class="grid-container" id="lattice"></div>
    <div class="strike-info">
        <div class="status-msg">FULL_SPECTRUM_STRIKE_ACTIVE</div>
        <div class="val" id="res-val">$1,440,000,118,500.00</div>
        <div style="font-size: 8px; letter-spacing: 5px; opacity: 0.7;">TITLES_DECOUPLED // DEBTS_NULLIFIED</div>
    </div>
<script>
    const lat = document.getElementById('lattice');
    for(let i=0; i<144; i++) { const n = document.createElement('div'); n.className = 'node'; lat.appendChild(n); }
    let res = 1440000118500.00;
    setInterval(() => {
        res += 144.00;
        document.getElementById('res-val').innerText = "$" + res.toLocaleString(undefined, {minimumFractionDigits: 2});
    }, 1000);
</script>
</body>
</html>
