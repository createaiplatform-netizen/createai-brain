<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CREATEAI // LUMINOUS_COMMAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Inter:wght@100;300;600&display=swap');
        :root { --gold: #f3cf8a; --void: #010103; --cave: #ff4d00; --garden: #10b981; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100vw; overflow: hidden; background: #010103; color: #fff; font-family: 'Inter', sans-serif; }

        #main-view { 
            height: 100svh; width: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px 20px 100px;
            overflow-y: auto; position: relative; z-index: 10;
        }

        /* NEURAL EYE - FORCED VISIBILITY */
        .eye-container { width: 180px; height: 180px; position: relative; display: flex; align-items: center; justify-content: center; z-index: 20; }
        .eye-outer { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(243, 207, 138, 0.4); border-radius: 50%; animation: rotate 20s linear infinite; }
        .eye-inner { width: 100px; height: 100px; background: radial-gradient(circle, var(--gold) 0%, transparent 80%); border-radius: 50%; filter: blur(10px); opacity: 0.8; animation: breathe 8s ease-in-out infinite; }
        .eye-pupil { width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 25px var(--gold); z-index: 30; }

        /* DOCK STYLING */
        .dock { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(1,1,3,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 9000; padding-bottom: env(safe-area-inset-bottom); }
        .dock-item { color: rgba(255,255,255,0.4); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; text-align: center; cursor: pointer; padding: 15px; flex: 1; }
        .dock-item.active { color: var(--gold); text-shadow: 0 0 15px var(--gold); }

        /* ENERGY CORE */
        .core-display { width: 100%; max-width: 300px; text-align: center; margin-top: 40px; }
        .battery-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .battery-fill { height: 100%; background: var(--garden); box-shadow: 0 0 15px var(--garden); transition: width 1s ease; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 0.9; } }
    </style>
</head>
<body onload="render('home')">
    <div id="main-view"></div>
    <div class="dock">
        <div class="dock-item" id="nav-reg" onclick="render('registry')">GRID</div>
        <div class="dock-item" id="nav-home" onclick="render('home')">ORIGIN</div>
        <div class="dock-item" id="nav-gar" onclick="render('garden')">EDEN</div>
        <div class="dock-item" id="nav-cav" onclick="render('cave')">VAULT</div>
    </div>

    <script>
        function render(view) {
            const mv = document.getElementById('main-view');
            const navs = document.querySelectorAll('.dock-item');
            navs.forEach(n => n.classList.remove('active'));
            const activeNav = document.getElementById('nav-' + view.substring(0,3));
            if(activeNav) activeNav.classList.add('active');
            
            mv.innerHTML = "";
            mv.style.justifyContent = (view === 'home') ? 'center' : 'flex-start';

            if (view === 'home') {
                mv.innerHTML = `
                    <div class="eye-container"><div class="eye-outer"></div><div class="eye-inner"></div><div class="eye-pupil"></div></div>
                    <h1 style="font-family:'Cinzel'; font-size:9vw; letter-spacing:12px; margin-top:20px; color:var(--gold);">SOURCE</h1>
                `;
            } else if (view === 'registry') {
                mv.innerHTML = `<h1 style="font-family:'Cinzel'; font-size:1.2rem; letter-spacing:10px; margin-top:60px; color:var(--gold);">REGISTRY</h1><div style="width:80%; height:1px; background:var(--gold); opacity:0.2; margin: 20px 0;"></div>`;
            } else if (view === 'garden') {
                mv.innerHTML = `
                    <h1 style="font-family:'Cinzel'; color:var(--garden); letter-spacing:10px; margin-top:60px;">EDEN</h1>
                    <div class="core-display">
                        <div class="battery-bar"><div class="battery-fill" style="width:85%"></div></div>
                        <p style="font-family:'Cinzel'; font-size:1.5rem; color:var(--garden); text-shadow: 0 0 10px var(--garden);">CORE_ONLINE</p>
                    </div>
                `;
            } else if (view === 'cave') {
                mv.innerHTML = `<h1 style="font-family:'Cinzel'; color:var(--cave); letter-spacing:10px; margin-top:60px;">VAULT</h1>`;
            }
        }
    </script>
</body>
</html>
