<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Hub | CREATEAI</title>
    <style>
        :root { --deep: #05070a; --gold: #c5a059; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--deep); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .studio-container { max-width: 900px; margin: 60px auto; padding: 20px; }
        .canvas-card { background: var(--glass); border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 2px; padding: 40px; text-align: center; }
        
        .preview-box { width: 100%; height: 400px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); margin-bottom: 30px; display: flex; align-items: center; justify-content: center; position: relative; }
        .ai-pulse { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(197, 160, 89, 0.05) 0%, transparent 70%); }
        
        .prompt-input { width: 100%; padding: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 20px; font-size: 1rem; }
        .manifest-btn { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; font-weight: bold; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="studio-container">
        <div class="canvas-card">
            <div style="font-size: 0.6rem; color: var(--gold); letter-spacing: 4px; margin-bottom: 20px;">LITTLE_AI_DESIGN_PROTOCOL</div>
            <div class="preview-box">
                <div class="ai-pulse"></div>
                <div id="manifest-text" style="opacity: 0.5;">[ WAITING FOR VISION ]</div>
            </div>
            <input type="text" id="userVision" class="prompt-input" placeholder="Describe the product appearance change...">
            <button class="manifest-btn" onclick="manifest()">Manifest Asset</button>
        </div>
    </div>

    <script>
        function manifest() {
            const vision = document.getElementById('userVision').value;
            document.getElementById('manifest-text').innerText = "MANIFESTING: " + vision.toUpperCase();
            setTimeout(() => { alert("Asset Manifested. Sent to Manufacturing."); }, 1000);
        }
    </script>
</body>
</html>
