version: "3.9"

# ─── Universal Platform — Docker Compose ──────────────────────────────────────
# Run the entire stack locally or on any server with:
#   docker compose up --build
#
# First-time setup:
#   1. Copy platform/backend/.env.example → platform/backend/.env
#   2. Fill in any secrets (SESSION_SECRET, AI keys, etc.)
#   3. docker compose up --build
#
# Services:
#   postgres  — PostgreSQL database (data persisted to a named volume)
#   backend   — Node.js + Express API (port 4000)
#   frontend  — React + Vite served via Nginx (port 3000)
#
# Future services to add here:
#   ollama    — Local AI model server (for fully on-premises AI)
#   redis     — Session store / job queue
#   worker    — Background job processor (compliance checks, notifications)

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-universal_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Future: Mount init SQL scripts here for first-run schema setup.
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: platform_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-universal_platform}
      FRONTEND_URL: http://localhost:3000
      # Future: SESSION_SECRET, JWT_SECRET, OPENAI_API_KEY, OLLAMA_BASE_URL
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: platform_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    # Future: Mount nginx.conf here to customize caching, compression, and
    #   /api proxy rules for production hardening.

# ─── Volumes ──────────────────────────────────────────────────────────────────
# postgres_data persists your database between container restarts.
# On a nursing home server, back up this volume nightly to an encrypted location.

volumes:
  postgres_data:
    driver: local
