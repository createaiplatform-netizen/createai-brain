
# ─── Universal Platform — Docker Compose ──────────────────────────────────────
#
# First-time setup:
#   1. cp platform/docker/.env.example platform/docker/.env
#   2. Edit platform/docker/.env and fill in all required secrets
#   3. docker compose -f platform/docker/docker-compose.yml up --build
#
# Services:
#   postgres  — PostgreSQL 16 (data in named volume, never lost on restart)
#   backend   — Node.js + Express API (internal port 4000, not exposed)
#   frontend  — React SPA served via nginx (internal port 80, not exposed)
#   caddy     — TLS terminator + reverse proxy (exposes :80 and :443)
#
# TLS:
#   With DOMAIN=localhost  → Caddy uses its internal CA (self-signed).
#   With DOMAIN=your.domain.com → Caddy auto-provisions Let's Encrypt TLS.
#   Open port 80 and 443 on your firewall. Let's Encrypt requires port 80
#   to be reachable for HTTP-01 ACME challenges.
#
# Nursing home server deployment:
#   - Set DOMAIN to the server's fully qualified domain name.
#   - Back up the postgres_data volume nightly to an encrypted location.
#   - Rotate SESSION_SECRET annually and after any suspected compromise.

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-universal_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform}"]
      interval: 10s
      timeout:  5s
      retries:  5
    # postgres is NOT exposed on host ports in production — only reachable
    # internally by the backend container via Docker networking.

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ..
      dockerfile: docker/backend.Dockerfile
    container_name: platform_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:                    production
      PORT:                        4000
      DATABASE_URL:                postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-universal_platform}
      SESSION_SECRET:              ${SESSION_SECRET}
      FRONTEND_URL:                ${FRONTEND_URL:-http://localhost:3000}
      SESSION_INACTIVITY_MINUTES:  ${SESSION_INACTIVITY_MINUTES:-30}
      APP_NAME:                    ${APP_NAME:-Universal Platform}
    healthcheck:
      test:     ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1))\""]
      interval: 15s
      timeout:  5s
      retries:  3
    # backend is NOT exposed on host ports — only reachable by Caddy internally.

  # ─── Frontend (nginx serves the compiled React SPA) ──────────────────────────
  frontend:
    build:
      context:    ..
      dockerfile: docker/frontend.Dockerfile
    container_name: platform_frontend
    restart: unless-stopped
    depends_on:
      - backend
    # frontend is NOT exposed on host ports — only reachable by Caddy internally.

  # ─── Caddy (TLS termination + reverse proxy) ──────────────────────────────────
  # Caddy handles all inbound HTTPS traffic.
  #   /api/*  → backend:4000   (strips /api prefix)
  #   /*      → frontend:80    (serves the SPA)
  #
  # With DOMAIN=localhost, Caddy uses its local CA (self-signed cert).
  # With a real domain, Caddy auto-provisions a Let's Encrypt certificate.
  caddy:
    image: caddy:2-alpine
    container_name: platform_caddy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

# ─── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
