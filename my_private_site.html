<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Private AI Site</title>
<style>
body { font-family: sans-serif; margin: 20px; }
#command { width: 100%; height: 50px; }
#runBtn { margin-top: 5px; }
#output { border: 1px solid #ccc; padding: 10px; margin-top: 10px; height: 200px; overflow: auto; background: #f9f9f9; }
iframe { width: 100%; height: 400px; border: 1px solid #333; margin-top: 10px; }
</style>
</head>
<body>

<h2>My Private AI Web Editor</h2>

<textarea id="command" placeholder="Type AI command here..."></textarea><br>
<button id="runBtn">Run Command</button>

<div id="output"></div>
<h3>Live Preview</h3>
<iframe id="preview" srcdoc="<h1>Nothing yet</h1>"></iframe>

<script>
// ----------------------
// In-browser private AI
// ----------------------
const output = document.getElementById('output');
const preview = document.getElementById('preview');

// Load existing site from localStorage
let siteFiles = JSON.parse(localStorage.getItem('siteFiles') || "{}");

function updatePreview(page='index') {
    const html = siteFiles[page] || "<h1>Nothing yet</h1>";
    preview.srcdoc = html;
}

document.getElementById('runBtn').onclick = () => {
    const cmd = document.getElementById('command').value.trim();
    if (!cmd) return;

    // Simple AI parser
    if (cmd.startsWith("create page ")) {
        const parts = cmd.split(" ");
        const pageName = parts[2];
        const h1Text = cmd.split("'")[1] || pageName;
        const html = `<html><body><h1>${h1Text}</h1></body></html>`;
        siteFiles[pageName] = html;
        localStorage.setItem('siteFiles', JSON.stringify(siteFiles));
        output.innerHTML += `✅ Created page: ${pageName}.html<br>`;
        updatePreview(pageName);
    } else if (cmd.startsWith("edit page ")) {
        const parts = cmd.split(" ");
        const pageName = parts[2];
        if (!siteFiles[pageName]) {
            output.innerHTML += `⚠️ Page does not exist.<br>`;
        } else {
            const html = cmd.split("'")[1] || siteFiles[pageName];
            siteFiles[pageName] = html;
            localStorage.setItem('siteFiles', JSON.stringify(siteFiles));
            output.innerHTML += `✏️ Edited page: ${pageName}.html<br>`;
            updatePreview(pageName);
        }
    } else if (cmd === "list pages") {
        output.innerHTML += `📄 Pages: ${Object.keys(siteFiles).join(", ")}<br>`;
    } else {
        output.innerHTML += `⚠️ Command not recognized.<br>`;
    }

    document.getElementById('command').value = '';
};

// Initial preview
updatePreview();
</script>

</body>
</html>
