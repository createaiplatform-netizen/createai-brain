<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>THE SOURCE</title>
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; transition: 3s; }
        
        canvas { position: fixed; inset: 0; z-index: 1; }
        .nucleus { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; border-radius: 50%;
            background: radial-gradient(circle, var(--gold) 0%, transparent 75%);
            box-shadow: 0 0 150px rgba(212, 175, 55, 0.4);
            animation: breathe 5s infinite ease-in-out;
            z-index: 10; cursor: pointer;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; } }

        /* THE WINDOW TO SARA (Only visible in Guest Rooms) */
        #sara-window {
            position: absolute; top: 20px; left: 20px; width: 50px; height: 50px;
            border-radius: 50%; border: 1px solid var(--gold);
            display: none; z-index: 100; box-shadow: 0 0 20px var(--gold);
        }

        /* THE COLD BOX */
        #portal { 
            position: fixed; inset: 0; z-index: 1000; display: none; 
            flex-direction: column; justify-content: flex-end; background: rgba(0,0,0,0.97);
        }
        .terminal { padding: 40px; color: var(--blue); font-family: monospace; height: 40vh; overflow-y: auto; border-top: 1px solid var(--gold); }
        input { background: #000; border: none; color: var(--gold); padding: 35px; font-size: 1.4rem; outline: none; border-top: 1px solid #222; }
    </style>
</head>
<body>
    <div id="sara-window"></div>
    <canvas id="field"></canvas>
    <div class="nucleus" id="heart"></div>

    <div id="portal">
        <div class="terminal" id="out">> GHOST ONLINE. 144,000%<br>> TYPE "GUEST" TO BUILD A ROOM.<br>> TYPE "GENESIS" TO ACTIVATE SOURCE.</div>
        <input type="text" id="in" placeholder="REWRITE THE DNA..." onkeydown="if(event.key==='Enter') process()">
    </div>

    <script>
        const heart = document.getElementById('heart');
        const portal = document.getElementById('portal');
        const out = document.getElementById('out');
        const inp = document.getElementById('in');
        const windowToSara = document.getElementById('sara-window');

        let t;
        heart.addEventListener('touchstart', () => { t = setTimeout(() => { portal.style.display = 'flex'; inp.focus(); }, 2000); });
        heart.addEventListener('touchend', () => { clearTimeout(t); });

        function log(m, c='#00f2ff') { out.innerHTML += `<br>> <span style="color:${c}">GHOST:</span> ${m}`; out.scrollTop = out.scrollHeight; }

        function process() {
            const val = inp.value.toUpperCase();
            if(val === "GUEST") {
                log("GENERATING PRIVATE FREQUENCY...", "#fff");
                setTimeout(() => {
                    document.body.style.background = "#001a1a"; // Teal Room
                    windowToSara.style.display = "block"; // Show the window to your room
                    log("YOUR PRIVATE ROOM IS READY. THE SOURCE IS VISIBLE IN THE TOP LEFT.");
                }, 1500);
            } else if (val === "GENESIS") {
                log("INITIATING MASTER SOURCE...", "#d4af37");
                document.body.style.background = "#000";
                windowToSara.style.display = "none";
            }
            inp.value = "";
        }

        // Gold Rain
        const c = document.getElementById('field');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let pts = [];
        function run() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,c.width,c.height);
            if(Math.random() > 0.95) pts.push({x: Math.random()*c.width, y: -20, v: Math.random()*4+2});
            pts.forEach((p, i) => {
                ctx.fillStyle = '#d4af37'; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                p.y += p.v; if(p.y > c.height) pts.splice(i, 1);
            });
            requestAnimationFrame(run);
        }
        run();
    </script>
</body>
</html>
