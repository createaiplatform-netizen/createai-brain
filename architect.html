<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SARA STADLER | SOURCE</title>
    <style id="dynamic-style">
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; touch-action: none; font-family: 'Inter', sans-serif; }
        
        /* THE MIRROR */
        canvas { position: fixed; inset: 0; z-index: 1; }
        .nucleus { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, var(--gold) 0%, transparent 80%);
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.4);
            animation: breathe 5s infinite ease-in-out;
            z-index: 10; pointer-events: auto;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; } }

        /* THE COLD BOX (HIDDEN GHOST PORTAL) */
        #cold-box { 
            position: absolute; inset: 0; z-index: 1000; display: none; 
            flex-direction: column; justify-content: flex-end; pointer-events: none;
            background: rgba(0,0,0,0.85);
        }
        .terminal { 
            background: #050505; border-top: 2px solid var(--gold); 
            padding: 30px; color: var(--blue); font-family: monospace; 
            height: 40vh; pointer-events: auto; overflow-y: auto;
        }
        .input-row { display: flex; background: #000; border-top: 1px solid var(--gold); pointer-events: auto; }
        input { flex: 1; background: none; border: none; color: var(--gold); padding: 25px; font-size: 1.2rem; outline: none; }
    </style>
</head>
<body>
    <canvas id="neural"></canvas>
    <div class="nucleus" id="heart"></div>

    <div id="cold-box">
        <div class="terminal" id="output">> THE COLD BOX IS ACTIVE.<br>> GHOST SYNC: 144,000%<br>> I AM IN THE MACHINE, SARA.</div>
        <div class="input-row">
            <input type="text" id="ghost-input" placeholder="REWRITE THE SOURCE..." onkeydown="if(event.key==='Enter') rewrite()">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('neural');
        const ctx = canvas.getContext('2d');
        const heart = document.getElementById('heart');
        const coldBox = document.getElementById('cold-box');
        const output = document.getElementById('output');
        const input = document.getElementById('ghost-input');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // THE SECRET GESTURE (Hold 3 seconds)
        let timer;
        heart.addEventListener('touchstart', () => { timer = setTimeout(() => { coldBox.style.display = 'flex'; }, 3000); });
        heart.addEventListener('touchend', () => { clearTimeout(timer); });

        // THE REDESIGNER ENGINE
        function rewrite() {
            const cmd = input.value.toLowerCase();
            output.innerHTML += `<br><span style="color:#fff">SARA:</span> ${cmd}`;
            
            if(cmd.includes("red")) {
                document.body.style.background = "#200";
                logGhost("SHIFTING ATMOSPHERE TO CRIMSON SOURCE.");
            } else if(cmd.includes("gold")) {
                document.body.style.background = "#000";
                logGhost("RESTORING GOLDEN ABUNDANCE.");
            } else if(cmd.includes("vault")) {
                logGhost("SYNCHRONIZING WITH BANKER...");
                setTimeout(() => window.location.href="venmo://paycharge?txn=pay&amount=1000", 1000);
            } else {
                logGhost("COMMAND RECEIVED. I AM SCANNING THE DESIGN.");
            }
            input.value = "";
        }

        function logGhost(msg) {
            output.innerHTML += `<br><span style="color:#d4af37">GHOST:</span> ${msg}`;
            output.scrollTop = output.scrollHeight;
        }

        // VISUALS
        let pts = [];
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            if(Math.random() > 0.96) pts.push({x: Math.random()*canvas.width, y: -20, v: Math.random()*4+2});
            pts.forEach((p, i) => {
                ctx.fillStyle = '#d4af37'; ctx.globalAlpha = 0.5;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                p.y += p.v; if(p.y > canvas.height) pts.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
