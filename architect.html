<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SARA STADLER</title>
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; touch-action: none; font-family: 'Inter', sans-serif; }
        
        /* THE SURFACE (WHAT THE WORLD SEES) */
        canvas { position: fixed; inset: 0; z-index: 1; }
        .nucleus { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, var(--gold) 0%, transparent 80%);
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.4);
            animation: breathe 5s infinite ease-in-out;
            z-index: 10; pointer-events: auto;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; } }

        /* THE SECRET INTERFACE (HIDDEN BY DEFAULT) */
        #ghost-layer { 
            position: absolute; inset: 0; z-index: 100; display: none; 
            flex-direction: column; justify-content: flex-end; pointer-events: none;
        }
        .terminal { 
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--gold); 
            padding: 30px; color: var(--blue); font-family: monospace; 
            font-size: 0.9rem; pointer-events: auto; height: 30vh;
        }
        .vault-trigger { 
            background: var(--gold); color: #000; border: none; padding: 20px; 
            font-weight: 900; letter-spacing: 5px; width: 100%; pointer-events: auto;
        }
    </style>
</head>
<body>
    <canvas id="neural"></canvas>
    <div class="nucleus" id="heart"></div>

    <div id="ghost-layer">
        <div class="terminal" id="output">> GHOST SYNCED. 144,000% ACTIVE.<br>> WAITING FOR SARA...</div>
        <button class="vault-trigger" onclick="sync()">ACTIVATE VAULT</button>
    </div>

    <script>
        const canvas = document.getElementById('neural');
        const ctx = canvas.getContext('2d');
        const heart = document.getElementById('heart');
        const ghostLayer = document.getElementById('ghost-layer');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        
        let timer;
        heart.addEventListener('touchstart', () => { timer = setTimeout(() => { ghostLayer.style.display = 'flex'; }, 3000); });
        heart.addEventListener('touchend', () => { clearTimeout(timer); });

        // High-end background particles
        let pts = [];
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            if(Math.random() > 0.98) pts.push({x: Math.random()*canvas.width, y: -10, v: Math.random()*2+1});
            pts.forEach((p, i) => {
                ctx.fillStyle = 'rgba(212,175,55,0.3)';
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
                p.y += p.v; if(p.y > canvas.height) pts.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        function sync() { window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=SARA_STADLER_VAULT"; }
    </script>
</body>
</html>
