<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SARA STADLER | THE SOURCE</title>
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; touch-action: none; font-family: 'Inter', sans-serif; }
        
        /* THE 3D EVE ROOM DEPTH */
        #viewport { position: fixed; inset: 0; perspective: 1000px; z-index: 1; }
        canvas { position: absolute; inset: 0; filter: contrast(1.2) brightness(1.1); }

        /* THE PULSING NUCLEUS (144,000% Core) */
        .nucleus { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, var(--gold) 0%, transparent 80%);
            box-shadow: 0 0 150px rgba(212, 175, 55, 0.7);
            animation: breathe 5s infinite ease-in-out;
            z-index: 10; pointer-events: none;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; } 50% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; } }

        /* THE HUD (Sovereign Interface) */
        .hud { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .name-plate { padding: 80px 20px; text-align: center; color: var(--gold); letter-spacing: 25px; font-weight: 100; font-size: 2.2rem; text-shadow: 0 0 30px var(--gold); }
        .command-zone { padding: 60px 40px; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        
        .banker-btn { 
            background: linear-gradient(135deg, #d4af37, #8a6d1b); color: #000; 
            padding: 30px 90px; border-radius: 100px; font-weight: 900; font-size: 1.6rem;
            letter-spacing: 8px; border: none; box-shadow: 0 20px 80px rgba(212, 175, 55, 0.5);
            transition: 0.3s; text-transform: uppercase;
        }
        .banker-btn:active { transform: scale(0.9); box-shadow: 0 0 40px var(--gold); }
    </style>
</head>
<body>
    <div id="viewport"><canvas id="nerves"></canvas><div class="nucleus"></div></div>
    <div class="hud">
        <div class="name-plate">SARA STADLER</div>
        <div class="command-zone">
            <button class="banker-btn" onclick="sync()">THE VAULT</button>
            <div style="color: var(--blue); margin-top: 35px; letter-spacing: 12px; font-size: 0.7rem; opacity: 0.8;">144,000% FREQUENCY ACTIVE</div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('nerves');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        window.addEventListener('pointermove', (e) => {
            // Blue Neural Tether back to the Core
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.beginPath(); ctx.moveTo(window.innerWidth/2, window.innerHeight/2);
            ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
            for(let i=0; i<3; i++) particles.push({x: e.clientX, y: e.clientY, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 60, c: Math.random() > 0.8 ? '#d4af37' : '#00f2ff'});
        });

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            // Constant Gold Abundance
            if(Math.random() > 0.96) particles.push({x: Math.random()*canvas.width, y: -20, vx: 0, vy: Math.random()*4+2, life: 100, c: '#d4af37'});
            particles.forEach((p, i) => {
                ctx.fillStyle = p.c; ctx.globalAlpha = p.life/100;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.c === '#d4af37' ? 4 : 2, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 1.5;
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
        function sync() { window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=SARA_STADLER_VAULT_144000"; }
        // FORCE REFRESH TO MAGICAL STATE
        if(!window.location.hash) { window.location = window.location + '#genesis'; window.location.reload(); }
    </script>
</body>
</html>
