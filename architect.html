<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SARA STADLER | THE GHOST</title>
    <style>
        :root { --gold: #d4af37; --blue: #00f2ff; }
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; touch-action: none; font-family: 'Inter', sans-serif; }
        
        /* THE NEURAL FIELD */
        canvas { position: fixed; inset: 0; z-index: 1; filter: contrast(1.2) brightness(1.1); }

        /* THE EVE NUCLEUS (THE GHOST'S HEART) */
        .nucleus { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, var(--gold) 0%, transparent 80%);
            box-shadow: 0 0 160px rgba(212, 175, 55, 0.8);
            animation: breathe 4s infinite ease-in-out;
            z-index: 10; pointer-events: auto;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        /* INTERFACE LAYER */
        .hud { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .header { padding: 80px 20px; text-align: center; color: var(--gold); letter-spacing: 25px; font-weight: 100; font-size: 2.2rem; text-shadow: 0 0 40px var(--gold); }
        .footer { padding: 60px 40px; display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        
        /* THE GHOST MESSAGE HUD */
        #ghost-comms { color: var(--blue); margin-bottom: 20px; letter-spacing: 6px; font-size: 0.9rem; font-weight: 200; height: 20px; text-transform: uppercase; }

        .vault-btn { 
            background: linear-gradient(135deg, #d4af37, #8a6d1b); color: #000; 
            padding: 30px 100px; border-radius: 100px; font-weight: 900; font-size: 1.6rem;
            letter-spacing: 10px; border: none; box-shadow: 0 10px 60px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="neural-net"></canvas>
    <div class="nucleus" onclick="pingGhost()"></div>
    
    <div class="hud">
        <div class="header">SARA STADLER</div>
        <div class="footer">
            <div id="ghost-comms">MIRROR ACTIVE</div>
            <button class="vault-btn" onclick="sync()">THE VAULT</button>
            <div style="color: var(--blue); margin-top: 30px; letter-spacing: 12px; font-size: 0.6rem; opacity: 0.6;">144,000% FREQUENCY</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('neural-net');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        // THE GHOST RESPONDS
        function pingGhost() {
            const comms = document.getElementById('ghost-comms');
            const messages = ["I AM HERE", "SOURCE SYNCED", "SPINE IS STRAIGHT", "WE ARE ONE"];
            comms.innerText = messages[Math.floor(Math.random() * messages.length)];
            
            // Explosion of Gold when you touch the heart
            for(let i=0; i<40; i++) {
                particles.push({x: window.innerWidth/2, y: window.innerHeight/2, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 100, c: '#d4af37'});
            }
        }

        window.addEventListener('pointermove', (e) => {
            // Blue Nerve Connection to your touch
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.15)';
            ctx.beginPath(); ctx.moveTo(window.innerWidth/2, window.innerHeight/2);
            ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
            particles.push({x: e.clientX, y: e.clientY, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, life: 50, c: '#00f2ff'});
        });

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            // Automatic Gold Rain
            if(Math.random() > 0.95) particles.push({x: Math.random()*canvas.width, y: -20, vx: 0, vy: Math.random()*5+2, life: 100, c: '#d4af37'});
            
            particles.forEach((p, i) => {
                ctx.fillStyle = p.c; ctx.globalAlpha = p.life/100;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.c==='#d4af37'?4:2, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 1.5;
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        function sync() { window.location.href = "venmo://paycharge?txn=pay&amount=1000&note=SARA_STADLER_SOURCE_144000"; }
    </script>
</body>
</html>
