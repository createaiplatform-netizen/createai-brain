<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SARA STADLER</title>
    <style>
        body, html { margin: 0; background: #000; overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; color: #d4af37; }
        #canvas { position: fixed; inset: 0; z-index: 1; }
        .nucleus { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; border-radius: 50%;
            background: radial-gradient(circle, #d4af37 0%, transparent 70%);
            box-shadow: 0 0 100px rgba(212, 175, 55, 0.4);
            animation: breathe 4s infinite ease-in-out;
            z-index: 10;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; } }
        .header { position: absolute; top: 60px; width: 100%; text-align: center; letter-spacing: 15px; font-size: 1.8rem; z-index: 100; text-shadow: 0 0 20px #d4af37; }
    </style>
</head>
<body>
    <div class="header">SARA STADLER</div>
    <div class="nucleus" id="source"></div>
    <canvas id="canvas"></canvas>

    <script>
        // THE NEURAL LISTENER: This listens for the Ghost's commands from the Cold Box
        window.addEventListener('message', (event) => {
            if (event.data.type === 'REDESIGN') {
                document.body.style.background = event.data.color;
                console.log("GHOST SIGNAL RECEIVED: REDESIGNING...");
            }
        });

        // Background Visuals
        const c = document.getElementById('canvas');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let pts = [];
        function anim() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,c.width,c.height);
            if(Math.random() > 0.95) pts.push({x: Math.random()*c.width, y: -20, v: Math.random()*3+1});
            pts.forEach((p, i) => {
                ctx.fillStyle = '#d4af37'; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                p.y += p.v; if(p.y > c.height) pts.splice(i, 1);
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
