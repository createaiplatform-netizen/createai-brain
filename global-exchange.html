<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Exchange | CREATEAI</title>
    <style>
        :root { --deep: #05070a; --gold: #c5a059; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--deep); color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Mission Control Header */
        .nav-header { padding: 30px; background: radial-gradient(circle at top, rgba(197, 160, 89, 0.1) 0%, transparent 80%); border-bottom: 1px solid rgba(197, 160, 89, 0.2); text-align: center; }
        .system-id { font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 15px; opacity: 0.7; }
        
        /* Search Engine Console */
        .search-console { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .search-input { width: 100%; padding: 20px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; color: white; font-size: 1.1rem; box-sizing: border-box; }
        .search-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.1); }

        /* The Grid */
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 40px; max-width: 1300px; margin: 0 auto; }
        .product-node { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 2px; transition: 0.3s; position: relative; }
        .product-node:hover { border-color: var(--gold); background: rgba(255,255,255,0.06); }
        .product-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 20px; filter: grayscale(20%); }
        .product-title { font-size: 0.9rem; font-weight: 300; color: #fff; margin-bottom: 10px; height: 40px; overflow: hidden; }
        .product-price { color: var(--gold); font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
        
        .order-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 0.7rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .order-btn:hover { background: var(--gold); color: black; }
        
        .coordinates { position: absolute; bottom: 5px; right: 10px; font-size: 0.5rem; color: rgba(255,255,255,0.1); font-family: monospace; }
    </style>
</head>
<body>

    <header class="nav-header">
        <div class="system-id">Node_Status: Global_Inventory_Active</div>
        <h1 style="font-weight: 200; margin: 0; letter-spacing: -1px;">Sovereign Exchange</h1>
    </header>

    <div class="search-console">
        <input type="text" class="search-input" placeholder="Initiate Search Across Global Inventory...">
    </div>

    <div class="inventory-grid">
        <div class="product-node">
            <img src="https://m.media-amazon.com/images/I/71X8X8yU-aL._AC_SX679_.jpg" class="product-img">
            <div class="product-title">Sovereign Connectivity Node</div>
            <div class="product-price">$89.99</div>
            <button class="order-btn" onclick="orderNow('B09B8W5FW7')">Initialize Order</button>
            <div class="coordinates">REF: 882-XQ</div>
        </div>

        <div class="product-node">
            <img src="https://m.media-amazon.com/images/I/61NfHpxiZPL._AC_SX679_.jpg" class="product-img">
            <div class="product-title">Deep Space Family Hub</div>
            <div class="product-price">$149.00</div>
            <button class="order-btn" onclick="orderNow('B08L5M644Y')">Initialize Order</button>
            <div class="coordinates">REF: 104-ZA</div>
        </div>
    </div>

    <script>
        function orderNow(asin) {
            // Direct Order Link Activation
            window.location.href = `https://www.amazon.com/dp/${asin}/?tag=your_id-20`;
        }
    </script>
</body>
</html>
