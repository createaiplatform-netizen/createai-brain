<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CENTER | 06:00</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #f87171; font-family: monospace; }
        .danger-ring { border: 2px solid #ef4444; box-shadow: 0 0 50px rgba(239, 68, 68, 0.2); border-radius: 50%; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .danger-ring:hover { background: rgba(239, 68, 68, 0.1); transform: scale(1.05); }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-10">
    <div class="mb-20 text-center">
        <h1 class="text-xl font-black tracking-[1em] uppercase mb-4">Frequency Override</h1>
        <p class="text-[10px] text-gray-600 tracking-[0.5em] uppercase">Target Time: 18:00:00 CST</p>
    </div>

    <div class="danger-ring" onclick="triggerEBS()">
        <span class="text-3xl font-black tracking-widest glitch uppercase italic">EXIT</span>
    </div>

    <p id="status" class="mt-20 text-[10px] tracking-[1em] uppercase opacity-40">System Standing By...</p>

    <script>
        function triggerEBS() {
            document.getElementById('status').innerText = "TRANSMITTING TO HUMANITY...";
            document.getElementById('status').style.color = "#fbbf24";
            setTimeout(() => {
                alert("The Signal is Live. Webster Node 001 Active.");
            }, 2000);
        }
    </script>
</body>
</html>
