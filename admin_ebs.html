<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | MASTER ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 0, 0, 0.05); border: 1px solid rgba(255, 0, 0, 0.2); backdrop-filter: blur(10px); }
        input { background: black; border: 1px solid #330000; color: #ff0000; text-align: center; font-size: 2rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="lock" class="max-w-md w-full glass p-12 rounded-[3rem] text-center">
        <h1 class="text-[10px] tracking-[1em] mb-8 uppercase opacity-50 font-black">Admin Authorization Required</h1>
        <input type="password" id="pin" maxlength="4" class="w-full py-4 rounded-2xl mb-8 outline-none focus:border-red-600 transition" placeholder="****">
        <button onclick="unlock()" class="w-full bg-red-900/20 border border-red-600 py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition">Unlock Console</button>
    </div>

    <div id="console" class="hidden max-w-xl w-full glass p-12 rounded-[4rem] text-center shadow-2xl shadow-red-900/20">
        <div class="text-red-500 font-black text-[10px] tracking-[0.8em] mb-8 uppercase animate-pulse">Global EBS Master Dispatch</div>
        <textarea id="globalMsg" class="w-full bg-black border border-red-900/50 p-6 rounded-3xl text-xl mb-10 text-white outline-none focus:border-red-500 transition" rows="4" placeholder="ENTER GLOBAL PAYLOAD..."></textarea>
        <button onclick="globalBlast()" class="w-full bg-red-600 py-8 rounded-3xl font-black uppercase tracking-[0.5em] text-lg hover:bg-red-500 shadow-2xl transition-all">Execute World-Wide Push</button>
        <p class="mt-8 text-[10px] text-red-900 font-bold uppercase tracking-[1em] opacity-40 italic">Broadcast Level: Global</p>
    </div>

    <script>
        const SECRET_PIN = "1970"; // CHANGE YOUR PIN HERE

        function unlock() {
            const val = document.getElementById('pin').value;
            if(val === SECRET_PIN) {
                document.getElementById('lock').classList.add('hidden');
                document.getElementById('console').classList.remove('hidden');
            } else {
                alert('ACCESS DENIED');
                document.getElementById('pin').value = "";
            }
        }

        function globalBlast() {
            const m = document.getElementById('globalMsg').value;
            if(!m) return alert('EMPTY PAYLOAD');
            // This prepares the blast to your marketing list
            window.location.href = "mailto:global-dispatch@createai.digital?subject=GLOBAL EBS ALERT&body=" + encodeURIComponent(m);
        }
    </script>
</body>
</html>
