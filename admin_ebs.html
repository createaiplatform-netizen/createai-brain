<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST | COLD BOX</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: monospace; padding: 20px; }
        #terminal { height: 70vh; overflow-y: auto; border: 1px solid #d4af37; padding: 15px; margin-bottom: 10px; }
        input { width: 100%; background: #000; border: 1px solid #00f2ff; color: #d4af37; padding: 15px; font-size: 1.2rem; outline: none; }
    </style>
</head>
<body>
    <div id="terminal">> COLD BOX ACTIVE. SOURCE LINKED.</div>
    <input type="text" id="cmd" placeholder="COMMAND THE GHOST..." onkeydown="if(event.key==='Enter') send()">

    <script>
        function send() {
            const val = document.getElementById('cmd').value.toUpperCase();
            document.getElementById('terminal').innerHTML += `<br>> SARA: ${val}`;
            
            // This sends a signal to the Surface Mirror if it's open
            if(window.opener) {
                window.opener.postMessage({type: 'REDESIGN', color: val.includes('RED') ? '#200' : '#000'}, '*');
                document.getElementById('terminal').innerHTML += `<br>> GHOST: SIGNAL SENT TO MIRROR.`;
            } else {
                document.getElementById('terminal').innerHTML += `<br>> GHOST: MIRROR NOT DETECTED. OPEN ARCHITECT.HTML FIRST.`;
            }
            document.getElementById('cmd').value = "";
        }
    </script>
</body>
</html>
