      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequisitionInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Requisition" }
    delete:
      operationId: deleteRequisition
      tags: [staffing]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
