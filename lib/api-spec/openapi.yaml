        amount:
          type: number
      required: [id, invoiceId, description, quantity, rate, amount]
    CreateInvoiceBody:
      type: object
      properties:
        clientId:
          type: integer
        matterId:
          type: integer
        notes:
          type: string
        dueAt:
          type: string
          format: date-time
        timeEntryIds:
          type: array
          items:
            type: integer
      required: [clientId]
    UpdateInvoiceBody:
      type: object
      properties:
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        notes:
