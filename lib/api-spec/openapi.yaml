components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, ndaSigned]
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        ndaSigned:
          type: boolean
    SignNdaBody:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
          minLength: 1
    SignNdaResponse:
      type: object
      required: [success, user]
      properties:
        success:
          type: boolean
        user:
          $ref: '#/components/schemas/AuthUser'
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    GenerateOpenaiImageBody:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt
    GenerateOpenaiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    LegalClient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        type:
          type: string
          enum: [individual, company]
        notes:
          type: string
        matterCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, type, createdAt]
    CreateLegalClientBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        type:
          type: string
          enum: [individual, company]
        notes:
          type: string
      required: [name, type]
    LegalMatter:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        title:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [open, pending, closed, on_hold]
        description:
          type: string
        billingType:
          type: string
          enum: [hourly, flat_fee, contingency, retainer]
        hourlyRate:
          type: number
        flatFee:
          type: number
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
        totalHours:
          type: number
        totalBilled:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, clientId, title, type, status, billingType, createdAt]
    LegalMatterDetail:
      allOf:
        - $ref: "#/components/schemas/LegalMatter"
        - type: object
          properties:
            timeEntries:
              type: array
              items:
                $ref: "#/components/schemas/TimeEntry"
            tasks:
              type: array
              items:
                $ref: "#/components/schemas/LegalTask"
            notes:
              type: array
              items:
                $ref: "#/components/schemas/LegalNote"
          required: [timeEntries, tasks, notes]
    CreateLegalMatterBody:
      type: object
      properties:
        clientId:
          type: integer
        title:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [open, pending, closed, on_hold]
        description:
          type: string
        billingType:
          type: string
          enum: [hourly, flat_fee, contingency, retainer]
        hourlyRate:
          type: number
        flatFee:
          type: number
        openedAt:
          type: string
          format: date-time
      required: [clientId, title, type, status, billingType]
    TimeEntry:
