        matterId:
          type: integer
        matterTitle:
          type: string
        clientName:
          type: string
        description:
          type: string
        hours:
          type: number
        rate:
          type: number
        amount:
          type: number
        date:
          type: string
          format: date-time
        isBilled:
          type: boolean
        invoiceId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, matterId, description, hours, rate, amount, date, isBilled, createdAt]
    CreateTimeEntryBody:
      type: object
      properties:
        matterId:
          type: integer
        description:
          type: string
        hours:
          type: number
        rate:
          type: number
        date:
          type: string
          format: date-time
        isBilled:
          type: boolean
      required: [matterId, description, hours, rate, date]
    LegalInvoice:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        matterId:
          type: integer
        matterTitle:
          type: string
        invoiceNumber:
          type: string
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        total:
          type: number
        notes:
          type: string
        issuedAt:
          type: string
          format: date-time
        dueAt:
          type: string
          format: date-time
        paidAt:
