  /health/medical-records:
    get:
      operationId: listMedicalRecords
      tags: [health]
      summary: List medical records for a patient
      parameters:
        - name: patientId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record list
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/MedicalRecord"
                required: [records]
    post:
      operationId: createMedicalRecord
      tags: [health]
      summary: Create medical record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicalRecordBody"
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicalRecord"
  /health/medical-records/{id}:
    put:
      operationId: updateMedicalRecord
      tags: [health]
      summary: Update medical record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicalRecordBody"
      responses:
        "200":
