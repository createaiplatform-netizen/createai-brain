  /staffing/candidates:
    get:
      operationId: listCandidates
      tags: [staffing]
      summary: List candidates
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
      responses:
        "200":
          description: Candidates list
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    items: { $ref: "#/components/schemas/Candidate" }
    post:
      operationId: createCandidate
      tags: [staffing]
      summary: Create a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CandidateInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Candidate" }
  /staffing/candidates/{id}:
