##
# CreateAI Brain — Automated App Store Submission Pipeline
# Triggers on every push to main. Requires these secrets (add once to GitHub repo):
#   APPLE_ID                 — Sara's Apple ID (email)
#   APPLE_APP_SPECIFIC_PASS  — App-specific password from appleid.apple.com
#   APPLE_TEAM_ID            — Apple Developer Team ID
#   MATCH_GIT_URL            — Private git repo URL for Fastlane Match certificates
#   MATCH_PASSWORD           — Fastlane Match encryption password
#   GOOGLE_PLAY_KEY_JSON     — Contents of Google Play service account JSON key
##

name: App Store & Play Store Submission

on:
  push:
    branches: [main]
    paths:
      - "artifacts/createai-brain/**"
      - ".github/workflows/app-store-submit.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Submission target"
        required: true
        default: "both"
        type: choice
        options: [both, ios, android, pwa]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build & Submit to Apple App Store
  # ─────────────────────────────────────────────────────────────────────────────
  ios-submit:
    name: iOS — Apple App Store
    runs-on: macos-latest
    if: |
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'ios' ||
      github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: artifacts/createai-brain

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
        working-directory: artifacts/createai-brain

      - name: Build web app
        run: pnpm run build
        working-directory: artifacts/createai-brain
        env:
          VITE_API_URL: https://createaibrain.app

      - name: Install Capacitor iOS
        run: |
          pnpm add @capacitor/core @capacitor/ios @capacitor/cli @capacitor/splash-screen @capacitor/status-bar
          npx cap add ios || true
          npx cap sync ios
        working-directory: artifacts/createai-brain

      - name: Install CocoaPods
        run: |
          cd artifacts/createai-brain/ios/App
          pod install --repo-update

      - name: Install Fastlane
        run: |
          cd artifacts/createai-brain
          bundle install

      - name: Sync certificates via Fastlane Match
        run: |
          cd artifacts/createai-brain
          bundle exec fastlane match appstore --readonly
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build & Upload to App Store Connect
        run: |
          cd artifacts/createai-brain
          bundle exec fastlane ios release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASS: ${{ secrets.APPLE_APP_SPECIFIC_PASS }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Notify on success
        if: success()
        run: |
          echo "✅ iOS build submitted to App Store Connect successfully"
          echo "Review at: https://appstoreconnect.apple.com"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Submit to Google Play Store
  # ─────────────────────────────────────────────────────────────────────────────
  android-submit:
    name: Android — Google Play Store
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'android' ||
      github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: artifacts/createai-brain

      - name: Install pnpm + dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
        working-directory: artifacts/createai-brain

      - name: Build web app
        run: pnpm run build
        working-directory: artifacts/createai-brain
        env:
          VITE_API_URL: https://createaibrain.app

      - name: Install Capacitor Android
        run: |
          pnpm add @capacitor/core @capacitor/android @capacitor/cli @capacitor/splash-screen @capacitor/status-bar
          npx cap add android || true
          npx cap sync android
        working-directory: artifacts/createai-brain

      - name: Install Bubblewrap (TWA alternative)
        run: npm install -g @bubblewrap/cli

      - name: Setup Google Play Service Account
        run: |
          echo '${{ secrets.GOOGLE_PLAY_KEY_JSON }}' > /tmp/google-play-key.json

      - name: Build Android Release Bundle (AAB)
        run: |
          cd artifacts/createai-brain/android
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: createai
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}

      - name: Sign the AAB
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore
          jarsigner -verbose \
            -keystore ${{ runner.temp }}/release.keystore \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASS }}" \
            artifacts/createai-brain/android/app/build/outputs/bundle/release/app-release.aab \
            createai

      - name: Submit to Google Play (via Fastlane Supply)
        run: |
          cd artifacts/createai-brain
          bundle exec fastlane android release
        env:
          GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_KEY_JSON }}

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Android AAB submitted to Google Play Console"
          echo "Review at: https://play.google.com/console"

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy PWA to Production (always runs)
  # ─────────────────────────────────────────────────────────────────────────────
  pwa-deploy:
    name: PWA — Deploy to Production
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: artifacts/createai-brain

      - name: Build production PWA
        run: pnpm run build
        working-directory: artifacts/createai-brain
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL || 'https://createaibrain.app' }}

      - name: Validate PWA manifest
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('artifacts/createai-brain/dist/public/manifest.json','utf8'));
          console.log('✅ Manifest valid — icons:', manifest.icons.length, '| shortcuts:', manifest.shortcuts.length);
          "

      - name: Validate service worker
        run: |
          test -f artifacts/createai-brain/dist/public/sw.js && echo "✅ Service worker present" || echo "❌ Service worker missing"

      - name: PWA Deployment complete
        run: |
          echo "✅ PWA built and ready for deployment"
          echo "All icon sizes: $(ls artifacts/createai-brain/dist/public/icons/ | wc -l)"
          echo "Splash screens: $(ls artifacts/createai-brain/dist/public/splash/ 2>/dev/null | wc -l || echo 0)"
