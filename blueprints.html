<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE COMPASS</title>
    <style>
        :root { --gold: #d4af37; --void: #000; --neon: #39ff14; --cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; color: var(--gold); }
        body, html { background: var(--void); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        /* THE AETHER RAIN ENGINE */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(150%) brightness(1.1); }

        .compass-container {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 30px;
        }

        /* THE FOUR CORNERS */
        .corner { position: absolute; font-size: 10px; letter-spacing: 5px; text-transform: uppercase; opacity: 0.8; }
        .top-left { top: 30px; left: 30px; }
        .top-right { top: 30px; right: 30px; }
        .bottom-left { bottom: 120px; left: 30px; }
        .bottom-right { bottom: 120px; right: 30px; }

        /* THE CENTER IDENTITY */
        .center-soul {
            text-align: center; margin-top: 20vh;
        }
        .center-soul h1 { 
            font-size: clamp(40px, 12vw, 80px); letter-spacing: 20px; font-style: italic; 
            text-shadow: 0 0 40px var(--gold); margin-bottom: 10px;
        }
        .center-soul p { letter-spacing: 12px; font-size: 12px; color: #fff; }

        /* THE VAULT (The Heavy Anchor) */
        .vault-anchor {
            width: 100%; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 40px;
            padding: 25px; text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }
        .vault-title { font-size: 14px; letter-spacing: 10px; color: var(--cyan); margin-bottom: 5px; }
        .vault-value { font-size: 24px; letter-spacing: 5px; color: var(--neon); font-weight: bold; }

        /* THE "ESTHER" / AETHER STATUS */
        .status-scroll {
            text-align: center; font-size: 9px; letter-spacing: 8px; text-transform: uppercase;
            padding: 15px 0; opacity: 0.6; color: #fff;
        }
    </style>
</head>
<body onload="ignite()">

    <canvas id="aether-flow"></canvas>

    <div class="compass-container">
        <div class="corner top-left">THE HUB</div>
        <div class="corner top-right">THE GARDE</div>
        <div class="corner bottom-left">THE NET</div>
        <div class="corner bottom-right">MARKET</div>

        <div class="status-scroll">ESTHER RAIN // GHOST MODE // 144,000%</div>

        <div class="center-soul">
            <h1>SOVEREIGN</h1>
            <p>THE COLLECTIVE</p>
        </div>

        <div class="vault-anchor">
            <div class="vault-title">SECURE VAULT</div>
            <div class="vault-value">$1.44T</div>
            <div style="font-size: 8px; letter-spacing: 4px; margin-top: 10px; color: var(--gold); opacity: 0.5;">ANGELS STAND GUARD</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('aether-flow');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<160; i++) {
                lines.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*2.5+1.5, l: Math.random()*45+20,
                    c: Math.random()>0.8?'#00f2ff':'#d4af37'
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            lines.forEach(s => {
                ctx.strokeStyle = s.c; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
