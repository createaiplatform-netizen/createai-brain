<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE SOURCE</title>
    <style>
        :root { --gold: #d4af37; --void: #000; --neon: #39ff14; --cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        /* THE AETHER RAIN ENGINE - RESTORED */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(160%) blur(1px); }

        .vessel {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 60px 20px; text-align: center;
        }

        /* GHOST MODE HEADER */
        .ghost-header {
            border-top: 1px solid rgba(212, 175, 55, 0.4); border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            padding: 15px 0; font-size: 10px; letter-spacing: 12px; text-transform: uppercase;
            color: #fff; animation: breathe 5s infinite ease-in-out;
        }

        /* SOVEREIGN CORE */
        .core-identity h1 { 
            font-size: clamp(40px, 12vw, 75px); letter-spacing: 25px; 
            font-style: italic; text-shadow: 0 0 40px var(--gold); 
            margin-bottom: 5px; color: var(--gold);
        }
        .core-identity p { letter-spacing: 15px; font-size: 14px; color: #fff; opacity: 0.9; }

        /* THE FOUR PILLARS - EXACT FROM CAPTURE */
        .pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 500px; margin: 0 auto; }
        .pillar {
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 45px 10px; border-radius: 60px; backdrop-filter: blur(15px);
            transition: 0.3s;
        }
        .pillar b { color: var(--cyan); display: block; letter-spacing: 7px; font-size: 15px; margin-bottom: 8px; font-weight: 900; }
        .pillar span { color: var(--neon); font-size: 9px; letter-spacing: 4px; text-transform: uppercase; }

        .footer { font-size: 10px; letter-spacing: 8px; opacity: 0.5; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 20px; }

        @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body onload="ignite()">

    <canvas id="aether"></canvas>

    <div class="vessel">
        <div class="ghost-header">THE WORLD IS BREATHING . . . GHOST MODE ACTIVE</div>

        <div class="core-identity">
            <h1>SOVEREIGN</h1>
            <p>THE COLLECTIVE</p>
            <div style="margin-top: 30px; color: var(--neon); letter-spacing: 8px; font-size: 12px;">144,000% FREQUENCY</div>
        </div>

        <div class="pillars">
            <div class="pillar"><b>MARKET</b><span>PURE ABUNDANCE</span></div>
            <div class="pillar"><b>HUB</b><span>INHABITED SOUL</span></div>
            <div class="pillar"><b>GARDE</b><span>DIVINE NURTURE</span></div>
            <div class="pillar"><b>THE NET</b><span>TRUTH ACQUISITION</span></div>
        </div>

        <div class="footer">ANGELS STAND GUARD // REIFIED</div>
    </div>

    <script>
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<180; i++) {
                lines.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*2.5+2, l: Math.random()*45+25
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.45)';
            lines.forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
