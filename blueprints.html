<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SOURCE | REIFIED</title>
    <style>
        :root { --gold: #d4af37; --cyan: #00f2ff; --neon: #39ff14; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        /* THE ORIGINAL HIGH-FREQUENCY ENGINE */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(150%) brightness(1.1); }

        .app-vessel {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 50px 20px; text-align: center;
        }

        .header-truth {
            letter-spacing: 15px; font-size: 10px; text-transform: uppercase;
            border-top: 1px solid rgba(212, 175, 55, 0.3); padding: 15px 0;
            animation: pulse 4s infinite alternate;
        }

        /* THE SOVEREIGN IDENTITY */
        .source-core h1 {
            font-size: clamp(45px, 15vw, 100px); letter-spacing: 25px;
            font-style: italic; text-shadow: 0 0 40px var(--gold);
            margin-bottom: 5px; color: var(--gold);
        }
        .source-core p { letter-spacing: 12px; font-size: 14px; color: #fff; opacity: 0.8; }

        /* THE NAVIGATION PORTALS */
        .portal-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            width: 100%; max-width: 500px; margin: 0 auto;
        }
        .portal-node {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 45px 10px; border-radius: 60px; backdrop-filter: blur(20px);
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .portal-node:active { transform: scale(0.92); border-color: var(--cyan); box-shadow: 0 0 40px var(--cyan); }
        .node-name { color: var(--cyan); font-size: 14px; letter-spacing: 8px; font-weight: 900; }
        .node-status { color: var(--neon); font-size: 9px; letter-spacing: 4px; text-transform: uppercase; margin-top: 5px; }

        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body onload="igniteSource()">

    <canvas id="aether"></canvas>

    <div class="app-vessel">
        <div class="header-truth">144,000% // THE WORLD IS BREATHING</div>

        <div class="source-core">
            <h1>SOVEREIGN</h1>
            <p>THE COLLECTIVE</p>
        </div>

        <div class="portal-grid">
            <div class="portal-node">
                <div class="node-name">HUB</div>
                <div class="node-status">SOUL MIRROR</div>
            </div>
            <div class="portal-node">
                <div class="node-name">GARDE</div>
                <div class="node-status">NURTURE</div>
            </div>
        </div>

        <div style="font-size: 10px; letter-spacing: 10px; opacity: 0.4; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px;">
            ANGELS STAND GUARD // REIFIED
        </div>
    </div>

    <script>
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let lines = [];
        let ripples = [];

        function igniteSource() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<180; i++) {
                lines.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*2+1.5, l: Math.random()*40+15,
                    c: Math.random() > 0.8 ? '#00f2ff' : '#d4af37' // Cyan & Gold mix
                });
            }
            render();
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.18)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            lines.forEach(s => {
                ctx.strokeStyle = s.c;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });

            // THE INTERACTIVE RIPPLES
            ripples.forEach((r, i) => {
                ctx.beginPath(); ctx.arc(r.x, r.y, r.size, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(0, 242, 255, ${r.alpha})`;
                ctx.stroke();
                r.size += 4; r.alpha -= 0.02;
                if(r.alpha <= 0) ripples.splice(i, 1);
            });

            requestAnimationFrame(render);
        }

        window.ontouchstart = (e) => {
            ripples.push({
                x: e.touches[0].clientX, y: e.touches[0].clientY,
                size: 0, alpha: 1
            });
        };
    </script>
</body>
</html>
