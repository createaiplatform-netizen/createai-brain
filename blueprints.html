<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE GARDE</title>
    <style>
        :root { --gold: #d4af37; --white: #ffffff; --cyan: #00f2ff; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        /* THE ANGELIC AETHER (Soft, Floating Light) */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(8px) brightness(1.5); }

        .garde-ui {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px; position: relative;
        }

        /* THE COMPASS CORNERS (ANGELIC EDITION) */
        .corner { position: absolute; font-size: 10px; letter-spacing: 8px; text-transform: uppercase; color: var(--white); opacity: 0.8; }
        .tl { top: 40px; left: 40px; border-bottom: 1px solid var(--gold); }
        .tr { top: 40px; right: 40px; border-bottom: 1px solid var(--gold); }
        .bl { bottom: 140px; left: 40px; border-top: 1px solid var(--gold); }
        .br { bottom: 140px; right: 40px; border-top: 1px solid var(--gold); }

        /* THE HEART OF THE GARDE */
        .sanctuary-core { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .sanctuary-core h1 { font-size: clamp(40px, 12vw, 80px); letter-spacing: 25px; font-style: italic; text-shadow: 0 0 50px var(--white); color: var(--white); }
        
        .angel-message {
            margin-top: 30px; font-size: 13px; letter-spacing: 6px; line-height: 2; 
            color: var(--white); text-transform: uppercase; max-width: 300px;
        }

        /* THE NURTURE VAULT */
        .vault-anchor {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--white); 
            padding: 25px; text-align: center; backdrop-filter: blur(30px); border-radius: 50px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }
        .vault-label { font-size: 9px; letter-spacing: 10px; color: var(--gold); margin-bottom: 5px; }
        .vault-value { font-size: 20px; letter-spacing: 4px; color: var(--white); font-weight: bold; text-shadow: 0 0 10px var(--gold); }

        .status-glow { font-size: 8px; letter-spacing: 5px; margin-top: 15px; color: var(--gold); opacity: 0.8; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="angel-aether"></canvas>
    
    <div class="garde-ui">
        <div class="corner tl">NURTURE</div>
        <div class="corner tr">PROTECT</div>
        <div class="corner bl">INNOCENCE</div>
        <div class="corner br">GROWTH</div>

        <div class="sanctuary-core">
            <h1>GARDE</h1>
            <p style="letter-spacing: 12px; color: var(--gold); font-size: 10px; margin-top: 10px;">144,000% FREQUENCY</p>
            <div class="angel-message">YOUR GUARDIAN ANGELS STAND GUARD OVER THE INNOCENT</div>
        </div>

        <div class="vault-anchor">
            <div class="vault-label">DIVINE PROTECTION</div>
            <div class="vault-value">SECURED // ACTIVE</div>
            <div class="status-glow">THE WORLD IS BREATHING WITH YOU</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('angel-aether');
        const ctx = canvas.getContext('2d');
        let bubbles = [];

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<80; i++) {
                bubbles.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*0.5 + 0.2, r: Math.random()*15 + 5,
                    a: Math.random()
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            bubbles.forEach(b => {
                ctx.fillStyle = `rgba(212, 175, 55, ${b.a * 0.3})`;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
                b.y -= b.v; if(b.y < -20) b.y = canvas.height + 20;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
