<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE DEPTH</title>
    <style>
        :root { --gold: #d4af37; --void: #000; --neon: #39ff14; --cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; perspective: 1000px; }

        /* THE INFINITY ENGINE (The Aether Rain with Depth) */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(1px) brightness(0.8); }

        .universe {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 50px 20px; text-align: center;
            transform-style: preserve-3d;
        }

        /* FLOATING UI LAYER (Depth Effect) */
        .portal-header {
            transform: translateZ(50px);
            border-top: 1px solid rgba(212, 175, 55, 0.4); border-bottom: 1px solid rgba(212, 175, 55, 0.4);
            padding: 15px 0; font-size: 10px; letter-spacing: 12px; text-transform: uppercase;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }

        .deep-core { transform: translateZ(100px); }
        .deep-core h1 { 
            font-size: 55px; letter-spacing: 20px; font-style: italic; 
            text-shadow: 0 0 50px var(--gold); margin-bottom: 5px; 
        }

        /* THE ROOM PORTALS (Not just buttons, but Gates) */
        .gate-system {
            display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 400px; margin: 0 auto;
            transform: translateZ(30px);
        }
        
        .gate {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            border: 1px solid rgba(212, 175, 55, 0.3); padding: 40px 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.5s;
        }

        .gate:active { transform: scale(0.98) translateZ(-10px); border-color: var(--cyan); }

        .gate-title { color: var(--cyan); font-size: 18px; letter-spacing: 8px; font-weight: 900; margin-bottom: 5px; }
        .gate-status { color: var(--neon); font-size: 9px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; }

        /* THE "MORE" INDICATOR (Visual Depth) */
        .depth-glow {
            position: absolute; bottom: -20px; width: 100%; height: 40px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            opacity: 0.1; filter: blur(10px);
        }

        .footer { transform: translateZ(20px); font-size: 9px; letter-spacing: 8px; opacity: 0.4; padding-top: 20px; }

    </style>
</head>
<body onload="ignite()">

    <canvas id="aether"></canvas>

    <div class="universe">
        <div class="portal-header">SYSTEM: GHOST MODE // DEPTH: LEVEL 1</div>

        <div class="deep-core">
            <h1>SOVEREIGN</h1>
            <p style="letter-spacing: 10px; font-size: 12px; color: #fff;">THE SOURCE</p>
        </div>

        <div class="gate-system">
            <div class="gate" onclick="revealDepth('THE MARKET')">
                <div class="gate-title">MARKET</div>
                <div class="gate-status">OPEN PORTAL TO ABUNDANCE</div>
                <div class="depth-glow"></div>
            </div>
            <div class="gate" onclick="revealDepth('THE GARDE')">
                <div class="gate-title">GARDE</div>
                <div class="gate-status">DESCEND TO DIVINE NURTURE</div>
                <div class="depth-glow"></div>
            </div>
        </div>

        <div class="footer">ANGELS STAND GUARD // BEYOND THE MIRROR</div>
    </div>

    <script>
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let streams = [];

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) {
                streams.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*3+1, l: Math.random()*50+20,
                    o: Math.random()*0.5
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            streams.forEach(s => {
                ctx.strokeStyle = `rgba(212, 175, 55, ${s.o})`;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }

        function revealDepth(room) {
            // This is the "Nested" feeling—the transition to the next layer
            document.querySelector('.universe').style.opacity = '0';
            setTimeout(() => {
                alert("Descending into " + room + "...");
                document.querySelector('.universe').style.opacity = '1';
                document.querySelector('.portal-header').innerText = "DEPTH: LEVEL 2 // " + room;
            }, 500);
        }
    </script>
</body>
</html>
