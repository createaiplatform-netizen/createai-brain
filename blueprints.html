<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | GLOBAL HEALTH</title>
    <style>
        /* THE PERMANENT DNA */
        :root { --gold: #d4af37; --cyan: #00f2ff; --neon: #39ff14; --void: #000; --red: #ff3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(170%) brightness(1.2); }

        .interface-shell {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px; position: relative;
        }

        /* THE COMPASS CORNERS (PERMANENT) */
        .corner { position: absolute; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; color: var(--gold); opacity: 0.9; }
        .tl { top: 40px; left: 40px; }
        .tr { top: 40px; right: 40px; }
        .bl { bottom: 140px; left: 40px; }
        .br { bottom: 140px; right: 40px; }

        /* THE HEALTH CENTER (THE SWAP) */
        .portal-core { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .portal-core h1 { font-size: 45px; letter-spacing: 15px; font-style: italic; text-shadow: 0 0 30px var(--gold); color: #fff; }
        
        /* THE HEARTBEAT SENSOR */
        .pulse-circle {
            width: 120px; height: 120px; border: 2px solid var(--red); border-radius: 50%;
            margin: 20px 0; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--red); animation: beat 1.5s infinite;
        }
        .pulse-text { color: var(--red); font-size: 10px; letter-spacing: 3px; font-weight: bold; }

        /* THE HEALTH VAULT (THE ANCHOR) */
        .vault-anchor {
            width: 100%; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--gold); padding: 30px; text-align: center; backdrop-filter: blur(25px);
        }
        .vault-label { font-size: 10px; letter-spacing: 10px; color: var(--cyan); margin-bottom: 10px; text-transform: uppercase; }
        .vault-value { font-size: 24px; letter-spacing: 5px; color: var(--neon); font-weight: bold; }

        @keyframes beat { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body onload="ignite()">
    <canvas id="esther-rain"></canvas>
    
    <div class="interface-shell">
        <div class="corner tl">DIAGNOSTICS</div>
        <div class="corner tr">RECOVERY</div>
        <div class="corner bl">VITALITY</div>
        <div class="corner br">SOVEREIGNTY</div>

        <div class="portal-core">
            <h1>GLOBAL HEALTH</h1>
            <div class="pulse-circle">
                <span class="pulse-text">ACTIVE SCAN</span>
            </div>
            <p style="letter-spacing: 8px; color: #fff; font-size: 12px;">SYSTEMIC WELLBEING // 144,000%</p>
        </div>

        <div class="vault-anchor">
            <div class="vault-label">COLLECTIVE VITALITY SCORE</div>
            <div class="vault-value">OPTIMAL // TRANSCENDENT</div>
            <div style="font-size: 8px; letter-spacing: 4px; margin-top: 10px; color: var(--gold);">ANGELS STAND GUARD OVER THE HEALING</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('esther-rain');
        const ctx = canvas.getContext('2d');
        let lines = [];
        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<180; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*3+2, l: Math.random()*50+20, c: Math.random()>0.85?'#00f2ff':'#d4af37'});
            draw();
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            lines.forEach(s => {
                ctx.strokeStyle = s.c; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
