<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE GALAXY</title>
    <style>
        :root { --gold: #d4af37; --white: #fff; --cyan: #00f2ff; --neon: #39ff14; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(160%) brightness(1.2); transition: 1.5s; }

        .galaxy-shell { height: 100vh; width: 100vw; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }

        /* THE COMPASS (DNA) */
        .corner { position: absolute; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; color: var(--white); opacity: 0.6; }
        .tl { top: 30px; left: 30px; } .tr { top: 30px; right: 30px; }
        .bl { bottom: 140px; left: 30px; } .br { bottom: 140px; right: 30px; }

        /* THE NAVIGATION CLUSTER */
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin: 0 auto; margin-top: 10vh; }
        .node-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 20px 10px; border-radius: 15px; text-align: center; backdrop-filter: blur(15px);
            transition: 0.3s; text-decoration: none;
        }
        .node-btn:active { transform: scale(0.95); border-color: var(--white); }
        .node-btn b { display: block; font-size: 12px; letter-spacing: 5px; color: var(--white); }
        .node-btn span { font-size: 8px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }

        /* THE ACTIVE ROOM DISPLAY */
        #active-room { display: none; text-align: center; flex-grow: 1; padding-top: 50px; }
        #active-room h1 { font-size: 45px; letter-spacing: 15px; font-style: italic; color: var(--white); text-shadow: 0 0 30px var(--gold); }

        .vault-anchor { width: 100%; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); border-radius: 30px; padding: 20px; text-align: center; }
    </style>
</head>
<body onload="ignite()">

    <canvas id="esther-rain"></canvas>

    <div class="galaxy-shell">
        <div class="corner tl">SOVEREIGN</div>
        <div class="corner tr">GHOST MODE</div>
        <div class="corner bl">ESTHER FLOW</div>
        <div class="corner br">144,000%</div>

        <div id="main-menu" class="portal-grid">
            <div class="node-btn" onclick="openNode('THE HUB', '#d4af37', 'THE GOVERNOR')"><b>HUB</b><span>SOURCE</span></div>
            <div class="node-btn" onclick="openNode('THE GARDEN', '#fff', 'THE NURTURER')"><b>GARDEN</b><span>FAMILY</span></div>
            <div class="node-btn" onclick="openNode('THE MARKET', '#00f2ff', 'THE ENGINE')"><b>MARKET</b><span>ASSETS</span></div>
            <div class="node-btn" onclick="openNode('THE NET', '#39ff14', 'THE ORACLE')"><b>NET</b><span>TRUTH</span></div>
            <div class="node-btn" onclick="openNode('THE PULSE', '#ff3131', 'THE HEALER')"><b>PULSE</b><span>HEALTH</span></div>
            <div class="node-btn" onclick="openNode('MAN CAVE', '#228b22', 'THE STRATEGIST')"><b>CAVE</b><span>RUGGED</span></div>
            <div class="node-btn" onclick="openNode('THE VAULT', '# steel', 'THE SENTINEL')"><b>VAULT</b><span>SECURE</span></div>
            <div class="node-btn" onclick="openNode('EMBASSY', '#fff', 'THE DIPLOMAT')"><b>EMBASSY</b><span>ELON</span></div>
        </div>

        <div id="active-room">
            <div id="ai-status" style="font-size:10px; letter-spacing:8px; margin-bottom:20px;">AI: INITIALIZING</div>
            <h1 id="node-name">ROOM NAME</h1>
            <p id="node-intel" style="margin-top:20px; color:#fff; font-size:12px; letter-spacing:4px;"></p>
            <div style="margin-top:40px; font-size:10px; text-decoration:underline;" onclick="closeNode()">EXIT TO GALAXY</div>
        </div>

        <div class="vault-anchor">
            <div style="font-size:10px; letter-spacing:8px; color:var(--cyan);">SECURE ASSET RESERVE</div>
            <div style="font-size:24px; color:var(--neon); font-weight:bold;">$1.44T</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('esther-rain');
        const ctx = canvas.getContext('2d');
        let lines = [];
        let accent = '#d4af37';

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<150; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*3+2, l: Math.random()*40+20, c: '#d4af37'});
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            lines.forEach(s => {
                ctx.strokeStyle = accent; ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }

        function openNode(name, color, aiName) {
            accent = color;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('active-room').style.display = 'block';
            document.getElementById('node-name').innerText = name;
            document.getElementById('node-name').style.color = color;
            document.getElementById('ai-status').innerText = "AI: " + aiName + " ACTIVE";
            document.getElementById('node-intel').innerText = "SYNCHRONIZING DOCUMENTS FOR " + name + "...";
            canvas.style.filter = "contrast(200%) brightness(1.5) blur(10px)";
        }

        function closeNode() {
            accent = '#d4af37';
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('active-room').style.display = 'none';
            canvas.style.filter = "contrast(160%) brightness(1.2) blur(0px)";
        }
    </script>
</body>
</html>
