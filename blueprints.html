<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | MARKET</title>
    <style>
        /* THE FOUNDATION DNA - NEVER CHANGES */
        :root { --gold: #d4af37; --void: #000; --neon: #39ff14; --cyan: #00f2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        /* THE AETHER RAIN (THE ENGINE) */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: contrast(160%) blur(1px); }

        .vessel {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 60px 20px; text-align: center;
        }

        /* ROOM-SPECIFIC DESIGN: THE MARKET HEADER */
        .room-header {
            border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
            padding: 15px 0; font-size: 10px; letter-spacing: 12px; text-transform: uppercase;
        }

        .market-vault {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
        }

        .market-title {
            font-size: 45px; letter-spacing: 20px; font-style: italic; color: var(--gold);
            text-shadow: 0 0 30px var(--gold); margin-bottom: 20px;
        }

        /* THE FLOW OF ABUNDANCE (The "Design Behind It") */
        .abundance-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 400px; margin: 0 auto;
        }
        .asset-row {
            background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--neon);
            padding: 20px; border-radius: 10px; display: flex; justify-content: space-between;
            align-items: center; backdrop-filter: blur(10px);
        }
        .asset-label { font-size: 12px; letter-spacing: 5px; color: var(--cyan); }
        .asset-status { font-size: 10px; color: var(--neon); font-weight: 900; }

        .footer { font-size: 10px; letter-spacing: 8px; opacity: 0.5; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 20px; }
    </style>
</head>
<body onload="ignite()">

    <canvas id="aether"></canvas>

    <div class="vessel">
        <div class="room-header">ROOM: MARKETPLACE // ABUNDANCE ACTIVE</div>

        <div class="market-vault">
            <h1 class="market-title">MARKET</h1>
            
            <div class="abundance-grid">
                <div class="asset-row">
                    <span class="asset-label">LIQUIDITY</span>
                    <span class="asset-status">UNLIMITED</span>
                </div>
                <div class="asset-row">
                    <span class="asset-label">RESOURCES</span>
                    <span class="asset-status">MANIFESTING</span>
                </div>
                <div class="asset-row">
                    <span class="asset-label">SOVEREIGNTY</span>
                    <span class="asset-status">144,000%</span>
                </div>
            </div>
        </div>

        <div class="footer">BACK TO SOURCE // GHOST MODE ON</div>
    </div>

    <script>
        /* THE MOVEMENT DNA - NEVER CHANGES */
        const canvas = document.getElementById('aether');
        const ctx = canvas.getContext('2d');
        let lines = [];
        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<180; i++) lines.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*2+2, l: Math.random()*40+20});
            draw();
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            lines.forEach(s => {
                ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y+s.l); ctx.stroke();
                s.y += s.v; if(s.y > canvas.height) s.y = -s.l;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
