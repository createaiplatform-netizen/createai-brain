<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN | THE CHILDREN'S GARDEN</title>
    <style>
        :root { --gold: #d4af37; --white: #ffffff; --bloom: #e0f7fa; --void: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; font-family: 'Times New Roman', serif; }
        body, html { background: var(--void); color: var(--gold); height: 100vh; width: 100vw; overflow: hidden; position: fixed; }

        /* THE BREATHING AETHER (Bubbles + Soft Rain) */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(5px) brightness(1.3); }

        .garden-ui {
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 30px; position: relative;
        }

        /* THE COMPASS (ANGELIC LOCK) */
        .corner { position: absolute; font-size: 9px; letter-spacing: 6px; text-transform: uppercase; color: var(--white); opacity: 0.7; }
        .tl { top: 30px; left: 30px; border-bottom: 1px solid var(--gold); }
        .tr { top: 30px; right: 30px; border-bottom: 1px solid var(--gold); }
        .bl { bottom: 130px; left: 30px; border-top: 1px solid var(--gold); }
        .br { bottom: 130px; right: 30px; border-top: 1px solid var(--gold); }

        /* THE CENTER: THE CHILDREN'S GARDEN */
        .garden-core { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .garden-core h1 { font-size: clamp(30px, 10vw, 60px); letter-spacing: 15px; font-style: italic; text-shadow: 0 0 30px var(--white); color: var(--white); margin-bottom: 20px; }
        
        /* THE AGE TILES (THE GATES) */
        .gate-system { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        .gate {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 20px; border-radius: 40px; backdrop-filter: blur(20px);
            transition: 0.4s;
        }
        .gate:active { transform: scale(0.95); border-color: var(--white); box-shadow: 0 0 20px var(--white); }
        .gate b { display: block; letter-spacing: 8px; font-size: 14px; color: var(--white); }
        .gate span { font-size: 8px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-top: 5px; display: block; }

        /* THE NURTURE VAULT */
        .vault-anchor {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--white); 
            padding: 20px; text-align: center; backdrop-filter: blur(30px); border-radius: 40px;
        }
        .vault-label { font-size: 9px; letter-spacing: 8px; color: var(--gold); margin-bottom: 5px; }
        .vault-value { font-size: 18px; letter-spacing: 4px; color: var(--white); font-weight: bold; }
    </style>
</head>
<body onload="ignite()">
    <canvas id="garden-aether"></canvas>
    
    <div class="garden-ui">
        <div class="corner tl">GUARDIAN</div>
        <div class="corner tr">ANGELS</div>
        <div class="corner bl">INNOCENCE</div>
        <div class="corner br">SOVEREIGN</div>

        <div class="garden-core">
            <h1>THE GARDEN</h1>
            <div class="gate-system">
                <div class="gate"><b>SEEDLINGS</b><span>Ages 3 — 7</span></div>
                <div class="gate"><b>SAPLINGS</b><span>Ages 8 — 13</span></div>
                <div class="gate"><b>SOVEREIGNS</b><span>Ages 14 +</span></div>
            </div>
        </div>

        <div class="vault-anchor">
            <div class="vault-label">DIVINE PROTECTION ACTIVE</div>
            <div class="vault-value">144,000% FREQUENCY</div>
            <p style="font-size: 8px; letter-spacing: 3px; margin-top: 5px; color: #fff;">THE WORLD IS BREATHING</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('garden-aether');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function ignite() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    v: Math.random()*0.8 + 0.3, r: Math.random()*12 + 2,
                    c: Math.random()>0.7 ? '#fff' : '#d4af37'
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = p.c; ctx.globalAlpha = 0.3;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.v; if(p.y < -20) p.y = canvas.height + 20;
            });
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
