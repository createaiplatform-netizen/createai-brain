<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANK | CREATEAI</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --green: #00FF00; }
        body { background: radial-gradient(circle at top, #111, #000); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-back { color: var(--gold); text-decoration: none; font-size: 0.6rem; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 50px; display: inline-block; margin-bottom: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 30px; backdrop-filter: blur(15px); max-width: 400px; margin: 0 auto; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .balance { font-size: 3rem; font-weight: 800; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); margin: 20px 0; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: #000; }
        .ledger { margin-top: 30px; text-align: left; font-size: 0.6rem; color: #666; }
        .row { border-bottom: 1px solid #222; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">CORE_SYNC</a>
    <div class="card">
        <div style="font-size: 0.6rem; letter-spacing: 3px;">SOVEREIGN_RESERVE</div>
        <div class="balance">$144,000.00</div>
        <div class="btn-row">
            <button class="btn">DEPOSIT</button>
            <button class="btn">WITHDRAW</button>
        </div>
        <div class="ledger">
            <div class="row"><span>DROPSHIP_PAYOUT</span><span style="color:var(--green);">+$2,400.00</span></div>
            <div class="row"><span>MEMBER_SUBSCRIPTION</span><span style="color:var(--green);">+$144.00</span></div>
        </div>
    </div>
</body>
</html>
