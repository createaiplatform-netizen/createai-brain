<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB | COMMAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-16 border-b border-white/5 pb-8">
            <h1 class="text-4xl font-black italic">STUDIO <span class="text-blue-600">CORE</span></h1>
            <div class="text-right"><p class="text-[10px] text-emerald-500 font-bold">SYSTEMS: ONLINE</p></div>
        </header>

        <div class="grid md:grid-cols-3 gap-8 mb-12">
            <div class="bg-white/5 p-8 rounded-3xl border border-white/10">
                <h3 class="text-blue-500 font-bold text-[10px] tracking-widest mb-4 uppercase">Engine 01</h3>
                <h4 class="text-2xl font-bold mb-6 italic">FAMILY DISPATCH</h4>
                <textarea id="famMsg" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-sm" placeholder="Message..."></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="sendFam('all')" class="bg-blue-600 py-3 rounded-lg text-[10px] font-bold uppercase">All</button>
                    <button onclick="sendFam('kids')" class="bg-white/10 py-3 rounded-lg text-[10px] font-bold uppercase">Kids</button>
                </div>
            </div>

            <div class="bg-white/5 p-8 rounded-3xl border border-white/10">
                <h3 class="text-blue-500 font-bold text-[10px] tracking-widest mb-4 uppercase">Engine 02</h3>
                <h4 class="text-2xl font-bold mb-4 italic">BLUEPRINTS</h4>
                <ul class="text-[10px] text-gray-400 space-y-4 uppercase tracking-widest font-bold">
                    <li class="flex justify-between"><span>Free Internet</span> <span class="text-blue-500">View</span></li>
                    <li class="flex justify-between"><span>Free Cell</span> <span class="text-blue-500">View</span></li>
                    <li class="flex justify-between"><span>Health OS</span> <span class="text-blue-500">View</span></li>
                </ul>
            </div>

            <a href="admin_ebs.html" class="bg-red-600/5 p-8 rounded-3xl border border-red-600/20 hover:bg-red-600/10 transition">
                <h3 class="text-red-600 font-bold text-[10px] tracking-widest mb-4 uppercase">Master</h3>
                <h4 class="text-2xl font-bold mb-4 italic">GLOBAL EBS</h4>
                <p class="text-[10px] text-red-600/50 uppercase leading-relaxed">Admin console for world-wide push notifications.</p>
            </a>
        </div>
    </div>
    <script>
        function sendFam(t) {
            const m = document.getElementById('famMsg').value;
            if(!m) return alert('EMPTY');
            const nums = t === 'all' ? "7152221234,7152225678" : "7152221234";
            window.location.href = "sms:" + nums + "?body=" + encodeURIComponent("FAMILY ALERT: " + m + "\n\nHub: https://createai.digital/hub.html");
        }
    </script>
</body>
</html>
