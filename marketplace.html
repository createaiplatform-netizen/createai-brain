<!DOCTYPE html>
<html lang="en">
<head>

        .price { color: var(--green); font-size: 1.5rem; display: block; margin: 10px 0; }
        .buy-btn { background: var(--gold); color: var(--black); border: none; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; }

</head>
