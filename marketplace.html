<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Marketplace | Gateway</title>
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; text-align: center; }
        .hero { background: #0f172a; color: white; padding: 60px 20px; border-bottom: 5px solid #fbbf24; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .portal { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-decoration: none; color: inherit; transition: 0.3s; }
        .portal:hover { transform: translateY(-10px); }
        .portal h2 { color: #0f172a; margin-top: 20px; }
        .icon { font-size: 3rem; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Sovereign Marketplace</h1>
        <p>Choose your destination.</p>
    </div>

    <div class="grid">
        <a href="global-exchange.html" class="portal">
            <div class="icon">🌍</div>
            <h2>Global Exchange</h2>
            <p>Buy anything in the world. Millions of products ready to ship.</p>
        </a>

        <a href="creator-hub.html" class="portal" style="border: 2px solid #fbbf24;">
            <div class="icon">✨</div>
            <h2>Creator Hub</h2>
            <p>Use Little AIs to design your own clothes and products.</p>
        </a>

        <a href="sovereign-tech.html" class="portal">
            <div class="icon">🛡️</div>
            <h2>Sovereign Tech</h2>
            <p>Access the Vault for Nexus Keys and Wealth Nodes.</p>
        </a>
    </div>

</body>
</html>
