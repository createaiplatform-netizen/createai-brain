<script src="https://js.stripe.com/v3/"></script>
<script>
    const stripe = Stripe('YOUR_STRIPE_KEY'); // THIS IS THE ENGINE KEY

    async function buyProduct(priceId) {
        // This code actually initiates a real financial transaction
        const { error } = await stripe.redirectToCheckout({
            lineItems: [{ price: priceId, quantity: 1 }],
            mode: 'subscription',
            successUrl: 'https://createai.digital/success',
            cancelUrl: 'https://createai.digital/cancel',
        });
        if (error) console.log(error.message);
    }
</script>
