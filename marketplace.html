<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Marketplace | CREATEAI</title>
    <style>
        :root { --slate: #1e293b; --gold: #b89c66; --bg: #ffffff; }
        body { background: #fdfdfd; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .top-nav { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .search-container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        .search-bar { width: 100%; padding: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 1.1rem; }
        
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; margin-top: 40px; }
        .product-card { background: #fff; padding: 10px; transition: 0.3s; }
        .product-card:hover { transform: scale(1.02); }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #f8f8f8; margin-bottom: 15px; }
        .product-info { padding: 10px; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.1rem; }
        .order-button { width: 100%; padding: 12px; background: var(--slate); color: white; border: none; margin-top: 15px; cursor: pointer; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" style="text-decoration:none; color:var(--slate); font-weight:700;">CREATEAI_EXCHANGE</a>
        <div style="font-size: 0.8rem; letter-spacing: 1px;">SECURE LOGISTICS ACTIVE</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search the world's inventory...">
        
        <div class="market-grid">
            <div class="product-card">
                <img src="https://m.media-amazon.com/images/I/71X8X8yU-aL._AC_SX679_.jpg" class="product-img">
                <div class="product-info">
                    <div style="font-size:0.9rem;">Sovereign Connectivity Hub</div>
                    <div class="price">$144.00</div>
                    <button class="order-button">PURCHASE</button>
                </div>
            </div>
            <div class="product-card">
                <img src="https://m.media-amazon.com/images/I/61NfHpxiZPL._AC_SX679_.jpg" class="product-img">
                <div class="product-info">
                    <div style="font-size:0.9rem;">Family Security Node</div>
                    <div class="price">$89.99</div>
                    <button class="order-button">PURCHASE</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
