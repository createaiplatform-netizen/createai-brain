<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Exchange | CREATEAI</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root { --deep: #0f172a; --gold: #f59e0b; --accent: #3b82f6; --white: #ffffff; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .header { background: var(--deep); color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* The AI Creative Terminal */
        .ai-card { 
            background: var(--white); border-radius: 24px; overflow: hidden; 
            display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            margin-bottom: 40px; border: 2px solid var(--gold);
        }
        .ai-preview { 
            background: #e2e8f0; height: 400px; display: flex; align-items: center; justify-content: center;
            position: relative; background-image: url('https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
        }
        .ai-overlay { 
            position: absolute; width: 150px; height: 150px; 
            border: 2px dashed rgba(255,255,255,0.5); top: 30%; left: 35%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(5px);
            color: white; font-size: 0.6rem; text-align: center;
        }
        .ai-controls { padding: 30px; background: var(--deep); color: white; }
        .prompt-input { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: rgba(255,255,255,0.1); color: white; margin-bottom: 15px;
        }
        
        .gen-btn { 
            background: var(--gold); color: black; border: none; padding: 15px 30px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .small-card { background: white; padding: 15px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CREATEAI_EXCHANGE</h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">Where the family becomes the creator.</p>
    </div>

    <div class="container">
        <h2 style="color: var(--deep);">1. The Creative Node: AI Apparel</h2>
        
        <div class="ai-card">
            <div class="ai-preview" id="product-canvas">
                <div class="ai-overlay" id="ai-design-layer">
                    [ AI DESIGN WILL APPEAR HERE ]
                </div>
            </div>
            <div class="ai-controls">
                <h3>What should this look like?</h3>
                <p style="font-size: 0.8rem; opacity: 0.6;">Describe your vision. Our AI will manifest it onto the garment instantly.</p>
                <input type="text" id="user-prompt" class="prompt-input" placeholder="e.g. 'A futuristic golden lion in a digital forest'">
                <button class="gen-btn" onclick="generateDesign()">MANIFEST DESIGN</button>
                <button class="gen-btn" style="background: white; margin-top:10px;" onclick="purchaseCustom()">PURCHASE THIS CREATION ($45.00)</button>
            </div>
        </div>

        <h2 style="color: var(--deep);">2. Sovereign Assets</h2>
        <div class="grid">
            <div class="small-card">
                <img src="https://images.unsplash.com/photo-1550565118-3d143c00368c?auto=format&fit=crop&w=150&q=80" width="100%">
                <h4>Wealth Node</h4>
                <button class="gen-btn" style="font-size: 0.7rem;">ACQUIRE</button>
            </div>
            <div class="small-card">
                <img src="https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?auto=format&fit=crop&w=150&q=80" width="100%">
                <h4>Garden Sensor</h4>
                <button class="gen-btn" style="font-size: 0.7rem;">ACQUIRE</button>
            </div>
        </div>
    </div>

    <script>
        function generateDesign() {
            const prompt = document.getElementById('user-prompt').value;
            const layer = document.getElementById('ai-design-layer');
            layer.innerHTML = "MANIFESTING: " + prompt.toUpperCase() + "...";
            layer.style.background = "rgba(245, 158, 11, 0.3)";
            
            // Logic: This would call the OpenAI/DALL-E API and replace the background image
            setTimeout(() => {
                layer.innerHTML = "<small>AI GENERATED ASSET #8821</small>";
                alert("The AI has updated the garment design based on your prompt.");
            }, 2000);
        }

        function purchaseCustom() {
            alert("Routing your custom AI creation to the Print-on-Demand Engine...");
        }
    </script>
</body>
</html>
