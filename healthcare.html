<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALTH | CREATEAI</title>
    <style>
        :root { --gold: #D4AF37; --red: #FF3B30; --glass: rgba(255, 255, 255, 0.03); }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; text-transform: uppercase; }
        .nav-back { color: var(--gold); text-decoration: none; font-size: 0.6rem; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 50px; display: inline-block; margin-bottom: 20px; }
        .scan-card { background: var(--glass); border: 1px solid rgba(255, 59, 48, 0.2); border-radius: 20px; padding: 30px; backdrop-filter: blur(15px); max-width: 400px; margin: 0 auto; text-align: center; position: relative; }
        .pulse { font-size: 2.5rem; color: var(--red); font-weight: bold; margin: 20px 0; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.6rem; text-align: left; margin-top: 20px; }
        .data-point { border: 1px solid #333; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">CORE_SYNC</a>
    <div class="scan-card">
        <div style="font-size: 0.6rem; color: var(--red);">BIOMETRIC_SCAN_ACTIVE</div>
        <div class="pulse">72 BPM</div>
        <div class="data-grid">
            <div class="data-point">OXYGEN: 98%</div>
            <div class="data-point">STRESS: LOW</div>
            <div class="data-point">SLEEP: OPTIMIZED</div>
            <div class="data-point">SYNC: 100%</div>
        </div>
    </div>
</body>
</html>
