<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Dome V2</title>
<style>
body { font-family: sans-serif; margin: 10px; background: #fafafa; }
textarea, input, select { width: 100%; padding: 5px; margin-top: 5px; }
button { padding: 8px; margin-top: 5px; }
#output { border: 1px solid #ccc; padding: 10px; margin-top: 10px; height: 200px; overflow: auto; background: #f0f0f0; }
iframe { width: 100%; height: 400px; border: 2px solid #333; margin-top: 10px; }
h1, h3 { margin-bottom: 5px; }
</style>
</head>
<body>

<h1>Golden Dome V2 – 144,000% Mode</h1>

<h3>Admin Panel</h3>
<input type="password" id="adminKey" placeholder="Enter Golden Dome key">
<textarea id="command" placeholder="Type AI command here..."></textarea><br>
<button id="runBtn">Run Command</button>

<div id="output"></div>

<h3>Page Selector</h3>
<select id="pageSelect"></select>

<h3>Live Preview</h3>
<iframe id="preview" srcdoc="<h1>Nothing yet</h1>"></iframe>

<script>
// --------------------
// STORAGE
// --------------------
let siteFiles = JSON.parse(localStorage.getItem('siteFiles') || "{}");
let components = JSON.parse(localStorage.getItem('components') || "{}");

// --------------------
// UTILITIES
// --------------------
const output = document.getElementById('output');
const preview = document.getElementById('preview');
const pageSelect = document.getElementById('pageSelect');

function updatePageSelector() {
    pageSelect.innerHTML = "";
    Object.keys(siteFiles).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        pageSelect.appendChild(opt);
    });
    if (pageSelect.options.length > 0) {
        pageSelect.value = pageSelect.options[0].value;
        updatePreview(pageSelect.value);
    }
}

function updatePreview(page) {
    preview.srcdoc = siteFiles[page] || "<h1>Nothing yet</h1>";
}

// --------------------
// AI COMMANDS
// --------------------
function processCommand(cmd) {
    cmd = cmd.trim();
    const lower = cmd.toLowerCase();

    if (lower.startsWith("create page ")) {
        const parts = cmd.split(" ");
        const pageName = parts[2];
        const h1Text = cmd.split("'")[1] || pageName;
        const html = `<html><head><style>body{font-family:sans-serif}</style></head><body><h1>${h1Text}</h1></body></html>`;
        siteFiles[pageName] = html;
        localStorage.setItem('siteFiles', JSON.stringify(siteFiles));
        output.innerHTML += `✅ Created page '${pageName}'<br>`;
        updatePageSelector();
        updatePreview(pageName);
    }
    else if (lower.startsWith("edit page ")) {
        const parts = cmd.split(" ");
        const pageName = parts[2];
        if (!siteFiles[pageName]) { output.innerHTML += `⚠️ Page '${pageName}' does not exist<br>`; return; }
        const html = cmd.split("'")[1] || siteFiles[pageName];
        siteFiles[pageName] = html;
        localStorage.setItem('siteFiles', JSON.stringify(siteFiles));
        output.innerHTML += `✏️ Edited page '${pageName}'<br>`;
        updatePreview(pageName);
    }
    else if (lower.startsWith("add component ")) {
        const compName = cmd.split(" ")[2];
        const compHtml = cmd.split("'")[1] || `<div>${compName}</div>`;
        components[compName] = compHtml;
        localStorage.setItem('components', JSON.stringify(components));
        output.innerHTML += `🧩 Component '${compName}' added<br>`;
    }
    else if (lower.startsWith("insert component ")) {
        const compName = cmd.split(" ")[2];
        const pageName = cmd.split(" ")[4];
        if (!siteFiles[pageName]) { output.innerHTML += `⚠️ Page '${pageName}' does not exist<br>`; return; }
        const html = siteFiles[pageName].replace("</body>", `${components[compName] || ""}</body>`);
        siteFiles[pageName] = html;
        localStorage.setItem('siteFiles', JSON.stringify(siteFiles));
        output.innerHTML += `✅ Component '${compName}' inserted into '${pageName}'<br>`;
        updatePreview(pageName);
    }
    else if (lower === "list pages") {
        output.innerHTML += `📄 Pages: ${Object.keys(siteFiles).join(", ")}<br>`;
    }
    else if (lower === "list components") {
        output.innerHTML += `🧩 Components: ${Object.keys(components).join(", ")}<br>`;
    }
    else {
        output.innerHTML += `⚠️ Command not recognized<br>`;
    }
}

// --------------------
// EVENT HANDLERS
// --------------------
document.getElementById('runBtn').onclick = () => {
    const key = document.getElementById('adminKey').value;
    if (key !== "144000%") { output.innerHTML += "🔒 Invalid key<br>"; return; }
    const cmd = document.getElementById('command').value;
    processCommand(cmd);
    document.getElementById('command').value = '';
};

pageSelect.onchange = () => updatePreview(pageSelect.value);

// --------------------
// INITIALIZE
// --------------------
updatePageSelector();
if (pageSelect.value) updatePreview(pageSelect.value);
</script>

</body>
</html>
