<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME TO THE FREEDOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&family=Playfair+Display:italic,wght@900&display=swap');
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .glow { position: absolute; width: 100vw; height: 100vw; background: radial-gradient(circle, rgba(217, 119, 6, 0.1) 0%, transparent 70%); filter: blur(100px); animation: pulse 10s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 0.8; } }
        .glass-vault { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(60px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 5rem; padding: 5rem; text-align: center; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="glass-vault max-w-4xl relative z-10">
        <p class="text-[10px] tracking-[1.5em] text-amber-500 mb-10 uppercase font-black">Authentication Complete</p>
        <h1 class="serif text-7xl md:text-9xl mb-12 italic">Welcome <br>Home.</h1>
        <p class="text-white/30 text-xl mb-16 font-extralight tracking-widest uppercase">The Blueprints are Decrypted.</p>
        <a href="blueprints.html" class="inline-block border border-white/20 px-16 py-8 rounded-full font-black text-xs uppercase tracking-[0.6em] hover:bg-white hover:text-black transition-all duration-1000">Enter the Vault</a>
    </div>
</body>
</html>
