<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEBSTER-54893 // COMMAND DECK</title>
  <style>
    /* SOVEREIGN_ARCHITECT_STABILITY_1440_LOGIC_ACTIVE */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; background: #000; color: #d4af37;
      font-family: 'Courier New', Courier, monospace; text-transform: uppercase;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px);
    }
    #header { padding: 16px 24px; border-bottom: 1px solid #1a1500; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #000; z-index: 10; }
    .brand { font-size: 0.78rem; letter-spacing: 0.5em; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #d4af37; display: inline-block; animation: pulse 2s infinite; margin-right: 8px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.1} }
    #asset-count { font-size: 0.55rem; color: #3a3000; letter-spacing: 0.3em; }
    #export-btn { background: transparent; border: 1px solid #d4af37; color: #d4af37; font-family: 'Courier New', monospace; padding: 8px 18px; cursor: pointer; letter-spacing: 0.2em; font-size: 0.6rem; text-transform: uppercase; transition: 0.2s; text-decoration: none; display: inline-block; }
    #export-btn:hover { background: #d4af37; color: #000; }

    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding: 20px 24px; }
    .card { border: 1px solid #1a1500; background: #050505; display: flex; flex-direction: column; overflow: hidden; transition: border-color 0.2s; }
    .card:hover { border-color: #3a3000; }
    .card img { width: 100%; aspect-ratio: 480/300; object-fit: cover; display: block; background: #0a0a00; }
    .card-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
    .card-name { font-size: 0.7rem; color: #d4af37; letter-spacing: 0.1em; }
    .card-hash { font-size: 0.5rem; color: #3a3000; letter-spacing: 0.08em; word-break: break-all; }
    .card-time { font-size: 0.46rem; color: #1a1500; }
    .card-dl { font-size: 0.5rem; color: #000; background: #d4af37; text-decoration: none; padding: 3px 8px; letter-spacing: 0.1em; align-self: flex-start; margin-top: 4px; }
    .card-dl:hover { background: #fff; }

    #empty { padding: 60px 24px; text-align: center; font-size: 0.6rem; color: #1a1500; letter-spacing: 0.4em; line-height: 3; }
    #loading { padding: 40px 24px; text-align: center; font-size: 0.55rem; color: #2a2000; letter-spacing: 0.4em; animation: blink 1.2s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

    #footer { padding: 12px 24px; border-top: 1px solid #1a1500; font-size: 0.42rem; color: #1a1500; letter-spacing: 0.22em; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div id="header">
    <span class="brand"><span class="dot"></span>COMMAND_DECK // WEBSTER-54893</span>
    <span id="asset-count">LOADING...</span>
    <a id="export-btn" href="/export-batch" download="WEBSTER_EXPORTS.zip">EXPORT_EMPIRE_BATCH</a>
  </div>

  <div id="grid"><div id="loading">READING_ARCHIVE...</div></div>

  <div id="footer">
    <span>NODE: COMMAND_INTERFACE</span>
    <span>SYSTEM_SEALED // 1440_LOGIC_ACTIVE</span>
  </div>

  <script>
    (function(){ const noop = () => {}; window.console = { log: noop, warn: noop, error: noop, info: noop, debug: noop }; })();

    const grid = document.getElementById('grid');
    const countEl = document.getElementById('asset-count');

    async function loadArchive() {
      try {
        const res  = await fetch('/commander/data');
        const data = await res.json();
        grid.innerHTML = '';
        if (!data.assets || !data.assets.length) {
          grid.innerHTML = '<div id="empty">ARCHIVE_EMPTY — NO_LEGENDARY_STRIKES_RECORDED</div>';
          countEl.textContent = '0 ASSETS';
          return;
        }
        countEl.textContent = data.assets.length + ' ASSETS // ' + data.total + ' TOTAL';
        data.assets.forEach(asset => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML =
            '<img src="/exports/' + asset.png + '" alt="' + asset.name + '" loading="lazy">' +
            '<div class="card-body">' +
              '<span class="card-name">' + asset.name + '</span>' +
              '<span class="card-hash">HASH: ' + (asset.provenance_hash || '\u2014') + '</span>' +
              '<span class="card-time">' + (asset.savedAt || asset.timestamp || '') + '</span>' +
              '<a class="card-dl" href="/exports/' + asset.png + '" download="' + asset.name + '.png">DOWNLOAD_PNG</a>' +
            '</div>';
          grid.appendChild(card);
        });
      } catch (_) {
        grid.innerHTML = '<div id="empty">ARCHIVE_READ_ERROR</div>';
        countEl.textContent = 'ERROR';
      }
    }

    loadArchive();
  </script>
</body>
</html>
